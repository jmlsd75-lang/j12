<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Center Layout</title>
    <style>
        /* Make the body fill the full screen height */
        body {
            margin: 0;
            padding: 0;
            height: 100vh; /* 100% of Viewport Height */
            font-family: sans-serif;
            background-color: white;
            
            /* Flexbox to center the List button perfectly */
            display: flex;
            justify-content: center; /* Horizontal Center */
            align-items: center;     /* Vertical Center */
            overflow: hidden;        /* Prevent scrollbars */
        }

        /* 1. Lefty Button (<)
           Positioned absolutely at the top-left, outside the center flow */
        .lefty-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            text-decoration: none;
            font-size: 32px;
            color: #333;
            font-weight: bold;
            z-index: 10; /* Ensures it sits on top */
        }

        /* 2. List Button
           Sits in the exact middle of the page */
        .list-btn {
            text-decoration: none;
            font-size: 24px;
            font-weight: bold;
            color: #007bff;
            padding: 15px 40px;
            border: 2px solid #007bff;
            border-radius: 50px; /* Makes it pill-shaped */
            transition: all 0.2s;
        }

        /* Hover effects */
        .lefty-btn:hover { color: #000; }
        
        .list-btn:hover {
            background-color: #007bff;
            color: white;
        }
        /* Container to hold both buttons side by side in center */
.center-buttons {
    display: flex;
    gap: 20px; /* space between buttons */
    justify-content: center;
    align-items: center;
}

/* Reuse existing list-btn styling */
.cash-btn {
    /* Optional: different color for Cash Book */
    border-color: #28a745;
    color: #28a745;
}

.cash-btn:hover {
    background-color: #28a745;
    color: white;
}
    </style>
</head>
<body>

    <!-- 1. Lefty < : Top-Left Corner, redirects to menu.html -->
    <a href="menu.html" class="lefty-btn">&lt;</a>

    <!-- 2. Center Buttons Container -->
<div class="center-buttons">
    <!-- List Button -->
    <a href="list.html" class="list-btn">List</a>

    <!-- Cash Book Button -->
    <a href="cashbook.html" class="list-btn cash-btn">Cash Book</a>

     <!--- double column cash book -->
    <a href="doublecolumncashbook.html" class="list-btn cash-btn">Double Column Cash Book</a>
</div>
</body>
</html>
