<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accounting Hub</title>
    <style>
        :root {
            /* Color Palette */
            --primary: #3b82f6;
            --bg-grad-start: #f8fafc;
            --bg-grad-end: #e2e8f0;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --card-bg: #ffffff;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            --shadow-hover: 0 10px 15px -3px rgba(0, 0, 0, 0.15);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            height: 100vh;
            width: 100vw;
            background: linear-gradient(135deg, var(--bg-grad-start), var(--bg-grad-end));
            display: flex;
            flex-direction: column;
            overflow: hidden; /* No scroll on body, scroll on columns */
        }

        /* ────────────────────────────── */
        /* HEADER                         */
        /* ────────────────────────────── */
        header {
            flex: 0 0 80px; /* Fixed height */
            padding: 0 40px;
            display: flex;
            align-items: center;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(0,0,0,0.05);
            z-index: 10;
        }

        .back-btn {
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
            color: var(--text-main);
            font-weight: 700;
            padding: 10px 20px;
            border-radius: 8px;
            background: white;
            border: 1px solid #e2e8f0;
            box-shadow: var(--shadow);
            transition: 0.2s;
        }
        .back-btn:hover { background: var(--text-main); color: white; }

        .app-title {
            margin-left: auto;
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--text-main);
        }

        /* ────────────────────────────── */
        /* MAIN LAYOUT (2 SCROLLED COLS)  */
        /* ────────────────────────────── */
        main {
            /* CRITICAL: Flex logic for scrolling */
            flex: 1; 
            display: flex;
            gap: 30px;
            padding: 30px 40px;
            height: 0; /* Forces child columns to shrink to available space */
            max-width: 1400px;
            width: 100%;
            margin: 0 auto;
        }

        .column {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 15px;
            
            /* SCROLL LOGIC */
            overflow-y: auto; 
            padding: 5px 10px 10px 5px; /* Padding for scrollbar */
        }

        .col-header {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
            font-weight: 700;
            margin-bottom: 5px;
            padding-bottom: 10px;
            border-bottom: 2px solid #cbd5e1;
        }

        /* ────────────────────────────── */
        /* CARD BUTTONS                  */
        /* ────────────────────────────── */
        .nav-card {
            background: var(--card-bg);
            text-decoration: none;
            border-radius: 12px;
            padding: 18px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: var(--shadow);
            border: 1px solid rgba(0,0,0,0.05);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .nav-card:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-hover);
            border-color: var(--primary);
        }

        .left-content {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .icon {
            width: 40px; height: 40px;
            border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            color: white;
            flex-shrink: 0;
        }

        .label {
            font-size: 1.05rem;
            font-weight: 600;
            color: var(--text-main);
        }

        /* Specific Colors */
        .icon-blue { background: #3b82f6; }
        .icon-green { background: #10b981; }
        .icon-teal { background: #14b8a6; }
        .icon-orange { background: #f59e0b; }
        .icon-purple { background: #8b5cf6; }
        .icon-pink { background: #ec4899; }
        .icon-gray { background: #64748b; }

        /* Custom Scrollbar */
        .column::-webkit-scrollbar { width: 6px; }
        .column::-webkit-scrollbar-track { background: transparent; }
        .column::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
        .column::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

        @media (max-width: 768px) {
            main { flex-direction: column; padding: 20px; height: auto; overflow-y: auto;}
            .column { overflow-y: visible; }
            header { padding: 0 20px; }
            .app-title { display: none; }
        }
    </style>
</head>
<body>

    <header>
        <a href="business.html" class="back-btn">
            <!-- Simple Back Arrow SVG -->
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M19 12H5M12 19l-7-7 7-7"/>
            </svg>
            Back
        </a>
        <div class="app-title">Accounting Center</div>
    </header>

    <main>
        
        <!-- LEFT COLUMN: Main Books -->
        <div class="column">
            <div class="col-header">Books & Registers</div>

            <!-- 1. List -->
            <a href="list.html" class="nav-card">
                <div class="left-content">
                    <div class="icon icon-blue">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"></line><line x1="8" y1="12" x2="21" y2="12"></line><line x1="8" y1="18" x2="21" y2="18"></line><line x1="3" y1="6" x2="3.01" y2="6"></line><line x1="3" y1="12" x2="3.01" y2="12"></line><line x1="3" y1="18" x2="3.01" y2="18"></line></svg>
                    </div>
                    <span class="label">List</span>
                </div>
            </a>

            <!-- 2. Cash Book -->
            <a href="cashbook.html" class="nav-card">
                <div class="left-content">
                    <div class="icon icon-green">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="20" height="16" rx="2"></rect><line x1="12" y1="11" x2="12" y2="17"></line><line x1="12" y1="7" x2="12.01" y2="7"></line></svg>
                    </div>
                    <span class="label">Cash Book</span>
                </div>
            </a>

            <!-- 3. Double Column Cash Book -->
            <a href="doublecolumncashbook.html" class="nav-card">
                <div class="left-content">
                    <div class="icon icon-teal">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="9" y1="3" x2="9" y2="21"></line></svg>
                    </div>
                    <span class="label">Double Column Cash Book</span>
                </div>
            </a>

            <!-- 4. Ledgers -->
            <a href="ledgers.html" class="nav-card">
                <div class="left-content">
                    <div class="icon icon-orange">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"></path><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"></path></svg>
                    </div>
                    <span class="label">Ledgers</span>
                </div>
            </a>

        </div>

        <!-- RIGHT COLUMN: Journals -->
        <div class="column">
            <div class="col-header">Journals</div>

            <!-- 5. Sales Journal -->
            <a href="salesjournal.html" class="nav-card">
                <div class="left-content">
                    <div class="icon icon-purple">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"></polyline><polyline points="17 6 23 6 23 12"></polyline></svg>
                    </div>
                    <span class="label">Sales Journal</span>
                </div>
            </a>

            <!-- 6. Purchases Journal (Note: kept href typo if user file exists, fixed text) -->
            <a href="purchsesjournal.html" class="nav-card">
                <div class="left-content">
                    <div class="icon icon-pink">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 18 13.5 8.5 8.5 13.5 1 6"></polyline><polyline points="17 18 23 18 23 12"></polyline></svg>
                    </div>
                    <span class="label">Purchases Journal</span>
                </div>
            </a>

            <!-- 7. General Journal -->
            <a href="generaljournal.html" class="nav-card">
                <div class="left-content">
                    <div class="icon icon-gray">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
                    </div>
                    <span class="label">General Journal</span>
                </div>
            </a>

        </div>

    </main>
</body>
</html>
