<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            min-height: 100vh;
            font-family: 'Inter', sans-serif;
            background: #050505;
            color: #f5f5f4;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
        }

        /* ─── Top Bar ─── */
        .top-bar {
            position: sticky;
            top: 0;
            z-index: 20;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 20px 32px;
            background: rgba(5, 5, 5, 0.85);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .top-bar-left {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .back-btn {
            display: none;
            align-items: center;
            gap: 6px;
            color: rgb(168, 162, 158);
            text-decoration: none;
            font-size: 0.8rem;
            font-weight: 500;
            transition: color 0.3s;
        }

        .back-btn.visible { display: flex; }

        .back-btn:hover { color: #f97316; }

        .back-arrow {
            display: inline-block;
            width: 18px;
            height: 18px;
            border-left: 2px solid currentColor;
            border-bottom: 2px solid currentColor;
            transform: rotate(45deg);
        }

        .menu-badge {
            font-size: 0.7rem;
            font-weight: 700;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: #f97316;
            background: rgba(249, 115, 22, 0.1);
            border: 1px solid rgba(249, 115, 22, 0.2);
            padding: 5px 12px;
            border-radius: 8px;
        }

        .menu-badge.free-mode {
            color: rgb(168, 162, 158);
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(255, 255, 255, 0.08);
        }

        /* ─── Glow ─── */
        .glow-orb {
            position: fixed;
            top: 35%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(249, 115, 22, 0.04) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        /* ─── Main Content ─── */
        .main-content {
            position: relative;
            z-index: 2;
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 60px 24px;
            gap: 28px;
        }

        .main-content h1 {
            font-size: 2rem;
            font-weight: 800;
            letter-spacing: -0.03em;
            line-height: 1.1;
        }

        .main-content h1 span {
            background: linear-gradient(135deg, #f97316, #fb923c);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .btn-health {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 18px 56px;
            font-size: 1.05rem;
            font-weight: 700;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: #050505;
            background: linear-gradient(135deg, #f97316, #fb923c);
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 0 30px rgba(249, 115, 22, 0.2), 0 0 60px rgba(249, 115, 22, 0.05);
            text-decoration: none;
            font-family: 'Inter', sans-serif;
        }

        .btn-health:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 40px rgba(249, 115, 22, 0.35), 0 0 80px rgba(249, 115, 22, 0.1);
        }

        .btn-health:active { transform: translateY(0); }

        .btn-health svg {
            width: 20px;
            height: 20px;
            stroke: #050505;
            stroke-width: 2;
            fill: none;
            flex-shrink: 0;
        }

        /* ─── Timer (free/pay mode) ─── */
        .timer-section {
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            margin-top: 20px;
        }

        .timer-section.visible { display: flex; }

        .timer-label {
            font-size: 0.7rem;
            font-weight: 600;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: rgb(87, 83, 78);
        }

        .timer-display {
            font-size: 3.5rem;
            font-weight: 800;
            letter-spacing: 0.05em;
            color: #f5f5f4;
            font-variant-numeric: tabular-nums;
            line-height: 1;
        }

        .timer-display.warning {
            color: #f97316;
            animation: pulse-glow 1s ease-in-out infinite;
        }

        .timer-display.danger {
            color: #ef4444;
            animation: pulse-glow-red 0.6s ease-in-out infinite;
        }

        @keyframes pulse-glow {
            0%, 100% { text-shadow: 0 0 20px rgba(249, 115, 22, 0.3); }
            50% { text-shadow: 0 0 40px rgba(249, 115, 22, 0.6); }
        }

        @keyframes pulse-glow-red {
            0%, 100% { text-shadow: 0 0 20px rgba(239, 68, 68, 0.3); }
            50% { text-shadow: 0 0 40px rgba(239, 68, 68, 0.6); }
        }

        .timer-bar {
            max-width: 320px;
            width: 100%;
            height: 4px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 4px;
            overflow: hidden;
        }

        .timer-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #f97316, #fb923c);
            border-radius: 4px;
            transition: width 1s linear;
        }

        .timer-bar-fill.warning { background: linear-gradient(90deg, #f97316, #ef4444); }
        .timer-bar-fill.danger { background: #ef4444; }

        /* ─── Unlimited badge (admin mode) ─── */
        .unlimited-badge {
            display: none;
            align-items: center;
            gap: 8px;
            font-size: 0.72rem;
            font-weight: 600;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: #22c55e;
            background: rgba(34, 197, 94, 0.08);
            border: 1px solid rgba(34, 197, 94, 0.15);
            padding: 8px 20px;
            border-radius: 8px;
            margin-top: 12px;
        }

        .unlimited-badge.visible { display: flex; }

        .unlimited-badge svg {
            width: 14px;
            height: 14px;
            stroke: #22c55e;
            stroke-width: 2;
            fill: none;
        }

        /* ─── Footer ─── */
        .footer-text {
            text-align: center;
            padding: 32px 24px;
            position: relative;
            z-index: 2;
        }

        .footer-text p {
            font-size: 0.7rem;
            color: rgb(87, 83, 78);
            letter-spacing: 0.03em;
        }

        /* ─── Redirect overlay ─── */
        .redirect-overlay {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 100;
            background: rgba(5, 5, 5, 0.95);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 16px;
            text-align: center;
            padding: 24px;
        }

        .redirect-overlay.visible { display: flex; }

        .redirect-overlay p {
            font-size: 0.9rem;
            color: rgb(168, 162, 158);
        }

        .redirect-overlay .redirect-timer {
            font-size: 2rem;
            font-weight: 800;
            color: #ef4444;
            font-variant-numeric: tabular-nums;
        }

        /* ─── Access Denied ─── */
        .access-denied {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 100;
            background: rgba(5, 5, 5, 0.97);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 16px;
            text-align: center;
            padding: 24px;
        }

        .access-denied.visible { display: flex; }

        .access-denied p { color: rgb(168, 162, 158); font-size: 0.9rem; }

        .access-denied a {
            color: #f97316;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
            border-bottom: 1px solid rgba(249, 115, 22, 0.3);
            transition: all 0.3s;
        }

        .access-denied a:hover { color: #fb923c; border-color: #fb923c; }

        @media (max-width: 640px) {
            .top-bar { padding: 16px 20px; }
            .back-btn span { display: none; }
            .main-content { padding: 40px 20px; }
            .main-content h1 { font-size: 1.6rem; }
            .timer-display { font-size: 2.8rem; }
            .btn-health { padding: 16px 40px; font-size: 0.9rem; }
        }
    </style>
</head>
<body>

    <div class="glow-orb"></div>

    <!-- Access Denied -->
    <div class="access-denied" id="accessDenied">
        <p>Access denied. You must be logged in.</p>
        <a href="index.html">Go to Login</a>
    </div>

    <!-- Redirect Overlay (session expired) -->
    <div class="redirect-overlay" id="redirectOverlay">
        <p>Session expired</p>
        <div class="redirect-timer" id="redirectTimer">3</div>
        <p style="font-size: 0.75rem; color: rgb(120, 113, 108);">Redirecting…</p>
    </div>

    <!-- Top Bar -->
    <div class="top-bar" id="topBar" style="display:none;">
        <div class="top-bar-left">
            <a href="admin.html" class="back-btn" id="backBtn">
                <span class="back-arrow"></span>
                <span>Back</span>
            </a>
            <div class="menu-badge" id="menuBadge">Menu</div>
        </div>
    </div>

    <!-- Main Content -->
    <div class="main-content" id="mainContent" style="display:none;">
        <h1>Select a <span>Service</span></h1>
        <a href="health.html" class="btn-health">
            <svg viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
            Health
        </a>

        <!-- Admin: unlimited badge -->
        <div class="unlimited-badge" id="unlimitedBadge">
            <svg viewBox="0 0 24 24"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
            Unlimited Access
        </div>

        <!-- Free/Pay: countdown timer -->
        <div class="timer-section" id="timerSection">
            <div class="timer-label">Session Time Remaining</div>
            <div class="timer-display" id="timerDisplay">03:00</div>
            <div class="timer-bar">
                <div class="timer-bar-fill" id="timerBarFill" style="width: 100%;"></div>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <div class="footer-text" id="footerSection" style="display:none;">
        <p>Jamal Said Kazembe Multisystem Management</p>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDpNJIZoLeZUhIoTepbLb_3rRLpseu9Zdo",
            authDomain: "my-project-66803-95cb3.firebaseapp.com",
            projectId: "my-project-66803-95cb3",
            storageBucket: "my-project-66803-95cb3.firebasestorage.app",
            messagingSenderId: "167159607898",
            appId: "1:167159607898:web:23ca11366b88868b085e63"
        };

        initializeApp(firebaseConfig);

        (function () {
            var SESSION_KEY = "free_session_start";
            var LOCK_KEY = "free_lock_start";
            var SESSION_SEC = 180;

            var topBar = document.getElementById("topBar");
            var backBtn = document.getElementById("backBtn");
            var menuBadge = document.getElementById("menuBadge");
            var mainContent = document.getElementById("mainContent");
            var footerSection = document.getElementById("footerSection");
            var unlimitedBadge = document.getElementById("unlimitedBadge");
            var timerSection = document.getElementById("timerSection");
            var timerDisplay = document.getElementById("timerDisplay");
            var timerBarFill = document.getElementById("timerBarFill");
            var accessDenied = document.getElementById("accessDenied");
            var redirectOverlay = document.getElementById("redirectOverlay");
            var redirectTimer = document.getElementById("redirectTimer");

            var isAdmin = sessionStorage.getItem("isAdmin") === "true";
            var hasSession = localStorage.getItem(SESSION_KEY);
            var hasLock = localStorage.getItem(LOCK_KEY);
            var now = Date.now();

            // ─── If locked, redirect to free.html immediately ───
            if (hasLock) {
                var lockElapsed = Math.floor((now - parseInt(hasLock, 10)) / 1000);
                if (lockElapsed < 86400) {
                    window.location.replace("free.html");
                    return;
                } else {
                    localStorage.removeItem(LOCK_KEY);
                    localStorage.removeItem(SESSION_KEY);
                    hasLock = null;
                    hasSession = null;
                }
            }

            // ─── If admin ───
            if (isAdmin) {
                topBar.style.display = "flex";
                backBtn.classList.add("visible");
                menuBadge.textContent = "Admin";
                menuBadge.classList.remove("free-mode");
                mainContent.style.display = "flex";
                footerSection.style.display = "block";
                unlimitedBadge.classList.add("visible");
                timerSection.classList.remove("visible");
                return;
            }

            // ─── If free session exists ───
            if (hasSession) {
                var sessionStart = parseInt(hasSession, 10);
                var sessionElapsed = Math.floor((now - sessionStart) / 1000);

                if (sessionElapsed < SESSION_SEC) {
                    // Active session → show menu with timer
                    topBar.style.display = "flex";
                    backBtn.classList.remove("visible");
                    menuBadge.textContent = "Free";
                    menuBadge.classList.add("free-mode");
                    mainContent.style.display = "flex";
                    footerSection.style.display = "block";
                    unlimitedBadge.classList.remove("visible");
                    timerSection.classList.add("visible");

                    startCountdown(sessionStart);
                    return;
                } else {
                    // Session expired → lock and redirect
                    localStorage.removeItem(SESSION_KEY);
                    localStorage.setItem(LOCK_KEY, String(sessionStart + SESSION_SEC * 1000));
                    window.location.replace("free.html");
                    return;
                }
            }

            // ─── No valid session ───
            accessDenied.classList.add("visible");

            // ─── Countdown logic ───
            function startCountdown(startTs) {
                var interval = setInterval(function () {
                    var elapsed = Math.floor((Date.now() - startTs) / 1000);
                    var remaining = Math.max(0, SESSION_SEC - elapsed);

                    if (remaining <= 0) {
                        clearInterval(interval);
                        timerDisplay.textContent = "00:00";
                        timerBarFill.style.width = "0%";

                        // Set lock
                        localStorage.removeItem(SESSION_KEY);
                        localStorage.setItem(LOCK_KEY, String(startTs + SESSION_SEC * 1000));

                        // Show redirect overlay with countdown
                        redirectOverlay.classList.add("visible");
                        var countdown = 3;
                        redirectTimer.textContent = countdown;

                        var redirectInterval = setInterval(function () {
                            countdown--;
                            if (countdown <= 0) {
                                clearInterval(redirectInterval);
                                window.location.replace("free.html");
                            } else {
                                redirectTimer.textContent = countdown;
                            }
                        }, 1000);
                        return;
                    }

                    var m = Math.floor(remaining / 60);
                    var s = remaining % 60;
                    timerDisplay.textContent = String(m).padStart(2, "0") + ":" + String(s).padStart(2, "0");
                    timerBarFill.style.width = ((remaining / SESSION_SEC) * 100) + "%";

                    timerDisplay.classList.remove("warning", "danger");
                    timerBarFill.classList.remove("warning", "danger");

                    if (remaining <= 10) {
                        timerDisplay.classList.add("danger");
                        timerBarFill.classList.add("danger");
                    } else if (remaining <= 30) {
                        timerDisplay.classList.add("warning");
                        timerBarFill.classList.add("warning");
                    }
                }, 1000);
            }
        })();
    </script>
</body>
</html>
