<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Main Menu</title>
    <!-- Import Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
    <!-- Import FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        /* --- 1. CSS Variables & Reset --- */
        :root {
            --primary-bg: #1a1a2e;
            --glass-bg: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.2);
            --text-color: #ffffff;
            --gradient-business: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --gradient-health: linear-gradient(135deg, #84fab0 0%, #8fd3f4 100%);
            --gradient-education: linear-gradient(135deg, #fccb90 0%, #d57eeb 100%);
            --shadow-light: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--primary-bg);
            background-image: 
                radial-gradient(circle at 10% 20%, rgb(69, 86, 102) 0%, rgb(34, 34, 34) 90%),
                radial-gradient(circle at 90% 80%, rgb(86, 69, 102) 0%, rgb(34, 34, 34) 90%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            color: var(--text-color);
        }

        /* --- 2. Back Button (Glassmorphism Style) --- */
        .back-nav {
            position: absolute;
            top: 30px;
            left: 30px;
            z-index: 10;
        }

        .btn-back {
            background: var(--glass-bg);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid var(--glass-border);
            color: white;
            padding: 12px 25px;
            border-radius: 50px;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            text-decoration: none;
        }

        .btn-back:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateX(-5px);
            box-shadow: 0 8px 15px rgba(0,0,0,0.2);
        }

        /* --- 3. Main Card Container --- */
        .menu-card {
            background: var(--glass-bg);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 3rem;
            box-shadow: var(--shadow-light);
            text-align: center;
            max-width: 900px;
            width: 90%;
            animation: fadeIn 1s ease-out;
        }

        .menu-title {
            font-size: 2.5rem;
            margin-bottom: 2.5rem;
            font-weight: 700;
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
            letter-spacing: 1px;
        }

        /* --- 4. Button Grid Layout --- */
        .button-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 2rem;
        }

        /* --- 5. Advanced Card Buttons --- */
        .card-btn {
            position: relative;
            padding: 2rem 1.5rem;
            border: none;
            border-radius: 15px;
            cursor: pointer;
            color: white;
            font-family: inherit;
            font-size: 1.2rem;
            font-weight: 500;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 15px;
            overflow: hidden;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

        .card-btn i {
            font-size: 2.5rem;
            transition: transform 0.4s ease;
        }

        /* Specific Gradients */
        .btn-business {
            background: var(--gradient-business);
        }
        .btn-health {
            background: var(--gradient-health);
            color: #333;
        }
        .btn-education {
            background: var(--gradient-education);
        }

        /* Hover Effects */
        .card-btn:hover {
            transform: translateY(-10px) scale(1.03);
            box-shadow: 0 20px 30px rgba(0,0,0,0.3);
        }

        .card-btn:hover i {
            transform: scale(1.2) rotate(5deg);
        }

        .card-btn::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 300%;
            height: 300%;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            transform: translate(-50%, -50%) scale(0);
            transition: transform 0.5s ease;
            pointer-events: none;
        }

        .card-btn:active::after {
            transform: translate(-50%, -50%) scale(1);
            transition: 0s;
        }

        /* --- 6. Animations --- */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 600px) {
            .menu-title { font-size: 1.8rem; }
            .button-grid { grid-template-columns: 1fr; }
            .back-nav { top: 20px; left: 20px; }
        }
    </style>
</head>
<body>

    <!-- Back Button -->
    <nav class="back-nav">
        <!-- Calls goBack() function below -->
        <button class="btn-back" onclick="goBack()">
            <i class="fas fa-arrow-left"></i> Back
        </button>
    </nav>

    <main class="menu-card">
        <h1 class="menu-title">Select Category</h1>
        
        <div class="button-grid">
            <button class="card-btn btn-business" onclick="redirectTo('business.html')">
                <i class="fas fa-briefcase"></i>
                <span>Business</span>
            </button>

            <button class="card-btn btn-health" onclick="redirectTo('health.html')">
                <i class="fas fa-heartbeat"></i>
                <span>Health</span>
            </button>

            <button class="card-btn btn-education" onclick="redirectTo('education.html')">
                <i class="fas fa-graduation-cap"></i>
                <span>Education</span>
            </button>
        </div>
    </main>

    <script>
        function redirectTo(page) {
            setTimeout(() => {
                window.location.href = page;
            }, 150);
        }

        // UPDATED: Redirects to admin.html
        function goBack() {
            window.location.href = 'admin.html';
        }
    </script>

</body>
</html>
