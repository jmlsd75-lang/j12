<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            height: 100vh;
            overflow: hidden;
            background: linear-gradient(180deg, #87CEEB 0%, #4682B4 30%, #1a5276 60%, #0b2e4a 100%);
        }

        /* River Water Flow CSS */
        .river {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 40%;
            overflow: hidden;
            z-index: 0;
        }

        .river-bed {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(180deg, #2980b9 0%, #1a5276 40%, #0e3d5c 70%, #1a3c34 100%);
            border-top: 3px solid #5dade2;
        }

        .water-wave {
            position: absolute;
            width: 200%;
            height: 100%;
            top: -20px;
            left: -50%;
            background: repeating-linear-gradient(
                90deg,
                transparent 0%,
                rgba(93, 173, 226, 0.3) 10%,
                transparent 20%
            );
            animation: waterFlow 4s linear infinite;
        }

        .water-wave:nth-child(2) {
            top: 10px;
            opacity: 0.5;
            animation: waterFlow 3s linear infinite;
            animation-delay: -1s;
        }

        .water-wave:nth-child(3) {
            top: 25px;
            opacity: 0.3;
            animation: waterFlow 5s linear infinite;
            animation-delay: -2s;
        }

        .water-ripple {
            position: absolute;
            width: 100%;
            height: 30px;
            top: 0;
            background: 
                radial-gradient(ellipse 80px 15px at 20% 50%, rgba(255,255,255,0.4) 0%, transparent 70%),
                radial-gradient(ellipse 60px 12px at 50% 50%, rgba(255,255,255,0.3) 0%, transparent 70%),
                radial-gradient(ellipse 90px 18px at 80% 50%, rgba(255,255,255,0.35) 0%, transparent 70%);
            animation: rippleMove 6s ease-in-out infinite;
        }

        .water-ripple:nth-child(5) {
            top: 40px;
            opacity: 0.6;
            animation: rippleMove 8s ease-in-out infinite reverse;
        }

        @keyframes waterFlow {
            0% { transform: translateX(0); }
            100% { transform: translateX(50%); }
        }

        @keyframes rippleMove {
            0%, 100% { transform: translateX(-20px); }
            50% { transform: translateX(20px); }
        }

        /* Floating particles in water */
        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: rgba(255, 255, 255, 0.5);
            border-radius: 50%;
            animation: floatParticle linear infinite;
        }

        @keyframes floatParticle {
            0% { transform: translateX(-100px) translateY(0); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateX(calc(100vw + 100px)) translateY(-20px); opacity: 0; }
        }

        /* Content Container */
        .content {
            position: relative;
            z-index: 1;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .title {
            color: white;
            font-size: 2.5rem;
            margin-bottom: 40px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        /* Buttons Container */
        .buttons-container {
            display: flex;
            gap: 30px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .category-btn {
            padding: 20px 50px;
            font-size: 1.2rem;
            font-weight: bold;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 2px;
            position: relative;
            overflow: hidden;
        }

        .category-btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            background: rgba(255,255,255,0.2);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        .category-btn:hover::before {
            width: 300px;
            height: 300px;
        }

        .health-btn {
            background: linear-gradient(135deg, #e74c3c, #c0392b);
            color: white;
            box-shadow: 0 8px 25px rgba(231, 76, 60, 0.4);
        }

        .health-btn:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 35px rgba(231, 76, 60, 0.6);
        }

        .business-btn {
            background: linear-gradient(135deg, #f39c12, #e67e22);
            color: white;
            box-shadow: 0 8px 25px rgba(243, 156, 18, 0.4);
        }

        .business-btn:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 35px rgba(243, 156, 18, 0.6);
        }

        .education-btn {
            background: linear-gradient(135deg, #27ae60, #229954);
            color: white;
            box-shadow: 0 8px 25px rgba(39, 174, 96, 0.4);
        }

        .education-btn:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 35px rgba(39, 174, 96, 0.6);
        }

        /* Navigation Menu (Right Side) */
        .nav-menu {
            position: fixed;
            right: 0;
            top: 0;
            height: 100vh;
            z-index: 100;
        }

        .hamburger {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            width: 60px;
            height: 60px;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            cursor: pointer;
            transition: all 0.3s ease;
            border-radius: 10px;
            margin: 20px;
            gap: 5px;
        }

        .hamburger:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        .hamburger span {
            display: block;
            width: 25px;
            height: 3px;
            background: white;
            border-radius: 3px;
            transition: all 0.3s ease;
        }

        .hamburger.active span:nth-child(1) {
            transform: rotate(45deg) translate(6px, 6px);
        }

        .hamburger.active span:nth-child(2) {
            opacity: 0;
        }

        .hamburger.active span:nth-child(3) {
            transform: rotate(-45deg) translate(6px, -6px);
        }

        /* File List Dropdown */
        .file-list {
            position: absolute;
            right: 70px;
            top: 20px;
            width: 250px;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            padding: 15px 0;
            transform: translateX(20px);
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
        }

        .file-list.active {
            transform: translateX(0);
            opacity: 1;
            visibility: visible;
        }

        .file-list h3 {
            padding: 10px 20px;
            color: #333;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 1px solid #eee;
        }

        .file-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 20px;
            color: #555;
            text-decoration: none;
            transition: all 0.2s ease;
            cursor: pointer;
        }

        .file-item:hover {
            background: #f0f0f0;
            color: #333;
            padding-left: 25px;
        }

        .file-item .icon {
            width: 20px;
            height: 20px;
            background: #3498db;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            color: white;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .title {
                font-size: 1.8rem;
            }

            .buttons-container {
                flex-direction: column;
                gap: 15px;
            }

            .category-btn {
                padding: 15px 40px;
                font-size: 1rem;
            }

            .file-list {
                right: 60px;
                width: 200px;
            }
        }
    </style>
</head>
<body>

    <!-- River Water Flow -->
    <div class="river">
        <div class="river-bed"></div>
        <div class="water-wave"></div>
        <div class="water-wave"></div>
        <div class="water-wave"></div>
        <div class="water-ripple"></div>
        <div class="water-ripple"></div>
    </div>

    <!-- Main Content -->
    <div class="content">
        <h1 class="title">Welcome to Menu</h1>
        <div class="buttons-container">
            <button class="category-btn health-btn" onclick="window.location.href='health.html'">
                ❤️ Health
            </button>
            <button class="category-btn business-btn" onclick="window.location.href='business.html'">
                💼 Business
            </button>
            <button class="category-btn education-btn" onclick="window.location.href='education.html'">
                📚 Education
            </button>
        </div>
    </div>

    <!-- Navigation Menu -->
    <div class="nav-menu">
        <div class="hamburger" onclick="toggleMenu()">
            <span></span>
            <span></span>
            <span></span>
        </div>
        <div class="file-list" id="fileList">
            <h3>Files</h3>
            <a class="file-item" onclick="window.location.href='file.html'">
                <span class="icon">📄</span>
                <span>Document 1</span>
            </a>
            <a class="file-item" onclick="window.location.href='file.html'">
                <span class="icon">📄</span>
                <span>Document 2</span>
            </a>
            <a class="file-item" onclick="window.location.href='file.html'">
                <span class="icon">📄</span>
                <span>Document 3</span>
            </a>
            <a class="file-item" onclick="window.location.href='file.html'">
                <span class="icon">📄</span>
                <span>Document 4</span>
            </a>
        </div>
    </div>

    <script>
        // Toggle hamburger menu
        function toggleMenu() {
            const hamburger = document.querySelector('.hamburger');
            const fileList = document.getElementById('fileList');
            hamburger.classList.toggle('active');
            fileList.classList.toggle('active');
        }

        // Create floating particles in water
        function createParticles() {
            const river = document.querySelector('.river');
            for (let i = 0; i < 15; i++) {
                const particle = document.createElement('div');
                particle.classList.add('particle');
                particle.style.top = Math.random() * 100 + '%';
                particle.style.animationDuration = (Math.random() * 5 + 5) + 's';
                particle.style.animationDelay = (Math.random() * 5) + 's';
                particle.style.width = (Math.random() * 4 + 2) + 'px';
                particle.style.height = particle.style.width;
                river.appendChild(particle);
            }
        }

        createParticles();

        // Close menu when clicking outside
        document.addEventListener('click', function(e) {
            const navMenu = document.querySelector('.nav-menu');
            const hamburger = document.querySelector('.hamburger');
            const fileList = document.getElementById('fileList');
            
            if (!navMenu.contains(e.target)) {
                hamburger.classList.remove('active');
                fileList.classList.remove('active');
            }
        });
    </script>
</body>
</html>
