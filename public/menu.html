<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Main Menu</title>
    <!-- Import Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
    <!-- Import FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        /* --- 1. CSS Variables & Reset --- */
        :root {
            --primary-bg: #1a1a2e;
            --glass-bg: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.2);
            --text-color: #ffffff;
            --gradient-business: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --gradient-health: linear-gradient(135deg, #84fab0 0%, #8fd3f4 100%);
            --gradient-education: linear-gradient(135deg, #fccb90 0%, #d57eeb 100%);
            --shadow-light: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
            --danger-color: #ff4b5c;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--primary-bg);
            background-image: 
                radial-gradient(circle at 10% 20%, rgb(69, 86, 102) 0%, rgb(34, 34, 34) 90%),
                radial-gradient(circle at 90% 80%, rgb(86, 69, 102) 0%, rgb(34, 34, 34) 90%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            color: var(--text-color);
        }

        /* --- 2. Back Button (Glassmorphism Style) --- */
        .back-nav {
            position: absolute;
            top: 30px;
            left: 30px;
            z-index: 10;
            opacity: 0;
            visibility: hidden;
            pointer-events: none; 
            transition: opacity 0.5s ease, visibility 0.5s;
        }

        .back-nav.visible {
            opacity: 1;
            visibility: visible;
            pointer-events: auto;
        }

        .btn-nav {
            background: var(--glass-bg);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid var(--glass-border);
            color: white;
            padding: 12px 25px;
            border-radius: 50px;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            text-decoration: none;
            border: none;
            outline: none;
        }

        .btn-nav:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
            box-shadow: 0 8px 15px rgba(0,0,0,0.2);
        }

        /* --- NEW: Logout Button (Top Right) --- */
        .logout-nav {
            position: absolute;
            top: 30px;
            right: 30px;
            z-index: 10;
        }

        .btn-logout {
            /* Inherits .btn-nav styles but we can add specific hover color */
            border: 1px solid rgba(255, 75, 92, 0.5);
        }
        
        .btn-logout:hover {
            background: var(--danger-color);
            border-color: var(--danger-color);
            box-shadow: 0 8px 15px rgba(255, 75, 92, 0.4);
        }

        /* --- 3. Main Card Container --- */
        .menu-card {
            background: var(--glass-bg);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 3rem;
            box-shadow: var(--shadow-light);
            text-align: center;
            max-width: 900px;
            width: 90%;
            animation: fadeIn 1s ease-out;
        }

        .menu-title {
            font-size: 2.5rem;
            margin-bottom: 2.5rem;
            font-weight: 700;
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
            letter-spacing: 1px;
        }

        /* --- 4. Button Grid Layout --- */
        .button-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 2rem;
        }

        /* --- 5. Advanced Card Buttons --- */
        .card-btn {
            position: relative;
            padding: 2rem 1.5rem;
            border: none;
            border-radius: 15px;
            cursor: pointer;
            color: white;
            font-family: inherit;
            font-size: 1.2rem;
            font-weight: 500;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 15px;
            overflow: hidden;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

        .card-btn i {
            font-size: 2.5rem;
            transition: transform 0.4s ease;
        }

        /* Specific Gradients */
        .btn-business { background: var(--gradient-business); }
        .btn-health { background: var(--gradient-health); color: #333; }
        .btn-education { background: var(--gradient-education); }

        /* Hover Effects */
        .card-btn:hover {
            transform: translateY(-10px) scale(1.03);
            box-shadow: 0 20px 30px rgba(0,0,0,0.3);
        }

        .card-btn:hover i {
            transform: scale(1.2) rotate(5deg);
        }

        .card-btn::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 300%;
            height: 300%;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            transform: translate(-50%, -50%) scale(0);
            transition: transform 0.5s ease;
            pointer-events: none;
        }

        .card-btn:active::after {
            transform: translate(-50%, -50%) scale(1);
            transition: 0s;
        }

        /* --- 6. Animations --- */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 600px) {
            .menu-title { font-size: 1.8rem; }
            .button-grid { grid-template-columns: 1fr; }
            .back-nav { top: 20px; left: 20px; }
            .logout-nav { top: 20px; right: 20px; }
            .btn-nav { padding: 10px 20px; font-size: 0.9rem; }
        }
    </style>
</head>
<body>

    <!-- Back Button (Top Left, Admin Only) -->
    <nav class="back-nav" id="adminBackNav">
        <button class="btn-nav" onclick="goBack()">
            <i class="fas fa-arrow-left"></i> Back
        </button>
    </nav>

    <!-- Logout Button (Top Right, Visible for everyone logged in) -->
    <nav class="logout-nav">
        <button class="btn-nav btn-logout" onclick="handleLogout()">
            <i class="fas fa-sign-out-alt"></i> Logout
        </button>
    </nav>

    <main class="menu-card">
        <h1 class="menu-title">Select Category</h1>
        
        <div class="button-grid">
            <button class="card-btn btn-business" onclick="redirectTo('business.html')">
                <i class="fas fa-briefcase"></i>
                <span>Business</span>
            </button>

            <button class="card-btn btn-health" onclick="redirectTo('health.html')">
                <i class="fas fa-heartbeat"></i>
                <span>Health</span>
            </button>

            <button class="card-btn btn-education" onclick="redirectTo('education.html')">
                <i class="fas fa-graduation-cap"></i>
                <span>Education</span>
            </button>
        </div>
    </main>

    <!-- ========================================
         FIREBASE & LOGIC
         ======================================== -->
    <script type="module">
        // Import Firebase
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

        // 1. FIREBASE CONFIGURATION
        const firebaseConfig = {
            apiKey: "AIzaSyDpNJIZoLeZUhIoTepbLb_3rRLpseu9Zdo",
            authDomain: "my-project-66803-95cb3.firebaseapp.com",
            projectId: "my-project-66803-95cb3",
            storageBucket: "my-project-66803-95cb3.firebasestorage.app",
            messagingSenderId: "167159607898",
            appId: "1:167159607898:web:23ca11366b88868b085e63"
        };

        const ADMIN_EMAIL = "jmlsd75@gmail.com";

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // 2. CHECK AUTH STATE & UPDATE UI
        onAuthStateChanged(auth, (user) => {
            const backNav = document.getElementById("adminBackNav");

            if (user) {
                console.log("User logged in:", user.email);

                // Check if Admin
                if (user.email.toLowerCase() === ADMIN_EMAIL.toLowerCase()) {
                    console.log("Admin verified. Showing back button.");
                    backNav.classList.add("visible");
                } else {
                    backNav.classList.remove("visible");
                }
            } else {
                console.log("No active session.");
                // Optional: Redirect to login if nobody is logged in?
                // Based on previous request, we assume they arrive logged in, 
                // but if logged out, we might want to go to index.html
                // window.location.href = 'index.html'; 
            }
        });

        // 3. LOGOUT FUNCTION
        // Attach to window so HTML onclick can find it
        window.handleLogout = async function() {
            if(confirm("Are you sure you want to log out?")) {
                try {
                    await signOut(auth);
                    console.log("User signed out.");
                    // Redirect to login/home page after logout
                    window.location.href = 'index.html'; 
                } catch (error) {
                    console.error("Sign out error", error);
                    alert("Error signing out: " + error.message);
                }
            }
        };

        // 4. GLOBAL NAVIGATION FUNCTIONS
        window.redirectTo = function(page) {
            setTimeout(() => {
                window.location.href = page;
            }, 150);
        };

        window.goBack = function() {
            window.location.href = 'admin.html';
        };
    </script>

</body>
</html>
