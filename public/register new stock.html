<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Register New Product</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        /* --- Base Styles --- */
        :root {
            --primary: #4F46E5;
            --primary-hover: #4338CA;
            --success: #10B981;
            --bg-body: #F3F4F6;
            --bg-card: #FFFFFF;
            --text-main: #1F2937;
            --text-muted: #6B7280;
            --border: #E5E7EB;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            --radius: 16px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-body);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .card {
            background: var(--bg-card);
            width: 100%;
            max-width: 480px;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 24px;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            animation: slideUp 0.3s ease-out;
        }

        h1 { font-size: 1.5rem; font-weight: 700; margin-bottom: 0.5rem; color: var(--text-main); }
        p.subtitle { color: var(--text-muted); font-size: 0.9rem; margin-bottom: 1.5rem; }

        #stepsContainer {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 20px;
        }

        /* Completed Step Buttons */
        .step-btn {
            background: #F9FAFB;
            border: 1px solid var(--border);
            color: var(--text-main);
            padding: 12px 16px;
            border-radius: 12px;
            width: 100%;
            text-align: left;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.2s;
        }
        .step-btn:hover { border-color: var(--primary); background: #EEF2FF; transform: translateY(-1px); }
        
        .step-btn .content { display: flex; flex-direction: column; overflow: hidden; }
        .step-btn .label { font-size: 0.7rem; color: var(--text-muted); text-transform: uppercase; font-weight: 600; letter-spacing: 0.5px; }
        .step-btn .value { font-weight: 600; color: var(--primary); font-size: 1rem; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        
        .edit-icon { opacity: 0.3; width: 16px; height: 16px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
        .step-btn:hover .edit-icon { opacity: 1; color: var(--primary); }

        /* Active Input Area */
        .input-area {
            width: 100%;
            text-align: left;
            padding: 16px;
            background: #fff;
            border: 2px solid transparent;
            border-radius: 12px;
            transition: all 0.3s;
        }
        .input-area.active {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.1);
        }

        .input-area label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--primary);
        }

        .input-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border);
            border-radius: 10px;
            font-size: 1.1rem;
            outline: none;
            font-family: inherit;
            -moz-appearance: textfield;
        }
        .input-group input:focus { border-color: var(--primary); }

        .helper-text {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-top: 8px;
            text-align: right;
            font-weight: 500;
        }

        /* Action Button */
        .btn-primary {
            width: 100%;
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            transition: background 0.2s;
            box-shadow: 0 2px 4px rgba(79, 70, 229, 0.3);
        }
        .btn-primary:hover { background-color: var(--primary-hover); }
        .btn-primary:disabled { background-color: #C7D2FE; cursor: not-allowed; box-shadow: none; }

        .btn-secondary {
            background: transparent;
            color: var(--text-muted);
            border: none;
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 500;
        }
        .btn-secondary:hover { color: var(--danger); text-decoration: underline; }

        /* Toast */
        #toast {
            visibility: hidden; min-width: 280px; background-color: #1F2937; color: #fff;
            text-align: center; border-radius: 12px; padding: 16px; position: fixed;
            z-index: 1000; left: 50%; bottom: 40px; transform: translateX(-50%) translateY(20px);
            font-size: 0.95rem; opacity: 0; transition: all 0.3s;
        }
        #toast.show { visibility: visible; opacity: 1; transform: translateX(-50%) translateY(0); }

        @keyframes slideUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .fade-in { animation: fadeIn 0.3s ease-in; }
    </style>
</head>
<body>

    <div class="card">
        <h1>New Product</h1>
        <p class="subtitle">Type details and press Enter ↵</p>

        <div id="stepsContainer">
            <!-- Dynamic Content will appear here -->
        </div>

        <button id="btnBack" class="btn-secondary">Cancel</button>
    </div>

    <div id="toast"></div>

    <!-- FIREBASE & LOGIC -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getFirestore, collection, doc, setDoc, updateDoc, increment } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
        import { getAuth } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

        // --- CONFIGURATION ---
        const firebaseConfig = {
            apiKey: "AIzaSyDpNJIZoLeZUhIoTepbLb_3rRLpseu9Zdo",
            authDomain: "my-project-66803-95cb3.firebaseapp.com",
            projectId: "my-project-66803-95cb3",
            storageBucket: "my-project-66803-95cb3.firebasestorage.app",
            messagingSenderId: "167159607898",
            appId: "1:167159607898:web:23ca11366b88868b085e63"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        // --- FORM FIELDS CONFIGURATION ---
        // This defines all required fields to be saved
        const FIELDS = [
            { key: 'productName', label: 'Product Name', type: 'text', placeholder: 'e.g. Wireless Mouse' },
            { key: 'buyingPrice', label: 'Buying Price', type: 'number', placeholder: '0.00', step: '0.01' },
            { key: 'sellingPrice', label: 'Selling Price', type: 'number', placeholder: '0.00', step: '0.01' },
            { key: 'stock', label: 'Units Present', type: 'number', placeholder: '0' }
        ];

        // --- STATE MANAGEMENT ---
        let currentStep = 0; 
        
        // Initialize state with empty strings for all fields
        let formData = {
            productName: '',
            buyingPrice: '',
            sellingPrice: '',
            stock: ''
        };
        
        let isSaving = false;

        // --- DOM ELEMENTS ---
        const container = document.getElementById('stepsContainer');
        const btnBack = document.getElementById('btnBack');
        const toast = document.getElementById('toast');

        // --- RENDER LOGIC ---
        function render() {
            container.innerHTML = ''; 

            // 1. Render Completed Steps (as Editable Buttons)
            for (let i = 0; i < currentStep; i++) {
                const field = FIELDS[i];
                const value = formData[field.key];
                
                const btn = document.createElement('div');
                btn.className = 'step-btn fade-in';
                btn.onclick = () => editStep(i); 
                
                let displayValue = value;
                if(field.type === 'number' && value !== '') {
                    // Format numbers nicely
                    displayValue = parseFloat(value).toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 });
                }

                btn.innerHTML = `
                    <div class="content">
                        <span class="label">${field.label}</span>
                        <span class="value">${displayValue}</span>
                    </div>
                    <svg class="edit-icon" viewBox="0 0 24 24">
                        <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
                        <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path>
                    </svg>
                `;
                container.appendChild(btn);
            }

            // 2. Render Active Step (Input) or Summary
            if (currentStep < FIELDS.length) {
                const field = FIELDS[currentStep];
                
                const inputArea = document.createElement('div');
                inputArea.className = 'input-area active fade-in';
                
                const label = document.createElement('label');
                label.textContent = `Enter ${field.label}`;
                label.setAttribute('for', `input-${field.key}`);
                
                const inputGroup = document.createElement('div');
                inputGroup.className = 'input-group';

                const input = document.createElement('input');
                input.id = `input-${field.key}`;
                input.type = field.type;
                input.placeholder = field.placeholder;
                input.value = formData[field.key]; // Pre-fill if editing
                if(field.step) input.step = field.step;
                
                // Auto focus logic
                setTimeout(() => input.focus(), 50);

                const helper = document.createElement('div');
                helper.className = 'helper-text';
                helper.textContent = 'Press Enter ↵ to continue';

                // Handle Enter Key
                input.addEventListener('keydown', (e) => {
                    if (e.key === 'Enter') handleNext(input);
                });
                
                inputGroup.appendChild(input);
                inputGroup.appendChild(helper);
                inputArea.appendChild(label);
                inputArea.appendChild(inputGroup);
                container.appendChild(inputArea);

            } else {
                // ALL STEPS DONE - SHOW SAVE BUTTON
                const saveArea = document.createElement('div');
                saveArea.className = 'fade-in';
                saveArea.style.width = '100%';
                
                const saveBtn = document.createElement('button');
                saveBtn.className = 'btn-primary';
                saveBtn.innerHTML = `SAVE PRODUCT <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path><polyline points="17 21 17 13 7 13 7 21"></polyline><polyline points="7 3 7 8 15 8"></polyline></svg>`;
                
                saveBtn.addEventListener('click', saveToFirestore);
                
                saveArea.appendChild(saveBtn);
                container.appendChild(saveArea);
            }
        }

        // --- INTERACTION LOGIC ---

        function handleNext(inputElement) {
            const field = FIELDS[currentStep];
            const val = inputElement.value.trim();

            // Validation
            if (!val) {
                showToast(`Please enter a valid ${field.label}.`);
                inputElement.focus();
                return;
            }

            if (field.type === 'number' && (isNaN(val) || parseFloat(val) < 0)) {
                showToast(`${field.label} must be a positive number.`);
                return;
            }

            // Update State
            formData[field.key] = val;
            
            // Move to next step
            currentStep++;
            render();
        }

        function editStep(index) {
            currentStep = index;
            render();
        }

        function showToast(msg) {
            toast.textContent = msg; 
            toast.className = 'show';
            setTimeout(() => toast.className = toast.className.replace('show', ''), 3000);
        }

        // --- FIREBASE SAVE LOGIC ---

        async function saveToFirestore() {
            if (isSaving) return;
            isSaving = true;

            const user = auth.currentUser;
            
            if (!user) {
                showToast("Error: User not authenticated.");
                isSaving = false;
                return;
            }

            const userEmail = user.email;
            const now = new Date();
            const timestamp = Date.now();
            
            try {
                // 1. Prepare the Product Data Object
                // We ensure all fields required are mapped correctly here
                const productDocData = {
                    name: formData.productName,          // Saving Name
                    buyingPrice: Number(formData.buyingPrice),  // Saving Buying Price
                    sellingPrice: Number(formData.sellingPrice),// Saving Selling Price
                    stock: parseInt(formData.stock),    // Saving Stock Units
                    createdAt: timestamp,
                    dateString: now.toLocaleString()
                };

                // 2. Prepare Data for Product Names Collection (for dropdowns/search)
                const nameDocData = {
                    name: formData.productName,
                    createdAt: timestamp
                };

                // 3. Define Firestore References
                const productCollection = collection(db, "users", userEmail, "products");
                const productRef = doc(productCollection); // Auto-generate ID

                const namesCollection = collection(db, "users", userEmail, "productnames");
                const nameRef = doc(namesCollection); // Auto-generate ID

                const userRef = doc(db, "users", userEmail);

                // 4. Execute Writes (Main Product + Name Index + Stats Update)
                const promises = [];
                
                promises.push(setDoc(productRef, productDocData)); // Save Full Product
                promises.push(setDoc(nameRef, nameDocData));        // Save Name Index
                promises.push(updateDoc(userRef, { spaceUsed: increment(1) })); // Update Usage Stats

                await Promise.all(promises);

                console.log("Product successfully saved to Firestore");
                showToast("Product saved successfully!");
                
                // Update UI Button State
                const saveBtn = document.querySelector('.btn-primary');
                if(saveBtn) {
                    saveBtn.disabled = true;
                    saveBtn.textContent = "Saved!";
                    saveBtn.style.backgroundColor = "var(--success)";
                }

                // Redirect to Stock Page
                setTimeout(() => {
                    window.location.href = 'stock.html';
                }, 1500);

            } catch (error) {
                console.error("Firestore Save Error:", error);
                showToast("Error saving product: " + error.message);
                isSaving = false;
                
                // Reset UI Button State on Error
                const saveBtn = document.querySelector('.btn-primary');
                if(saveBtn) {
                    saveBtn.disabled = false;
                    saveBtn.innerHTML = `SAVE PRODUCT <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path><polyline points="17 21 17 13 7 13 7 21"></polyline><polyline points="7 3 7 8 15 8"></polyline></svg>`;
                }
            }
        }

        // --- INITIALIZATION ---

        btnBack.addEventListener('click', () => {
            if(confirm("Are you sure you want to cancel? Data will be lost.")) {
                window.location.href = 'stock.html';
            }
        });

        // Start the app
        render();

    </script>
</body>
</html>
