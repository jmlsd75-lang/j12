<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard — JAMALI SAID KAZEMBE</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@200;400;700&family=Source+Sans+3:wght@300;400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            kili:{ night:'#050810', deep:'#0a1025', sky:'#122040', ridge:'#1e3050', rock:'#2a2e36', stone:'#3a3e48', ice:'#c8daf0', snow:'#e8eef8', frost:'#f0f4fa', mist:'#8899aa', dawn:'#e8a860', lava:'#1a1c22' },
            cream:'#f0ece4',
          },
          fontFamily: { display:['Oswald','sans-serif'], body:['Source Sans 3','sans-serif'] },
        },
      },
    };
  </script>
  <style>
    /* ===== SKY: deep night → dawn at horizon ===== */
    body {
      background: linear-gradient(
        to bottom,
        #050810 0%,
        #080e1e 12%,
        #0e1a38 25%,
        #152545 38%,
        #1e3050 48%,
        #2d3848 56%,
        #4a3d30 66%,
        #7a5830 76%,
        #b07838 84%,
        #d09548 90%,
        #e8a860 95%,
        #f0b868 100%
      );
    }

    /* ===== STARS — upper sky only ===== */
    .stars {
      position: absolute; inset: 0;
      background-image:
        radial-gradient(1px 1px at 5% 3%, rgba(255,255,255,.8), transparent),
        radial-gradient(1.2px 1.2px at 12% 7%, rgba(255,255,255,.6), transparent),
        radial-gradient(1px 1px at 8% 11%, rgba(255,255,255,.5), transparent),
        radial-gradient(1.5px 1.5px at 20% 4%, rgba(255,255,255,.7), transparent),
        radial-gradient(1px 1px at 18% 14%, rgba(255,255,255,.4), transparent),
        radial-gradient(1px 1px at 27% 6%, rgba(255,255,255,.6), transparent),
        radial-gradient(1.3px 1.3px at 32% 2%, rgba(255,255,255,.8), transparent),
        radial-gradient(1px 1px at 30% 10%, rgba(255,255,255,.4), transparent),
        radial-gradient(1px 1px at 38% 8%, rgba(255,255,255,.5), transparent),
        radial-gradient(1.2px 1.2px at 42% 3%, rgba(255,255,255,.7), transparent),
        radial-gradient(1px 1px at 45% 12%, rgba(255,255,255,.3), transparent),
        radial-gradient(1px 1px at 50% 5%, rgba(255,255,255,.6), transparent),
        radial-gradient(1.4px 1.4px at 55% 1%, rgba(255,255,255,.9), transparent),
        radial-gradient(1px 1px at 58% 9%, rgba(255,255,255,.4), transparent),
        radial-gradient(1px 1px at 63% 6%, rgba(255,255,255,.5), transparent),
        radial-gradient(1.2px 1.2px at 68% 11%, rgba(255,255,255,.6), transparent),
        radial-gradient(1px 1px at 72% 3%, rgba(255,255,255,.7), transparent),
        radial-gradient(1px 1px at 75% 8%, rgba(255,255,255,.4), transparent),
        radial-gradient(1.3px 1.3px at 80% 5%, rgba(255,255,255,.8), transparent),
        radial-gradient(1px 1px at 85% 10%, rgba(255,255,255,.3), transparent),
        radial-gradient(1px 1px at 90% 2%, rgba(255,255,255,.7), transparent),
        radial-gradient(1.2px 1.2px at 93% 7%, rgba(255,255,255,.5), transparent),
        radial-gradient(1px 1px at 97% 4%, rgba(255,255,255,.6), transparent),
        radial-gradient(1px 1px at 3% 16%, rgba(255,255,255,.3), transparent),
        radial-gradient(1px 1px at 15% 18%, rgba(255,255,255,.2), transparent),
        radial-gradient(1.2px 1.2px at 35% 15%, rgba(255,255,255,.4), transparent),
        radial-gradient(1px 1px at 52% 17%, rgba(255,255,255,.2), transparent),
        radial-gradient(1px 1px at 70% 16%, rgba(255,255,255,.3), transparent),
        radial-gradient(1px 1px at 88% 14%, rgba(255,255,255,.2), transparent),
        radial-gradient(1.5px 1.5px at 25% 1%, rgba(255,255,255,.9), transparent),
        radial-gradient(1px 1px at 60% 14%, rgba(255,255,255,.2), transparent),
        radial-gradient(1px 1px at 78% 1%, rgba(255,255,255,.7), transparent);
    }

    /* ===== DAWN GLOW behind mountain ===== */
    .dawn-glow {
      position: absolute;
      bottom: 18%; left: 50%;
      transform: translateX(-50%);
      width: 130%; height: 55%;
      background: radial-gradient(ellipse at 50% 85%, rgba(232,168,96,.22) 0%, rgba(200,120,50,.08) 40%, transparent 65%);
    }

    /* ===== DISTANT RANGE — atmospheric perspective ===== */
    .distant-range {
      position: absolute; bottom: 0;
      width: 100%; height: 58%;
      background: linear-gradient(to top, #141828, #1a2035);
      clip-path: polygon(
        0% 100%, 0% 72%, 4% 68%, 8% 62%, 12% 65%, 16% 58%,
        22% 52%, 26% 55%, 30% 48%, 36% 44%, 40% 46%, 44% 42%,
        48% 38%, 52% 40%, 56% 44%, 60% 48%, 64% 45%, 68% 50%,
        72% 54%, 76% 50%, 80% 56%, 84% 60%, 88% 56%, 92% 62%,
        96% 66%, 100% 70%, 100% 100%
      );
      opacity: 0.35;
    }

    /* ===== MAIN KIBO — flat-topped stratovolcano ===== */
    .kibo {
      position: absolute; bottom: 0;
      width: 100%; height: 80%;
      background: linear-gradient(to top, #12141a 0%, #1a1c24 15%, #22252e 30%, #2a2e38 45%, #30343e 60%, #363a44 75%, #3c404a 90%, #404450 100%);
      clip-path: polygon(
        0% 0%,
        3% 3%,
        8% 7%,
        14% 14%,
        20% 22%,
        26% 32%,
        31% 42%,
        35% 50%,
        38% 57%,
        41% 64%,
        43% 70%,
        45% 76%,
        47% 82%,
        48% 86%,
        49% 89%,
        50% 91%,
        51% 89%,
        52% 86%,
        53% 82%,
        55% 76%,
        57% 69%,
        60% 62%,
        63% 54%,
        67% 44%,
        72% 34%,
        78% 26%,
        84% 19%,
        89% 13%,
        94% 8%,
        100% 4%,
        100% 0%
      );
    }

    /* ===== ROCK TEXTURE on Kibo ===== */
    .kibo-texture {
      position: absolute; bottom: 0;
      width: 100%; height: 80%;
      background:
        linear-gradient(110deg, transparent 40%, rgba(0,0,0,.06) 40.5%, transparent 41%),
        linear-gradient(150deg, transparent 55%, rgba(0,0,0,.04) 55.5%, transparent 56%),
        linear-gradient(80deg, transparent 30%, rgba(0,0,0,.05) 30.5%, transparent 31%),
        linear-gradient(130deg, transparent 65%, rgba(255,255,255,.02) 65.5%, transparent 66%);
      clip-path: polygon(
        0% 0%, 3% 3%, 8% 7%, 14% 14%, 20% 22%, 26% 32%, 31% 42%,
        35% 50%, 38% 57%, 41% 64%, 43% 70%, 45% 76%, 47% 82%,
        48% 86%, 49% 89%, 50% 91%, 51% 89%, 52% 86%, 53% 82%,
        55% 76%, 57% 69%, 60% 62%, 63% 54%, 67% 44%, 72% 34%,
        78% 26%, 84% 19%, 89% 13%, 94% 8%, 100% 4%, 100% 0%
      );
    }

    /* ===== SNOW GLOW — warm backlight on ice ===== */
    .snow-glow {
      position: absolute; bottom: 0;
      width: 100%; height: 80%;
      background: radial-gradient(ellipse 18% 12% at 50% 89%, rgba(255,210,160,.12) 0%, transparent 100%);
    }

    /* ===== SNOW CAP — jagged glacier edges ===== */
    .snow-cap {
      position: absolute; bottom: 0;
      width: 100%; height: 80%;
      background: linear-gradient(to top, transparent 0%, rgba(180,200,225,.15) 55%, rgba(200,215,238,.5) 70%, rgba(220,232,248,.8) 85%, #e0e8f4 95%, #eef2fa 100%);
      clip-path: polygon(
        34% 72%,
        35% 70%,
        36% 72%,
        37% 69%,
        38% 71%,
        39% 68%,
        40% 71%,
        41% 74%,
        42% 72%,
        43% 75%,
        44% 77%,
        45% 75%,
        46% 79%,
        47% 82%,
        48% 80%,
        49% 84%,
        50% 91%,
        51% 84%,
        52% 80%,
        53% 82%,
        54% 79%,
        55% 75%,
        56% 77%,
        57% 74%,
        58% 76%,
        59% 73%,
        60% 75%,
        61% 72%,
        62% 74%,
        63% 71%,
        64% 73%,
        65% 70%,
        64% 68%,
        63% 69%,
        61% 67%,
        59% 68%,
        57% 66%,
        55% 68%,
        53% 66%,
        51% 67%,
        49% 66%,
        47% 67%,
        45% 66%,
        43% 68%,
        41% 66%,
        39% 67%,
        37% 66%,
        35% 68%,
        34% 66%
      );
    }

    /* ===== MIST near snow line ===== */
    .mist-band {
      position: absolute;
      bottom: 28%; width: 100%; height: 14%;
      background: linear-gradient(to bottom, transparent 0%, rgba(140,160,185,.04) 30%, rgba(140,160,185,.06) 50%, rgba(140,160,185,.03) 70%, transparent 100%);
    }
    .mist-drift {
      position: absolute;
      bottom: 32%; width: 200%; height: 40px;
      background: linear-gradient(90deg, transparent, rgba(160,180,200,.04), transparent);
      animation: mistMove 25s linear infinite;
    }
    @keyframes mistMove { 0%{transform:translateX(-50%)} 100%{transform:translateX(0%)} }

    /* ===== FOREGROUND savannah ===== */
    .foreground {
      position: absolute; bottom: 0;
      width: 100%; height: 10%;
      background: linear-gradient(to bottom, transparent 0%, #0a0c12 40%, #060810 100%);
    }

    /* ===== UI HELPERS ===== */
    @keyframes pulseGlow{0%,100%{box-shadow:0 0 15px rgba(125,211,252,.08),inset 0 0 15px rgba(125,211,252,.02)}50%{box-shadow:0 0 45px rgba(125,211,252,.2),0 0 90px rgba(125,211,252,.05),inset 0 0 30px rgba(125,211,252,.04)}}
    @keyframes spin{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}
    @keyframes toastIn{from{opacity:0;transform:translateY(-20px) scale(.95)}to{opacity:1;transform:translateY(0) scale(1)}}
    @keyframes toastOut{from{opacity:1;transform:translateY(0)}to{opacity:0;transform:translateY(-20px)}}
    @keyframes revealUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
    .pulse-glow{animation:pulseGlow 3s ease-in-out infinite}
    .glow-btn{position:relative;overflow:hidden}
    .glow-btn::before{content:'';position:absolute;inset:0;background:linear-gradient(120deg,transparent 30%,rgba(255,255,255,.12) 50%,transparent 70%);transform:translateX(-100%);transition:transform .5s ease}
    .glow-btn:hover::before{transform:translateX(100%)}
    .toast-in{animation:toastIn .4s ease-out both}
    .toast-out{animation:toastOut .3s ease-in both}
    .reveal{animation:revealUp .6s ease-out both}
    .d1{animation-delay:.2s}.d2{animation-delay:.4s}
    @media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:.01ms!important;animation-iteration-count:1!important;transition-duration:.01ms!important}}
  </style>
</head>
<body class="text-cream font-body h-screen overflow-hidden">

  <!-- ===== MOUNT KILIMANJARO CSS PAINTING ===== -->
  <div class="fixed inset-0 z-0" aria-hidden="true">
    <div class="stars"></div>
    <div class="dawn-glow"></div>
    <div class="distant-range"></div>
    <div class="kibo"></div>
    <div class="kibo-texture"></div>
    <div class="snow-glow"></div>
    <div class="snow-cap"></div>
    <div class="mist-band"></div>
    <div class="mist-drift"></div>
    <div class="foreground"></div>
  </div>

  <!-- Welcome toast -->
  <div id="welcomeToast" class="fixed top-6 left-1/2 -translate-x-1/2 z-[200] hidden">
    <div class="flex items-center gap-3 px-6 py-4 rounded-xl" style="background:rgba(10,16,37,.92);border:1px solid rgba(200,218,240,.15);backdrop-filter:blur(14px);box-shadow:0 8px 40px rgba(0,0,0,.5)">
      <i class="fa-solid fa-mountain-sun text-kili-ice text-sm"></i>
      <p class="text-cream text-sm font-semibold" id="toastName">Welcome!</p>
    </div>
  </div>

  <!-- ===== NAVBAR ===== -->
  <nav class="relative z-[20] flex items-center justify-between px-5 sm:px-8 py-4" style="background:linear-gradient(180deg,rgba(5,8,16,.88),rgba(5,8,16,.4));border-bottom:1px solid rgba(200,218,240,.06);backdrop-filter:blur(8px)">

    <button id="logoutBtn"
            class="flex items-center gap-2 px-4 py-2.5 rounded-lg transition-all duration-300 hover:-translate-y-0.5 cursor-pointer focus-visible:outline-2 focus-visible:outline-kili-ice focus-visible:outline-offset-4"
            style="background:rgba(26,28,34,.5);border:1px solid rgba(100,100,110,.15)"
            aria-label="Sign out">
      <i class="fa-solid fa-right-from-bracket text-kili-mist text-xs"></i>
      <span class="font-display text-xs tracking-[0.12em] uppercase text-kili-mist">Logout</span>
    </button>

    <div class="flex items-center gap-2.5">
      <img id="userAvatar" src="" alt="" class="w-8 h-8 rounded-full object-cover hidden" style="border:2px solid rgba(200,218,240,.15)">
      <div id="avatarFallback" class="w-8 h-8 rounded-full flex items-center justify-center" style="background:rgba(30,34,42,.6);border:2px solid rgba(200,218,240,.1)">
        <i class="fa-solid fa-user text-kili-stone text-xs"></i>
      </div>
      <span id="navUserName" class="text-cream text-sm font-semibold truncate max-w-[160px]">User</span>
    </div>
  </nav>

  <!-- ===== CENTRE OF PAGE ===== -->
  <main class="relative z-[10] flex flex-col items-center justify-center h-[calc(100vh-73px)] px-6">

    <p class="text-sm sm:text-base tracking-wide text-center mb-10 reveal" style="color:rgba(200,218,240,.55);text-shadow:0 2px 12px rgba(0,0,0,.6)">Click free to start use the system</p>

    <a href="free.html"
       class="glow-btn pulse-glow px-12 py-5 rounded-2xl flex items-center gap-3 no-underline transition-all duration-300 hover:-translate-y-1 hover:scale-[1.04] active:translate-y-0 active:scale-[0.97] focus-visible:outline-2 focus-visible:outline-kili-ice focus-visible:outline-offset-4 reveal d1"
       style="background:linear-gradient(140deg,rgba(30,48,80,.85),rgba(42,46,54,.9));border:1px solid rgba(200,218,240,.18);box-shadow:0 8px 40px rgba(0,0,0,.4)"
       aria-label="Go to Free">
      <i class="fa-solid fa-bolt text-kili-ice text-xl"></i>
      <span class="font-display text-2xl tracking-[0.18em] uppercase text-kili-snow">Free</span>
    </a>

  </main>

  <!-- Logout overlay -->
  <div id="logoutOverlay" class="fixed inset-0 z-[100] flex-col items-center justify-center" style="background:rgba(5,8,16,.95);display:none">
    <div class="w-12 h-12 rounded-full border-[3px] border-kili-ridge border-t-kili-ice" style="animation:spin 1s linear infinite"></div>
    <p class="mt-5 text-kili-mist text-sm tracking-[0.2em] uppercase">Signing out...</p>
  </div>

  <!-- Dashboard script -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getAuth, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDpNJIZoLeZUhIoTepbLb_3rRLpseu9Zdo",
      authDomain: "my-project-66803-95cb3.firebaseapp.com",
      projectId: "my-project-66803-95cb3",
      storageBucket: "my-project-66803-95cb3.firebasestorage.app",
      messagingSenderId: "167159607898",
      appId: "1:167159607898:web:23ca11366b88868b085e63"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    const navUserName = document.getElementById("navUserName");
    const userAvatar = document.getElementById("userAvatar");
    const avatarFallback = document.getElementById("avatarFallback");
    const logoutBtn = document.getElementById("logoutBtn");
    const logoutOverlay = document.getElementById("logoutOverlay");
    const welcomeToast = document.getElementById("welcomeToast");
    const toastName = document.getElementById("toastName");

    const name = localStorage.getItem("userName") || "User";
    const photo = localStorage.getItem("userPhoto") || "";
    navUserName.textContent = name;
    if (photo && photo !== "null" && photo !== "undefined") {
      userAvatar.src = photo;
      userAvatar.classList.remove("hidden");
      avatarFallback.classList.add("hidden");
    }

    if (sessionStorage.getItem("justLoggedIn") === "1") {
      toastName.textContent = `Welcome, ${name}!`;
      welcomeToast.classList.remove("hidden");
      welcomeToast.querySelector("div").classList.add("toast-in");
      sessionStorage.removeItem("justLoggedIn");
      setTimeout(() => {
        const inner = welcomeToast.querySelector("div");
        inner.classList.remove("toast-in");
        inner.classList.add("toast-out");
        setTimeout(() => welcomeToast.classList.add("hidden"), 300);
      }, 4000);
    }

    logoutBtn.addEventListener("click", async () => {
      logoutOverlay.style.display = "flex";
      try { await signOut(auth); } catch (e) { console.error(e); }
      localStorage.removeItem("userName");
      localStorage.removeItem("userEmail");
      localStorage.removeItem("userPhoto");
      localStorage.removeItem("userUid");
      localStorage.removeItem("isAdmin");
      sessionStorage.removeItem("justLoggedIn");
      sessionStorage.removeItem("loginIntent");
      window.location.href = "index.html";
    });

    onAuthStateChanged(auth, (user) => {
      if (!user) {
        localStorage.removeItem("userName");
        localStorage.removeItem("userEmail");
        localStorage.removeItem("userPhoto");
        localStorage.removeItem("userUid");
        localStorage.removeItem("isAdmin");
        window.location.href = "index.html";
      }
    });
  </script>
</body>
</html>
