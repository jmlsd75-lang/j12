<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>User Access</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
      text-align: center;
    }
    h1 {
      font-size: 28px;
      color: #333;
      margin-bottom: 8px;
    }
    #userGreeting {
      font-size: 18px;
      color: #666;
      margin-bottom: 60px;
    }
    #freeBtn {
      padding: 16px 60px;
      font-size: 22px;
      font-weight: bold;
      background: green;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      letter-spacing: 1px;
    }
    #freeBtn:hover { background: #006400; }
    #logoutLink {
      display: inline-block;
      margin-top: 30px;
      color: red;
      text-decoration: none;
      font-size: 14px;
      border-bottom: 1px solid red;
    }
    #logoutLink:hover { color: darkred; }
  </style>
</head>
<body>

  <h1>Welcome</h1>
  <div id="userGreeting">User</div>

  <button id="freeBtn">FREE</button>
  <a href="index.html" id="logoutLink">Logout</a>

  <script>
    (function () {
      var params = new URLSearchParams(window.location.search);
      var name = decodeURIComponent(params.get("name") || "User");
      document.getElementById("userGreeting").textContent = "Hello, " + name;
      window.history.replaceState({}, "", window.location.pathname);
    })();
  </script>

</body>
</html>
