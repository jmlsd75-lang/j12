<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Transaction Buttons</title>

<style>
    body {
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        font-family: Arial, sans-serif;
        background: #f5f5f5;
    }

    .container {
        display: flex;
        gap: 20px;
    }

    .btn {
        padding: 15px 40px;
        font-size: 18px;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        color: white;
        transition: 0.3s;
    }

    .sales { background-color: #28a745; }
    .sales:hover { background-color: #218838; }

    .purchases { background-color: #007bff; }
    .purchases:hover { background-color: #0056b3; }
</style>
</head>

<body>

<div class="container">
    <!-- Data attributes are used for logic, URL params for passing to next page -->
    <button class="btn sales" data-flow="IN" data-detail="Sales" onclick="goToAdd(this)">
        Sales
    </button>

    <button class="btn purchases" data-flow="OUT" data-detail="Purchases" onclick="goToAdd(this)">
        Purchases
    </button>
</div>

<script>
function goToAdd(btn) {
    const flow = btn.getAttribute('data-flow');      // IN / OUT
    const detail = btn.getAttribute('data-detail');  // Sales / Purchases
    
    // Construct URL with all necessary parameters
    // We set method=none so the user is forced to select it in the next step
    window.location.href = "add-transaction.html?flow=" + encodeURIComponent(flow) + 
                          "&detail=" + encodeURIComponent(detail);
}
</script>

</body>
</html>
