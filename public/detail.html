<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transaction Details</title>
    <style>
        /* ========================================
           BASE CSS (From your provided file)
           ======================================== */
        :root {
            --primary-color: #4285F4;
            --primary-hover: #357ae8;
            --whatsapp-color: #25D366;
            --whatsapp-hover: #1ebc57;
            --bg-color: #f0f2f5;
            --card-bg: #ffffff;
            --text-color: #333333;
            --error-color: #d93025;
            --success-color: #1e8e3e;
            --secondary-border: #dadce0;
            --secondary-bg: #f8f9fa;
            --secondary-text: #3c4043;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            padding: 20px;
            min-height: 100vh;
        }

        /* Layout */
        .container {
            max-width: 600px;
            margin: 0 auto;
            background-color: var(--card-bg);
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            padding: 2rem;
        }

        h1 {
            text-align: center;
            margin-bottom: 1.5rem;
            color: #202124;
            font-size: 1.5rem;
        }

        /* Product Grid */
        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 12px;
            margin-bottom: 2rem;
            max-height: 400px;
            overflow-y: auto;
            padding-right: 5px;
        }

        .product-btn {
            background-color: var(--secondary-bg);
            border: 1px solid var(--secondary-border);
            padding: 15px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            font-size: 0.9rem;
            font-weight: 500;
        }

        .product-btn:hover {
            background-color: #e8eaed;
            border-color: var(--primary-color);
            transform: translateY(-2px);
        }

        .product-btn.active {
            background-color: var(--primary-color);
            color: white;
            border-color: var(--primary-color);
        }

        /* Transaction Form Section */
        #transactionForm {
            display: none; /* Hidden until product selected */
            border-top: 1px solid #eee;
            padding-top: 1.5rem;
            animation: fadeIn 0.4s ease;
        }

        .info-display {
            background-color: var(--secondary-bg);
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 1.5rem;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 0.95rem;
        }
        
        .info-row:last-child {
            margin-bottom: 0;
        }

        .info-label { color: #5f6368; }
        .info-value { font-weight: 600; }

        .input-group {
            margin-bottom: 1.2rem;
        }

        .input-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
            font-weight: 600;
            color: #5f6368;
        }

        .input-group input, .input-group select {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #dadce0;
            border-radius: 6px;
            font-size: 1rem;
            outline: none;
            background-color: #fff;
        }

        .input-group input:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 2px rgba(66, 133, 244, 0.2);
        }

        /* Buttons */
        .btn-save {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background-color: var(--success-color);
            color: white;
            border: none;
            width: 100%;
            padding: 14px 20px;
            font-size: 1rem;
            font-weight: 500;
            border-radius: 6px;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .btn-save:hover {
            background-color: #137333;
        }

        .btn-secondary {
            background-color: transparent;
            color: #5f6368;
            border: 1px solid #dadce0;
            margin-top: 10px;
        }
        .btn-secondary:hover {
            background-color: #f1f3f4;
        }

        /* Messages & Loading */
        #errorMsg, #successMsg {
            padding: 12px;
            border-radius: 4px;
            margin-bottom: 15px;
            font-size: 0.9rem;
            display: none;
            text-align: center;
        }

        #errorMsg {
            background-color: #fce8e6;
            color: var(--error-color);
            border: 1px solid #f5c6cb;
        }

        #successMsg {
            background-color: #e6f4ea;
            color: var(--success-color);
            border: 1px solid #ceead6;
        }

        #loadingOverlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(255, 255, 255, 0.9);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .spinner {
            width: 40px; height: 40px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid var(--primary-color);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 15px;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Hidden inputs */
        .hidden { display: none; }
    </style>
</head>
<body>

    <main class="container">
        <!-- Header: Transaction Type -->
        <h1 id="headerTitle">Transaction</h1>
        <div id="errorMsg"></div>
        <div id="successMsg"></div>

        <!-- Step 1: Product Selection -->
        <div id="productSelection">
            <p style="margin-bottom: 10px; color: #5f6368;">Select a product:</p>
            <div id="productGrid" class="product-grid">
                <!-- Products injected here by JS -->
                <div class="product-btn" style="opacity: 0.7; cursor: default;">Loading products...</div>
            </div>
        </div>

        <!-- Step 2: Transaction Details Form -->
        <div id="transactionForm">
            <div class="info-display">
                <div class="info-row">
                    <span class="info-label">Product Name:</span>
                    <span class="info-value" id="dispProductName">-</span>
                </div>
                <div class="info-row">
                    <span class="info-label">Buying Price (BP):</span>
                    <span class="info-value" id="dispBP">0</span>
                </div>
                <div class="info-row">
                    <span class="info-label">Selling Price (SP):</span>
                    <span class="info-value" id="dispSP">0</span>
                </div>
                <div class="info-row">
                    <span class="info-label">Current Stock:</span>
                    <span class="info-value" id="dispStock">0</span>
                </div>
                <div class="info-row" style="margin-top: 8px; padding-top: 8px; border-top: 1px solid #ddd;">
                    <span class="info-label">Estimated Total:</span>
                    <span class="info-value" id="dispTotal" style="color: var(--primary-color);">0</span>
                </div>
            </div>

            <!-- Inputs -->
            <div class="input-group">
                <label for="unitsInput">Enter Units</label>
                <input type="number" id="unitsInput" placeholder="0" min="1">
            </div>

            <div class="input-group">
                <label for="flowType">Flow Type</label>
                <select id="flowType">
                    <option value="Cash">Cash</option>
                    <option value="Bank">Bank</option>
                    <option value="Credit">Credit</option>
                </select>
            </div>

            <!-- Credit Name Input (Hidden by default) -->
            <div class="input-group hidden" id="creditNameGroup">
                <label for="creditName">Enter Name (Credit)</label>
                <input type="text" id="creditName" placeholder="Customer Name">
            </div>

            <button id="saveBtn" class="btn-save">Save Transaction</button>
            <button id="cancelBtn" class="btn-save btn-secondary">Cancel</button>
        </div>
    </main>

    <!-- Loading Overlay -->
    <div id="loadingOverlay">
        <div class="spinner"></div>
        <div id="loadingText">Processing...</div>
    </div>

    <!-- ========================================
         FIREBASE & LOGIC
         ======================================== -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getFirestore, collection, getDocs, addDoc, query, where, updateDoc, doc, runTransaction } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        // ========================================
        // CONFIGURATION
        // ========================================
        const firebaseConfig = {
            apiKey: "AIzaSyDpNJIZoLeZUhIoTepbLb_3rRLpseu9Zdo",
            authDomain: "my-project-66803-95cb3.firebaseapp.com",
            projectId: "my-project-66803-95cb3",
            storageBucket: "my-project-66803-95cb3.firebasestorage.app",
            messagingSenderId: "167159607898",
            appId: "1:167159607898:web:23ca11366b88868b085e63"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // State Variables
        let selectedTransactionType = "";
        let selectedProduct = null; // Stores full product doc {id, name, bp, sp, stock...}
        let allProducts = [];

        // DOM Elements
        const headerTitle = document.getElementById("headerTitle");
        const productGrid = document.getElementById("productGrid");
        const productSelection = document.getElementById("productSelection");
        const transactionForm = document.getElementById("transactionForm");
        const unitsInput = document.getElementById("unitsInput");
        const flowTypeSelect = document.getElementById("flowType");
        const creditNameGroup = document.getElementById("creditNameGroup");
        const creditNameInput = document.getElementById("creditName");
        const saveBtn = document.getElementById("saveBtn");
        const cancelBtn = document.getElementById("cancelBtn");
        
        const dispProductName = document.getElementById("dispProductName");
        const dispBP = document.getElementById("dispBP");
        const dispSP = document.getElementById("dispSP");
        const dispStock = document.getElementById("dispStock");
        const dispTotal = document.getElementById("dispTotal");

        const errorMsg = document.getElementById("errorMsg");
        const successMsg = document.getElementById("successMsg");
        const loadingOverlay = document.getElementById("loadingOverlay");
        const loadingText = document.getElementById("loadingText");

        // ========================================
        // INITIALIZATION
        // ========================================
        window.addEventListener('DOMContentLoaded', async () => {
            // 1. Get Transaction Type from URL params (e.g., ?type=Sales)
            const urlParams = new URLSearchParams(window.location.search);
            selectedTransactionType = urlParams.get('type');

            if (!selectedTransactionType) {
                showError("Transaction type missing. Redirecting...");
                setTimeout(() => window.location.href = "stock.html", 2000);
                return;
            }

            // Set Header Title
            headerTitle.textContent = selectedTransactionType;

            // 2. Fetch Products
            await fetchProducts();
        });

        // ========================================
        // FETCH PRODUCTS
        // ========================================
        async function fetchProducts() {
            showLoading("Fetching products...");
            try {
                const productsRef = collection(db, "products");
                const snapshot = await getDocs(productsRef);
                
                productGrid.innerHTML = ""; // Clear loading text

                if (snapshot.empty) {
                    productGrid.innerHTML = `<p style="grid-column: 1/-1; text-align: center; color: #666;">No products found.</p>`;
                    hideLoading();
                    return;
                }

                snapshot.forEach(doc => {
                    const data = doc.data();
                    allProducts.push({ id: doc.id, ...data });

                    // Create Button
                    const btn = document.createElement("button");
                    btn.className = "product-btn";
                    btn.textContent = data.name || "Unnamed Product";
                    btn.onclick = () => selectProduct(doc.id);
                    productGrid.appendChild(btn);
                });

            } catch (error) {
                console.error("Error fetching products:", error);
                showError("Failed to load products. Check console.");
            } finally {
                hideLoading();
            }
        }

        // ========================================
        // SELECT PRODUCT & DISPLAY DETAILS
        // ========================================
        function selectProduct(id) {
            selectedProduct = allProducts.find(p => p.id === id);
            if (!selectedProduct) return;

            // Visual Feedback
            document.querySelectorAll('.product-btn').forEach(b => b.classList.remove('active'));
            const activeBtn = Array.from(productGrid.children).find(b => b.textContent === selectedProduct.name);
            if(activeBtn) activeBtn.classList.add('active');

            // Display Details
            dispProductName.textContent = selectedProduct.name;
            dispBP.textContent = selectedProduct.bp || 0;
            dispSP.textContent = selectedProduct.sp || 0;
            dispStock.textContent = selectedProduct.stock || 0;
            dispTotal.textContent = "0";
            unitsInput.value = "";

            // Show Form
            productSelection.style.display = "none";
            transactionForm.style.display = "block";
            unitsInput.focus();
        }

        // ========================================
        // INTERACTION LOGIC
        // ========================================
        
        // Toggle Credit Name Input
        flowTypeSelect.addEventListener("change", () => {
            if (flowTypeSelect.value === "Credit") {
                creditNameGroup.classList.remove("hidden");
                creditNameInput.setAttribute("required", "true");
            } else {
                creditNameGroup.classList.add("hidden");
                creditNameInput.removeAttribute("required");
                creditNameInput.value = "";
            }
            calculateTotal();
        });

        // Calculate Total Real-time
        unitsInput.addEventListener("input", calculateTotal);

        function calculateTotal() {
            const units = parseFloat(unitsInput.value) || 0;
            if (!selectedProduct || units <= 0) {
                dispTotal.textContent = "0";
                return;
            }

            let amount = 0;
            // Logic: Sales = IN (Use SP). Others = OUT (Use BP).
            if (selectedTransactionType === "Sales") {
                amount = units * (selectedProduct.sp || 0);
            } else {
                // Purchases, Damage, Sales Return, Purchase Return
                amount = units * (selectedProduct.bp || 0);
            }
            dispTotal.textContent = amount.toFixed(2);
        }

        // Cancel / Back to Product List
        cancelBtn.addEventListener("click", () => {
            transactionForm.style.display = "none";
            productSelection.style.display = "block";
            selectedProduct = null;
            // Clear active class
            document.querySelectorAll('.product-btn').forEach(b => b.classList.remove('active'));
        });

        // ========================================
        // SAVE TRANSACTION
        // ========================================
        saveBtn.addEventListener("click", async () => {
            // Validation
            const units = parseFloat(unitsInput.value);
            if (!units || units <= 0) {
                showError("Please enter a valid number of units.");
                return;
            }

            if (flowTypeSelect.value === "Credit" && (!creditNameInput.value.trim())) {
                showError("Please enter a name for Credit transactions.");
                creditNameInput.focus();
                return;
            }

            showLoading("Saving Transaction...");

            try {
                // 1. Determine Flow Form and Stock Change
                let flowForm = "";
                let newStock = 0;

                if (selectedTransactionType === "Sales") {
                    flowForm = "IN"; 
                    // Requirement: "Stock increases: Current Units + Entered Units"
                    newStock = (selectedProduct.stock || 0) + units;
                } else {
                    flowForm = "OUT"; 
                    // Requirement: "Stock decreases: Current Units − Entered Units"
                    // (Optional: Check for negative stock, though not explicitly asked to block it)
                    newStock = (selectedProduct.stock || 0) - units;
                }

                // 2. Determine Amount
                let amount = 0;
                if (selectedTransactionType === "Sales") {
                    amount = units * (selectedProduct.sp || 0);
                } else {
                    amount = units * (selectedProduct.bp || 0);
                }

                // 3. Set Name
                const customerName = flowTypeSelect.value === "Credit" ? creditNameInput.value.trim() : "-";

                // 4. Database Transaction (Atomic Write)
                await runTransaction(db, async (transaction) => {
                    const productRef = doc(db, "products", selectedProduct.id);
                    const historyRef = collection(db, "history"); // Assuming collection name 'history'

                    // Update Stock
                    transaction.update(productRef, { stock: newStock });

                    // Add History Record
                    const newDocRef = doc(historyRef);
                    transaction.set(newDocRef, {
                        date: new Date(), // Current timestamp
                        detail: selectedTransactionType,
                        flowType: flowTypeSelect.value, // Cash / Credit / Bank
                        flowForm: flowForm, // IN / OUT
                        name: customerName,
                        amount: amount,
                        productName: selectedProduct.name, // Helpful for history lists
                        units: units,
                        productId: selectedProduct.id
                    });
                });

                // 5. Success
                showSuccess("Transaction Saved!");
                
                // 6. Redirect
                setTimeout(() => {
                    window.location.href = "stock.html";
                }, 1000);

            } catch (error) {
                console.error("Transaction failed:", error);
                showError("Error saving: " + error.message);
            } finally {
                hideLoading();
            }
        });

        // ========================================
        // HELPERS
        // ========================================
        function showLoading(text) {
            loadingText.textContent = text;
            loadingOverlay.style.display = "flex";
        }

        function hideLoading() {
            loadingOverlay.style.display = "none";
        }

        function showError(msg) {
            errorMsg.textContent = msg;
            errorMsg.style.display = "block";
            successMsg.style.display = "none";
        }

        function showSuccess(msg) {
            successMsg.textContent = msg;
            successMsg.style.display = "block";
            errorMsg.style.display = "none";
        }

    </script>
</body>
</html>
