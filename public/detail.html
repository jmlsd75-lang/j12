<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transaction Type</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Color Palette */
            --c-in: #059669;   /* Emerald Green for Income */
            --c-out: #E11D48;  /* Rose Red for Expenses/Out */
            
            --bg-color: #F3F4F6;
            --text-main: #1F2937;
            --card-bg: #ffffff;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Header Styling */
        header {
            background: var(--card-bg);
            padding: 20px;
            text-align: center;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            position: sticky;
            top: 0;
            z-index: 10;
        }

        h1 {
            font-size: 1.25rem;
            margin: 0;
            font-weight: 700;
            color: #111827;
        }

        .subtitle {
            font-size: 0.875rem;
            color: #6B7280;
            margin-top: 5px;
        }

        /* Main Content Area */
        main {
            flex: 1;
            padding: 20px;
            max-width: 600px; 
            margin: 0 auto;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center; 
        }

        /* Section Headers */
        .section-header {
            display: flex;
            align-items: center;
            margin: 30px 0 15px 0;
            padding-bottom: 10px;
            border-bottom: 2px solid #E5E7EB;
            width: 100%;
            max-width: 320px;
            justify-content: center;
        }

        .section-header h2 {
            font-size: 1rem;
            margin: 0;
            color: #374151;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 700;
            color: white;
            margin-right: 10px;
            min-width: 30px;
            text-align: center;
        }
        
        .badge.in { background-color: var(--c-in); }
        .badge.out { background-color: var(--c-out); }

        /* Grid Layout */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 16px;
            width: 100%;
            max-width: 320px; /* Constrain width to keep buttons focused */
        }

        /* Button Styling */
        .btn-cat {
            appearance: none;
            border: none;
            outline: none;
            cursor: pointer;
            background: white;
            border-radius: 16px;
            padding: 20px 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            transition: transform 0.15s ease, box-shadow 0.15s ease;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            height: 100%;
            min-height: 130px;
            width: 100%;
        }

        .btn-cat:active {
            transform: scale(0.96);
        }

        .btn-cat:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        /* Icon Wrapper */
        .icon-box {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 12px;
            color: white;
            transition: transform 0.2s;
        }

        .btn-cat:hover .icon-box {
            transform: scale(1.1);
        }

        /* Button Text */
        .btn-text {
            font-size: 0.85rem;
            font-weight: 600;
            color: #374151;
            line-height: 1.3;
        }

        /* --- COLOR THEMES --- */
        
        /* Theme 1: Income (Emerald) */
        .theme-in .icon-box { 
            background: linear-gradient(135deg, #10B981 0%, #047857 100%); 
            box-shadow: 0 4px 12px rgba(16, 185, 129, 0.3); 
        }

        /* Theme 2: Expenses (Rose Red) */
        .theme-out .icon-box { 
            background: linear-gradient(135deg, #F43F5E 0%, #BE123C 100%); 
            box-shadow: 0 4px 12px rgba(244, 63, 94, 0.3); 
        }

        /* Icon SVG Styling */
        .icon-box svg {
            width: 24px;
            height: 24px;
            stroke-width: 2.5;
            stroke: currentColor;
            fill: none;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        /* Footer / Back Link */
        .footer-nav {
            padding: 30px;
            text-align: center;
            margin-top: auto;
        }

        .back-link {
            text-decoration: none;
            color: #6B7280;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 10px 20px;
            border-radius: 8px;
            background: white;
            transition: background 0.2s;
        }

        .back-link:hover {
            background: #E5E7EB;
            color: #111827;
        }
    </style>
</head>
<body>

    <header>
        <h1>Transaction Type</h1>
        <div class="subtitle">Select a category to proceed</div>
    </header>

    <main>
        
        <!-- INCOME SECTION -->
        <div class="section-header">
            <span class="badge in">IN</span>
            <h2>Income & Gains</h2>
        </div>
        <div class="grid-container">
            <!-- Item: Capital -->
            <button class="btn-cat theme-in" onclick="goToAdd('IN', 'Capital')">
                <div class="icon-box">
                    <svg viewBox="0 0 24 24">
                        <path d="M12 2v20M7 7h10M7 12h10M7 17h10"></path>
                    </svg>
                </div>
                <span class="btn-text">Capital</span>
            </button>
            <!-- Item: Sales -->
<button class="btn-cat theme-in" onclick="goToAdd('IN', 'Sales')">
    <div class="icon-box">
        <!-- Sales Icon (Trending up) -->
        <svg viewBox="0 0 24 24">
            <path d="M3 17l6-6 4 4 7-7"></path>
            <path d="M14 4h7v7"></path>
        </svg>
    </div>
    <span class="btn-text">Sales</span>
</button>
        </div>

        <!-- EXPENSE SECTION -->
        <div class="section-header">
            <span class="badge out">OUT</span>
            <h2>Expenses</h2>
        </div>
        <div class="grid-container">
            <!-- Item: Purchases -->
            <button class="btn-cat theme-out" onclick="goToAdd('OUT', 'Purchases')">
                <div class="icon-box">
                    <!-- Shopping Cart Icon -->
                    <svg viewBox="0 0 24 24">
                        <circle cx="9" cy="21" r="1"></circle>
                        <circle cx="20" cy="21" r="1"></circle>
                        <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
                    </svg>
                </div>
                <span class="btn-text">Purchases</span>
            </button>
            <!-- Item: Sales Return -->
<button class="btn-cat theme-out" onclick="goToAdd('OUT', 'Sales Return')">
    <div class="icon-box">
        <!-- Return / Undo Icon -->
        <svg viewBox="0 0 24 24">
            <path d="M9 14l-4-4 4-4"></path>
            <path d="M5 10h9a4 4 0 0 1 0 8H9"></path>
        </svg>
    </div>
    <span class="btn-text">Sales Return</span>
</button>

            <!-- Item: Transport -->
            <button class="btn-cat theme-out" onclick="goToAdd('OUT', 'Transport')">
                <div class="icon-box">
                    <!-- Transport Icon (car) -->
                    <svg viewBox="0 0 24 24">
                        <path d="M3 13l2-6h14l2 6"></path>
                        <circle cx="7" cy="18" r="2"></circle>
                        <circle cx="17" cy="18" r="2"></circle>
                        <path d="M5 13h14v5H5z"></path>
                    </svg>
                </div>
                <span class="btn-text">Transport</span>
            </button>
        </div>

    </main>

    <div class="footer-nav">
        <a href="business.html" class="back-link">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
            Back to Dashboard
        </a>
    </div>

    <script>
        function goToAdd(flow, detail) {
            // Redirect to add-transaction.html with query parameters
            // flow = 'IN' or 'OUT'
            // detail = 'Capital', 'Purchases', 'Transport', etc.
            const url = `add-transaction.html?flow=${encodeURIComponent(flow)}&detail=${encodeURIComponent(detail)}`;
            window.location.href = url;
        }
    </script>
</body>
</html>
