<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transaction Type</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

    <style>
        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-family: 'Inter', sans-serif;
            background: #F3F4F6;
            margin: 0;
            padding: 20px 0;
        }

        .container {
            display: flex;
            flex-direction: column;
            gap: 20px;
            width: 100%;
            max-width: 360px; /* Slightly wider to fit 4 columns comfortably */
            padding: 24px;
            background: white;
            border-radius: 24px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
        }

        .title {
            text-align: center;
            font-size: 1.5rem;
            font-weight: 600;
            color: #1F2937;
            margin: 0 0 10px 0;
        }

        .section-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #9CA3AF;
            font-weight: 600;
            margin-bottom: 10px;
        }

        /* GRID LAYOUT: Forces 4 items per line */
        .grid-box {
            display: grid;
            grid-template-columns: repeat(4, 1fr); /* 4 in 1 line */
            gap: 10px;
        }

        .btn {
            display: flex;
            flex-direction: column; /* Stack Icon and Text vertically */
            justify-content: center;
            align-items: center;
            padding: 12px 5px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            color: white;
            transition: transform 0.1s, opacity 0.2s;
            font-weight: 500;
            text-align: center;
            aspect-ratio: 1 / 1.2; /* Make buttons roughly square-ish */
        }

        .btn:active { transform: scale(0.95); }
        .btn:hover { opacity: 0.9; }

        /* Icon Styling */
        .btn svg {
            width: 24px;
            height: 24px;
            margin-bottom: 6px;
            stroke-width: 2;
        }

        /* Text Styling */
        .btn span {
            font-size: 0.75rem;
            line-height: 1.1;
            word-wrap: break-word; /* Allows long words like 'Electricity' to wrap */
        }

        /* Color Themes */
        .type-in {
            background: linear-gradient(135deg, #10B981 0%, #059669 100%);
            box-shadow: 0 4px 10px rgba(16, 185, 129, 0.2);
        }

        .type-out {
            background: linear-gradient(135deg, #3B82F6 0%, #1D4ED8 100%);
            box-shadow: 0 4px 10px rgba(59, 130, 246, 0.2);
        }

        .back-link {
            text-align: center;
            margin-top: 30px;
            color: #6B7280;
            text-decoration: none;
            font-size: 0.9rem;
        }
        .back-link:hover { color: #1F2937; }
    </style>
</head>

<body>
    <div class="container">
        <h1 class="title">Select Type</h1>
        
        <!-- INCOME SECTION (4 items fits perfectly in 1 row) -->
        <div class="section-label">Income (In)</div>
        <div class="grid-box">
            <button class="btn type-in" onclick="goToAdd('IN', 'Sales')">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="1" x2="12" y2="23"></line><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path></svg>
                <span>Sales</span>
            </button>

            <button class="btn type-in" onclick="goToAdd('IN', 'Revenue')">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"></polyline><polyline points="17 6 23 6 23 12"></polyline></svg>
                <span>Revenue</span>
            </button>

            <button class="btn type-in" onclick="goToAdd('IN', 'Capital')">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="7" width="20" height="14" rx="2" ry="2"></rect><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"></path></svg>
                <span>Capital</span>
            </button>

            <button class="btn type-in" onclick="goToAdd('IN', 'Discount Received')">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"></path><line x1="7" y1="7" x2="7.01" y2="7"></line></svg>
                <span>Disc. Rec.</span>
            </button>
        </div>


        <!-- EXPENSE SECTION (5 items: 4 in row 2, 1 in row 3) -->
        <div class="section-label">Expenses (Out)</div>
        <div class="grid-box">
            <button class="btn type-out" onclick="goToAdd('OUT', 'Purchases')">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"></circle><circle cx="20" cy="21" r="1"></circle><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path></svg>
                <span>Purchases</span>
            </button>

            <button class="btn type-out" onclick="goToAdd('OUT', 'Transport')">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="3" width="15" height="13"></rect><polygon points="16 8 20 8 23 11 23 16 16 16 16 8"></polygon><circle cx="5.5" cy="18.5" r="2.5"></circle><circle cx="18.5" cy="18.5" r="2.5"></circle></svg>
                <span>Transport</span>
            </button>

            <button class="btn type-out" onclick="goToAdd('OUT', 'Electricity')">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon></svg>
                <span>Electricity</span>
            </button>

            <button class="btn type-out" onclick="goToAdd('OUT', 'Tax')">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
                <span>Tax</span>
            </button>

            <button class="btn type-out" onclick="goToAdd('OUT', 'Discount Allowed')">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="19" x2="19" y2="5"></line><circle cx="6.5" cy="6.5" r="2.5"></circle><circle cx="17.5" cy="17.5" r="2.5"></circle></svg>
                <span>Disc. Allowed</span>
            </button>
        </div>
    </div>

    <a href="business.html" class="back-link">Back to Dashboard</a>

    <script>
        function goToAdd(flow, detail) {
            // Script selects the specific detail and flow
            // Redirects all buttons to the same page (add-transaction.html)
            const url = `add-transaction.html?flow=${encodeURIComponent(flow)}&detail=${encodeURIComponent(detail)}`;
            window.location.href = url;
        }
    </script>
</body>
