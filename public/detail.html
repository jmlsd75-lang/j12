<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transaction Type</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Color Palette */
            --c-in: #059669;   /* Emerald Green for Income */
            --c-out: #E11D48;  /* Rose Red for Expenses/Out */
            
            --bg-color: #F3F4F6;
            --text-main: #1F2937;
            --card-bg: #ffffff;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Header Styling */
        header {
            background: var(--card-bg);
            padding: 20px;
            text-align: center;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            position: sticky;
            top: 0;
            z-index: 10;
        }

        h1 {
            font-size: 1.25rem;
            margin: 0;
            font-weight: 700;
            color: #111827;
        }

        .subtitle {
            font-size: 0.875rem;
            color: #6B7280;
            margin-top: 5px;
        }

        /* Main Content Area */
        main {
            flex: 1;
            padding: 20px;
            max-width: 800px;
            margin: 0 auto;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center; 
        }

        /* Section Headers */
        .section-header {
            display: flex;
            align-items: center;
            margin: 40px 0 20px 0;
            padding-bottom: 10px;
            border-bottom: 2px solid #E5E7EB;
            width: 100%;
            justify-content: center;
        }

        .section-header h2 {
            font-size: 1.1rem;
            margin: 0;
            color: #374151;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        /* Subsection Headers (e.g. for Reserves) */
        .subsection-header {
            display: flex;
            align-items: center;
            margin: 30px 0 15px 0;
            width: 100%;
            justify-content: flex-start;
            padding-left: 5px;
        }

        .subsection-header h3 {
            font-size: 0.9rem;
            margin: 0;
            color: #6B7280;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            font-weight: 600;
        }

        .badge {
            display: inline-block;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 700;
            color: white;
            margin-right: 12px;
            min-width: 36px;
            text-align: center;
        }
        
        .badge.in { background-color: var(--c-in); }
        .badge.out { background-color: var(--c-out); }

        /* Grid Layout */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 16px;
            width: 100%;
        }

        /* Button Styling */
        .btn-cat {
            appearance: none;
            border: none;
            outline: none;
            cursor: pointer;
            background: white;
            border-radius: 16px;
            padding: 24px 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            transition: transform 0.15s ease, box-shadow 0.15s ease;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.05);
            height: 100%;
            min-height: 140px;
            width: 100%;
        }

        .btn-cat:active {
            transform: scale(0.96);
        }

        .btn-cat:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 15px -3px rgba(0, 0, 0, 0.1);
        }

        /* Icon Wrapper */
        .icon-box {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 12px;
            color: white;
            transition: transform 0.2s;
        }

        .btn-cat:hover .icon-box {
            transform: scale(1.1);
        }

        /* Button Text */
        .btn-text {
            font-size: 0.85rem;
            font-weight: 600;
            color: #374151;
            line-height: 1.3;
        }

        /* --- COLOR THEMES --- */
        
        /* Theme 1: Income (Emerald) */
        .theme-in .icon-box { 
            background: linear-gradient(135deg, #10B981 0%, #047857 100%); 
            box-shadow: 0 4px 12px rgba(16, 185, 129, 0.3); 
        }

        /* Theme 2: Expenses (Rose Red) */
        .theme-out .icon-box { 
            background: linear-gradient(135deg, #F43F5E 0%, #BE123C 100%); 
            box-shadow: 0 4px 12px rgba(244, 63, 94, 0.3); 
        }

        /* Icon SVG Styling */
        .icon-box svg {
            width: 24px;
            height: 24px;
            stroke-width: 2.5;
            stroke: currentColor;
            fill: none;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        /* Footer / Back Link */
        .footer-nav {
            padding: 40px 20px;
            text-align: center;
            margin-top: auto;
        }

        .back-link {
            text-decoration: none;
            color: #6B7280;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 12px 24px;
            border-radius: 8px;
            background: white;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            transition: background 0.2s;
        }

        .back-link:hover {
            background: #E5E7EB;
            color: #111827;
        }
    </style>
</head>
<body>
