<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transaction Categories</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Distinct Color Palette */
            --c1: #059669; /* Emerald Green */
            --c2: #2563EB; /* Royal Blue */
            --c3: #7C3AED; /* Violet */
            --c4: #DB2777; /* Pink */
            --c5: #D97706; /* Amber/Orange */
            
            --bg-color: #F3F4F6;
            --text-main: #1F2937;
            --card-bg: #ffffff;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Header Styling */
        header {
            background: var(--card-bg);
            padding: 20px;
            text-align: center;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            position: sticky;
            top: 0;
            z-index: 10;
        }

        h1 {
            font-size: 1.25rem;
            margin: 0;
            font-weight: 700;
            color: #111827;
        }

        .subtitle {
            font-size: 0.875rem;
            color: #6B7280;
            margin-top: 5px;
        }

        /* Main Content Area */
        main {
            flex: 1;
            padding: 20px;
            max-width: 1400px;
            margin: 0 auto;
            width: 100%;
        }

        /* Section Headers */
        .section-header {
            display: flex;
            align-items: center;
            margin: 30px 0 15px 0;
            padding-bottom: 10px;
            border-bottom: 2px solid #E5E7EB;
        }

        .section-header h2 {
            font-size: 1.1rem;
            margin: 0;
            color: #374151;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 700;
            color: white;
            margin-right: 10px;
        }
        
        .badge.in { background-color: var(--c1); }
        .badge.out { background-color: var(--c2); }

        /* Grid Layout */
        .grid-container {
            display: grid;
            /* Responsive columns: adapts from 2 columns on mobile to 5+ on desktop */
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 16px;
        }

        /* Button Styling */
        .btn-cat {
            appearance: none;
            border: none;
            outline: none;
            cursor: pointer;
            background: white;
            border-radius: 16px;
            padding: 20px 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            transition: transform 0.15s ease, box-shadow 0.15s ease;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            height: 100%;
            min-height: 130px; /* Ensures buttons are chunky and clear */
        }

        .btn-cat:active {
            transform: scale(0.96);
        }

        .btn-cat:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        /* Icon Wrapper */
        .icon-box {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 12px;
            color: white;
            transition: transform 0.2s;
        }

        .btn-cat:hover .icon-box {
            transform: scale(1.1);
        }

        /* Button Text */
        .btn-text {
            font-size: 0.85rem;
            font-weight: 600;
            color: #374151;
            line-height: 1.3;
            max-width: 100%;
            word-wrap: break-word;
        }

        /* --- COLOR THEMES --- */
        /* Background colors for icons are handled here. 
           We cycle 5 colors to ensure no adjacent buttons look the same. */

        /* Theme 1: Emerald */
        .theme-1 .icon-box { background: linear-gradient(135deg, #10B981 0%, #047857 100%); box-shadow: 0 4px 12px rgba(16, 185, 129, 0.3); }
        
        /* Theme 2: Blue */
        .theme-2 .icon-box { background: linear-gradient(135deg, #3B82F6 0%, #1D4ED8 100%); box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3); }
        
        /* Theme 3: Violet */
        .theme-3 .icon-box { background: linear-gradient(135deg, #8B5CF6 0%, #6D28D9 100%); box-shadow: 0 4px 12px rgba(139, 92, 246, 0.3); }
        
        /* Theme 4: Pink */
        .theme-4 .icon-box { background: linear-gradient(135deg, #EC4899 0%, #BE185D 100%); box-shadow: 0 4px 12px rgba(236, 72, 153, 0.3); }
        
        /* Theme 5: Amber */
        .theme-5 .icon-box { background: linear-gradient(135deg, #F59E0B 0%, #B45309 100%); box-shadow: 0 4px 12px rgba(245, 158, 11, 0.3); }


        /* Icon SVG Styling */
        .icon-box svg {
            width: 24px;
            height: 24px;
            stroke-width: 2.5;
            stroke: currentColor;
            fill: none;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        /* Footer / Back Link */
        .footer-nav {
            padding: 30px;
            text-align: center;
            margin-top: auto;
        }

        .back-link {
            text-decoration: none;
            color: #6B7280;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 10px 20px;
            border-radius: 8px;
            background: white;
            transition: background 0.2s;
        }

        .back-link:hover {
            background: #E5E7EB;
            color: #111827;
        }

        /* Responsive Adjustments for very small screens */
        @media (max-width: 380px) {
            .grid-container {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>
