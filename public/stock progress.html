<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Stock Progress</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #4F46E5;
            --success: #10B981;
            --danger: #EF4444;
            --bg-body: #F3F4F6;
            --bg-card: #FFFFFF;
            --text-main: #1F2937;
            --text-muted: #6B7280;
            --border: #E5E7EB;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            --radius: 12px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-body);
            color: var(--text-main);
            min-height: 100vh;
            padding: 20px;
            padding-bottom: 80px;
        }

        /* --- Header --- */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .header h1 { font-size: 1.5rem; font-weight: 700; }
        
        .btn-add {
            background-color: var(--primary);
            color: white;
            text-decoration: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 0.9rem;
            box-shadow: 0 2px 4px rgba(79, 70, 229, 0.3);
        }

        /* --- Search --- */
        .search-wrapper {
            margin-bottom: 20px;
        }
        .search-input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            font-size: 1rem;
            outline: none;
            background: #fff;
        }
        .search-input:focus { border-color: var(--primary); }

        /* --- Table --- */
        .table-container {
            background: var(--bg-card);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            overflow: hidden;
            overflow-x: auto; /* Scrollable on mobile */
        }

        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 800px; /* Ensure columns are readable */
        }

        thead {
            background-color: #F9FAFB;
            border-bottom: 2px solid var(--border);
        }

        th {
            text-align: left;
            padding: 16px;
            font-size: 0.75rem;
            text-transform: uppercase;
            color: var(--text-muted);
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        td {
            padding: 16px;
            border-bottom: 1px solid var(--border);
            font-size: 0.9rem;
            color: var(--text-main);
            vertical-align: middle;
        }
        
        tr:last-child td { border-bottom: none; }
        tr:hover td { background-color: #F9FAFB; }

        /* Column Styles */
        .col-name { font-weight: 600; color: var(--primary); min-width: 150px; }
        .col-num { font-family: 'Inter', monospace; font-variant-numeric: tabular-nums; }
        
        .stock-badge {
            padding: 4px 10px;
            border-radius: 20px;
            font-weight: 600;
            font-size: 0.85rem;
        }
        .stock-ok { background-color: #D1FAE5; color: #065F46; }
        .stock-low { background-color: #FEE2E2; color: #991B1B; }

        /* Sub-row for extra info (Total Cost/Revenue) */
        .sub-row td {
            padding-top: 0;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--border);
            font-size: 0.8rem;
            color: var(--text-muted);
        }
        .sub-row .highlight { font-weight: 600; color: var(--text-main); }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: var(--text-muted);
        }

        /* Mobile FAB */
        .fab {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: var(--primary);
            color: white;
            width: 56px;
            height: 56px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 12px rgba(79, 70, 229, 0.4);
            text-decoration: none;
            z-index: 100;
        }
        @media (min-width: 600px) { .fab { display: none; } }

    </style>
</head>
<body>

    <div class="header">
        <h1>Stock Progress</h1>
        <a href="index.html" class="btn-add">+ Add Product</a>
    </div>

    <div class="search-wrapper">
        <input type="text" id="searchInput" class="search-input" placeholder="Search products...">
    </div>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>Product Name</th>
                    <th>Buying Price <br><small>(Per Unit)</small></th>
                    <th>Selling Price <br><small>(Per Unit)</small></th>
                    <th>Units Present</th>
                </tr>
            </thead>
            <tbody id="tableBody">
                <!-- Rows inserted by JS -->
            </tbody>
        </table>
    </div>

    <!-- Floating Action Button for Mobile -->
    <a href="index.html" class="fab">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
    </a>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getFirestore, collection, query, onSnapshot, orderBy } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
        import { getAuth } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

        // --- CONFIGURATION (Same as previous pages) ---
        const firebaseConfig = {
            apiKey: "AIzaSyDpNJIZoLeZUhIoTepbLb_3rRLpseu9Zdo",
            authDomain: "my-project-66803-95cb3.firebaseapp.com",
            projectId: "my-project-66803-95cb3",
            storageBucket: "my-project-66803-95cb3.firebasestorage.app",
            messagingSenderId: "167159607898",
            appId: "1:167159607898:web:23ca11366b88868b085e63"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        // --- DOM ---
        const tableBody = document.getElementById('tableBody');
        const searchInput = document.getElementById('searchInput');
        let allProducts = [];

        // --- UTILS ---
        const formatMoney = (num) => {
            return new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD' }).format(num);
        };

        // --- RENDER FUNCTION ---
        function renderTable() {
            const term = searchInput.value.toLowerCase();
            tableBody.innerHTML = '';

            const filtered = allProducts.filter(p => p.name && p.name.toLowerCase().includes(term));

            if (filtered.length === 0) {
                tableBody.innerHTML = `<tr><td colspan="4" class="empty-state">No products found.</td></tr>`;
                return;
            }

            filtered.forEach(p => {
                // Determine logic for stock badge
                let badgeClass = 'stock-ok';
                let stockText = `${p.stock} Units`;
                if(p.stock === 0) {
                    badgeClass = 'stock-low';
                    stockText = 'Out of Stock';
                }

                // Create Main Row
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td class="col-name">${p.name}</td>
                    <td class="col-num">${formatMoney(p.buyingPricePerUnit)}</td>
                    <td class="col-num">${formatMoney(p.sellingPricePerUnit)}</td>
                    <td><span class="stock-badge ${badgeClass}">${stockText}</span></td>
                `;
                tableBody.appendChild(tr);

                // Create Sub-Row (Shows Total Cost and Total Revenue as saved/derived)
                const subTr = document.createElement('tr');
                subTr.className = 'sub-row';
                
                // Calculations derived from saved data
                const totalCost = p.totalBuyingPrice || (p.buyingPricePerUnit * p.stock);
                const totalRevenue = p.totalSellingPrice || (p.sellingPricePerUnit * p.stock);

                subTr.innerHTML = `
                    <td colspan="2">
                        Total Cost: <span class="highlight">${formatMoney(totalCost)}</span>
                    </td>
                    <td colspan="2">
                        Potential Revenue: <span class="highlight">${formatMoney(totalRevenue)}</span>
                    </td>
                `;
                tableBody.appendChild(subTr);
            });
        }

        // --- FIREBASE LISTENER ---
        function initListener() {
            const user = auth.currentUser;
            if(!user) return;

            const q = query(collection(db, "users", user.email, "products"), orderBy("createdAt", "desc"));

            onSnapshot(q, (snapshot) => {
                allProducts = [];
                snapshot.forEach(doc => {
                    allProducts.push({ id: doc.id, ...doc.data() });
                });
                renderTable();
            });
        }

        // --- EVENTS ---
        searchInput.addEventListener('input', renderTable);
        
        // Check auth on load
        auth.onAuthStateChanged(user => {
            if(user) initListener();
        });

    </script>
</body>
</html>
