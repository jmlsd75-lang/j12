<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amal Said Kazembe Multisystem Management</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Inter', sans-serif;
            background: #050505;
            overflow: hidden;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            top: -30%;
            left: 50%;
            transform: translateX(-50%);
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(249,115,22,0.08) 0%, transparent 70%);
            pointer-events: none;
        }

        body::after {
            content: '';
            position: fixed;
            bottom: -20%;
            left: 30%;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(168,85,247,0.05) 0%, transparent 70%);
            pointer-events: none;
        }

        .bg-dots {
            position: fixed;
            inset: 0;
            background-image: radial-gradient(rgba(255,255,255,0.03) 1px, transparent 1px);
            background-size: 32px 32px;
            pointer-events: none;
        }

        .orbit {
            position: fixed;
            top: 50%;
            left: 50%;
            border-radius: 50%;
            pointer-events: none;
        }

        .orbit-1 {
            width: 700px;
            height: 700px;
            transform: translate(-50%, -50%);
            border: 1px solid rgba(249,115,22,0.03);
            animation: spin 30s linear infinite;
        }

        .orbit-2 {
            width: 900px;
            height: 900px;
            transform: translate(-50%, -50%);
            border: 1px solid rgba(168,85,247,0.02);
            animation: spin 45s linear infinite reverse;
        }

        @keyframes spin { to { transform: translate(-50%, -50%) rotate(360deg); } }

        .card {
            position: relative;
            z-index: 1;
            background: rgba(15, 15, 15, 0.6);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 24px;
            padding: 56px 48px;
            max-width: 440px;
            width: 90%;
            text-align: center;
            box-shadow: 0 25px 60px -12px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.04);
            animation: fadeUp 0.8s ease-out;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 60%;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(249,115,22,0.5), transparent);
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(30px) scale(0.97); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .icon-box {
            width: 64px;
            height: 64px;
            margin: 0 auto 28px;
            border-radius: 16px;
            background: linear-gradient(135deg, #f97316, #ea580c);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 24px -4px rgba(249,115,22,0.3);
            animation: pulse 3s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { box-shadow: 0 8px 24px -4px rgba(249,115,22,0.3); }
            50% { box-shadow: 0 8px 32px -2px rgba(249,115,22,0.45); }
        }

        .icon-box svg { width: 30px; height: 30px; fill: #fff; }

        h1 {
            font-size: 1.5rem;
            font-weight: 700;
            color: #f5f5f4;
            line-height: 1.3;
            margin-bottom: 12px;
            letter-spacing: -0.02em;
        }

        .sub {
            font-size: 0.9rem;
            color: rgb(168, 162, 158);
            margin-bottom: 36px;
            line-height: 1.5;
        }

        #googleLoginBtn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            width: 100%;
            padding: 14px 24px;
            font-family: 'Inter', sans-serif;
            font-size: 0.9rem;
            font-weight: 500;
            color: #f5f5f4;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 14px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
            overflow: hidden;
        }

        #googleLoginBtn::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(249,115,22,0.08), transparent 60%);
            opacity: 0;
            transition: opacity 0.3s;
        }

        #googleLoginBtn:hover {
            background: rgba(255, 255, 255, 0.09);
            border-color: rgba(249, 115, 22, 0.25);
            transform: translateY(-2px);
            box-shadow: 0 8px 24px -6px rgba(249,115,22,0.15);
        }

        #googleLoginBtn:hover::before { opacity: 1; }
        #googleLoginBtn:active { transform: translateY(0); box-shadow: none; }

        .g-icon {
            width: 20px;
            height: 20px;
            flex-shrink: 0;
            position: relative;
            z-index: 1;
        }

        .btn-label { position: relative; z-index: 1; }

        #errorMsg {
            display: none;
            margin-top: 16px;
            padding: 10px 16px;
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.2);
            border-radius: 10px;
            color: #f87171;
            font-size: 0.82rem;
        }

        .note {
            margin-top: 28px;
            font-size: 0.75rem;
            color: rgb(120, 113, 108);
        }

        #loadingOverlay {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 9999;
            background: rgba(5, 5, 5, 0.85);
            backdrop-filter: blur(12px);
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 20px;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255, 255, 255, 0.08);
            border-top-color: #f97316;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        #loadingText {
            color: rgb(168, 162, 158);
            font-size: 0.9rem;
        }

        @media (max-width: 480px) {
            .card { padding: 40px 28px; border-radius: 20px; }
            h1 { font-size: 1.25rem; }
        }
    </style>
</head>
<body>
    <div class="bg-dots"></div>
    <div class="orbit orbit-1"></div>
    <div class="orbit orbit-2"></div>

    <div class="card">
        <div class="icon-box">
            <svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
        </div>
        <h1>Amal Said Kazembe Multisystem Management</h1>
        <p class="sub">login to start use the system</p>
        <button id="googleLoginBtn">
            <svg class="g-icon" viewBox="0 0 24 24">
                <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/>
                <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
                <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
            </svg>
            <span class="btn-label">Login with Google</span>
        </button>
        <div id="errorMsg"></div>
        <p class="note">Secured & encrypted connection</p>
    </div>

    <div id="loadingOverlay">
        <div class="spinner"></div>
        <p id="loadingText">Loading...</p>
    </div>

    <script type="module" src="login.js"></script>
</body>
</html>
