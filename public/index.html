<!DOCTYPE html>
<html>
<head>
    <title>JAMAL SAID KAZEMBE MULTISYSTEM MANAGEMENT</title>
    <style>
        body {
            text-align: center;
            font-family: Arial, sans-serif;
            margin-top: 50px;
        }
        .title {
            font-size: 32px;
            font-weight: bold;
            line-height: 1.2;
        }
        /* Green login button */
        .login-btn {
            background-color: #28a745; /* green */
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 30px;
        }
        .login-btn:hover {
            background-color: #218838;
        }
        .logout-btn {
            background-color: #dc3545; /* red */
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
            display: none;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="title">
        JAMAL SAID KAZEMBE<br>
        MULTISYSTEM MANAGEMENT
    </div>

    <!-- Green login button -->
    <button id="loginBtn" class="login-btn">LOGIN</button>
    <!-- Red logout button -->
    <button class="logout-btn">LOGOUT</button>
    <div id="userDisplay"></div>

    <!-- Module script to connect button to login.js -->
    <script type="module">
      import { login } from './login.js';
      document.getElementById("loginBtn").onclick = login;
    </script>
</body>
</html>
