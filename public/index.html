<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jamal Said Kazembe Multisystem Management</title>

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:#f4f4f4;
  display:flex;
  flex-direction:column;
  align-items:center;
  padding-top:50px;
  text-align:center;
}

h1{color:blue;margin:0;}
h2{color:red;font-size:16px;margin-top:5px;}

#userDisplay{
  margin-top:10px;
  font-weight:bold;
  font-size:16px;
  color:#333;
}

/* FREE BUTTON */
.free-btn{
  position:fixed;
  top:120px; /* below title */
  left:50%;
  transform:translateX(-50%);
  background:#28a745;
  color:white;
  padding:12px 25px;
  border:none;
  border-radius:6px;
  display:none;
  cursor:pointer;
}

/* LOGIN & LOGOUT BUTTON (bottom center) */
.login-btn,
.logout-btn {
  position:fixed;
  bottom:30px;
  left:50%;
  transform:translateX(-50%);
  padding:15px 40px;
  font-size:20px;
  border:none;
  border-radius:6px;
  color:white;
  cursor:pointer;
}

.login-btn {
  background:#28a745;
  display:block;
}

.logout-btn {
  background:#dc3545;
  display:none;
}
</style>
</head>

<body>

<div id="userDisplay"></div>

<h1>JAMAL SAID KAZEMBE</h1>
<h2>MULTISYSTEM MANAGEMENT</h2>

<button class="login-btn">LOGIN</button>
<button class="free-btn">FREE</button>
<button class="logout-btn">LOGOUT</button>

<script type="module" src="./login.js"></script>

</body>
</html>
