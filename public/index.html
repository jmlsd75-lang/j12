<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Jamal Said Kazembe Multisystem Management</title>
  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #f4f4f4;
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      align-items: center;
      height: 100vh;
      padding-top: 50px;
      text-align: center;
    }

    h1, h2 {
      text-align: center;
      margin: 0;
    }

    h1 {
      font-size: 40px;
      color: blue;
      margin-bottom: 10px;
    }

    h2 {
      color: red;
      margin-top: -5px;
    }

    #loginBtn {
      background-color: blue;
      padding: 15px 30px;
      font-size: 16px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      margin-top: 30px;
    }

    .button-container {
      display: flex;
      justify-content: center;
      flex-direction: row;
      gap: 20px;
      margin-top: 20px;
    }

    #freeBtn, #payBtn, #logoutBtn {
      padding: 15px 30px;
      font-size: 16px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      transition: opacity 0.3s;
    }

    #freeBtn {
      background-color: green;
      color: white;
    }

    #payBtn {
      background-color: blue;
      color: white;
    }

    #logoutBtn {
      background-color: red;
      color: white;
    }

    #freeBtn:hover, #payBtn:hover, #logoutBtn:hover {
      opacity: 0.8;
    }

    @media screen and (max-width: 768px) {
      .button-container {
        flex-direction: column;
        gap: 15px;
      }

      #logoutBtn {
        margin-top: 10px;
        display: block;
      }
    }
  </style>
</head>
<body>

  <h1>JAMAL SAID KAZEMBE</h1>
  <h2>MULTISYSTEM MANAGEMENT</h2>
  <p id="userInfo" style="display:none;"></p>  
  <button id="loginBtn" style="background-color: blue;">Login</button>
  
  <div class="button-container" id="freePayContainer" style="display:none;">
    <button id="freeBtn">Free</button>
    <button id="payBtn">Pay</button>
    <button id="logoutBtn">Logout</button>
  </div>

  <div id="countdownContainer" style="display:none;">
    <p id="timerText">180</p>
    <button id="businessBtn" style="display:none;">Business</button>
    <button id="exitBtn" style="display:none;">Exit</button>
  </div>

  <p id="errorMsg"></p>  

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, setPersistence, browserLocalPersistence, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import { getFirestore, doc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDpNJIZoLeZUhIoTepbLb_3rRLpseu9Zdo",
      authDomain: "my-project-66803-95cb3.firebaseapp.com",
      projectId: "my-project-66803-95cb3",
      storageBucket: "my-project-66803-95cb3.firebasestorage.app",
      messagingSenderId: "167159607898",
      appId: "1:167159607898:web:23ca11366b88868b085e63"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    setPersistence(auth, browserLocalPersistence)
      .catch((error) => {
        displayError('Error setting persistence: ' + error.message);
      });

    onAuthStateChanged(auth, (user) => {
      if (user) {
        document.getElementById('loginBtn').style.display = 'none';
        document.getElementById('logoutBtn').style.display = 'block';
        document.getElementById('userInfo').style.display = 'block';
        document.getElementById('userInfo').textContent = `Welcome, ${user.displayName}`;
        document.getElementById('errorMsg').style.display = 'none';
        document.getElementById('freePayContainer').style.display = 'flex';
        storeUserData(user);
      } else {
        document.getElementById('loginBtn').style.display = 'block';
        document.getElementById('logoutBtn').style.display = 'none';
        document.getElementById('userInfo').style.display = 'none';
        document.getElementById('errorMsg').style.display = 'none';
        document.getElementById('freePayContainer').style.display = 'none';
      }
    });

    document.getElementById('loginBtn').addEventListener('click', function () {
      const provider = new GoogleAuthProvider();
      signInWithPopup(auth, provider)
        .then((result) => {
          const user = result.user;
          document.getElementById('loginBtn').style.display = 'none';
          document.getElementById('logoutBtn').style.display = 'block';
          document.getElementById('userInfo').style.display = 'block';
          document.getElementById('userInfo').textContent = `Welcome, ${user.displayName}`;
          storeUserData(user);
        })
        .catch((error) => {
          displayError('Error during login: ' + error.message);
        });
    });

    document.getElementById('logoutBtn').addEventListener('click', function () {
      signOut(auth).then(() => {
        console.log('User logged out');
      }).catch((error) => {
        displayError('Error during logout: ' + error.message);
      });
    });

    function storeUserData(user) {
      const userRef = doc(db, "users", user.uid);
      setDoc(userRef, {
        email: user.email,
        displayName: user.displayName || "No Name Provided",
        lastLogin: serverTimestamp()
      }).then(() => {
        console.log('User data stored in Firestore:', user);
      }).catch((error) => {
        displayError('Error storing user data in Firestore: ' + error.message);
      });
    }
function displayError(message) {
  const errorMsgElement = document.getElementById('errorMsg');
  if (message.includes('network')) {
    errorMsgElement.textContent = 'Network error, please try again later.';
  } else {
    errorMsgElement.textContent = message;
  }
  errorMsgElement.style.display = 'block';
}

    let countdownInterval;
    let timeRemaining = 180;
    document.getElementById('freeBtn').addEventListener('click', function () {
      document.getElementById('freeBtn').disabled = true;
document.getElementById('payBtn').disabled = true;
document.getElementById('freePayContainer').style.display = 'none';
document.getElementById('countdownContainer').style.display = 'block';
  timeRemaining = 180; // Reset to 180 seconds
  updateCountdown(); // Immediately update the countdown display
  countdownInterval = setInterval(updateCountdown, 1000); // Start the countdown
});
function updateCountdown() {
  document.getElementById('timerText').textContent = timeRemaining;

  // When the 3-minute countdown ends, just replace the "Free" button with the "Start 24-Hour Countdown" button.
  if (timeRemaining <= 0) {
    clearInterval(countdownInterval); // Stop the 3-minute countdown
clearInterval(countdown24HInterval); // Ensure the previous 24-hour countdown is cleared
    document.getElementById('countdownContainer').style.display = 'none';
    document.getElementById('freePayContainer').style.display = 'flex';

    // Create and replace the button with "Start 24-Hour Countdown"
     if (!document.getElementById('freeBtn24H')) {
  const freeBtn24H = document.createElement('button');
  freeBtn24H.textContent = 'Start 24-Hour Countdown';
  freeBtn24H.id = 'freeBtn24H';
  freeBtn24H.style.backgroundColor = 'orange';
  document.getElementById('freePayContainer').replaceChild(freeBtn24H, document.getElementById('freeBtn'));
  freeBtn24H.addEventListener('click', start24HourCountdown);
}
  else {
    timeRemaining--;
  }
}
    let countdown24HInterval;
    let timeRemaining24H = 86400;
 function start24HourCountdown() {
  // Stop the 3-minute countdown
  clearInterval(countdownInterval);

  // Hide the "Free" buttons and show countdown container
  document.getElementById('freePayContainer').style.display = 'none';
  document.getElementById('countdownContainer').style.display = 'block';

  // Reset 24-hour countdown
  timeRemaining24H = 86400; // 24 hours in seconds
  update24HourCountdown(); // Immediately update the countdown display
  countdown24HInterval = setInterval(update24HourCountdown, 1000); // Start 24-hour countdown
}
    function update24HourCountdown() {
  document.getElementById('timerText').textContent = timeRemaining24H;

  if (timeRemaining24H <= 0) {
    clearInterval(countdown24HInterval); // Stop 24-hour countdown
    alert('24 hours are up!');
    
    // Hide countdown and show Free/Pay buttons
    document.getElementById('countdownContainer').style.display = 'none';
    document.getElementById('freePayContainer').style.display = 'flex';

    // Revert to the "Free" button if not already restored
    if (!document.getElementById('freeBtn')) {
      const freeBtn = document.createElement('button');
      freeBtn.textContent = 'Free';
      freeBtn.id = 'freeBtn';
      freeBtn.style.backgroundColor = 'green';
      document.getElementById('freePayContainer').replaceChild(freeBtn, document.getElementById('freeBtn24H'));
      
      freeBtn.addEventListener('click', function () {
        document.getElementById('freePayContainer').style.display = 'none';
        document.getElementById('countdownContainer').style.display = 'block';
        countdownInterval = setInterval(updateCountdown, 1000); // Restart 3-minute countdown
      });
    }
  } else {
    timeRemaining24H--;
  }
}
    document.getElementById('exitBtn').addEventListener('click', function () {
  clearInterval(countdownInterval); // Stop the 3-minute countdown
  clearInterval(countdown24HInterval); // Stop the 24-hour countdown
  document.getElementById('countdownContainer').style.display = 'none';
  document.getElementById('freePayContainer').style.display = 'flex';
});
  </script>

</body>
</html>
