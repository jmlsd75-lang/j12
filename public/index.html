<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jamal Said Kazembe Multisystem</title>

<style>
body{
  margin:0;
  font-family:Arial;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
  align-items:center;
  height:100vh;
}

/* Top */
.top{text-align:center;margin-top:10px;}
h1{color:blue;margin:0;}
h2{color:red;margin:5px 0;}
#userDisplay{font-weight:bold;}

/* Buttons */
button{
  padding:15px 40px;
  font-size:18px;
  border:none;
  border-radius:6px;
  cursor:pointer;
  color:white;
}

.login-btn{background:#28a745;}
.logout-btn{background:#dc3545; display:none;}
.free-btn{background:#28a745; display:none;}

/* Center elements */
#business-btn, #waitDiv{
  display:none;
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
}
#business-btn{background:#007bff;}
#waitDiv{font-weight:bold;}
</style>
</head>

<body>

<div class="top">
  <div id="userDisplay"></div>
  <h1>JAMAL SAID KAZEMBE</h1>
  <h2>MULTISYSTEM MANAGEMENT</h2>
</div>

<button class="free-btn">FREE</button>

<button id="business-btn">BUSINESS</button>
<div id="waitDiv"></div>

<button class="login-btn">LOGIN</button>
<button class="logout-btn">LOGOUT</button>

<script type="module" src="./login.js"></script>
<script type="module" src="./free.js"></script>

</body>
</html>
