<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Jamal Said Kazembe Multisystem Management</title>
  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #f4f4f4;
      display: flex;
      justify-content: flex-start;
      align-items: center;
      height: 100vh;
      flex-direction: column;
      padding-top: 50px;
      position: relative;
    }

    h1, h2 {
      text-align: center;
      margin: 0;
    }

    h1 {
      font-size: 40px;
      color: blue;
    }

    h2 {
      color: red;
    }

    button {
      background-color: purple;
      color: white;
      padding: 15px 30px;
      font-size: 16px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      margin-top: 20px;
    }

    button:hover {
      background-color: #7a3d9d;
    }

    #logoutBtn {
      margin-top: auto;  /* Ensures the button stays at the bottom */
      display: none;     /* Hide logout button initially */
    }

    #errorMsg {
      color: red;
      display: none;  /* Hide error message initially */
    }
  </style>
</head>
<body>

  <h1>JAMAL SAID KAZEMBE</h1>
  <h2>MULTISYSTEM MANAGEMENT</h2>
  <p id="userInfo" style="display:none;"></p>  <!-- User info will appear here if logged in -->
  <button id="loginBtn">Login</button>
  <button id="logoutBtn">Logout</button>  <!-- Logout button added here -->
  <p id="errorMsg"></p>  <!-- Error message display -->

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, setPersistence, browserLocalPersistence, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

    // Firebase configuration and initialization
    const firebaseConfig = {
      apiKey: "AIzaSyDpNJIZoLeZUhIoTepbLb_3rRLpseu9Zdo",
      authDomain: "my-project-66803-95cb3.firebaseapp.com",
      projectId: "my-project-66803-95cb3",
      storageBucket: "my-project-66803-95cb3.firebasestorage.app",
      messagingSenderId: "167159607898",
      appId: "1:167159607898:web:23ca11366b88868b085e63"
    };

    // Initialize Firebase
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    // Set session persistence to ensure the user stays logged in even after page reload
    setPersistence(auth, browserLocalPersistence)
      .catch((error) => {
        displayError('Error setting persistence: ' + error.message);
      });

    // Handle authentication state changes
    onAuthStateChanged(auth, (user) => {
      if (user) {
        document.getElementById('loginBtn').style.display = 'none';  // Hide login button
        document.getElementById('logoutBtn').style.display = 'block';  // Show logout button
        document.getElementById('userInfo').style.display = 'block';  // Show user info
        document.getElementById('userInfo').textContent = `Welcome, ${user.displayName}`;  // Display user name
        document.getElementById('errorMsg').style.display = 'none';  // Hide error message if logged in
      } else {
        document.getElementById('loginBtn').style.display = 'block';  // Show login button
        document.getElementById('logoutBtn').style.display = 'none';  // Hide logout button
        document.getElementById('userInfo').style.display = 'none';  // Hide user info
        document.getElementById('errorMsg').style.display = 'none';  // Hide error message when logged out
      }
    });

    // Add event listener for the login button
    document.getElementById('loginBtn').addEventListener('click', function () {
      const provider = new GoogleAuthProvider();

      signInWithPopup(auth, provider)
        .then((result) => {
          const user = result.user;
          console.log('User logged in:', user);

          document.getElementById('loginBtn').style.display = 'none';  // Hide login button
          document.getElementById('logoutBtn').style.display = 'block';  // Show logout button
          document.getElementById('userInfo').style.display = 'block';  // Show user info
          document.getElementById('userInfo').textContent = `Welcome, ${user.displayName}`;  // Display user name
        })
        .catch((error) => {
          displayError('Error during login: ' + error.message);
        });
    });

    // Add event listener for the logout button
    document.getElementById('logoutBtn').addEventListener('click', function () {
      signOut(auth).then(() => {
        console.log('User logged out');
      }).catch((error) => {
        displayError('Error during logout: ' + error.message);
      });
    });

    // Function to display error message
    function displayError(message) {
      const errorMsgElement = document.getElementById('errorMsg');
      errorMsgElement.textContent = message;
      errorMsgElement.style.display = 'block';
    }
  </script>

</body>
</html>
