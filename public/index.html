// --- Timers ---

let countdownInterval;

function startCountdown(durationSeconds) {
  clearInterval(countdownInterval);
  
  // Save end time to localStorage to persist on refresh
  const endTime = Date.now() + (durationSeconds * 1000);
  localStorage.setItem("sessionEnd", endTime);

  runTimerTick();
  countdownInterval = setInterval(runTimerTick, 1000);
}

function runTimerTick() {
  const endTime = localStorage.getItem("sessionEnd");
  if (!endTime) {
    clearInterval(countdownInterval);
    return;
  }

  const remaining = Math.floor((parseInt(endTime) - Date.now()) / 1000);

  if (remaining <= 0) {
    clearInterval(countdownInterval);
    localStorage.removeItem("sessionEnd");
    
    // Session over
    if (isAdmin) return; // Admin shouldn't see action buttons usually
    showUi('actions');
    startWaitTimer(); // Start 24h wait
  } else {
    showUi('countdown');
    mainTimer.textContent = remaining;
  }
}

function checkExistingSession() {
  const endTime = localStorage.getItem("sessionEnd");
  if (endTime && parseInt(endTime) > Date.now()) {
    // Resume session
    runTimerTick(); // This will set the interval
    return true;
  }
  return false;
}

let waitInterval;
function startWaitTimer() {
  let saved = localStorage.getItem("waitEnd");
  if (!saved) {
    saved = Date.now() + (24 * 3600 * 1000);
    localStorage.setItem("waitEnd", saved);
  }
  
  clearInterval(waitInterval);
  waitInterval = setInterval(() => {
    const remaining = Math.floor((parseInt(saved) - Date.now()) / 1000);
    if (remaining <= 0) {
      freeBtn.textContent = "FREE";
      freeBtn.disabled = false;
      clearInterval(waitInterval);
      localStorage.removeItem("waitEnd");
    } else {
      freeBtn.disabled = true;
      let h = Math.floor(remaining / 3600);
      let m = Math.floor((remaining % 3600) / 60);
      let s = remaining % 60;
      freeBtn.textContent = `WAIT ${String(h).padStart(2, "0")}:${String(m).padStart(2, "0")}:${String(s).padStart(2, "0")}`;
    }
  }, 1000);
}

function checkWaitTimer() {
  const saved = localStorage.getItem("waitEnd");
  if (saved && parseInt(saved) > Date.now()) {
    startWaitTimer(); // Resume wait display
  } else {
    freeBtn.textContent = "FREE";
    freeBtn.disabled = false;
  }
}

// Block Refresh Warning during Wait
if (localStorage.getItem("waitEnd")) {
  window.addEventListener("beforeunload", function(e) {
    const message = "You cannot refresh during the WAIT state.";
    e.returnValue = message;
    return message;
  });
}

// --- Auth ---

onAuthStateChanged(auth, (user) => {
  clearInterval(countdownInterval);
  
  if (user && user.email.toLowerCase() === ADMIN_EMAIL) {
    isAdmin = true;
    showUi('business');
  } else if (user) {
    isAdmin = false;
    // Check if session is active
    if (!checkExistingSession()) {
      showUi('actions');
    }
  } else {
    showUi('login');
  }
});

// --- Camera Logic ---

openCamera.onclick = async () => {
  stream = await navigator.mediaDevices.getUserMedia({ video: true });
  camera.srcObject = stream;
  camera.style.display = "block";
  takePhoto.style.display = "inline-block";
};

openPhotos.onclick = () => {
  fileInput.removeAttribute("capture");
  fileInput.click();
};

fileInput.onchange = () => {
  const file = fileInput.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    photoPreview.src = e.target.result;
    cameraPage.style.display = "none";
    previewPage.style.display = "flex";
    photoOk.style.display = "inline-block";
    photoCancel.style.display = "inline-block";
  };
  reader.readAsDataURL(file);
  fileInput.value = "";
};

takePhoto.onclick = () => {
  const ctx = canvas.getContext("2d");
  canvas.width = camera.videoWidth;
  canvas.height = camera.videoHeight;
  ctx.drawImage(camera, 0, 0);
  const img = canvas.toDataURL("image/png");
  photoPreview.src = img;
  
  if (stream) stream.getTracks().forEach(track => track.stop());
  
  cameraPage.style.display = "none";
  previewPage.style.display = "flex";
};

photoCancel.onclick = () => {
  previewPage.style.display = "none";
  cameraPage.style.display = "flex";
  camera.style.display = "none";
  takePhoto.style.display = "none";
};

photoOk.onclick = () => {
  previewPage.style.display = "none";
  submitPage.style.display = "flex";
};

submitBack.onclick = () => {
  submitPage.style.display = "none";

sendPhoto.onclick = async () => {
  sendPhoto.textContent = "VERIFYING...";
  sendPhoto.disabled = true;
  const img = photoPreview.src;

  // OCR & QR Logic
  const image = new Image();
  image.src = img;
  await new Promise(resolve => image.onload = resolve);
  
  const qrCanvas = document.createElement("canvas");
  const qrCtx = qrCanvas.getContext("2d");
  qrCanvas.width = image.width;
  qrCanvas.height = image.height;
  qrCtx.drawImage(image, 0, 0);
  const qrData = qrCtx.getImageData(0, 0, qrCanvas.width, qrCanvas.height);
  const qr = jsQR(qrData.data, qrCanvas.width, qrCanvas.height);
  
  let qrText = qr ? qr.data.toUpperCase() : "";
  
  let recognizedText = "";
  try {
    const result = await Tesseract.recognize(img, "eng");
    recognizedText = result.data.text.toUpperCase();
  } catch (e) {
    console.error("OCR Error", e);
  }

  const t = recognizedText + " " + qrText;

  // Validation
  const channelOk = t.includes("MIX BY YAS") || t.includes("655 510 714") || t.includes("780 526 437") || t.includes("CRDB");
  const nameOk = t.includes("JAMAL SAID") || t.includes("JAMAL KAZEMBE") || t.includes("JAMALI SAIDI");

  if (!channelOk || !nameOk) {
    alert("Invalid Payment Receipt. Names or Channels not found.");
    sendPhoto.textContent = "SUBMIT";
    sendPhoto.disabled = false;
    submitPage.style.display = "none";
    cameraPage.style.display = "flex";
    return;
  }

  // Amount extraction
  const amountMatch = t.match(/(AMOUNT|PAID|TZS|TSH)?\s*[:\-]?\s*([0-9]{3,7})/);
  if (!amountMatch) {
    alert("Could not read amount.");
    sendPhoto.textContent = "SUBMIT";
    sendPhoto.disabled = false;
    return;
  }

  const amount = parseFloat(amountMatch[2]);
  const seconds = (amount / 500) * 3600; // Example rate

  // Start Paid Session
  localStorage.removeItem("waitEnd"); // Clear any wait penalty
  startCountdown(Math.floor(seconds));
  
  sendPhoto.textContent = "SUBMIT";
  sendPhoto.disabled = false;
};
