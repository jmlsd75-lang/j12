<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jamal Said Kazembe Multisystem Management</title>

<style>
body {
  margin:0;
  font-family:Arial, sans-serif;
  background:#f4f4f4;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:space-between;
  height:100vh;
  text-align:center;
  padding:20px 0;
}

h1 { color:blue; margin:0; }
h2 { color:red; font-size:16px; margin-top:5px; }

#userDisplay {
  font-weight:bold;
  font-size:16px;
  color:#333;
  margin-bottom:20px;
}

/* FREE BUTTON */
.free-btn {
  background:#28a745;
  color:white;
  padding:15px 40px;
  border:none;
  border-radius:6px;
  display:none; /* initially hidden */
  cursor:pointer;
  font-size:18px;
}

/* LOGIN & LOGOUT BUTTONS (bottom center) */
.login-btn,
.logout-btn {
  padding:15px 40px;
  font-size:20px;
  border:none;
  border-radius:6px;
  color:white;
  cursor:pointer;
}

.login-btn {
  background:#28a745;
  display:block;
}

.logout-btn {
  background:#dc3545;
  display:none;
}
</style>
</head>

<body>

<div id="userDisplay"></div>

<div>
  <h1>JAMAL SAID KAZEMBE</h1>
  <h2>MULTISYSTEM MANAGEMENT</h2>
</div>

<button class="free-btn">FREE</button>
<button class="login-btn">LOGIN</button>
<button class="logout-btn">LOGOUT</button>

<!-- Scripts -->
<script type="module" src="./login.js"></script>
<script type="module" src="./free.js"></script>

</body>
</html>
