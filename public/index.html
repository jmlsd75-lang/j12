<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login System</title>
    <style>
        /* ========================================
           CSS STYLING
           ======================================== */
        :root {
            --primary-color: #4285F4; /* Google Blue */
            --primary-hover: #357ae8;
            --bg-color: #f0f2f5;
            --card-bg: #ffffff;
            --text-color: #333333;
            --error-color: #d93025;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: var(--text-color);
        }

        /* Main Card Container */
        .login-card {
            background-color: var(--card-bg);
            padding: 2.5rem;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
            text-align: center;
            transition: transform 0.3s ease;
        }

        .login-card:hover {
            transform: translateY(-5px);
        }

        h1 {
            margin-bottom: 1rem;
            color: #202124;
            font-size: 1.8rem;
        }

        p {
            margin-bottom: 2rem;
            color: #5f6368;
            font-size: 0.95rem;
            line-height: 1.5;
        }

        /* Google Login Button */
        #googleLoginBtn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background-color: var(--primary-color);
            color: white;
            border: none;
            width: 100%;
            padding: 12px 20px;
            font-size: 1rem;
            font-weight: 500;
            border-radius: 6px;
            cursor: pointer;
            transition: background-color 0.2s, opacity 0.2s;
            position: relative;
        }

        #googleLoginBtn:hover {
            background-color: var(--primary-hover);
        }

        #googleLoginBtn:disabled {
            background-color: #a0c3f7;
            cursor: not-allowed;
            opacity: 0.7;
            pointer-events: none;
        }

        /* Google Icon SVG */
        .google-icon {
            width: 20px;
            height: 20px;
            margin-right: 12px;
            fill: white;
        }

        /* Error Message Box */
        #errorMsg {
            background-color: #fce8e6;
            color: var(--error-color);
            padding: 10px;
            border-radius: 4px;
            margin-bottom: 15px;
            font-size: 0.9rem;
            display: none; /* Hidden by default */
            border: 1px solid #f5c6cb;
        }

        #errorMsg.visible {
            display: block;
            animation: fadeIn 0.3s ease-in-out;
        }

        /* Loading Overlay */
        #loadingOverlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(255, 255, 255, 0.9);
            display: none; /* Hidden by default */
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid var(--primary-color);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 15px;
        }

        #loadingText {
            font-size: 1.1rem;
            font-weight: 500;
            color: var(--text-color);
        }

        /* Animations */
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <!-- Login Interface -->
    <main class="login-card">
        <h1>Welcome Back</h1>
        <p>Please sign in with your Google account to access the system.</p>

        <!-- Error Message Container -->
        <div id="errorMsg" role="alert"></div>

        <!-- Login Button -->
        <button id="googleLoginBtn">
            <!-- Google Icon SVG -->
            <svg class="google-icon" viewBox="0 0 24 24">
                <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
                <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
            </svg>
            Sign in with Google
        </button>
    </main>

    <!-- Loading Overlay -->
    <div id="loadingOverlay">
        <div class="spinner"></div>
        <div id="loadingText">Loading...</div>
    </div>

    <!-- ========================================
         FIREBASE — ALL FROM CLOUD CDN
         ======================================== -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import {
            getAuth,
            GoogleAuthProvider,
            signInWithRedirect,
            getRedirectResult,
            onAuthStateChanged
        } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
        import {
            getFirestore,
            collection,
            addDoc,
            serverTimestamp
        } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        // ========================================
        // YOUR EXACT FIREBASE CONFIG
        // ========================================
        const firebaseConfig = {
            apiKey: "AIzaSyDpNJIZoLeZUhIoTepbLb_3rRLpseu9Zdo",
            authDomain: "my-project-66803-95cb3.firebaseapp.com",
            projectId: "my-project-66803-95cb3",
            storageBucket: "my-project-66803-95cb3.firebasestorage.app",
            messagingSenderId: "167159607898",
            appId: "1:167159607898:web:23ca11366b88868b085e63"
        };

        // ========================================
        // YOUR EXACT ADMIN EMAIL
        // ========================================
        const ADMIN_EMAIL = "camelkazembe1@gmail.com";

        // ========================================
        // INITIALIZE
        // ========================================
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        // ========================================
        // DOM
        // ========================================
        const errorMsg = document.getElementById("errorMsg");
        const loadingOverlay = document.getElementById("loadingOverlay");
        const loadingText = document.getElementById("loadingText");

        // ========================================
        // HELPERS
        // ========================================
        function showError(msg) {
            errorMsg.textContent = msg;
            errorMsg.classList.remove("hidden");
            errorMsg.classList.add("visible"); // For CSS animation
            
            // Hide after 5 seconds
            setTimeout(() => {
                errorMsg.classList.remove("visible");
                errorMsg.classList.add("hidden");
            }, 5000);
        }

        function showLoading(text) {
            loadingText.textContent = text;
            loadingOverlay.style.display = "flex";
        }

        function hideLoading() {
            loadingOverlay.style.display = "none";
        }

        // ========================================
        // SAVE LOGIN TO FIRESTORE
        // ========================================
        async function saveLogin(user) {
            if (!user) return;
            try {
                await addDoc(collection(db, "users", user.uid, "logins"), {
                    name: user.displayName,
                    email: user.email,
                    userId: user.uid,
                    createdAt: serverTimestamp()
                });
                console.log("Login saved:", user.email);
            } catch (e) {
                console.error("Save login error:", e);
            }
        }

        // ========================================
        // MAIN FLOW — sequential, no race condition
        // ========================================
        (async () => {

            // ── STEP 1: Wait for redirect result COMPLETELY ──
            let redirectResult = null;
            try {
                redirectResult = await getRedirectResult(auth);
            } catch (error) {
                hideLoading();
                console.error("Redirect result error:", error.code, error.message);

                switch (error.code) {
                    case "auth/redirect-cancelled-by-user":
                        showError("You cancelled the login. Please try again.");
                        break;
                    case "auth/credential-already-in-use":
                        showError("This account is already linked. Try again.");
                        break;
                    case "auth/network-request-failed":
                        showError("Network error. Check your connection.");
                        break;
                    case "auth/too-many-requests":
                        showError("Too many attempts. Wait a moment.");
                        break;
                    default:
                        showError("Login failed. Please try again.");
                }
                return; // Stop — don't proceed to step 2
            }

            // ── STEP 2: User just came back from Google ──
            if (redirectResult && redirectResult.user) {
                showLoading("Verifying login...");

                const user = redirectResult.user;
                console.log("Returned from Google:", user.email);
                console.log("Is admin:", user.email === ADMIN_EMAIL);

                // Save to Firestore
                await saveLogin(user);

                // ★ Flag so index.html knows this is a FRESH login ★
                sessionStorage.setItem("justLoggedIn", "1");

                // Brief pause so user sees "Verifying login..."
                await new Promise(r => setTimeout(r, 800));

                // Redirect to the main system page
                // Note: Since this file IS index.html, this might reload the page.
                // You might want to change this to 'dashboard.html' if you have one.
                window.location.href = "index.html";
                return; // Done — don't go to step 3
            }

            // ── STEP 3: No redirect result — check if already logged in ──
            await new Promise((resolve) => {
                const unsubscribe = onAuthStateChanged(auth, (user) => {
                    unsubscribe(); // Stop listening immediately

                    if (user) {
                        // Already logged in — send to index.html
                        console.log("Already authenticated:", user.email);
                        showLoading("Welcome back!");
                        setTimeout(() => {
                            window.location.href = "index.html";
                        }, 1200);
                    } else {
                        // User is NOT logged in, show the login button
                        hideLoading();
                    }

                    resolve();
                });
            });

        })();

        // ========================================
        // BUTTON CLICK → SEND TO GOOGLE
        // ========================================
        window.addEventListener("DOMContentLoaded", () => {
            const googleBtn = document.getElementById("googleLoginBtn");

            if (!googleBtn) {
                console.error("googleLoginBtn not found in HTML");
                return;
            }

            googleBtn.addEventListener("click", () => {
                console.log("CLICK WORKING");

                googleBtn.disabled = true;
                googleBtn.style.opacity = "0.5";
                googleBtn.style.pointerEvents = "none";

                showLoading("Redirecting to Google...");

                signInWithRedirect(auth, provider);
            });
        });
    </script>
</body>
</html>
