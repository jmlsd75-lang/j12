<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jamal Said Kazembe Multisystem Management</title>
<style>
  body{
    margin:0;
    font-family:Arial, sans-serif;
    background:#f4f4f4;
    display:flex;
    flex-direction:column;
    justify-content:flex-start;
    align-items:center;
    min-height:100vh;
    text-align:center;
    padding-top:20px;
  }
  h1{ font-size:32px; color:blue; margin:0; }
  h2{ color:red; margin-top:5px; font-size:18px; }

  /* Pages Layout */
  #cameraPage, #txForm, #businessPage, #viewButtonsPage, #previewPage, #submitPage {
    display:none; flex-direction:column; align-items:center; justify-content:center; gap:15px;
    width:100%; padding:20px; box-sizing:border-box;
  }
  #countdownPage{
    display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:white;
    justify-content:center; align-items:center; flex-direction:column; font-size:40px;
    font-weight:bold; z-index: 999;
  }

  /* Buttons Styling */
  /* CHANGE: Login button hidden by default */
  .login-btn{
    display: none; /* Hidden until JS confirms user is NOT logged in */
    margin-top:100px; padding:15px 40px; font-size:20px;
    background:#28a745; color:white; border:none; border-radius:6px; cursor:pointer;
  }
  
  .free-btn, .pay-btn{
    width:140px; padding:15px 0; font-size:18px; border:none; border-radius:6px; cursor:pointer;
  }
  .free-btn{ background:#28a745; color:white; }
  .free-btn:disabled { background:#6c757d; cursor:not-allowed; opacity:0.7; }
  .pay-btn{ background:#007bff; color:white; }

  .action-buttons{
    margin-top:80px; display:none; gap:20px; justify-content:center;
  }

  /* CHANGE: Logout button hidden by default, JS will show it if logged in */
  .logout-btn{
    display: none; /* Hidden by default */
    background:#dc3545; color:white; border:none; padding:10px 25px;
    border-radius:6px; cursor:pointer; position:absolute; bottom:20px; font-size:16px;
  }

  /* Business & View Buttons */
  #businessPage button, #viewButtonsPage button {
    font-size:18px; padding:15px 30px; width:90%; max-width:300px;
    border:none; border-radius:8px; cursor:pointer; margin:5px 0;
  }
  #addTx{ background:#28a745; color:white; }
  #viewTx{ background:#007bff; color:white; }
  #businessExit{ background:#dc3545; color:white; }
  
  /* View List Buttons */
  #cashBookBtn { background:#d4edda; color:#155724; border:1px solid #c3e6cb; }
  #ledgersBtn { background:#d1ecf1; color:#0c5460; border:1px solid #bee5eb; }
  #trialBalanceBtn { background:#f8d7da; color:#721c24; border:1px solid #f5c6cb; }
  #incomeStatementBtn { background:#fff3cd; color:#856404; border:1px solid #ffeeba; }
  #balanceSheetBtn { background:#e2d6f8; color:#563d7c; border:1px solid #d6d6f8; }
  #backFromViewBtn { background:#dc3545; color:white; margin-top:20px; }

  /* Camera & Payment Styling */
  #cameraPage button { font-size:18px; padding:12px 25px; }
  #openCamera{ background:#28a745; color:white; }
  #openPhotos{ background:#17a2b8; color:white; }
  #cameraBack{ background:#dc3545; color:white; }
  #photoOk, #sendPhoto{ background:#6f42c1; color:white; }
  #photoCancel, #submitBack{ background:#dc3545; color:white; }

  #paymentPage{ display:none; margin-top:50px; text-align:center; padding:20px; }
  #paymentPage div { margin-bottom: 10px; }
  #backBtn, #nextBtn{ padding:15px 40px; font-size:20px; border:none; border-radius:10px; cursor:pointer; margin:15px; }
  #backBtn{ background:#dc3545; color:white; }
  #nextBtn{ background:#6f42c1; color:white; }

  /* Transaction Form */
  #txDesc, #txAmount {
    font-size:18px; padding:12px; text-align:center; width:80%; max-width:300px;
    border:1px solid #ccc; border-radius:5px;
  }
  #inBtn { background:#28a745; color:white; padding:10px 20px; border:none; border-radius:6px; cursor:pointer; }
  #outBtn { background:#dc3545; color:white; padding:10px 20px; border:none; border-radius:6px; cursor:pointer; }
  .method { margin:5px; padding:10px 15px; cursor:pointer; border-radius:5px; border:1px solid #ccc; background:white; }
  
  .view-grid { display:flex; flex-wrap:wrap; justify-content:center; gap:10px; width:100%; padding:10px; }
</style>
</head>
<body>

<h1>JAMAL SAID KAZEMBE</h1>
<h2>MULTISYSTEM MANAGEMENT</h2>

<!-- Countdown Page -->
<div id="countdownPage">
  <div id="mainTimer">180</div>
  <div style="margin-top:40px; display:flex; gap:20px;">
    <button id="businessBtn">BUSINESS</button>
    <button id="exitBtn">EXIT</button>
  </div>
</div>

<!-- Login Button (Hidden by default) -->
<button class="login-btn">LOGIN</button>

<!-- Logout Button (Hidden by default, shown by JS if user exists) -->
<button class="logout-btn">LOGOUT</button>

<div class="action-buttons">
  <button class="free-btn">FREE</button>
  <button class="pay-btn">PAY</button>
</div>

<!-- Camera Page -->
<div id="cameraPage">
  <button id="openCamera">OPEN CAMERA</button>
  <button id="openPhotos">UPLOAD PHOTOS</button>
  <video id="camera" width="100%" style="max-width:400px; display:none;" autoplay></video>
  <canvas id="canvas" style="display:none;"></canvas>
  <button id="takePhoto" style="display:none;">TAKE PHOTO</button>
  <button id="cameraBack">BACK</button>
</div>

<!-- Preview Page -->
<div id="previewPage">
  <h3>Preview</h3>
  <img id="photoPreview" width="100%" style="max-width:400px; border:1px solid #ccc;">
  <div>
    <button id="photoOk">OK</button>
    <button id="photoCancel">CANCEL</button>
  </div>
</div>

<!-- Submit Page -->
<div id="submitPage">
  <h3>Ready to Submit?</h3>
  <p>Verify your payment details are correct.</p>
  <button id="sendPhoto">VERIFY PAYMENT</button>
  <button id="submitBack">BACK</button>
  <input type="file" id="fileInput" accept="image/*" style="display:none">
</div>

<!-- Payment Page -->
<div id="paymentPage">
  <div style="color:purple; font-size:24px;">Pay through</div>
  <div style="color:green; font-size:24px;">Mix by Yas</div>
  <div style="color:blue; font-size:24px;">+255 655 510 714</div>
  <div style="color:red; font-size:24px;">Airtel Money</div>
  <div style="color:orange; font-size:24px;">+255 780 526 437</div>
  <div style="color:brown; font-size:24px;">CRDB Bank</div>
  <div style="color:black; font-size:24px;">0152001GN6K00</div>
  <div style="color:teal; font-size:24px;">Jamali Saidi Kazembe</div>
  <div style="margin-top:40px;">
    <button id="backBtn">BACK</button>
    <button id="nextBtn">NEXT</button>
  </div>
</div>

<!-- Business Page (Main Menu) -->
<div id="businessPage">
  <button id="addTx">ADD NEW TRANSACTION</button>
  <button id="viewTx">VIEW REPORTS</button>
  <button id="businessExit">EXIT</button>
</div>

<!-- View Buttons Page -->
<div id="viewButtonsPage">
  <div class="view-grid">
    <button id="listBtn">LIST</button> 
    <button id="cashBookBtn">CASH BOOK</button>
    <button id="ledgersBtn">LEDGERS</button>
    <button id="trialBalanceBtn">TRIAL BALANCE</button>
    <button id="incomeStatementBtn">INCOME STATEMENT</button>
    <button id="balanceSheetBtn">BALANCE SHEET</button>
  </div>
  <button id="backFromViewBtn">BACK</button>
</div>

<!-- Transaction Form -->
<div id="txForm">
  <h3>New Transaction</h3>
  <input id="txDesc" placeholder="Description"><br><br>
  <input id="txAmount" type="number" placeholder="Amount" style="display:none;"><br><br>
  <div id="txType" style="display:none;">
    <button id="inBtn">IN</button>
    <button id="outBtn">OUT</button>
  </div><br>
  <div id="txMethod" style="display:none;">
    <button class="method">CASH</button>
    <button class="method">CREDIT</button>
    <button class="method">BANK</button>
  </div><br>
  <div id="txActions">
    <button id="okTx" style="display:none;">SAVE</button>
    <button id="cancelTx">CANCEL</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/jsqr/dist/jsQR.js"></script>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

// --- Firebase Config ---
const firebaseConfig = {
  apiKey: "AIzaSyDpNJIZoLeZUhIoTepbLb_3rRLpseu9Zdo",
  authDomain: "my-project-66803-95cb3.firebaseapp.com",
  projectId: "my-project-66803-95cb3",
  storageBucket: "my-project-66803-95cb3.firebasestorage.app",
  messagingSenderId: "167159607898",
  appId: "1:167159607898:web:23ca11366b88868b085e63"
};

const ADMIN_EMAIL = "camelkazembe1@gmail.com";

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);
const provider = new GoogleAuthProvider();

let isAdmin = false;
let currentUser = null; 
let stream = null;

// --- DOM Elements ---
const systemName1 = document.querySelector("h1");
const systemName2 = document.querySelector("h2");
const loginBtn = document.querySelector(".login-btn");
const logoutBtn = document.querySelector(".logout-btn");
const actionBtns = document.querySelector(".action-buttons");
const freeBtn = document.querySelector(".free-btn");
const payBtn = document.querySelector(".pay-btn");

const countdownPage = document.getElementById("countdownPage");
const mainTimer = document.getElementById("mainTimer");
const businessBtn = document.getElementById("businessBtn");
const exitBtn = document.getElementById("exitBtn");

const paymentPage = document.getElementById("paymentPage");
const backBtn = document.getElementById("backBtn");
const nextBtn = document.getElementById("nextBtn");

const businessPage = document.getElementById("businessPage");
const businessExit = document.getElementById("businessExit");
const viewTx = document.getElementById("viewTx");
const viewButtonsPage = document.getElementById("viewButtonsPage");
const backFromViewBtn = document.getElementById("backFromViewBtn");

const cameraPage = document.getElementById("cameraPage");
const camera = document.getElementById("camera");
const canvas = document.getElementById("canvas");
const takePhoto = document.getElementById("takePhoto");
const openCamera = document.getElementById("openCamera");
const openPhotos = document.getElementById("openPhotos");
const cameraBack = document.getElementById("cameraBack");

const previewPage = document.getElementById("previewPage");
const photoPreview = document.getElementById("photoPreview");
const photoOk = document.getElementById("photoOk");
const photoCancel = document.getElementById("photoCancel");

const submitPage = document.getElementById("submitPage");
const sendPhoto = document.getElementById("sendPhoto");
const submitBack = document.getElementById("submitBack");
const fileInput = document.getElementById("fileInput");

const txForm = document.getElementById("txForm");
const txDesc = document.getElementById("txDesc");
const txAmount = document.getElementById("txAmount");
const txType = document.getElementById("txType");
const txMethod = document.getElementById("txMethod");
const okTx = document.getElementById("okTx");
const cancelTx = document.getElementById("cancelTx");
const addTx = document.getElementById("addTx");

// --- Helper Functions ---

function stopCamera() {
  if (stream) {
    stream.getTracks().forEach(track => track.stop());
    stream = null;
    camera.style.display = "none";
    takePhoto.style.display = "none";
  }
}

function showUi(page) {
  // Hide all pages
  const pages = [countdownPage, actionBtns, paymentPage, businessPage, viewButtonsPage, cameraPage, previewPage, submitPage, txForm];
  pages.forEach(p => p.style.display = "none");

  systemName1.style.display = "block";
  systemName2.style.display = "block";
  stopCamera();

  // --- SMART LOGIN BUTTON LOGIC ---
  // This runs every time UI changes. 
  // If user exists, show Logout. If not, show Login.
  if (currentUser) {
    loginBtn.style.display = "none";
    logoutBtn.style.display = "block";
  } else {
    loginBtn.style.display = "block";
    logoutBtn.style.display = "none";
  }

  if (page === 'actions') {
    actionBtns.style.display = "flex";
    checkWaitTimer();
  } else if (page === 'countdown') {
    countdownPage.style.display = "flex";
    systemName1.style.display = "none";
    systemName2.style.display = "none";
  } else if (page === 'business') {
    businessPage.style.display = "flex";
    systemName1.style.display = "none";
    systemName2.style.display = "none";
  } else if (page === 'payment') {
    paymentPage.style.display = "block";
    systemName1.style.display = "none";
    systemName2.style.display = "none";
  } else if (page === 'camera') {
    cameraPage.style.display = "flex";
  }
}

// --- Timer Logic ---

let countdownInterval;
let waitInterval;

function startCountdown(durationSeconds) {
  clearInterval(countdownInterval);
  const endTime = Date.now() + (durationSeconds * 1000);
  localStorage.setItem("sessionEnd", endTime);
  runTimerTick();
  countdownInterval = setInterval(runTimerTick, 1000);
}

function runTimerTick() {
  const endTime = localStorage.getItem("sessionEnd");
  if (!endTime) { clearInterval(countdownInterval); return; }

  const remaining = Math.floor((parseInt(endTime) - Date.now()) / 1000);

  if (remaining <= 0) {
    clearInterval(countdownInterval);
    localStorage.removeItem("sessionEnd");
    if (!isAdmin) {
      showUi('actions');
      startWaitTimer(); 
    }
  } else {
    showUi('countdown');
    mainTimer.textContent = remaining;
  }
}

function checkExistingSession() {
  const endTime = localStorage.getItem("sessionEnd");
  if (endTime && parseInt(endTime) > Date.now()) {
    runTimerTick(); 
    return true;
  }
  return false;
}

function startWaitTimer() {
  let saved = localStorage.getItem("waitEnd");
  if (!saved) {
    saved = Date.now() + (24 * 3600 * 1000); 
    localStorage.setItem("waitEnd", saved);
  }
  
  clearInterval(waitInterval);
  waitInterval = setInterval(() => {
    const remaining = Math.floor((parseInt(saved) - Date.now()) / 1000);
    if (remaining <= 0) {
      freeBtn.textContent = "FREE";
      freeBtn.disabled = false;
      clearInterval(waitInterval);
      localStorage.removeItem("waitEnd");
    } else {
      freeBtn.disabled = true;
      let h = Math.floor(remaining / 3600);
      let m = Math.floor((remaining % 3600) / 60);
      let s = remaining % 60;
      freeBtn.textContent = `WAIT ${String(h).padStart(2, "0")}:${String(m).padStart(2, "0")}:${String(s).padStart(2, "0")}`;
    }
  }, 1000);
}

function checkWaitTimer() {
  const saved = localStorage.getItem("waitEnd");
  if (saved && parseInt(saved) > Date.now()) {
    startWaitTimer(); 
  } else {
    freeBtn.textContent = "FREE";
    freeBtn.disabled = false;
  }
}

// --- Auth Logic ---
// This runs automatically when the page loads or refreshes
onAuthStateChanged(auth, (user) => {
  clearInterval(countdownInterval);
  clearInterval(waitInterval);
  currentUser = user; // Update global user state

  if (user && user.email.toLowerCase() === ADMIN_EMAIL) {
    isAdmin = true;
    showUi('business');
  } else if (user) {
    isAdmin = false;
    if (!checkExistingSession()) {
      showUi('actions');
    }
  } else {
    // User is NOT logged in, show Login button
    showUi('login'); 
  }
});

loginBtn.onclick = async () => {
  try { await signInWithPopup(auth, provider); } catch (e) { console.error(e); }
};

logoutBtn.onclick = async () => {
  localStorage.removeItem("sessionEnd");
  localStorage.removeItem("waitEnd");
  currentUser = null;
  await signOut(auth);
};

// --- Navigation ---

exitBtn.onclick = async () => {
  localStorage.removeItem("sessionEnd");
  await signOut(auth);
};

businessBtn.onclick = () => showUi('business');

businessExit.onclick = () => {
  if (isAdmin) signOut(auth);
  else showUi('countdown'); 
};

freeBtn.onclick = () => {
  if (freeBtn.textContent.startsWith("WAIT")) return;
  startCountdown(180);
};

payBtn.onclick = () => showUi('payment');

backBtn.onclick = () => showUi('actions');

nextBtn.onclick = () => showUi('camera');

cameraBack.onclick = () => {
  stopCamera();
  if (localStorage.getItem("sessionEnd")) showUi('countdown');
  else showUi('payment');
};

// --- Camera Logic ---

openCamera.onclick = async () => {
  try {
    stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
    camera.srcObject = stream;
    camera.style.display = "block";
    takePhoto.style.display = "inline-block";
  } catch (err) {
    alert("Could not access camera.");
  }
};

openPhotos.onclick = () => {
  stopCamera();
  fileInput.removeAttribute("capture");
  fileInput.click();
};

fileInput.onchange = () => {
  const file = fileInput.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    photoPreview.src = e.target.result;
    showUi('preview');
    document.getElementById('previewPage').style.display = 'flex';
  };
  reader.readAsDataURL(file);
  fileInput.value = "";
};

takePhoto.onclick = () => {
  const ctx = canvas.getContext("2d");
  canvas.width = camera.videoWidth;
  canvas.height = camera.videoHeight;
  ctx.drawImage(camera, 0, 0);
  const img = canvas.toDataURL("image/png");
  photoPreview.src = img;
  
  stopCamera();
  showUi('preview');
  document.getElementById('previewPage').style.display = 'flex';
};

photoCancel.onclick = () => {
  showUi('camera');
  document.getElementById('cameraPage').style.display = 'flex';
};

photoOk.onclick = () => {
  showUi('submit');
  document.getElementById('submitPage').style.display = 'flex';
};

submitBack.onclick = () => {
  showUi('preview');
  document.getElementById('previewPage').style.display = 'flex';
};

sendPhoto.onclick = async () => {
  sendPhoto.textContent = "VERIFYING...";
  sendPhoto.disabled = true;
  const img = photoPreview.src;

  const image = new Image();
  image.src = img;
  await new Promise(resolve => image.onload = resolve);
  
  const qrCanvas = document.createElement("canvas");
  const qrCtx = qrCanvas.getContext("2d");
  qrCanvas.width = image.width;
  qrCanvas.height = image.height;
  qrCtx.drawImage(image, 0, 0);
  const qrData = qrCtx.getImageData(0, 0, qrCanvas.width, qrCanvas.height);
  const qr = jsQR(qrData.data, qrCanvas.width, qrCanvas.height);
  
  let qrText = qr ? qr.data.toUpperCase() : "";
  
  let recognizedText = "";
  try {
    const result = await Tesseract.recognize(img, "eng");
    recognizedText = result.data.text.toUpperCase();
  } catch (e) { console.error("OCR Error", e); }

  const fullText = recognizedText + " " + qrText;

  const channelOk = fullText.includes("MIX BY YAS") || fullText.includes("655 510 714") || fullText.includes("780 526 437") || fullText.includes("CRDB");
  const nameOk = fullText.includes("JAMAL SAID") || fullText.includes("JAMAL KAZEMBE") || fullText.includes("JAMALI SAIDI");

  if (!channelOk || !nameOk) {
    alert("Validation Failed: Could not verify payment details.");
    sendPhoto.textContent = "SUBMIT";
    sendPhoto.disabled = false;
    showUi('camera');
    document.getElementById('cameraPage').style.display = 'flex';
    return;
  }

  const amountMatch = fullText.match(/(AMOUNT|PAID|TZS|TSH)?\s*[:\-]?\s*([0-9]{3,7})/);
  if (!amountMatch) {
    alert("Could not read amount.");
    sendPhoto.textContent = "SUBMIT";
    sendPhoto.disabled = false;
    return;
  }

  const amount = parseFloat(amountMatch[2]);
  const seconds = (amount / 500) * 3600; 

  if(confirm(`Detected Amount: ${amount}\nTime added: ${Math.floor(seconds/60)} minutes.\nProceed?`)) {
    localStorage.removeItem("waitEnd"); 
    startCountdown(Math.floor(seconds));
    sendPhoto.textContent = "SUBMIT";
    sendPhoto.disabled = false;
  } else {
    sendPhoto.textContent = "SUBMIT";
    sendPhoto.disabled = false;
  }
};

// --- Business Logic ---

addTx.onclick = () => {
  showUi('txForm');
  txForm.style.display = 'flex';
  txDesc.value = "";
  txAmount.value = "";
  txAmount.style.display = "none";
  txType.style.display = "none";
  txMethod.style.display = "none";
  okTx.style.display = "none";
};

let direction = "";
let method = "";

txDesc.oninput = () => { if(txDesc.value.length > 0) txAmount.style.display = "block"; };
txAmount.oninput = () => { if(txAmount.value.length > 0) txType.style.display = "block"; };

document.getElementById("inBtn").onclick = () => { direction = "IN"; txMethod.style.display = "block"; };
document.getElementById("outBtn").onclick = () => { direction = "OUT"; txMethod.style.display = "block"; };

document.querySelectorAll(".method").forEach(btn => {
  btn.onclick = () => {
    method = btn.textContent;
    okTx.style.display = "inline-block";
  };
});

okTx.onclick = () => {
  const data = {
    desc: txDesc.value,
    amount: parseFloat(txAmount.value),
    dir: direction,
    method: method,
    timestamp: Date.now()
  };
  console.log("Saving Transaction:", data);
  alert("Transaction Saved (Local Log)");
  showUi('business');
};

cancelTx.onclick = () => showUi('business');

// --- View Logic ---

viewTx.onclick = () => {
  showUi('view');
  viewButtonsPage.style.display = 'flex';
};

backFromViewBtn.onclick = () => showUi('business');

document.getElementById("listBtn").onclick = () => alert("List View: Requires DB query implementation");
document.getElementById("cashBookBtn").onclick = () => alert("Cash Book: Requires DB query implementation");
document.getElementById("ledgersBtn").onclick = () => alert("Ledgers: Requires DB query implementation");
document.getElementById("trialBalanceBtn").onclick = () => alert("Trial Balance: Requires calculation logic");
document.getElementById("incomeStatementBtn").onclick = () => alert("Income Statement: Requires calculation logic");
document.getElementById("balanceSheetBtn").onclick = () => alert("Balance Sheet: Requires calculation logic");

</script>
</body>
</html>
