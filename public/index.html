function startCountdown(){

exitBtn.style.display="inline-block";

const timer = setInterval(()=>{
mainTimer.textContent = time;
time--;

countdownPage.style.display="none";
exitBtn.style.display="none";
businessBtn.style.display="none";
actionBtns.style.display="flex";
startWaitTimer(); // start 24 hour WAIT
}
},1000);
}
function startWaitTimer(){
const waitBtn = document.querySelector(".free-btn");
let saved = localStorage.getItem("waitEnd");
if(!saved){
  saved = Date.now() + (24*3600*1000);
  localStorage.setItem("waitEnd", saved);
}
clearInterval(waitInterval);
waitInterval = setInterval(()=>{
  const remaining = Math.floor((saved - Date.now())/1000);
  if(remaining <= 0){
    waitBtn.textContent = "FREE";
    waitBtn.disabled = false;   // user can click again
    clearInterval(waitInterval);
    localStorage.removeItem("waitEnd");
  }else{
    waitBtn.disabled = true;    // prevent clicking
    let h = Math.floor(remaining / 3600);
    let m = Math.floor((remaining % 3600) / 60);
    let s = remaining % 60;
    waitBtn.textContent =
    `WAIT ${String(h).padStart(2,"0")}:${String(m).padStart(2,"0")}:${String(s).padStart(2,"0")}`;
  }
},1000);
}

sendPhoto.onclick = async () => {
sendPhoto.textContent="PLEASE WAIT...";
sendPhoto.disabled=true;
const img = photoPreview.src;
/* READ QR CODE */
const image = new Image();
image.src = img;
await new Promise(resolve => image.onload = resolve);
const qrCanvas = document.createElement("canvas");
const qrCtx = qrCanvas.getContext("2d");
qrCanvas.width = image.width;
qrCanvas.height = image.height;
qrCtx.drawImage(image,0,0);
const qrData = qrCtx.getImageData(0,0,qrCanvas.width,qrCanvas.height);
const qr = jsQR(qrData.data, qrCanvas.width, qrCanvas.height);
let qrText = "";
if(qr){
qrText = qr.data.toUpperCase();
}
/* READ TEXT */
const { data:{ text } } = await Tesseract.recognize(img,"eng");
const t = (text + " " + qrText).toUpperCase();
/* CHANNEL CHECK */
const channel =
t.includes("MIX BY YAS") ||
t.includes("655 510 714") ||
t.includes("780 526 437") ||
t.includes("CRDB BANK") ||
t.includes("0152001GN6K00");
/* NAME CHECK */
const name =
t.includes("JAMAL SAID") ||
t.includes("JAMAL KAZEMBE") ||
t.includes("JAMAL SAID KAZEMBE");
if(!channel || !name){if(stream && stream.getTracks){
stream.getTracks().forEach(track => track.stop());
}
submitPage.style.display="none";
actionBtns.style.display="flex";
photoPreview.style.display="block";
sendPhoto.textContent="SUBMIT";
sendPhoto.disabled=false;
return;
}
/* GET AMOUNT */
const amountMatch = t.match(/(AMOUNT|PAID|TZS|TSH|USD|EUR|GBP|KES|UGX|RWF|BIF|ZAR|NGN|GHS|EGP|MAD|DZD|TND|AED|SAR|QAR|KWD|OMR|INR|PKR|BDT|CNY|JPY|KRW|SGD|MYR|THB|IDR|AUD|NZD|CAD|MXN|BRL|ARS|CLP|COP|PEN|VES|RUB|TRY|PLN|SEK|NOK|DKK|CHF|CZK|HUF|ILS)?\s*[:\-]?\s*([0-9]{3,7})/);
if(!amountMatch){if(stream && stream.getTracks){
stream.getTracks().forEach(track => track.stop());
}
submitPage.style.display="none";
actionBtns.style.display="flex";
sendPhoto.textContent="SUBMIT";
sendPhoto.disabled=false;
return;
}
let amount = parseFloat(amountMatch[2]);
/* TIME FORMULA */
let seconds = (amount / 500) * 3600;
/* START COUNTDOWN */
submitPage.style.display="none";
countdownPage.style.display="flex";
let time = Math.floor(seconds);
const timer = setInterval(()=>{
mainTimer.textContent = time;
time--;
if(time < 0){
clearInterval(timer);
countdownPage.style.display="none";
actionBtns.style.display="flex";
}
},1000);
};
