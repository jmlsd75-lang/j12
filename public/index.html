<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

const firebaseConfig = {
  apiKey: "AIzaSyDpNJIZoLeZUhIoTepbLb_3rRLpseu9Zdo",
  authDomain: "my-project-66803-95cb3.firebaseapp.com",
  projectId: "my-project-66803-95cb3",
  storageBucket: "my-project-66803-95cb3.firebasestorage.app",
  messagingSenderId: "167159607898",
  appId: "1:167159607898:web:23ca11366b88868b085e63"
};
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);
const provider = new GoogleAuthProvider();
const ADMIN_EMAIL = "camelkazembe1@gmail.com";
let isAdmin = false;
const loginBtn = document.querySelector(".login-btn");
const logoutBtn = document.querySelector(".logout-btn");

const selectedButtons = document.getElementById("selectedButtons");
document.getElementById("addTransactionBtn").onclick = () => {
  showPage('transaction');
};
const typeButtons = document.getElementById("typeButtons");
const methodButtons = document.getElementById("methodButtons");
const finalButtons = document.getElementById("finalButtons");
let detail = "";
let amount = "";
let type = "";
let method = "";
detail = "";
amount = "";
type = "";
method = "";
detailInput.value = "";
amountInput.value = "";
detailInput.style.display = "block";
amountInput.style.display = "none";
typeButtons.style.display = "none";
methodButtons.style.display = "none";
finalButtons.style.display = "none";
selectedButtons.innerHTML = "";
let transactions = [];
detailInput.oninput = () => {
  if (detailInput.value.trim().length > 0) {
    amountInput.style.display = "block";
  }
};
amountInput.oninput = () => {
  if (amountInput.value.trim().length > 0) {
    typeButtons.style.display = "flex";
  }
};
document.getElementById("inBtn").onclick = () => selectType("IN");
document.getElementById("outBtn").onclick = () => selectType("OUT");
document.getElementById("viewBtn").onclick = () => {
  showPage('view');
};
function selectType(t) {
  detail = detailInput.value;
  amount = amountInput.value;
  type = t;
  updateButtons();
  typeButtons.style.display = "none";
  methodButtons.style.display = "flex";
}
// STEP 4 → PAYMENT
document.getElementById("cashBtn").onclick = () => selectMethod("CASH");
document.getElementById("creditBtn").onclick = () => selectMethod("CREDIT");
document.getElementById("bankBtn").onclick = () => selectMethod("BANK");
function selectMethod(m) {
  method = m;
  updateButtons();
  methodButtons.style.display = "none";
  finalButtons.style.display = "flex";
}
// SHOW BUTTONS
function updateButtons() {
  selectedButtons.innerHTML = "";
  if (detail) {
    selectedButtons.innerHTML += `<button style="background:#007bff;color:white;">${detail}</button>`;
    detailInput.style.display = "none";
  }
  if (amount) {
    selectedButtons.innerHTML += `<button style="background:#6f42c1;color:white;">${amount}</button>`;
    amountInput.style.display = "none";
  }
  if (type) {
    selectedButtons.innerHTML += `<button style="background:${type==="IN"?"#28a745":"#fd7e14"};color:white;">${type}</button>`;
  }
  if (method) {
    selectedButtons.innerHTML += `<button style="background:#20c997;color:white;">${method}</button>`;
  }
}
document.getElementById("okBtn").onclick = async () => {
  const user = auth.currentUser;
  if (!user) return;
  const transaction = {
    date: new Date().toLocaleString(),
    detail,
    type,
    method,
    amount: Number(amount),
    createdAt: Date.now()
  };
  await addDoc(
    collection(db, "users", user.email, "transactions"),
    transaction
  );
  alert("Saved!");
  showPage("business");
};
document.getElementById("cancelTransBtn").onclick = () => {
  showPage("business");
};
let selectedFile = null;
let currentMode = "";
let timerInterval = null;
// --- Auth Logic ---
onAuthStateChanged(auth, (user) => {
  if (user) {
    isAdmin = user.email === ADMIN_EMAIL;
    userDisplay.textContent = user.displayName;
    userDisplay.style.display = "block";
    // ✅ SHOW logout only when logged in
    logoutBtn.style.display = "none";
    if (isAdmin) {
      showPage('timer');
      timerDisplay.textContent = "UNLIMITED";
      timerStatus.textContent = "Admin Access";
      timerButtons.style.display = "flex";
    } else {
      showPage('main');
    }
    // hide login
    loginBtn.style.display = "none";
  } else {
    isAdmin = false;
    // ✅ HIDE logout when NOT logged in
    logoutBtn.style.display = "none";
    userDisplay.style.display = "none";
    // show login
    loginBtn.style.display = "block";
    payBtn.style.display = "none";
    accessBtn.style.display = "none";
  }
});
loginBtn.onclick = async () => { try { await signInWithPopup(auth, provider); } catch (e) { alert("Login failed"); } };
logoutBtn.onclick = async () => { clearInterval(timerInterval); localStorage.removeItem("sessionEnd"); await signOut(auth); showPage('main'); };
accessBtn.onclick = () => { 
  accessBtn.style.display = "none"; // 👈 hide button after click
  startTimerFromStorage(); 
  showPage('business'); 
};
function showPage(page) {
  logoutBtn.style.display = "none";
  document.getElementById("viewPage").style.display = "none";
document.getElementById("cashBookContainer").style.display = "none";
document.getElementById("listTableContainer").style.display = "none";
  document.getElementById("transactionPage").style.display = "none";
  payPage.style.display = "none"; 
  cameraMenuPage.style.display = "none"; 
  previewPage.style.display = "none"; 
  timerPage.style.display = "none";
  businessPage.style.display = "none";
  logoutBtn.style.display = "none";
  if(page === 'main' && auth.currentUser) {
    userDisplay.style.display = "block";
    const endTime = localStorage.getItem("sessionEnd");
    if (endTime && Date.now() < parseInt(endTime)) { 
      accessBtn.style.display = "block"; 
    } else { 
      payBtn.style.display = "block"; 
    }
  }
 else if (page === 'preview') {
  previewPage.style.display = "flex";
}
  else if (page === 'business') { 
    businessPage.style.display = "flex";
    logoutBtn.style.display = "block";
    businessPage.style.flexDirection = "column";
    businessPage.style.justifyContent = "center";
    businessPage.style.alignItems = "center";
  }
  else if (page === 'view') {
    const vp = document.getElementById("viewPage");
    vp.style.display = "flex";
    vp.style.flexDirection = "column";
    vp.style.justifyContent = "center";
    vp.style.alignItems = "center";
  }
  else if (page === 'transaction') {
    document.getElementById("transactionPage").style.display = "flex";
    document.getElementById("viewPage").style.display = "none";
  }
else if (page === 'timer') { 
  timerPage.style.display = "flex"; 
  userDisplayTimer.textContent = auth.currentUser ? auth.currentUser.displayName : "User"; 
  logoutBtn.style.display = "block";
}
}
payBtn.onclick = () => showPage('pay');
backBtn.onclick = () => showPage('main');
nextBtn.onclick = () => showPage('camera');
backFromCameraBtn.onclick = () => showPage('main');
// --- Camera & Photos Logic ---
openCameraBtn.onclick = () => cameraInput.click();
openPhotosBtn.onclick = () => photosInput.click();
function handleFile(file) {
  if (!file) { showPage('main'); return; }
  selectedFile = file;
  const reader = new FileReader();
  reader.onload = (e) => { 
  previewImage.src = e.target.result; 
  showPage('preview'); 
  // ✅ MOVE HERE
  submitBtn.style.display = "inline-block";
  cancelBtn.style.display = "inline-block";
};
  reader.readAsDataURL(file);
  cameraInput.value = ""; photosInput.value = "";
}
cameraInput.onchange = (e) => handleFile(e.target.files[0]);
photosInput.onchange = (e) => handleFile(e.target.files[0]);
cancelBtn.onclick = () => { 
  selectedFile = null; 
  previewImage.src = ""; 
  showPage('business'); // 👈 FIXED
};
// --- Timer Logic ---
function startTimer(seconds) {
  if (isAdmin) return;
  clearInterval(timerInterval);
  const endTime = Date.now() + seconds * 1000;
  localStorage.setItem("sessionEnd", String(endTime));
  timerInterval = setInterval(() => {
    const remaining = Math.max(0, Math.floor((endTime - Date.now()) / 1000));
    if (remaining <= 0) {
      clearInterval(timerInterval); timerDisplay.textContent = "00:00:00"; timerStatus.textContent = "Session Expired";
      localStorage.removeItem("sessionEnd"); setTimeout(() => { showPage('main'); timerButtons.style.display = "none"; }, 2000);
      return;
    }
    const hrs = Math.floor(remaining / 3600);
const mins = Math.floor((remaining % 3600) / 60);
const secs = remaining % 60;
timerDisplay.textContent =
  String(hrs).padStart(2, '0') + ":" +
  String(mins).padStart(2, '0') + ":" +
  String(secs).padStart(2, '0');
  }, 1000);
}

function preprocessImage(canvas) {
  const ctx = canvas.getContext('2d');
  const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
  const data = imageData.data;
  let totalBrightness = 0;
  for (let i = 0; i < data.length; i += 4) {
    const avg = (data[i] + data[i + 1] + data[i + 2]) / 3;
    data[i] = avg; data[i + 1] = avg; data[i + 2] = avg;
    totalBrightness += avg;
  }
  const avgBrightness = totalBrightness / (data.length / 4);
  for (let i = 0; i < data.length; i += 4) {
    let val = data[i];
    if (avgBrightness < 128) val = 255 - val;
    if (val > 140) val = 255; else if (val < 120) val = 0;
    data[i] = val; data[i+1] = val; data[i+2] = val;
  }
  ctx.putImageData(imageData, 0, 0);
  return canvas;
}

function isTimeValidFromText(text) {
  const clean = text.toUpperCase().replace(/\s+/g, " ");
  const match = clean.match(/\b(\d{1,2})[:. ](\d{2})([:. ](\d{2}))?\s?(AM|PM)?\b/);
  if (!match) {
    console.log("❌ No time found");
    return false;
  }
  let hours = parseInt(match[1]);
  const minutes = parseInt(match[2]);
  const ampm = match[5];
  if (ampm) {
    if (ampm === "PM" && hours < 12) hours += 12;
    if (ampm === "AM" && hours === 12) hours = 0;
  }
  const now = new Date();
  const receipt = new Date();
  receipt.setHours(hours);
  receipt.setMinutes(minutes);
  receipt.setSeconds(0);
  if (receipt > now) {
    receipt.setDate(receipt.getDate() - 1)
  }
  const diff = Math.abs((now - receipt) / 60000);
  console.log("⏱ Now:", now);
  console.log("⏱ Receipt:", receipt);
  console.log("⏱ Diff (mins):", diff);
  return diff <= 10;
}
function detectCurrency(text) {
  const match = text.match(/([A-Z]{3}|[$€£¥₦₵₱₴])\s?([\d,]+)/i);
  if (match) {
    return {
      currency: match[1].toUpperCase(),
      amount: parseInt(match[2].replace(/,/g, ""))
    };
  }
  const nums = text.match(/\d{3,7}/g);
  return {
    currency: "TZS",
    amount: nums ? Math.max(...nums.map(n => parseInt(n))) : 0
  };
}
async function convertToTZS(amount, currency) {
  if (currency === "TZS" || currency === "TSH") return amount;
  try {
    const res = await fetch(`https://api.exchangerate-api.com/v4/latest/${currency}`);
    const data = await res.json();
    const rate = data.rates["TZS"];
    return rate ? amount * rate : 0;
  } catch {
    return 0;
  }
}

  }
});
  let dr = [];
  let cr = [];
  let folio = 1;
  let folioMap = {};
  transactions
    .sort((a, b) => a.createdAt - b.createdAt) // oldest first
    .forEach(tx => {
      if (!folioMap[tx.detail]) {
        folioMap[tx.detail] = folio++;
      }
      const entry = {
        date: new Date(tx.createdAt).toLocaleDateString(),
        detail: tx.detail,
        folio: folioMap[tx.detail],
        amount: tx.amount
      };
      if (tx.type === "IN") dr.push(entry);
      else cr.push(entry);
    });
  const totalDr = dr.reduce((a, b) => a + b.amount, 0);
  const totalCr = cr.reduce((a, b) => a + b.amount, 0);
  const diff = Math.abs(totalDr - totalCr);
  const today = new Date().toLocaleDateString();
  if (diff > 0) {
    if (totalDr > totalCr) {
      cr.push({ date: today, detail: "Balance", folio: "c/d", amount: diff });
    } else {
      dr.push({ date: today, detail: "Balance", folio: "c/d", amount: diff });
    }
  }

    const c = cr[i] || {};
    cashBookBody.innerHTML += `
    <tr>
      <td>${d.date || ""}</td>
      <td>${d.detail || ""}</td>
      <td>${d.folio || ""}</td>

      <td>${c.detail || ""}</td>
      <td>${c.folio || ""}</td>

    <td style="border-top:2px solid black;">${finalTotal}</td>
    <td></td><td></td><td></td>
    <td style="border-top:2px solid black;">${finalTotal}</td>
  </tr>`;
if (diff > 0) {
  cashBookBody.innerHTML += `
  <tr>
    ${totalDr > totalCr ? `
      <td>${today}</td>
      <td>Balance</td>
      <td>b/d</td>

      <td></td><td></td><td></td><td></td>

      <td>${today}</td>
      <td>Balance</td>
      <td>b/d</td>

}
