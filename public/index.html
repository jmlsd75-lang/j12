<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JAMAL SAID KAZEMBE MULTISYSTEM MANAGEMENT</title>
<style>
  body { text-align:center; font-family:Arial; margin-top:50px; }
  h1 { font-size:28px; }
  .login-btn { background:#28a745; color:white; border:none; padding:15px 40px; font-size:20px; border-radius:6px; cursor:pointer; }
  .logout-btn { background:#dc3545; color:white; border:none; padding:15px 40px; font-size:20px; border-radius:6px; cursor:pointer; display:none; }
  #userDisplay { font-weight:bold; margin:20px; display:none; }
</style>
</head>
<body>

<h1>JAMAL SAID KAZEMBE MULTISYSTEM MANAGEMENT</h1>

<button id="loginBtn" class="login-btn">LOGIN</button>
<button class="logout-btn">LOGOUT</button>
<div id="userDisplay"></div>

<script type="module">
  import { login } from './login.js';
  
  // Attach the login function to the button
  document.getElementById("loginBtn").addEventListener("click", login);
</script>

</body>
</html>
