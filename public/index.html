<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jamal Said Kazembe Multisystem Management</title>
<!-- Tesseract.js for OCR -->
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
<!-- jsQR for decoding QR Codes (more reliable than Tesseract for QR) -->
<script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
<style>
  body{
    margin:0;
    font-family:Arial, sans-serif;
    background:#f4f4f4;
    display:flex;
    flex-direction:column;
    justify-content:flex-start;
    align-items:center;
    min-height:100vh;
    text-align:center;
    padding-top:50px;
  }
  h1{ font-size:32px; color:blue; margin:0; }
  h2{ color:red; margin-top:5px; font-size:18px; }

  /* --- Main Menu Buttons --- */
  .login-btn, .logout-btn, .pay-btn {
    position: fixed;
    left: 50%;
    transform: translateX(-50%);
    border:none;
    cursor:pointer;
    display: none; 
  }
  .login-btn{
    bottom: 30px; padding:15px 40px; font-size:20px;
    background:#28a745; color:white; border-radius:6px;
  }
  .pay-btn{
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    padding:18px 50px; font-size:22px;
    background-color: #28a745; color:white; border-radius:8px;
  }
  .logout-btn{
    bottom: 30px; background:#dc3545; color:white;
    padding:10px 25px; border-radius:6px; font-size:16px;
  }
  
  /* User Display */
  #userDisplay {
    position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
    font-size: 18px; font-weight: bold; color: #333;
    display: none;
  }

  /* --- Page 1: Payment Info --- */
  #payPage{
    position: fixed; top:0; left:0; width:100%; height:100%;
    background:#ffffff; display:none; flex-direction:column;
    justify-content:center; align-items:center; text-align:center; z-index: 10;
  }
  .pay-info p{ margin:10px; font-size:18px; }
  .mix{ color:green; } .airtel{ color:red; } .crdb{ color:blue; } .name{ color:black; font-weight:bold; }

  .pay-actions{ position: fixed; bottom: 30px; display:flex; gap:20px; }
  .back-btn{ padding:12px 25px; background:gray; color:white; border:none; border-radius:6px; cursor: pointer; }
  .next-btn{ padding:12px 25px; background:green; color:white; border:none; border-radius:6px; cursor: pointer; }

  /* --- Page 2: Camera/Photos Menu --- */
  #cameraMenuPage {
    position: fixed; top:0; left:0; width:100%; height:100%;
    background: #ffffff; display:none; flex-direction: column;
    justify-content: center; align-items: center; gap: 20px; z-index: 20;
  }
  #openCameraBtn { padding: 15px 40px; font-size: 20px; background: #007bff; color: white; border: none; border-radius: 6px; cursor: pointer; }
  #openPhotosBtn { padding: 15px 40px; font-size: 20px; background: #17a2b8; color: white; border: none; border-radius: 6px; cursor: pointer; }
  #backFromCameraBtn { padding: 15px 40px; font-size: 20px; background: #dc3545; color: white; border: none; border-radius: 6px; cursor: pointer; }

  /* --- Page 3: Preview & Submit --- */
  #previewPage {
    position: fixed; top:0; left:0; width:100%; height:100%;
    background: white; display:none; flex-direction: column;
    justify-content: center; align-items: center; z-index: 30;
  }
  #previewImage { max-width: 90%; max-height: 60%; border-radius: 10px; margin-bottom: 20px; box-shadow: 0 4px 8px rgba(0,0,0,0.2); }
  .preview-actions { display: flex; gap: 20px; }
  #submitBtn { padding: 12px 25px; background: green; color: white; border: none; border-radius: 6px; font-size: 18px; cursor: pointer; }
  #cancelBtn { padding: 12px 25px; background: red; color: white; border: none; border-radius: 6px; font-size: 18px; cursor: pointer; }

  /* --- Page 4: System / Timer Page --- */
  #timerPage {
    position: fixed; top:0; left:0; width:100%; height:100%;
    background: #f4f4f4; display:none; flex-direction: column;
    justify-content: center; align-items: center; z-index: 40;
  }
  #timerDisplay { font-size: 60px; font-weight: bold; color: #333; }
  #timerStatus { margin-top: 20px; font-size: 20px; color: #666; }

  /* Timer Buttons Container */
  #timerButtons {
    margin-top: 30px;
    display: none; /* Hidden by default */
    gap: 20px;
  }
  .timer-action-btn {
    padding: 15px 30px; font-size: 18px; color: white; border: none; border-radius: 6px; cursor: pointer;
  }
  #businessBtn { background: #007bff; }
  #exitBtn { background: #dc3545; }

  /* Loading Overlay */
  #loadingOverlay {
    position: fixed; top:0; left:0; width:100%; height:100%;
    background: rgba(255,255,255,0.9); display:none;
    justify-content: center; align-items: center; flex-direction: column;
    z-index: 100;
  }
  .loader { border: 8px solid #f3f3f3; border-top: 8px solid #3498db; border-radius: 50%; width: 60px; height: 60px; animation: spin 1s linear infinite; }
  @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
</style>
</head>
<body>

<div id="userDisplay"></div>

<h1>JAMAL SAID KAZEMBE</h1>
<h2>MULTISYSTEM MANAGEMENT</h2>
  
<button class="login-btn">LOGIN</button>
<button class="pay-btn">PAY</button>
<button class="logout-btn">LOGOUT</button>

<!-- Hidden Inputs -->
<input type="file" id="cameraInput" accept="image/*" capture="environment" style="display:none;">
<input type="file" id="photosInput" accept="image/*" style="display:none;">

<!-- Page 1: Payment Info -->
<div id="payPage">
  <div class="pay-info">
    <p>Pay through:</p>
    <p class="mix">Mix by Yas:</p>
    <p class="mix">+255 655 510 714</p>
    <p class="airtel">Airtel Money:</p>
    <p class="airtel">+255 780 526 437</p>
    <p class="crdb">CRDB:</p>
    <p class="crdb">0152001GN6K00</p>
    <p class="name">JAMALI SAIDI KAZEMBE</p>
  </div>
  <div class="pay-actions">
    <button class="back-btn">BACK</button>
    <button class="next-btn">NEXT</button>
  </div>
</div>

<!-- Page 2: Camera/Photos Options -->
<div id="cameraMenuPage">
  <button id="openCameraBtn">CAMERA</button>
  <button id="openPhotosBtn">PHOTOS</button>
  <button id="backFromCameraBtn">BACK</button>
</div>

<!-- Page 3: Preview Page -->
<div id="previewPage">
  <img id="previewImage" src="" alt="Payment Preview">
  <div class="preview-actions">
    <button id="submitBtn">SUBMIT</button>
    <button id="cancelBtn">CANCEL</button>
  </div>
</div>

<!-- Page 4: Timer Page -->
<div id="timerPage">
  <div id="userDisplayTimer" style="margin-bottom:20px; font-size:24px; font-weight:bold;"></div>
  <div id="timerDisplay">00:00:00</div>
  <div id="timerStatus">Session Active</div>
  
  <div id="timerButtons">
    <button id="businessBtn" class="timer-action-btn">BUSINESS</button>
    <button id="exitBtn" class="timer-action-btn">EXIT</button>
  </div>
</div>

<!-- Loading Overlay -->
<div id="loadingOverlay">
  <div class="loader"></div>
  <p id="loadingText" style="margin-top:20px;">Processing Payment...</p>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

// --- Firebase Config ---
const firebaseConfig = {
  apiKey: "AIzaSyDpNJIZoLeZUhIoTepbLb_3rRLpseu9Zdo",
  authDomain: "my-project-66803-95cb3.firebaseapp.com",
  projectId: "my-project-66803-95cb3",
  storageBucket: "my-project-66803-95cb3.firebasestorage.app",
  messagingSenderId: "167159607898",
  appId: "1:167159607898:web:23ca11366b88868b085e63"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const provider = new GoogleAuthProvider();

// --- DOM Elements ---
const loginBtn = document.querySelector(".login-btn");
const logoutBtn = document.querySelector(".logout-btn");
const payBtn = document.querySelector(".pay-btn");
const userDisplay = document.getElementById("userDisplay");

const payPage = document.getElementById("payPage");
const backBtn = document.querySelector(".back-btn");
const nextBtn = document.querySelector(".next-btn");

const cameraMenuPage = document.getElementById("cameraMenuPage");
const openCameraBtn = document.getElementById("openCameraBtn");
const openPhotosBtn = document.getElementById("openPhotosBtn");
const backFromCameraBtn = document.getElementById("backFromCameraBtn");

const cameraInput = document.getElementById("cameraInput");
const photosInput = document.getElementById("photosInput");

const previewPage = document.getElementById("previewPage");
const previewImage = document.getElementById("previewImage");
const submitBtn = document.getElementById("submitBtn");
const cancelBtn = document.getElementById("cancelBtn");

const timerPage = document.getElementById("timerPage");
const timerDisplay = document.getElementById("timerDisplay");
const userDisplayTimer = document.getElementById("userDisplayTimer");
const timerStatus = document.getElementById("timerStatus");
const timerButtons = document.getElementById("timerButtons");
const businessBtn = document.getElementById("businessBtn");
const exitBtn = document.getElementById("exitBtn");
const loadingOverlay = document.getElementById("loadingOverlay");
const loadingText = document.getElementById("loadingText");

let selectedFile = null;
let timerInterval = null;

// --- Auth Logic ---
onAuthStateChanged(auth, (user) => {
  if (user) {
    userDisplay.textContent = user.displayName;
    userDisplay.style.display = "block";
    loginBtn.style.display = "none";
    payBtn.style.display = "block";
    logoutBtn.style.display = "block";
  } else {
    userDisplay.style.display = "none";
    loginBtn.style.display = "block";
    payBtn.style.display = "none";
    logoutBtn.style.display = "none";
  }
});

loginBtn.onclick = async () => {
  try { await signInWithPopup(auth, provider); } 
  catch (e) { console.error("Login Error", e); alert("Login failed."); }
};

logoutBtn.onclick = async () => {
  clearInterval(timerInterval);
  localStorage.removeItem("sessionEnd");
  try { await signOut(auth); } 
  catch (e) { console.error("Logout Error", e); }
  showPage('main');
};

// --- Navigation Logic ---
function showPage(page) {
  // Hide all pages
  payPage.style.display = "none";
  cameraMenuPage.style.display = "none";
  previewPage.style.display = "none";
  timerPage.style.display = "none";
  
  // Reset Main Buttons
  payBtn.style.display = "none";
  logoutBtn.style.display = "none";
  userDisplay.style.display = "none";

  if(page === 'main') {
    if(auth.currentUser) {
      userDisplay.style.display = "block";
      payBtn.style.display = "block";
      logoutBtn.style.display = "block";
    }
  } else if (page === 'pay') {
    payPage.style.display = "flex";
  } else if (page === 'camera') {
    cameraMenuPage.style.display = "flex";
  } else if (page === 'preview') {
    previewPage.style.display = "flex";
  } else if (page === 'timer') {
    timerPage.style.display = "flex";
    userDisplayTimer.textContent = auth.currentUser ? auth.currentUser.displayName : "User";
  }
}

payBtn.onclick = () => showPage('pay');
backBtn.onclick = () => showPage('main');
nextBtn.onclick = () => showPage('camera');
backFromCameraBtn.onclick = () => showPage('main');

// --- Camera & Photos Logic ---

openCameraBtn.onclick = () => cameraInput.click();
openPhotosBtn.onclick = () => photosInput.click();

function handleFile(file) {
  if (!file) {
    // Requirement 1: No photo -> return to Main Page (Pay/Logout)
    showPage('main');
    return;
  }

  selectedFile = file;

  const reader = new FileReader();
  reader.onload = function(e) {
    previewImage.src = e.target.result;
    showPage('preview');
  };
  reader.readAsDataURL(file);

  // Reset inputs to allow selecting same file again
  setTimeout(() => {
    cameraInput.value = "";
    photosInput.value = "";
  }, 100);
}

cameraInput.onchange = (e) => handleFile(e.target.files[0]);
photosInput.onchange = (e) => handleFile(e.target.files[0]);

cancelBtn.onclick = () => {
  selectedFile = null;
  previewImage.src = "";
  showPage('main'); // Cancel returns to main
};

// --- Core Processing Logic ---

submitBtn.onclick = async () => {
  if(!selectedFile) return;

  // 1. Show Loading
  loadingOverlay.style.display = "flex";
  loadingText.textContent = "Initializing System...";
  
  try {
    // 2. Prepare Image for Analysis
    loadingText.textContent = "Reading Image...";
    
    const img = new Image();
    img.src = previewImage.src;
    await new Promise(r => img.onload = r);

    // Create canvas for processing
    const canvas = document.createElement("canvas");
    const ctx = canvas.getContext("2d");
    canvas.width = img.width;
    canvas.height = img.height;
    ctx.drawImage(img, 0, 0);

    // 3. Try to Read QR Code (using jsQR)
    let qrText = "";
    try {
        const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        const code = jsQR(imageData.data, imageData.width, imageData.height);
        if (code) {
            qrText = code.data;
            console.log("QR Code Found:", qrText);
        }
    } catch(e) { console.log("QR Read Error", e); }

    // 4. Pre-process Image for OCR (Black & White)
    // This helps Tesseract read receipts better
    const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
    const data = imageData.data;
    for (let i = 0; i < data.length; i += 4) {
        const avg = (data[i] + data[i+1] + data[i+2]) / 3;
        const val = avg > 140 ? 255 : 0; // Threshold
        data[i] = data[i+1] = data[i+2] = val;
    }
    ctx.putImageData(imageData, 0, 0);
    const processedImage = canvas.toDataURL();

    // 5. Run OCR (Tesseract)
    loadingText.textContent = "Analyzing Text (OCR)...";
    const result = await Tesseract.recognize(processedImage, 'eng', {
      tessedit_char_whitelist: 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789 :+-.,$%TZSUSD',
    });
    
    let rawText = result.data.text.toUpperCase();
    // Combine QR and OCR text
    if(qrText) rawText += " " + qrText.toUpperCase();

    // Clean text
    const cleanText = rawText.replace(/\n/g, " ").replace(/\s+/g, " ").trim();
    // Normalize common OCR errors
    const normalizedText = cleanText.replace(/O/g, "0").replace(/I/g, "1").replace(/S/g, "5");
    
    console.log("Final Analyzed Text:", cleanText);

    // --- VALIDATION STEPS ---

    // Step A: Check if text exists
    if(cleanText.length < 10) throw new Error("No text found in image.");

    // Step B: Validate Name (Exact Match)
    loadingText.textContent = "Verifying Name...";
    const validNames = ["JAMAL SAID KAZEMBE", "JAMAL KAZEMBE", "JAMAL SAID"];
    // Check if any valid name exists in the text
    const nameFound = validNames.some(name => cleanText.includes(name));
    if(!nameFound) throw new Error("Name not found or incorrect (Must be Jamal Said Kazembe, Jamal Kazembe, or Jamal Said).");

    // Step C: Validate Account Number
    loadingText.textContent = "Verifying Account...";
    // Cleaning digits for phone numbers (remove spaces/dashes)
    const digitsOnly = normalizedText.replace(/\D/g, "");
    
    const targets = ["655510714", "780526437", "0152001GN6K00"];
    const hasTarget = targets.some(t => {
      if (t.startsWith("0") && t.length > 10) { 
         // CRDB Account - check text directly
         return cleanText.includes(t); 
      }
      // Phone numbers - check text or digits only sequence
      return cleanText.includes(t) || digitsOnly.includes(t);
    });

    if(!hasTarget) throw new Error("Invalid Payment Target (Account/Phone not found).");

    // Step D: Validate Transaction ID
    loadingText.textContent = "Verifying Transaction ID...";
    const txPattern = /(TXN|REF|ID|RECEIPT|TRANS|TRANSACTION)[\s:.-]*([A-Z0-9]{6,})/;
    // Also look for just a long alphanumeric string if keywords missing
    const genericIdPattern = /\b[A-Z0-9]{8,}\b/;
    
    let txId = null;
    const txMatch = cleanText.match(txPattern);
    if(txMatch) {
        txId = txMatch[2];
    } else {
        // Fallback: find any large alphanumeric block
        const fallback = cleanText.match(genericIdPattern);
        if(fallback) txId = fallback[0];
    }
    
    if(!txId) throw new Error("Transaction ID missing or invalid.");
    
    // Prevent Reuse
    const usedTxList = JSON.parse(localStorage.getItem("usedTxList") || "[]");
    if (usedTxList.includes(txId)) {
      throw new Error("Receipt already used.");
    }
    usedTxList.push(txId);
    localStorage.setItem("usedTxList", JSON.stringify(usedTxList));

    // Step E: Validate Time (Delay <= 10 mins)
    loadingText.textContent = "Verifying Time...";
    const timeMatch = normalizedText.match(/\b([01]?[0-9]|2[0-3]):([0-5][0-9])\b/);
    if(timeMatch) {
        const receiptHour = parseInt(timeMatch[1]);
        const receiptMin = parseInt(timeMatch[2]);
        const now = new Date();
        
        // Create date object for receipt time (assume today)
        const receiptDate = new Date();
        receiptDate.setHours(receiptHour, receiptMin, 0, 0);

        // Calculate difference in minutes
        const diffMs = now - receiptDate; 
        const diffMins = diffMs / 60000;

        // Check if future or > 10 mins past
        // Note: If time is slightly in future due to clock drift, allow small tolerance
        if (diffMins < -1 || diffMins > 10) {
            throw new Error("Payment time is invalid or older than 10 minutes.");
        }
    } else {
        // Strict requirement: Time must be found
        throw new Error("No valid time found on receipt.");
    }

    // Step F: Validate Currency
    loadingText.textContent = "Verifying Currency...";
    const currencies = ["TZS", "TSH", "USD", "EUR", "$", "€", "KES", "UGX"];
    const detectedCurrency = currencies.find(c => cleanText.includes(c)) || "";
    if(!detectedCurrency) throw new Error("No currency found on receipt.");

    // Step G: Extract Amount
    loadingText.textContent = "Extracting Amount...";
    // Look for amounts like 10,000.00 or 10000
    const amountMatches = cleanText.match(/[\d,]+(\.\d{2})?/g);
    let amount = 0;
    
    if(amountMatches) {
        // Heuristic: Usually the largest number on the receipt (excluding phone numbers)
        // Filter out numbers that look like phone numbers (length > 10 continuous digits)
        const validAmounts = amountMatches
            .map(m => parseFloat(m.replace(/,/g, '')))
            .filter(num => num > 100 && num < 100000000); // Reasonable payment range
        
        if(validAmounts.length > 0) {
            amount = Math.max(...validAmounts);
        }
    }
    if(amount === 0) throw new Error("Could not determine payment amount.");

    // Step H: Convert to TZS
    loadingText.textContent = "Converting Currency...";
    let amountTZS = amount;

    // If currency is not TZS, convert
    if(detectedCurrency !== "TZS" && detectedCurrency !== "TSH") {
        try {
            // Free API for exchange rates
            const response = await fetch("https://api.exchangerate.host/latest?base=USD");
            const data = await response.json();
            
            // Simple conversion logic (using USD as base)
            let rateToTZS = 2500; // Default fallback rate
            if(data.rates && data.rates.TZS) rateToTZS = data.rates.TZS;

            if(detectedCurrency === "USD" || detectedCurrency === "$") {
                amountTZS = amount * rateToTZS;
            } else if (detectedCurrency === "EUR" || detectedCurrency === "€") {
                const eurToUsd = data.rates.EUR ? (1 / data.rates.EUR) : 1.1; // Approx
                amountTZS = amount * eurToUsd * rateToTZS;
            } else {
                // Fallback for others: assume approx value or throw error
                console.log("Currency conversion not specific, using approx.");
                amountTZS = amount * 100; // Placeholder logic for unknown currencies
            }
            
            console.log(`Converted ${amount} ${detectedCurrency} to ${amountTZS} TZS`);
        } catch(e) {
            console.error("Currency API failed, using hardcoded approx.", e);
            if(detectedCurrency === "USD") amountTZS = amount * 2500;
        }
    }

    // --- SUCCESS: Start Timer ---
    
    // Formula: (Amount / 300) * 3600 seconds
    const totalSeconds = Math.floor((amountTZS / 300) * 3600);
    
    const endTime = Date.now() + (totalSeconds * 1000);
    localStorage.setItem("sessionEnd", endTime);
    
    startTimer(totalSeconds);
    timerButtons.style.display = "flex"; // Show Business/Exit
    showPage('timer');
    
  } catch (err) {
    console.error("Validation Error:", err);
    alert("Invalid Payment: " + err.message);
    showPage('main');
  } finally {
    loadingOverlay.style.display = "none";
  }
};

// --- Timer Logic ---
function startTimer(seconds) {
  clearInterval(timerInterval);
  
  const update = () => {
    const endTime = parseInt(localStorage.getItem("sessionEnd"));
    if(!endTime) return;
    
    const remaining = Math.floor((endTime - Date.now()) / 1000);
    
    if(remaining <= 0) {
      timerDisplay.textContent = "00:00:00";
      timerStatus.textContent = "Session Expired";
      clearInterval(timerInterval);
      localStorage.removeItem("sessionEnd");
      alert("Session Ended.");
      signOut(auth);
      showPage('main');
      return;
    }

    const h = Math.floor(remaining / 3600);
    const m = Math.floor((remaining % 3600) / 60);
    const s = remaining % 60;
    
    timerDisplay.textContent = 
      `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
    timerStatus.textContent = "Session Active";
  };

  update();
  timerInterval = setInterval(update, 1000);
}

// Check session on load
window.onload = () => {
  const endTime = localStorage.getItem("sessionEnd");
  if(endTime && parseInt(endTime) > Date.now()) {
    showPage('timer');
    const remaining = Math.floor((endTime - Date.now()) / 1000);
    startTimer(remaining);
    timerButtons.style.display = "flex";
  }
};

// Timer Button Actions
exitBtn.onclick = async () => {
  clearInterval(timerInterval);
  localStorage.removeItem("sessionEnd");
  timerButtons.style.display = "none";
  alert("You exited the system");
  await signOut(auth);
  showPage('main');
};

businessBtn.onclick = () => {
    alert("Business functionality not defined yet.");
};

</script>
</body>
</html>
