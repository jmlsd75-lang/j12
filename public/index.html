<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JAMAL SAID KAZEMBE MULTISYSTEM MANAGEMENT</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Inter', sans-serif; margin: 0; padding: 0; box-sizing: border-box; }
        ::selection { background: #F97316; color: #FFFFFF; }

        body {
            min-height: 100vh;
            overflow: hidden;
            background: linear-gradient(
                to bottom,
                #0B1026 0%, #1A1040 8%, #3B1854 16%,
                #6B2737 24%, #A03520 32%, #D4551E 40%,
                #F28C28 50%, #F5B041 56%, #D4A056 62%,
                #8B7355 70%, #5C4033 80%, #3E2723 90%, #2C1810 100%
            );
        }

        .stars { position: fixed; top: 0; left: 0; width: 100%; height: 40%; pointer-events: none; z-index: 0; }
        .star { position: absolute; background: white; border-radius: 50%; animation: twinkle 3s ease-in-out infinite alternate; }
        @keyframes twinkle { 0% { opacity: 0.2; } 100% { opacity: 1; } }

        .mountain-layer { position: fixed; bottom: 0; left: 0; width: 100%; z-index: 1; }
        .snow-glow { position: fixed; top: 22%; left: 50%; transform: translateX(-50%); width: 300px; height: 100px; background: radial-gradient(ellipse, rgba(255,220,180,0.3) 0%, transparent 70%); z-index: 2; pointer-events: none; }
        .sun-glow { position: fixed; top: 38%; left: 50%; transform: translateX(-50%); width: 500px; height: 200px; background: radial-gradient(ellipse, rgba(242,140,40,0.4) 0%, rgba(242,140,40,0.1) 40%, transparent 70%); z-index: 2; pointer-events: none; }

        .content-layer {
            position: relative; z-index: 10; min-height: 100vh;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        .system-title { text-align: center; margin-bottom: 2rem; }
        .system-title h1 {
            color: #FFFFFF; font-size: 1.8rem; font-weight: 600;
            letter-spacing: 0.15em; text-transform: uppercase;
            text-shadow: 0 2px 20px rgba(0,0,0,0.6), 0 0 60px rgba(242,140,40,0.2);
            line-height: 1.4;
        }
        .system-title .sub {
            color: #F5B041; font-size: 0.85rem; font-weight: 400;
            letter-spacing: 0.3em; text-transform: uppercase; margin-top: 0.4rem;
            text-shadow: 0 2px 15px rgba(0,0,0,0.5);
        }

        .glass-btn {
            background: linear-gradient(135deg, rgba(255,255,255,0.15) 0%, rgba(255,255,255,0.05) 100%);
            backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.25); color: #FFFFFF;
            font-size: 1.1rem; font-weight: 500; letter-spacing: 0.1em;
            text-transform: uppercase; padding: 1.1rem 3.5rem; border-radius: 60px;
            cursor: pointer; transition: all 0.4s ease;
            display: flex; align-items: center; gap: 0.75rem;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.1);
        }
        .glass-btn:hover {
            background: linear-gradient(135deg, #F28C28 0%, #D4551E 100%);
            border-color: #F5B041;
            box-shadow: 0 8px 40px rgba(242,140,40,0.4), 0 0 80px rgba(242,140,40,0.15);
            transform: translateY(-2px);
        }
        .glass-btn:active { transform: translateY(0); }

        .free-btn {
            background: linear-gradient(135deg, rgba(245,176,65,0.25) 0%, rgba(242,140,40,0.1) 100%);
            backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            border: 1.5px solid rgba(245,176,65,0.5); color: #FDE8B8;
            font-size: 1.3rem; font-weight: 600; letter-spacing: 0.15em;
            text-transform: uppercase; padding: 1.2rem 4.5rem; border-radius: 60px;
            cursor: pointer; transition: all 0.4s ease;
            display: flex; align-items: center; gap: 0.75rem;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3), 0 0 30px rgba(245,176,65,0.1);
        }
        .free-btn:hover {
            background: linear-gradient(135deg, #F5B041 0%, #F28C28 100%);
            color: #2C1810; border-color: #FDE8B8;
            box-shadow: 0 8px 50px rgba(245,176,65,0.5);
            transform: translateY(-3px) scale(1.03);
        }

        .logout-btn {
            position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
            z-index: 20; background: rgba(220,53,69,0.15);
            backdrop-filter: blur(8px); border: 1px solid rgba(220,53,69,0.4);
            color: rgba(255,255,255,0.7); font-size: 0.8rem; font-weight: 500;
            letter-spacing: 0.12em; text-transform: uppercase;
            padding: 0.6rem 2rem; border-radius: 40px; cursor: pointer;
            transition: all 0.3s ease;
        }
        .logout-btn:hover {
            background: rgba(220,53,69,0.4); color: #fff;
            border-color: rgba(220,53,69,0.7);
        }

        .user-name {
            color: rgba(255,255,255,0.85); font-size: 0.95rem; font-weight: 400;
            letter-spacing: 0.1em; text-transform: uppercase;
            text-shadow: 0 1px 10px rgba(0,0,0,0.5);
            margin-bottom: 1.5rem;
        }

        /* ===== CSS LION ===== */
        .lion-container {
            position: relative; width: 160px; height: 160px; margin: 0 auto 0.5rem;
            animation: lionFloat 4s ease-in-out infinite;
        }
        @keyframes lionFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        .lion-mane {
            position: absolute; inset: 0; border-radius: 50%;
            background:
                radial-gradient(ellipse 42% 32% at 25% 18%, rgba(220,160,30,0.9), transparent),
                radial-gradient(ellipse 42% 32% at 75% 18%, rgba(220,160,30,0.9), transparent),
                radial-gradient(ellipse 36% 26% at 10% 45%, rgba(200,140,20,0.7), transparent),
                radial-gradient(ellipse 36% 26% at 90% 45%, rgba(200,140,20,0.7), transparent),
                radial-gradient(ellipse 42% 30% at 18% 73%, rgba(210,150,25,0.8), transparent),
                radial-gradient(ellipse 42% 30% at 82% 73%, rgba(210,150,25,0.8), transparent),
                radial-gradient(ellipse 32% 22% at 38% 92%, rgba(190,130,20,0.6), transparent),
                radial-gradient(ellipse 32% 22% at 62% 92%, rgba(190,130,20,0.6), transparent),
                radial-gradient(circle, #D49A0A 28%, #B07A08 48%, #8B5A08 63%, #6B4408 73%, transparent 80%);
            box-shadow: 0 0 40px rgba(212,154,10,0.35), 0 0 80px rgba(212,154,10,0.15);
        }

        .lion-face {
            position: absolute; top: 22px; left: 22px; width: 116px; height: 116px;
            border-radius: 48% 48% 42% 42%;
            background: radial-gradient(ellipse at 45% 38%, #FDE8B8, #F0C860 40%, #D4A030 80%);
            box-shadow: inset 0 3px 10px rgba(255,255,255,0.3), inset 0 -5px 15px rgba(139,90,8,0.2);
        }

        /* Ears */
        .lion-face::before, .lion-face::after {
            content: ''; position: absolute; width: 24px; height: 24px;
            background: radial-gradient(circle, #C88820, #A06818);
            border-radius: 50% 50% 30% 30%; top: -7px;
        }
        .lion-face::before { left: 16px; }
        .lion-face::after { right: 16px; }

        .lion-eye {
            position: absolute; width: 18px; height: 20px; border-radius: 50%; top: 38px;
            background: radial-gradient(circle at 50% 50%,
                #0D0805 26%, #0D0805 28%, #C88B1A 29%,
                #E8A830 52%, #D49520 78%, #B07818 100%);
            box-shadow: 0 1px 4px rgba(0,0,0,0.3);
            animation: lionBlink 4.5s ease-in-out infinite;
        }
        .left-eye { left: 28px; }
        .right-eye { left: 70px; animation-delay: 0.15s; }
        .lion-eye::after {
            content: ''; position: absolute; width: 5px; height: 5px;
            background: rgba(255,255,255,0.85); border-radius: 50%; top: 4px; left: 5px;
        }
        @keyframes lionBlink {
            0%, 90%, 100% { transform: scaleY(1); }
            95% { transform: scaleY(0.08); }
        }

        .lion-nose {
            position: absolute; top: 68px; left: 50%; transform: translateX(-50%);
            width: 22px; height: 15px;
            background: linear-gradient(180deg, #5A3210, #3E2210);
            border-radius: 50% 50% 40% 40%;
        }
        .lion-nose::after {
            content: ''; position: absolute; top: 3px; left: 50%; transform: translateX(-50%);
            width: 8px; height: 4px; background: rgba(255,255,255,0.12); border-radius: 50%;
        }

        .lion-mouth {
            position: absolute; top: 82px; left: 50%; transform: translateX(-50%);
            width: 20px; height: 10px;
            border-bottom: 2.5px solid #7A4A18;
            border-left: 2px solid #7A4A18; border-right: 2px solid #7A4A18;
            border-radius: 0 0 50% 50%;
        }

        /* Whiskers */
        .whisker {
            position: absolute; height: 1.5px; background: rgba(180,140,50,0.5); z-index: 3;
        }
        .wl1 { top: 72px; left: 8px; width: 28px; transform: rotate(-10deg); transform-origin: right center; }
        .wl2 { top: 79px; left: 5px; width: 32px; transform: rotate(0deg); transform-origin: right center; }
        .wl3 { top: 86px; left: 8px; width: 28px; transform: rotate(10deg); transform-origin: right center; }
        .wr1 { top: 72px; right: 8px; width: 28px; transform: rotate(10deg); transform-origin: left center; }
        .wr2 { top: 79px; right: 5px; width: 32px; transform: rotate(0deg); transform-origin: left center; }
        .wr3 { top: 86px; right: 8px; width: 28px; transform: rotate(-10deg); transform-origin: left center; }

        /* Age badge */
        .age-badge {
            background: rgba(255,255,255,0.1); backdrop-filter: blur(8px);
            border: 1px solid rgba(245,176,65,0.3); border-radius: 30px;
            padding: 8px 28px; color: #FDE8B8; font-size: 0.95rem;
            font-weight: 500; letter-spacing: 0.08em;
            margin-top: 12px; text-align: center;
            text-shadow: 0 1px 8px rgba(0,0,0,0.4);
        }

        /* Age input */
        .age-input-section { display: none; margin-top: 14px; gap: 10px; align-items: center; }
        .age-input-section.active { display: flex; }
        .age-input-field {
            background: rgba(255,255,255,0.12); backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,0.25); border-radius: 30px;
            padding: 8px 24px; color: #FFFFFF; font-size: 0.95rem;
            font-weight: 400; letter-spacing: 0.05em; outline: none;
            width: 160px; text-align: center;
        }
        .age-input-field::placeholder { color: rgba(255,255,255,0.4); }
        .age-input-field:focus { border-color: rgba(245,176,65,0.6); }
        .save-age-btn {
            background: rgba(40,167,69,0.3); border: 1px solid rgba(40,167,69,0.5);
            color: #90EE90; font-size: 0.8rem; font-weight: 600; letter-spacing: 0.1em;
            text-transform: uppercase; padding: 8px 18px; border-radius: 30px;
            cursor: pointer; transition: all 0.3s;
        }
        .save-age-btn:hover { background: rgba(40,167,69,0.5); color: #fff; }

        /* Mist */
        .mist {
            position: fixed; top: 55%; left: 0; width: 200%; height: 120px;
            background: linear-gradient(90deg,
                transparent 0%, rgba(139,115,85,0.15) 20%, rgba(139,115,85,0.25) 40%,
                rgba(139,115,85,0.1) 60%, rgba(139,115,85,0.2) 80%, transparent 100%);
            animation: mistDrift 25s linear infinite; z-index: 4; pointer-events: none;
        }
        @keyframes mistDrift { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }

        .acacia-silhouette { position: fixed; bottom: 0; z-index: 3; pointer-events: none; }

        .footer-text {
            position: fixed; bottom: 60px; left: 50%; transform: translateX(-50%);
            z-index: 10; color: rgba(255,255,255,0.2); font-size: 0.65rem;
            letter-spacing: 0.15em; text-transform: uppercase; white-space: nowrap;
        }

        /* Fade animation */
        .fade-in { animation: fadeIn 0.8s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* Post-login spacing */
        .post-login-content { display: flex; flex-direction: column; align-items: center; }

        @media (min-width: 768px) {
            .system-title h1 { font-size: 2.8rem; }
            .system-title .sub { font-size: 1.1rem; }
            .lion-container { width: 180px; height: 180px; }
            .lion-face { top: 26px; left: 26px; width: 128px; height: 128px; }
            .left-eye { left: 32px; top: 42px; }
            .right-eye { left: 78px; top: 42px; }
            .lion-nose { top: 76px; }
            .lion-mouth { top: 90px; }
            .wl1,.wl3,.wr1,.wr3 { width: 34px; }
            .wl2,.wr2 { width: 38px; }
        }
    </style>
</head>
<body>

    <!-- Stars -->
    <div class="stars" id="stars"></div>
    <div class="snow-glow"></div>
    <div class="sun-glow"></div>

    <!-- Mountain Layers -->
    <svg class="mountain-layer" viewBox="0 0 1440 600" preserveAspectRatio="none" style="height:65vh;">
        <path d="M0,600 L0,380 Q100,340 200,360 Q350,310 450,350 Q550,300 650,330 Q750,280 850,320 Q950,290 1050,340 Q1150,300 1250,350 Q1350,320 1440,360 L1440,600 Z" fill="rgba(62,39,35,0.5)"/>
        <path d="M0,600 L0,420 Q80,380 160,400 Q280,340 380,380 Q480,310 580,360 Q680,290 780,340 Q880,280 980,330 Q1080,300 1180,360 Q1280,330 1380,380 L1440,370 L1440,600 Z" fill="rgba(62,39,35,0.7)"/>
        <path d="M400,600 L400,480 Q480,440 540,400 Q580,370 620,330 Q660,280 700,230 Q730,190 750,160 Q770,135 785,118 Q800,105 810,100 Q815,98 820,100 Q830,105 845,118 Q860,135 880,160 Q900,190 930,230 Q970,280 1010,330 Q1050,370 1090,400 Q1150,440 1230,480 L1230,600 Z" fill="#2C1810"/>
        <path d="M695,235 Q710,210 730,185 Q748,163 765,145 Q778,132 785,125 Q790,120 795,118 Q800,120 810,128 Q822,138 838,155 Q855,175 875,200 Q895,228 915,260 Q895,250 870,242 Q845,235 820,230 Q800,228 785,230 Q765,233 745,238 Q720,245 695,235 Z" fill="rgba(255,255,255,0.85)"/>
        <path d="M720,230 Q735,210 755,188 Q770,172 782,160 Q790,155 795,158 Q805,168 820,185 Q838,205 855,228 Q840,222 820,218 Q800,216 790,218 Q775,220 758,224 Q738,228 720,230 Z" fill="rgba(255,240,220,0.5)"/>
        <path d="M0,600 L0,500 Q100,470 200,490 Q320,450 420,480 Q500,460 580,490 Q660,470 720,500 L730,510 L730,600 Z" fill="#2C1810"/>
        <path d="M890,600 L890,510 Q900,500 910,490 Q980,465 1080,485 Q1180,460 1280,490 Q1360,475 1440,500 L1440,600 Z" fill="#2C1810"/>
        <path d="M0,600 L0,540 Q200,520 400,535 Q600,525 800,540 Q1000,530 1200,545 Q1350,535 1440,540 L1440,600 Z" fill="#3E2723"/>
    </svg>

    <div class="mist"></div>

    <!-- Acacia trees -->
    <svg class="acacia-silhouette" style="left:5%; height:120px;" viewBox="0 0 120 120">
        <line x1="60" y1="120" x2="60" y2="40" stroke="#1A0E08" stroke-width="4"/>
        <ellipse cx="60" cy="30" rx="45" ry="25" fill="#1A0E08"/>
        <ellipse cx="35" cy="45" rx="20" ry="12" fill="#1A0E08"/>
        <ellipse cx="85" cy="45" rx="20" ry="12" fill="#1A0E08"/>
    </svg>
    <svg class="acacia-silhouette" style="right:8%; height:90px;" viewBox="0 0 120 120">
        <line x1="60" y1="120" x2="58" y2="45" stroke="#1A0E08" stroke-width="3"/>
        <ellipse cx="58" cy="35" rx="38" ry="20" fill="#1A0E08"/>
        <ellipse cx="30" cy="50" rx="18" ry="10" fill="#1A0E08"/>
        <ellipse cx="88" cy="48" rx="16" ry="9" fill="#1A0E08"/>
    </svg>

    <!-- ===== PRE-LOGIN STATE ===== -->
    <div id="preLogin" class="content-layer">
        <div class="system-title">
            <h1>Jamal Said Kazembe</h1>
            <div class="sub">Multisystem Management</div>
        </div>
        <button id="loginBtn" class="glass-btn">
            <i data-lucide="mountain" style="width:20px;height:20px;"></i>
            Login
        </button>
    </div>

    <!-- ===== POST-LOGIN STATE ===== -->
    <div id="postLogin" class="content-layer" style="display:none;">
        <div class="system-title" style="margin-bottom:0.8rem;">
            <h1 style="font-size:1.4rem;">Jamal Said Kazembe</h1>
            <div class="sub" style="font-size:0.7rem;">Multisystem Management</div>
        </div>

        <div class="post-login-content fade-in">
            <div class="user-name" id="userNameDisplay"></div>

            <!-- CSS Lion -->
            <div class="lion-container">
                <div class="lion-mane"></div>
                <div class="lion-face">
                    <div class="lion-eye left-eye"></div>
                    <div class="lion-eye right-eye"></div>
                    <div class="whisker wl1"></div>
                    <div class="whisker wl2"></div>
                    <div class="whisker wl3"></div>
                    <div class="whisker wr1"></div>
                    <div class="whisker wr2"></div>
                    <div class="whisker wr3"></div>
                    <div class="lion-nose"></div>
                    <div class="lion-mouth"></div>
                </div>
            </div>

            <!-- Age display -->
            <div class="age-badge" id="ageBadge" style="display:none;"></div>

            <!-- Age input (shown if no age saved) -->
            <div class="age-input-section" id="ageInputSection">
                <input type="number" id="ageInput" class="age-input-field" placeholder="Enter Age" min="1" max="150">
                <button id="saveAgeBtn" class="save-age-btn">SAVE</button>
            </div>

            <!-- FREE button -->
            <button id="freeBtn" class="free-btn" style="margin-top:1.5rem;">
                <i data-lucide="sparkles" style="width:20px;height:20px;"></i>
                Free
            </button>
        </div>
    </div>

    <!-- Logout button (hidden until login) -->
    <button id="logoutBtn" class="logout-btn" style="display:none;">
        <i data-lucide="log-out" style="width:14px;height:14px;display:inline;vertical-align:middle;margin-right:4px;"></i>
        Logout
    </button>

    <div class="footer-text">&copy; 2025 Jamal Said Kazembe &middot; All Rights Reserved</div>

    <!-- Scripts -->
    <script src="login.js" type="module"></script>
    <script src="free.js" type="module"></script>
    <script>
        // Generate stars
        const starsContainer = document.getElementById('stars');
        for (let i = 0; i < 80; i++) {
            const star = document.createElement('div');
            star.classList.add('star');
            const size = Math.random() * 2 + 1;
            star.style.width = size + 'px';
            star.style.height = size + 'px';
            star.style.left = Math.random() * 100 + '%';
            star.style.top = Math.random() * 100 + '%';
            star.style.animationDelay = Math.random() * 3 + 's';
            star.style.animationDuration = (Math.random() * 2 + 2) + 's';
            starsContainer.appendChild(star);
        }
        lucide.createIcons();
    </script>
</body>
</html>
