<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JAMAL SAID KAZEMBE MULTISYSTEM MANAGEMENT</title>

<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    display: flex;
    flex-direction: column;
    justify-content: flex-start; /* top */
    align-items: center;         /* horizontal center */
    height: 100vh;
    background: #f4f4f4;
    padding-top: 50px;
  }

  h1 {
    font-size: 32px;
    text-align: center;
    line-height: 1.2;
  }

  .line1 { color: blue; }       /* JAMAL SAID  KAZEMBE */
  .line2 { color: green; }      /* MULTISYSTEM MANAGEMENT */

  .login-container {
    text-align: center;
    margin-top: 40px; /* space below system name */
  }

  h2 {
    font-size: 24px;
    margin-bottom: 20px;
    color: #333;
  }

  button {
    padding: 10px 20px;
    font-size: 18px;
    cursor: pointer;
    background-color: #007bff;
    color: white;
    border: none;
    border-radius: 6px;
    transition: background 0.3s;
  }

  button:hover {
    background-color: #0056b3;
  }
</style>
</head>

<body>

<!-- System Name -->
<h1>
  <span class="line1">JAMAL SAID</span><br>
  <span class="line2">KAZEMBE MULTISYSTEM MANAGEMENT</span>
</h1>

<!-- Login Prompt -->
<div class="login-container">
  <h2>Please login to the system</h2>
  <button id="loginBtn">Login</button>
</div>

<script type="module" src="./login.js"></script>

</body>
</html>
