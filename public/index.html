  <style>
    @keyframes breathe {
      0%   { opacity: 0.5; transform: translate(-50%, -50%) scale(1); }
      100% { opacity: 1;   transform: translate(-50%, -50%) scale(1.15); }
    }
    @keyframes drift {
      0%   { background-position: 0 0; }
      100% { background-position: 170px 170px; }
    }
    @keyframes revealLine {
      from { opacity: 0; transform: translateY(30px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }
    @keyframes successSlide {
      0%   { opacity: 0; transform: translateX(30px); }
      12%  { opacity: 1; transform: translateX(0); }
      88%  { opacity: 1; transform: translateX(0); }
      100% { opacity: 0; transform: translateX(-30px); }
    }
    @keyframes nameReveal {
      from { opacity: 0; transform: translateY(-10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .bg-radial::before {
      content: '';
      position: absolute;
      top: 30%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 900px;
      height: 900px;
      background: radial-gradient(circle, rgba(212, 162, 78, 0.35) 0%, transparent 70%);
      animation: breathe 6s ease-in-out infinite alternate;
    }
    .bg-lines::after {
      content: '';
      position: absolute;
      inset: 0;
      background-image: repeating-linear-gradient(
        -45deg, transparent, transparent 60px,
        rgba(255,255,255,0.08) 60px, rgba(255,255,255,0.08) 61px
      );
      opacity: 0.4;
      animation: drift 30s linear infinite;
    }

    .line-1 { animation: revealLine 0.8s 0.3s ease-out both; }
    .line-2 { animation: revealLine 0.8s 0.6s ease-out both; }
    .line-3 { animation: revealLine 0.8s 0.9s ease-out both; }
    .anim-fade-1 { animation: fadeIn 0.6s 1.2s ease-out both; }
    .anim-fade-2 { animation: fadeIn 0.6s 1.5s ease-out both; }
    .anim-fade-3 { animation: fadeIn 0.6s 1.8s ease-out both; }
    .anim-fade-4 { animation: fadeIn 0.6s 2s ease-out both; }

    .login-btn::before,
    .free-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(120deg, transparent 30%, rgba(255,255,255,0.25) 50%, transparent 70%);
      transform: translateX(-100%);
      transition: transform 0.5s ease;
    }
    .login-btn:hover::before,
    .free-btn:hover::before { transform: translateX(100%); }

    .logout-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(120deg, transparent 30%, rgba(255,255,255,0.06) 50%, transparent 70%);
      transform: translateX(-100%);
      transition: transform 0.5s ease;
    }
    .logout-btn:hover::before { transform: translateX(100%); }

    .success-anim { animation: successSlide 3s ease-in-out forwards; }
    .name-anim   { animation: nameReveal 0.5s ease-out both; }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
    }

  <!-- Particle system -->
  <script>
    (() => {
      const canvas = document.getElementById('particles');
      const ctx = canvas.getContext('2d');
      let w, h;
      const COUNT = 60;
      const particles = [];

      function resize() {
        w = canvas.width = window.innerWidth;
        h = canvas.height = window.innerHeight;
      }
      window.addEventListener('resize', resize);
      resize();

      class Particle {
        constructor() { this.reset(); }
        reset() {
          this.x = Math.random() * w;
          this.y = Math.random() * h;
          this.r = Math.max(0.5, Math.random() * 2);
          this.vx = (Math.random() - 0.5) * 0.3;
          this.vy = (Math.random() - 0.5) * 0.3;
          this.alpha = Math.random() * 0.5 + 0.1;
          this.pulse = Math.random() * Math.PI * 2;
          this.ps = Math.random() * 0.02 + 0.005;
        }
        update() {
          this.x += this.vx;
          this.y += this.vy;
          this.pulse += this.ps;
          if (this.x < -10) this.x = w + 10;
          if (this.x > w + 10) this.x = -10;
          if (this.y < -10) this.y = h + 10;
          if (this.y > h + 10) this.y = -10;
        }
        draw() {
          const a = this.alpha * (0.5 + 0.5 * Math.sin(this.pulse));
          ctx.beginPath();
          ctx.arc(this.x, this.y, Math.max(0.1, this.r), 0, Math.PI * 2);
          ctx.fillStyle = `rgba(212,162,78,${a.toFixed(3)})`;
          ctx.fill();
        }
      }

      for (let i = 0; i < COUNT; i++) particles.push(new Particle());

      function drawLines() {
        const max = 140;
        for (let i = 0; i < particles.length; i++) {
          for (let j = i + 1; j < particles.length; j++) {
            const dx = particles[i].x - particles[j].x;
            const dy = particles[i].y - particles[j].y;
            const d = Math.sqrt(dx * dx + dy * dy);
            if (d < max) {
              ctx.beginPath();
              ctx.moveTo(particles[i].x, particles[i].y);
              ctx.lineTo(particles[j].x, particles[j].y);
              ctx.strokeStyle = `rgba(212,162,78,${((1 - d / max) * 0.12).toFixed(3)})`;
              ctx.lineWidth = 0.5;
              ctx.stroke();
            }
          }
        }
      }

      function loop() {
        ctx.clearRect(0, 0, w, h);
        particles.forEach(p => { p.update(); p.draw(); });
        drawLines();
        requestAnimationFrame(loop);
      }
      loop();
    })();
  </script>

  <!-- Firebase auth: detects login state, toggles UI -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import {
      getAuth,
      onAuthStateChanged,
      signOut
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDpNJIZoLeZUhIoTepbLb_3rRLpseu9Zdo",
      authDomain: "my-project-66803-95cb3.firebaseapp.com",
      projectId: "my-project-66803-95cb3",
      storageBucket: "my-project-66803-95cb3.firebasestorage.app",
      messagingSenderId: "167159607898",
      appId: "1:167159607898:web:23ca11366b88868b085e63"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    const loginLink    = document.getElementById("loginLink");
    const authBtns     = document.getElementById("authBtns");
    const userBar      = document.getElementById("userBar");
    const successNotif = document.getElementById("successNotif");
    const userNameBox  = document.getElementById("userNameBox");
    const nameText     = document.getElementById("nameText");
    const logoutBtn    = document.getElementById("logoutBtn");

    function resetBar() {
      successNotif.classList.add("hidden");
      successNotif.classList.remove("success-anim");
      userNameBox.classList.add("hidden");
      userNameBox.classList.remove("name-anim");
    }

    // Fires once every time this page loads
    onAuthStateChanged(auth, (user) => {
      if (user) {
        // USER LOGGED IN
        loginLink.classList.add("hidden");
        authBtns.classList.remove("hidden");
        userBar.classList.remove("hidden");

        const displayName = user.displayName || user.email || "User";
        nameText.textContent = displayName;

        const justLoggedIn = sessionStorage.getItem("justLoggedIn") === "1";

        if (justLoggedIn) {
          // Fresh login from Google — show "Successful login" 3 sec then username
          sessionStorage.removeItem("justLoggedIn");
          resetBar();
          successNotif.classList.remove("hidden");
          successNotif.classList.add("success-anim");
          setTimeout(() => {
            successNotif.classList.add("hidden");
            successNotif.classList.remove("success-anim");
            userNameBox.classList.remove("hidden");
            userNameBox.classList.add("name-anim");
          }, 3000);
        } else {
          // Page refresh while logged in — show username directly
          resetBar();
          userNameBox.classList.remove("hidden");
          userNameBox.classList.add("name-anim");
        }
      } else {
        // NOT LOGGED IN
        loginLink.classList.remove("hidden");
        authBtns.classList.add("hidden");
        userBar.classList.add("hidden");
        resetBar();
      }
    });

    // Logout handler
    logoutBtn.addEventListener("click", async () => {
      try {
        await signOut(auth);
        sessionStorage.clear();
      } catch (err) {
        console.error("Logout error:", err);
      }
    });
  </script>
