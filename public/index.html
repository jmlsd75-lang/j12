<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JAMALI SAIDI KAZEMBE MULTISYSTEM MANAGEMENT</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary-color: #0f172a;
            --accent-color: #3b82f6;
            --whatsapp-color: #25D366;
            --bg-color: #f1f5f9;
            --card-bg: #ffffff;
            --text-main: #334155;
            --text-muted: #64748b;
            --border-color: #e2e8f0;
            --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
            --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1);
            --error-color: #ef4444;
            --success-color: #4ade80;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* --- Header --- */
        header {
            background-color: var(--card-bg);
            border-bottom: 1px solid var(--border-color);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: var(--shadow-sm);
            flex-wrap: wrap;
            gap: 1rem;
            position: relative;
            z-index: 10;
        }

        .header-title {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--primary-color);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 100%;
        }

        .header-actions { display: flex; align-items: center; gap: 1rem; position: relative; z-index: 20; }

        .btn-instruction {
            padding: 0.5rem 1rem;
            background-color: transparent;
            border: 1px solid var(--accent-color);
            color: var(--accent-color);
            border-radius: 6px;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
            transition: all 0.2s ease;
            display: inline-block;
        }

        .btn-instruction:hover { background-color: var(--accent-color); color: white; }

        .whatsapp-link {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--whatsapp-color);
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
            padding: 0.5rem;
            border-radius: 6px;
            transition: background-color 0.2s ease;
        }

        .whatsapp-link:hover { background-color: rgba(37, 211, 102, 0.1); }
        .whatsapp-icon { font-size: 1.2rem; }

        /* --- Main Content --- */
        main {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem;
            position: relative;
            z-index: 5;
        }

        .login-card {
            background-color: var(--card-bg);
            padding: 3rem 2.5rem;
            border-radius: 12px;
            box-shadow: var(--shadow-lg);
            max-width: 450px;
            width: 100%;
            text-align: center;
            border: 1px solid var(--border-color);
            position: relative;
        }

        .login-message {
            color: var(--text-muted);
            font-size: 1rem;
            margin-bottom: 2rem;
            pointer-events: none; /* Prevents text selection */
        }

        /* --- CRITICAL FIX: Google Button Styling --- */
        .google-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background-color: #ffffff;
            color: #3c4043;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            padding: 0.75rem 1.5rem;
            font-family: 'Roboto', sans-serif;
            font-size: 0.95rem;
            font-weight: 500;
            cursor: pointer;
            width: 100%;
            transition: background-color 0.2s, box-shadow 0.2s, transform 0.1s;
            
            /* ENSURE CLICKABILITY */
            position: relative; 
            z-index: 10;
            pointer-events: auto; 
        }

        .google-btn:hover {
            background-color: #f8faff;
            box-shadow: var(--shadow-md);
            border-color: #dadce0;
            transform: translateY(-1px);
        }

        .google-btn:active {
            background-color: #f1f3f4;
            transform: translateY(0);
        }

        /* FIX: Force the SVG to be background and unclickable */
        .google-icon {
            width: 20px;
            height: 20px;
            margin-right: 12px;
            pointer-events: none; /* This makes clicks pass through the icon to the button */
            display: block;
        }

        /* --- Footer --- */
        footer {
            text-align: center;
            padding: 1.5rem;
            color: var(--text-muted);
            font-size: 0.85rem;
            border-top: 1px solid var(--border-color);
            background-color: var(--card-bg);
            position: relative;
            z-index: 5;
        }

        /* --- Toast Notification --- */
        #toast-container {
            position: fixed; bottom: 20px; left: 50%;
            transform: translateX(-50%); z-index: 9999;
            pointer-events: none;
        }
        .toast {
            background-color: #333; color: #fff;
            padding: 12px 24px; border-radius: 8px;
            margin-top: 10px; opacity: 0; transform: translateY(20px);
            transition: opacity 0.3s ease, transform 0.3s ease;
            box-shadow: var(--shadow-lg); font-size: 0.9rem;
            display: flex; align-items: center; gap: 10px;
            pointer-events: auto;
        }
        .toast.show { opacity: 1; transform: translateY(0); }
        .toast.error { background-color: var(--error-color); }
        .toast.success { background-color: var(--primary-color); }

        @media (max-width: 768px) {
            header { flex-direction: column; align-items: flex-start; }
            .header-actions { width: 100%; justify-content: space-between; margin-top: 0.5rem; }
            .header-title { font-size: 1rem; }
        }
    </style>
</head>
<body>

    <header>
        <div class="header-title">
            JAMALI SAIDI KAZEMBE MULTISYSTEM MANAGEMENT
        </div>
        <nav class="header-actions">
            <a href="instruction.html" class="btn-instruction">Instruction</a>
            <a href="whatsapp.html" class="whatsapp-link">
                <i class="fab fa-whatsapp whatsapp-icon"></i>
                <span>Contact us for more help</span>
            </a>
        </nav>
    </header>

    <main>
        <section class="login-card">
            <p class="login-message">
                Please log in to start using the system and to save and secure your information.
            </p>

            <!-- Google Login Button -->
            <button id="googleLoginBtn" class="google-btn" type="button">
                <!-- Actual Google G Logo SVG -->
                <!-- Added pointer-events="none" to SVG just in case inline styles fail -->
                <svg class="google-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" style="pointer-events: none;">
                    <path fill="#FFC107" d="M43.611,20.083H42V20H24v8h11.303c-1.649,4.657-6.08,8-11.303,8c-6.627,0-12-5.373-12-12c0-6.627,5.373-12,12-12c3.059,0,5.842,1.154,7.961,3.039l5.657-5.657C34.046,6.053,29.268,4,24,4C12.955,4,4,12.955,4,24c0,11.045,8.955,20,20,20c11.045,0,20-8.955,20-20C44,22.659,43.862,21.35,43.611,20.083z"/>
                    <path fill="#FF3D00" d="M6.306,14.691l6.571,4.819C14.655,15.108,18.961,12,24,12c3.059,0,5.842,1.154,7.961,3.039l5.657-5.657C34.046,6.053,29.268,4,24,4C16.318,4,9.656,8.337,6.306,14.691z"/>
                    <path fill="#4CAF50" d="M24,44c5.166,0,9.86-1.977,13.409-5.192l-6.19-5.238C29.211,35.091,26.715,36,24,36c-5.202,0-9.619-3.317-11.283-7.946l-6.522,5.025C9.505,39.556,16.227,44,24,44z"/>
                    <path fill="#1976D2" d="M43.611,20.083H42V20H24v8h11.303c-0.792,2.237-2.231,4.166-4.087,5.571c0.001-0.001,0.002-0.001,0.003-0.002l6.19,5.238C36.971,39.205,44,34,44,24C44,22.659,43.862,21.35,43.611,20.083z"/>
                </svg>
                Sign in with Google
            </button>
        </section>
    </main>

    <footer>
        &copy; 2023 Jamali Saidi Kazembe Multisystem Management. All rights reserved.
    </footer>

    <div id="toast-container"></div>

    <script src="login.js"></script>

</body>
</html>
