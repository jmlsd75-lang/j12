<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JAMAL SAID KAZEMBE MULTISYSTEM MANAGEMENT</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f0f0f0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .login-btn {
      padding: 20px 50px;
      font-size: 20px;
      background-color: #007BFF;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: 0.2s;
    }

    .login-btn:hover {
      background-color: #0056b3;
    }
  </style>
</head>
<body>

  <!-- Login Button -->
  <button id="googleLoginBtn" class="login-btn">Login with Google</button>

  <!-- Include login.js -->
  <script type="module" src="login.js"></script>

</body>
</html>
