<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JAMAL SAID KAZEMBE MULTISYSTEM MANAGEMENT</title>
<link rel="stylesheet" href="style.css"> <!-- optional if you want external CSS -->
<style>
  body {
    display: flex;
    flex-direction: column;
    justify-content: flex-start;
    align-items: center;
    height: 100vh;
    margin: 0;
    font-family: Arial, sans-serif;
    background-color: #f5f5f5;
    padding-top: 50px;
    text-align: center;
  }

  h1 {
    line-height: 1.2;
  }

  .line1 {
    color: #2E86C1; /* blue shade */
    display: block;
    font-size: 2em;
  }

  .line2 {
    color: #C0392B; /* red shade */
    display: block;
    font-size: 1.5em;
  }

  .login-text {
    color: #007BFF; /* blue text */
    font-size: 1.2em;
    margin: 20px 0 10px 0;
  }

  .login-btn {
    background-color: #28a745; /* green button */
    color: white;
    font-size: 1.2em;
    padding: 12px 30px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    transition: background 0.3s;
  }

  .login-btn:hover {
    background-color: #218838; /* darker green on hover */
  }
</style>
</head>
<body>

<h1>
  <span class="line1">JAMAL SAID KAZEMBE</span>
  <span class="line2">MULTISYSTEM MANAGEMENT</span>
</h1>

<div class="login-text">Login to start using the system</div>
<button class="login-btn" id="loginBtn">Login</button>

<script src="login.js"></script>
</body>
</html>
