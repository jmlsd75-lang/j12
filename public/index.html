<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jamal Said Kazembe Multisystem Management</title>

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:#f4f4f4;
  display:flex;
  flex-direction:column;
  align-items:center;
  padding-top:50px;
}

h1{color:blue;margin:0;}
h2{color:red;font-size:16px;margin-top:5px;}

#userDisplay{
  position:fixed;
  top:20px;
  font-weight:bold;
}

/* FREE BUTTON */
.free-btn{
  position:fixed;
  top:80px;
  background:#28a745;
  color:white;
  padding:12px 25px;
  border:none;
  border-radius:6px;
  display:none;
}

/* LOGIN */
.login-btn{
  position:fixed;
  bottom:30px;
  padding:15px 40px;
  font-size:20px;
  background:#28a745;
  color:white;
  border:none;
  border-radius:6px;
}

/* LOGOUT */
.logout-btn{
  position:fixed;
  bottom:30px;
  right:20px;
  background:#dc3545;
  color:white;
  padding:12px 25px;
  border:none;
  border-radius:6px;
  display:none;
}
</style>
</head>

<body>

<div id="userDisplay"></div>

<h1>JAMAL SAID KAZEMBE</h1>
<h2>MULTISYSTEM MANAGEMENT</h2>

<button class="login-btn">LOGIN</button>
<button class="free-btn">FREE</button>
<button class="logout-btn">LOGOUT</button>

<!-- JS FILE -->
<script type="module" src="login.js"></script>

</body>
</html>
