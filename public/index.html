<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JAMAL SAID KAZEMBE MULTISYSTEM MANAGEMENT</title>
<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #f4f4f4;
    display: flex;
    flex-direction: column;
    min-height: 100vh;
    text-align: center;
  }

  header {
    padding: 20px 0;
  }

  h1 { font-size: 28px; color: blue; margin: 0; }
  h2 { font-size: 18px; color: red; margin: 5px 0 0 0; }

  main {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
  }

  #loginMessage {
    margin-bottom: 10px;
    font-size: 16px;
    color: #333;
  }

  .login-btn, .logout-btn {
    padding: 15px 40px;
    font-size: 20px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    color: white;
    margin-top: 10px;
  }
  .login-btn { background: #28a745; }
  .logout-btn { background: #dc3545; display: none; }

  #userDisplay { margin-bottom: 20px; font-weight: bold; display: none; }

  /* FREE button placeholder style */
  #freeContainer { margin-bottom: 15px; }
</style>
</head>
<body>

<header>
  <h1>JAMAL SAID KAZEMBE</h1>
  <h2>MULTISYSTEM MANAGEMENT</h2>
</header>

<main>
  <div id="userDisplay"></div>
  <p id="loginMessage">Login to start using the system</p>

  <!-- FREE button placeholder -->
  <div id="freeContainer"></div>

  <button class="login-btn">LOGIN</button>
  <button class="logout-btn">LOGOUT</button>
</main>

<script type="module">
// ------------------ Firebase Setup ------------------
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import './free.js'; // import free.js, it handles the FREE button functionality

const firebaseConfig = {
  apiKey: "AIzaSyDpNJIZoLeZUhIoTepbLb_3rRLpseu9Zdo",
  authDomain: "my-project-66803-95cb3.firebaseapp.com",
  projectId: "my-project-66803-95cb3",
  storageBucket: "my-project-66803-95cb3.firebasestorage.app",
  messagingSenderId: "167159607898",
  appId: "1:167159607898:web:23ca11366b88868b085e63"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const provider = new GoogleAuthProvider();

// ------------------ DOM Elements ------------------
const loginBtn = document.querySelector(".login-btn");
const logoutBtn = document.querySelector(".logout-btn");
const userDisplay = document.getElementById("userDisplay");
const headerH1 = document.querySelector("header h1");
const loginMessage = document.getElementById("loginMessage");

// ------------------ Auth State ------------------
onAuthStateChanged(auth, (user) => {
  if (user) {
    headerH1.textContent = `Welcome, ${user.displayName}`;
    userDisplay.style.display = "none";
    loginBtn.style.display = "none";
    logoutBtn.style.display = "block";
    loginMessage.style.display = "none";
    // FREE button controlled by free.js, you can optionally hide it here if needed
  } else {
    headerH1.textContent = "JAMAL SAID KAZEMBE";
    loginBtn.style.display = "block";
    logoutBtn.style.display = "none";
    loginMessage.style.display = "block";
    // FREE button controlled by free.js
  }
});

// ------------------ Login & Logout ------------------
loginBtn.onclick = async () => {
  try { await signInWithPopup(auth, provider); } 
  catch (error) { alert("Login failed. Please try again."); }
};

logoutBtn.onclick = async () => {
  try { await signOut(auth); alert("Logged out successfully."); } 
  catch (error) { console.error(error); }
};
</script>

</body>
</html>
