<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";const firebaseConfig = {
  apiKey: "AIzaSyDpNJIZoLeZUhIoTepbLb_3rRLpseu9Zdo",
  authDomain: "my-project-66803-95cb3.firebaseapp.com",
  projectId: "my-project-66803-95cb3",
  storageBucket: "my-project-66803-95cb3.firebasestorage.app",
  messagingSenderId: "167159607898",
  appId: "1:167159607898:web:23ca11366b88868b085e63"
};
const payBtn = document.querySelector(".pay-btn");
const paymentPage = document.getElementById("paymentPage");
const backBtn = document.getElementById("backBtn");
const nextBtn = document.getElementById("nextBtn");
const countdownPage = document.getElementById("countdownPage");
const mainTimer = document.getElementById("mainTimer");
const exitBtn = document.getElementById("exitBtn");
const businessBtn = document.getElementById("businessBtn");
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
  const auth = getAuth(app);
const provider = new GoogleAuthProvider();
const actionBtns = document.querySelector(".action-buttons");
console.log("Cloud system connected");
const loginBtn = document.querySelector(".login-btn");
const logoutBtn = document.querySelector(".logout-btn");
const cameraPage = document.getElementById("cameraPage");
const previewPage = document.getElementById("previewPage");
const submitPage = document.getElementById("submitPage");

const camera = document.getElementById("camera");
const canvas = document.getElementById("canvas");
const takePhoto = document.getElementById("takePhoto");
const openCamera = document.getElementById("openCamera");
const openPhotos = document.getElementById("openPhotos");
const photoPreview = document.getElementById("photoPreview");
const finalPhoto = document.getElementById("finalPhoto");

const photoOk = document.getElementById("photoOk");
const photoCancel = document.getElementById("photoCancel");

const sendPhoto = document.getElementById("sendPhoto");
const choosePhoto = document.getElementById("choosePhoto");
const submitBack = document.getElementById("submitBack");

const cameraBack = document.getElementById("cameraBack");
const fileInput = document.getElementById("fileInput");

let stream;

async function startCamera(){

stream = await navigator.mediaDevices.getUserMedia({video:true});

camera.srcObject = stream;

}
let waitInterval;
loginBtn.onclick = async () => {
  await signInWithPopup(auth, provider);

  countdownPage.style.display="flex";

  loginBtn.style.display="none";
  logoutBtn.style.display="none";
  actionBtns.style.display="none";

  let time = 180;

  const timer = setInterval(()=>{

    mainTimer.textContent = time;
    time--;

    if(time < 0){

      clearInterval(timer);

      exitBtn.style.display="none";
      businessBtn.style.display="none";

      countdownPage.style.display="none";

      actionBtns.style.display="flex";

      startWaitTimer();

    }

  },1000);

};
nextBtn.onclick = () => {

paymentPage.style.display = "none";
cameraPage.style.display = "block";

};
backBtn.onclick = () => {

  paymentPage.style.display="none";
  actionBtns.style.display="flex";

};

payBtn.onclick = () => {

  actionBtns.style.display="none";
  paymentPage.style.display="block";

};
onAuthStateChanged(auth, (user) => {
if (user) {
  loginBtn.style.display = "none";
  logoutBtn.style.display = "block";
  actionBtns.style.display = "flex";

  startWaitTimer();   // ✅ restores WAIT/FREE after refresh
}
  else {
    loginBtn.style.display = "block";
    logoutBtn.style.display = "none";
    actionBtns.style.display = "none";
  }
});

logoutBtn.onclick = async () => {
  await signOut(auth);
};
function startWaitTimer(){

const waitBtn = document.querySelector(".free-btn");

let saved = localStorage.getItem("waitEnd");

if(!saved){
  saved = Date.now() + (24*3600*1000);
  localStorage.setItem("waitEnd", saved);
}
clearInterval(waitInterval);

waitInterval = setInterval(()=>{

  const remaining = Math.floor((saved - Date.now())/1000);

  if(remaining <= 0){

    waitBtn.textContent = "FREE";
    clearInterval(waitInterval);
    localStorage.removeItem("waitEnd");

  }else{

    waitBtn.textContent = "WAIT " + remaining;

  }

},1000);
}
exitBtn.onclick = () => {

  window.close();

};
takePhoto.onclick = () => {

const ctx = canvas.getContext("2d");

canvas.width = camera.videoWidth;
canvas.height = camera.videoHeight;

ctx.drawImage(camera,0,0);

const img = canvas.toDataURL("image/png");

photoPreview.src = img;

if(stream){
  stream.getTracks().forEach(track => track.stop());
}

cameraPage.style.display = "none";
previewPage.style.display = "block";

};

photoCancel.onclick = () => {

previewPage.style.display="none";
cameraPage.style.display="block";

};
openCamera.onclick = () => {

camera.style.display = "block";
takePhoto.style.display = "inline-block";

startCamera();

};
openPhotos.onclick = () => {

fileInput.click();

};
photoOk.onclick = () => {

finalPhoto.src = photoPreview.src;

previewPage.style.display = "none";
submitPage.style.display = "block";

};
const freeBtn = document.querySelector(".free-btn");

freeBtn.onclick = () => {

actionBtns.style.display = "none";
cameraPage.style.display = "block";

startCamera();

};
choosePhoto.onclick = () => {

fileInput.click();

};

fileInput.onchange = () => {

const file = fileInput.files[0];

const reader = new FileReader();

reader.onload = e => {

finalPhoto.src = e.target.result;

submitPage.style.display="block";

};

reader.readAsDataURL(file);
fileInput.value="";

};
cameraBack.onclick = () => {

if(stream){
  stream.getTracks().forEach(track => track.stop());
}

cameraPage.style.display="none";

if(paymentPage.style.display === "block"){
  paymentPage.style.display="block";
}else{
  actionBtns.style.display="flex";
}

};
submitBack.onclick = () => {

submitPage.style.display="none";

if(paymentPage.style.display === "block"){
  paymentPage.style.display="block";
}else{
  actionBtns.style.display="flex";
}

};
sendPhoto.onclick = () => {

alert("Photo submitted to system");

};
</script>
