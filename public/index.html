<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JAMALI SAID KAZEMBE MULTISYSTEM MANAGEMENT</title>
  <!-- Cloud-hosted Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Cloud-hosted Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@200;400;700&family=Source+Sans+3:wght@300;400;600&display=swap" rel="stylesheet" />
  <!-- Cloud-hosted Font Awesome Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

  <!-- Tailwind Config -->
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            bg: '#0a0a0f',
            fg: '#f0ece4',
            muted: '#6b6560',
            accent: '#d4a24e',
            'accent-glow': 'rgba(212, 162, 78, 0.35)',
            card: 'rgba(255, 255, 255, 0.04)',
            border: 'rgba(255, 255, 255, 0.08)',
          },
          fontFamily: {
            display: ['Oswald', 'sans-serif'],
            body: ['Source Sans 3', 'sans-serif'],
          },
        },
      },
    };
  </script>

  <style>
    /* Only the things Tailwind can't do: keyframes, canvas, pseudo-elements */

    @keyframes breathe {
      0%   { opacity: 0.5; transform: translate(-50%, -50%) scale(1); }
      100% { opacity: 1;   transform: translate(-50%, -50%) scale(1.15); }
    }

    @keyframes drift {
      0%   { background-position: 0 0; }
      100% { background-position: 170px 170px; }
    }

    @keyframes revealLine {
      from { opacity: 0; transform: translateY(30px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    .bg-radial::before {
      content: '';
      position: absolute;
      top: 30%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 900px;
      height: 900px;
      background: radial-gradient(circle, rgba(212, 162, 78, 0.35) 0%, transparent 70%);
      animation: breathe 6s ease-in-out infinite alternate;
    }

    .bg-lines::after {
      content: '';
      position: absolute;
      inset: 0;
      background-image: repeating-linear-gradient(
        -45deg, transparent, transparent 60px,
        rgba(255,255,255,0.08) 60px, rgba(255,255,255,0.08) 61px
      );
      opacity: 0.4;
      animation: drift 30s linear infinite;
    }

    .line-1 { animation: revealLine 0.8s 0.3s ease-out both; }
    .line-2 { animation: revealLine 0.8s 0.6s ease-out both; }
    .line-3 { animation: revealLine 0.8s 0.9s ease-out both; }
    .anim-fade-1 { animation: fadeIn 0.6s 1.2s ease-out both; }
    .anim-fade-2 { animation: fadeIn 0.6s 1.5s ease-out both; }
    .anim-fade-3 { animation: fadeIn 0.6s 1.8s ease-out both; }
    .anim-fade-4 { animation: fadeIn 0.6s 2s ease-out both; }

    .login-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(120deg, transparent 30%, rgba(255,255,255,0.25) 50%, transparent 70%);
      transform: translateX(-100%);
      transition: transform 0.5s ease;
    }
    .login-btn:hover::before { transform: translateX(100%); }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
    }
  </style>
</head>
<body class="bg-bg text-fg font-body h-screen overflow-hidden">

  <!-- Background layers -->
  <div class="fixed inset-0 z-0 pointer-events-none bg-radial bg-lines" aria-hidden="true"></div>
  <canvas id="particles" class="fixed inset-0 z-[1] pointer-events-none" aria-hidden="true"></canvas>

  <!-- Corner accents -->
  <div class="fixed top-6 left-6 w-10 h-10 border-t-2 border-l-2 border-accent z-[2] anim-fade-3" aria-hidden="true"></div>
  <div class="fixed top-6 right-6 w-10 h-10 border-t-2 border-r-2 border-accent z-[2] anim-fade-3" aria-hidden="true"></div>
  <div class="fixed bottom-6 left-6 w-10 h-10 border-b-2 border-l-2 border-accent z-[2] anim-fade-3" aria-hidden="true"></div>
  <div class="fixed bottom-6 right-6 w-10 h-10 border-b-2 border-r-2 border-accent z-[2] anim-fade-3" aria-hidden="true"></div>

  <!-- Main content -->
  <main class="relative z-[2] flex flex-col items-center justify-center h-screen px-8">

    <!-- System Title -->
    <div class="text-center select-none mb-12" role="heading" aria-level="1" aria-label="Jamali Said Kazembe Multisystem Management">
      <span class="block font-display font-bold text-accent uppercase tracking-[0.12em] leading-tight text-[clamp(2.4rem,6vw,5.2rem)] drop-shadow-[0_0_40px_rgba(212,162,78,0.35)] line-1">
        JAMALI
      </span>
      <span class="block font-display font-normal text-fg uppercase tracking-[0.25em] leading-tight text-[clamp(1.8rem,4.5vw,3.8rem)] line-2">
        SAID KAZEMBE
      </span>
      <span class="block font-display font-extralight text-muted uppercase tracking-[0.35em] text-[clamp(0.9rem,2.2vw,1.5rem)] mt-2 line-3">
        MULTISYSTEM MANAGEMENT
      </span>
    </div>

    <!-- Divider -->
    <div class="w-32 h-0.5 bg-gradient-to-r from-transparent via-accent to-transparent mb-12 anim-fade-1" aria-hidden="true"></div>

    <!-- Login Button → login.html -->
    <a
      href="login.html"
      class="login-btn relative inline-flex items-center gap-3 px-12 py-4 font-display text-base font-normal tracking-[0.2em] uppercase text-bg bg-accent border-none rounded-sm cursor-pointer overflow-hidden transition-all duration-300 hover:-translate-y-0.5 hover:scale-[1.03] hover:shadow-[0_8px_40px_rgba(212,162,78,0.35),0_0_0_1px_#d4a24e] active:translate-y-0 active:scale-[0.98] focus-visible:outline-2 focus-visible:outline-accent focus-visible:outline-offset-4 no-underline anim-fade-2"
      role="button"
      aria-label="Proceed to login"
    >
      <span>Login</span>
      <i class="fa-solid fa-arrow-right text-sm transition-transform duration-300 group-hover:translate-x-1"></i>
    </a>
  </main>

  <!-- Footer tag -->
  <div class="fixed bottom-6 left-1/2 -translate-x-1/2 text-[0.7rem] text-muted tracking-[0.15em] uppercase z-[2] anim-fade-4" aria-hidden="true">
    Secure System Access
  </div>

  <!-- Particle system -->
  <script>
    (() => {
      const canvas = document.getElementById('particles');
      const ctx = canvas.getContext('2d');
      let w, h;
      const COUNT = 60;
      const particles = [];

      function resize() {
        w = canvas.width = window.innerWidth;
        h = canvas.height = window.innerHeight;
      }
      window.addEventListener('resize', resize);
      resize();

      class Particle {
        constructor() { this.reset(); }
        reset() {
          this.x = Math.random() * w;
          this.y = Math.random() * h;
          this.r = Math.max(0.5, Math.random() * 2);
          this.vx = (Math.random() - 0.5) * 0.3;
          this.vy = (Math.random() - 0.5) * 0.3;
          this.alpha = Math.random() * 0.5 + 0.1;
          this.pulse = Math.random() * Math.PI * 2;
          this.ps = Math.random() * 0.02 + 0.005;
        }
        update() {
          this.x += this.vx;
          this.y += this.vy;
          this.pulse += this.ps;
          if (this.x < -10) this.x = w + 10;
          if (this.x > w + 10) this.x = -10;
          if (this.y < -10) this.y = h + 10;
          if (this.y > h + 10) this.y = -10;
        }
        draw() {
          const a = this.alpha * (0.5 + 0.5 * Math.sin(this.pulse));
          ctx.beginPath();
          ctx.arc(this.x, this.y, Math.max(0.1, this.r), 0, Math.PI * 2);
          ctx.fillStyle = `rgba(212,162,78,${a.toFixed(3)})`;
          ctx.fill();
        }
      }

      for (let i = 0; i < COUNT; i++) particles.push(new Particle());

      function drawLines() {
        const max = 140;
        for (let i = 0; i < particles.length; i++) {
          for (let j = i + 1; j < particles.length; j++) {
            const dx = particles[i].x - particles[j].x;
            const dy = particles[i].y - particles[j].y;
            const d = Math.sqrt(dx * dx + dy * dy);
            if (d < max) {
              ctx.beginPath();
              ctx.moveTo(particles[i].x, particles[i].y);
              ctx.lineTo(particles[j].x, particles[j].y);
              ctx.strokeStyle = `rgba(212,162,78,${((1 - d / max) * 0.12).toFixed(3)})`;
              ctx.lineWidth = 0.5;
              ctx.stroke();
            }
          }
        }
      }

      function loop() {
        ctx.clearRect(0, 0, w, h);
        particles.forEach(p => { p.update(); p.draw(); });
        drawLines();
        requestAnimationFrame(loop);
      }
      loop();
    })();
  </script>
</body>
</html>
