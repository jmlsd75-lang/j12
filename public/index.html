<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jamal Said Kazembe Multisystem Management</title>

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:#f4f4f4;
  display:flex;
  flex-direction:column;
  align-items:center;
  padding-top:50px;
}

h1{color:blue;margin:0;}
h2{color:red;font-size:16px;margin-top:5px;}

/* USER NAME */
#userDisplay{
  position:fixed;
  top:20px;
  font-weight:bold;
}

/* FREE BUTTON (CENTER) */
.free-btn{
  position:fixed;
  top:80px;
  background:#28a745;
  color:white;
  padding:12px 25px;
  border:none;
  border-radius:6px;
  display:none;
}

/* LOGIN */
.login-btn{
  position:fixed;
  bottom:30px;
  padding:15px 40px;
  font-size:20px;
  background:#28a745;
  color:white;
  border:none;
  border-radius:6px;
}

/* LOGOUT */
.logout-btn{
  position:fixed;
  bottom:30px;
  right:20px;
  background:#dc3545;
  color:white;
  padding:12px 25px;
  border:none;
  border-radius:6px;
  display:none;
}
</style>
</head>

<body>

<div id="userDisplay"></div>

<h1>JAMAL SAID KAZEMBE</h1>
<h2>MULTISYSTEM MANAGEMENT</h2>

<button class="login-btn">LOGIN</button>
<button class="free-btn">FREE</button>
<button class="logout-btn">LOGOUT</button>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getAuth,
  GoogleAuthProvider,
  signInWithPopup,
  onAuthStateChanged,
  signOut
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

/* FIREBASE */
const firebaseConfig = {
  apiKey: "AIzaSyDpNJIZoLeZUhIoTepbLb_3rRLpseu9Zdo",
  authDomain: "my-project-66803-95cb3.firebaseapp.com",
  projectId: "my-project-66803-95cb3"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const provider = new GoogleAuthProvider();

/* ELEMENTS */
const loginBtn = document.querySelector(".login-btn");
const logoutBtn = document.querySelector(".logout-btn");
const freeBtn = document.querySelector(".free-btn");
const userDisplay = document.getElementById("userDisplay");

/* LOGIN */
loginBtn.onclick = async () => {
  try {
    await signInWithPopup(auth, provider);
  } catch {
    alert("Login failed");
  }
};

/* LOGOUT */
logoutBtn.onclick = async () => {
  await signOut(auth);
};

/* AUTH STATE */
onAuthStateChanged(auth, (user) => {
  if (user) {
    userDisplay.textContent = user.displayName || user.email;

    loginBtn.style.display = "none";
    logoutBtn.style.display = "block";
    freeBtn.style.display = "block";

  } else {
    userDisplay.textContent = "";

    loginBtn.style.display = "block";
    logoutBtn.style.display = "none";
    freeBtn.style.display = "none";
  }
});

/* FREE BUTTON */
freeBtn.onclick = () => {
  alert("Free access activated");
};
</script>

</body>
</html>
