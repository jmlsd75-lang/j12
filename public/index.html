<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>JAMALI SAIDI KAZEMBE MULTISYSTEM MANAGEMENT</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background: #f4f7f6;
            text-align: center;
        }

        header {
            background: #007bff;
            color: white;
            padding: 20px;
        }

        h1 {
            font-size: 20px;
            margin: 0;
        }

        .top-buttons {
            margin-top: 10px;
        }

        button {
            padding: 10px 15px;
            margin: 5px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
        }

        .instruction {
            background: #28a745;
            color: white;
        }

        .whatsapp {
            background: #25D366;
            color: white;
        }

        .login-box {
            margin-top: 60px;
        }

        .msg {
            margin-bottom: 15px;
            font-size: 15px;
            color: #333;
        }

        .login-btn {
            background: #db4437;
            color: white;
            font-size: 16px;
        }

        .spinner {
            width: 16px;
            height: 16px;
            border: 2px solid #ddd;
            border-top: 2px solid #4285F4;
            border-radius: 50%;
            display: inline-block;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            100% { transform: rotate(360deg); }
        }
    </style>
</head>

<body>

<header>
    <h1>JAMALI SAIDI KAZEMBE MULTISYSTEM MANAGEMENT</h1>

    <div class="top-buttons">
        <button class="instruction" onclick="location.href='instruction.html'">
            Instruction
        </button>

        <button class="whatsapp" onclick="location.href='whatsapp.html'">
            📱 Contact us for more help
        </button>
    </div>
</header>

<div class="login-box">

    <div class="msg">
        Please log in to start using the system and to save and secure your information.
    </div>

    <button id="googleLoginBtn" class="login-btn">
        🔐 Login with Google
    </button>

</div>

<!-- Connect the external JavaScript file -->
<script type="module" src="login.js"></script>

</body>
</html>
