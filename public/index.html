<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jamal Said Kazembe Multisystem Management</title>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
<style>
  body{ margin:0; font-family:Arial, sans-serif; background:#f4f4f4; display:flex; flex-direction:column; justify-content:flex-start; align-items:center; min-height:100vh; text-align:center; padding-top:50px; }
  h1{ font-size:28px; color:blue; margin:0; }
  h2{ color:red; margin-top:5px; font-size:16px; }

  .login-btn, .logout-btn, .pay-btn, .access-btn {
    position: fixed; left: 50%; transform: translateX(-50%); border:none; cursor:pointer; display: none; 
  }
  .login-btn{ bottom: 30px; padding:15px 40px; font-size:20px; background:#28a745; color:white; border-radius:6px; }
  .pay-btn{ top: 50%; left: 50%; transform: translate(-50%, -50%); padding:18px 50px; font-size:22px; background-color: #28a745; color:white; border-radius:8px; }
  .access-btn{ top: 50%; left: 50%; transform: translate(-50%, -50%); padding:18px 50px; font-size:22px; background-color: #007bff; color:white; border-radius:8px; }
  .logout-btn{ bottom: 30px; background:#dc3545; color:white; padding:10px 25px; border-radius:6px; font-size:16px; }
  
  #userDisplay { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); font-size: 18px; font-weight: bold; color: #333; display: none; }

  #payPage{ position: fixed; top:0; left:0; width:100%; height:100%; background:#ffffff; display:none; flex-direction:column; justify-content:center; align-items:center; text-align:center; z-index: 10; }
  .pay-info p{ margin:10px; font-size:18px; }
  .mix{ color:green; } .airtel{ color:red; } .crdb{ color:blue; } .name{ color:black; font-weight:bold; }
  .pay-actions{ position: fixed; bottom: 30px; display:flex; gap:20px; }
  .back-btn{ padding:12px 25px; background:gray; color:white; border:none; border-radius:6px; cursor: pointer; }
  .next-btn{ padding:12px 25px; background:green; color:white; border:none; border-radius:6px; cursor: pointer; }

  #cameraMenuPage { position: fixed; top:0; left:0; width:100%; height:100%; background: #ffffff; display:none; flex-direction: column; justify-content: center; align-items: center; gap: 20px; z-index: 20; }
  #openCameraBtn { padding: 15px 40px; font-size: 20px; background: #007bff; color: white; border: none; border-radius: 6px; cursor: pointer; }
  #openPhotosBtn { padding: 15px 40px; font-size: 20px; background: #17a2b8; color: white; border: none; border-radius: 6px; cursor: pointer; }
  #backFromCameraBtn { padding: 15px 40px; font-size: 20px; background: #dc3545; color: white; border: none; border-radius: 6px; cursor: pointer; }

  #previewPage { position: fixed; top:0; left:0; width:100%; height:100%; background: white; display:none; flex-direction: column; justify-content: center; align-items: center; z-index: 30; }
  #previewImage { max-width: 90%; max-height: 60%; border-radius: 10px; margin-bottom: 20px; box-shadow: 0 4px 8px rgba(0,0,0,0.2); }
  .preview-actions { display: flex; gap: 20px; }
  #submitBtn { padding: 12px 25px; background: green; color: white; border: none; border-radius: 6px; font-size: 18px; cursor: pointer; }
  #cancelBtn { padding: 12px 25px; background: red; color: white; border: none; border-radius: 6px; font-size: 18px; cursor: pointer; }

  #timerPage { position: fixed; top:0; left:0; width:100%; height:100%; background: #f4f4f4; display:none; flex-direction: column; justify-content: center; align-items: center; z-index: 40; }
  #timerDisplay { font-size: 60px; font-weight: bold; color: #333; }
  #timerStatus { margin-top: 20px; font-size: 20px; color: #666; }
  #timerButtons { margin-top: 30px; display: none; gap: 20px; }
  .timer-action-btn { padding: 15px 30px; font-size: 18px; color: white; border: none; border-radius: 6px; cursor: pointer; }
  #businessBtn { background: #007bff; }
  #exitBtn { background: #dc3545; }

  #loadingOverlay { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(255,255,255,0.9); display:none; justify-content: center; align-items: center; flex-direction: column; z-index: 100; }
  .loader { border: 8px solid #f3f3f3; border-top: 8px solid #3498db; border-radius: 50%; width: 60px; height: 60px; animation: spin 1s linear infinite; }
  @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
</style>
</head>
<body>

<div id="userDisplay"></div>
<h1>JAMAL SAID KAZEMBE</h1>
<h2>MULTISYSTEM MANAGEMENT</h2>
  
<button class="login-btn">LOGIN</button>
<button class="pay-btn">PAY</button>
<button class="access-btn">ACCESS</button>
<button class="logout-btn">LOGOUT</button>

<input type="file" id="cameraInput" accept="image/*" capture="environment" style="display:none;">
<input type="file" id="photosInput" accept="image/*" style="display:none;">

<div id="payPage">
  <div class="pay-info">
    <p>Pay through:</p>
    <p class="mix">Mix by Yas:</p>
    <p class="mix">+255 655 510 714</p>
    <p class="airtel">Airtel Money:</p>
    <p class="airtel">+255 780 526 437</p>
    <p class="crdb">CRDB:</p>
    <p class="crdb">0152001GN6K00</p>
    <p class="name">JAMALI SAIDI KAZEMBE</p>
  </div>
  <div class="pay-actions">
    <button class="back-btn">BACK</button>
    <button class="next-btn">NEXT</button>
  </div>
</div>

<div id="cameraMenuPage">
  <button id="openCameraBtn">CAMERA</button>
  <button id="openPhotosBtn">PHOTOS</button>
  <button id="backFromCameraBtn">BACK</button>
</div>

<div id="previewPage">
  <img id="previewImage" src="" alt="Payment Preview">
  <div class="preview-actions">
    <button id="submitBtn">SUBMIT</button>
    <button id="cancelBtn">CANCEL</button>
  </div>
</div>

<div id="timerPage">
  <div id="userDisplayTimer" style="margin-bottom:20px; font-size:24px; font-weight:bold;"></div>
  <div id="timerDisplay">00:00:00</div>
  <div id="timerStatus">Session Active</div>
  <div id="timerButtons">
    <button id="businessBtn" class="timer-action-btn">BUSINESS</button>
    <button id="exitBtn" class="timer-action-btn">EXIT</button>
  </div>
</div>

<div id="loadingOverlay">
  <div class="loader"></div>
  <p id="loadingText" style="margin-top:20px;">Processing Payment...</p>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyDpNJIZoLeZUhIoTepbLb_3rRLpseu9Zdo",
  authDomain: "my-project-66803-95cb3.firebaseapp.com",
  projectId: "my-project-66803-95cb3",
  storageBucket: "my-project-66803-95cb3.firebasestorage.app",
  messagingSenderId: "167159607898",
  appId: "1:167159607898:web:23ca11366b88868b085e63"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const provider = new GoogleAuthProvider();

// --- DOM Elements ---
const loginBtn = document.querySelector(".login-btn");
const logoutBtn = document.querySelector(".logout-btn");
const payBtn = document.querySelector(".pay-btn");
const accessBtn = document.querySelector(".access-btn");
const userDisplay = document.getElementById("userDisplay");
const payPage = document.getElementById("payPage");
const backBtn = document.querySelector(".back-btn");
const nextBtn = document.querySelector(".next-btn");
const cameraMenuPage = document.getElementById("cameraMenuPage");
const openCameraBtn = document.getElementById("openCameraBtn");
const openPhotosBtn = document.getElementById("openPhotosBtn");
const backFromCameraBtn = document.getElementById("backFromCameraBtn");
const cameraInput = document.getElementById("cameraInput");
const photosInput = document.getElementById("photosInput");
const previewPage = document.getElementById("previewPage");
const previewImage = document.getElementById("previewImage");
const submitBtn = document.getElementById("submitBtn");
const cancelBtn = document.getElementById("cancelBtn");
const timerPage = document.getElementById("timerPage");
const timerDisplay = document.getElementById("timerDisplay");
const userDisplayTimer = document.getElementById("userDisplayTimer");
const timerStatus = document.getElementById("timerStatus");
const timerButtons = document.getElementById("timerButtons");
const businessBtn = document.getElementById("businessBtn");
const exitBtn = document.getElementById("exitBtn");
const loadingOverlay = document.getElementById("loadingOverlay");
const loadingText = document.getElementById("loadingText");

let selectedFile = null;
let timerInterval = null;

// --- Auth Logic ---
onAuthStateChanged(auth, (user) => {
  if (user) {
    userDisplay.textContent = user.displayName;
    showPage('main');
  } else {
    userDisplay.style.display = "none";
    loginBtn.style.display = "block";
    payBtn.style.display = "none";
    accessBtn.style.display = "none";
    logoutBtn.style.display = "none";
  }
});

loginBtn.onclick = async () => { try { await signInWithPopup(auth, provider); } catch (e) { alert("Login failed"); } };
logoutBtn.onclick = async () => { clearInterval(timerInterval); localStorage.removeItem("sessionEnd"); await signOut(auth); showPage('main'); };
accessBtn.onclick = () => { startTimerFromStorage(); showPage('timer'); };

// --- Navigation Logic ---
function showPage(page) {
  payPage.style.display = "none"; cameraMenuPage.style.display = "none"; previewPage.style.display = "none"; timerPage.style.display = "none";
  payBtn.style.display = "none"; accessBtn.style.display = "none"; logoutBtn.style.display = "none"; userDisplay.style.display = "none";

  if(page === 'main' && auth.currentUser) {
    userDisplay.style.display = "block"; logoutBtn.style.display = "block";
    const endTime = localStorage.getItem("sessionEnd");
    if (endTime && Date.now() < parseInt(endTime)) { accessBtn.style.display = "block"; } 
    else { payBtn.style.display = "block"; }
  } else if (page === 'pay') { payPage.style.display = "flex"; } 
  else if (page === 'camera') { cameraMenuPage.style.display = "flex"; } 
  else if (page === 'preview') { previewPage.style.display = "flex"; } 
  else if (page === 'timer') { timerPage.style.display = "flex"; userDisplayTimer.textContent = auth.currentUser ? auth.currentUser.displayName : "User"; }
}

payBtn.onclick = () => showPage('pay');
backBtn.onclick = () => showPage('main');
nextBtn.onclick = () => showPage('camera');
backFromCameraBtn.onclick = () => showPage('main');

// --- Camera & Photos Logic ---
openCameraBtn.onclick = () => cameraInput.click();
openPhotosBtn.onclick = () => photosInput.click();

function handleFile(file) {
  if (!file) { showPage('main'); return; }
  selectedFile = file;
  const reader = new FileReader();
  reader.onload = (e) => { previewImage.src = e.target.result; showPage('preview'); };
  reader.readAsDataURL(file);
  cameraInput.value = ""; photosInput.value = "";
}

cameraInput.onchange = (e) => handleFile(e.target.files[0]);
photosInput.onchange = (e) => handleFile(e.target.files[0]);
cancelBtn.onclick = () => { selectedFile = null; previewImage.src = ""; showPage('camera'); };

// --- Timer Logic ---
function startTimer(seconds) {
  clearInterval(timerInterval);
  const endTime = Date.now() + seconds * 1000;
  localStorage.setItem("sessionEnd", String(endTime));
  timerInterval = setInterval(() => {
    const remaining = Math.max(0, Math.floor((endTime - Date.now()) / 1000));
    if (remaining <= 0) {
      clearInterval(timerInterval); timerDisplay.textContent = "00:00:00"; timerStatus.textContent = "Session Expired";
      localStorage.removeItem("sessionEnd"); setTimeout(() => { showPage('main'); timerButtons.style.display = "none"; }, 2000);
      return;
    }
    timerDisplay.textContent = "00:" + String(Math.floor(remaining / 60)).padStart(2, '0') + ":" + String(remaining % 60).padStart(2, '0');
  }, 1000);
}

function startTimerFromStorage() {
  const endTime = parseInt(localStorage.getItem("sessionEnd")); if(!endTime) return;
  timerButtons.style.display = "flex"; clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    const rem = Math.max(0, Math.floor((endTime - Date.now()) / 1000));
    if(rem <= 0){ clearInterval(timerInterval); localStorage.removeItem("sessionEnd"); showPage('main'); return; }
    timerDisplay.textContent = "00:" + String(Math.floor(rem / 60)).padStart(2, '0') + ":" + String(rem % 60).padStart(2, '0');
  }, 1000);
}

exitBtn.onclick = () => { clearInterval(timerInterval); localStorage.removeItem("sessionEnd"); timerButtons.style.display = "none"; showPage('main'); };

// -------------------------------------------------------
// IMAGE PREPROCESSING
// -------------------------------------------------------
function preprocessImage(canvas) {
  const ctx = canvas.getContext('2d');
  const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
  const data = imageData.data;
  let totalBrightness = 0;
  
  for (let i = 0; i < data.length; i += 4) {
    const avg = (data[i] + data[i + 1] + data[i + 2]) / 3;
    data[i] = avg; data[i + 1] = avg; data[i + 2] = avg;
    totalBrightness += avg;
  }

  const avgBrightness = totalBrightness / (data.length / 4);

  for (let i = 0; i < data.length; i += 4) {
    let val = data[i];
    if (avgBrightness < 128) val = 255 - val;
    if (val > 140) val = 255; else if (val < 120) val = 0;
    data[i] = val; data[i+1] = val; data[i+2] = val;
  }
  ctx.putImageData(imageData, 0, 0);
  return canvas;
}

// -------------------------------------------------------
// VALIDATION NAMES
// -------------------------------------------------------
const VALID_NAMES = [
  "JAMAL SAID KAZEMBE",
  "JAMAL SAID",
  "JAMAL KAZEMBE"
];

// -------------------------------------------------------
// SUBMIT LOGIC
// -------------------------------------------------------
submitBtn.onclick = async () => {
  if (!selectedFile) { alert("No file selected."); return; }

  loadingOverlay.style.display = "flex";
  loadingText.textContent = "Verifying Account...";
  let objectUrl = null;

  try {
    const img = new Image();
    objectUrl = URL.createObjectURL(selectedFile);
    img.src = objectUrl;

    await new Promise((resolve, reject) => {
      const timer = setTimeout(() => reject(new Error("Timeout")), 5000);
      img.onload = () => { clearTimeout(timer); resolve(); };
      img.onerror = () => reject(new Error("Invalid image"));
    });

    const MAX_W = 1500;
    const scale = Math.min(1, MAX_W / img.width);
    const canvas = document.createElement("canvas");
    const ctx = canvas.getContext("2d");
    canvas.width = Math.floor(img.width * scale);
    canvas.height = Math.floor(img.height * scale);
    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);

    let detectedText = "";
    let isQR = false;

    // Check QR first
    const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
    const qr = jsQR(imageData.data, canvas.width, canvas.height);
    
    if (qr && qr.data) {
      detectedText = qr.data;
      isQR = true;
      console.log("✅ QR Found:", detectedText);
    } else {
      loadingText.textContent = "Reading text...";
      preprocessImage(canvas);
      
      const { data } = await Tesseract.recognize(canvas, "eng", {
        tessedit_pageseg_mode: 6
      });
      detectedText = (data.text || "").replace(/\s+/g, " ").trim();
      console.log("✅ OCR Found:", detectedText);
    }

    // -------------------------------------------------------
    // NAME CHECK LOGIC
    // -------------------------------------------------------
    
    // Convert detected text to uppercase for matching
    const upperText = detectedText.toUpperCase();
    // Remove extra spaces to handle "Jamal  Said" -> "JAMAL SAID"
    const cleanSearchText = upperText.replace(/\s+/g, " ");

    let nameFound = false;

    // Check if any of the valid names exist in the text
    for (const name of VALID_NAMES) {
      if (cleanSearchText.includes(name)) {
        nameFound = true;
        console.log("✅ Name Matched:", name);
        break; 
      }
    }

    // Decision
    if (nameFound) {
      // SUCCESS
      startTimer(60);
      timerButtons.style.display = "flex";
      showPage("timer");
    } else {
      // FAILURE: Name not found
      alert("Incorrect account: Name not found in image.\n\nRequired: JAMAL SAID KAZEMBE (or similar).");
      showPage("pay");
    }

  } catch (error) {
    console.error(error);
    alert("Error processing image. Please try again.");
    showPage("pay");
  } finally {
    if (objectUrl) URL.revokeObjectURL(objectUrl);
    loadingOverlay.style.display = "none";
  }
};
</script>
</body>
</html>
