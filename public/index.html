<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jamal Said Kazembe Multisystem Management</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Inter', sans-serif;
            background: #050505;
            overflow: hidden;
            position: relative;
        }

        /* Ambient background glow */
        body::before {
            content: '';
            position: fixed;
            top: -30%;
            left: 50%;
            transform: translateX(-50%);
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(249,115,22,0.08) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        body::after {
            content: '';
            position: fixed;
            bottom: -20%;
            left: 30%;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(168,85,247,0.05) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        /* Floating grid dots */
        .bg-dots {
            position: fixed;
            inset: 0;
            z-index: 0;
            background-image: radial-gradient(rgba(255,255,255,0.03) 1px, transparent 1px);
            background-size: 32px 32px;
            pointer-events: none;
        }

        /* Main card */
        .login-card {
            position: relative;
            z-index: 1;
            background: rgba(15, 15, 15, 0.6);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 24px;
            padding: 56px 48px;
            max-width: 440px;
            width: 90%;
            text-align: center;
            box-shadow: 0 25px 60px -12px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.04);
            animation: cardFadeIn 0.8s ease-out forwards;
        }

        @keyframes cardFadeIn {
            0% { opacity: 0; transform: translateY(30px) scale(0.97); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* Top accent bar */
        .login-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 60%;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(249,115,22,0.5), transparent);
            border-radius: 1px;
        }

        /* Icon circle */
        .brand-icon {
            width: 64px;
            height: 64px;
            margin: 0 auto 28px;
            border-radius: 16px;
            background: linear-gradient(135deg, #f97316, #ea580c);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 24px -4px rgba(249,115,22,0.3);
            animation: iconPulse 3s ease-in-out infinite;
        }

        @keyframes iconPulse {
            0%, 100% { box-shadow: 0 8px 24px -4px rgba(249,115,22,0.3); }
            50% { box-shadow: 0 8px 32px -2px rgba(249,115,22,0.45); }
        }

        .brand-icon svg {
            width: 30px;
            height: 30px;
            fill: #fff;
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 700;
            color: #f5f5f4;
            line-height: 1.3;
            margin-bottom: 12px;
            letter-spacing: -0.02em;
        }

        p {
            font-size: 0.9rem;
            font-weight: 400;
            color: rgb(168, 162, 158);
            margin-bottom: 36px;
            line-height: 1.5;
        }

        /* Google Button */
        button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            width: 100%;
            padding: 14px 24px;
            font-family: 'Inter', sans-serif;
            font-size: 0.9rem;
            font-weight: 500;
            color: #f5f5f4;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 14px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
            overflow: hidden;
        }

        button::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(249,115,22,0.08), transparent 60%);
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        button:hover {
            background: rgba(255, 255, 255, 0.09);
            border-color: rgba(249, 115, 22, 0.25);
            transform: translateY(-2px);
            box-shadow: 0 8px 24px -6px rgba(249,115,22,0.15);
        }

        button:hover::before {
            opacity: 1;
        }

        button:active {
            transform: translateY(0);
            box-shadow: none;
        }

        /* Google SVG icon */
        .google-icon {
            width: 20px;
            height: 20px;
            flex-shrink: 0;
            position: relative;
            z-index: 1;
        }

        .btn-text {
            position: relative;
            z-index: 1;
        }

        /* Bottom text */
        .footer-note {
            margin-top: 28px;
            font-size: 0.75rem;
            color: rgb(120, 113, 108);
            letter-spacing: 0.01em;
        }

        /* Decorative orbiting ring */
        .orbit-ring {
            position: fixed;
            top: 50%;
            left: 50%;
            width: 700px;
            height: 700px;
            transform: translate(-50%, -50%);
            border: 1px solid rgba(249,115,22,0.03);
            border-radius: 50%;
            pointer-events: none;
            z-index: 0;
            animation: orbitSpin 30s linear infinite;
        }

        .orbit-ring:nth-child(2) {
            width: 900px;
            height: 900px;
            border-color: rgba(168,85,247,0.02);
            animation-duration: 45s;
            animation-direction: reverse;
        }

        @keyframes orbitSpin {
            0% { transform: translate(-50%, -50%) rotate(0deg); }
            100% { transform: translate(-50%, -50%) rotate(360deg); }
        }

        /* Responsive */
        @media (max-width: 480px) {
            .login-card {
                padding: 40px 28px;
                border-radius: 20px;
            }
            h1 {
                font-size: 1.25rem;
            }
        }
    </style>
</head>
<body>
    <div class="bg-dots"></div>
    <div class="orbit-ring"></div>
    <div class="orbit-ring"></div>

    <div class="login-card">
        <div class="brand-icon">
            <svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
        </div>
        <h1>Jamal Said Kazembe Multisystem Management</h1>
        <p>Login to start use the system</p>
        <button onclick="login()">
            <!-- Google "G" icon -->
            <svg class="google-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/>
                <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
                <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
            </svg>
            <span class="btn-text">Login with Google</span>
        </button>
        <div class="footer-note">Secured & encrypted connection</div>
    </div>

    <script src="login.js"></script>
</body>
</html>
