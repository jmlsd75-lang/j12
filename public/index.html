<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jamal Said Kazembe Multisystem Management</title>
<style>
  body{
    margin:0;
    font-family:Arial, sans-serif;
    background:#f4f4f4;
    display:flex;
    flex-direction:column;
    justify-content:flex-start;
    align-items:center;
    min-height:100vh;
    text-align:center;
    padding-top:50px;
  }
  h1{ font-size:32px; color:blue; margin:0; }
  h2{ color:red; margin-top:5px; font-size:18px; }

  /* Buttons Styling */
  .login-btn{
    margin-top:100px; padding:15px 40px; font-size:20px;
    background:#28a745; color:white; border:none; border-radius:6px; cursor:pointer;
    display: none; /* Hidden by default until JS checks auth status */
  }
  
  .logout-btn{
    background:#dc3545; color:white; border:none; padding:10px 25px;
    border-radius:6px; cursor:pointer; margin-top:20px; font-size:16px;
    display: none; /* Hidden by default */
  }

  #welcomePage {
    display: none;
    flex-direction: column;
    align-items: center;
    margin-top: 50px;
  }
</style>
</head>
<body>
<h1>JAMAL SAID KAZEMBE</h1>
<h2>MULTISYSTEM MANAGEMENT</h2>
<!-- Login Button -->
<button class="login-btn">LOGIN</button>
<!-- Welcome Page (Shown after login) -->
<div id="welcomePage">
  <button class="pay-btn">PAY</button>
  <button class="logout-btn">LOGOUT</button>
</div>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

// --- Firebase Config ---
const firebaseConfig = {
  apiKey: "AIzaSyDpNJIZoLeZUhIoTepbLb_3rRLpseu9Zdo",
  authDomain: "my-project-66803-95cb3.firebaseapp.com",
  projectId: "my-project-66803-95cb3",
  storageBucket: "my-project-66803-95cb3.firebasestorage.app",
  messagingSenderId: "167159607898",
  appId: "1:167159607898:web:23ca11366b88868b085e63"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const provider = new GoogleAuthProvider();

// --- DOM Elements ---
const loginBtn = document.querySelector(".login-btn");
const logoutBtn = document.querySelector(".logout-btn");
const welcomePage = document.getElementById("welcomePage");

// --- Auth Logic ---

// Listen for authentication state changes
onAuthStateChanged(auth, (user) => {
  if (user) {
    // User is signed in.
    console.log("User logged in:", user.displayName);
    loginBtn.style.display = "none";
    welcomePage.style.display = "flex";
    logoutBtn.style.display = "block"; // Show logout button inside welcome page
  } else {
    // User is signed out.
    console.log("User logged out.");
    loginBtn.style.display = "block";
    welcomePage.style.display = "none";
    logoutBtn.style.display = "none";
  }
});

// Login Button Click
loginBtn.onclick = async () => {
  try {
    await signInWithPopup(auth, provider);
  } catch (e) {
    console.error("Login Error:", e);
    alert("Login failed. Please try again.");
  }
};

// Logout Button Click
logoutBtn.onclick = async () => {
  try {
    await signOut(auth);
  } catch (e) {
    console.error("Logout Error:", e);
  }
};

</script>
</body>
</html>
