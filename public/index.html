<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login System</title>
    <style>
        /* ========================================
           CSS STYLING
           ======================================== */
        :root {
            --primary-color: #4285F4; /* Google Blue */
            --primary-hover: #357ae8;
            --bg-color: #f0f2f5;
            --card-bg: #ffffff;
            --text-color: #333333;
            --error-color: #d93025;
            --success-color: #1e8e3e;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: var(--text-color);
        }

        .login-card {
            background-color: var(--card-bg);
            padding: 2.5rem;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 420px;
            text-align: center;
            transition: transform 0.3s ease;
        }

        .login-card:hover {
            transform: translateY(-2px);
        }

        h1 {
            margin-bottom: 0.5rem;
            color: #202124;
            font-size: 1.8rem;
        }

        p {
            margin-bottom: 1.5rem;
            color: #5f6368;
            font-size: 0.95rem;
            line-height: 1.5;
        }

        /* Input Styling */
        .input-group {
            margin-bottom: 1.5rem;
            text-align: left;
        }

        .input-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
            font-weight: 600;
            color: #5f6368;
        }

        .input-group input {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #dadce0;
            border-radius: 6px;
            font-size: 1rem;
            transition: border 0.2s, box-shadow 0.2s;
            outline: none;
        }

        .input-group input:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 2px rgba(66, 133, 244, 0.2);
        }

        /* Button Styling */
        #googleLoginBtn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background-color: var(--primary-color);
            color: white;
            border: none;
            width: 100%;
            padding: 12px 20px;
            font-size: 1rem;
            font-weight: 500;
            border-radius: 6px;
            cursor: pointer;
            transition: background-color 0.2s, opacity 0.2s, transform 0.1s;
        }

        #googleLoginBtn:hover {
            background-color: var(--primary-hover);
        }

        #googleLoginBtn:active {
            transform: scale(0.98);
        }

        #googleLoginBtn:disabled {
            background-color: #a0c3f7;
            cursor: not-allowed;
            opacity: 0.7;
        }

        .google-icon {
            width: 20px;
            height: 20px;
            margin-right: 12px;
        }

        /* Messages */
        #errorMsg, #successMsg {
            padding: 12px;
            border-radius: 4px;
            margin-bottom: 15px;
            font-size: 0.9rem;
            display: none;
            text-align: left;
        }

        #errorMsg {
            background-color: #fce8e6;
            color: var(--error-color);
            border: 1px solid #f5c6cb;
        }

        #successMsg {
            background-color: #e6f4ea;
            color: var(--success-color);
            border: 1px solid #ceead6;
        }

        .visible {
            display: block !important;
            animation: fadeIn 0.3s ease-in-out;
        }

        /* Loading Overlay */
        #loadingOverlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(255, 255, 255, 0.9);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid var(--primary-color);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 15px;
        }

        #loadingText {
            font-size: 1.1rem;
            font-weight: 500;
            color: var(--text-color);
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <main class="login-card">
        <h1>Welcome Back</h1>
        <p>Enter your email to sign in.</p>
        
        <!-- New Email Input -->
        <div class="input-group">
            <label for="userEmail">Email Address</label>
            <input type="email" id="userEmail" placeholder="name@example.com" autocomplete="email">
        </div>

        <div id="errorMsg" role="alert"></div>
        <div id="successMsg" role="status"></div>
        
        <button id="googleLoginBtn">
            <svg class="google-icon" viewBox="0 0 24 24">
                <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
                <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
            </svg>
            Sign in with Google
        </button>
    </main>

    <div id="loadingOverlay">
        <div class="spinner"></div>
        <div id="loadingText">Authenticating...</div>
    </div>

    <!-- ========================================
         FIREBASE — ALL FROM CLOUD CDN
         ======================================== -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import {
            getAuth,
            GoogleAuthProvider,
            signInWithPopup, // Changed from Redirect to Popup for reliability
            onAuthStateChanged
        } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
        import {
            getFirestore,
            collection,
            addDoc,
            serverTimestamp
        } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        // ========================================
        // FIREBASE CONFIG
        // ========================================
        const firebaseConfig = {
            apiKey: "AIzaSyDpNJIZoLeZUhIoTepbLb_3rRLpseu9Zdo",
            authDomain: "my-project-66803-95cb3.firebaseapp.com",
            projectId: "my-project-66803-95cb3",
            storageBucket: "my-project-66803-95cb3.firebasestorage.app",
            messagingSenderId: "167159607898",
            appId: "1:167159607898:web:23ca11366b88868b085e63"
        };

        // ========================================
        // ADMIN SETTINGS
        // ========================================
        const ADMIN_EMAIL = "jmlsd75@gmail.com";

        // ========================================
        // INITIALIZE
        // ========================================
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        // Add scopes to request email access
        provider.addScope('email');
        provider.addScope('profile');

        // ========================================
        // DOM ELEMENTS
        // ========================================
        const emailInput = document.getElementById("userEmail");
        const googleBtn = document.getElementById("googleLoginBtn");
        const errorMsg = document.getElementById("errorMsg");
        const successMsg = document.getElementById("successMsg");
        const loadingOverlay = document.getElementById("loadingOverlay");
        const loadingText = document.getElementById("loadingText");

        // ========================================
        // HELPERS
        // ========================================
        function showError(msg) {
            hideMessages();
            errorMsg.textContent = msg;
            errorMsg.classList.add("visible");
        }

        function showSuccess(msg) {
            hideMessages();
            successMsg.textContent = msg;
            successMsg.classList.add("visible");
        }

        function hideMessages() {
            errorMsg.classList.remove("visible");
            successMsg.classList.remove("visible");
        }

        function showLoading(text) {
            loadingText.textContent = text;
            loadingOverlay.style.display = "flex";
        }

        function hideLoading() {
            loadingOverlay.style.display = "none";
        }

        // ========================================
        // SAVE LOGIN TO FIRESTORE
        // ========================================
        async function saveLogin(user) {
            if (!user) return;
            try {
                await addDoc(collection(db, "users", user.uid, "logins"), {
                    name: user.displayName,
                    email: user.email,
                    userId: user.uid,
                    createdAt: serverTimestamp()
                });
                console.log("Login saved:", user.email);
            } catch (e) {
                console.error("Save login error:", e);
                // We don't stop the flow if logging fails
            }
        }

        // ========================================
        // HANDLE LOGIN LOGIC
        // ========================================
        async function handleLoginSuccess(user) {
            console.log("User logged in:", user.email);

            // 1. Save to DB
            await saveLogin(user);

            // 2. Flag for other pages
            sessionStorage.setItem("justLoggedIn", "1");

            // 3. Determine Destination
            let destination = "free.html"; // Default
            let successText = "Login successful! Redirecting...";

            if (user.email === ADMIN_EMAIL) {
                destination = "admin.html";
                successText = "Welcome Admin! Redirecting...";
            }

            // 4. Update UI
            showLoading(successText);
            showSuccess(successText);

            // 5. Wait briefly then Redirect
            setTimeout(() => {
                window.location.href = destination;
            }, 1500);
        }

        // ========================================
        // MAIN EXECUTION
        // ========================================

        // 1. Check if user is already logged in on load
        showLoading("Checking session...");
        onAuthStateChanged(auth, (user) => {
            hideLoading();
            if (user) {
                console.log("User already logged in:", user.email);
                // If already logged in, we process immediately
                handleLoginSuccess(user);
            } else {
                // User is not logged in, enable the card
                console.log("No active session.");
            }
        });

        // 2. Button Click Listener
        googleBtn.addEventListener("click", async () => {
            const typedEmail = emailInput.value.trim();

            // Simple Validation
            if (!typedEmail || !typedEmail.includes("@")) {
                showError("Please enter a valid email address first.");
                emailInput.focus();
                return;
            }

            // Prepare UI
            hideMessages();
            googleBtn.disabled = true;
            showLoading("Connecting to Google...");

            try {
                // Sign in with Popup (better for single page tools)
                const result = await signInWithPopup(auth, provider);
                const user = result.user;

                // Check if the Google email matches the typed email (Optional security check)
                if (user.email.toLowerCase() !== typedEmail.toLowerCase()) {
                    console.warn(`Typed email (${typedEmail}) differs from Google email (${user.email})`);
                }

                // Handle the successful login
                await handleLoginSuccess(user);

            } catch (error) {
                hideLoading();
                googleBtn.disabled = false;
                
                console.error("Auth Error:", error.code, error.message);
                
                switch (error.code) {
                    case "auth/popup-closed-by-user":
                        showError("Sign-in popup was closed. Please try again.");
                        break;
                    case "auth/cancelled-popup-request":
                        // Ignore if multiple popups were triggered accidentally
                        break;
                    case "auth/network-request-failed":
                        showError("Network error. Please check your internet connection.");
                        break;
                    case "auth/invalid-email":
                    case "auth/user-not-found":
                    case "auth/wrong-password":
                        showError("Authentication failed. Please check your credentials.");
                        break;
                    default:
                        showError("Login failed: " + error.message);
                }
            }
        });

        // Add "Enter" key support for the input field
        emailInput.addEventListener("keypress", (e) => {
            if (e.key === "Enter") {
                googleBtn.click();
            }
        });

    </script>
</body>
</html>
