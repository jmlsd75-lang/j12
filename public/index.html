<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JAMAL SAID KAZEMBE MULTISYSTEM MANAGEMENT</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0f1a;
            --fg: #e8edf5;
            --muted: #5a6b85;
            --accent: #00d4aa;
            --accent-glow: rgba(0, 212, 170, 0.4);
            --danger: #dc3545;
            --warning: #ffc107;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--fg);
            min-height: 100vh;
            overflow: hidden;
        }

        .bg-layer {
            position: fixed;
            inset: 0;
            z-index: 0;
            background: 
                radial-gradient(circle at 20% 20%, rgba(0, 212, 170, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 80% 80%, rgba(0, 150, 136, 0.1) 0%, transparent 40%);
        }

        .grid-overlay {
            position: absolute;
            inset: 0;
            background-image: 
                linear-gradient(rgba(0, 212, 170, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 212, 170, 0.03) 1px, transparent 1px);
            background-size: 60px 60px;
        }

        .main-container {
            position: relative;
            z-index: 10;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .system-title { text-align: center; margin-bottom: 4rem; }

        .title-line-1 {
            font-family: 'Orbitron', sans-serif;
            font-weight: 900;
            font-size: clamp(1.5rem, 5vw, 3rem);
            letter-spacing: 0.15em;
            color: var(--fg);
            animation: fadeDown 1s ease-out forwards;
            opacity: 0;
        }

        .title-line-2 {
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            font-size: clamp(1rem, 3vw, 1.8rem);
            letter-spacing: 0.3em;
            color: var(--accent);
            animation: fadeDown 1s ease-out 0.3s forwards;
            opacity: 0;
        }

        @keyframes fadeDown {
            to { opacity: 1; transform: translateY(0); }
        }

        .btn {
            font-family: 'Orbitron', sans-serif;
            font-weight: 600;
            font-size: 1rem;
            letter-spacing: 0.1em;
            padding: 1rem 3rem;
            border: 2px solid;
            background: transparent;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            position: relative;
            overflow: hidden;
        }

        .btn-login {
            color: var(--accent);
            border-color: var(--accent);
        }

        .btn-login:hover {
            background: var(--accent);
            color: var(--bg);
            box-shadow: 0 0 30px var(--accent-glow);
        }

        .btn-login.loading {
            pointer-events: none;
            opacity: 0.7;
        }

        .btn-login.loading::after {
            content: '';
            position: absolute;
            width: 20px;
            height: 20px;
            border: 2px solid transparent;
            border-top-color: var(--bg);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            right: 1.5rem;
            top: 50%;
            transform: translateY(-50%);
        }

        @keyframes spin {
            to { transform: translateY(-50%) rotate(360deg); }
        }

        .bottom-controls {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
            z-index: 20;
        }

        .btn-logout {
            color: var(--danger);
            border-color: var(--danger);
        }

        .btn-logout:hover {
            background: var(--danger);
            color: white;
        }

        .btn-free {
            color: var(--warning);
            border-color: var(--warning);
        }

        .btn-free:hover {
            background: var(--warning);
            color: black;
        }

        .hidden { display: none !important; }

        /* Toast notification */
        .toast {
            position: fixed;
            top: 30px;
            right: 30px;
            z-index: 1000;
            padding: 16px 24px;
            border-radius: 8px;
            font-family: 'Inter', sans-serif;
            font-size: 0.9rem;
            font-weight: 500;
            transform: translateX(120%);
            transition: transform 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            max-width: 400px;
        }

        .toast.show { transform: translateX(0); }

        .toast-success {
            background: rgba(0, 212, 170, 0.15);
            border: 1px solid var(--accent);
            color: var(--accent);
        }

        .toast-error {
            background: rgba(220, 53, 69, 0.15);
            border: 1px solid var(--danger);
            color: var(--danger);
        }

        .toast-info {
            background: rgba(255, 193, 7, 0.15);
            border: 1px solid var(--warning);
            color: var(--warning);
        }

        /* User info display */
        .user-info {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 50;
            display: flex;
            align-items: center;
            gap: 12px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            padding: 10px 16px;
            border-radius: 50px;
            border: 1px solid rgba(0, 212, 170, 0.2);
        }

        .user-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid var(--accent);
        }

        .user-name {
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--fg);
        }

        .user-role {
            font-size: 0.7rem;
            font-weight: 600;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        /* Welcome animation */
        .welcome-text {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(1rem, 2.5vw, 1.5rem);
            color: var(--accent);
            margin-top: 2rem;
            opacity: 0;
            animation: fadeIn 0.8s ease-out 0.5s forwards;
        }

        @keyframes fadeIn {
            to { opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="bg-layer">
        <div class="grid-overlay"></div>
    </div>

    <!-- Toast container -->
    <div id="toast" class="toast"></div>

    <!-- User info (shown when logged in) -->
    <div id="userInfo" class="user-info hidden">
        <img id="userAvatar" class="user-avatar" src="" alt="Avatar">
        <div>
            <div id="userName" class="user-name"></div>
            <div id="userRole" class="user-role"></div>
        </div>
    </div>

    <main class="main-container">
        <header class="system-title">
            <h1 class="title-line-1" style="transform: translateY(-20px);">JAMAL SAID KAZEMBE</h1>
            <h2 class="title-line-2" style="transform: translateY(-20px);">Multisystem Management</h2>
        </header>

        <!-- Login button (shown when logged out) -->
        <button id="loginBtn" class="btn btn-login">LOGIN</button>

        <!-- Welcome message (shown when logged in) -->
        <div id="welcomeMsg" class="welcome-text hidden"></div>
    </main>

    <!-- Bottom controls (shown when logged in) -->
    <div id="bottomControls" class="bottom-controls hidden">
        <button id="freeBtn" class="btn btn-free">FREE</button>
        <button id="logoutBtn" class="btn btn-logout">LOGOUT</button>
    </div>

    <script type="module" src="login.js"></script>

</body>
</html>
