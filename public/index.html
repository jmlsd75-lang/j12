<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>JAMAL SAID KAZEMBE MULTISYSTEM MANAGEMENT</title>
    <style>
        body {
            text-align: center;
            font-family: Arial, sans-serif;
            margin-top: 50px;
        }
        .title {
            font-size: 32px;
            font-weight: bold;
            line-height: 1.2;
        }
        .login-btn {
            background-color: #28a745; /* green */
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 30px;
        }
        .login-btn:hover { background-color: #218838; }
        .logout-btn {
            background-color: #dc3545; /* red */
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
            display: none;
            margin-top: 20px;
        }
        #userDisplay { margin-top: 20px; font-size: 18px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="title">
        JAMAL SAID KAZEMBE<br>
        MULTISYSTEM MANAGEMENT
    </div>

    <button id="loginBtn" class="login-btn">LOGIN</button>
    <button class="logout-btn">LOGOUT</button>
    <div id="userDisplay"></div>

    <!-- Connect login.js -->
    <script type="module">
      import { login } from './login.js';
      document.getElementById("loginBtn").onclick = login;
    </script>
</body>
</html>
