<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Portal</title>
    <style>
        /* --- General Reset --- */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* --- Login Card --- */
        .login-card {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 350px;
            width: 90%;
            z-index: 10;
        }

        .login-card h2 {
            margin-top: 0;
            color: #333;
        }

        /* --- The Button --- */
        #googleLoginBtn {
            margin-top: 20px;
            background-color: #4285F4;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 16px;
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            transition: background 0.3s;
        }

        #googleLoginBtn:hover {
            background-color: #357ae8;
        }

        /* --- Error Message Box --- */
        #errorMsg {
            margin-top: 15px;
            color: #d32f2f;
            background-color: #ffebee;
            padding: 10px;
            border-radius: 4px;
            font-size: 14px;
            display: none; /* Hidden by default */
        }

        /* --- Loading Overlay (Required by JS) --- */
        #loadingOverlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.9);
            display: none; /* Hidden by default */
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }

        /* Simple CSS Spinner */
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #4285F4;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        #loadingText {
            margin-top: 15px;
            font-size: 18px;
            color: #333;
            font-weight: 500;
        }
    </style>
</head>
<body>

    <!-- Main Login Container -->
    <main class="login-card">
        <h2>Welcome Back</h2>
        <p>Please sign in to continue</p>

        <!-- The Button ID must match login.js -->
        <button id="googleLoginBtn">
            <span>Sign in with Google</span>
        </button>

        <!-- The Error Message Element -->
        <div id="errorMsg"></div>
    </main>

    <!-- The Loading Overlay Element -->
    <div id="loadingOverlay">
        <div class="spinner"></div>
        <div id="loadingText">Loading...</div>
    </div>

    <!-- Connects to your login logic -->
    <script type="module" src="login.js"></script>

</body>
</html>
