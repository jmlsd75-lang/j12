    <style>
        body {
            font-family: Arial, sans-serif;

        header {

        }

        button {
            padding: 14px 30px;
            font-size: 18px;

            color: white;
            border: none;
            border-radius: 6px;

        }

        }

    <script>
        const firebaseConfig = {

            messagingSenderId: "YOUR_ID",
            appId: "YOUR_APP_ID"
        };

        const app = firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

</head>

</body>
</html>
