<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jamal Said Kazembe Multisystem Management</title>

<style>
body{

  font-family:Arial, sans-serif;

<body>

<h1>JAMAL SAID KAZEMBE</h1>
<h2>MULTISYSTEM MANAGEMENT</h2>

<!-- LOGIN -->
<button class="login-btn">LOGIN</button>

<!-- WELCOME PAGE -->
<div id="welcomePage">

  <button id="payBtn">PAY</button>

  <button class="logout-btn">LOGOUT</button>

</div>

<!-- PAYMENT PAGE -->
<div id="paymentPage">

  <div>Pay through</div>
  <div>Mix by Yas</div>
  <div>+255 655 510 714</div>
  <div>Airtel Money</div>
  <div>+255 780 526 374</div>
  <div>CRDB</div>
  <div>0152001GN6K00</div>
  <div>JAMALI SAIDI KAZEMBE</div>

  <div style="margin-top:30px; display:flex; gap:20px;">
    <button id="backBtn" style="padding:10px 25px; background:#dc3545; color:white; border:none; border-radius:6px;">
      BACK
    </button>

    <button id="nextBtn" style="padding:10px 25px; background:#28a745; color:white; border:none; border-radius:6px;">
      NEXT
    </button>
  </div>

</div>

</div>
<!-- ADD THIS HERE -->

<div id="capturePage"></div>
<div id="previewPage"></div>

<script type="module">
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

// Firebase config
const firebaseConfig = {
  apiKey: "AIzaSyDpNJIZoLeZUhIoTepbLb_3rRLpseu9Zdo",
  authDomain: "my-project-66803-95cb3.firebaseapp.com",
  projectId: "my-project-66803-95cb3",
  storageBucket: "my-project-66803-95cb3.firebasestorage.app",
  messagingSenderId: "167159607898",
  appId: "1:167159607898:web:23ca11366b88868b085e63"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const provider = new GoogleAuthProvider();

// Elements
const loginBtn = document.querySelector(".login-btn");
const logoutBtn = document.querySelector(".logout-btn");
const welcomePage = document.getElementById("welcomePage");

const payBtn = document.getElementById("payBtn");
const paymentPage = document.getElementById("paymentPage");
const backBtn = document.getElementById("backBtn");

// Auth state
onAuthStateChanged(auth, (user) => {
  if (user) {
    loginBtn.style.display = "none";
    welcomePage.style.display = "flex";
    logoutBtn.style.display = "block";
  } else {
    loginBtn.style.display = "block";
    welcomePage.style.display = "none";
    logoutBtn.style.display = "none";
    paymentPage.style.display = "none";
  }
});

// Login
loginBtn.onclick = async () => {
  try {
    await signInWithPopup(auth, provider);
  } catch (e) {
    alert("Login failed");
  }
};

// Logout
logoutBtn.onclick = async () => {
  await signOut(auth);
};

// PAY → show payment page
payBtn.onclick = () => {
  welcomePage.style.display = "none";
  paymentPage.style.display = "flex";
};

// BACK → return
backBtn.onclick = () => {
  paymentPage.style.display = "none";
  welcomePage.style.display = "flex";
};
const nextBtn = document.getElementById("nextBtn");
const capturePage = document.getElementById("capturePage");
const previewPage = document.getElementById("previewPage");

const openCamera = document.getElementById("openCamera");
const openFile = document.getElementById("openFile");
const video = document.getElementById("video");
const canvas = document.getElementById("canvas");

const captureBtn = document.getElementById("captureBtn");
const okCapture = document.getElementById("okCapture");
const cancelCapture = document.getElementById("cancelCapture");

const previewImg = document.getElementById("previewImg");

const submitBtn = document.getElementById("submitBtn");
const cancelPreview = document.getElementById("cancelPreview");

const fileInput = document.getElementById("fileInput");
const backToPayment = document.getElementById("backToPayment");

let stream = null;
let imageData = "";

// NEXT → open capture page
nextBtn.onclick = () => {
  paymentPage.style.display = "none";
  capturePage.style.display = "flex";
};

// BACK → payment
backToPayment.onclick = () => {
  capturePage.style.display = "none";
  paymentPage.style.display = "flex";
};

// OPEN CAMERA
openCamera.onclick = async () => {
  stream = await navigator.mediaDevices.getUserMedia({ video: true });
  video.srcObject = stream;
  video.style.display = "block";
  captureBtn.style.display = "inline-block";
};

// CAPTURE PHOTO
captureBtn.onclick = () => {
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;
  canvas.getContext("2d").drawImage(video, 0, 0);

  imageData = canvas.toDataURL("image/png");

  // stop camera
  stream.getTracks().forEach(t => t.stop());
  video.style.display = "none";

  captureBtn.style.display = "none";
  okCapture.style.display = "inline-block";
  cancelCapture.style.display = "inline-block";
};

// OPEN FILES
openFile.onclick = () => fileInput.click();

fileInput.onchange = () => {
  const file = fileInput.files[0];
  const reader = new FileReader();

  reader.onload = e => {
    imageData = e.target.result;
    okCapture.style.display = "inline-block";
    cancelCapture.style.display = "inline-block";
  };

  reader.readAsDataURL(file);
};

// OK → preview
okCapture.onclick = () => {
  capturePage.style.display = "none";
  previewPage.style.display = "flex";
  previewImg.src = imageData;
};

// CANCEL → back to capture page clean
cancelCapture.onclick = () => {
  imageData = "";
  okCapture.style.display = "none";
  cancelCapture.style.display = "none";
};

// PREVIEW CANCEL → back
cancelPreview.onclick = () => {
  previewPage.style.display = "none";
  capturePage.style.display = "flex";
};

// SUBMIT
submitBtn.onclick = () => {
  alert("Photo submitted!");
  previewPage.style.display = "none";
  welcomePage.style.display = "flex";
};
</script>

</body>
</html>
