<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jamal Said Kazembe Multisystem Management</title>
<!-- Tesseract.js for OCR -->
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
<style>
  body{
    margin:0;
    font-family:Arial, sans-serif;
    background:#f4f4f4;
    display:flex;
    flex-direction:column;
    justify-content:flex-start;
    align-items:center;
    min-height:100vh;
    text-align:center;
    padding-top:50px;
  }
  h1{ font-size:32px; color:blue; margin:0; }
  h2{ color:red; margin-top:5px; font-size:18px; }

  /* --- Main Menu Buttons --- */
  .login-btn, .logout-btn, .pay-btn {
    position: fixed;
    left: 50%;
    transform: translateX(-50%);
    border:none;
    cursor:pointer;
    display: none; 
  }
  .login-btn{
    bottom: 30px; padding:15px 40px; font-size:20px;
    background:#28a745; color:white; border-radius:6px;
  }
  .pay-btn{
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    padding:18px 50px; font-size:22px;
    background-color: #28a745; color:white; border-radius:8px;
  }
  .logout-btn{
    bottom: 30px; background:#dc3545; color:white;
    padding:10px 25px; border-radius:6px; font-size:16px;
  }
  
  /* User Display */
  #userDisplay {
    position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
    font-size: 18px; font-weight: bold; color: #333;
    display: none;
  }

  /* --- Page 1: Payment Info --- */
  #payPage{
    position: fixed; top:0; left:0; width:100%; height:100%;
    background:#ffffff; display:none; flex-direction:column;
    justify-content:center; align-items:center; text-align:center; z-index: 10;
  }
  .pay-info p{ margin:10px; font-size:18px; }
  .mix{ color:green; } .airtel{ color:red; } .crdb{ color:blue; } .name{ color:black; font-weight:bold; }

  .pay-actions{ position: fixed; bottom: 30px; display:flex; gap:20px; }
  .back-btn{ padding:12px 25px; background:gray; color:white; border:none; border-radius:6px; cursor: pointer; }
  .next-btn{ padding:12px 25px; background:green; color:white; border:none; border-radius:6px; cursor: pointer; }

  /* --- Page 2: Camera/Photos Menu --- */
  #cameraMenuPage {
    position: fixed; top:0; left:0; width:100%; height:100%;
    background: #ffffff; display:none; flex-direction: column;
    justify-content: center; align-items: center; gap: 20px; z-index: 20;
  }
  #openCameraBtn { padding: 15px 40px; font-size: 20px; background: #007bff; color: white; border: none; border-radius: 6px; cursor: pointer; }
  #openPhotosBtn { padding: 15px 40px; font-size: 20px; background: #17a2b8; color: white; border: none; border-radius: 6px; cursor: pointer; }
  #backFromCameraBtn { padding: 15px 40px; font-size: 20px; background: #dc3545; color: white; border: none; border-radius: 6px; cursor: pointer; }

  /* --- Page 3: Preview & Submit --- */
  #previewPage {
    position: fixed; top:0; left:0; width:100%; height:100%;
    background: white; display:none; flex-direction: column;
    justify-content: center; align-items: center; z-index: 30;
  }
  #previewImage { max-width: 90%; max-height: 60%; border-radius: 10px; margin-bottom: 20px; box-shadow: 0 4px 8px rgba(0,0,0,0.2); }
  .preview-actions { display: flex; gap: 20px; }
  #submitBtn { padding: 12px 25px; background: green; color: white; border: none; border-radius: 6px; font-size: 18px; cursor: pointer; }
  #cancelBtn { padding: 12px 25px; background: red; color: white; border: none; border-radius: 6px; font-size: 18px; cursor: pointer; }

  /* --- Page 4: System / Timer Page --- */
  #timerPage {
    position: fixed; top:0; left:0; width:100%; height:100%;
    background: #f4f4f4; display:none; flex-direction: column;
    justify-content: center; align-items: center; z-index: 40;
  }
  #timerDisplay { font-size: 60px; font-weight: bold; color: #333; }
  #timerStatus { margin-top: 20px; font-size: 20px; color: #666; }

  /* Loading Overlay */
  #loadingOverlay {
    position: fixed; top:0; left:0; width:100%; height:100%;
    background: rgba(255,255,255,0.9); display:none;
    justify-content: center; align-items: center; flex-direction: column;
    z-index: 100;
  }
  .loader { border: 8px solid #f3f3f3; border-top: 8px solid #3498db; border-radius: 50%; width: 60px; height: 60px; animation: spin 1s linear infinite; }
  @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
</style>
</head>
<body>

<div id="userDisplay"></div>

<h1>JAMAL SAID KAZEMBE</h1>
<h2>MULTISYSTEM MANAGEMENT</h2>
  
<button class="login-btn">LOGIN</button>
<button class="pay-btn">PAY</button>
<button class="logout-btn">LOGOUT</button>

<input type="file" id="cameraInput" accept="image/*" capture="environment" style="display:none;">
<input type="file" id="photosInput" accept="image/*" style="display:none;">

<!-- Page 1: Payment Info -->
<div id="payPage">
  <div class="pay-info">
    <p>Pay through:</p>
    <p class="mix">Mix by Yas:</p>
    <p class="mix">+255 655 510 714</p>
    <p class="airtel">Airtel Money:</p>
    <p class="airtel">+255 780 526 437</p>
    <p class="crdb">CRDB:</p>
    <p class="crdb">0152001GN6K00</p>
    <p class="name">JAMALI SAIDI KAZEMBE</p>
  </div>
  <div class="pay-actions">
    <button class="back-btn">BACK</button>
    <button class="next-btn">NEXT</button>
  </div>
</div>

<!-- Page 2: Camera/Photos Options -->
<div id="cameraMenuPage">
  <button id="openCameraBtn">CAMERA</button>
  <button id="openPhotosBtn">PHOTOS</button>
  <button id="backFromCameraBtn">BACK</button>
</div>

<!-- Page 3: Preview Page -->
<div id="previewPage">
  <img id="previewImage" src="" alt="Payment Preview">
  <div class="preview-actions">
    <button id="submitBtn">SUBMIT</button>
    <button id="cancelBtn">CANCEL</button>
  </div>
</div>

<!-- Page 4: Timer Page -->
<div id="timerPage">
  <div id="userDisplayTimer" style="margin-bottom:20px; font-size:24px; font-weight:bold;"></div>
  <div id="timerDisplay">00:00:00</div>
  <div id="timerStatus">Session Active</div>
</div>

<!-- Loading Overlay -->
<div id="loadingOverlay">
  <div class="loader"></div>
  <p id="loadingText" style="margin-top:20px;">Processing Payment...</p>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

// --- Firebase Config ---
const firebaseConfig = {
  apiKey: "AIzaSyDpNJIZoLeZUhIoTepbLb_3rRLpseu9Zdo",
  authDomain: "my-project-66803-95cb3.firebaseapp.com",
  projectId: "my-project-66803-95cb3",
  storageBucket: "my-project-66803-95cb3.firebasestorage.app",
  messagingSenderId: "167159607898",
  appId: "1:167159607898:web:23ca11366b88868b085e63"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const provider = new GoogleAuthProvider();

// --- DOM Elements ---
const loginBtn = document.querySelector(".login-btn");
const logoutBtn = document.querySelector(".logout-btn");
const payBtn = document.querySelector(".pay-btn");
const userDisplay = document.getElementById("userDisplay");

const payPage = document.getElementById("payPage");
const backBtn = document.querySelector(".back-btn");
const nextBtn = document.querySelector(".next-btn");

const cameraMenuPage = document.getElementById("cameraMenuPage");
const openCameraBtn = document.getElementById("openCameraBtn");
const openPhotosBtn = document.getElementById("openPhotosBtn");
const backFromCameraBtn = document.getElementById("backFromCameraBtn");

const cameraInput = document.getElementById("cameraInput");
const photosInput = document.getElementById("photosInput");

const previewPage = document.getElementById("previewPage");
const previewImage = document.getElementById("previewImage");
const submitBtn = document.getElementById("submitBtn");
const cancelBtn = document.getElementById("cancelBtn");

const timerPage = document.getElementById("timerPage");
const timerDisplay = document.getElementById("timerDisplay");
const userDisplayTimer = document.getElementById("userDisplayTimer");
const timerStatus = document.getElementById("timerStatus");

const loadingOverlay = document.getElementById("loadingOverlay");
const loadingText = document.getElementById("loadingText");

let selectedFile = null;
let timerInterval = null;

// --- Auth Logic ---
onAuthStateChanged(auth, (user) => {
  if (user) {
    userDisplay.textContent = user.displayName;
    userDisplay.style.display = "block";
    loginBtn.style.display = "none";
    payBtn.style.display = "block";
    logoutBtn.style.display = "block";
  } else {
    userDisplay.style.display = "none";
    loginBtn.style.display = "block";
    payBtn.style.display = "none";
    logoutBtn.style.display = "none";
  }
});

loginBtn.onclick = async () => {
  try { await signInWithPopup(auth, provider); } 
  catch (e) { console.error("Login Error", e); alert("Login failed."); }
};

logoutBtn.onclick = async () => {
  clearInterval(timerInterval);
  localStorage.removeItem("sessionEnd");
  try { await signOut(auth); } 
  catch (e) { console.error("Logout Error", e); }
  showPage('main');
};

// --- Navigation Logic ---
function showPage(page) {
  // Hide all
  payPage.style.display = "none";
  cameraMenuPage.style.display = "none";
  previewPage.style.display = "none";
  timerPage.style.display = "none";
  
  // Reset Main Buttons
  payBtn.style.display = "none";
  logoutBtn.style.display = "none";
  userDisplay.style.display = "none";

  if(page === 'main') {
    if(auth.currentUser) {
      userDisplay.style.display = "block";
      payBtn.style.display = "block";
      logoutBtn.style.display = "block";
    }
  } else if (page === 'pay') {
    payPage.style.display = "flex";
  } else if (page === 'camera') {
    cameraMenuPage.style.display = "flex";
  } else if (page === 'preview') {
    previewPage.style.display = "flex";
  } else if (page === 'timer') {
    timerPage.style.display = "flex";
    userDisplayTimer.textContent = auth.currentUser ? auth.currentUser.displayName : "User";
  }
}

payBtn.onclick = () => showPage('pay');
backBtn.onclick = () => showPage('main');
nextBtn.onclick = () => showPage('camera');
backFromCameraBtn.onclick = () => showPage('pay');

// --- Camera & Photos Logic ---
openCameraBtn.onclick = () => cameraInput.click();
openPhotosBtn.onclick = () => photosInput.click();

function handleFile(file) {
  if (!file) return;
  selectedFile = file;
  const reader = new FileReader();
  reader.onload = function(e) {
    previewImage.src = e.target.result;
    showPage('preview');
  };
  reader.readAsDataURL(file);
}

cameraInput.onchange = (e) => handleFile(e.target.files[0]);
photosInput.onchange = (e) => handleFile(e.target.files[0]);

// --- Core Processing Logic (Strict Implementation) ---

submitBtn.onclick = async () => {
  if(!selectedFile) return;

  // 1. Show Loading
  loadingOverlay.style.display = "flex";
  loadingText.textContent = "Reading Image...";
  
  try {
    // 2. Extract Text using Tesseract
    const result = await Tesseract.recognize(previewImage.src, 'eng');
    const rawText = result.data.text.toUpperCase();
    // Clean text for easier matching (remove line breaks)
    const cleanText = rawText.replace(/\n/g, " ").replace(/\s+/g, " ");
    console.log("Extracted:", cleanText);

    // 3. Run Validations
    loadingText.textContent = "Verifying Data...";
    
    // Step 1: Text Exist
    if(cleanText.trim().length < 10) throw new Error("No text found in image.");

    // Step 2: Check Payment Target
    // Targets: 655510714, 780526437, 0152001GN6K00
    // We strip non-digits to find phone numbers
    const digitsOnly = cleanText.replace(/\D/g, ""); 
    
    const targets = ["655510714", "780526437", "0152001GN6K00"];
    // For phones, check last 9 digits match. For account, check string includes.
    const hasTarget = targets.some(t => {
        if(t.startsWith("0")) return cleanText.includes(t); // Account number
        return digitsOnly.includes(t); // Phone numbers
    });

    if(!hasTarget) throw new Error("Invalid Payment Target.");

    // Step 3: Check Name (STRICT)
    const validNames = ["JAMAL SAID KAZEMBE", "JAMAL KAZEMBE", "JAMAL SAID"];
    const nameFound = validNames.some(name => cleanText.includes(name));
    if(!nameFound) throw new Error("Name does not match exactly.");

    // Step 4: Check Time (<= 10 mins)
    // Regex for time HH:MM
    const timeMatch = cleanText.match(/\b([01]?[0-9]|2[0-3]):[0-5][0-9]\b/);
    if(timeMatch) {
        const receiptTime = timeMatch[0];
        const now = new Date();
        const parts = receiptTime.split(":");
        const receiptDate = new Date();
        receiptDate.setHours(parseInt(parts[0]), parseInt(parts[1]), 0, 0);
        
        const diffMs = now - receiptDate;
if(diffMs < 0 || diffMs > 600000) throw new Error("Invalid time.");
        const diffMins = diffMs / 60000;
        
        if(diffMins > 10) throw new Error("Payment time is older than 10 minutes.");
    } else {
        // If no time found, strictly invalid based on requirements
        throw new Error("No valid time found on receipt.");
    }

    // Step 5: Check Currency
    const currencies = ["TZS", "USD", "$", "€", "SH", "SHILLING"];
    const hasCurrency = currencies.some(c => cleanText.includes(c));
    if(!hasCurrency) throw new Error("No currency found.");

    // Step 6: Check Transaction ID
    // Look for common keywords followed by alphanumeric
    const txKeywords = ["TXN", "REF", "ID", "RECEIPT", "TRANS", "TRANSACTION"];
    const hasTxKeyword = txKeywords.some(k => cleanText.includes(k));
    // Or look for a long alphanumeric string typical of IDs
    const hasTxCode = /[A-Z0-9]{6,}/.test(cleanText.replace(/\s/g, ""));
    
    if(!hasTxKeyword && !hasTxCode) throw new Error("Transaction ID missing.");

    // --- SUCCESS ---
    // Extract Amount
    let amount = 0;
    // Look for numbers that could be amounts (often followed by .00 or similar)
    const amounts = cleanText.match(/[\d,]+/g);
    if(amounts) {
        const parsed = amounts
            .map(a => parseFloat(a.replace(/,/g, '')))
            .filter(n => n > 100); // Filter small numbers (like dates)
        
        if(parsed.length > 0) amount = Math.max(...parsed);
    }
    if(amount === 0) throw new Error("Amount not found.");
    // Calc Time: seconds = (amount / 300) * 3600
    const seconds = Math.floor((amount / 300) * 3600);
    
    // Save Session
    const endTime = Date.now() + (seconds * 1000);
    localStorage.setItem("sessionEnd", endTime);
    
    startTimer(seconds);
    showPage('timer');
    
  } catch (err) {
    console.error(err);
    alert("Invalid Payment: " + err.message);
    showPage('main');
  } finally {
    loadingOverlay.style.display = "none";
  }
};

cancelBtn.onclick = () => {
  showPage('camera');
  selectedFile = null;
};

// --- Timer Logic ---
function startTimer(seconds) {
  clearInterval(timerInterval);
  
  const update = () => {
    const endTime = parseInt(localStorage.getItem("sessionEnd"));
    if(!endTime) return;
    
    const remaining = Math.floor((endTime - Date.now()) / 1000);
    
    if(remaining <= 0) {
      timerDisplay.textContent = "00:00:00";
      timerStatus.textContent = "Session Expired";
      clearInterval(timerInterval);
      localStorage.removeItem("sessionEnd");
      setTimeout(() => {
        alert("Session Ended.");
        signOut(auth);
      }, 1000);
      return;
    }

    const h = Math.floor(remaining / 3600);
    const m = Math.floor((remaining % 3600) / 60);
    const s = remaining % 60;
    
    timerDisplay.textContent = 
      `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  };

  update();
  timerInterval = setInterval(update, 1000);
}

// Check session on load
window.onload = () => {
  const endTime = localStorage.getItem("sessionEnd");
  if(endTime && parseInt(endTime) > Date.now()) {
    showPage('timer');
    startTimer();
  }
};

</script>
</body>
</html>
