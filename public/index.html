<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Jamal Said Kazembe Multisystem Management</title>

<style>

body{
margin:0;
font-family:Arial;
background:#f4f4f4;
text-align:center;
}

h1{
font-size:40px;
color:blue;
margin-top:40px;
}

h2{
color:red;
}

#userName{
margin-top:20px;
font-size:20px;
font-weight:bold;
}

.login-btn{
margin-top:200px;
padding:15px 40px;
font-size:18px;
background:green;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}

.logout-btn{
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%);
padding:12px 30px;
font-size:16px;
background:red;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
display:none;
}

</style>
</head>

<body>

<h1>JAMAL SAID KAZEMBE</h1>
<h2>MULTISYSTEM MANAGEMENT</h2>

<div id="userName"></div>

<button class="login-btn" id="loginBtn">LOGIN WITH GOOGLE</button>

<button class="logout-btn" id="logoutBtn">LOGOUT</button>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import { 
getAuth,
GoogleAuthProvider,
signInWithPopup,
signOut,
onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
apiKey: "AIzaSyDpNJIZoLeZUhIoTepbLb_3rRLpseu9Zdo",
authDomain: "my-project-66803-95cb3.firebaseapp.com",
projectId: "my-project-66803-95cb3",
storageBucket: "my-project-66803-95cb3.firebasestorage.app",
messagingSenderId: "167159607898",
appId: "1:167159607898:web:23ca11366b88868b085e63"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const provider = new GoogleAuthProvider();

const loginBtn = document.getElementById("loginBtn");
const logoutBtn = document.getElementById("logoutBtn");
const userName = document.getElementById("userName");

loginBtn.onclick = () => {

signInWithPopup(auth, provider)

.then((result)=>{

console.log(result.user);

})

.catch((error)=>{

alert(error.message);

});

};

logoutBtn.onclick = () => {

signOut(auth);

};

onAuthStateChanged(auth,(user)=>{

if(user){

userName.innerHTML = "Welcome: " + user.displayName;

loginBtn.style.display = "none";
logoutBtn.style.display = "block";

}else{

userName.innerHTML = "";

loginBtn.style.display = "block";
logoutBtn.style.display = "none";

}

});

</script>

</body>
</html>
