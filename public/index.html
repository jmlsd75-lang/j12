<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jamal Said Kazembe Multisystem Management</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
      text-align: center;
    }
    h1 {
      font-size: 38px;
      color: blue;
      margin-bottom: 5px;
      letter-spacing: 1px;
    }
    h2 {
      color: red;
      font-size: 22px;
      margin-bottom: 60px;
      font-weight: normal;
    }
    #loginBtn {
      padding: 14px 50px;
      font-size: 20px;
      font-weight: bold;
      background: green;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      letter-spacing: 1px;
    }
    #loginBtn:hover { background: #006400; }
    #loginBtn:disabled { background: gray; cursor: not-allowed; }
    #statusMsg {
      margin-top: 20px;
      font-size: 16px;
      color: #555;
      min-height: 24px;
    }
  </style>
</head>
<body>

  <h1>JAMAL SAID KAZEMBE</h1>
  <h2>MULTISYSTEM MANAGEMENT</h2>

  <button id="loginBtn">LOGIN</button>
  <div id="statusMsg"></div>

  <script src="login.js"></script>

</body>
</html>
