<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jamal Said Kazembe - Multisystem Management</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Poppins', sans-serif;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  background: linear-gradient(135deg, #0d4a0d 0%, #1a6b1a 25%, #0f5f0f 50%, #145214 75%, #0a3d0a 100%);
  overflow: hidden;
  position: relative;
}

body::before {
  content: '';
  position: absolute;
  top: -50%;
  left: -50%;
  width: 200%;
  height: 200%;
  background:
    radial-gradient(ellipse at 20% 50%, rgba(34, 139, 34, 0.3) 0%, transparent 50%),
    radial-gradient(ellipse at 80% 20%, rgba(0, 100, 0, 0.2) 0%, transparent 50%),
    radial-gradient(ellipse at 50% 80%, rgba(34, 120, 34, 0.25) 0%, transparent 50%);
  animation: forestGlow 8s ease-in-out infinite alternate;
  z-index: 0;
}

@keyframes forestGlow {
  0% { transform: translate(0, 0) scale(1); }
  100% { transform: translate(-2%, -2%) scale(1.05); }
}

.leaf {
  position: absolute;
  width: 20px;
  height: 20px;
  background: linear-gradient(135deg, #228B22, #32CD32);
  border-radius: 0 50% 50% 50%;
  opacity: 0.3;
  animation: fall linear infinite;
  z-index: 0;
}

.leaf:nth-child(1) { left: 10%; animation-duration: 12s; animation-delay: 0s; width: 15px; height: 15px; }
.leaf:nth-child(2) { left: 25%; animation-duration: 15s; animation-delay: 2s; }
.leaf:nth-child(3) { left: 40%; animation-duration: 10s; animation-delay: 4s; width: 25px; height: 25px; }
.leaf:nth-child(4) { left: 55%; animation-duration: 14s; animation-delay: 1s; }
.leaf:nth-child(5) { left: 70%; animation-duration: 11s; animation-delay: 3s; width: 18px; height: 18px; }
.leaf:nth-child(6) { left: 85%; animation-duration: 13s; animation-delay: 5s; }

@keyframes fall {
  0% { transform: translateY(-100vh) rotate(0deg); opacity: 0; }
  10% { opacity: 0.3; }
  90% { opacity: 0.3; }
  100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
}

/* System Name */
.system-name {
  position: relative;
  z-index: 10;
  text-align: center;
  margin-top: 18vh;
  animation: fadeDown 1s ease-out;
}

@keyframes fadeDown {
  0% { opacity: 0; transform: translateY(-30px); }
  100% { opacity: 1; transform: translateY(0); }
}

.system-name .line1 {
  font-size: clamp(28px, 6vw, 48px);
  font-weight: 700;
  color: #90EE90;
  text-shadow: 0 3px 10px rgba(0, 0, 0, 0.4);
  line-height: 1.2;
  letter-spacing: 2px;
}

.system-name .line2 {
  font-size: clamp(20px, 4.5vw, 36px);
  font-weight: 300;
  color: rgba(144, 238, 144, 0.65);
  text-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
  line-height: 1.4;
  letter-spacing: 6px;
  text-transform: uppercase;
  margin-top: 8px;
}

/* Decorative line under name */
.name-underline {
  position: relative;
  z-index: 10;
  width: 100px;
  height: 2px;
  background: linear-gradient(90deg, transparent, #7CFC7C, transparent);
  margin: 30px auto 0;
  animation: expandLine 1.2s ease-out 0.4s both;
}

@keyframes expandLine {
  0% { width: 0; opacity: 0; }
  100% { width: 100px; opacity: 1; }
}

/* Login Button */
.login-btn-wrapper {
  position: relative;
  z-index: 10;
  margin-top: auto;
  margin-bottom: 15vh;
  animation: fadeUp 1s ease-out 0.6s both;
}

@keyframes fadeUp {
  0% { opacity: 0; transform: translateY(30px); }
  100% { opacity: 1; transform: translateY(0); }
}

.login-btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
  padding: 18px 50px;
  font-family: 'Poppins', sans-serif;
  font-size: 17px;
  font-weight: 600;
  color: #0d4a0d;
  background: linear-gradient(145deg, #7CFC7C, #5cdb5c);
  border: none;
  border-radius: 50px;
  cursor: pointer;
  text-decoration: none;
  transition: all 0.3s ease;
  box-shadow:
    0 8px 30px rgba(124, 252, 124, 0.3),
    0 2px 8px rgba(0, 0, 0, 0.2);
  letter-spacing: 1px;
}

.login-btn:hover {
  transform: translateY(-3px);
  box-shadow:
    0 14px 40px rgba(124, 252, 124, 0.4),
    0 4px 12px rgba(0, 0, 0, 0.25);
  background: linear-gradient(145deg, #8aff8a, #6de66d);
}

.login-btn:active {
  transform: translateY(-1px);
  box-shadow:
    0 6px 20px rgba(124, 252, 124, 0.3),
    0 2px 6px rgba(0, 0, 0, 0.2);
}

.login-btn svg {
  width: 22px;
  height: 22px;
  fill: #0d4a0d;
}

/* Subtle pulse on button */
.login-btn::after {
  content: '';
  position: absolute;
  inset: -4px;
  border-radius: 54px;
  border: 2px solid rgba(124, 252, 124, 0.3);
  animation: pulse 2.5s ease-in-out infinite;
}

@keyframes pulse {
  0%, 100% { opacity: 0; transform: scale(1); }
  50% { opacity: 1; transform: scale(1.04); }
}

@media (max-width: 480px) {
  .system-name {
    margin-top: 15vh;
  }

  .system-name .line2 {
    letter-spacing: 3px;
  }

  .login-btn {
    padding: 16px 40px;
    font-size: 15px;
  }

  .login-btn-wrapper {
    margin-bottom: 12vh;
  }
}
</style>
</head>
<body>

<!-- Floating Leaves -->
<div class="leaf"></div>
<div class="leaf"></div>
<div class="leaf"></div>
<div class="leaf"></div>
<div class="leaf"></div>
<div class="leaf"></div>

<!-- System Name -->
<div class="system-name">
  <div class="line1">Jamal Said Kazembe</div>
  <div class="line2">Multisystem Management</div>
</div>
<div class="name-underline"></div>

<!-- Login Button -->
<div class="login-btn-wrapper">
  <a href="login.html" class="login-btn">
    <svg viewBox="0 0 24 24">
      <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
    </svg>
    Login
  </a>
</div>

</body>
</html>
