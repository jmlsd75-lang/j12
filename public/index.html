<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Health | Education | Business</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            overflow: hidden;
            pointer-events: none;
        }

        .bg-circle {
            position: absolute;
            border-radius: 50%;
            opacity: 0.1;
            animation: bgPulse 8s ease-in-out infinite;
        }

        .bg-circle:nth-child(1) {
            width: 400px;
            height: 400px;
            background: #e74c3c;
            top: -100px;
            left: -100px;
            animation-delay: 0s;
        }

        .bg-circle:nth-child(2) {
            width: 300px;
            height: 300px;
            background: #3498db;
            top: 50%;
            right: -80px;
            animation-delay: 2s;
        }

        .bg-circle:nth-child(3) {
            width: 350px;
            height: 350px;
            background: #2ecc71;
            bottom: -100px;
            left: 30%;
            animation-delay: 4s;
        }

        @keyframes bgPulse {
            0%, 100% { transform: scale(1); opacity: 0.1; }
            50% { transform: scale(1.2); opacity: 0.15; }
        }

        .main-container {
            display: flex;
            align-items: center;
            gap: 50px;
            z-index: 1;
            flex-wrap: wrap;
            justify-content: center;
            padding: 20px;
            width: 100%;
            max-width: 1200px;
        }

        /* New Layout Wrapper for Left Side */
        .left-panel {
            display: flex;
            flex-direction: column;
            gap: 30px;
            align-items: center;
            justify-content: center;
        }

        .illustrations {
            display: flex;
            flex-direction: column;
            gap: 40px;
        }

        .illustration-item {
            display: flex;
            align-items: center;
            gap: 20px;
            padding: 15px 20px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.4s ease;
            cursor: default;
        }

        .illustration-item:hover {
            transform: translateX(10px);
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.2);
        }

        .illustration-label {
            color: #fff;
            font-size: 18px;
            font-weight: 500;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        /* Instruction Button Styles */
        .instruction-btn {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding: 14px 32px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #ffffff;
            font-family: inherit;
            font-size: 15px;
            font-weight: 500;
            letter-spacing: 0.5px;
            border-radius: 50px;
            cursor: pointer;
            backdrop-filter: blur(10px);
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            text-decoration: none;
            outline: none;
        }

        .instruction-btn svg {
            width: 20px;
            height: 20px;
            fill: currentColor;
            transition: transform 0.3s ease;
        }

        .instruction-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(255, 255, 255, 0.15);
            border-color: rgba(255, 255, 255, 0.4);
        }

        .instruction-btn:hover svg {
            transform: rotate(10deg) scale(1.1);
        }

        .instruction-btn:active {
            transform: translateY(-1px);
        }

        /* Icons CSS */
        .health-icon {
            position: relative;
            width: 80px;
            height: 70px;
        }

        .heart {
            position: absolute;
            width: 50px;
            height: 45px;
            top: 5px;
            left: 15px;
            animation: heartbeat 1.5s ease-in-out infinite;
        }

        .heart::before,
        .heart::after {
            content: '';
            position: absolute;
            width: 25px;
            height: 40px;
            background: #e74c3c;
            border-radius: 25px 25px 0 0;
        }

        .heart::before {
            left: 25px;
            transform: rotate(-45deg);
            transform-origin: 0 100%;
        }

        .heart::after {
            left: 0;
            transform: rotate(45deg);
            transform-origin: 100% 100%;
        }

        @keyframes heartbeat {
            0%, 100% { transform: scale(1); }
            15% { transform: scale(1.15); }
            30% { transform: scale(1); }
            45% { transform: scale(1.1); }
        }

        .pulse-line {
            position: absolute;
            bottom: 5px;
            left: 0;
            width: 80px;
            height: 20px;
        }

        .pulse-line::before {
            content: '';
            position: absolute;
            bottom: 8px;
            left: 0;
            width: 100%;
            height: 2px;
            background: #e74c3c;
        }

        .pulse-line::after {
            content: '';
            position: absolute;
            bottom: 8px;
            left: 30px;
            width: 15px;
            height: 15px;
            border-left: 2px solid #e74c3c;
            border-top: 2px solid #e74c3c;
            background: transparent;
            transform: rotate(45deg);
        }

        .health-cross {
            position: absolute;
            top: 18px;
            left: 32px;
            z-index: 2;
        }

        .health-cross::before {
            content: '';
            position: absolute;
            width: 12px;
            height: 4px;
            background: #fff;
            top: 4px;
            left: -1px;
            border-radius: 2px;
        }

        .health-cross::after {
            content: '';
            position: absolute;
            width: 4px;
            height: 12px;
            background: #fff;
            top: 0;
            left: 3px;
            border-radius: 2px;
        }

        .education-icon {
            position: relative;
            width: 80px;
            height: 70px;
        }

        .grad-cap {
            position: absolute;
            top: 8px;
            left: 10px;
        }

        .cap-top {
            position: absolute;
            width: 45px;
            height: 45px;
            background: #3498db;
            transform: rotate(45deg);
            top: 0;
            left: 5px;
            border-radius: 3px;
        }

        .cap-top::after {
            content: '';
            position: absolute;
            width: 45px;
            height: 45px;
            background: linear-gradient(135deg, #5dade2, #2e86c1);
            transform: rotate(0deg);
            border-radius: 3px;
        }

        .cap-base {
            position: absolute;
            width: 35px;
            height: 10px;
            background: #2c3e50;
            top: 28px;
            left: 10px;
            border-radius: 0 0 5px 5px;
        }

        .tassel {
            position: absolute;
            top: 5px;
            right: 5px;
        }

        .tassel-line {
            position: absolute;
            width: 2px;
            height: 25px;
            background: #f1c40f;
            top: 0;
            left: 0;
            transform-origin: top;
            animation: tasselSwing 2s ease-in-out infinite;
        }

        .tassel-ball {
            position: absolute;
            width: 8px;
            height: 8px;
            background: #f1c40f;
            border-radius: 50%;
            top: 23px;
            left: -3px;
            animation: tasselSwing 2s ease-in-out infinite;
        }

        @keyframes tasselSwing {
            0%, 100% { transform: rotate(-5deg); }
            50% { transform: rotate(5deg); }
        }

        .edu-book {
            position: absolute;
            bottom: 5px;
            left: 8px;
        }

        .edu-book-page {
            position: absolute;
            width: 40px;
            height: 8px;
            border-radius: 2px;
        }

        .edu-book-page:nth-child(1) {
            background: #ecf0f1;
            bottom: 0;
            left: 0;
        }

        .edu-book-page:nth-child(2) {
            background: #bdc3c7;
            bottom: 3px;
            left: 2px;
        }

        .edu-book-page:nth-child(3) {
            background: #3498db;
            bottom: 6px;
            left: 4px;
            width: 36px;
        }

        .edu-book-spine {
            position: absolute;
            width: 5px;
            height: 20px;
            background: #2980b9;
            bottom: 0;
            left: 0;
            border-radius: 2px 0 0 2px;
        }

        .business-icon {
            position: relative;
            width: 80px;
            height: 70px;
        }

        .briefcase {
            position: absolute;
            top: 15px;
            left: 5px;
        }

        .briefcase-body {
            width: 50px;
            height: 35px;
            background: linear-gradient(180deg, #f39c12, #e67e22);
            border-radius: 4px;
            position: relative;
        }

        .briefcase-body::before {
            content: '';
            position: absolute;
            width: 100%;
            height: 8px;
            background: #d35400;
            top: 13px;
        }

        .briefcase-body::after {
            content: '';
            position: absolute;
            width: 10px;
            height: 10px;
            background: #f1c40f;
            border-radius: 50%;
            top: 12px;
            left: 50%;
            transform: translateX(-50%);
            border: 2px solid #d35400;
        }

        .briefcase-handle {
            position: absolute;
            width: 20px;
            height: 12px;
            border: 3px solid #d35400;
            border-bottom: none;
            border-radius: 10px 10px 0 0;
            top: -10px;
            left: 50%;
            transform: translateX(-50%);
            background: transparent;
        }

        .briefcase-lock {
            position: absolute;
            bottom: -8px;
            left: 50%;
            transform: translateX(-50%);
        }

        .briefcase-lock::before {
            content: '';
            width: 12px;
            height: 6px;
            background: #d35400;
            display: block;
            border-radius: 0 0 3px 3px;
        }

        .chart-bars {
            position: absolute;
            bottom: 5px;
            right: 0;
            display: flex;
            align-items: flex-end;
            gap: 4px;
        }

        .bar {
            width: 8px;
            border-radius: 2px 2px 0 0;
            animation: barGrow 2s ease-in-out infinite;
        }

        .bar:nth-child(1) {
            height: 15px;
            background: #2ecc71;
            animation-delay: 0s;
        }

        .bar:nth-child(2) {
            height: 25px;
            background: #27ae60;
            animation-delay: 0.2s;
        }

        .bar:nth-child(3) {
            height: 20px;
            background: #2ecc71;
            animation-delay: 0.4s;
        }

        .bar:nth-child(4) {
            height: 30px;
            background: #27ae60;
            animation-delay: 0.6s;
        }

        @keyframes barGrow {
            0%, 100% { transform: scaleY(1); }
            50% { transform: scaleY(0.7); }
        }

        .trend-arrow {
            position: absolute;
            top: 8px;
            right: 5px;
            width: 0;
            height: 0;
            border-left: 8px solid transparent;
            border-right: 8px solid transparent;
            border-bottom: 12px solid #2ecc71;
            animation: trendPulse 1.5s ease-in-out infinite;
        }

        @keyframes trendPulse {
            0%, 100% { opacity: 1; transform: translateY(0); }
            50% { opacity: 0.6; transform: translateY(-3px); }
        }

        .login-card {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            padding: 50px 40px;
            border-radius: 24px;
            text-align: center;
            min-width: 350px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.3);
            display: flex;
            flex-direction: column;
        }

        .login-card h1 {
            color: #ffffff;
            font-size: 28px;
            margin-bottom: 8px;
            font-weight: 600;
        }

        .login-card p {
            color: rgba(255, 255, 255, 0.6);
            font-size: 14px;
            margin-bottom: 35px;
            line-height: 1.6;
        }

        .google-login-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 14px;
            padding: 14px 28px;
            background-color: #ffffff;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 500;
            color: #3c4043;
            transition: all 0.3s ease;
            width: 100%;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        .google-login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.3);
            background-color: #f8f9fa;
        }

        .google-login-btn:active {
            transform: translateY(0);
        }

        .google-login-btn:disabled {
            cursor: wait;
            transform: none !important;
            opacity: 0.7;
        }

        .google-icon {
            width: 22px;
            height: 22px;
        }

        .divider {
            display: flex;
            align-items: center;
            margin: 25px 0;
            color: rgba(255, 255, 255, 0.4);
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: rgba(255, 255, 255, 0.15);
        }

        .divider span {
            padding: 0 15px;
        }

        .features-list {
            text-align: left;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .feature-item {
            display: flex;
            align-items: center;
            gap: 10px;
            color: rgba(255, 255, 255, 0.7);
            font-size: 13px;
        }

        .feature-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .feature-dot.health { background: #e74c3c; }
        .feature-dot.education { background: #3498db; }
        .feature-dot.business { background: #f39c12; }

        .login-error {
            color: #ff6b6b;
            font-size: 13px;
            margin-top: 14px;
            padding: 10px 14px;
            background: rgba(255, 107, 107, 0.1);
            border: 1px solid rgba(255, 107, 107, 0.25);
            border-radius: 8px;
            text-align: center;
            animation: errorIn 0.3s ease;
        }

        @keyframes errorIn {
            from { opacity: 0; transform: translateY(-8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 900px) {
            .main-container {
                flex-direction: column;
                gap: 40px;
            }
            .left-panel {
                flex-direction: row;
                flex-wrap: wrap;
                justify-content: center;
                width: 100%;
            }
            .instruction-btn {
                width: 100%;
                max-width: 300px;
                order: 3; /* Move button to bottom of illustrations on tablet */
            }
        }

        @media (max-width: 768px) {
            .illustrations {
                flex-direction: column;
                align-items: center;
            }
            .illustration-item {
                flex-direction: column;
                text-align: center;
                width: 100%;
                max-width: 280px;
            }
            .left-panel {
                flex-direction: column;
                align-items: center;
            }
            .login-card {
                min-width: 300px;
                padding: 35px 25px;
                width: 100%;
                max-width: 400px;
            }
        }
    </style>
</head>
<body>

    <div class="bg-animation">
        <div class="bg-circle"></div>
        <div class="bg-circle"></div>
        <div class="bg-circle"></div>
    </div>

    <div class="main-container">

        <!-- Left Panel: Contains Illustrations and the New Instruction Button -->
        <div class="left-panel">
            
            <div class="illustrations">
                <div class="illustration-item">
                    <div class="health-icon">
                        <div class="heart"></div>
                        <div class="health-cross"></div>
                        <div class="pulse-line"></div>
                    </div>
                    <span class="illustration-label" style="color: #e74c3c;">Health</span>
                </div>

                <div class="illustration-item">
                    <div class="education-icon">
                        <div class="grad-cap">
                            <div class="cap-top"></div>
                            <div class="cap-base"></div>
                            <div class="tassel">
                                <div class="tassel-line"></div>
                                <div class="tassel-ball"></div>
                            </div>
                        </div>
                        <div class="edu-book">
                            <div class="edu-book-page"></div>
                            <div class="edu-book-page"></div>
                            <div class="edu-book-page"></div>
                            <div class="edu-book-spine"></div>
                        </div>
                    </div>
                    <span class="illustration-label" style="color: #3498db;">Education</span>
                </div>

                <div class="illustration-item">
                    <div class="business-icon">
                        <div class="briefcase">
                            <div class="briefcase-handle"></div>
                            <div class="briefcase-body"></div>
                            <div class="briefcase-lock"></div>
                        </div>
                        <div class="trend-arrow"></div>
                        <div class="chart-bars">
                            <div class="bar"></div>
                            <div class="bar"></div>
                            <div class="bar"></div>
                            <div class="bar"></div>
                        </div>
                    </div>
                    <span class="illustration-label" style="color: #f39c12;">Business</span>
                </div>
            </div>

            <!-- NEW INSTRUCTION BUTTON -->
            <button class="instruction-btn" id="instructionBtn" onclick="goToInstructions()">
                <!-- SVG Icon for Instructions/Guide -->
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 17h-2v-2h2v2zm2.07-7.75l-.9.92C13.45 12.9 13 13.5 13 15h-2v-.5c0-1.1.45-2.1 1.17-2.83l1.24-1.26c.37-.36.59-.86.59-1.41 0-1.1-.9-2-2-2s-2 .9-2 2H8c0-2.21 1.79-4 4-4s4 1.79 4 4c0 .88-.36 1.68-.93 2.25z"/>
                </svg>
                View Instructions
            </button>

        </div>

        <div class="login-card">
            <h1>Welcome</h1>
            <p>Access your dashboard for Health, Education & Business tools</p>

            <button class="google-login-btn" id="googleLoginBtn" onclick="handleGoogleLogin()">
                <svg class="google-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/>
                    <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                    <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
                    <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
                </svg>
                Sign in with Google
            </button>

            <div class="divider">
                <span>Features</span>
            </div>

            <div class="features-list">
                <div class="feature-item">
                    <div class="feature-dot health"></div>
                    Health tracking & wellness tools
                </div>
                <div class="feature-item">
                    <div class="feature-dot education"></div>
                    Learning courses & certifications
                </div>
                <div class="feature-item">
                    <div class="feature-dot business"></div>
                    Analytics & growth insights
                </div>
            </div>
        </div>

    </div>

    <script type="module">
        // Function to handle redirection to instruction.html
        window.goToInstructions = function() {
            // Visual feedback before redirect (optional smooth transition)
            const btn = document.getElementById('instructionBtn');
            btn.style.transform = "scale(0.95)";
            setTimeout(() => {
                window.location.href = 'instruction.html';
            }, 150);
        };

        // Existing mock login function
        window.handleGoogleLogin = function() {
            const btn = document.getElementById('googleLoginBtn');
            const originalText = btn.innerHTML;
            
            // UI Loading state
            btn.disabled = true;
            btn.innerHTML = 'Connecting...';
            
            // Simulate API call delay
            setTimeout(() => {
                // Here you would integrate real Firebase/Auth logic
                console.log("Google Login Clicked");
                alert("This is a demo. In production, this would trigger the Google Auth flow.");
                
                // Reset button
                btn.disabled = false;
                btn.innerHTML = originalText;
            }, 1500);
        };
    </script>
</body>
</html>
