<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>

    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #f4f4f4;
            font-family: Arial, sans-serif;
        }

        #loginBtn {
            padding: 15px 30px;
            font-size: 18px;
            border: none;
            border-radius: 8px;
            background: #dc3545; /* RED */
            color: white;
            cursor: pointer;
        }

        #loginBtn:hover {
            background: #a71d2a; /* darker red on hover */
        }
    </style>
</head>
<body>

    <button id="loginBtn">Login</button>

    <script src="login.js"></script>

</body>
</html>
