<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Business Suite</title>
    <style>
        :root {
            --primary-bg: #0f172a;
            --secondary-bg: #1e293b;
            --accent-gold: #f59e0b;
            --accent-blue: #3b82f6;
            --text-white: #f8fafc;
            --text-muted: #94a3b8;
            --glass-border: rgba(255, 255, 255, 0.1);
            --glass-bg: rgba(255, 255, 255, 0.05);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #334155 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            color: var(--text-white);
        }

        /* Background Animation - Abstract Business Waves */
        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            overflow: hidden;
            pointer-events: none;
        }

        .bg-shape {
            position: absolute;
            border-radius: 50%;
            filter: blur(60px);
            opacity: 0.15;
            animation: floatShape 10s ease-in-out infinite;
        }

        .bg-shape:nth-child(1) {
            width: 500px;
            height: 500px;
            background: var(--accent-blue);
            top: -150px;
            left: -100px;
            animation-delay: 0s;
        }

        .bg-shape:nth-child(2) {
            width: 400px;
            height: 400px;
            background: var(--accent-gold);
            bottom: -100px;
            right: -100px;
            animation-delay: 3s;
        }

        @keyframes floatShape {
            0%, 100% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(30px, -30px) scale(1.1); }
        }

        .main-container {
            display: flex;
            align-items: center;
            gap: 80px;
            z-index: 1;
            flex-wrap: wrap;
            justify-content: center;
            padding: 40px;
            max-width: 1200px;
            width: 100%;
        }

        /* --- Left Side: Business Illustration --- */
        .business-showcase {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            min-width: 300px;
        }

        .illustration-wrapper {
            position: relative;
            width: 300px;
            height: 300px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Central Briefcase */
        .hero-briefcase {
            position: relative;
            width: 120px;
            height: 90px;
            z-index: 10;
            animation: hoverFloat 4s ease-in-out infinite;
        }

        .briefcase-body {
            width: 100%;
            height: 70px;
            background: linear-gradient(180deg, #f59e0b, #d97706);
            border-radius: 12px;
            position: absolute;
            bottom: 0;
            box-shadow: 0 10px 25px rgba(245, 158, 11, 0.3);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .briefcase-body::before {
            content: '';
            width: 80%;
            height: 4px;
            background: rgba(0,0,0,0.1);
            border-radius: 2px;
        }

        .briefcase-handle {
            width: 50px;
            height: 20px;
            border: 6px solid #b45309;
            border-bottom: none;
            border-radius: 12px 12px 0 0;
            position: absolute;
            top: -15px;
            left: 50%;
            transform: translateX(-50%);
        }

        .briefcase-lock {
            width: 14px;
            height: 10px;
            background: #78350f;
            border-radius: 0 0 4px 4px;
            position: absolute;
            bottom: -8px;
            left: 50%;
            transform: translateX(-50%);
        }

        /* Orbiting Elements */
        .orbit-item {
            position: absolute;
            border-radius: 12px;
            background: var(--glass-bg);
            backdrop-filter: blur(5px);
            border: 1px solid var(--glass-border);
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Bar Chart Card */
        .chart-card {
            width: 80px;
            height: 80px;
            top: -20px;
            right: -20px;
            animation: orbitFloat 5s ease-in-out infinite;
            animation-delay: 0s;
        }

        .mini-bars {
            display: flex;
            align-items: flex-end;
            gap: 4px;
            height: 40px;
        }

        .m-bar {
            width: 8px;
            background: var(--accent-blue);
            border-radius: 2px 2px 0 0;
            animation: barGrowPulse 2s ease-in-out infinite;
        }
        .m-bar:nth-child(1) { height: 40%; animation-delay: 0s; }
        .m-bar:nth-child(2) { height: 70%; animation-delay: 0.2s; }
        .m-bar:nth-child(3) { height: 50%; animation-delay: 0.4s; }
        .m-bar:nth-child(4) { height: 90%; animation-delay: 0.6s; }

        /* Pie Chart Card */
        .pie-card {
            width: 70px;
            height: 70px;
            bottom: -10px;
            left: -30px;
            animation: orbitFloat 6s ease-in-out infinite;
            animation-delay: 2s;
        }

        .pie-chart {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            background: conic-gradient(#3b82f6 0% 60%, #94a3b8 60% 100%);
            position: relative;
            animation: spinPie 10s linear infinite;
        }
        
        .pie-chart::after {
            content: '';
            position: absolute;
            inset: 10px;
            background: rgba(30, 41, 59, 0.8);
            border-radius: 50%;
        }

        /* Document Card */
        .doc-card {
            width: 60px;
            height: 75px;
            top: 40px;
            left: -40px;
            animation: orbitFloat 5.5s ease-in-out infinite;
            animation-delay: 1s;
            flex-direction: column;
            gap: 6px;
            padding: 8px;
        }

        .doc-line {
            height: 3px;
            background: rgba(255,255,255,0.3);
            border-radius: 1px;
        }
        .doc-line:nth-child(1) { width: 80%; }
        .doc-line:nth-child(2) { width: 100%; background: rgba(255,255,255,0.6); }
        .doc-line:nth-child(3) { width: 60%; }

        /* Animation Keyframes */
        @keyframes hoverFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        @keyframes orbitFloat {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-15px) rotate(2deg); }
        }

        @keyframes barGrowPulse {
            0%, 100% { transform: scaleY(1); }
            50% { transform: scaleY(0.6); }
        }

        @keyframes spinPie {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* --- Right Side: Login Card --- */
        .login-card {
            background: var(--glass-bg);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--glass-border);
            padding: 50px 45px;
            border-radius: 24px;
            text-align: center;
            min-width: 380px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            position: relative;
            overflow: hidden;
        }

        /* Decorative top line on card */
        .login-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: linear-gradient(90deg, var(--accent-blue), var(--accent-gold));
        }

        .login-card h1 {
            color: #ffffff;
            font-size: 32px;
            margin-bottom: 12px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .login-card p {
            color: var(--text-muted);
            font-size: 15px;
            margin-bottom: 35px;
            line-height: 1.6;
        }

        .google-login-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding: 14px 24px;
            background-color: #ffffff;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            color: #334155;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            width: 100%;
            position: relative;
            overflow: hidden;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }

        .google-login-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
        }

        .google-login-btn:active:not(:disabled) {
            transform: translateY(0);
        }

        .google-login-btn:disabled {
            opacity: 0.8;
            cursor: not-allowed;
            background: #f1f5f9;
            color: #94a3b8;
        }

        .btn-loader {
            width: 20px;
            height: 20px;
            border: 2px solid #cbd5e1;
            border-top-color: #3b82f6;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            display: none;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .google-icon {
            width: 20px;
            height: 20px;
        }

        .divider {
            display: flex;
            align-items: center;
            margin: 30px 0;
            color: rgba(255, 255, 255, 0.3);
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            font-weight: 600;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: rgba(255, 255, 255, 0.1);
        }

        .divider span {
            padding: 0 15px;
        }

        .features-list {
            text-align: left;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .feature-item {
            display: flex;
            align-items: center;
            gap: 12px;
            color: #cbd5e1;
            font-size: 14px;
            font-weight: 500;
        }

        .feature-icon-box {
            width: 36px;
            height: 36px;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.05);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }

        /* Toast Notification */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: rgba(15, 23, 42, 0.95);
            border: 1px solid var(--glass-border);
            color: white;
            padding: 16px 24px;
            border-radius: 12px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: center;
            gap: 12px;
            z-index: 100;
            opacity: 0;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .toast.visible {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        .toast.success { border-left: 4px solid #22c55e; }
        .toast.error { border-left: 4px solid #ef4444; }

        /* Responsive */
        @media (max-width: 900px) {
            .main-container {
                gap: 40px;
                flex-direction: column;
            }
            .business-showcase {
                width: 100%;
            }
            .illustration-wrapper {
                width: 250px;
                height: 250px;
            }
        }

        @media (max-width: 480px) {
            .login-card {
                min-width: 100%;
                padding: 30px 20px;
            }
            .main-container {
                padding: 20px;
            }
        }
    </style>
</head>
<body>

    <div class="bg-animation">
        <div class="bg-shape"></div>
        <div class="bg-shape"></div>
    </div>

    <div class="main-container">
        
        <!-- Visual Illustration: Business Ecosystem -->
        <div class="business-showcase">
            <div class="illustration-wrapper">
                
                <!-- Orbiting Element: Pie Chart -->
                <div class="orbit-item pie-card">
                    <div class="pie-chart"></div>
                </div>

                <!-- Orbiting Element: Bar Chart -->
                <div class="orbit-item chart-card">
                    <div class="mini-bars">
                        <div class="m-bar"></div>
                        <div class="m-bar"></div>
                        <div class="m-bar"></div>
                        <div class="m-bar"></div>
                    </div>
                </div>

                <!-- Orbiting Element: Document -->
                <div class="orbit-item doc-card">
                    <div class="doc-line"></div>
                    <div class="doc-line"></div>
                    <div class="doc-line"></div>
                </div>

                <!-- Central Hero: Briefcase -->
                <div class="hero-briefcase">
                    <div class="briefcase-handle"></div>
                    <div class="briefcase-body"></div>
                    <div class="briefcase-lock"></div>
                </div>

            </div>
        </div>

        <!-- Login Card -->
        <div class="login-card">
            <h1>Business Suite</h1>
            <p>Access your enterprise dashboard, analytics, and team collaboration tools.</p>

            <button class="google-login-btn" id="googleLoginBtn" onclick="handleGoogleLogin()">
                <svg class="google-icon" id="btnIcon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/>
                    <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                    <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
                    <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
                </svg>
                <span id="btnText">Sign in with Google</span>
                <div class="btn-loader" id="btnLoader"></div>
            </button>

            <div class="divider">
                <span>Workspace Features</span>
            </div>

            <div class="features-list">
                <div class="feature-item">
                    <div class="feature-icon-box" style="color: var(--accent-blue);">
                        📊
                    </div>
                    Advanced Analytics & Reporting
                </div>
                <div class="feature-item">
                    <div class="feature-icon-box" style="color: var(--accent-gold);">
                        👥
                    </div>
                    Team Management & Roles
                </div>
                <div class="feature-item">
                    <div class="feature-icon-box" style="color: #10b981;">
                        🔒
                    </div>
                    Enterprise-Grade Security
                </div>
            </div>
        </div>

    </div>

    <!-- Toast Notification Element -->
    <div id="toast" class="toast">
        <span id="toastIcon">✅</span>
        <span id="toastMessage">Operation successful</span>
    </div>

    <script>
        // Simulated Login Logic
        const loginBtn = document.getElementById('googleLoginBtn');
        const btnText = document.getElementById('btnText');
        const btnIcon = document.getElementById('btnIcon');
        const btnLoader = document.getElementById('btnLoader');
        
        let isProcessing = false;

        function handleGoogleLogin() {
            if (isProcessing) return;
            
            // 1. Set Loading State
            isProcessing = true;
            loginBtn.disabled = true;
            btnText.textContent = "Authenticating...";
            btnIcon.style.display = 'none';
            btnLoader.style.display = 'block';

            // 2. Simulate Network Request (2 seconds)
            setTimeout(() => {
                // Success Scenario
                const success = true; // Change to false to test error handling

                if (success) {
                    showToast("Login Successful! Redirecting...", "success");
                    
                    // Simulate Redirect delay
                    setTimeout(() => {
                        // Reset button (in a real app, window.location.href would change here)
                        isProcessing = false;
                        loginBtn.disabled = false;
                        btnText.textContent = "Go to Dashboard";
                        btnLoader.style.display = 'none';
                        btnIcon.style.display = 'block';
                        btnIcon.innerHTML = '<path d="M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z" fill="#3b82f6"/>'; // Change icon to arrow
                    }, 1500);

                } else {
                    // Error Handling
                    showToast("Authentication failed. Please try again.", "error");
                    resetButton();
                }

            }, 2000);
        }

        function resetButton() {
            isProcessing = false;
            loginBtn.disabled = false;
            btnText.textContent = "Sign in with Google";
            btnIcon.style.display = 'block';
            btnLoader.style.display = 'none';
        }

        function showToast(message, type) {
            const toast = document.getElementById('toast');
            const toastMsg = document.getElementById('toastMessage');
            const toastIcon = document.getElementById('toastIcon');

            // Set content
            toastMsg.textContent = message;
            toast.className = `toast ${type}`; // Reset classes
            toastIcon.textContent = type === 'success' ? '✅' : '⚠️';

            // Show toast
            requestAnimationFrame(() => {
                toast.classList.add('visible');
            });

            // Hide after 3 seconds
            setTimeout(() => {
                toast.classList.remove('visible');
            }, 3500);
        }
    </script>
</body>
</html>
