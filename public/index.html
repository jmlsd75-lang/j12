<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JAMAL SAID KAZEMBE MULTISYSTEM MANAGEMENT</title>
    <style>
        /* Forest Theme */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(180deg, #0b1a0b 0%, #1a3a1a 40%, #2d5a27 70%, #1a3a1a 100%);
            font-family: Georgia, 'Times New Roman', serif;
        }

        /* Title at top center */
        .title {
            position: fixed;
            top: 40px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            color: #c8e6c0;
            text-shadow: 0 0 20px rgba(76, 175, 80, 0.4);
            z-index: 10;
        }

        .title .line1 {
            font-size: 28px;
            font-weight: 700;
            letter-spacing: 4px;
            color: #e8f5e0;
        }

        .title .line2 {
            font-size: 22px;
            font-weight: 400;
            letter-spacing: 6px;
            margin-top: 4px;
            color: #a5d69a;
        }

        /* Login button centered on page */
        .login-btn {
            padding: 16px 60px;
            font-size: 20px;
            font-family: Georgia, serif;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: #e8f5e0;
            background: linear-gradient(135deg, #2e7d32, #1b5e20);
            border: 2px solid #4caf50;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 20px rgba(76, 175, 80, 0.3);
        }

        .login-btn:hover {
            background: linear-gradient(135deg, #388e3c, #2e7d32);
            box-shadow: 0 6px 30px rgba(76, 175, 80, 0.5);
            transform: translateY(-2px);
        }

        .login-btn:active {
            transform: translateY(0);
            box-shadow: 0 2px 10px rgba(76, 175, 80, 0.3);
        }
    </style>
</head>
<body>

    <!-- Title: 3 words first line, 2 words second line -->
    <div class="title">
        <div class="line1">JAMAL SAID KAZEMBE</div>
        <div class="line2">MULTISYSTEM MANAGEMENT</div>
    </div>

    <!-- Login button at centre -->
    <button class="login-btn" onclick="window.location.href='login.html'">Login</button>

    <script src="login.js"></script>

</body>
</html>
