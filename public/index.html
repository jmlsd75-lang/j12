<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JAMALI SAIDI KAZEMBE MULTISYSTEM MANAGEMENT</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: center;
            height: 100vh;
            text-align: center;
            margin: 0;
            position: relative;
            font-family: Arial, sans-serif;
        }

        h1 {
            margin: 20px 0 0 0;
            width: 100%;
        }

        .highlight {
            color: #FF5733;
        }

        .login-btn {
            background-color: #6a0dad;
            color: white;
            padding: 15px 25px;
            border: none;
            border-radius: 5px;
            font-size: 1rem;
            cursor: pointer;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        .logout-btn {
            background-color: #6a0dad;
            color: white;
            padding: 15px 25px;
            border: none;
            border-radius: 5px;
            font-size: 1rem;
            cursor: pointer;
            position: absolute;
            bottom: 20px;
            display: none;
        }

        .center-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            display: none;
            gap: 20px;
        }

        .action-btn {
            background-color: #FF5733;
            color: white;
            padding: 15px 30px;
            border: none;
            border-radius: 5px;
            font-size: 1rem;
            cursor: pointer;
        }
    </style>

    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDpNJIZoLeZUhIoTepbLb_3rRLpseu9Zdo",
            authDomain: "my-project-66803-95cb3.firebaseapp.com",
            projectId: "my-project-66803-95cb3",
            storageBucket: "my-project-66803-95cb3.firebasestorage.app",
            messagingSenderId: "167159607898",
            appId: "1:167159607898:web:23ca11366b88868b085e63"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();

        const provider = new firebase.auth.GoogleAuthProvider();

        function updateUI(user) {
            const loginBtn = document.getElementById('loginBtn');
            const logoutBtn = document.getElementById('logoutBtn');
            const centerButtons = document.getElementById('centerButtons');

            if (user) {
                loginBtn.style.display = 'none';
                logoutBtn.style.display = 'block';
                centerButtons.style.display = 'flex';
            } else {
                loginBtn.style.display = 'block';
                logoutBtn.style.display = 'none';
                centerButtons.style.display = 'none';
            }
        }

        auth.onAuthStateChanged((user) => {
            updateUI(user);
        });

        auth.getRedirectResult()
            .then(() => {})
            .catch((error) => {
                console.error(error);
            });

        function login() {
            auth.signInWithRedirect(provider);
        }

        function logout() {
            auth.signOut();
        }
    </script>
</head>

<body>
    <h1><span class="highlight">JAMALI SAIDI KAZEMBE</span> MULTISYSTEM MANAGEMENT</h1>

    <!-- FIXED: direct onclick -->
    <button id="loginBtn" class="login-btn" onclick="login()">Login</button>

    <button id="logoutBtn" class="logout-btn" onclick="logout()">Logout</button>

    <div id="centerButtons" class="center-container">
        <button class="action-btn">Pay</button>
        <button class="action-btn">Free</button>
    </div>
</body>
</html>
