<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>

    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #f4f4f4;
            font-family: Arial, sans-serif;
        }

        .login-btn {
            background-color: blue;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 18px;
            border-radius: 8px;
            cursor: pointer;
        }

        .login-btn:hover {
            background-color: darkblue;
        }
    </style>
</head>
<body>

    <button id="loginBtn" class="login-btn">Login</button>

    <!-- ✅ CORRECT LINK TO login.js -->
    <script src="login.js"></script>

</body>
</html>
