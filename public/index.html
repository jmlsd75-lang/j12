<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jamal Said Kazembe Multisystem Management</title>
<style>
  body{
    margin:0;
    font-family:Arial, sans-serif;
    background:#f4f4f4;
    display:flex;
    flex-direction:column;
    justify-content:flex-start;
    align-items:center;
    min-height:100vh;
    text-align:center;
    padding-top:50px;
  }
  h1{ font-size:32px; color:blue; margin:0; }
  h2{ color:red; margin-top:5px; font-size:18px; }

  /* Buttons Styling */
  .login-btn, .logout-btn, .pay-btn {
    position: fixed;
    left: 50%;
    transform: translateX(-50%);
    border:none;
    cursor:pointer;
    display: none; /* Hidden by default, controlled by JS */
  }
  #payPage{
  position: fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:#ffffff;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
}

/* Different colors for lines */
.pay-info p{ margin:10px; font-size:18px; }
.mix{ color:green; }
.airtel{ color:red; }
.crdb{ color:blue; }
.name{ color:black; font-weight:bold; }

/* Bottom buttons */
.pay-actions{
  position: fixed;
  bottom: 30px;
  display:flex;
  gap:20px;
}

.back-btn{
  padding:12px 25px;
  background:gray;
  color:white;
  border:none;
  border-radius:6px;
}

.next-btn{
  padding:12px 25px;
  background:green;
  color:white;
  border:none;
  border-radius:6px;
}
  .login-btn{
    bottom: 30px;
    padding:15px 40px;
    font-size:20px;
    background:#28a745;
    color:white;
    border-radius:6px;
  }
.pay-btn{
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  padding:18px 50px;
  font-size:22px;
  background-color: #28a745;
  color:white;
  border-radius:8px;
}
  .logout-btn{
    bottom: 30px;
    background:#dc3545;
    color:white;
    padding:10px 25px;
    border-radius:6px;
    font-size:16px;
  }
</style>
</head>
<body>

<h1>JAMAL SAID KAZEMBE</h1>
<h2>MULTISYSTEM MANAGEMENT</h2>
  
<!-- Login Button -->
<button class="login-btn">LOGIN</button>

<!-- Fixed Position Buttons (Shown after login) -->
<button class="pay-btn">PAY</button>
<button class="logout-btn">LOGOUT</button>
<div id="payPage" style="display:none;">
  <div class="pay-info">
    <p>Pay through:</p>
    <p class="mix">Mix by Yas: +255 655 510 714</p>
    <p class="airtel">Airtel Money: +255 780 526 437</p>
    <p class="crdb">CRDB: 0152001GN6K00</p>
    <p class="name">JAMALI SAIDI KAZEMBE</p>
  </div>

  <div class="pay-actions">
    <button class="back-btn">BACK</button>
    <button class="next-btn">NEXT</button>
  </div>
</div>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

// --- Firebase Config ---
const firebaseConfig = {
  apiKey: "AIzaSyDpNJIZoLeZUhIoTepbLb_3rRLpseu9Zdo",
  authDomain: "my-project-66803-95cb3.firebaseapp.com",
  projectId: "my-project-66803-95cb3",
  storageBucket: "my-project-66803-95cb3.firebasestorage.app",
  messagingSenderId: "167159607898",
  appId: "1:167159607898:web:23ca11366b88868b085e63"
};

// Initialize Firebase immediately
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const provider = new GoogleAuthProvider();

// --- DOM Elements ---
const loginBtn = document.querySelector(".login-btn");
const logoutBtn = document.querySelector(".logout-btn");
const payBtn = document.querySelector(".pay-btn");

// --- Auth Logic ---

// Listen for authentication state changes (Triggers instantly on load)
onAuthStateChanged(auth, (user) => {
  if (user) {
    // User is signed in.
    loginBtn.style.display = "none";
    payBtn.style.display = "block";
    logoutBtn.style.display = "block";
  } else {
    // User is signed out.
    loginBtn.style.display = "block";
    payBtn.style.display = "none";
    logoutBtn.style.display = "none";
  }
});

// Login Button Click
loginBtn.onclick = async () => {
  try {
    await signInWithPopup(auth, provider);
  } catch (e) {
    console.error("Login Error:", e);
    alert("Login failed. Please try again.");
  }
};

// Logout Button Click
logoutBtn.onclick = async () => {
  try {
    await signOut(auth);
  } catch (e) {
    console.error("Logout Error:", e);
  }
};

// Pay Button Click (Placeholder)
payBtn.onclick = () => {
  alert("Payment logic goes here");
};
// New elements
const payPage = document.getElementById("payPage");
const backBtn = document.querySelector(".back-btn");

// PAY click → hide main UI, show pay page
payBtn.onclick = () => {
  document.body.style.background = "#fff";
  payPage.style.display = "flex";
  payBtn.style.display = "none";
  logoutBtn.style.display = "none";
};

// BACK → return to main
backBtn.onclick = () => {
  payPage.style.display = "none";
  payBtn.style.display = "block";
  logoutBtn.style.display = "block";
};
</script>
</body>
</html>
