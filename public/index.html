<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jamal Said Kazembe Multisystem Management</title>
<style>
  body{
    margin:0;
    font-family:Arial, sans-serif;
    background:#f4f4f4;
    display:flex;
    flex-direction:column;
    justify-content:flex-start;
    align-items:center;
    min-height:100vh;
    text-align:center;
    padding-top:50px;
  }
  h1{ font-size:32px; color:blue; margin:0; }
  h2{ color:red; margin-top:5px; font-size:18px; }

  /* --- Main Menu Buttons --- */
  .login-btn, .logout-btn, .pay-btn {
    position: fixed;
    left: 50%;
    transform: translateX(-50%);
    border:none;
    cursor:pointer;
    display: none; /* Hidden by default, controlled by JS */
  }
  .login-btn{
    bottom: 30px;
    padding:15px 40px;
    font-size:20px;
    background:#28a745;
    color:white;
    border-radius:6px;
  }
  .pay-btn{
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    padding:18px 50px;
    font-size:22px;
    background-color: #28a745;
    color:white;
    border-radius:8px;
  }
  .logout-btn{
    bottom: 30px;
    background:#dc3545;
    color:white;
    padding:10px 25px;
    border-radius:6px;
    font-size:16px;
  }

  /* --- Page 1: Payment Info --- */
  #payPage{
    position: fixed;
    top:0; left:0;
    width:100%; height:100%;
    background:#ffffff;
    display:none;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
    z-index: 10;
  }
  .pay-info p{ margin:10px; font-size:18px; }
  .mix{ color:green; }
  .airtel{ color:red; }
  .crdb{ color:blue; }
  .name{ color:black; font-weight:bold; }

  .pay-actions{
    position: fixed;
    bottom: 30px;
    display:flex;
    gap:20px;
  }
  .back-btn{
    padding:12px 25px;
    background:gray;
    color:white;
    border:none;
    border-radius:6px;
    cursor: pointer;
  }
  .next-btn{
    padding:12px 25px;
    background:green;
    color:white;
    border:none;
    border-radius:6px;
    cursor: pointer;
  }

  /* --- Page 2: Camera/Photos Menu --- */
  #cameraMenuPage {
    position: fixed;
    top:0; left:0;
    width:100%; height:100%;
    background: #ffffff;
    display: none;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    gap: 20px;
    z-index: 20;
  }
  #openCameraBtn {
    padding: 15px 40px; font-size: 20px;
    background: #007bff; color: white;
    border: none; border-radius: 6px; cursor: pointer;
  }
  #openPhotosBtn {
    padding: 15px 40px; font-size: 20px;
    background: #17a2b8; color: white;
    border: none; border-radius: 6px; cursor: pointer;
  }
  #backFromCameraBtn {
    padding: 15px 40px; font-size: 20px;
    background: #dc3545; color: white;
    border: none; border-radius: 6px; cursor: pointer;
  }

  /* --- Page 3: Preview & Submit --- */
  #previewPage {
    position: fixed;
    top:0; left:0;
    width:100%; height:100%;
    background: white;
    display: none;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    z-index: 30;
  }
  #previewImage {
    max-width: 90%;
    max-height: 60%;
    border-radius: 10px;
    margin-bottom: 20px;
    box-shadow: 0 4px 8px rgba(0,0,0,0.2);
  }
  .preview-actions {
    display: flex;
    gap: 20px;
  }
  #submitBtn {
    padding: 12px 25px;
    background: green;
    color: white;
    border: none;
    border-radius: 6px;
    font-size: 18px;
    cursor: pointer;
  }
  #cancelBtn {
    padding: 12px 25px;
    background: red;
    color: white;
    border: none;
    border-radius: 6px;
    font-size: 18px;
    cursor: pointer;
  }
</style>
</head>
<body>

<!-- Main Screen Headers -->
<h1>JAMAL SAID KAZEMBE</h1>
<h2>MULTISYSTEM MANAGEMENT</h2>
  
<!-- Main Screen Buttons -->
<button class="login-btn">LOGIN</button>
<button class="pay-btn">PAY</button>
<button class="logout-btn">LOGOUT</button>

<!-- Hidden File Inputs -->
<input type="file" id="cameraInput" accept="image/*" capture="environment" style="display:none;">
<input type="file" id="photosInput" accept="image/*" style="display:none;">

<!-- Page 1: Payment Info -->
<div id="payPage">
  <div class="pay-info">
    <p>Pay through:</p>
    <p class="mix">Mix by Yas:</p>
    <p class="mix">+255 655 510 714</p>
    <p class="airtel">Airtel Money:</p>
    <p class="airtel">+255 780 526 437</p>
    <p class="crdb">CRDB:</p>
    <p class="crdb">0152001GN6K00</p>
    <p class="name">JAMALI SAIDI KAZEMBE</p>
  </div>
  <div class="pay-actions">
    <button class="back-btn">BACK</button>
    <button class="next-btn">NEXT</button>
  </div>
</div>

<!-- Page 2: Camera/Photos Options -->
<div id="cameraMenuPage">
  <button id="openCameraBtn">CAMERA</button>
  <button id="openPhotosBtn">PHOTOS</button>
  <button id="backFromCameraBtn">BACK</button>
</div>

<!-- Page 3: Preview Page -->
<div id="previewPage">
  <img id="previewImage" src="" alt="Payment Preview">
  <div class="preview-actions">
    <button id="submitBtn">SUBMIT</button>
    <button id="cancelBtn">CANCEL</button>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

// --- Firebase Config ---
const firebaseConfig = {
  apiKey: "AIzaSyDpNJIZoLeZUhIoTepbLb_3rRLpseu9Zdo",
  authDomain: "my-project-66803-95cb3.firebaseapp.com",
  projectId: "my-project-66803-95cb3",
  storageBucket: "my-project-66803-95cb3.firebasestorage.app",
  messagingSenderId: "167159607898",
  appId: "1:167159607898:web:23ca11366b88868b085e63"
};

// Initialize Firebase
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const provider = new GoogleAuthProvider();

// --- DOM Elements ---
const loginBtn = document.querySelector(".login-btn");
const logoutBtn = document.querySelector(".logout-btn");
const payBtn = document.querySelector(".pay-btn");

const payPage = document.getElementById("payPage");
const backBtn = document.querySelector(".back-btn");
const nextBtn = document.querySelector(".next-btn");

const cameraMenuPage = document.getElementById("cameraMenuPage");
const openCameraBtn = document.getElementById("openCameraBtn");
const openPhotosBtn = document.getElementById("openPhotosBtn");
const backFromCameraBtn = document.getElementById("backFromCameraBtn");

const cameraInput = document.getElementById("cameraInput");
const photosInput = document.getElementById("photosInput");

const previewPage = document.getElementById("previewPage");
const previewImage = document.getElementById("previewImage");
const submitBtn = document.getElementById("submitBtn");
const cancelBtn = document.getElementById("cancelBtn");

let selectedFile = null;

// --- Auth Logic ---
onAuthStateChanged(auth, (user) => {
  if (user) {
    loginBtn.style.display = "none";
    payBtn.style.display = "block";
    logoutBtn.style.display = "block";
  } else {
    loginBtn.style.display = "block";
    payBtn.style.display = "none";
    logoutBtn.style.display = "none";
  }
});

loginBtn.onclick = async () => {
  try { await signInWithPopup(auth, provider); } 
  catch (e) { console.error("Login Error", e); alert("Login failed."); }
};

logoutBtn.onclick = async () => {
  try { await signOut(auth); } 
  catch (e) { console.error("Logout Error", e); }
};

// --- Navigation Logic ---

// 1. Main Menu -> Pay Page
payBtn.onclick = () => {
  payPage.style.display = "flex";
  payBtn.style.display = "none";
  logoutBtn.style.display = "none";
};

// 2. Pay Page -> Main Menu
backBtn.onclick = () => {
  payPage.style.display = "none";
  payBtn.style.display = "block";
  logoutBtn.style.display = "block";
};

// 3. Pay Page -> Camera Menu
nextBtn.onclick = () => {
  payPage.style.display = "none";
  cameraMenuPage.style.display = "flex";
};

// 4. Camera Menu -> Pay Page
backFromCameraBtn.onclick = () => {
  cameraMenuPage.style.display = "none";
  payPage.style.display = "flex";
};

// --- Camera & Photos Logic ---

openCameraBtn.onclick = () => {
  cameraInput.click();
};

openPhotosBtn.onclick = () => {
  photosInput.click();
};

// Handle file selection (from Camera or Photos)
function handleFile(file) {
  if (!file) return;
  selectedFile = file;

  const reader = new FileReader();
  reader.onload = function(e) {
    previewImage.src = e.target.result;
    
    // Hide other pages
    cameraMenuPage.style.display = "none";
    payPage.style.display = "none";
    
    // Show Preview
    previewPage.style.display = "flex";
  };
  reader.readAsDataURL(file);
}

cameraInput.onchange = (e) => handleFile(e.target.files[0]);
photosInput.onchange = (e) => handleFile(e.target.files[0]);

// --- Preview Actions ---
submitBtn.onclick = () => {
  // show loading
  previewPage.innerHTML = "<h2>Please wait...</h2>";

  // simulate processing (you can replace later with Firebase upload)
  setTimeout(() => {
    previewPage.style.display = "none";

    // restore preview content
    previewPage.innerHTML = `
      <img id="previewImage" src="" />
      <div class="preview-actions">
        <button id="submitBtn">SUBMIT</button>
        <button id="cancelBtn">CANCEL</button>
      </div>
    `;

    // go back to main
    payBtn.style.display = "block";
    logoutBtn.style.display = "block";
  }, 2000);
};
cancelBtn.onclick = () => {
  previewPage.style.display = "none";
  cameraMenuPage.style.display = "flex";
  selectedFile = null;
};

</script>
</body>
</html>
