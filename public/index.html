<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jamal Said Kazembe Multisystem Management</title>

<!-- OCR + QR Libraries -->
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>

<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="userDisplay"></div>
<h1>JAMAL SAID KAZEMBE</h1>
<h2>MULTISYSTEM MANAGEMENT</h2>

<!-- Buttons -->
<button class="login-btn">LOGIN</button>
<button class="pay-btn">PAY</button>
<button class="access-btn">ACCESS</button>
<button class="logout-btn">LOGOUT</button>

<!-- File Inputs -->
<input type="file" id="cameraInput" accept="image/*" capture="environment" style="display:none;">
<input type="file" id="photosInput" accept="image/*" style="display:none;">

<!-- Pages -->
<div id="payPage"></div>
<div id="cameraMenuPage"></div>
<div id="previewPage"></div>
<div id="timerPage"></div>
<div id="businessPage"></div>
<div id="viewPage"></div>
<div id="transactionPage"></div>
<div id="loadingOverlay"></div>

<!-- Global Back Button -->
<button id="globalBackBtn">BACK</button>

<!-- JS Modules -->
<script type="module" src="firebase.js"></script>
<script type="module" src="login.js"></script>
<script type="module" src="imageUpload.js"></script>
<script type="module" src="payment.js"></script>
</body>
</html>
