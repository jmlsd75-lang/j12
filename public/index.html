<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JAMAL SAID KAZEMBE MULTISYSTEM MANAGEMENT</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(180deg, #0b1a0b 0%, #1a3a1a 40%, #2d5a27 70%, #1a3a1a 100%);
            font-family: Georgia, 'Times New Roman', serif;
        }

        .title {
            position: fixed;
            top: 40px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            color: #c8e6c0;
            text-shadow: 0 0 20px rgba(76, 175, 80, 0.4);
            z-index: 10;
        }

        .title .line1 {
            font-size: 28px;
            font-weight: 700;
            letter-spacing: 4px;
            color: #e8f5e0;
        }

        .title .line2 {
            font-size: 22px;
            font-weight: 400;
            letter-spacing: 6px;
            margin-top: 4px;
            color: #a5d69a;
        }

        #authContainer {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 24px;
        }

        .login-btn {
            padding: 16px 60px;
            font-size: 20px;
            font-family: Georgia, serif;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: #e8f5e0;
            background: linear-gradient(135deg, #2e7d32, #1b5e20);
            border: 2px solid #4caf50;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 20px rgba(76, 175, 80, 0.3);
        }

        .login-btn:hover {
            background: linear-gradient(135deg, #388e3c, #2e7d32);
            box-shadow: 0 6px 30px rgba(76, 175, 80, 0.5);
            transform: translateY(-2px);
        }

        .login-btn:active {
            transform: translateY(0);
            box-shadow: 0 2px 10px rgba(76, 175, 80, 0.3);
        }

        .welcome-card {
            background: rgba(11, 26, 11, 0.85);
            border: 1px solid rgba(76, 175, 80, 0.35);
            border-radius: 10px;
            padding: 36px 48px;
            display: flex;
            align-items: center;
            gap: 20px;
            box-shadow: 0 8px 40px rgba(0, 0, 0, 0.5), 0 0 60px rgba(76, 175, 80, 0.08);
            position: relative;
        }

        .welcome-card::before {
            content: '';
            position: absolute;
            top: -1px;
            left: 20%;
            right: 20%;
            height: 2px;
            background: linear-gradient(90deg, transparent, #4caf50, transparent);
        }

        .avatar {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: linear-gradient(135deg, #2e7d32, #1b5e20);
            border: 2px solid #4caf50;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #e8f5e0;
            font-size: 24px;
            font-weight: 700;
            overflow: hidden;
            flex-shrink: 0;
        }

        .avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .welcome-text {
            text-align: left;
        }

        .welcome-label {
            color: #7cb872;
            font-size: 11px;
            letter-spacing: 2px;
            margin-bottom: 4px;
        }

        .welcome-name {
            color: #e8f5e0;
            font-size: 20px;
            font-weight: 700;
            letter-spacing: 1px;
        }

        .logout-btn {
            padding: 10px 24px;
            font-size: 14px;
            font-family: Georgia, serif;
            letter-spacing: 2px;
            color: #e8f5e0;
            background: transparent;
            border: 1px solid rgba(76, 175, 80, 0.4);
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.3s ease;
            white-space: nowrap;
        }

        .logout-btn:hover {
            border-color: #e57373;
            color: #e57373;
            background: rgba(229, 115, 115, 0.1);
        }

        .system-status {
            display: flex;
            align-items: center;
            gap: 10px;
            color: #7cb872;
            font-size: 13px;
            letter-spacing: 2px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #4caf50;
            box-shadow: 0 0 8px rgba(76, 175, 80, 0.6);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
    </style>
</head>
<body>

    <div class="title">
        <div class="line1">JAMAL SAID KAZEMBE</div>
        <div class="line2">MULTISYSTEM MANAGEMENT</div>
    </div>

    <div id="authContainer">
        <button class="login-btn" onclick="window.location.href='login.html'">Login</button>
    </div>

    <script src="login.js" type="module"></script>
</body>
</html>
