<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Multisystem</title>

<style>
body{
  font-family:Arial;
  text-align:center;
}

#welcomePage,#paymentPage,#capturePage,#previewPage{
  display:none;
  flex-direction:column;
  align-items:center;
  gap:15px;
  margin-top:30px;
}
</style>
</head>

<body>

<h2>MULTISYSTEM</h2>

<button class="login-btn">LOGIN</button>

<div id="welcomePage">
  <button id="payBtn">PAY</button>
</div>

<div id="paymentPage">
  <p>Payment Info</p>
  <button id="backBtn">BACK</button>
  <button id="nextBtn">NEXT</button>
</div>

<!-- CAMERA + FILE PAGE -->
<div id="capturePage">

  <button id="openCamera">CAMERA</button>
  <button id="openFile">SELECT PHOTO</button>

  <video id="video" width="300" autoplay style="display:none;"></video>
  <canvas id="canvas" style="display:none;"></canvas>

  <button id="captureBtn" style="display:none;">CAPTURE</button>
  <button id="okCapture" style="display:none;">OK</button>
  <button id="cancelCapture" style="display:none;">CANCEL</button>

  <button id="backToPayment">BACK</button>

  <input type="file" id="fileInput" accept="image/*" style="display:none">

</div>

<!-- PREVIEW -->
<div id="previewPage">
  <img id="previewImg" width="300">
  <button id="submitBtn">SUBMIT</button>
  <button id="cancelPreview">CANCEL</button>
</div>

<script>
// NAVIGATION
const loginBtn = document.querySelector(".login-btn");
const welcomePage = document.getElementById("welcomePage");
const paymentPage = document.getElementById("paymentPage");
const capturePage = document.getElementById("capturePage");
const previewPage = document.getElementById("previewPage");

const payBtn = document.getElementById("payBtn");
const backBtn = document.getElementById("backBtn");
const nextBtn = document.getElementById("nextBtn");

loginBtn.onclick=()=>{
  loginBtn.style.display="none";
  welcomePage.style.display="flex";
};

payBtn.onclick=()=>{
  welcomePage.style.display="none";
  paymentPage.style.display="flex";
};

backBtn.onclick=()=>{
  paymentPage.style.display="none";
  welcomePage.style.display="flex";
};

nextBtn.onclick=()=>{
  paymentPage.style.display="none";
  capturePage.style.display="flex";
};

const backToPayment = document.getElementById("backToPayment");
backToPayment.onclick=()=>{
  capturePage.style.display="none";
  paymentPage.style.display="flex";
};

// FILE
const openFile = document.getElementById("openFile");
const fileInput = document.getElementById("fileInput");
const okCapture = document.getElementById("okCapture");
const cancelCapture = document.getElementById("cancelCapture");

let imageData="";

openFile.onclick=()=>fileInput.click();

fileInput.onchange=()=>{
  const file=fileInput.files[0];
  const reader=new FileReader();

  reader.onload=e=>{
    imageData=e.target.result;
    okCapture.style.display="block";
    cancelCapture.style.display="block";
  };

  reader.readAsDataURL(file);
};

// CAMERA
const openCamera = document.getElementById("openCamera");
const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const captureBtn = document.getElementById("captureBtn");

let stream=null;

openCamera.onclick=async()=>{
  stream = await navigator.mediaDevices.getUserMedia({ video:true });
  video.srcObject = stream;
  video.style.display="block";
  captureBtn.style.display="block";
};

captureBtn.onclick=()=>{
  canvas.width=video.videoWidth;
  canvas.height=video.videoHeight;
  canvas.getContext("2d").drawImage(video,0,0);

  imageData = canvas.toDataURL("image/png");

  stream.getTracks().forEach(t=>t.stop());
  video.style.display="none";
  captureBtn.style.display="none";

  okCapture.style.display="block";
  cancelCapture.style.display="block";
};

// OK → PREVIEW
const previewImg = document.getElementById("previewImg");

okCapture.onclick=()=>{
  capturePage.style.display="none";
  previewPage.style.display="flex";
  previewImg.src=imageData;
};

// CANCEL
cancelCapture.onclick=()=>{
  imageData="";
  okCapture.style.display="none";
  cancelCapture.style.display="none";
};

// PREVIEW CANCEL
const cancelPreview = document.getElementById("cancelPreview");

cancelPreview.onclick=()=>{
  previewPage.style.display="none";
  capturePage.style.display="flex";
};

// SUBMIT
const submitBtn = document.getElementById("submitBtn");

submitBtn.onclick=()=>{
  alert("Submitted!");
  previewPage.style.display="none";
  welcomePage.style.display="flex";
};
</script>

</body>
</html>
