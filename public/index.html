<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JAMALI SAIDI KAZEMBE MULTISYSTEM MANAGEMENT</title>
    <!-- Using FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            /* Color Palette */
            --primary-color: #0f172a; /* Dark Slate */
            --accent-color: #3b82f6;  /* Bright Blue */
            --whatsapp-color: #25D366;
            --bg-color: #f1f5f9;
            --card-bg: #ffffff;
            --text-main: #334155;
            --text-muted: #64748b;
            --border-color: #e2e8f0;
            --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
            --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
            --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1), 0 4px 6px -4px rgb(0 0 0 / 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* --- Header Section --- */
        header {
            background-color: var(--card-bg);
            border-bottom: 1px solid var(--border-color);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: var(--shadow-sm);
            flex-wrap: wrap;
            gap: 1rem;
        }

        .header-title {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--primary-color);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            /* Truncate long text on very small screens */
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 100%;
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        /* Buttons & Links in Header */
        .btn-instruction {
            padding: 0.5rem 1rem;
            background-color: transparent;
            border: 1px solid var(--accent-color);
            color: var(--accent-color);
            border-radius: 6px;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
            transition: all 0.2s ease;
        }

        .btn-instruction:hover {
            background-color: var(--accent-color);
            color: white;
        }

        .whatsapp-link {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--whatsapp-color);
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
            padding: 0.5rem;
            border-radius: 6px;
            transition: background-color 0.2s ease;
        }

        .whatsapp-link:hover {
            background-color: rgba(37, 211, 102, 0.1);
        }

        .whatsapp-icon {
            font-size: 1.2rem;
        }

        /* --- Main Content (Login Area) --- */
        main {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem;
        }

        .login-card {
            background-color: var(--card-bg);
            padding: 3rem 2.5rem;
            border-radius: 12px;
            box-shadow: var(--shadow-lg);
            max-width: 450px;
            width: 100%;
            text-align: center;
            border: 1px solid var(--border-color);
        }

        .login-message {
            color: var(--text-muted);
            font-size: 1rem;
            margin-bottom: 2rem;
        }

        /* Google Button Styling */
        .google-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background-color: #ffffff;
            color: #3c4043;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            padding: 0.75rem 1.5rem;
            font-family: 'Roboto', sans-serif;
            font-size: 0.95rem;
            font-weight: 500;
            cursor: pointer;
            width: 100%;
            transition: background-color 0.2s, box-shadow 0.2s;
            position: relative;
        }

        .google-btn:hover {
            background-color: #f8faff;
            box-shadow: var(--shadow-md);
            border-color: #dadce0;
        }

        .google-btn:active {
            background-color: #f1f3f4;
        }

        .google-icon {
            width: 18px;
            height: 18px;
            margin-right: 12px;
        }

        /* --- Footer --- */
        footer {
            text-align: center;
            padding: 1.5rem;
            color: var(--text-muted);
            font-size: 0.85rem;
            border-top: 1px solid var(--border-color);
            background-color: var(--card-bg);
        }

        /* --- Toast Notification (Custom Alert) --- */
        #toast-container {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
        }

        .toast {
            background-color: #333;
            color: #fff;
            padding: 12px 24px;
            border-radius: 8px;
            margin-top: 10px;
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 0.3s ease, transform 0.3s ease;
            box-shadow: var(--shadow-lg);
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .toast.show {
            opacity: 1;
            transform: translateY(0);
        }

        /* --- Responsive Design --- */
        @media (max-width: 768px) {
            header {
                flex-direction: column;
                align-items: flex-start;
            }
            
            .header-actions {
                width: 100%;
                justify-content: space-between;
                margin-top: 0.5rem;
            }

            .header-title {
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>

    <!-- Header Section -->
    <header>
        <div class="header-title">
            JAMALI SAIDI KAZEMBE MULTISYSTEM MANAGEMENT
        </div>
        
        <nav class="header-actions">
            <!-- Instruction Button -->
            <a href="instruction.html" class="btn-instruction">
                Instruction
            </a>

            <!-- WhatsApp Link -->
            <a href="whatsapp.html" class="whatsapp-link">
                <i class="fab fa-whatsapp whatsapp-icon"></i>
                <span>Contact us for more help</span>
            </a>
        </nav>
    </header>

    <!-- Main Content -->
    <main>
        <section class="login-card">
            <p class="login-message">
                Please log in to start using the system and to save and secure your information.
            </p>

            <!-- Google Login Button -->
            <button id="googleLoginBtn" class="google-btn" type="button">
                <img class="google-icon" src="https://upload.wikimedia.org/wikipedia/commons/5/53/Google_%22G%22_Logo.svg" alt="Google Logo">
                Sign in with Google
            </button>
        </section>
    </main>

    <!-- Footer -->
    <footer>
        &copy; 2023 Jamali Saidi Kazembe Multisystem Management. All rights reserved.
    </footer>

    <!-- Toast Container for Notifications -->
    <div id="toast-container"></div>

    <!-- Script Logic -->
    <script>
        /**
         * This script handles the interaction for the page.
         * In a real production environment, the logic for 'login.js' 
         * would be imported or included here.
         */

        document.addEventListener('DOMContentLoaded', () => {
            
            // 1. Select the Google Login Button
            const googleLoginBtn = document.getElementById('googleLoginBtn');

            // 2. Add Click Event Listener
            googleLoginBtn.addEventListener('click', (e) => {
                e.preventDefault();

                // Simulate the functionality that would be in 'login.js'
                handleGoogleLogin();
            });

            /**
             * Simulates the login process found in login.js
             */
            function handleGoogleLogin() {
                // UI Feedback: Show loading state or change cursor
                const originalText = googleLoginBtn.innerHTML;
                googleLoginBtn.style.opacity = "0.7";
                googleLoginBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Connecting...';

                // Simulate network delay
                setTimeout(() => {
                    // Restore button
                    googleLoginBtn.innerHTML = originalText;
                    googleLoginBtn.style.opacity = "1";

                    // Show success message (using custom Toast instead of alert)
                    showToast("Initiating Google Login...", "info");
                    
                    // In a real app, this is where window.location.href would change 
                    // or the OAuth popup would open.
                    console.log("Login function triggered successfully.");
                }, 800);
            }

            /**
             * Helper function to display non-intrusive toast notifications
             */
            function showToast(message, type = 'info') {
                const container = document.getElementById('toast-container');
                const toast = document.createElement('div');
                toast.className = 'toast';
                
                // Add icon based on type
                let icon = '<i class="fas fa-info-circle"></i>';
                if(type === 'success') icon = '<i class="fas fa-check-circle" style="color: #4ade80"></i>';
                
                toast.innerHTML = `${icon} <span>${message}</span>`;
                
                container.appendChild(toast);

                // Trigger animation
                requestAnimationFrame(() => {
                    toast.classList.add('show');
                });

                // Remove after 3 seconds
                setTimeout(() => {
                    toast.classList.remove('show');
                    setTimeout(() => {
                        container.removeChild(toast);
                    }, 300); // Wait for transition out
                }, 3000);
            }
        });
    </script>
</body>
</html>
