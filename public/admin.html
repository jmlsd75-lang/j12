<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel</title>

<!-- Firebase SDKs -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>

<style>
  /* ── Reset & Base ── */
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --water-deep: #0a3d2e;
    --water-mid: #0e6655;
    --water-light: #148f77;
    --water-surface: #1abc9c;
    --water-highlight: #76d7c4;
    --fish-body: #f39c12;
    --fish-belly: #f7dc6f;
    --fish-accent: #e74c3c;
    --sky-top: #0b1a2e;
    --sky-mid: #163a5f;
    --sky-bottom: #1f6f8b;
    --bank-dark: #2c1810;
    --bank-mid: #4a2f1a;
    --bank-light: #6b4226;
    --reed-color: #2d5016;
  }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  }

  /* ── Full Scene Container ── */
  .scene {
    position: relative;
    width: 100%; height: 100%;
    background: linear-gradient(
      180deg,
      var(--sky-top) 0%,
      var(--sky-mid) 30%,
      var(--sky-bottom) 50%,
      var(--water-deep) 50.5%,
      var(--water-mid) 65%,
      var(--water-light) 80%,
      var(--water-surface) 95%,
      var(--water-highlight) 100%
    );
    overflow: hidden;
  }

  /* ── Stars ── */
  .stars {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 50%;
    pointer-events: none;
  }
  .star {
    position: absolute;
    width: 2px; height: 2px;
    background: #fff;
    border-radius: 50%;
    animation: twinkle 3s ease-in-out infinite alternate;
  }
  .star:nth-child(odd) { animation-duration: 4s; }
  .star:nth-child(3n) { width: 3px; height: 3px; opacity: 0.7; }
  @keyframes twinkle {
    0% { opacity: 0.2; }
    100% { opacity: 1; }
  }

  /* ── Moon ── */
  .moon {
    position: absolute;
    top: 6%; right: 12%;
    width: 60px; height: 60px;
    background: radial-gradient(circle at 35% 35%, #fef9e7, #f9e79f, #f4d03f);
    border-radius: 50%;
    box-shadow:
      0 0 30px 10px rgba(244, 208, 63, 0.3),
      0 0 80px 30px rgba(244, 208, 63, 0.1);
    pointer-events: none;
  }

  /* ── Moon reflection on water ── */
  .moon-reflection {
    position: absolute;
    top: 52%; right: 10%;
    width: 80px; height: 120px;
    background: linear-gradient(
      180deg,
      rgba(244, 208, 63, 0.25),
      rgba(244, 208, 63, 0.08),
      transparent
    );
    border-radius: 50%;
    filter: blur(8px);
    animation: reflectionShimmer 4s ease-in-out infinite;
    pointer-events: none;
  }
  @keyframes reflectionShimmer {
    0%, 100% { transform: scaleX(1) translateX(0); opacity: 0.7; }
    25% { transform: scaleX(1.3) translateX(5px); opacity: 1; }
    50% { transform: scaleX(0.8) translateX(-3px); opacity: 0.5; }
    75% { transform: scaleX(1.1) translateX(2px); opacity: 0.9; }
  }

  /* ── River Banks ── */
  .bank-top {
    position: absolute;
    top: 46%; left: 0;
    width: 100%; height: 8%;
    background:
      linear-gradient(180deg,
        transparent 0%,
        var(--bank-dark) 30%,
        var(--bank-mid) 60%,
        var(--bank-light) 85%,
        var(--water-deep) 100%
      );
    clip-path: polygon(
      0% 60%, 3% 50%, 8% 55%, 15% 40%, 22% 48%, 30% 35%, 38% 42%,
      45% 30%, 52% 38%, 58% 28%, 65% 35%, 72% 25%, 80% 32%,
      88% 22%, 95% 30%, 100% 25%, 100% 100%, 0% 100%
    );
    z-index: 2;
    pointer-events: none;
  }

  .bank-bottom {
    position: absolute;
    bottom: 0; left: 0;
    width: 100%; height: 8%;
    background: linear-gradient(180deg, var(--water-deep), var(--bank-dark));
    clip-path: polygon(
      0% 0%, 100% 0%, 100% 40%, 95% 55%, 88% 45%, 80% 60%, 72% 50%,
      65% 65%, 58% 52%, 50% 68%, 42% 55%, 35% 70%, 28% 58%,
      20% 72%, 12% 60%, 5% 70%, 0% 55%
    );
    z-index: 2;
    pointer-events: none;
  }

  /* ── Reeds on banks ── */
  .reeds {
    position: absolute;
    z-index: 3;
    pointer-events: none;
  }
  .reeds.top { top: 38%; left: 0; width: 100%; height: 12%; }
  .reeds.bottom { bottom: 2%; left: 0; width: 100%; height: 10%; }

  .reed {
    position: absolute;
    bottom: 0;
    width: 3px;
    background: linear-gradient(to top, var(--reed-color), #4a8c2a);
    border-radius: 2px 2px 0 0;
    transform-origin: bottom center;
    animation: sway 3s ease-in-out infinite alternate;
  }
  .reed::after {
    content: '';
    position: absolute;
    top: -6px; left: -2px;
    width: 7px; height: 10px;
    background: #3d6b1e;
    border-radius: 50% 50% 30% 30%;
  }
  @keyframes sway {
    0% { transform: rotate(-4deg); }
    100% { transform: rotate(4deg); }
  }

  /* ── Water Flow Layers ── */
  .water-layer {
    position: absolute;
    left: -50%;
    width: 200%;
    pointer-events: none;
    z-index: 1;
  }

  .water-layer-1 {
    top: 51%; height: 6%;
    background: repeating-linear-gradient(
      90deg,
      transparent 0px,
      rgba(26, 188, 156, 0.15) 40px,
      transparent 80px,
      rgba(118, 215, 196, 0.1) 120px,
      transparent 160px
    );
    animation: flowRight 6s linear infinite;
  }
  .water-layer-2 {
    top: 58%; height: 8%;
    background: repeating-linear-gradient(
      95deg,
      transparent 0px,
      rgba(14, 102, 85, 0.2) 60px,
      transparent 100px,
      rgba(20, 143, 119, 0.15) 150px,
      transparent 200px
    );
    animation: flowRight 8s linear infinite;
  }
  .water-layer-3 {
    top: 68%; height: 10%;
    background: repeating-linear-gradient(
      88deg,
      transparent 0px,
      rgba(26, 188, 156, 0.12) 80px,
      transparent 140px,
      rgba(118, 215, 196, 0.08) 200px,
      transparent 260px
    );
    animation: flowRight 10s linear infinite;
  }
  .water-layer-4 {
    top: 80%; height: 8%;
    background: repeating-linear-gradient(
      92deg,
      transparent 0px,
      rgba(20, 143, 119, 0.18) 50px,
      transparent 90px,
      rgba(26, 188, 156, 0.1) 130px,
      transparent 180px
    );
    animation: flowRight 7s linear infinite;
  }
  .water-layer-5 {
    top: 90%; height: 6%;
    background: repeating-linear-gradient(
      90deg,
      transparent 0px,
      rgba(118, 215, 196, 0.2) 30px,
      transparent 60px
    );
    animation: flowRight 5s linear infinite;
  }

  @keyframes flowRight {
    0% { transform: translateX(0); }
    100% { transform: translateX(50%); }
  }

  /* ── Water Ripples ── */
  .ripple {
    position: absolute;
    border: 1px solid rgba(118, 215, 196, 0.3);
    border-radius: 50%;
    animation: rippleExpand 4s ease-out infinite;
    pointer-events: none;
    z-index: 1;
  }
  @keyframes rippleExpand {
    0% { width: 0; height: 0; opacity: 0.6; transform: translate(-50%, -50%); }
    100% { width: 100px; height: 40px; opacity: 0; transform: translate(-50%, -50%); }
  }

  /* ── Water Surface Shimmer ── */
  .shimmer {
    position: absolute;
    top: 50%; left: 0;
    width: 100%; height: 50%;
    background:
      radial-gradient(ellipse 60px 4px at 20% 20%, rgba(255,255,255,0.15), transparent),
      radial-gradient(ellipse 80px 3px at 50% 35%, rgba(255,255,255,0.1), transparent),
      radial-gradient(ellipse 50px 3px at 75% 55%, rgba(255,255,255,0.12), transparent),
      radial-gradient(ellipse 70px 4px at 35% 70%, rgba(255,255,255,0.08), transparent),
      radial-gradient(ellipse 90px 3px at 85% 80%, rgba(255,255,255,0.1), transparent);
    animation: shimmerMove 8s ease-in-out infinite alternate;
    pointer-events: none;
    z-index: 1;
  }
  @keyframes shimmerMove {
    0% { transform: translateX(-20px) scaleY(1); opacity: 0.6; }
    50% { transform: translateX(10px) scaleY(1.1); opacity: 1; }
    100% { transform: translateX(-15px) scaleY(0.95); opacity: 0.7; }
  }

  /* ── Fish ── */
  .fish-container {
    position: absolute;
    z-index: 4;
    pointer-events: none;
  }

  .fish {
    position: relative;
    animation: swim var(--swim-duration, 12s) linear infinite;
  }

  .fish-body {
    position: relative;
    width: var(--fish-size, 40px);
    height: calc(var(--fish-size, 40px) * 0.45);
    background: var(--fish-color, var(--fish-body));
    border-radius: 50% 45% 45% 50%;
    box-shadow: inset 0 -3px 6px rgba(0,0,0,0.3), inset 0 2px 4px rgba(255,255,255,0.2);
  }

  /* Fish belly highlight */
  .fish-body::after {
    content: '';
    position: absolute;
    bottom: 2px; left: 15%;
    width: 60%; height: 35%;
    background: var(--fish-belly);
    border-radius: 50%;
    opacity: 0.6;
  }

  /* Fish tail */
  .fish-tail {
    position: absolute;
    left: calc(-1 * var(--fish-size, 40px) * 0.35);
    top: 50%;
    transform: translateY(-50%);
    width: calc(var(--fish-size, 40px) * 0.4);
    height: calc(var(--fish-size, 40px) * 0.5);
    animation: tailWag 0.4s ease-in-out infinite alternate;
  }
  .fish-tail::before,
  .fish-tail::after {
    content: '';
    position: absolute;
    right: 0;
    width: 100%;
    height: 50%;
    background: var(--fish-color, var(--fish-body));
    box-shadow: inset 0 -2px 3px rgba(0,0,0,0.2);
  }
  .fish-tail::before {
    top: 0;
    border-radius: 60% 10% 0 0;
    transform-origin: right bottom;
    transform: rotate(-15deg);
  }
  .fish-tail::after {
    bottom: 0;
    border-radius: 0 10% 60% 0;
    transform-origin: right top;
    transform: rotate(15deg);
  }
  @keyframes tailWag {
    0% { transform: translateY(-50%) rotate(-10deg); }
    100% { transform: translateY(-50%) rotate(10deg); }
  }

  /* Fish eye */
  .fish-eye {
    position: absolute;
    right: calc(var(--fish-size, 40px) * 0.12);
    top: 20%;
    width: calc(var(--fish-size, 40px) * 0.14);
    height: calc(var(--fish-size, 40px) * 0.14);
    background: #fff;
    border-radius: 50%;
    box-shadow: 0 0 2px rgba(0,0,0,0.3);
  }
  .fish-eye::after {
    content: '';
    position: absolute;
    top: 25%; left: 30%;
    width: 55%; height: 55%;
    background: #1a1a2e;
    border-radius: 50%;
  }

  /* Fish dorsal fin */
  .fish-fin {
    position: absolute;
    top: calc(-1 * var(--fish-size, 40px) * 0.15);
    left: 30%;
    width: calc(var(--fish-size, 40px) * 0.25);
    height: calc(var(--fish-size, 40px) * 0.2);
    background: var(--fish-color, var(--fish-body));
    border-radius: 60% 40% 0 0;
    opacity: 0.8;
    animation: finWave 1s ease-in-out infinite alternate;
  }
  @keyframes finWave {
    0% { transform: rotate(-5deg); }
    100% { transform: rotate(5deg); }
  }

  /* Fish swim paths — right to left (facing left) */
  @keyframes swim {
    0% { transform: translate(calc(100vw + 100px), 0) scaleX(-1); }
    100% { transform: translate(calc(-100vw - 100px), 0) scaleX(-1); }
  }

  /* Some fish swim the other direction */
  .fish.reverse {
    animation-name: swimReverse;
  }
  @keyframes swimReverse {
    0% { transform: translate(calc(-100vw - 100px), 0) scaleX(1); }
    100% { transform: translate(calc(100vw + 100px), 0) scaleX(1); }
  }

  /* Fish vertical bob */
  .fish-bob {
    animation: bob 2s ease-in-out infinite alternate;
  }
  @keyframes bob {
    0% { transform: translateY(-5px); }
    100% { transform: translateY(5px); }
  }

  /* ── Bubbles ── */
  .bubble {
    position: absolute;
    border-radius: 50%;
    background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.4), rgba(255,255,255,0.05));
    border: 1px solid rgba(255,255,255,0.15);
    animation: bubbleRise var(--bubble-duration, 6s) ease-in infinite;
    pointer-events: none;
    z-index: 3;
  }
  @keyframes bubbleRise {
    0% { transform: translateY(0) translateX(0) scale(1); opacity: 0.6; }
    25% { transform: translateY(-25vh) translateX(10px) scale(1.05); opacity: 0.5; }
    50% { transform: translateY(-50vh) translateX(-8px) scale(0.95); opacity: 0.4; }
    75% { transform: translateY(-75vh) translateX(5px) scale(0.9); opacity: 0.2; }
    100% { transform: translateY(-100vh) translateX(0) scale(0.8); opacity: 0; }
  }

  /* ── Fireflies ── */
  .firefly {
    position: absolute;
    width: 4px; height: 4px;
    background: #f9e79f;
    border-radius: 50%;
    box-shadow: 0 0 6px 2px rgba(249, 231, 159, 0.5);
    animation: fireflyFloat var(--ff-duration, 8s) ease-in-out infinite;
    pointer-events: none;
    z-index: 5;
  }
  @keyframes fireflyFloat {
    0% { transform: translate(0, 0); opacity: 0; }
    10% { opacity: 1; }
    30% { transform: translate(30px, -40px); opacity: 0.6; }
    50% { transform: translate(-20px, -80px); opacity: 1; }
    70% { transform: translate(40px, -50px); opacity: 0.4; }
    90% { opacity: 0.8; }
    100% { transform: translate(10px, -100px); opacity: 0; }
  }

  /* ── Logout Button (top-left) ── */
  .logout-btn {
    position: fixed;
    top: 18px; left: 18px;
    z-index: 1000;
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 18px;
    background: rgba(255, 255, 255, 0.95);
    color: #3c4043;
    border: 1px solid #dadce0;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.25s ease;
    backdrop-filter: blur(8px);
    box-shadow: 0 2px 8px rgba(0,0,0,0.15);
  }
  .logout-btn:hover {
    background: #f8f9fa;
    box-shadow: 0 4px 14px rgba(0,0,0,0.2);
    transform: translateY(-1px);
  }
  .logout-btn:active { transform: translateY(0); }
  .logout-btn svg { flex-shrink: 0; }
  .logout-btn.signing-out {
    pointer-events: none;
    opacity: 0.7;
  }

  /* ── Hamburger Menu (top-right) ── */
  .hamburger-btn {
    position: fixed;
    top: 18px; right: 18px;
    z-index: 1001;
    width: 46px; height: 46px;
    background: rgba(255, 255, 255, 0.95);
    border: 1px solid #dadce0;
    border-radius: 8px;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 5px;
    transition: all 0.25s ease;
    backdrop-filter: blur(8px);
    box-shadow: 0 2px 8px rgba(0,0,0,0.15);
  }
  .hamburger-btn:hover {
    background: #f8f9fa;
    box-shadow: 0 4px 14px rgba(0,0,0,0.2);
    transform: translateY(-1px);
  }
  .hamburger-btn span {
    display: block;
    width: 20px;
    height: 2.5px;
    background: #3c4043;
    border-radius: 2px;
    transition: all 0.3s ease;
  }
  .hamburger-btn.active span:nth-child(1) {
    transform: rotate(45deg) translate(5px, 5px);
  }
  .hamburger-btn.active span:nth-child(2) { opacity: 0; }
  .hamburger-btn.active span:nth-child(3) {
    transform: rotate(-45deg) translate(5px, -5px);
  }

  /* ── Dropdown Menu ── */
  .dropdown-menu {
    position: fixed;
    top: 72px; right: 18px;
    z-index: 999;
    min-width: 220px;
    background: rgba(255, 255, 255, 0.97);
    border: 1px solid #dadce0;
    border-radius: 12px;
    box-shadow: 0 8px 30px rgba(0,0,0,0.2);
    backdrop-filter: blur(12px);
    overflow: hidden;
    opacity: 0;
    transform: translateY(-10px) scale(0.95);
    pointer-events: none;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .dropdown-menu.open {
    opacity: 1;
    transform: translateY(0) scale(1);
    pointer-events: all;
  }
  .dropdown-menu a {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 20px;
    color: #202124;
    text-decoration: none;
    font-size: 14px;
    font-weight: 500;
    transition: background 0.2s;
  }
  .dropdown-menu a:hover {
    background: #f1f3f4;
  }
  .dropdown-menu a:not(:last-child) {
    border-bottom: 1px solid #e8eaed;
  }
  .dropdown-menu .menu-icon {
    width: 20px; height: 20px;
    flex-shrink: 0;
    opacity: 0.6;
  }
  .dropdown-menu .menu-label { flex: 1; }
  .dropdown-menu .menu-arrow {
    opacity: 0.3;
    transition: opacity 0.2s;
  }
  .dropdown-menu a:hover .menu-arrow { opacity: 0.7; }

  /* ── Center Menu Button ── */
  .center-menu-btn {
    position: fixed;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    z-index: 100;
    padding: 18px 48px;
    background: linear-gradient(135deg, rgba(26, 188, 156, 0.9), rgba(20, 143, 119, 0.9));
    color: #fff;
    border: 2px solid rgba(118, 215, 196, 0.5);
    border-radius: 16px;
    font-size: 20px;
    font-weight: 700;
    letter-spacing: 1.5px;
    cursor: pointer;
    text-decoration: none;
    text-transform: uppercase;
    transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
    box-shadow:
      0 8px 32px rgba(26, 188, 156, 0.35),
      0 0 60px rgba(26, 188, 156, 0.1),
      inset 0 1px 0 rgba(255,255,255,0.2);
    backdrop-filter: blur(10px);
    animation: btnPulse 3s ease-in-out infinite;
  }
  .center-menu-btn:hover {
    transform: translate(-50%, -50%) scale(1.08);
    box-shadow:
      0 12px 40px rgba(26, 188, 156, 0.5),
      0 0 80px rgba(26, 188, 156, 0.2),
      inset 0 1px 0 rgba(255,255,255,0.3);
    background: linear-gradient(135deg, rgba(20, 143, 119, 0.95), rgba(14, 102, 85, 0.95));
  }
  .center-menu-btn:active {
    transform: translate(-50%, -50%) scale(1.02);
  }
  @keyframes btnPulse {
    0%, 100% { box-shadow: 0 8px 32px rgba(26, 188, 156, 0.35), 0 0 60px rgba(26, 188, 156, 0.1); }
    50% { box-shadow: 0 8px 40px rgba(26, 188, 156, 0.5), 0 0 90px rgba(26, 188, 156, 0.2); }
  }

  /* ── Overlay for dropdown ── */
  .menu-overlay {
    position: fixed;
    inset: 0;
    z-index: 998;
    background: transparent;
    display: none;
  }
  .menu-overlay.visible { display: block; }

  /* ── Toast Notification ── */
  .toast {
    position: fixed;
    bottom: 30px; left: 50%;
    transform: translateX(-50%) translateY(80px);
    z-index: 2000;
    padding: 12px 24px;
    background: rgba(30, 30, 30, 0.92);
    color: #fff;
    border-radius: 10px;
    font-size: 14px;
    backdrop-filter: blur(8px);
    box-shadow: 0 6px 20px rgba(0,0,0,0.3);
    transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.4s;
    opacity: 0;
    pointer-events: none;
  }
  .toast.show {
    transform: translateX(-50%) translateY(0);
    opacity: 1;
  }

  /* ── Reduced motion ── */
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: 0.01ms !important;
      animation-iteration-count: 1 !important;
      transition-duration: 0.01ms !important;
    }
  }
</style>
</head>
<body>

<div class="scene" id="scene">

  <!-- Stars -->
  <div class="stars" id="stars"></div>

  <!-- Moon -->
  <div class="moon"></div>
  <div class="moon-reflection"></div>

  <!-- Banks -->
  <div class="bank-top"></div>
  <div class="bank-bottom"></div>

  <!-- Reeds top -->
  <div class="reeds top" id="reedsTop"></div>
  <!-- Reeds bottom -->
  <div class="reeds bottom" id="reedsBottom"></div>

  <!-- Water flow layers -->
  <div class="water-layer water-layer-1"></div>
  <div class="water-layer water-layer-2"></div>
  <div class="water-layer water-layer-3"></div>
  <div class="water-layer water-layer-4"></div>
  <div class="water-layer water-layer-5"></div>

  <!-- Shimmer -->
  <div class="shimmer"></div>

  <!-- Ripples -->
  <div class="ripple" style="top:55%; left:15%; animation-delay:0s;"></div>
  <div class="ripple" style="top:65%; left:45%; animation-delay:1.2s;"></div>
  <div class="ripple" style="top:75%; left:70%; animation-delay:2.5s;"></div>
  <div class="ripple" style="top:60%; left:85%; animation-delay:0.8s;"></div>
  <div class="ripple" style="top:85%; left:30%; animation-delay:3s;"></div>
  <div class="ripple" style="top:58%; left:60%; animation-delay:1.8s;"></div>

  <!-- Bubbles -->
  <div id="bubbles"></div>

  <!-- Fireflies -->
  <div id="fireflies"></div>

  <!-- Fish -->
  <div id="fishContainer"></div>

</div>

<!-- Logout Button (top-left) -->
<button class="logout-btn" id="logoutBtn" onclick="handleLogout()" aria-label="Sign out of Google">
  <svg viewBox="0 0 24 24" width="18" height="18" xmlns="http://www.w3.org/2000/svg">
    <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/>
    <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
    <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
    <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
  </svg>
  <span id="logoutText">Sign out</span>
</button>

<!-- Hamburger Menu (top-right) -->
<button class="hamburger-btn" id="hamburgerBtn" onclick="toggleMenu()" aria-label="Open navigation menu" aria-expanded="false">
  <span></span>
  <span></span>
  <span></span>
</button>

<!-- Dropdown overlay -->
<div class="menu-overlay" id="menuOverlay" onclick="toggleMenu()"></div>

<!-- Dropdown Menu -->
<nav class="dropdown-menu" id="dropdownMenu" role="menu">
  <a href="users.html" role="menuitem">
    <svg class="menu-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
      <circle cx="9" cy="7" r="4"/>
      <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
      <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
    </svg>
    <span class="menu-label">Users</span>
    <svg class="menu-arrow" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="9 18 15 12 9 6"/>
    </svg>
  </a>
  <a href="dangerous.html" role="menuitem">
    <svg class="menu-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/>
      <line x1="12" y1="9" x2="12" y2="13"/>
      <line x1="12" y1="17" x2="12.01" y2="17"/>
    </svg>
    <span class="menu-label">Dangerous Accounts</span>
    <svg class="menu-arrow" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">

<!-- Center Menu Button -->
<a href="menu.html" class="center-menu-btn" aria-label="Open main menu">Menu</a>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
  // ── Firebase Initialization (compat mode) ──
  const firebaseConfig = {
    apiKey: "AIzaSyDpNJIZoLeZUhIoTepbLb_3rRLpseu9Zdo",
    authDomain: "my-project-66803-95cb3.firebaseapp.com",
    projectId: "my-project-66803-95cb3",
    storageBucket: "my-project-66803-95cb3.firebasestorage.app",
    messagingSenderId: "167159607898",
    appId: "1:167159607898:web:23ca11366b88868b085e63"
  };

  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();
  auth.setPersistence(firebase.auth.Auth.Persistence.LOCAL);

  // ── Real Google Sign-Out ──
  async function handleLogout() {
    const btn = document.getElementById('logoutBtn');
    const text = document.getElementById('logoutText');
    btn.classList.add('signing-out');
    text.textContent = 'Signing out...';

    try {
      await auth.signOut();
      localStorage.removeItem('userSession');
      showToast('Signed out successfully');
      setTimeout(() => {
        window.location.href = 'index.html';
      }, 800);
    } catch (error) {
      console.error('Logout error:', error);
      text.textContent = 'Sign out';
      btn.classList.remove('signing-out');
      showToast('Sign-out failed. Please try again.');
    }
  }

  // ── Hamburger Menu Toggle ──
  let menuOpen = false;
  function toggleMenu() {
    menuOpen = !menuOpen;
    const btn = document.getElementById('hamburgerBtn');
    const menu = document.getElementById('dropdownMenu');
    const overlay = document.getElementById('menuOverlay');

    btn.classList.toggle('active', menuOpen);
    btn.setAttribute('aria-expanded', menuOpen);
    menu.classList.toggle('open', menuOpen);
    overlay.classList.toggle('visible', menuOpen);
  }

  // Close menu on Escape key
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape' && menuOpen) toggleMenu();
  });

  // ── Toast Notification ──
  function showToast(message) {
    const toast = document.getElementById('toast');
    toast.textContent = message;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 3000);
  }

  // ── Generate Stars ──
  (function generateStars() {
    const container = document.getElementById('stars');
    const count = 60;
    for (let i = 0; i < count; i++) {
      const star = document.createElement('div');
      star.className = 'star';
      star.style.left = Math.random() * 100 + '%';
      star.style.top = Math.random() * 100 + '%';
      star.style.animationDelay = (Math.random() * 5) + 's';
      star.style.opacity = Math.random() * 0.7 + 0.3;
      container.appendChild(star);
    }
  })();

  // ── Generate Reeds ──
  (function generateReeds() {
    const topContainer = document.getElementById('reedsTop');
    const bottomContainer = document.getElementById('reedsBottom');
    const reedPositions = [3, 8, 14, 22, 30, 38, 45, 52, 60, 68, 75, 83, 90, 96];

    reedPositions.forEach((pos, i) => {
      // Top reeds
      const r1 = document.createElement('div');
      r1.className = 'reed';
      r1.style.left = pos + '%';
      r1.style.height = (25 + Math.random() * 35) + 'px';
      r1.style.animationDelay = (Math.random() * 2) + 's';
      r1.style.animationDuration = (2.5 + Math.random() * 2) + 's';
      topContainer.appendChild(r1);

      // Add a second reed nearby for density
      if (i % 2 === 0) {
        const r1b = document.createElement('div');
        r1b.className = 'reed';
        r1b.style.left = (pos + 1.5) + '%';
        r1b.style.height = (20 + Math.random() * 25) + 'px';
        r1b.style.animationDelay = (Math.random() * 2) + 's';
        r1b.style.animationDuration = (3 + Math.random() * 1.5) + 's';
        topContainer.appendChild(r1b);
      }

      // Bottom reeds (mirrored positions)
      const r2 = document.createElement('div');
      r2.className = 'reed';
      r2.style.left = (100 - pos) + '%';
      r2.style.height = (20 + Math.random() * 28) + 'px';
      r2.style.animationDelay = (Math.random() * 2) + 's';
      r2.style.animationDuration = (2.8 + Math.random() * 1.8) + 's';
      bottomContainer.appendChild(r2);
    });
  })();

  // ── Generate Fish ──
  (function generateFish() {
    const container = document.getElementById('fishContainer');
    const fishData = [
      { top: '54%', size: 38, color: '#f39c12', duration: 14, delay: 0, reverse: false },
      { top: '62%', size: 28, color: '#e74c3c', duration: 10, delay: 3, reverse: true },
      { top: '70%', size: 45, color: '#f39c12', duration: 16, delay: 5, reverse: false },
      { top: '58%', size: 22, color: '#3498db', duration: 9, delay: 1, reverse: true },
      { top: '78%', size: 35, color: '#e67e22', duration: 13, delay: 7, reverse: false },
      { top: '66%', size: 20, color: '#e74c3c', duration: 8, delay: 4, reverse: true },
      { top: '85%', size: 30, color: '#f39c12', duration: 11, delay: 2, reverse: false },
      { top: '74%', size: 26, color: '#1abc9c', duration: 12, delay: 6, reverse: true },
      { top: '56%', size: 18, color: '#e67e22', duration: 7, delay: 8, reverse: false },
      { top: '82%', size: 42, color: '#f39c12', duration: 18, delay: 9, reverse: true },
    ];

    fishData.forEach(f => {
      const wrapper = document.createElement('div');
      wrapper.className = 'fish-container';
      wrapper.style.top = f.top;

      const bob = document.createElement('div');
      bob.className = 'fish-bob';
      bob.style.animationDelay = (Math.random() * 2) + 's';
      bob.style.animationDuration = (1.5 + Math.random() * 1.5) + 's';

      const fish = document.createElement('div');
      fish.className = 'fish' + (f.reverse ? ' reverse' : '');
      fish.style.setProperty('--swim-duration', f.duration + 's');
      fish.style.setProperty('--fish-size', f.size + 'px');
      fish.style.setProperty('--fish-color', f.color);
      fish.style.animationDelay = f.delay + 's';

      fish.innerHTML = `
        <div class="fish-tail"></div>
        <div class="fish-body">
          <div class="fish-fin"></div>
          <div class="fish-eye"></div>
        </div>
      `;

      bob.appendChild(fish);
      wrapper.appendChild(bob);
      container.appendChild(wrapper);
    });
  })();

  // ── Generate Bubbles ──
  (function generateBubbles() {
    const container = document.getElementById('bubbles');
    const count = 15;
    for (let i = 0; i < count; i++) {
      const bubble = document.createElement('div');
      bubble.className = 'bubble';
      const size = 4 + Math.random() * 10;
      bubble.style.width = size + 'px';
      bubble.style.height = size + 'px';
      bubble.style.left = (5 + Math.random() * 90) + '%';
      bubble.style.top = (55 + Math.random() * 40) + '%';
      bubble.style.setProperty('--bubble-duration', (5 + Math.random() * 8) + 's');
      bubble.style.animationDelay = (Math.random() * 10) + 's';
      container.appendChild(bubble);
    }
  })();

  // ── Generate Fireflies ──
  (function generateFireflies() {
    const container = document.getElementById('fireflies');
    const count = 8;
    for (let i = 0; i < count; i++) {
      const ff = document.createElement('div');
      ff.className = 'firefly';
      ff.style.left = (5 + Math.random() * 90) + '%';
      ff.style.top = (5 + Math.random() * 40) + '%';
      ff.style.setProperty('--ff-duration', (6 + Math.random() * 8) + 's');
      ff.style.animationDelay = (Math.random() * 8) + 's';
      container.appendChild(ff);
    }
  })();

  // ── Session check: redirect if not logged in ──
  (function checkSession() {
    const session = localStorage.getItem('userSession');
    if (!session) {
      // No session found, redirect to login
      showToast('Session expired. Redirecting to login...');
      setTimeout(() => {
        window.location.href = 'index.html';
      }, 1500);
    }
  })();
</script>

</body>
</html>
