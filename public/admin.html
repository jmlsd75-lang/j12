<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            min-height: 100vh;
            font-family: 'Inter', sans-serif;
            background: #050505;
            color: #f5f5f4;
            overflow-x: hidden;
            position: relative;
        }

        /* ===== TOP BAR ===== */
        .top-bar {
            position: relative;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 20px 32px;
            background: rgba(15, 15, 15, 0.7);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .admin-badge {
            font-size: 0.75rem;
            font-weight: 700;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: #f97316;
            background: rgba(249, 115, 22, 0.1);
            border: 1px solid rgba(249, 115, 22, 0.2);
            padding: 6px 16px;
            border-radius: 8px;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .user-name {
            font-size: 0.85rem;
            font-weight: 500;
            color: rgb(168, 162, 158);
        }

        .user-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: linear-gradient(135deg, #f97316, #ea580c);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
            font-weight: 700;
            color: #fff;
            overflow: hidden;
            border: 2px solid rgba(249, 115, 22, 0.3);
        }

        .user-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .logout-btn {
            background: none;
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: rgb(168, 162, 158);
            font-family: 'Inter', sans-serif;
            font-size: 0.78rem;
            padding: 6px 14px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            margin-left: 8px;
        }

        .logout-btn:hover {
            border-color: rgba(239, 68, 68, 0.3);
            color: #f87171;
            background: rgba(239, 68, 68, 0.05);
        }

        /* ===== HERO SECTION ===== */
        .hero {
            position: relative;
            text-align: center;
            padding: 60px 24px 0;
            z-index: 2;
        }

        .hero h1 {
            font-size: 2.5rem;
            font-weight: 800;
            letter-spacing: -0.03em;
            line-height: 1.1;
            margin-bottom: 12px;
        }

        .hero h1 span {
            background: linear-gradient(135deg, #f97316, #fb923c);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .hero p {
            font-size: 1rem;
            color: rgb(120, 113, 108);
            font-weight: 400;
        }

        /* ===== MOUNT KILIMANJARO CSS ART ===== */
        .mountain-scene {
            position: relative;
            width: 100%;
            max-width: 900px;
            height: 520px;
            margin: 40px auto 0;
            overflow: hidden;
        }

        /* Sky gradient */
        .sky {
            position: absolute;
            inset: 0;
            background: linear-gradient(
                180deg,
                #0a0a0a 0%,
                #0f0d0a 25%,
                #1a1510 45%,
                #2a1f15 60%,
                #3d2b1a 72%,
                #5c3d1e 82%,
                #8b5e2f 90%,
                #c47a30 95%,
                #e8943a 100%
            );
        }

        /* Stars */
        .stars {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 50%;
        }

        .star {
            position: absolute;
            background: #fff;
            border-radius: 50%;
            animation: twinkle 3s ease-in-out infinite;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.2; }
            50% { opacity: 0.9; }
        }

        /* Moon */
        .moon {
            position: absolute;
            top: 60px;
            right: 120px;
            width: 50px;
            height: 50px;
            background: radial-gradient(circle at 35% 35%, #fef3c7, #fde68a, #fbbf24);
            border-radius: 50%;
            box-shadow: 0 0 40px 10px rgba(251, 191, 36, 0.15), 0 0 80px 30px rgba(251, 191, 36, 0.05);
        }

        /* Main peak - Kibo (Uhuru peak) */
        .kibo {
            position: absolute;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 180px solid transparent;
            border-right: 180px solid transparent;
            border-bottom: 340px solid #1c1917;
            z-index: 5;
        }

        /* Kibo snow cap */
        .kibo-snow {
            position: absolute;
            bottom: 418px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 50px solid transparent;
            border-right: 50px solid transparent;
            border-bottom: 90px solid #e7e5e4;
            z-index: 6;
            filter: blur(0.5px);
        }

        .kibo-snow::after {
            content: '';
            position: absolute;
            top: 50px;
            left: -70px;
            width: 0;
            height: 0;
            border-left: 70px solid transparent;
            border-right: 70px solid transparent;
            border-bottom: 60px solid #d6d3d1;
            filter: blur(1px);
        }

        /* Mawenzi peak (left) */
        .mawenzi {
            position: absolute;
            bottom: 80px;
            left: 12%;
            width: 0;
            height: 0;
            border-left: 130px solid transparent;
            border-right: 140px solid transparent;
            border-bottom: 260px solid #292524;
            z-index: 4;
        }

        .mawenzi-snow {
            position: absolute;
            bottom: 338px;
            left: calc(12% + 30px);
            width: 0;
            height: 0;
            border-left: 30px solid transparent;
            border-right: 35px solid transparent;
            border-bottom: 45px solid #d6d3d1;
            z-index: 5;
            filter: blur(1px);
        }

        /* Shira peak (right) */
        .shira {
            position: absolute;
            bottom: 80px;
            right: 10%;
            width: 0;
            height: 0;
            border-left: 150px solid transparent;
            border-right: 120px solid transparent;
            border-bottom: 220px solid #1c1917;
            z-index: 4;
        }

        .shira-snow {
            position: absolute;
            bottom: 298px;
            right: calc(10% + 20px);
            width: 0;
            height: 0;
            border-left: 35px solid transparent;
            border-right: 25px solid transparent;
            border-bottom: 40px solid #d6d3d1;
            z-index: 5;
            filter: blur(1px);
        }

        /* Ridge connecting peaks */
        .ridge {
            position: absolute;
            bottom: 200px;
            left: 22%;
            width: 56%;
            height: 120px;
            background: #1c1917;
            clip-path: polygon(
                5% 100%,
                15% 60%,
                30% 40%,
                45% 20%,
                55% 0%,
                65% 15%,
                80% 35%,
                95% 55%,
                100% 100%
            );
            z-index: 3;
        }

        /* Foreground hills */
        .hill-left {
            position: absolute;
            bottom: 60px;
            left: -10%;
            width: 60%;
            height: 140px;
            background: #151312;
            border-radius: 50% 60% 0 0;
            z-index: 7;
        }

        .hill-right {
            position: absolute;
            bottom: 60px;
            right: -10%;
            width: 55%;
            height: 120px;
            background: #151312;
            border-radius: 60% 50% 0 0;
            z-index: 7;
        }

        /* Ground / savannah */
        .ground {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 90px;
            background: linear-gradient(180deg, #1a1510 0%, #0f0d0a 100%);
            z-index: 8;
        }

        /* Acacia trees silhouette */
        .tree {
            position: absolute;
            bottom: 75px;
            z-index: 9;
        }

        .tree-trunk {
            width: 3px;
            height: 40px;
            background: #0a0908;
            margin: 0 auto;
        }

        .tree-top {
            width: 50px;
            height: 20px;
            background: #0a0908;
            border-radius: 50%;
            margin: 0 auto -4px;
        }

        .tree-1 { left: 8%; transform: scale(0.8); }
        .tree-2 { left: 18%; transform: scale(1.1); }
        .tree-3 { right: 12%; transform: scale(0.9); }
        .tree-4 { right: 22%; transform: scale(0.7); }
        .tree-5 { left: 35%; transform: scale(0.6); }

        /* Mist / clouds layer */
        .mist {
            position: absolute;
            bottom: 140px;
            left: 0;
            width: 200%;
            height: 60px;
            background: linear-gradient(90deg,
                transparent 0%,
                rgba(168, 162, 158, 0.03) 15%,
                rgba(168, 162, 158, 0.06) 30%,
                rgba(168, 162, 158, 0.03) 50%,
                transparent 65%,
                rgba(168, 162, 158, 0.04) 80%,
                transparent 100%
            );
            animation: drift 25s linear infinite;
            z-index: 6;
        }

        @keyframes drift {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }

        .mist-2 {
            bottom: 180px;
            height: 40px;
            opacity: 0.5;
            animation-duration: 35s;
            animation-direction: reverse;
        }

        /* Altitude line markers */
        .altitude-label {
            position: absolute;
            right: 24px;
            font-size: 0.6rem;
            font-weight: 600;
            letter-spacing: 0.08em;
            color: rgba(249, 115, 22, 0.3);
            z-index: 10;
            writing-mode: horizontal-tb;
        }

        .altitude-label::before {
            content: '';
            position: absolute;
            right: 100%;
            top: 50%;
            width: 16px;
            height: 1px;
            background: rgba(249, 115, 22, 0.15);
            margin-right: 6px;
        }

        .alt-1 { bottom: 400px; }
        .alt-2 { bottom: 310px; }
        .alt-3 { bottom: 220px; }

        /* Uhuru label */
        .uhuru-label {
            position: absolute;
            top: 48px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.65rem;
            font-weight: 700;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: rgba(249, 115, 22, 0.5);
            z-index: 10;
            white-space: nowrap;
        }

        .uhuru-label::after {
            content: '';
            display: block;
            width: 30px;
            height: 1px;
            background: rgba(249, 115, 22, 0.3);
            margin: 4px auto 0;
        }

        /* ===== FOOTER TEXT ===== */
        .footer-text {
            text-align: center;
            padding: 32px 24px;
            position: relative;
            z-index: 2;
        }

        .footer-text p {
            font-size: 0.75rem;
            color: rgb(120, 113, 108);
            letter-spacing: 0.05em;
        }

        .footer-text .height {
            font-size: 1.1rem;
            font-weight: 700;
            color: #f97316;
            display: block;
            margin-top: 4px;
            letter-spacing: 0.02em;
        }

        /* ===== NOT LOGGED IN STATE ===== */
        .not-logged-in {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 100;
            background: rgba(5, 5, 5, 0.95);
            backdrop-filter: blur(12px);
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 16px;
            text-align: center;
            padding: 24px;
        }

        .not-logged-in p {
            color: rgb(168, 162, 158);
            font-size: 0.9rem;
        }

        .not-logged-in a {
            color: #f97316;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
            border-bottom: 1px solid rgba(249, 115, 22, 0.3);
            transition: all 0.3s;
        }

        .not-logged-in a:hover {
            color: #fb923c;
            border-color: #fb923c;
        }

        @media (max-width: 640px) {
            .hero h1 { font-size: 1.8rem; }
            .mountain-scene { height: 400px; }
            .kibo {
                border-left-width: 120px;
                border-right-width: 120px;
                border-bottom-width: 240px;
            }
            .kibo-snow {
                border-left-width: 35px;
                border-right-width: 35px;
                border-bottom-width: 65px;
                bottom: 298px;
            }
            .kibo-snow::after {
                left: -50px;
                border-left-width: 50px;
                border-right-width: 50px;
                border-bottom-width: 42px;
                top: 36px;
            }
            .mawenzi {
                border-left-width: 90px;
                border-right-width: 100px;
                border-bottom-width: 180px;
                left: 5%;
            }
            .mawenzi-snow {
                bottom: 238px;
                left: calc(5% + 20px);
                border-left-width: 20px;
                border-right-width: 25px;
                border-bottom-width: 32px;
            }
            .shira {
                border-left-width: 100px;
                border-right-width: 80px;
                border-bottom-width: 160px;
                right: 2%;
            }
            .shira-snow {
                bottom: 218px;
                right: calc(2% + 15px);
                border-left-width: 25px;
                border-right-width: 18px;
                border-bottom-width: 28px;
            }
            .moon { right: 40px; top: 40px; width: 35px; height: 35px; }
            .top-bar { padding: 16px 20px; }
            .altitude-label { display: none; }
        }
    </style>
</head>
<body>

    <!-- Not logged in overlay -->
    <div class="not-logged-in" id="notLoggedIn">
        <p>Access denied. You must be logged in as admin.</p>
        <a href="index.html">Go to Login</a>
    </div>

    <!-- Top bar -->
    <div class="top-bar" id="topBar" style="display:none;">
        <div class="admin-badge">Admin</div>
        <div class="user-info">
            <span class="user-name" id="userName">Admin</span>
            <div class="user-avatar" id="userAvatar">A</div>
            <button class="logout-btn" id="logoutBtn">Logout</button>
        </div>
    </div>

    <!-- Hero -->
    <div class="hero" id="heroSection" style="display:none;">
        <h1>Welcome, <span id="heroName">Admin</span></h1>
        <p>Amal Said Kazembe Multisystem Management</p>
    </div>

    <!-- Mount Kilimanjaro -->
    <div class="mountain-scene" id="mountainScene" style="display:none;">
        <!-- Sky -->
        <div class="sky"></div>

        <!-- Stars -->
        <div class="stars" id="starsContainer"></div>

        <!-- Moon -->
        <div class="moon"></div>

        <!-- Uhuru peak label -->
        <div class="uhuru-label">Uhuru Peak 5,895m</div>

        <!-- Altitude markers -->
        <div class="altitude-label alt-1">5,895m</div>
        <div class="altitude-label alt-2">4,900m</div>
        <div class="altitude-label alt-3">3,800m</div>

        <!-- Ridge -->
        <div class="ridge"></div>

        <!-- Mawenzi (left peak) -->
        <div class="mawenzi"></div>
        <div class="mawenzi-snow"></div>

        <!-- Shira (right peak) -->
        <div class="shira"></div>
        <div class="shira-snow"></div>

        <!-- Kibo (center main peak) -->
        <div class="kibo"></div>
        <div class="kibo-snow"></div>

        <!-- Mist -->
        <div class="mist"></div>
        <div class="mist mist-2"></div>

        <!-- Foreground hills -->
        <div class="hill-left"></div>
        <div class="hill-right"></div>

        <!-- Ground -->
        <div class="ground"></div>

        <!-- Acacia trees -->
        <div class="tree tree-1"><div class="tree-top"></div><div class="tree-trunk"></div></div>
        <div class="tree tree-2"><div class="tree-top"></div><div class="tree-trunk"></div></div>
        <div class="tree tree-3"><div class="tree-top"></div><div class="tree-trunk"></div></div>
        <div class="tree tree-4"><div class="tree-top"></div><div class="tree-trunk"></div></div>
        <div class="tree tree-5"><div class="tree-top"></div><div class="tree-trunk"></div></div>
    </div>

    <!-- Footer -->
    <div class="footer-text" id="footerSection" style="display:none;">
        <p>Highest peak in Africa</p>
        <span class="height">5,895 meters above sea level</span>
    </div>

    <script>
        // Generate stars
        (function () {
            var container = document.getElementById("starsContainer");
            if (!container) return;
            for (var i = 0; i < 60; i++) {
                var star = document.createElement("div");
                star.className = "star";
                var size = Math.random() * 2 + 0.5;
                star.style.width = size + "px";
                star.style.height = size + "px";
                star.style.left = Math.random() * 100 + "%";
                star.style.top = Math.random() * 100 + "%";
                star.style.animationDelay = (Math.random() * 4) + "s";
                star.style.animationDuration = (Math.random() * 3 + 2) + "s";
                container.appendChild(star);
            }
        })();

        // Session check
        (function () {
            var email = sessionStorage.getItem("userEmail");
            var isAdmin = sessionStorage.getItem("isAdmin") === "true";
            var name = sessionStorage.getItem("userName") || "Admin";
            var photo = sessionStorage.getItem("userPhoto") || "";

            // If not admin, block access
            if (!email || !isAdmin) {
                document.getElementById("notLoggedIn").style.display = "flex";
                return;
            }

            // Show everything
            document.getElementById("topBar").style.display = "flex";
            document.getElementById("heroSection").style.display = "block";
            document.getElementById("mountainScene").style.display = "block";
            document.getElementById("footerSection").style.display = "block";

            // Set name
            document.getElementById("userName").textContent = name;
            document.getElementById("heroName").textContent = name;

            // Set avatar
            var avatar = document.getElementById("userAvatar");
            if (photo) {
                avatar.innerHTML = '<img src="' + photo + '" alt="avatar">';
            } else {
                avatar.textContent = name.charAt(0).toUpperCase();
            }

            // Logout
            document.getElementById("logoutBtn").addEventListener("click", function () {
                sessionStorage.clear();
                window.location.replace("index.html");
            });
        })();
    </script>
</body>
</html>
