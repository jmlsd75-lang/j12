<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard — JAMALI SAID KAZEMBE</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@200;400;700&family=Source+Sans+3:wght@300;400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            forest: { 900:'#040d06', 800:'#091a0e', 700:'#0e2515', 600:'#14331e', 500:'#1a4028', 400:'#256b3a', 300:'#2d8a48', 200:'#4ade80', 100:'#bbf7d0' },
            bark: { 700:'#3d2b1f', 600:'#5c3d2e', 500:'#7a5240', 400:'#9a7260', 300:'#c4a882' },
            moss:'#8fbc6a', leaf:'#6abf4b', cream:'#f5f0e8', fog:'#a3b899',
            gold:'#d4a843', goldLight:'#f0d78c', goldDark:'#a07828',
          },
          fontFamily: { display:['Oswald','sans-serif'], body:['Source Sans 3','sans-serif'] },
        },
      },
    };
  </script>
  <style>
    @keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
    @keyframes breathe{0%{opacity:.4;transform:translateX(-50%) scale(1)}100%{opacity:.8;transform:translateX(-50%) scale(1.1)}}
    @keyframes goldPulse{0%,100%{box-shadow:0 0 15px rgba(212,168,67,.1)}50%{box-shadow:0 0 35px rgba(212,168,67,.25)}}
    @keyframes spin{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}
    .fade-up{animation:fadeUp .6s ease-out both}
    .d1{animation-delay:.15s}.d2{animation-delay:.3s}.d3{animation-delay:.45s}.d4{animation-delay:.6s}
    .gold-glow{animation:goldPulse 3s ease-in-out infinite}
  </style>
</head>
<body class="bg-forest-900 text-cream font-body min-h-screen">

  <!-- Loading screen -->
  <div id="pageLoader" class="fixed inset-0 z-[9999] flex flex-col items-center justify-center" style="background:#040d06">
    <div class="w-14 h-14 rounded-full border-[3px] border-goldDark border-t-gold" style="animation:spin 1s linear infinite"></div>
    <p class="mt-5 text-fog text-sm tracking-[0.2em] uppercase">VERIFYING ADMIN ACCESS...</p>
  </div>

  <!-- Background glow -->
  <div class="fixed inset-0 z-0 pointer-events-none" aria-hidden="true">
    <div class="absolute top-[20%] left-1/2 w-[700px] h-[700px] rounded-full" style="background:radial-gradient(circle,rgba(42,100,50,.25) 0%,transparent 70%);animation:breathe 8s ease-in-out infinite alternate;transform:translateX(-50%)"></div>
    <div class="absolute bottom-[10%] right-[20%] w-[300px] h-[300px] rounded-full" style="background:radial-gradient(circle,rgba(212,168,67,.06) 0%,transparent 70%);animation:breathe 10s ease-in-out infinite alternate;animation-delay:-4s"></div>
  </div>

  <!-- Top bar -->
  <header class="relative z-10 flex items-center justify-between px-6 py-4 border-b border-gold border-opacity-20" style="background:rgba(4,13,6,.8);backdrop-filter:blur(8px)">
    <div class="flex items-center gap-3">
      <i class="fa-solid fa-crown text-gold text-lg"></i>
      <span class="font-display font-bold text-gold uppercase tracking-[0.12em] text-sm">Admin Panel</span>
    </div>
    <div class="flex items-center gap-4">
      <span class="text-goldDark text-xs tracking-wide uppercase hidden sm:inline">Administrator</span>
      <button id="logoutBtn" class="flex items-center gap-2 px-4 py-2 rounded-lg text-sm font-display tracking-wider uppercase text-fog transition-all hover:text-cream hover:bg-forest-700" style="border:1px solid rgba(154,114,96,.2)">
        <i class="fa-solid fa-right-from-bracket text-xs"></i>
        <span>Logout</span>
      </button>
    </div>
  </header>

  <!-- Main content -->
  <main id="mainContent" class="relative z-10 flex flex-col items-center justify-center px-6" style="min-height:calc(100vh - 65px);display:none">

    <!-- Welcome toast -->
    <div id="welcomeToast" class="hidden fixed top-20 left-1/2 -translate-x-1/2 z-50 px-6 py-3 rounded-xl text-sm font-body text-cream fade-up" style="background:linear-gradient(135deg,rgba(160,120,40,.85),rgba(100,75,20,.95));border:1px solid rgba(212,168,67,.3);backdrop-filter:blur(10px)">
      <i class="fa-solid fa-crown text-gold mr-2"></i>
      Welcome back, <span id="toastName">Admin</span>
    </div>

    <!-- Profile card -->
    <div class="w-full max-w-md fade-up d1">
      <div class="rounded-2xl p-8 text-center gold-glow" style="background:linear-gradient(150deg,rgba(14,37,21,.85),rgba(9,26,14,.95));border:1px solid rgba(212,168,67,.2);backdrop-filter:blur(14px)">
        
        <div class="mb-5">
          <img id="userPhoto" src="" alt="Profile" class="w-20 h-20 rounded-full mx-auto object-cover" style="border:2px solid rgba(212,168,67,.3);display:none">
          <div id="photoFallback" class="w-20 h-20 rounded-full mx-auto flex items-center justify-center" style="background:linear-gradient(140deg,rgba(212,168,67,.15),rgba(100,75,20,.25));border:2px solid rgba(212,168,67,.2)">
            <i class="fa-solid fa-crown text-2xl text-gold"></i>
          </div>
        </div>

        <h1 id="userName" class="font-display font-bold text-xl text-cream uppercase tracking-wider mb-1">Admin</h1>
        <p id="userEmail" class="text-goldDark text-sm tracking-wide mb-4">admin@example.com</p>

        <div class="inline-flex items-center gap-2 px-4 py-2 rounded-full text-xs font-display tracking-widest uppercase" style="background:rgba(212,168,67,.12);border:1px solid rgba(212,168,67,.25)">
          <i class="fa-solid fa-shield-halved text-gold"></i>
          <span class="text-gold">Administrator</span>
        </div>
      </div>
    </div>

    <!-- Admin sections -->
    <div class="mt-8 w-full max-w-lg fade-up d2">
      <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
        <div class="rounded-xl p-5 flex items-center gap-4 transition-all hover:-translate-y-0.5 cursor-pointer" style="background:rgba(14,37,21,.6);border:1px solid rgba(212,168,67,.1)">
          <i class="fa-solid fa-users text-gold text-xl"></i>
          <div>
            <p class="text-cream text-sm font-display uppercase tracking-wider">Users</p>
            <p class="text-fog text-xs">Manage accounts</p>
          </div>
        </div>
        <div class="rounded-xl p-5 flex items-center gap-4 transition-all hover:-translate-y-0.5 cursor-pointer" style="background:rgba(14,37,21,.6);border:1px solid rgba(212,168,67,.1)">
          <i class="fa-solid fa-chart-pie text-gold text-xl"></i>
          <div>
            <p class="text-cream text-sm font-display uppercase tracking-wider">Analytics</p>
            <p class="text-fog text-xs">View statistics</p>
          </div>
        </div>
        <div class="rounded-xl p-5 flex items-center gap-4 transition-all hover:-translate-y-0.5 cursor-pointer" style="background:rgba(14,37,21,.6);border:1px solid rgba(212,168,67,.1)">
          <i class="fa-solid fa-database text-gold text-xl"></i>
          <div>
            <p class="text-cream text-sm font-display uppercase tracking-wider">Database</p>
            <p class="text-fog text-xs">View logins</p>
          </div>
        </div>
        <div class="rounded-xl p-5 flex items-center gap-4 transition-all hover:-translate-y-0.5 cursor-pointer" style="background:rgba(14,37,21,.6);border:1px solid rgba(212,168,67,.1)">
          <i class="fa-solid fa-sliders text-gold text-xl"></i>
          <div>
            <p class="text-cream text-sm font-display uppercase tracking-wider">Settings</p>
            <p class="text-fog text-xs">System config</p>
          </div>
        </div>
      </div>
      <p class="text-forest-500 text-xs mt-6 text-center tracking-wide">Admin features will be built in admin.js</p>
    </div>
  </main>

  <script>
    // ========================================
    // PROTECTION CHECK (runs immediately)
    // ========================================
    (function() {
      var email = sessionStorage.getItem("userEmail");
      var isAdmin = sessionStorage.getItem("isAdmin") === "true";
      
      // Must have session AND be admin
      if (!email || !isAdmin) {
        sessionStorage.clear();
        window.location.replace("login.html");
        return;
      }
      
      // All good — load the page
      loadPage();
    })();
    
    function loadPage() {
      var name = sessionStorage.getItem("userName") || "Admin";
      var email = sessionStorage.getItem("userEmail") || "";
      var photo = sessionStorage.getItem("userPhoto") || "";
      var justLoggedIn = sessionStorage.getItem("justLoggedIn");
      
      // Fill in page data
      document.getElementById("userName").textContent = name;
      document.getElementById("userEmail").textContent = email;
      document.getElementById("toastName").textContent = name;
      
      // Show photo if available
      if (photo) {
        document.getElementById("userPhoto").src = photo;
        document.getElementById("userPhoto").style.display = "block";
        document.getElementById("photoFallback").style.display = "none";
      }
      
      // Show welcome toast only on fresh login
      if (justLoggedIn === "1") {
        document.getElementById("welcomeToast").classList.remove("hidden");
        sessionStorage.removeItem("justLoggedIn");
        setTimeout(function() {
          var toast = document.getElementById("welcomeToast");
          if (toast) toast.classList.add("hidden");
        }, 4000);
      }
      
      // Hide loader, show content
      document.getElementById("pageLoader").style.display = "none";
      document.getElementById("mainContent").style.display = "flex";
      
      // Setup logout
      document.getElementById("logoutBtn").addEventListener("click", function() {
        sessionStorage.clear();
        window.location.replace("index.html");
      });
    }
  </script>
</body>
</html>
