<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Panel</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: #0a0a0a;
      height: 100vh;
      overflow: hidden;
      color: #ffffff;
    }

    /* ── TOP BAR ── */
    .topbar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 64px;
      background: rgba(23, 23, 23, 0.9);
      backdrop-filter: blur(12px);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      z-index: 100;
    }

    .topbar-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .admin-photo {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid rgba(16, 185, 129, 0.5);
    }

    .admin-name {
      font-size: 14px;
      font-weight: 600;
      color: #ffffff;
    }

    .admin-badge {
      font-size: 10px;
      font-weight: 700;
      background: rgba(16, 185, 129, 0.15);
      color: #10B981;
      padding: 2px 8px;
      border-radius: 999px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .logout-btn {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: #a3a3a3;
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      font-weight: 500;
      padding: 8px 16px;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .logout-btn:hover {
      background: rgba(239, 68, 68, 0.15);
      border-color: rgba(239, 68, 68, 0.3);
      color: #EF4444;
    }

    /* ── CENTER AREA ── */
    .center-area {
      position: fixed;
      top: 0;
      left: 0;
      right: 280px;
      bottom: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
    }

    .menu-btn {
      width: 200px;
      height: 200px;
      border-radius: 24px;
      background: linear-gradient(145deg, #141414, #1a1a1a);
      border: 1px solid rgba(255, 255, 255, 0.08);
      color: #ffffff;
      font-family: 'Inter', sans-serif;
      font-size: 22px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s ease;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
    }

    .menu-btn:hover {
      transform: scale(1.05);
      border-color: rgba(16, 185, 129, 0.4);
      box-shadow: 0 0 40px rgba(16, 185, 129, 0.15);
    }

    .menu-btn:active {
      transform: scale(0.97);
    }

    .menu-icon {
      font-size: 48px;
      opacity: 0.9;
    }

    .menu-label {
      font-size: 16px;
      font-weight: 600;
      letter-spacing: 0.02em;
    }

    .center-hint {
      font-size: 13px;
      color: #525252;
      font-weight: 400;
    }

    /* ── RIGHT SIDEBAR ── */
    .sidebar {
      position: fixed;
      top: 0;
      right: 0;
      width: 280px;
      height: 100vh;
      background: rgba(23, 23, 23, 0.6);
      backdrop-filter: blur(12px);
      border-left: 1px solid rgba(255, 255, 255, 0.08);
      padding-top: 88px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .sidebar-title {
      font-size: 11px;
      font-weight: 600;
      color: #525252;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      padding: 8px 24px 16px;
    }

    .sidebar-item {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 14px 24px;
      color: #a3a3a3;
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      transition: all 0.2s;
      cursor: pointer;
      border-left: 3px solid transparent;
    }

    .sidebar-item:hover {
      background: rgba(255, 255, 255, 0.04);
      color: #ffffff;
      border-left-color: #10B981;
    }

    .sidebar-item:active {
      background: rgba(255, 255, 255, 0.07);
    }

    .sidebar-item .icon {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
    }

    .sidebar-item .icon.users { background: rgba(59, 130, 246, 0.12); }
    .sidebar-item .icon.space { background: rgba(168, 85, 247, 0.12); }
    .sidebar-item .icon.payments { background: rgba(16, 185, 129, 0.12); }
    .sidebar-item .icon.danger { background: rgba(239, 68, 68, 0.12); }

    .sidebar-item .item-text {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .sidebar-item .item-label {
      font-size: 14px;
      font-weight: 500;
    }

    .sidebar-item .item-desc {
      font-size: 11px;
      color: #525252;
      font-weight: 400;
    }

    /* ── DANGER ITEM SPECIAL STYLE ── */
    .sidebar-item.danger-item:hover {
      border-left-color: #EF4444;
    }

    .sidebar-item.danger-item:hover .icon {
      background: rgba(239, 68, 68, 0.2);
    }

    /* ── MOBILE ── */
    @media (max-width: 768px) {
      .center-area {
        right: 0;
        bottom: 80px;
      }

      .menu-btn {
        width: 160px;
        height: 160px;
      }

      .sidebar {
        top: auto;
        bottom: 0;
        left: 0;
        right: 0;
        width: 100%;
        height: 80px;
        flex-direction: row;
        padding: 0 8px;
        border-left: none;
        border-top: 1px solid rgba(255, 255, 255, 0.08);
        align-items: center;
        justify-content: space-around;
        overflow-x: auto;
      }

      .sidebar-title {
        display: none;
      }

      .sidebar-item {
        flex-direction: column;
        gap: 4px;
        padding: 8px;
        border-left: none;
        border-bottom: 2px solid transparent;
        min-width: 64px;
        text-align: center;
      }

      .sidebar-item:hover {
        border-left-color: transparent;
        border-bottom-color: #10B981;
      }

      .sidebar-item .item-desc {
        display: none;
      }

      .sidebar-item.danger-item:hover {
        border-left-color: transparent;
        border-bottom-color: #EF4444;
      }
    }
  </style>
</head>
<body>

  <!-- TOP BAR -->
  <div class="topbar">
    <div class="topbar-left">
      <img id="adminPhoto" class="admin-photo" src="" alt="Admin">
      <span id="adminName" class="admin-name">Admin</span>
      <span class="admin-badge">Admin</span>
    </div>
    <button class="logout-btn" onclick="logout()">Logout</button>
  </div>

  <!-- CENTER: MENU BUTTON -->
  <div class="center-area">
    <button class="menu-btn" onclick="window.location.href='menu.html'">
      <span class="menu-icon">☰</span>
      <span class="menu-label">Menu</span>
    </button>
    <span class="center-hint">Tap to open menu</span>
  </div>

  <!-- RIGHT SIDEBAR -->
  <div class="sidebar">
    <div class="sidebar-title">Navigation</div>

    <a class="sidebar-item" href="users.html">
      <div class="icon users">👥</div>
      <div class="item-text">
        <span class="item-label">Users</span>
        <span class="item-desc">Manage users</span>
      </div>
    </a>

    <a class="sidebar-item" href="space.html">
      <div class="icon space">🚀</div>
      <div class="item-text">
        <span class="item-label">Space</span>
        <span class="item-desc">View space</span>
      </div>
    </a>

    <a class="sidebar-item" href="payments.html">
      <div class="icon payments">💳</div>
      <div class="item-text">
        <span class="item-label">Payments</span>
        <span class="item-desc">Track payments</span>
      </div>
    </a>

    <a class="sidebar-item danger-item" href="dangerous_accounts.html">
      <div class="icon danger">⚠️</div>
      <div class="item-text">
        <span class="item-label">Dangerous Accounts</span>
        <span class="item-desc">Flagged accounts</span>
      </div>
    </a>
  </div>

  <script>
    // ── GET ADMIN INFO FROM URL ──
    const params = new URLSearchParams(window.location.search);

    const name = params.get('name') || 'Admin';
    const photo = params.get('photo') || '';
    const email = params.get('email') || '';
    const adminFlag = params.get('admin');

    // ── SECURITY: Only admin can access this page ──
    if (adminFlag !== 'true') {
      window.location.replace('index.html');
    }

    // ── DISPLAY ADMIN INFO ──
    document.getElementById('adminName').textContent = decodeURIComponent(name);

    if (photo) {
      document.getElementById('adminPhoto').src = decodeURIComponent(photo);
    } else {
      document.getElementById('adminPhoto').src = 'https://www.gravatar.com/avatar/00000000000000000000000000000000?d=mp';
    }

    // ── LOGOUT ──
    function logout() {
      // Import Firebase auth and sign out
      const script = document.createElement('script');
      script.type = 'module';
      script.textContent = `
        import { getAuth, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

        const firebaseConfig = {
          apiKey: "AIzaSyDpNJIZoLeZUhIoTepbLb_3rRLpseu9Zdo",
          authDomain: "my-project-66803-95cb3.firebaseapp.com",
          projectId: "my-project-66803-95cb3",
          storageBucket: "my-project-66803-95cb3.firebasestorage.app",
          messagingSenderId: "167159607898",
          appId: "1:167159607898:web:23ca11366b88868b085e63"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        signOut(auth).then(() => {
          window.location.replace('index.html');
        });
      `;
      document.head.appendChild(script);
    }
  </script>

</body>
</html>
