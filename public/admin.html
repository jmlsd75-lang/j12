<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard — JAMAL SAID KAZEMBE</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg: #0a0f1a;
            --bg2: #111827;
            --fg: #e8edf5;
            --muted: #8a95a8;
            --accent: #00d4aa;
            --red: #dc3545;
            --border: #1e293b;
        }
        html, body {
            width: 100%; min-height: 100vh;
            font-family: 'Orbitron', sans-serif;
            background: var(--bg); color: var(--fg);
        }

        .top-bar {
            display: flex; align-items: center; gap: 16px;
            padding: 16px 24px;
            background: rgba(10,15,26,0.95);
            border-bottom: 1px solid var(--border);
        }
        .top-bar h1 {
            font-size: clamp(0.7rem, 2vw, 1rem);
            font-weight: 700; letter-spacing: 0.1em;
            color: var(--accent);
        }
        .top-bar h1 span { color: var(--fg); }
        .spacer { flex: 1; }
        .btn-logout {
            font-family: 'Orbitron', sans-serif;
            font-size: 0.65rem; font-weight: 600;
            padding: 8px 16px; background: transparent;
            color: var(--red); border: 1px solid var(--red);
            cursor: pointer; letter-spacing: 0.08em;
            transition: all 0.3s;
        }
        .btn-logout:hover { background: var(--red); color: white; }

        .stats {
            display: flex; gap: 20px; padding: 20px 24px;
            flex-wrap: wrap;
        }
        .stat-card {
            flex: 1; min-width: 160px;
            background: var(--bg2); border: 1px solid var(--border);
            border-radius: 10px; padding: 20px;
            text-align: center;
        }
        .stat-card .label {
            font-size: 0.55rem; color: var(--muted);
            letter-spacing: 0.1em; margin-bottom: 8px;
        }
        .stat-card .value {
            font-size: 1.4rem; font-weight: 900;
            color: var(--accent);
        }

        .table-wrap {
            padding: 0 24px 24px; overflow-x: auto;
        }
        table {
            width: 100%; border-collapse: collapse;
            font-size: 0.7rem;
        }
        thead th {
            background: var(--bg2); color: var(--muted);
            font-weight: 600; letter-spacing: 0.08em;
            padding: 12px 16px; text-align: left;
            border-bottom: 2px solid var(--border);
            position: sticky; top: 0;
        }
        tbody td {
            padding: 10px 16px;
            border-bottom: 1px solid var(--border);
            color: var(--fg);
        }
        tbody tr:hover { background: rgba(0,212,170,0.04); }
        .type-tag {
            display: inline-block; padding: 3px 10px;
            border-radius: 4px; font-size: 0.6rem;
            font-weight: 600; letter-spacing: 0.05em;
        }
        .type-tigo { background: rgba(0,212,170,0.15); color: #00d4aa; }
        .type-airtel { background: rgba(220,53,69,0.15); color: #dc3545; }
        .type-crdb { background: rgba(0,123,255,0.15); color: #007bff; }
        .type-unknown { background: rgba(138,149,168,0.15); color: #8a95a8; }

        .empty-state {
            text-align: center; padding: 60px 20px;
            color: var(--muted); font-size: 0.75rem;
        }

        .loading-state {
            text-align: center; padding: 60px 20px;
            color: var(--muted); font-size: 0.75rem;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .spinner {
            display: inline-block; width: 30px; height: 30px;
            border: 4px solid var(--border); border-top-color: var(--accent);
            border-radius: 50%; animation: spin 0.8s linear infinite;
            margin-bottom: 16px;
        }
    </style>
</head>
<body>

    <div class="top-bar">
        <h1>ADMIN <span>DASHBOARD</span></h1>
        <div class="spacer"></div>
        <button class="btn-logout" id="logoutBtn">LOGOUT</button>
    </div>

    <div class="stats" id="statsRow">
        <div class="stat-card">
            <div class="label">TOTAL PAYMENTS</div>
            <div class="value" id="statCount">—</div>
        </div>
        <div class="stat-card">
            <div class="label">TOTAL AMOUNT (TZS)</div>
            <div class="value" id="statAmount">—</div>
        </div>
        <div class="stat-card">
            <div class="label">UNIQUE USERS</div>
            <div class="value" id="statUsers">—</div>
        </div>
    </div>

    <div class="table-wrap">
        <div id="adminContainer">
            <div class="loading-state"><div class="spinner"></div>Loading payments...</div>
        </div>
    </div>

    <script type="module" src="./admin.js"></script>
</body>
</html>
