<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Profile Dashboard (Live)</title>
    <style>
        /* =========================================
           RESET & TYPOGRAPHY
           ========================================= */
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #0f172a;
            color: #ffffff;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* =========================================
           BACKGROUND SCENE
           ========================================= */
        .scene {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: -1;
            background: linear-gradient(to bottom, #020024 0%, #090979 35%, #2a2a2a 100%);
            overflow: hidden;
        }

        /* Stars */
        .stars {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 50%;
            background-image: 
                radial-gradient(white, rgba(255,255,255,.2) 2px, transparent 3px),
                radial-gradient(white, rgba(255,255,255,.15) 1px, transparent 2px),
                radial-gradient(white, rgba(255,255,255,.1) 2px, transparent 3px);
            background-size: 550px 550px, 350px 350px, 250px 250px;
            background-position: 0 0, 40px 60px, 130px 270px;
            animation: starMove 100s linear infinite;
        }

        /* City */
        .city {
            position: absolute; bottom: 30%; left: 0; width: 200%; height: 150px;
            background: 
                linear-gradient(to bottom, transparent 0%, #000 100%),
                repeating-linear-gradient(90deg, #000 0px, #000 20px, transparent 20px, transparent 25px),
                repeating-linear-gradient(90deg, #111 0px, #111 40px, #000 40px, #000 60px);
            background-size: 100% 100%, 100px 100%, 150px 100%;
            opacity: 0.6;
            animation: cityMove 60s linear infinite;
        }

        /* Flyover Pillars */
        .pillars {
            position: absolute; bottom: 0; left: 0; width: 100%; height: 40%;
            display: flex; justify-content: space-around; align-items: flex-end; z-index: 1;
        }
        .pillar {
            width: 60px; height: 100%;
            background: linear-gradient(90deg, #1a1a1a, #333, #1a1a1a);
            border-top: 5px solid #555;
            box-shadow: 0 0 20px rgba(0,0,0,0.8);
        }

        /* The Road */
        .road {
            position: absolute; bottom: 0; left: 0; width: 100%; height: 35%;
            background: #1c1c1c;
            border-top: 6px solid #444;
            z-index: 2;
            overflow: hidden;
            perspective: 600px;
        }

        /* Road Lines */
        .road-lines {
            position: absolute; top: 50%; left: 0; width: 200%; height: 4px;
            background: repeating-linear-gradient(90deg, #fff 0, #fff 50px, transparent 50px, transparent 100px);
            transform: translateY(-50%);
            box-shadow: 0 0 10px rgba(255,255,255,0.5);
            animation: roadMove 1s linear infinite;
        }

        /* =========================================
           CARS (Generic Styling)
           ========================================= */
        .car-container {
            position: absolute;
            bottom: 45%;
            left: -300px;
            width: 260px;
            height: 80px;
            z-index: 3;
            /* Animation name is generic, duration/delay set via JS */
            animation-name: driveCar; 
            animation-timing-function: linear;
            animation-iteration-count: infinite;
        }

        .car-body {
            width: 100%; height: 50px;
            border-radius: 10px 40px 10px 10px;
            position: relative;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }

        .car-roof {
            position: absolute; top: -25px; left: 50px;
            width: 100px; height: 30px;
            background: #222; /* Dark roof default */
            border-radius: 20px 20px 0 0;
        }

        .window {
            position: absolute; top: 5px; left: 5px;
            width: 90px; height: 20px;
            background: linear-gradient(135deg, #81ecec, #00cec9);
            border-radius: 15px 15px 0 0;
            opacity: 0.8;
        }

        .wheel {
            position: absolute; bottom: -15px;
            width: 35px; height: 35px;
            background: #222; border: 3px solid #555; border-radius: 50%;
            animation: wheelSpin 0.5s linear infinite;
        }
        .wheel.front { right: 35px; }
        .wheel.back { left: 35px; }

        .headlights {
            position: absolute; right: -5px; top: 15px;
            width: 10px; height: 20px;
            background: #f1c40f;
            box-shadow: 20px 0 40px 10px rgba(241, 196, 15, 0.6);
            border-radius: 0 5px 5px 0;
        }

        /* =========================================
           ANIMATIONS
           ========================================= */
        @keyframes roadMove {
            0% { transform: translateY(-50%) translateX(0); }
            100% { transform: translateY(-50%) translateX(-100px); }
        }

        @keyframes driveCar {
            0% { left: -300px; transform: scale(0.8); }
            40% { left: 30%; transform: scale(1); }
            60% { left: 30%; transform: scale(1); }
            100% { left: 110%; transform: scale(0.8); }
        }

        @keyframes wheelSpin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        @keyframes starMove { from { background-position: 0 0, 40px 60px, 130px 270px; } to { background-position: 550px 0, 590px 60px, 680px 270px; } }
        @keyframes cityMove { from { transform: translateX(0); } to { transform: translateX(-50%); } }

        /* =========================================
           UI CARD & TABLE
           ========================================= */
        .card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            padding: 30px;
            width: 90%; max-width: 800px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            position: relative; z-index: 10;
            animation: cardFadeIn 0.8s ease-out;
        }
        @keyframes cardFadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .back-btn {
            position: absolute; top: 20px; left: 20px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: #fff; padding: 10px 15px; border-radius: 8px;
            cursor: pointer; font-size: 14px; font-weight: bold;
            display: flex; align-items: center; gap: 8px;
            transition: all 0.2s ease; z-index: 20;
        }
        .back-btn:hover { background: rgba(255, 255, 255, 0.2); transform: translateX(-3px); }

        .table-container { overflow-x: auto; margin-top: 20px; }
        table { width: 100%; border-collapse: collapse; min-width: 600px; }
        th, td { text-align: left; padding: 16px; border-bottom: 1px solid rgba(255, 255, 255, 0.15); }
        th { color: #a0a0a0; font-weight: 600; text-transform: uppercase; font-size: 0.85rem; background: rgba(0, 0, 0, 0.2); }
        td { font-size: 1rem; color: #fff; font-family: 'Courier New', monospace; }
        tr:hover td { background: rgba(255, 255, 255, 0.05); transition: background 0.2s; }
        
        .val-null { color: #ff6b6b; font-style: italic; }
        .val-zero { color: #feca57; }
        .val-date { color: #48dbfb; }
        .loading-text { color: #aaa; font-style: italic; }

        @media (max-width: 600px) {
            .card { padding: 50px 15px 20px 15px; }
            .back-btn { top: 10px; left: 10px; padding: 8px 12px; }
            th, td { padding: 12px 8px; font-size: 0.9rem; }
        }
    </style>
</head>
<body>

    <!-- BACKGROUND SCENE -->
    <div class="scene">
        <div class="stars"></div>
        <div class="city"></div>
        <div class="pillars">
            <div class="pillar"></div>
            <div class="pillar"></div>
            <div class="pillar"></div>
            <div class="pillar"></div>
            <div class="pillar"></div>
        </div>
        <div class="road">
            <div class="road-lines"></div>
            <!-- Cars will be injected here by JavaScript -->
            <div id="traffic-layer"></div>
        </div>
    </div>

    <!-- UI -->
    <button class="back-btn" onclick="goBack()">
        <span style="font-size: 18px;">&lt;</span> Back
    </button>

    <div class="card">
        <div style="margin-bottom: 20px;">
            <h2 style="font-weight: 300; letter-spacing: 1px;">User Data (Live)</h2>
            <div style="height: 3px; width: 50px; background: #e74c3c; margin-top: 5px;"></div>
            <div id="status-msg" style="font-size: 12px; margin-top: 5px; color: #aaa;">Connecting to Firebase...</div>
        </div>

        <div class="table-container">
            <table id="userTable">
                <thead>
                    <tr>
                        <th>Field</th>
                        <th>email</th>
                        <th>lastPayment</th>
                        <th>lastPaymentAmount</th>
                        <th>lastVisit</th>
                        <th>spaceUsed</th>
                        <th>username</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td><strong>Value</strong></td>
                        <td id="d-email">...</td>
                        <td id="d-lastPayment">...</td>
                        <td id="d-lastPaymentAmount">...</td>
                        <td id="d-lastVisit">...</td>
                        <td id="d-spaceUsed">...</td>
                        <td id="d-username">...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- LOGIC: FIREBASE + ANIMATION -->
    <script type="module">
        // ============================================================
        // 1. FIREBASE IMPORTS & CONFIG
        // ============================================================
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getFirestore, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDpNJIZoLeZUhIoTepbLb_3rRLpseu9Zdo",
            authDomain: "my-project-66803-95cb3.firebaseapp.com",
            projectId: "my-project-66803-95cb3",
            storageBucket: "my-project-66803-95cb3.firebasestorage.app",
            messagingSenderId: "167159607898",
            appId: "1:167159607898:web:23ca11366b88868b085e63"
        };

        // Initialize Firebase
        let db;
        try {
            const app = initializeApp(firebaseConfig);
            db = getFirestore(app);
            console.log("Firebase initialized");
        } catch (e) {
            console.error("Firebase init error:", e);
            document.getElementById('status-msg').textContent = "Error connecting to database.";
            document.getElementById('status-msg').style.color = "#ff6b6b";
        }

        // ============================================================
        // 2. VISUALS: GENERATE MULTIPLE CARS
        // ============================================================
        function generateTraffic() {
            const trafficLayer = document.getElementById('traffic-layer');
            const colors = [
                { body: '#e74c3c', roof: '#c0392b' }, // Red
                { body: '#3498db', roof: '#2980b9' }, // Blue
                { body: '#f1c40f', roof: '#f39c12' }, // Yellow
                { body: '#ecf0f1', roof: '#bdc3c7' }, // Silver
                { body: '#9b59b6', roof: '#8e44ad' }, // Purple
                { body: '#2ecc71', roof: '#27ae60' }  // Green
            ];

            // Generate 6 cars
            for (let i = 0; i < 6; i++) {
                const colorSet = colors[i % colors.length];
                
                // Randomize animation properties for realism
                const duration = 3 + Math.random() * 3; // Speed between 3s and 6s
                const delay = Math.random() * -5; // Negative delay to start already in progress
                const zIndex = 3 + i; // Layering

                const carHTML = `
                    <div class="car-container" style="
                        animation-duration: ${duration}s; 
                        animation-delay: ${delay}s;
                        z-index: ${zIndex};
                    ">
                        <div class="car-body" style="background: linear-gradient(to bottom, ${colorSet.body}, ${colorSet.roof});">
                            <div class="car-roof">
                                <div class="window"></div>
                            </div>
                            <div class="headlights"></div>
                            <div class="wheel back"></div>
                            <div class="wheel front"></div>
                        </div>
                    </div>
                `;
                trafficLayer.insertAdjacentHTML('beforeend', carHTML);
            }
        }

        // ============================================================
        // 3. DATA: REAL-TIME FIREBASE LISTENER
        // ============================================================
        function initRealtimeData() {
            // 1. Get User Email from Session (set by login.js)
            const session = localStorage.getItem('userSession');
            
            if (!session) {
                document.getElementById('status-msg').textContent = "No user session found. Please log in.";
                document.getElementById('status-msg').style.color = "#ff6b6b";
                renderTable({
                    email: "N/A",
                    lastPayment: null,
                    lastPaymentAmount: 0,
                    lastVisit: null,
                    spaceUsed: 0,
                    username: "Guest"
                });
                return;
            }

            try {
                const user = JSON.parse(session);
                const userEmail = user.email;

                if (!userEmail || !db) return;

                // 2. Listen to Firestore Document (Real-time)
                const userDocRef = doc(db, "users", userEmail);

                document.getElementById('status-msg').textContent = "Live Sync Active...";
                document.getElementById('status-msg').style.color = "#2ecc71";

                // onSnapshot triggers immediately and then on every change
                onSnapshot(userDocRef, (docSnap) => {
                    if (docSnap.exists()) {
                        const data = docSnap.data();
                        console.log("Real-time update received:", data);
                        renderTable(data);
                    } else {
                        console.log("No such document!");
                        document.getElementById('status-msg').textContent = "No data found in Firestore.";
                    }
                }, (error) => {
                    console.error("Firestore error:", error);
                    document.getElementById('status-msg').textContent = "Error loading data.";
                    document.getElementById('status-msg').style.color = "#ff6b6b";
                });

            } catch (e) {
                console.error("Error parsing session", e);
            }
        }

        // Helper: Render Table
        function renderTable(data) {
            const setText = (id, val, cls) => {
                const el = document.getElementById(id);
                el.textContent = val;
                el.className = cls || "";
            };

            setText('d-email', data.email || "-");
            
            // Last Payment
            if (data.lastPayment === null) {
                setText('d-lastPayment', "null", "val-null");
            } else {
                setText('d-lastPayment', data.lastPayment);
            }

            // Amount
            setText('d-lastPaymentAmount', data.lastPaymentAmount, data.lastPaymentAmount === 0 ? "val-zero" : "");

            // Last Visit
            const lv = data.lastVisit;
            if (!lv) {
                setText('d-lastVisit', "null", "val-null");
            } else {
                // Format timestamp if it's a Firestore Timestamp or ISO string
                let dateStr = lv;
                if (lv.toDate) { // Firestore Timestamp object
                    dateStr = lv.toDate().toLocaleString();
                } else if (typeof lv === 'string' && !lv.includes("April")) {
                    // ISO String
                    dateStr = new Date(lv).toLocaleString();
                }
                setText('d-lastVisit', dateStr, "val-date");
            }

            // Space Used
            setText('d-spaceUsed', data.spaceUsed, data.spaceUsed === 0 ? "val-zero" : "");

            // Username
            setText('d-username', data.username || "-");
        }

        // ============================================================
        // 4. INITIALIZATION
        // ============================================================
        document.addEventListener('DOMContentLoaded', () => {
            generateTraffic(); // Start the cars
            initRealtimeData(); // Connect to Firebase
        });

        // Navigation (exposed to window for onclick)
        window.goBack = function() {
            if (window.history.length > 1) {
                window.history.back();
            } else {
                console.log("No history to go back to");
            }
        };
    </script>
</body>
</html>
