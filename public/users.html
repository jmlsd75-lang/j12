<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>User Dashboard - Admin</title>
  
  <!-- Google Fonts for a clean dashboard look -->
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --primary-color: #4285F4;
      --success-color: #34A853;
      --warning-color: #FBBC05;
      --danger-color: #EA4335;
      --bg-color: #f4f6f8;
      --card-bg: #ffffff;
      --text-main: #202124;
      --text-secondary: #5f6368;
      --border-color: #dadce0;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Roboto', sans-serif;
      background-color: var(--bg-color);
      color: var(--text-main);
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* --- Header / Nav --- */
    header {
      background: var(--card-bg);
      border-bottom: 1px solid var(--border-color);
      padding: 0 24px;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 1px 2px rgba(60,64,67,0.3);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 20px;
      font-weight: 500;
      color: var(--text-main);
    }

    .brand svg { width: 24px; height: 24px; fill: var(--primary-color); }

    .admin-controls {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .admin-profile {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 14px;
    }

    .admin-profile img {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      object-fit: cover;
      border: 1px solid var(--border-color);
    }

    button.btn-logout {
      background: transparent;
      border: 1px solid var(--border-color);
      padding: 6px 16px;
      border-radius: 4px;
      cursor: pointer;
      font-weight: 500;
      color: var(--text-main);
      transition: background 0.2s;
    }

    button.btn-logout:hover { background: #f1f3f4; }

    /* --- Main Content --- */
    main {
      flex: 1;
      padding: 24px;
      overflow: hidden; /* For inner scrolling */
      display: flex;
      flex-direction: column;
    }

    .dashboard-card {
      background: var(--card-bg);
      border-radius: 8px;
      box-shadow: 0 1px 2px rgba(60,64,67,0.3), 0 1px 3px 1px rgba(60,64,67,0.15);
      display: flex;
      flex-direction: column;
      height: 100%;
      overflow: hidden;
    }

    .card-header {
      padding: 16px 24px;
      border-bottom: 1px solid var(--border-color);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .card-header h2 { font-size: 18px; font-weight: 500; }

    .refresh-btn {
      background: var(--primary-color);
      color: white;
      border: none;
      padding: 8px 16px;
      border-radius: 4px;
      cursor: pointer;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: background 0.2s;
    }
    .refresh-btn:hover { background: #3367d6; }
    .refresh-btn svg { width: 16px; height: 16px; fill: white; }

    /* --- Table Styles --- */
    .table-container {
      flex: 1;
      overflow-y: auto;
      position: relative;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 800px; /* Prevent squishing on small screens */
    }

    thead {
      background-color: #f8f9fa;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    th {
      text-align: left;
      padding: 12px 24px;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-secondary);
      border-bottom: 1px solid var(--border-color);
      white-space: nowrap;
    }

    td {
      padding: 14px 24px;
      font-size: 14px;
      border-bottom: 1px solid var(--border-color);
      color: var(--text-main);
      vertical-align: middle;
    }

    tr:hover { background-color: #f8f9fa; }

    /* User Cell */
    .user-cell { display: flex; align-items: center; gap: 12px; }
    .user-avatar {
      width: 36px; height: 36px;
      background: #e8f0fe; color: var(--primary-color);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-weight: bold; font-size: 14px;
    }
    .user-info div:first-child { font-weight: 500; }
    .user-info div:last-child { font-size: 12px; color: var(--text-secondary); }

    /* Space Bar */
    .space-bar-container {
      width: 100px; height: 6px;
      background: #e0e0e0; border-radius: 3px;
      overflow: hidden; display: inline-block;
      margin-right: 8px; vertical-align: middle;
    }
    .space-bar-fill { height: 100%; background: var(--success-color); }

    /* Payment Badge */
    .payment-badge {
      padding: 4px 8px;
      border-radius: 12px;
      font-size: 12px;
      font-weight: 500;
      background: #f1f3f4;
      color: var(--text-secondary);
    }
    .payment-badge.paid { background: #e6f4ea; color: var(--success-color); }

    /* --- Footer / Totals --- */
    tfoot {
      background-color: #f8f9fa;
      font-weight: 700;
      border-top: 2px solid var(--border-color);
    }
    tfoot td { padding: 16px 24px; }
    .total-highlight { color: var(--primary-color); }

    /* --- Toast Notification --- */
    #toast-container {
      position: fixed; bottom: 20px; right: 20px; z-index: 1000;
    }
    .toast {
      background: #323232; color: white;
      padding: 12px 24px; border-radius: 4px;
      margin-top: 10px; font-size: 14px;
      opacity: 0; transform: translateY(10px);
      transition: opacity 0.3s, transform 0.3s;
      box-shadow: 0 2px 5px rgba(0,0,0,0.2);
    }
    .toast.show { opacity: 1; transform: translateY(0); }

    /* --- Loading Overlay --- */
    #loader {
      position: absolute; top:0; left:0; right:0; bottom:0;
      background: rgba(255,255,255,0.8);
      display: flex; align-items: center; justify-content: center;
      z-index: 50;
    }
    .spinner {
      width: 40px; height: 40px;
      border: 4px solid #f3f3f3;
      border-top: 4px solid var(--primary-color);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

    /* Utility */
    .hidden { display: none !important; }
    .text-right { text-align: right; }
    .empty-state {
      padding: 40px; text-align: center; color: var(--text-secondary);
    }
  </style>
</head>
<body>

  <!-- Header -->
  <header>
    <div class="brand">
      <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zm-1-13h2v6h-2zm0 8h2v2h-2z"/></svg>
      Admin Dashboard
    </div>
    <div class="admin-controls">
      <div class="admin-profile" id="adminProfile">
        <!-- Filled by JS -->
        <span>Loading...</span>
      </div>
      <button class="btn-logout" onclick="handleLogout()">Sign Out</button>
    </div>
  </header>

  <!-- Main Content -->
  <main>
    <div class="dashboard-card">
      <div class="card-header">
        <h2>Registered Users</h2>
        <button class="refresh-btn" onclick="fetchUsers()">
          <svg viewBox="0 0 24 24"><path d="M17.65 6.35C16.2 4.9 14.21 4 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08c-.82 2.33-3.04 4-5.65 4-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/></svg>
          Refresh Data
        </button>
      </div>

      <div class="table-container">
        <div id="loader"><div class="spinner"></div></div>
        <table id="usersTable">
          <thead>
            <tr>
              <th>User</th>
              <th>Email</th>
              <th>Space Used</th>
              <th>Last Payment Amount</th>
              <th>Last Payment Date</th>
              <th>Last Visit</th>
            </tr>
          </thead>
          <tbody id="usersTableBody">
            <!-- Rows generated by JS -->
          </tbody>
          <tfoot id="usersTableFoot">
            <!-- Totals generated by JS -->
          </tfoot>
        </table>
        <div id="emptyState" class="empty-state hidden">No users found.</div>
      </div>
    </div>
  </main>

  <!-- Toast Container -->
  <div id="toast-container"></div>

  <!-- JavaScript logic -->
  <script type="module">
    // ============================================================
    // Firebase Imports & Config
    // ============================================================
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import {
      getAuth,
      onAuthStateChanged,
      signOut
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import {
      getFirestore,
      collection,
      getDocs,
      query,
      orderBy
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDpNJIZoLeZUhIoTepbLb_3rRLpseu9Zdo",
      authDomain: "my-project-66803-95cb3.firebaseapp.com",
      projectId: "my-project-66803-95cb3",
      storageBucket: "my-project-66803-95cb3.firebasestorage.app",
      messagingSenderId: "167159607898",
      appId: "1:167159607898:web:23ca11366b88868b085e63"
    };

    const ADMIN_EMAILS = [
      "jmlsd75@gmail.com",
      "mohd.khamis18.mk@gmail.com"
    ];

    // Initialize Firebase
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    // DOM Elements
    const tableBody = document.getElementById('usersTableBody');
    const tableFoot = document.getElementById('usersTableFoot');
    const loader = document.getElementById('loader');
    const emptyState = document.getElementById('emptyState');
    const adminProfile = document.getElementById('adminProfile');

    // ============================================================
    // Authentication Check
    // ============================================================
    onAuthStateChanged(auth, (user) => {
      if (user) {
        if (ADMIN_EMAILS.includes(user.email)) {
          // Admin verified
          updateAdminProfile(user);
          fetchUsers();
        } else {
          showToast("Access Denied: You are not an admin.");
          setTimeout(() => window.location.href = "index.html", 2000);
        }
      } else {
        // Not logged in
        window.location.href = "index.html";
      }
    });

    function updateAdminProfile(user) {
      adminProfile.innerHTML = `
        <img src="${user.photoURL || 'https://picsum.photos/seed/admin/32/32'}" alt="Admin">
        <span>${user.displayName || user.email}</span>
      `;
    }

    // ============================================================
    // Firestore Data Fetching
    // ============================================================
    async function fetchUsers() {
      loader.classList.remove('hidden');
      tableBody.innerHTML = '';
      tableFoot.innerHTML = '';
      emptyState.classList.add('hidden');

      try {
        // Fetch all users from 'users' collection
        const usersRef = collection(db, "users");
        // Optional: Order by last visit to see active users first
        const q = query(usersRef); 
        const querySnapshot = await getDocs(q);

        if (querySnapshot.empty) {
          emptyState.classList.remove('hidden');
          loader.classList.add('hidden');
          return;
        }

        let totalUsers = 0;
        let totalPayment = 0;
        let totalSpace = 0;

        querySnapshot.forEach((doc) => {
          const data = doc.data();
          totalUsers++;

          // Extract values safely, default to 0 if null/undefined
          const space = parseFloat(data.spaceUsed) || 0;
          const paymentAmt = parseFloat(data.lastPaymentAmount) || 0;
          
          totalSpace += space;
          totalPayment += paymentAmt;

          // Render Row
          const row = document.createElement('tr');
          
          // Initial for avatar
          const initial = (data.username || data.email || 'U').charAt(0).toUpperCase();
          
          row.innerHTML = `
            <td>
              <div class="user-cell">
                <div class="user-avatar">${initial}</div>
                <div class="user-info">
                  <div>${escapeHtml(data.username || 'Unknown User')}</div>
                </div>
              </div>
            </td>
            <td>${escapeHtml(data.email)}</td>
            <td>
              <div style="display:flex; align-items:center;">
                <div class="space-bar-container">
                  <div class="space-bar-fill" style="width: ${Math.min((space / 100) * 100, 100)}%"></div>
                </div>
                <span>${formatBytes(space)}</span>
              </div>
            </td>
            <td class="text-right">
              ${paymentAmt > 0 ? '$' + paymentAmt.toFixed(2) : '-'}
            </td>
            <td>
              ${data.lastPayment 
                ? `<span class="payment-badge paid">Paid</span> ` + new Date(data.lastPayment).toLocaleDateString() 
                : '<span style="color:#999">No payment</span>'}
            </td>
            <td>
              ${data.lastVisit 
                ? new Date(data.lastVisit).toLocaleString() 
                : 'Never'}
            </td>
          `;
          tableBody.appendChild(row);
        });

        // Render Totals Footer
        renderTotals(totalUsers, totalPayment, totalSpace);

      } catch (error) {
        console.error("Error fetching users:", error);
        showToast("Failed to load user data.");
      } finally {
        loader.classList.add('hidden');
      }
    }

    function renderTotals(count, payment, space) {
      const row = document.createElement('tr');
      row.innerHTML = `
        <td colspan="2" class="total-highlight">TOTAL USERS: ${count}</td>
        <td class="total-highlight">${formatBytes(space)}</td>
        <td class="text-right total-highlight">$${payment.toFixed(2)}</td>
        <td></td>
        <td></td>
      `;
      tableFoot.appendChild(row);
    }

    // ============================================================
    // Utilities
    // ============================================================
    
    // Format bytes to MB/GB for readability
    function formatBytes(bytes, decimals = 2) {
      if (!+bytes) return '0 Bytes';
      const k = 1024;
      const dm = decimals < 0 ? 0 : decimals;
      const sizes = ['Bytes', 'KB', 'MB', 'GB', 'TB'];
      const i = Math.floor(Math.log(bytes) / Math.log(k));
      return `${parseFloat((bytes / Math.pow(k, i)).toFixed(dm))} ${sizes[i]}`;
    }

    // Prevent XSS
    function escapeHtml(text) {
      if (!text) return '';
      return text
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#039;");
    }

    function showToast(message) {
      const container = document.getElementById('toast-container');
      const toast = document.createElement('div');
      toast.className = 'toast';
      toast.textContent = message;
      container.appendChild(toast);
      
      // Trigger animation
      requestAnimationFrame(() => {
        toast.classList.add('show');
      });

      setTimeout(() => {
        toast.classList.remove('show');
        setTimeout(() => toast.remove(), 300);
      }, 3000);
    }

    // Logout Function
    window.handleLogout = async () => {
      try {
        await signOut(auth);
        window.location.href = "index.html";
      } catch (error) {
        console.error("Logout error", error);
        showToast("Error signing out");
      }
    };

    // Initial fetch (triggered by onAuthStateChanged, but exposed for button)
    window.fetchUsers = fetchUsers;
  </script>
</body>
</html>
