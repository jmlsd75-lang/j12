<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Profile Dashboard</title>
    <style>
        /* =========================================
           RESET & TYPOGRAPHY
           ========================================= */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #0f172a; /* Fallback dark blue */
            color: #ffffff;
            height: 100vh;
            width: 100vw;
            overflow: hidden; /* Prevent scrollbars due to animation */
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* =========================================
           BACKGROUND SCENE (FLYOVER & MOVING CAR)
           ========================================= */
        .scene {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: linear-gradient(to bottom, #020024 0%, #090979 35%, #2a2a2a 100%);
            overflow: hidden;
        }

        /* Stars/City lights in distance */
        .stars {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 50%;
            background-image: 
                radial-gradient(white, rgba(255,255,255,.2) 2px, transparent 3px),
                radial-gradient(white, rgba(255,255,255,.15) 1px, transparent 2px),
                radial-gradient(white, rgba(255,255,255,.1) 2px, transparent 3px);
            background-size: 550px 550px, 350px 350px, 250px 250px;
            background-position: 0 0, 40px 60px, 130px 270px;
            animation: starMove 100s linear infinite;
        }

        /* City Skyline (Silhouette) */
        .city {
            position: absolute;
            bottom: 30%; /* Above the road */
            left: 0;
            width: 200%;
            height: 150px;
            background: 
                linear-gradient(to bottom, transparent 0%, #000 100%),
                repeating-linear-gradient(90deg, #000 0px, #000 20px, transparent 20px, transparent 25px),
                repeating-linear-gradient(90deg, #111 0px, #111 40px, #000 40px, #000 60px);
            background-size: 100% 100%, 100px 100%, 150px 100%;
            opacity: 0.6;
            animation: cityMove 60s linear infinite;
        }

        /* Flyover Pillars (Static) */
        .pillars {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 40%;
            display: flex;
            justify-content: space-around;
            align-items: flex-end;
            z-index: 1;
        }

        .pillar {
            width: 60px;
            height: 100%;
            background: linear-gradient(90deg, #1a1a1a, #333, #1a1a1a);
            border-top: 5px solid #555;
            box-shadow: 0 0 20px rgba(0,0,0,0.8);
        }

        /* The Road */
        .road {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 35%; /* Thicker road */
            background: #1c1c1c;
            border-top: 6px solid #444;
            z-index: 2;
            overflow: hidden;
            perspective: 600px;
        }

        /* Road Markings (Moving) */
        .road-lines {
            position: absolute;
            top: 50%;
            left: 0;
            width: 200%;
            height: 4px;
            background: repeating-linear-gradient(90deg, #fff 0, #fff 50px, transparent 50px, transparent 100px);
            transform: translateY(-50%);
            box-shadow: 0 0 10px rgba(255,255,255,0.5);
            animation: roadMove 1s linear infinite;
        }

        /* The Moving Car */
        .car-container {
            position: absolute;
            bottom: 45%; /* On the road */
            left: -300px; /* Start off-screen */
            width: 260px;
            height: 80px;
            z-index: 3;
            animation: driveCar 4s linear infinite;
        }

        .car-body {
            width: 100%;
            height: 50px;
            background: linear-gradient(to bottom, #e74c3c, #c0392b);
            border-radius: 10px 40px 10px 10px; /* Aerodynamic shape */
            position: relative;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }

        .car-roof {
            position: absolute;
            top: -25px;
            left: 50px;
            width: 100px;
            height: 30px;
            background: #2c3e50;
            border-radius: 20px 20px 0 0;
        }

        .window {
            position: absolute;
            top: 5px;
            left: 5px;
            width: 90px;
            height: 20px;
            background: linear-gradient(135deg, #81ecec, #00cec9);
            border-radius: 15px 15px 0 0;
            opacity: 0.8;
        }

        .wheel {
            position: absolute;
            bottom: -15px;
            width: 35px;
            height: 35px;
            background: #222;
            border: 3px solid #555;
            border-radius: 50%;
            animation: wheelSpin 0.5s linear infinite;
        }
        .wheel.front { right: 35px; }
        .wheel.back { left: 35px; }

        .headlights {
            position: absolute;
            right: -5px;
            top: 15px;
            width: 10px;
            height: 20px;
            background: #f1c40f;
            box-shadow: 20px 0 40px 10px rgba(241, 196, 15, 0.6); /* Light beam */
            border-radius: 0 5px 5px 0;
        }

        /* =========================================
           ANIMATIONS
           ========================================= */
        @keyframes roadMove {
            0% { transform: translateY(-50%) translateX(0); }
            100% { transform: translateY(-50%) translateX(-100px); }
        }

        @keyframes driveCar {
            0% { left: -300px; transform: scale(0.8); }
            40% { left: 30%; transform: scale(1); }
            60% { left: 30%; transform: scale(1); } /* Pause briefly */
            100% { left: 110%; transform: scale(0.8); }
        }

        @keyframes wheelSpin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @keyframes starMove {
            from { background-position: 0 0, 40px 60px, 130px 270px; }
            to { background-position: 550px 0, 590px 60px, 680px 270px; }
        }

        @keyframes cityMove {
            from { transform: translateX(0); }
            to { transform: translateX(-50%); }
        }

        /* =========================================
           CONTENT UI (Glassmorphism Card)
           ========================================= */
        .card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            padding: 30px;
            width: 95%; /* Use more width to show table */
            max-width: 1200px; /* Wider card for horizontal data */
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            position: relative;
            z-index: 10;
            animation: cardFadeIn 0.8s ease-out;
            display: flex;
            flex-direction: column;
        }

        @keyframes cardFadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Back Button */
        .back-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: #fff;
            padding: 10px 15px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s ease;
            z-index: 20;
        }

        .back-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateX(-3px);
        }

        .back-icon {
            font-size: 18px;
            line-height: 1;
        }

        /* Table Styling for Horizontal Layout */
        .table-container {
            margin-top: 20px;
            width: 100%;
            overflow-x: auto; /* Allow scrolling on small screens */
            padding-bottom: 10px;
        }

        /* Custom Scrollbar for the table container */
        .table-container::-webkit-scrollbar {
            height: 8px;
        }
        .table-container::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 4px;
        }
        .table-container::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 4px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 1000px; /* Force table to be wide so all data fits */
        }

        th, td {
            text-align: center; /* Center align for horizontal look */
            padding: 15px 10px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            border-right: 1px solid rgba(255, 255, 255, 0.1);
            min-width: 120px; /* Ensure columns don't get too squashed */
        }

        th:last-child, td:last-child {
            border-right: none;
        }

        th {
            color: #a0a0a0;
            font-weight: 700;
            text-transform: uppercase;
            font-size: 0.8rem;
            letter-spacing: 1px;
            background: rgba(0, 0, 0, 0.3);
        }

        /* Make the first column (Field/Value) stand out */
        th:first-child, td:first-child {
            background: rgba(255, 255, 255, 0.05);
            font-weight: bold;
            text-align: left;
            padding-left: 20px;
            min-width: 80px;
            border-right: 2px solid rgba(255,255,255,0.2);
        }

        td {
            font-size: 1rem;
            color: #fff;
            font-family: 'Courier New', monospace; /* Monospace for data feel */
            word-break: break-word;
        }

        tr:last-child th, tr:last-child td {
            border-bottom: none;
        }

        /* Specific styling for values based on type */
        .val-null { color: #ff6b6b; font-style: italic; }
        .val-zero { color: #feca57; }
        .val-date { color: #48dbfb; }

        /* Responsive */
        @media (max-width: 600px) {
            .card {
                padding: 60px 10px 20px 10px; 
                width: 98%;
            }
            .back-btn {
                top: 10px;
                left: 10px;
                padding: 6px 10px;
            }
            .city { height: 80px; bottom: 35%; }
            .road { height: 35%; }
            .car-container { transform: scale(0.7); bottom: 48%; left: -250px; }
            
            th, td {
                font-size: 0.85rem;
                padding: 10px 5px;
            }
        }
    </style>
</head>
<body>

    <!-- 1. The Animated Background -->
    <div class="scene">
        <div class="stars"></div>
        <div class="city"></div>
        
        <div class="pillars">
            <div class="pillar"></div>
            <div class="pillar"></div>
            <div class="pillar"></div>
            <div class="pillar"></div>
            <div class="pillar"></div>
        </div>

        <div class="road">
            <div class="road-lines"></div>
            
            <!-- Moving Car -->
            <div class="car-container">
                <div class="car-body">
                    <div class="car-roof">
                        <div class="window"></div>
                    </div>
                    <div class="headlights"></div>
                    <div class="wheel back"></div>
                    <div class="wheel front"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- 2. The UI Content -->
    <button class="back-btn" onclick="goBack()">
        <span class="back-icon">&lt;</span> Back
    </button>

    <div class="card">
        <div style="margin-bottom: 20px; padding-left: 20px;">
            <h2 style="font-weight: 300; letter-spacing: 1px;">User Data</h2>
            <div style="height: 3px; width: 50px; background: #e74c3c; margin-top: 5px;"></div>
        </div>

        <div class="table-container">
            <!-- Horizontal Table Structure as requested -->
            <table id="userTable">
                <thead>
                    <tr>
                        <th>Field</th>
                        <th>email</th>
                        <th>lastPayment</th>
                        <th>lastPaymentAmount</th>
                        <th>lastVisit</th>
                        <th>spaceUsed</th>
                        <th>username</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td><strong>Value</strong></td>
                        <!-- Data injected via JS -->
                        <td id="d-email">Loading...</td>
                        <td id="d-lastPayment">Loading...</td>
                        <td id="d-lastPaymentAmount">Loading...</td>
                        <td id="d-lastVisit">Loading...</td>
                        <td id="d-spaceUsed">Loading...</td>
                        <td id="d-username">Loading...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- Firebase Logic -->
    <script type="module">
        // ============================================
        // IMPORTS & CONFIG
        // ============================================
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { 
            getAuth, 
            onAuthStateChanged,
            signOut
        } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
        import { 
            getFirestore, 
            doc, 
            onSnapshot 
        } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDpNJIZoLeZUhIoTepbLb_3rRLpseu9Zdo",
            authDomain: "my-project-66803-95cb3.firebaseapp.com",
            projectId: "my-project-66803-95cb3",
            storageBucket: "my-project-66803-95cb3.firebasestorage.app",
            messagingSenderId: "167159607898",
            appId: "1:167159607898:web:23ca11366b88868b085e63"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // ============================================
        // DOM ELEMENTS
        // ============================================
        const elEmail = document.getElementById('d-email');
        const elLastPayment = document.getElementById('d-lastPayment');
        const elLastPaymentAmount = document.getElementById('d-lastPaymentAmount');
        const elLastVisit = document.getElementById('d-lastVisit');
        const elSpaceUsed = document.getElementById('d-spaceUsed');
        const elUsername = document.getElementById('d-username');

        // ============================================
        // HELPERS
        // ============================================
        
        // Format dates to match: "6 April 2026 at 16:12:26 GMT+3 UTC+3"
        function formatDate(value) {
            if (!value) return null;
            
            let dateObj;
            // Check if it's a Firestore Timestamp object
            if (value && typeof value.toDate === 'function') {
                dateObj = value.toDate();
            } else {
                // Assume string or standard Date
                dateObj = new Date(value);
            }

            if (isNaN(dateObj.getTime())) return null; // Invalid date

            // Get parts manually to construct the specific format string
            const day = dateObj.getDate();
            const month = dateObj.toLocaleString('en-GB', { month: 'long' });
            const year = dateObj.getFullYear();
            
            const hours = String(dateObj.getHours()).padStart(2, '0');
            const minutes = String(dateObj.getMinutes()).padStart(2, '0');
            const seconds = String(dateObj.getSeconds()).padStart(2, '0');

            // Timezone string approximation
            const timezone = "GMT+3"; 

            return `${day} ${month} ${year} at ${hours}:${minutes}:${seconds} ${timezone} UTC+3`;
        }

        // ============================================
        // REAL-TIME DATA LOGIC
        // ============================================

        onAuthStateChanged(auth, (user) => {
            if (!user) {
                // Not logged in, redirect to index
                window.location.href = "index.html";
                return;
            }

            // User is logged in. Setup real-time listener for their document.
            // Document ID is user.email
            const userDocRef = doc(db, "users", user.email);

            // onSnapshot listens for real-time changes
            onSnapshot(userDocRef, (docSnap) => {
                if (docSnap.exists()) {
                    const data = docSnap.data();
                    updateTable(data);
                } else {
                    console.error("User document does not exist in Firestore!");
                    // Optional: Create document or redirect
                    alert("User data not found. Please contact support or login again.");
                    window.location.href = "index.html";
                }
            }, (error) => {
                console.error("Error listening to Firestore:", error);
            });
        });

        function updateTable(data) {
            // Email
            elEmail.textContent = data.email || "N/A";

            // Username
            elUsername.textContent = data.username || "Unknown User";

            // Space Used
            elSpaceUsed.textContent = data.spaceUsed !== undefined ? data.spaceUsed : 0;
            if (data.spaceUsed === 0) elSpaceUsed.className = "val-zero";
            else elSpaceUsed.className = "";

            // Last Payment Amount
            elLastPaymentAmount.textContent = data.lastPaymentAmount || 0;
            if ((data.lastPaymentAmount || 0) === 0) elLastPaymentAmount.className = "val-zero";
            else elLastPaymentAmount.className = "";

            // Last Payment (Date or Null)
            if (!data.lastPayment) {
                elLastPayment.textContent = "null";
                elLastPayment.className = "val-null";
            } else {
                const formatted = formatDate(data.lastPayment);
                elLastPayment.textContent = formatted || "Invalid Date";
                elLastPayment.className = "val-date";
            }

            // Last Visit (Date)
            const formattedVisit = formatDate(data.lastVisit);
            elLastVisit.textContent = formattedVisit || "No visit data";
            if(formattedVisit) elLastVisit.className = "val-date";
            else elLastVisit.className = "val-null";
        }

        // ============================================
        // GLOBAL NAVIGATION
        // ============================================
        window.goBack = async function() {
            // Optional: Sign out if you want "Back" to log them out completely
            // await signOut(auth); 
            
            // Or just go back in history
            if (window.history.length > 1) {
                window.history.back();
            } else {
                window.location.href = "index.html";
            }
        };
    </script>
</body>
</html>
