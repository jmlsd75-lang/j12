<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Profile Dashboard</title>
    <style>
        /* =========================================
           RESET & TYPOGRAPHY
           ========================================= */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #0f172a; /* Fallback dark blue */
            color: #ffffff;
            height: 100vh;
            width: 100vw;
            overflow: hidden; /* Prevent scrollbars due to animation */
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* =========================================
           BACKGROUND SCENE (FLYOVER & MOVING CAR)
           ========================================= */
        .scene {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: linear-gradient(to bottom, #020024 0%, #090979 35%, #2a2a2a 100%);
            overflow: hidden;
        }

        /* Stars/City lights in distance */
        .stars {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 50%;
            background-image: 
                radial-gradient(white, rgba(255,255,255,.2) 2px, transparent 3px),
                radial-gradient(white, rgba(255,255,255,.15) 1px, transparent 2px),
                radial-gradient(white, rgba(255,255,255,.1) 2px, transparent 3px);
            background-size: 550px 550px, 350px 350px, 250px 250px;
            background-position: 0 0, 40px 60px, 130px 270px;
            animation: starMove 100s linear infinite;
        }

        /* City Skyline (Silhouette) */
        .city {
            position: absolute;
            bottom: 30%; /* Above the road */
            left: 0;
            width: 200%;
            height: 150px;
            background: 
                linear-gradient(to bottom, transparent 0%, #000 100%),
                repeating-linear-gradient(90deg, #000 0px, #000 20px, transparent 20px, transparent 25px),
                repeating-linear-gradient(90deg, #111 0px, #111 40px, #000 40px, #000 60px);
            background-size: 100% 100%, 100px 100%, 150px 100%;
            opacity: 0.6;
            animation: cityMove 60s linear infinite;
        }

        /* Flyover Pillars (Static) */
        .pillars {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 40%;
            display: flex;
            justify-content: space-around;
            align-items: flex-end;
            z-index: 1;
        }

        .pillar {
            width: 60px;
            height: 100%;
            background: linear-gradient(90deg, #1a1a1a, #333, #1a1a1a);
            border-top: 5px solid #555;
            box-shadow: 0 0 20px rgba(0,0,0,0.8);
        }

        /* The Road */
        .road {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 35%; /* Thicker road */
            background: #1c1c1c;
            border-top: 6px solid #444;
            z-index: 2;
            overflow: hidden;
            perspective: 600px;
        }

        /* Road Markings (Moving) */
        .road-lines {
            position: absolute;
            top: 50%;
            left: 0;
            width: 200%;
            height: 4px;
            background: repeating-linear-gradient(90deg, #fff 0, #fff 50px, transparent 50px, transparent 100px);
            transform: translateY(-50%);
            box-shadow: 0 0 10px rgba(255,255,255,0.5);
            animation: roadMove 1s linear infinite;
        }

        /* The Moving Car */
        .car-container {
            position: absolute;
            bottom: 45%; /* On the road */
            left: -300px; /* Start off-screen */
            width: 260px;
            height: 80px;
            z-index: 3;
            animation: driveCar 4s linear infinite;
        }

        .car-body {
            width: 100%;
            height: 50px;
            background: linear-gradient(to bottom, #e74c3c, #c0392b);
            border-radius: 10px 40px 10px 10px; /* Aerodynamic shape */
            position: relative;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }

        .car-roof {
            position: absolute;
            top: -25px;
            left: 50px;
            width: 100px;
            height: 30px;
            background: #2c3e50;
            border-radius: 20px 20px 0 0;
        }

        .window {
            position: absolute;
            top: 5px;
            left: 5px;
            width: 90px;
            height: 20px;
            background: linear-gradient(135deg, #81ecec, #00cec9);
            border-radius: 15px 15px 0 0;
            opacity: 0.8;
        }

        .wheel {
            position: absolute;
            bottom: -15px;
            width: 35px;
            height: 35px;
            background: #222;
            border: 3px solid #555;
            border-radius: 50%;
            animation: wheelSpin 0.5s linear infinite;
        }
        .wheel.front { right: 35px; }
        .wheel.back { left: 35px; }

        .headlights {
            position: absolute;
            right: -5px;
            top: 15px;
            width: 10px;
            height: 20px;
            background: #f1c40f;
            box-shadow: 20px 0 40px 10px rgba(241, 196, 15, 0.6); /* Light beam */
            border-radius: 0 5px 5px 0;
        }

        /* =========================================
           ANIMATIONS
           ========================================= */
        @keyframes roadMove {
            0% { transform: translateY(-50%) translateX(0); }
            100% { transform: translateY(-50%) translateX(-100px); }
        }

        @keyframes driveCar {
            0% { left: -300px; transform: scale(0.8); }
            40% { left: 30%; transform: scale(1); }
            60% { left: 30%; transform: scale(1); } /* Pause briefly */
            100% { left: 110%; transform: scale(0.8); }
        }

        @keyframes wheelSpin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @keyframes starMove {
            from { background-position: 0 0, 40px 60px, 130px 270px; }
            to { background-position: 550px 0, 590px 60px, 680px 270px; }
        }

        @keyframes cityMove {
            from { transform: translateX(0); }
            to { transform: translateX(-50%); }
        }

        /* =========================================
           CONTENT UI (Glassmorphism Card)
           ========================================= */
        .card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            padding: 30px;
            width: 90%;
            max-width: 800px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            position: relative;
            z-index: 10;
            animation: cardFadeIn 0.8s ease-out;
        }

        @keyframes cardFadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Back Button */
        .back-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: #fff;
            padding: 10px 15px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s ease;
            z-index: 20;
        }

        .back-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateX(-3px);
        }

        .back-icon {
            font-size: 18px;
            line-height: 1;
        }

        /* Table Styling */
        .table-container {
            overflow-x: auto;
            margin-top: 20px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 600px; /* Ensure horizontal scroll on mobile */
        }

        th, td {
            text-align: left;
            padding: 16px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.15);
        }

        th {
            color: #a0a0a0;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 1px;
            background: rgba(0, 0, 0, 0.2);
        }

        td {
            font-size: 1rem;
            color: #fff;
            font-family: 'Courier New', monospace; /* Monospace for data feel */
        }

        tr:last-child th, tr:last-child td {
            border-bottom: none;
        }

        tr:hover td {
            background: rgba(255, 255, 255, 0.05);
            transition: background 0.2s;
        }

        /* Specific styling for values based on type */
        .val-null { color: #ff6b6b; font-style: italic; }
        .val-zero { color: #feca57; }
        .val-date { color: #48dbfb; }

        /* Responsive */
        @media (max-width: 600px) {
            .card {
                padding: 50px 15px 20px 15px; /* Top padding for button */
            }
            .back-btn {
                top: 10px;
                left: 10px;
                padding: 8px 12px;
            }
            th, td {
                padding: 12px 8px;
                font-size: 0.9rem;
            }
            .city { height: 80px; bottom: 35%; }
            .road { height: 35%; }
            .car-container { transform: scale(0.7); bottom: 48%; left: -250px; }
        }
    </style>
</head>
<body>

    <!-- 1. The Animated Background -->
    <div class="scene">
        <div class="stars"></div>
        <div class="city"></div>
        
        <div class="pillars">
            <div class="pillar"></div>
            <div class="pillar"></div>
            <div class="pillar"></div>
            <div class="pillar"></div>
            <div class="pillar"></div>
        </div>

        <div class="road">
            <div class="road-lines"></div>
            
            <!-- Moving Car -->
            <div class="car-container">
                <div class="car-body">
                    <div class="car-roof">
                        <div class="window"></div>
                    </div>
                    <div class="headlights"></div>
                    <div class="wheel back"></div>
                    <div class="wheel front"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- 2. The UI Content -->
    <button class="back-btn" onclick="goBack()">
        <span class="back-icon">&lt;</span> Back
    </button>

    <div class="card">
        <div style="margin-bottom: 20px;">
            <h2 style="font-weight: 300; letter-spacing: 1px;">User Data</h2>
            <div style="height: 3px; width: 50px; background: #e74c3c; margin-top: 5px;"></div>
        </div>

        <div class="table-container">
            <!-- The Modified Table: Rotated 90° logic applied (Fields as headers) -->
            <table id="userTable">
                <thead>
                    <tr>
                        <th>Field</th>
                        <th>email</th>
                        <th>lastPayment</th>
                        <th>lastPaymentAmount</th>
                        <th>lastVisit</th>
                        <th>spaceUsed</th>
                        <th>username</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td><strong>Value</strong></td>
                        <!-- Data injected via JS -->
                        <td id="d-email">Loading...</td>
                        <td id="d-lastPayment">Loading...</td>
                        <td id="d-lastPaymentAmount">Loading...</td>
                        <td id="d-lastVisit">Loading...</td>
                        <td id="d-spaceUsed">Loading...</td>
                        <td id="d-username">Loading...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        // ============================================
        // LOGIC: Fetch Data & Populate Table
        // ============================================

        // 1. Helper to format dates nicely (matches prompt example style)
        function formatDate(isoString) {
            if (!isoString) return null;
            const date = new Date(isoString);
            return date.toLocaleString('en-GB', {
                day: 'numeric',
                month: 'long',
                year: 'numeric',
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit',
                timeZoneName: 'short'
            }) + " UTC+3"; // Hardcoding UTC+3 as per prompt example
        }

        // 2. The Data from the prompt (Fallback/Default)
        const staticData = {
            email: "camelkazembe1@gmail.com",
            lastPayment: null,
            lastPaymentAmount: 0,
            lastVisit: "2026-04-06T16:10:06.000Z", // Approximate for the date in prompt
            spaceUsed: 0,
            username: "Camel Kazembe"
        };

        // 3. Function to populate table
        function renderTable(data) {
            // Email
            document.getElementById('d-email').textContent = data.email;

            // Last Payment
            const lpEl = document.getElementById('d-lastPayment');
            if (data.lastPayment === null) {
                lpEl.textContent = "null";
                lpEl.className = "val-null";
            } else {
                lpEl.textContent = data.lastPayment;
            }

            // Last Payment Amount
            const lpaEl = document.getElementById('d-lastPaymentAmount');
            lpaEl.textContent = data.lastPaymentAmount;
            if (data.lastPaymentAmount === 0) lpaEl.className = "val-zero";

            // Last Visit
            const lvEl = document.getElementById('d-lastVisit');
            // If we have the exact string from prompt, use it, otherwise format
            if (typeof data.lastVisit === 'string' && data.lastVisit.includes('6 April 2026')) {
                 lvEl.textContent = data.lastVisit; // Use exact string if present
                 lvEl.className = "val-date";
            } else {
                const formatted = formatDate(data.lastVisit);
                lvEl.textContent = formatted ? formatted : "null";
                if(formatted) lvEl.className = "val-date";
            }

            // Space Used
            const suEl = document.getElementById('d-spaceUsed');
            suEl.textContent = data.spaceUsed;
            if (data.spaceUsed === 0) suEl.className = "val-zero";

            // Username
            document.getElementById('d-username').textContent = data.username;
        }

        // 4. Initialization logic
        document.addEventListener('DOMContentLoaded', () => {
            // A. Try to get data from LocalStorage (set by your login.js)
            const session = localStorage.getItem('userSession');
            let userData = staticData; // Default to prompt data

            if (session) {
                try {
                    const parsed = JSON.parse(session);
                    // Map login.js keys to our table keys if needed, 
                    // but they match perfectly based on your login.js code.
                    userData = {
                        email: parsed.email,
                        lastPayment: parsed.lastPayment,
                        lastPaymentAmount: parsed.lastPaymentAmount,
                        lastVisit: parsed.lastVisit, // login.js sets this as ISO string usually
                        spaceUsed: parsed.spaceUsed,
                        username: parsed.username
                    };
                    
                    // Special handling: If the login.js just created a new user, 
                    // lastVisit might be an ISO string. 
                    // For the demo effect requested, if it is 2026, keep it, 
                    // otherwise the staticData is better for the visual "preview".
                    
                    // To strictly follow "use it" (the prompt data) while supporting login:
                    // We will use the session data if it exists and has valid fields.
                    
                } catch (e) {
                    console.error("Session parse error, using static data", e);
                }
            } else {
                console.log("No session found, displaying demo data from prompt.");
            }

            // If we want to force the Prompt's specific "6 April 2026" date for visual consistency 
            // with the request, we can override it here if the session doesn't have it.
            // But typically, we want real data. 
            // However, the prompt says: "Table data: ... use it".
            // I will prioritize the Session, but if the session is empty, I use the static.
            
            renderTable(userData);
        });

        // 5. Navigation
        function goBack() {
            // Simply go back in history
            if (window.history.length > 1) {
                window.history.back();
            } else {
                // If no history, maybe go to index or do nothing
                console.log("No history to go back to");
                // Fallback for a standalone file test:
                // window.location.href = 'index.html'; 
            }
        }
    </script>
</body>
</html>
