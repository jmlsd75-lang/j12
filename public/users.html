<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Table</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --forest-900: #0B1F0E;
            --forest-800: #143319;
            --forest-700: #1E4D27;
            --forest-600: #266B32;
            --forest-500: #2E8B3E;
            --forest-400: #3DA854;
            --forest-300: #6BC47E;
            --forest-200: #A3DBA9;
            --forest-100: #D4EDD6;
            --forest-50:  #EDF7EE;
            --bark-900: #2C1810;
            --bark-700: #5C3A28;
            --bark-500: #8B6544;
            --bark-300: #C4A67D;
            --bark-100: #EDE0CC;
            --moss-500: #5B7553;
            --moss-300: #8FA888;
            --moss-100: #D5E4D2;
            --cream: #FAFDF5;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--cream);
            color: var(--forest-900);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .table-wrapper {
            width: 100%;
            max-width: 1100px;
            background: white;
            border-radius: 16px;
            overflow: hidden;
            box-shadow:
                0 1px 3px rgba(11,31,14,0.06),
                0 8px 24px rgba(11,31,14,0.08),
                0 24px 48px rgba(11,31,14,0.04);
            border: 1px solid var(--forest-100);
        }

        .table-header {
            background: var(--forest-800);
            padding: 1.25rem 2rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .back-btn {
            width: 32px; height: 32px;
            border-radius: 8px;
            background: var(--forest-700);
            border: none;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: background 150ms;
            flex-shrink: 0;
            text-decoration: none;
        }
        .back-btn:hover { background: var(--forest-500); }
        .back-btn svg {
            width: 16px; height: 16px; stroke: white; fill: none;
            stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round;
        }

        .table-header-icon {
            width: 36px; height: 36px;
            background: var(--forest-600);
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
        }
        .table-header-icon svg {
            width: 18px; height: 18px; stroke: white; fill: none; stroke-width: 2;
        }

        .table-header h1 {
            color: var(--forest-100);
            font-size: 1.1rem;
            font-weight: 600;
            letter-spacing: -0.01em;
        }

        .live-dot {
            width: 8px; height: 8px; border-radius: 50%;
            background: var(--forest-400);
            animation: pulse 2s ease-in-out infinite;
            flex-shrink: 0;
        }
        .live-dot.offline { background: var(--bark-300); animation: none; }
        .live-dot.waiting { background: var(--bark-300); animation: none; }

        @keyframes pulse {
            0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(61,168,84,0.5); }
            50% { opacity: 0.7; box-shadow: 0 0 0 6px rgba(61,168,84,0); }
        }

        .table-header .badge {
            margin-left: auto;
            background: var(--forest-600);
            color: white;
            font-size: 0.75rem;
            font-weight: 600;
            padding: 0.25rem 0.75rem;
            border-radius: 999px;
        }
        .table-header .badge.error-badge { background: #7F1D1D; }

        .table-scroll { overflow-x: auto; }

        table { width: 100%; border-collapse: collapse; min-width: 750px; }

        thead th {
            background: var(--forest-50);
            color: var(--forest-700);
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            padding: 0.85rem 1.5rem;
            text-align: left;
            border-bottom: 2px solid var(--forest-200);
            white-space: nowrap;
        }
        thead th:last-child { text-align: right; }

        tbody tr {
            border-bottom: 1px solid var(--moss-100);
            transition: background 150ms ease;
        }
        tbody tr:hover { background: var(--forest-50); }
        tbody tr:last-child { border-bottom: none; }
        tbody tr.row-flash { animation: rowHighlight 1.5s ease-out; }

        @keyframes rowHighlight {
            0% { background: rgba(61,168,84,0.2); }
            100% { background: transparent; }
        }

        tbody td {
            padding: 0.9rem 1.5rem;
            font-size: 0.875rem;
            color: var(--forest-900);
            vertical-align: middle;
        }
        tbody td:last-child {
            text-align: right;
            font-variant-numeric: tabular-nums;
        }

        td .email { color: var(--forest-800); font-weight: 500; }
        td .username { color: var(--forest-600); font-weight: 500; }
        td .visit { color: var(--moss-500); font-size: 0.82rem; }
        td .visit-time { color: var(--moss-300); font-size: 0.75rem; }
        td .payment-date { color: var(--forest-800); font-weight: 500; }
        td .payment-amount { color: var(--forest-500); font-size: 0.78rem; font-weight: 600; }
        td .dash { color: var(--moss-300); font-size: 0.82rem; }

        tfoot tr { background: var(--forest-800); }
        tfoot td {
            padding: 1rem 1.5rem;
            font-size: 0.875rem;
            color: var(--forest-200);
            font-weight: 500;
            border: none;
        }
        tfoot td:last-child {
            text-align: right;
            color: #FFFFFF;
            font-size: 1rem;
            font-weight: 700;
            font-variant-numeric: tabular-nums;
        }
        tfoot td.total-label {
            color: var(--forest-300);
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            font-weight: 600;
        }

        .space-cell { display: flex; align-items: center; gap: 0.75rem; }
        .space-num {
            min-width: 52px; text-align: right;
            font-variant-numeric: tabular-nums;
            font-weight: 600; color: var(--forest-800);
        }
        .space-bar-wrap {
            flex: 1; height: 6px; background: var(--moss-100);
            border-radius: 3px; overflow: hidden; min-width: 60px;
        }
        .space-bar {
            height: 100%; border-radius: 3px;
            background: var(--forest-400);
            transition: width 600ms cubic-bezier(0.4,0,0.2,1);
        }
        .space-bar.high { background: var(--bark-500); }
        .space-bar.warn { background: var(--bark-300); }

        .row-num {
            width: 24px; height: 24px; border-radius: 6px;
            background: var(--forest-50); color: var(--forest-500);
            font-size: 0.7rem; font-weight: 700;
            display: inline-flex; align-items: center; justify-content: center;
        }

        /* States */
        .state-wrap {
            display: none; flex-direction: column;
            align-items: center; justify-content: center;
            padding: 3rem 2rem; gap: 0.75rem; text-align: center;
        }
        .state-wrap.visible { display: flex; }
        .state-wrap.pad-lg { padding: 4rem 2rem; gap: 1rem; }

        .spinner {
            width: 32px; height: 32px;
            border: 3px solid var(--forest-100);
            border-top-color: var(--forest-500);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loading-text { font-size: 0.82rem; color: var(--moss-500); }

        .error-icon {
            width: 40px; height: 40px; border-radius: 50%;
            background: #FEE2E2; display: flex; align-items: center; justify-content: center;
        }
        .error-icon svg { width: 20px; height: 20px; stroke: #EF4444; fill: none; stroke-width: 2; }
        .error-title { font-size: 0.9rem; font-weight: 600; color: var(--forest-900); }
        .error-msg { font-size: 0.8rem; color: var(--moss-500); max-width: 400px; line-height: 1.5; }

        .empty-icon {
            width: 48px; height: 48px; border-radius: 50%;
            background: var(--forest-50); display: flex; align-items: center; justify-content: center;
        }
        .empty-icon svg { width: 22px; height: 22px; stroke: var(--moss-300); fill: none; stroke-width: 1.5; }
        .empty-text { font-size: 0.85rem; color: var(--moss-500); }

        @media (max-width: 640px) {
            body { padding: 1rem; }
            .table-header { padding: 1rem 1.25rem; }
            thead th, tbody td, tfoot td { padding: 0.75rem 1rem; }
        }
    </style>
</head>
<body>

    <div class="table-wrapper">
        <div class="table-header">
            <a href="admin.html" class="back-btn" title="Back to admin">
                <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
            </a>
            <div class="table-header-icon">
                <svg viewBox="0 0 24 24"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
            </div>
            <h1>User Records</h1>
            <div class="live-dot waiting" id="liveDot"></div>
            <span class="badge" id="userCount">…</span>
        </div>

        <div class="table-scroll">

            <!-- Loading -->
            <div class="state-wrap pad-lg visible" id="loadingState">
                <div class="spinner"></div>
                <span class="loading-text">Loading users…</span>
            </div>

            <!-- Error -->
            <div class="state-wrap" id="errorState">
                <div class="error-icon">
                    <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>
                </div>
                <span class="error-title">Failed to load users</span>
                <span class="error-msg" id="errorMsg"></span>
            </div>

            <!-- Empty -->
            <div class="state-wrap" id="emptyState">
                <div class="empty-icon">
                    <svg viewBox="0 0 24 24"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="19" y1="8" x2="19" y2="14"/><line x1="22" y1="11" x2="16" y2="11"/></svg>
                </div>
                <span class="empty-text">No users found in the "users" collection</span>
            </div>

            <!-- Table -->
            <table id="userTable" style="display:none;">
                <thead>
                    <tr>
                        <th>#</th>
                        <th>Email</th>
                        <th>Username</th>
                        <th>Space Used (MB)</th>
                        <th>Last Visit</th>
                        <th>Last Payment</th>
                    </tr>
                </thead>
                <tbody id="tbody"></tbody>
                <tfoot>
                    <tr>
                        <td colspan="3" class="total-label">Totals</td>
                        <td class="total-label" id="totalSpace"></td>
                        <td class="total-label" id="totalVisits"></td>
                        <td id="totalPayments"></td>
                    </tr>
                </tfoot>
            </table>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getFirestore, collection, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        const firebaseConfig = {
            apiKey:            "AIzaSyDpNJIZoLeZUhIoTepbLb_3rRLpseu9Zdo",
            authDomain:        "my-project-66803-95cb3.firebaseapp.com",
            projectId:         "my-project-66803-95cb3",
            storageBucket:     "my-project-66803-95cb3.firebasestorage.app",
            messagingSenderId: "167159607898",
            appId:             "1:167159607898:web:23ca11366b88868b085e63"
        };

        const app = initializeApp(firebaseConfig);
        const db  = getFirestore(app);

        /* DOM */
        const loadingState = document.getElementById("loadingState");
        const errorState   = document.getElementById("errorState");
        const emptyState   = document.getElementById("emptyState");
        const userTable    = document.getElementById("userTable");
        const tbody        = document.getElementById("tbody");
        const userCountEl  = document.getElementById("userCount");
        const totalSpaceEl = document.getElementById("totalSpace");
        const totalVisitsEl= document.getElementById("totalVisits");
        const totalPayEl   = document.getElementById("totalPayments");
        const errorMsgEl   = document.getElementById("errorMsg");
        const liveDot      = document.getElementById("liveDot");

        const MAX_SPACE = 1024;
        let previousData = {};

        function show(key) {
            [loadingState, errorState, emptyState].forEach(el => el.classList.remove("visible"));
            userTable.style.display = "none";
            userCountEl.classList.remove("error-badge");
            if (key === "error") userCountEl.classList.add("error-badge");
            if (key === "loading") loadingState.classList.add("visible");
            if (key === "error")   errorState.classList.add("visible");
            if (key === "empty")   emptyState.classList.add("visible");
            if (key === "table")   userTable.style.display = "table";
        }

        /* ── Field helpers ── */
        function pick(obj, ...keys) {
            if (!obj || typeof obj !== "object") return undefined;
            for (const k of keys) {
                const v = obj[k];
                if (v !== undefined && v !== null && v !== "") return v;
            }
            return undefined;
        }

        function hasVal(v) {
            if (v === undefined || v === null) return false;
            if (typeof v === "string" && v.trim() === "") return false;
            if (typeof v === "number" && v === 0) return false;
            return true;
        }

        function toNum(v) {
            if (v === undefined || v === null) return 0;
            if (typeof v === "number") return isNaN(v) ? 0 : v;
            const n = parseFloat(String(v).replace(/[^0-9.\-]/g, ""));
            return isNaN(n) ? 0 : n;
        }

        function fmtDate(d) {
            if (!d || !(d instanceof Date) || isNaN(d.getTime())) return null;
            const m = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
            return m[d.getMonth()] + " " + d.getDate() + ", " + d.getFullYear();
        }

        function toDate(raw) {
            if (!raw) return null;
            /* Firestore Timestamp object */
            if (typeof raw === "object" && typeof raw.toDate === "function") {
                try { return raw.toDate(); } catch { return null; }
            }
            /* Raw { seconds, nanoseconds } */
            if (typeof raw === "object" && typeof raw.seconds === "number") {
                try { return new Date(raw.seconds * 1000 + (raw.nanoseconds || 0) / 1e6); } catch { return null; }
            }
            /* String */
            if (typeof raw === "string") {
                const d = new Date(raw.trim());
                return isNaN(d.getTime()) ? null : d;
            }
            /* Number (epoch ms) */
            if (typeof raw === "number") {
                const d = new Date(raw);
                return isNaN(d.getTime()) ? null : d;
            }
            return null;
        }

        function fmtDateRaw(raw) { return fmtDate(toDate(raw)); }

        function fmtVisit(raw) {
            const d = toDate(raw);
            if (!d) return { date: null, time: null };
            let time = null;
            try { time = d.toLocaleTimeString("en-US", { hour: "2-digit", minute: "2-digit" }); } catch {}
            return { date: fmtDate(d), time };
        }

        const DASH = '<span class="dash">\u2014</span>';

        function dataHash(u) {
            return JSON.stringify({
                e: pick(u, "email","mail","userEmail"),
                n: pick(u, "username","displayName","name","userName","nick"),
                s: pick(u, "spaceUsed","space","storage","storageUsed","usedSpace","diskUsage"),
                v: pick(u, "lastVisit","lastVisitMenu","lastLogin","lastActive","lastSeen"),
                pd: pick(u, "lastPayment","paymentDate","paidAt","lastPaidAt","paymentAt"),
                pa: pick(u, "lastPaymentAmount","amount","paymentAmount","paidAmount","totalPaid","lastAmount"),
            });
        }

        /* ── Render ── */
        function renderTable(users) {
            tbody.innerHTML = "";
            let totalSpace = 0, paidCount = 0, totalPaid = 0;

            users.forEach((u, i) => {
                try {
                    const email    = pick(u, "email","mail","userEmail") || "\u2014";
                    const username = pick(u, "username","displayName","name","userName","nick") || "\u2014";

                    /* Space */
                    const spaceRaw = pick(u, "spaceUsed","space","storage","storageUsed","usedSpace","diskUsage");
                    const space = toNum(spaceRaw);
                    let spaceHtml;
                    if (!hasVal(spaceRaw)) {
                        spaceHtml = DASH;
                    } else {
                        const pct = Math.min(Math.round((space / MAX_SPACE) * 100), 100);
                        const cls = pct >= 85 ? "high" : pct >= 60 ? "warn" : "";
                        spaceHtml = `<div class="space-cell">
                            <span class="space-num">${space.toLocaleString()}</span>
                            <div class="space-bar-wrap"><div class="space-bar ${cls}" style="width:${pct}%"></div></div>
                        </div>`;
                    }

                    /* Visit */
                    const visitRaw = pick(u, "lastVisit","lastVisitMenu","lastLogin","lastActive","lastSeen");
                    let visitHtml;
                    if (!hasVal(visitRaw)) {
                        visitHtml = DASH;
                    } else {
                        const { date: vd, time: vt } = fmtVisit(visitRaw);
                        visitHtml = !vd ? DASH : `<div class="visit">${vd}</div>${vt ? `<div class="visit-time">${vt}</div>` : ""}`;
                    }

                    /* Payment */
                    const payDateRaw = pick(u, "lastPayment","paymentDate","paidAt","lastPaidAt","paymentAt");
                    const amtRaw     = pick(u, "lastPaymentAmount","amount","paymentAmount","paidAmount","totalPaid","lastAmount");
                    const payDate    = fmtDateRaw(payDateRaw);
                    const amt        = toNum(amtRaw);
                    const hasPay     = payDate !== null && amt > 0;
                    const payHtml    = hasPay
                        ? `<div class="payment-date">${payDate}</div><div class="payment-amount">$${amt.toFixed(2)}</div>`
                        : DASH;

                    /* Flash on change */
                    const hash    = dataHash(u);
                    const changed = previousData[u.id] && previousData[u.id] !== hash;
                    previousData[u.id] = hash;

                    const tr = document.createElement("tr");
                    if (changed) tr.classList.add("row-flash");
                    tr.innerHTML = `
                        <td><span class="row-num">${i + 1}</span></td>
                        <td><span class="email">${email}</span></td>
                        <td><span class="username">${username}</span></td>
                        <td>${spaceHtml}</td>
                        <td>${visitHtml}</td>
                        <td>${payHtml}</td>`;
                    tbody.appendChild(tr);

                    totalSpace += space;
                    if (hasPay) { paidCount++; totalPaid += amt; }
                } catch (err) {
                    console.warn("Skipped bad doc:", u.id, err);
                }
            });

            totalSpaceEl.textContent  = totalSpace.toLocaleString() + " MB";
            totalVisitsEl.textContent = users.length + " user" + (users.length !== 1 ? "s" : "");
            totalPayEl.textContent    = paidCount > 0
                ? "$" + totalPaid.toFixed(2) + " (" + paidCount + "/" + users.length + ")"
                : "\u2014";
            userCountEl.textContent   = users.length + " user" + (users.length !== 1 ? "s" : "");
        }

        /* ── Fetch immediately — Firebase SDK attaches auth token automatically ── */
        show("loading");
        liveDot.className = "live-dot waiting";

        let q;
        try {
            q = query(collection(db, "users"), orderBy("email", "asc"));
        } catch (err) {
            errorMsgEl.textContent = "Query error: " + (err.message || err);
            show("error");
            userCountEl.textContent = "Error";
            liveDot.className = "live-dot offline";
        }

        if (q) {
            onSnapshot(q, (snap) => {
                liveDot.className = "live-dot";

                if (snap.empty) {
                    show("empty");
                    userCountEl.textContent = "0 users";
                    return;
                }

                renderTable(snap.docs.map(d => ({ id: d.id, ...d.data() })));
                show("table");

            }, (err) => {
                console.error("Snapshot error:", err);
                liveDot.className = "live-dot offline";

                const msgs = {
                    "permission-denied":  "Permission denied \u2014 Firestore rules blocked this request.",
                    "not-found":          "The \"users\" collection does not exist yet.",
                    "resource-exhausted": "Firestore quota exceeded. Try again later.",
                };
                errorMsgEl.textContent = msgs[err.code] || (err.message || "Unknown error");
                show("error");
                userCountEl.textContent = "Error";
            });
        }
    </script>
</body>
</html>
