<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Transaction List</title>
    <style>
        /* --- RESET & BASE --- */
        :root {
            --primary-color: #1e3c24; /* Forest Dark */
            --accent-color: #4caf50;
            --text-color: #e8f5e9; /* Light text for dark forest */
            --panel-bg: rgba(255, 255, 255, 0.92);
            --panel-text: #1e3c24;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
            color: var(--text-color);
        }

        /* --- FOREST THEME --- */
        #scene {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 0;
            background: linear-gradient(to bottom, #0d1f12 0%, #1b3d16 60%, #2d5a27 100%);
            overflow: hidden;
        }

        /* Trees */
        .tree-layer {
            position: absolute; bottom: 0; width: 100%; height: 100%;
            pointer-events: none;
        }
        .tree {
            position: absolute; bottom: 0;
            width: 0; height: 0;
            border-left: 30px solid transparent;
            border-right: 30px solid transparent;
            border-bottom: 150px solid #0f2b0b;
            filter: drop-shadow(0 0 10px rgba(0,0,0,0.5));
        }
        .tree::after {
            content: ''; position: absolute; top: 150px; left: -5px;
            width: 10px; height: 20px; background: #3e2723;
        }
        .t1 { transform: scale(1.2); z-index: 1; opacity: 0.8; left: 5%; }
        .t2 { transform: scale(0.9); z-index: 2; left: 25%; }
        .t3 { transform: scale(1.5); z-index: 1; opacity: 0.7; left: 50%; }
        .t4 { transform: scale(1.1); z-index: 2; left: 75%; }
        .t5 { transform: scale(0.8); z-index: 3; left: 90%; }

        /* --- UI CONTAINER --- */
        #ui-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 10; display: flex; flex-direction: column;
            justify-content: center; align-items: center; pointer-events: none;
        }

        .panel {
            background: var(--panel-bg); padding: 20px; border-radius: 12px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5); text-align: center;
            max-width: 95%; width: 1000px; pointer-events: auto;
            max-height: 90vh; display: flex; flex-direction: column;
            color: var(--panel-text);
        }

        h1 {
            margin-bottom: 20px; color: var(--primary-color);
            border-bottom: 2px solid var(--accent-color);
            padding-bottom: 10px; display: inline-block;
        }

        /* --- TABLE STYLES --- */
        .table-container {
            overflow-y: auto;
            flex-grow: 1;
            border: 1px solid #ccc;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        table {
            width: 100%; border-collapse: collapse; font-size: 0.95rem;
        }

        thead {
            position: sticky; top: 0;
            background-color: var(--primary-color); color: white;
            z-index: 5;
        }

        th, td {
            padding: 12px 15px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }

        th { font-weight: 600; letter-spacing: 0.5px; }

        tbody tr:nth-child(even) { background-color: #f1f8e9; }
        tbody tr:hover { background-color: #dcedc8; }

        /* Column Widths */
        .col-sno { width: 50px; text-align: center; }
        .col-date { width: 150px; }
        .col-amt { width: 100px; text-align: right; font-weight: bold; }
        .col-flow { width: 70px; text-align: center; font-weight: bold; }
        .col-actions { width: 130px; text-align: center; } /* New Actions Column */

        .flow-in { color: #2e7d32; }
        .flow-out { color: #c62828; }

        .empty-msg {
            padding: 20px; color: #666; font-style: italic;
        }

        /* --- BUTTON STYLES --- */
        .btn-group { display: flex; gap: 15px; justify-content: center; margin-top: auto; }
        
        button {
            padding: 10px 25px; font-size: 1rem; border: none; border-radius: 6px;
            cursor: pointer; transition: all 0.2s; font-weight: bold;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
        }
        
        .btn-home { background-color: var(--primary-color); color: white; }
        .btn-home:hover { background-color: var(--accent-color); transform: translateY(-2px); }

        /* Action Buttons (Edit/Delete) */
        .btn-action {
            padding: 5px 10px;
            font-size: 0.8rem;
            margin: 0 3px;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            text-decoration: none; /* Just in case */
            display: inline-block;
        }
        .btn-edit { background-color: #2196F3; } /* Blue */
        .btn-edit:hover { background-color: #1976D2; }

        .btn-delete { background-color: #f44336; } /* Red */
        .btn-delete:hover { background-color: #d32f2f; }

    </style>
</head>
<body>

    <!-- FOREST SCENE -->
    <div id="scene">
        <div class="tree-layer">
            <div class="tree t1"></div>
            <div class="tree t2"></div>
            <div class="tree t3"></div>
            <div class="tree t4"></div>
            <div class="tree t5"></div>
        </div>
    </div>

    <!-- UI LAYER -->
    <main id="ui-layer">
        <div class="panel">
            <h1>Master Transaction List</h1>
            
            <div class="table-container">
                <table id="master-table">
                    <thead>
                        <tr>
                            <th class="col-sno">S.No</th>
                            <th class="col-date">Date</th>
                            <th>Detail</th>
                            <th>Cash / Credit / Bank</th>
                            <th class="col-flow">In / Out</th>
                            <th>Name / Blank</th>
                            <th class="col-amt">Amount</th>
                            <th class="col-actions">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="table-body">
                        <!-- Rows will be injected here via JS -->
                    </tbody>
                </table>
                <div id="empty-msg" class="empty-msg">No transactions found. Please add transactions in the main tool.</div>
            </div>

            <div class="btn-group">
                <button class="btn-home" onclick="goToHome()">Back to Input Tool</button>
            </div>
        </div>
    </main>

    <script>
        // --- LOAD DATA ---
        const STORAGE_KEY = 'businessTransactions';
        let transactions = [];

        function loadData() {
            const savedData = localStorage.getItem(STORAGE_KEY);
            if (savedData) {
                try {
                    transactions = JSON.parse(savedData);
                } catch (e) {
                    console.error("Error parsing data", e);
                    transactions = [];
                }
            }
            renderTable();
        }

        // --- RENDER TABLE ---
        function renderTable() {
            const tbody = document.getElementById('table-body');
            const emptyMsg = document.getElementById('empty-msg');
            
            tbody.innerHTML = ''; // Clear existing rows

            if (transactions.length === 0) {
                emptyMsg.style.display = 'block';
                return;
            } else {
                emptyMsg.style.display = 'none';
            }

            // Loop through data and create rows
            transactions.forEach((t, index) => {
                // S.No logic
                const serialNo = index + 1;
                
                // Date logic
                const dateVal = t.date || '-'; 

                // Name logic
                const nameVal = t.name ? t.name : '';

                // Flow styling
                const flowClass = t.flow === 'In' ? 'flow-in' : (t.flow === 'Out' ? 'flow-out' : '');

                // Construct the Row with Action Buttons
                // We pass the 'index' as the ID in the URL
                const row = `
                    <tr>
                        <td class="col-sno">${serialNo}</td>
                        <td class="col-date">${dateVal}</td>
                        <td>${t.detail}</td>
                        <td>${t.form}</td>
                        <td class="col-flow ${flowClass}">${t.flow}</td>
                        <td>${nameVal}</td>
                        <td class="col-amt">${t.amount}</td>
                        <td class="col-actions">
                            <button class="btn-action btn-edit" onclick="goToEdit(${index})">Edit</button>
                            <button class="btn-action btn-delete" onclick="goToDelete(${index})">Delete</button>
                        </td>
                    </tr>
                `;
                tbody.innerHTML += row;
            });
        }

        // --- REDIRECT FUNCTIONS ---
        
        function goToEdit(id) {
            // Redirect to edit.html with the ID in the URL
            window.location.href = `edit.html?id=${id}`;
        }

        function goToDelete(id) {
            // Redirect to delete.html with the ID in the URL
            window.location.href = `delete.html?id=${id}`;
        }

        function goToHome() {
            // Adjust this filename if your main file is named differently
            window.location.href = 'business.html'; 
        }

        // Initialize on load
        window.addEventListener('DOMContentLoaded', loadData);

    </script>
</body>
</html>
