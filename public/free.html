<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Session Timer</title>
    <style>
        :root {
            --bg-color: #121212;
            --surface-color: #1e1e1e;
            --surface-elevated: #2c2c2c;
            --primary-color: #3f51b5;
            --error-color: #cf6679;
            --success-color: #4caf50;
            --text-primary: #ffffff;
            --text-secondary: #b0b0b0;
            --font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-primary);
            font-family: var(--font-family);
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* --- Top Navigation --- */
        .top-nav {
            position: absolute;
            top: 20px;
            left: 0;
            right: 0;
            padding: 0 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
            box-sizing: border-box;
        }

        .btn-nav {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--text-secondary);
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.2s ease;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-nav:hover {
            background: rgba(255, 255, 255, 0.1);
            color: var(--text-primary);
            border-color: rgba(255, 255, 255, 0.2);
        }

        .btn-logout {
            border-color: rgba(207, 102, 121, 0.3);
            color: #ff8a80;
            background: rgba(207, 102, 121, 0.05);
        }
        
        .btn-logout:hover {
            background: rgba(207, 102, 121, 0.15);
            border-color: #ff8a80;
        }

        /* --- Main Container --- */
        .container {
            background-color: var(--surface-color);
            padding: 48px;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.6);
            text-align: center;
            max-width: 480px;
            width: 90%;
            position: relative;
            z-index: 1;
            border: 1px solid rgba(255,255,255,0.05);
            transition: border-color 0.3s;
        }

        .container.locked {
            border-color: var(--error-color);
            box-shadow: 0 10px 40px rgba(207, 102, 121, 0.1);
        }

        h1 {
            margin: 0 0 8px 0;
            font-size: 22px;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        p {
            color: var(--text-secondary);
            margin-bottom: 32px;
            font-size: 14px;
            line-height: 1.5;
        }

        .timer-display {
            font-size: 72px;
            font-weight: 700;
            font-variant-numeric: tabular-nums;
            margin: 10px 0 30px 0;
            letter-spacing: -2px;
            line-height: 1;
            font-feature-settings: "tnum";
            transition: color 0.3s;
        }

        .timer-display.urgent {
            color: var(--error-color);
            animation: pulse-red 1s infinite;
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            padding: 6px 14px;
            background-color: rgba(63, 81, 181, 0.15);
            color: #8c9eff;
            border-radius: 50px;
            font-size: 11px;
            font-weight: 700;
            margin-bottom: 24px;
            text-transform: uppercase;
            letter-spacing: 1.2px;
            border: 1px solid rgba(63, 81, 181, 0.2);
        }

        .status-badge.status-locked {
            background-color: rgba(207, 102, 121, 0.15);
            color: #ff8a80;
            border-color: rgba(207, 102, 121, 0.2);
        }

        .controls {
            display: flex;
            gap: 16px;
            justify-content: center;
            margin-top: 20px;
        }

        button {
            padding: 14px 28px;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            width: 100%;
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            pointer-events: none;
        }

        .btn-pay {
            background-color: var(--success-color);
            color: white;
            box-shadow: 0 4px 12px rgba(76, 175, 80, 0.2);
        }

        .btn-pay:hover {
            background-color: #43a047;
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(76, 175, 80, 0.3);
        }

        .btn-await {
            background-color: var(--surface-elevated);
            color: var(--text-secondary);
            cursor: default;
        }

        .tab-info {
            margin-top: 24px;
            font-size: 12px;
            color: var(--text-secondary);
            opacity: 0.6;
            background: rgba(0,0,0,0.2);
            display: inline-block;
            padding: 6px 12px;
            border-radius: 4px;
        }

        .hidden {
            display: none !important;
        }

        #lockedMessage {
            font-size: 32px;
            font-weight: 700;
            color: var(--error-color);
            margin: 20px 0;
        }

        /* --- Loading Overlay --- */
        #loadingOverlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(18, 18, 18, 0.9);
            backdrop-filter: blur(4px);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 20;
            border-radius: 16px;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255,255,255,0.1);
            border-radius: 50%;
            border-top-color: var(--primary-color);
            animation: spin 0.8s ease-in-out infinite;
            margin-bottom: 16px;
        }

        .loading-text {
            font-size: 12px;
            color: var(--text-secondary);
            letter-spacing: 1px;
            animation: pulse 1.5s infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes pulse { 0% { opacity: 0.6; } 50% { opacity: 1; } 100% { opacity: 0.6; } }
        @keyframes pulse-red { 
            0% { transform: scale(1); opacity: 1; } 
            50% { transform: scale(1.05); opacity: 0.8; } 
            100% { transform: scale(1); opacity: 1; } 
        }

        @media (max-width: 600px) {
            .timer-display { font-size: 56px; }
            .container { padding: 30px 20px; }
        }
    </style>
</head>
<body>

    <div class="top-nav">
        <button class="btn-nav btn-logout" id="logoutBtn">Logout</button>
        <a href="men.html" class="btn-nav" id="menuBtn">
            <span class="menu-icon"></span> Menu
        </a>
    </div>

    <div class="container" id="mainContainer">
        <div id="loadingOverlay">
            <div class="spinner"></div>
            <div class="loading-text">SYNCING SESSION...</div>
        </div>

        <!-- ACTIVE STATE UI -->
        <div id="activeStateUI">
            <div class="status-badge" id="statusBadgeActive">Session Active</div>
            <h1>Time Remaining</h1>
            
            <div class="timer-display" id="mainTimer">00:03:00</div>
            
            <p>
                Do not close this tab.<br>
                <span style="font-size:12px; opacity:0.8;">Speed increases with multiple open tabs.</span>
            </p>
            
            <div class="tab-info">
                Active Tabs: <span id="tabCount">1</span> (Speed: <span id="speedVal">1x</span>)
            </div>
        </div>

        <!-- AWAIT / LOCKED STATE UI -->
        <div id="awaitStateUI" class="hidden">
            <div class="status-badge status-locked" id="statusBadgeLocked">LOCKED</div>
            <h1>Access Denied</h1>
            
            <div class="timer-display" id="awaitTimer" style="font-size: 48px; color: var(--text-secondary);">24:00:00</div>
            
            <p>
                Your free session has expired.<br>
                You are currently in the cooldown period.
            </p>

            <div id="lockedMessage">TIME UP</div>

            <div class="controls">
                <button class="btn-await" id="awaitBtn" disabled>Awaiting Reset</button>
                <button class="btn-pay" id="payBtn">Pay to Unlock</button>
            </div>
        </div>
    </div>

    <!-- Firebase SDKs -->
    <script type="module">
        // ── Imports ──
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { 
            getAuth, 
            onAuthStateChanged, 
            signOut 
        } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
        import { 
            getFirestore, 
            doc, 
            getDoc, 
            setDoc, 
            updateDoc, 
            serverTimestamp 
        } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        // ── Firebase Configuration ──
        const firebaseConfig = {
            apiKey: "AIzaSyDpNJIZoLeZUhIoTepbLb_3rRLpseu9Zdo",
            authDomain: "my-project-66803-95cb3.firebaseapp.com",
            projectId: "my-project-66803-95cb3",
            storageBucket: "my-project-66803-95cb3.firebasestorage.app",
            messagingSenderId: "167159607898",
            appId: "1:167159607898:web:23ca11366b88868b085e63"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // ── Constants & State ──
        const MODE_ACTIVE = 'ACTIVE';
        const MODE_AWAIT = 'AWAIT';
        
        const elContainer = document.getElementById('mainContainer');
        const elActiveUI = document.getElementById('activeStateUI');
        const elAwaitUI = document.getElementById('awaitStateUI');
        const elMainTimer = document.getElementById('mainTimer');
        const elAwaitTimer = document.getElementById('awaitTimer');
        const elTabCount = document.getElementById('tabCount');
        const elSpeedVal = document.getElementById('speedVal');
        const elLoading = document.getElementById('loadingOverlay');
        const elLogoutBtn = document.getElementById('logoutBtn');
        const elMenuBtn = document.getElementById('menuBtn');
        const elPayBtn = document.getElementById('payBtn');

        let currentUser = null;
        let currentUserEmail = null;
        let appMode = MODE_ACTIVE;
        
        // Database Persistent State
        let serverStartTime = 0; 
        let activeDurationAtStart = 0; 
        
        let awaitStartTime = 0;
        let awaitDurationAtStart = 0;

        // Tab Tracking State
        const TAB_ID = 'tab_' + Math.random().toString(36).substr(2, 9);
        let tabMultiplier = 1;

        // ── Auth Check ──
        onAuthStateChanged(auth, (user) => {
            if (!user) {
                window.location.replace('index.html');
                return;
            }
            currentUser = user;
            currentUserEmail = user.email;
            initApp();
        });

        // ── Initialization ──
        async function initApp() {
            showLoading(true);
            try {
                // 1. Setup Local Tab Tracking
                setupTabTracking();

                // 2. Load State from DB (Determine mode and times)
                await loadStateFromFirestore();

                // 3. Setup Event Listeners
                setupEventListeners();

                // 4. Start The Visual Loop
                startTimerLoop();

            } catch (error) {
                console.error("Init Error:", error);
                alert("Error loading session.");
            } finally {
                showLoading(false);
            }
        }

        // ── Logout Handler ──
        async function handleLogout() {
            try {
                await signOut(auth);
                window.location.replace('index.html');
            } catch (error) {
                console.error("Logout Error:", error);
            }
        }

        // ── TAB TRACKING (Multiplies Speed) ──
        function setupTabTracking() {
            localStorage.setItem(TAB_ID, Date.now());
            
            const cleanupDeadTabs = () => {
                const now = Date.now();
                for (let i = 0; i < localStorage.length; i++) {
                    const key = localStorage.key(i);
                    if (key.startsWith('tab_')) {
                        const val = parseInt(localStorage.getItem(key));
                        if (now - val > 5000) { // 5 second timeout
                            localStorage.removeItem(key);
                        }
                    }
                }
                updateTabMultiplier();
            };

            cleanupDeadTabs();
            
            // React if another tab opens/closes
            window.addEventListener('storage', cleanupDeadTabs);
            
            // Keep this tab alive
            setInterval(() => localStorage.setItem(TAB_ID, Date.now()), 1000);
        }

        function updateTabMultiplier() {
            let count = 0;
            for (let i = 0; i < localStorage.length; i++) {
                if (localStorage.key(i).startsWith('tab_')) count++;
            }
            tabMultiplier = count > 0 ? count : 1;
            
            // Update UI
            elTabCount.textContent = tabMultiplier;
            elSpeedVal.textContent = tabMultiplier + 'x';
        }

        // ── FIRESTORE STATE MANAGEMENT ──
        async function loadStateFromFirestore() {
            const userRef = doc(db, "users", currentUserEmail);
            const docSnap = await getDoc(userRef);

            if (docSnap.exists()) {
                const data = docSnap.data();
                
                if (data.mode === MODE_AWAIT) {
                    appMode = MODE_AWAIT;
                    awaitStartTime = data.awaitStartTime || Date.now();
                    awaitDurationAtStart = data.awaitDuration || (24 * 60 * 60 * 1000);
                    updateUI();
                } else {
                    // ACTIVE MODE
                    appMode = MODE_ACTIVE;
                    serverStartTime = data.activeStartTime || Date.now();
                    activeDurationAtStart = data.activeDuration || (3 * 60 * 1000);
                    
                    // Check if time already ran out (e.g. user was offline)
                    const now = Date.now();
                    // Calculate "Virtual Time Elapsed" based on multiplier logic
                    // Note: Since we can't know exact tab history perfectly during offline,
                    // we assume average speed or just real time. Here we use Real Time for safety.
                    const elapsed = now - serverStartTime; 
                    
                    if (elapsed >= activeDurationAtStart) {
                        await switchToAwaitState(userRef);
                    } else {
                        updateUI();
                    }
                }
            } else {
                // First time user: Create Document
                const initialData = {
                    mode: MODE_ACTIVE,
                    activeStartTime: Date.now(),
                    activeDuration: 3 * 60 * 1000 
                };
                await setDoc(userRef, initialData, { merge: true });
                serverStartTime = initialData.activeStartTime;
                activeDurationAtStart = initialData.activeDuration;
                updateUI();
            }
        }

        // ── THE VISUAL TIMER LOOP ──
        // This loop runs frequently (100ms) to check the "Truth" (Time now vs Start Time)
        // This prevents user from refreshing to get more time.
        function startTimerLoop() {
            if (window.timerInterval) clearInterval(window.timerInterval);
            
            window.timerInterval = setInterval(async () => {
                const now = Date.now();

                if (appMode === MODE_ACTIVE) {
                    // 1. Calculate total time that has passed since start
                    const elapsedMs = now - serverStartTime;
                    
                    // 2. Apply Multiplier Logic:
                    // Effective Time Elapsed = Real Time Elapsed * Number of Tabs
                    // This makes the timer drain faster if more tabs are open
                    const effectiveElapsedMs = elapsedMs * tabMultiplier;

                    // 3. Calculate Remaining
                    const remainingMs = activeDurationAtStart - effectiveElapsedMs;

                    if (remainingMs <= 0) {
                        // --- TIME IS UP ---
                        const userRef = doc(db, "users", currentUserEmail);
                        await switchToAwaitState(userRef);
                    } else {
                        // --- UPDATE DISPLAY ---
                        updateDisplay(remainingMs / 1000, elMainTimer);
                    }

                } else if (appMode === MODE_AWAIT) {
                    // Await Timer Logic (Standard countdown)
                    const elapsedMs = now - awaitStartTime;
                    const remainingMs = awaitDurationAtStart - elapsedMs;

                    if (remainingMs <= 0) {
                        const userRef = doc(db, "users", currentUserEmail);
                        await resetToActiveState(userRef);
                    } else {
                        updateDisplay(remainingMs / 1000, elAwaitTimer);
                    }
                }
            }, 100); // Check every 100ms for smoothness
        }

        // ── TRANSITION: Switch to Await (Locked) ──
        async function switchToAwaitState(userRef) {
            console.log("Time Expired. Switching to AWAIT State.");
            
            appMode = MODE_AWAIT;
            awaitStartTime = Date.now();
            awaitDurationAtStart = 24 * 60 * 60 * 1000; // 24 hours

            const updateData = {
                mode: MODE_AWAIT,
                awaitStartTime: awaitStartTime,
                awaitDuration: awaitDurationAtStart,
                activeStartTime: null,
                activeDuration: null
            };

            await updateDoc(userRef, updateData);
            updateUI();
            forceCloseOrRedirect();
        }

        async function resetToActiveState(userRef) {
            console.log("Cooldown finished. Resetting to ACTIVE.");
            appMode = MODE_ACTIVE;
            serverStartTime = Date.now();
            activeDurationAtStart = 3 * 60 * 1000;

            const updateData = {
                mode: MODE_ACTIVE,
                activeStartTime: serverStartTime,
                activeDuration: activeDurationAtStart,
                awaitStartTime: null,
                awaitDuration: null
            };
            
            await updateDoc(userRef, updateData);
            updateUI();
        }

        // ── FORCE CLOSE / REDIRECT ──
        function forceCloseOrRedirect() {
            try {
                window.close(); 
            } catch(e) {
                console.log("Browser blocked window.close()");
            }
            // Fallback
            setTimeout(() => {
                window.location.href = 'pay.html';
            }, 500);
        }

        // ── UI UPDATES ──
        function updateDisplay(secondsFloat, element) {
            const seconds = Math.floor(secondsFloat);
            const h = Math.floor(seconds / 3600);
            const m = Math.floor((seconds % 3600) / 60);
            const s = Math.floor(seconds % 60);
            
            const fH = h.toString().padStart(2, '0');
            const fM = m.toString().padStart(2, '0');
            const fS = s.toString().padStart(2, '0');

            element.textContent = `${fH}:${fM}:${fS}`;

            if (element === elMainTimer) {
                const elStatus = document.getElementById('statusBadgeActive');
                if (seconds < 60) {
                    element.classList.add('urgent');
                    elStatus.style.color = "#ff8a80";
                    elStatus.style.backgroundColor = "rgba(207, 102, 121, 0.15)";
                } else {
                    element.classList.remove('urgent');
                    elStatus.style.color = "#8c9eff";
                    elStatus.style.backgroundColor = "rgba(63, 81, 181, 0.15)";
                }
            }
        }

        function updateUI() {
            if (appMode === MODE_ACTIVE) {
                elActiveUI.classList.remove('hidden');
                elAwaitUI.classList.add('hidden');
                elContainer.classList.remove('locked');
                elMenuBtn.classList.remove('hidden');
                elLogoutBtn.classList.remove('hidden');
            } else {
                elActiveUI.classList.add('hidden');
                elAwaitUI.classList.remove('hidden');
                elContainer.classList.add('locked');
                elMenuBtn.classList.add('hidden');
                elLogoutBtn.classList.remove('hidden'); 
            }
        }

        function showLoading(show) {
            elLoading.style.display = show ? 'flex' : 'none';
        }

        function setupEventListeners() {
            elPayBtn.addEventListener('click', () => window.location.href = 'pay.html');
            elLogoutBtn.addEventListener('click', handleLogout);
        }
    </script>
</body>
</html>
