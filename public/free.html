<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Free Access</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            min-height: 100vh;
            font-family: 'Inter', sans-serif;
            background: #050505;
            color: #f5f5f4;
            overflow-x: hidden;
        }

        /* ===== TOP BAR ===== */
        .top-bar {
            position: sticky;
            top: 0;
            z-index: 20;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 20px 32px;
            background: rgba(5, 5, 5, 0.85);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .top-bar-left {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .back-link {
            display: flex;
            align-items: center;
            gap: 6px;
            color: rgb(168, 162, 158);
            text-decoration: none;
            font-size: 0.8rem;
            font-weight: 500;
            transition: color 0.3s;
        }

        .back-link:hover { color: #f97316; }

        .back-arrow {
            display: inline-block;
            width: 18px;
            height: 18px;
            border-left: 2px solid currentColor;
            border-bottom: 2px solid currentColor;
            transform: rotate(45deg);
        }

        .free-badge {
            font-size: 0.7rem;
            font-weight: 700;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: rgb(168, 162, 158);
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 5px 12px;
            border-radius: 8px;
        }

        .top-bar-right {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .top-bar-right a {
            color: rgb(120, 113, 108);
            text-decoration: none;
            font-size: 0.78rem;
            font-weight: 500;
            transition: color 0.3s;
        }

        .top-bar-right a:hover { color: #f97316; }

        /* ===== GLOW ===== */
        .glow-orb {
            position: fixed;
            top: 35%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(249, 115, 22, 0.04) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        /* ===== MAIN CONTENT ===== */
        .main-content {
            position: relative;
            z-index: 2;
            text-align: center;
            padding: 100px 24px 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        .main-content h2 {
            font-size: 1.3rem;
            font-weight: 600;
            color: rgb(168, 162, 158);
            margin-bottom: 12px;
        }

        .btn-menu {
            display: inline-block;
            padding: 16px 64px;
            font-size: 1.05rem;
            font-weight: 700;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: #050505;
            background: linear-gradient(135deg, #f97316, #fb923c);
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 0 30px rgba(249, 115, 22, 0.2), 0 0 60px rgba(249, 115, 22, 0.05);
            text-decoration: none;
            font-family: 'Inter', sans-serif;
        }

        .btn-menu:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 40px rgba(249, 115, 22, 0.35), 0 0 80px rgba(249, 115, 22, 0.1);
        }

        .btn-menu:active { transform: translateY(0); }

        /* ===== COUNTDOWN ===== */
        .timer-label {
            font-size: 0.7rem;
            font-weight: 600;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: rgb(87, 83, 78);
            margin-top: 40px;
        }

        .timer-display {
            font-size: 4rem;
            font-weight: 800;
            letter-spacing: 0.05em;
            color: #f5f5f4;
            font-variant-numeric: tabular-nums;
            line-height: 1;
            margin-bottom: 20px;
        }

        .timer-display.warning {
            color: #f97316;
            animation: pulse-glow 1s ease-in-out infinite;
        }

        .timer-display.danger {
            color: #ef4444;
            animation: pulse-glow-red 0.6s ease-in-out infinite;
        }

        @keyframes pulse-glow {
            0%, 100% { text-shadow: 0 0 20px rgba(249, 115, 22, 0.3); }
            50% { text-shadow: 0 0 40px rgba(249, 115, 22, 0.6); }
        }

        @keyframes pulse-glow-red {
            0%, 100% { text-shadow: 0 0 20px rgba(239, 68, 68, 0.3); }
            50% { text-shadow: 0 0 40px rgba(239, 68, 68, 0.6); }
        }

        .timer-bar {
            max-width: 360px;
            width: 100%;
            height: 4px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 4px;
            overflow: hidden;
        }

        .timer-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #f97316, #fb923c);
            border-radius: 4px;
            transition: width 1s linear;
        }

        .timer-bar-fill.warning { background: linear-gradient(90deg, #f97316, #ef4444); }
        .timer-bar-fill.danger { background: #ef4444; }

        /* ===== LOCK SECTION ===== */
        .lock-section {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 50;
            background: #050505;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 24px;
        }

        .lock-icon {
            width: 48px;
            height: 48px;
            margin-bottom: 28px;
            opacity: 0.25;
        }

        .lock-icon svg {
            width: 48px;
            height: 48px;
            stroke: rgb(87, 83, 78);
            stroke-width: 1.5;
            fill: none;
        }

        .lock-section h2 {
            font-size: 1.15rem;
            font-weight: 600;
            color: rgb(120, 113, 108);
            margin-bottom: 6px;
        }

        .lock-section .lock-sub {
            font-size: 0.78rem;
            color: rgb(87, 83, 78);
            margin-bottom: 40px;
        }

        .lock-row {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 20px;
        }

        .wait-timer {
            font-size: 2.8rem;
            font-weight: 800;
            letter-spacing: 0.03em;
            color: rgb(87, 83, 78);
            font-variant-numeric: tabular-nums;
            line-height: 1;
        }

        .btn-pay {
            display: inline-block;
            padding: 14px 40px;
            font-size: 0.9rem;
            font-weight: 700;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: #050505;
            background: linear-gradient(135deg, #22c55e, #4ade80);
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 0 30px rgba(34, 197, 94, 0.2), 0 0 60px rgba(34, 197, 94, 0.05);
            text-decoration: none;
            font-family: 'Inter', sans-serif;
            flex-shrink: 0;
        }

        .btn-pay:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 40px rgba(34, 197, 94, 0.35), 0 0 80px rgba(34, 197, 94, 0.1);
        }

        .btn-pay:active { transform: translateY(0); }

        .wait-bar {
            max-width: 360px;
            width: 100%;
            height: 3px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 3px;
            overflow: hidden;
            margin-bottom: 12px;
        }

        .wait-bar-fill {
            height: 100%;
            width: 100%;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 3px;
            transition: width 1s linear;
        }

        .wait-label {
            font-size: 0.65rem;
            font-weight: 600;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: rgb(68, 64, 60);
        }

        /* ===== OVERLAY ===== */
        .unclickable-overlay {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 51;
            cursor: not-allowed;
        }

        .unclickable-overlay.active { display: block; }
        .btn-pay.z-top { position: relative; z-index: 52; }

        /* ===== FOOTER ===== */
        .footer-text {
            text-align: center;
            padding: 48px 24px 32px;
            position: relative;
            z-index: 2;
        }

        .footer-text p {
            font-size: 0.7rem;
            color: rgb(87, 83, 78);
            letter-spacing: 0.03em;
        }

        @media (max-width: 640px) {
            .top-bar { padding: 16px 20px; }
            .back-link span { display: none; }
            .main-content { padding: 70px 20px 0; }
            .main-content h2 { font-size: 1.1rem; }
            .timer-display { font-size: 3rem; }
            .wait-timer { font-size: 2rem; }
            .lock-row { flex-direction: column; gap: 16px; }
            .btn-menu, .btn-pay { padding: 14px 40px; font-size: 0.9rem; }
        }
    </style>
</head>
<body>

    <div class="glow-orb"></div>

    <!-- Top Bar -->
    <div class="top-bar" id="topBar">
        <div class="top-bar-left">
            <a href="index.html" class="back-link">
                <span class="back-arrow"></span>
                <span>Home</span>
            </a>
            <div class="free-badge">Free</div>
        </div>
        <div class="top-bar-right">
            <a href="index.html">Back to site</a>
        </div>
    </div>

    <!-- Main: MENU button + countdown -->
    <div class="main-content" id="mainContent">
        <h2>Select an option below</h2>
        <a href="menu.html" class="btn-menu">MENU</a>
        <div class="timer-label">Session Time Remaining</div>
        <div class="timer-display" id="timerDisplay">03:00</div>
        <div class="timer-bar">
            <div class="timer-bar-fill" id="timerBarFill" style="width: 100%;"></div>
        </div>
    </div>

    <!-- 24hr Lock -->
    <div class="lock-section" id="lockSection">
        <div class="lock-icon">
            <svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
        </div>
        <h2>Pay to continue use system</h2>
        <p class="lock-sub">Your session has expired</p>
        <div class="lock-row">
            <div class="wait-timer" id="waitTimerDisplay">24:00:00</div>
            <a href="pay.html" class="btn-pay z-top">Pay</a>
        </div>
        <div class="wait-bar">
            <div class="wait-bar-fill" id="waitBarFill" style="width: 100%;"></div>
        </div>
        <div class="wait-label">Waiting period</div>
    </div>

    <div class="unclickable-overlay" id="unclickableOverlay"></div>

    <div class="footer-text" id="footerSection">
        <p>Jamal Said Kazembe Multisystem Management</p>
    </div>

    <script>
        (function () {
            var TOTAL = 180;
            var remaining = TOTAL;
            var timerDisplay = document.getElementById("timerDisplay");
            var timerBarFill = document.getElementById("timerBarFill");
            var startTime = Date.now();

            var interval = setInterval(function () {
                var elapsed = Math.floor((Date.now() - startTime) / 1000);
                remaining = Math.max(0, TOTAL - elapsed);

                if (remaining <= 0) {
                    clearInterval(interval);
                    timerDisplay.textContent = "00:00";
                    timerBarFill.style.width = "0%";

                    setTimeout(function () {
                        document.getElementById("mainContent").style.display = "none";
                        document.getElementById("footerSection").style.display = "none";
                        document.getElementById("topBar").style.display = "none";
                        startLock();
                    }, 800);
                    return;
                }

                var m = Math.floor(remaining / 60);
                var s = remaining % 60;
                timerDisplay.textContent = String(m).padStart(2, "0") + ":" + String(s).padStart(2, "0");
                timerBarFill.style.width = ((remaining / TOTAL) * 100) + "%";

                timerDisplay.classList.remove("warning", "danger");
                timerBarFill.classList.remove("warning", "danger");

                if (remaining <= 10) {
                    timerDisplay.classList.add("danger");
                    timerBarFill.classList.add("danger");
                } else if (remaining <= 30) {
                    timerDisplay.classList.add("warning");
                    timerBarFill.classList.add("warning");
                }
            }, 1000);

            function startLock() {
                var LOCK_TOTAL = 86400;
                var lockStart = Date.now();
                var waitDisplay = document.getElementById("waitTimerDisplay");
                var waitBar = document.getElementById("waitBarFill");

                document.getElementById("lockSection").style.display = "flex";
                document.getElementById("unclickableOverlay").classList.add("active");

                var lockInterval = setInterval(function () {
                    var lockElapsed = Math.floor((Date.now() - lockStart) / 1000);
                    var lockRemaining = Math.max(0, LOCK_TOTAL - lockElapsed);

                    if (lockRemaining <= 0) {
                        clearInterval(lockInterval);
                        waitDisplay.textContent = "00:00:00";
                        waitBar.style.width = "0%";
                        return;
                    }

                    var h = Math.floor(lockRemaining / 3600);
                    var m = Math.floor((lockRemaining % 3600) / 60);
                    var s = lockRemaining % 60;
                    waitDisplay.textContent =
                        String(h).padStart(2, "0") + ":" +
                        String(m).padStart(2, "0") + ":" +
                        String(s).padStart(2, "0");
                    waitBar.style.width = ((lockRemaining / LOCK_TOTAL) * 100) + "%";
                }, 1000);
            }
        })();
    </script>
</body>
</html>
