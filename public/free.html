<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Free Session</title>
    <style>
        :root {
            --bg-color: #121212;
            --surface-color: #1e1e1e;
            --primary-color: #bb86fc;
            --secondary-color: #03dac6;
            --text-color: #ffffff;
            --text-secondary: #b0b0b0;
            --danger-color: #cf6679;
            --font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--font-family);
            background-color: var(--bg-color);
            color: var(--text-color);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Header */
        header {
            padding: 20px;
            background-color: var(--surface-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #333;
            position: relative;
        }

        .user-info {
            font-size: 0.9rem;
            color: var(--text-secondary);
        }

        .rate-counter {
            font-size: 1.2rem;
            font-weight: bold;
            color: var(--primary-color);
            background: rgba(187, 134, 252, 0.1);
            padding: 8px 16px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* Logout Button Styling */
        #logout-btn {
            background-color: transparent;
            color: var(--danger-color);
            border: 1px solid var(--danger-color);
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: bold;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            /* Hidden by default */
            display: none; 
            position: absolute;
            top: 20px;
            left: 20px;
        }

        #logout-btn:hover {
            background-color: var(--danger-color);
            color: white;
        }

        /* Main Content */
        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            text-align: center;
        }

        .timer-display {
            font-size: 5rem;
            font-weight: 700;
            font-variant-numeric: tabular-nums;
            letter-spacing: 2px;
            margin-bottom: 40px;
            text-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        .timer-display.active {
            color: var(--secondary-color);
            animation: pulse 2s infinite;
        }

        .timer-display.awaiting {
            color: var(--text-secondary);
            font-size: 4rem;
        }

        .status-message {
            margin-bottom: 30px;
            font-size: 1.2rem;
            color: var(--text-secondary);
        }

        /* Buttons */
        .action-area {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn {
            padding: 15px 30px;
            font-size: 1.2rem;
            border: none;
            border-radius: 8px;
            text-transform: uppercase;
            font-weight: bold;
            text-decoration: none;
            display: inline-block;
            cursor: pointer;
            transition: opacity 0.3s ease, transform 0.3s ease;
        }

        .btn-menu {
            background-color: var(--surface-color);
            color: var(--text-color);
            border: 2px solid var(--text-secondary);
        }

        .btn-menu:hover {
            border-color: var(--text-color);
        }

        /* Class to hide elements smoothly */
        .hidden {
            display: none !important;
        }

        .btn-await {
            background-color: #333;
            color: #666;
            cursor: not-allowed;
            border: 1px solid #444;
        }

        .btn-pay {
            background-color: var(--primary-color);
            color: #000;
        }

        .btn-pay:hover {
            background-color: #a370db;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.8; }
            100% { opacity: 1; }
        }

        @media (max-width: 600px) {
            .timer-display { font-size: 3.5rem; }
            .action-area { flex-direction: column; width: 100%; }
            .btn { width: 100%; }
            #logout-btn {
                position: static; /* On mobile, let it sit in flow if needed, or keep absolute but adjust padding */
                margin-bottom: 10px;
                width: 100%;
            }
        }
    </style>
</head>
<body>

    <header>
        <!-- Added Logout Button (Top Left) -->
        <button id="logout-btn" type="button">Logout</button>

        <div class="user-info">
            Logged in as <strong id="user-email-display">...</strong>
        </div>
        
        <div class="rate-counter">
            <span>Rate:</span>
            <div id="tab-count">...</div>
        </div>
    </header>

    <main id="main-interface">
        <!-- Default visual to prevent blank flash -->
        <div id="timer" class="timer-display">00:03:00</div>
        <div id="status-text" class="status-message">Initializing...</div>

        <div class="action-area">
            <!-- Constraint: Menu Button -->
            <a id="btn-menu" href="menu.html" class="btn btn-menu">Menu</a>

            <!-- Constraint: Awaiting State Buttons -->
            <button id="btn-await" class="btn btn-await hidden" disabled>Await</button>
            <a id="btn-pay" href="pay.html" class="btn btn-pay hidden">Pay</a>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
        import {
            getFirestore,
            doc,
            updateDoc,
            onSnapshot,
            serverTimestamp,
            runTransaction
        } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDpNJIZoLeZUhIoTepbLb_3rRLpseu9Zdo",
            authDomain: "my-project-66803-95cb3.firebaseapp.com",
            projectId: "my-project-66803-95cb3",
            storageBucket: "my-project-66803-95cb3.firebasestorage.app",
            messagingSenderId: "167159607898",
            appId: "1:167159607898:web:23ca11366b88868b085e63"
        };

        // Total "Work" required = 3 minutes in seconds
        const TOTAL_WORK_SECONDS = 3 * 60; 
        // Cooldown = 24 hours in ms
        const AWAIT_TIME_MS = 24 * 60 * 60 * 1000;

        const tabId = crypto.randomUUID();

        // Global State Variables
        let sessionState = 'idle'; 
        let dbStartTime = null; // Date object
        let dbEndTime = null;   // Date object
        let currentRate = 1;     // The multiplier (Tabs count)

        const ui = {
            email: document.getElementById('user-email-display'),
            timer: document.getElementById('timer'),
            status: document.getElementById('status-text'),
            tabCount: document.getElementById('tab-count'),
            btnMenu: document.getElementById('btn-menu'),
            btnAwait: document.getElementById('btn-await'),
            btnPay: document.getElementById('btn-pay'),
            logoutBtn: document.getElementById('logout-btn') // Added to UI object
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // ── 0. LOGOUT HANDLER ──
        ui.logoutBtn.addEventListener('click', async () => {
            try {
                await signOut(auth);
                // Redirect to index.html immediately after sign out
                window.location.href = "index.html";
            } catch (error) {
                console.error("Sign out error", error);
                alert("Error signing out");
            }
        });

        // ── 1. AUTH CHECK ──
        onAuthStateChanged(auth, (user) => {
            if (!user) {
                // If no user, redirect immediately (e.g. if they manually logged out elsewhere)
                window.location.href = "index.html"; 
                return;
            }
            ui.email.textContent = user.email;
            // Start Logic Immediately (No Loading Screen)
            initSession(user.email);
        });

        // ── 2. VISUAL TIMER LOOP (Runs every second) ──
        setInterval(() => {
            updateVisualTimer();
        }, 1000);

        function updateVisualTimer() {
            const now = new Date();

            // --- ACTIVE PHASE LOGIC ---
            if (sessionState === 'active' && dbStartTime) {
                
                // A. Calculate Real Elapsed Time
                const elapsedMs = now - dbStartTime;
                const elapsedSeconds = elapsedMs / 1000;

                // B. Calculate "Work Done" based on Current Rate
                // Formula: Work = Time × Rate
                const workDone = elapsedSeconds * currentRate;

                // C. Calculate Remaining Work
                let remainingWork = TOTAL_WORK_SECONDS - workDone;

                if (remainingWork <= 0) {
                    ui.timer.textContent = "00:00:00";
                    finishSession(); 
                } else {
                    // D. Convert Remaining Work back to Display Time
                    // Formula: Time = Work / Rate
                    // We show the user how much "clock time" is left at the current speed
                    const displaySeconds = remainingWork / currentRate;
                    
                    ui.timer.textContent = formatTime(displaySeconds * 1000);
                    ui.status.textContent = `Active (Speed: ${currentRate}x)`;
                }
            } 
            
            // --- AWAITING PHASE LOGIC ---
            else if (sessionState === 'awaiting' && dbEndTime) {
                const elapsedMs = now - dbEndTime;
                const remainingMs = AWAIT_TIME_MS - elapsedMs;

                if (remainingMs <= 0) {
                    ui.timer.textContent = "00:00:00";
                    resetSystem();
                } else {
                    ui.timer.textContent = formatTime(remainingMs);
                    ui.status.textContent = "Please wait.";
                }
            } 
            
            // --- IDLE PHASE LOGIC ---
            else {
                if (sessionState === 'idle') {
                    ui.timer.textContent = "00:03:00";
                }
            }
        }

        // ── 3. DATABASE INITIALIZATION & SYNC ──
        async function initSession(email) {
            const userRef = doc(db, "users", email);

            // A. Transaction to Register Tab and Start Session
            try {
                await runTransaction(db, async (transaction) => {
                    const snap = await transaction.get(userRef);
                    
                    if (!snap.exists()) {
                        // New User: Start Immediately
                        transaction.set(userRef, {
                            email: email,
                            sessionState: 'active',
                            startTime: serverTimestamp(),
                            activeTabs: [tabId],
                            createdAt: serverTimestamp()
                        });
                        return;
                    }

                    const data = snap.data();
                    let activeTabs = data.activeTabs || [];
                    let state = data.sessionState || 'idle';

                    // Deduplicate: Remove existing instance of this tab ID
                    activeTabs = activeTabs.filter(id => id !== tabId);
                    // Add this tab back
                    activeTabs.push(tabId);

                    transaction.update(userRef, { activeTabs: activeTabs });

                    // If not currently waiting, force start active if idle
                    if (state !== 'awaiting') {
                        if (state === 'idle' || state === 'finished') {
                            transaction.update(userRef, {
                                sessionState: 'active',
                                startTime: serverTimestamp()
                            });
                        }
                    }
                });
            } catch (e) {
                console.error("Init failed:", e);
                ui.status.textContent = "Connection Error";
            }

            // B. Real-time Listener
            onSnapshot(userRef, (docSnap) => {
                if (docSnap.exists()) {
                    handleDatabaseUpdate(docSnap.data());
                }
            });
        }

        // ── 4. UPDATE STATE FROM DATABASE ──
        function handleDatabaseUpdate(data) {
            // Update Global State
            sessionState = data.sessionState || 'idle';
            dbStartTime = data.startTime ? data.startTime.toDate() : null;
            dbEndTime = data.lastSessionEnd ? data.lastSessionEnd.toDate() : null;
            
            const activeTabs = data.activeTabs || [];
            
            // Calculate Rate
            // In awaiting phase, rate is fixed at 1. In active, it's tab count.
            if (sessionState === 'awaiting') {
                currentRate = 1;
            } else {
                // Prevent division by zero, default to 1 if 0 tabs
                currentRate = activeTabs.length > 0 ? activeTabs.length : 1;
            }

            // Update UI Counter
            ui.tabCount.textContent = currentRate;

            // Update UI Styles & Buttons
            if (sessionState === 'awaiting') {
                ui.timer.classList.remove('active');
                ui.timer.classList.add('awaiting');
                
                // SHOW Await and Pay buttons
                ui.btnAwait.classList.remove('hidden');
                ui.btnPay.classList.remove('hidden');
                
                // HIDE Menu Button
                ui.btnMenu.classList.add('hidden');

                // ★ SHOW Logout Button (Top Left) ★
                ui.logoutBtn.style.display = 'block';

            } else {
                ui.timer.classList.remove('awaiting');
                ui.timer.classList.add('active');
                
                // HIDE Await and Pay buttons
                ui.btnAwait.classList.add('hidden');
                ui.btnPay.classList.add('hidden');
                
                // SHOW Menu Button
                ui.btnMenu.classList.remove('hidden');

                // ★ HIDE Logout Button ★
                ui.logoutBtn.style.display = 'none';
            }

            // Force immediate visual update
            updateVisualTimer();
        }

        // ── 5. ACTIONS ──
        async function finishSession() {
            // Guard against multiple calls
            if (sessionState !== 'active') return; 

            const email = ui.email.textContent;
            const userRef = doc(db, "users", email);

            try {
                await runTransaction(db, async (transaction) => {
                    const snap = await transaction.get(userRef);
                    if (!snap.exists()) return;
                    const data = snap.data();

                    // Only finish if we are actually active
                    if (data.sessionState === 'active') {
                        transaction.update(userRef, {
                            sessionState: 'awaiting',
                            lastSessionEnd: serverTimestamp(),
                            activeTabs: [] // Clear tabs for the penalty phase
                        });
                    }
                });
            } catch (e) { console.error(e); }

            // Redirect to Penalty Page
            setTimeout(() => {
                window.location.href = "await.html";
            }, 1000);
        }

        async function resetSystem() {
            // Guard
            if (sessionState !== 'awaiting') return;

            const email = ui.email.textContent;
            const userRef = doc(db, "users", email);

            try {
                await updateDoc(userRef, {
                    sessionState: 'idle',
                    startTime: null,
                    lastSessionEnd: null
                });
                // The snapshot listener will catch this change and restart the cycle
            } catch (e) { console.error(e); }
        }

        // ── UTILS ──
        function formatTime(ms) {
            const totalSeconds = Math.max(0, ms / 1000);
            const h = Math.floor(totalSeconds / 3600);
            const m = Math.floor((totalSeconds % 3600) / 60);
            const s = Math.floor(totalSeconds % 60);
            return [h, m, s].map(v => v.toString().padStart(2, '0')).join(':');
        }

    </script>
</body>
</html>
