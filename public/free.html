<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Free Session</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Quicksand', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            background: linear-gradient(180deg, #1a0e2e 0%, #2d1b4e 15%, #4a2c6e 30%, #7b4a8a 45%, #c4856c 60%, #e8a96a 75%, #f0c87a 85%, #d4a45a 95%, #8b6914 100%);
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 45%;
            background:
                radial-gradient(1px 1px at 10% 15%, rgba(255,255,255,0.8) 50%, transparent 100%),
                radial-gradient(1.5px 1.5px at 25% 8%, rgba(255,255,220,0.9) 50%, transparent 100%),
                radial-gradient(1px 1px at 40% 22%, rgba(255,255,255,0.6) 50%, transparent 100%),
                radial-gradient(1.2px 1.2px at 55% 5%, rgba(255,255,230,0.7) 50%, transparent 100%),
                radial-gradient(1px 1px at 70% 18%, rgba(255,255,255,0.5) 50%, transparent 100%),
                radial-gradient(1.5px 1.5px at 85% 12%, rgba(255,255,220,0.8) 50%, transparent 100%),
                radial-gradient(1px 1px at 15% 30%, rgba(255,255,255,0.4) 50%, transparent 100%),
                radial-gradient(1px 1px at 60% 28%, rgba(255,255,255,0.5) 50%, transparent 100%),
                radial-gradient(1.3px 1.3px at 90% 25%, rgba(255,255,230,0.6) 50%, transparent 100%),
                radial-gradient(1px 1px at 35% 35%, rgba(255,255,255,0.3) 50%, transparent 100%);
            pointer-events: none;
            z-index: 0;
            animation: twinkle 4s ease-in-out infinite alternate;
        }

        @keyframes twinkle {
            0% { opacity: 0.6; }
            100% { opacity: 1; }
        }

        .ground {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 18%;
            background: linear-gradient(180deg, #5a7a32 0%, #4a6a28 30%, #3d5a20 100%);
            border-top: 3px solid #6b8f3a;
            z-index: 1;
        }

        .ground::before {
            content: '';
            position: absolute;
            top: -8px;
            left: 0;
            width: 100%;
            height: 16px;
            background: repeating-linear-gradient(
                90deg,
                transparent 0px,
                transparent 20px,
                #5a7a32 20px,
                #6b8f3a 22px,
                transparent 22px,
                transparent 50px
            );
            opacity: 0.5;
        }

        .grass {
            position: fixed;
            bottom: 16%;
            z-index: 2;
            pointer-events: none;
        }

        .grass span {
            display: inline-block;
            width: 4px;
            height: 20px;
            background: #6b8f3a;
            border-radius: 2px 2px 0 0;
            transform-origin: bottom center;
            animation: sway 3s ease-in-out infinite;
        }

        .grass span:nth-child(2) { height: 16px; background: #5a7a32; animation-delay: 0.3s; }
        .grass span:nth-child(3) { height: 22px; background: #7ba044; animation-delay: 0.6s; }
        .grass span:nth-child(4) { height: 14px; background: #5a7a32; animation-delay: 0.15s; }
        .grass span:nth-child(5) { height: 18px; background: #6b8f3a; animation-delay: 0.45s; }

        @keyframes sway {
            0%, 100% { transform: rotate(-5deg); }
            50% { transform: rotate(5deg); }
        }

        .tree-container {
            position: fixed;
            bottom: 18%;
            left: 50%;
            transform: translateX(-50%);
            z-index: 3;
            pointer-events: none;
        }

        .tree-trunk {
            width: 50px;
            height: 320px;
            background: linear-gradient(90deg, #5c3a1e 0%, #7a4e2a 30%, #8b5e34 50%, #7a4e2a 70%, #5c3a1e 100%);
            border-radius: 8px 8px 12px 12px;
            position: relative;
            margin: 0 auto;
        }

        .tree-trunk::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(
                0deg,
                transparent 0px,
                transparent 18px,
                rgba(0,0,0,0.1) 18px,
                rgba(0,0,0,0.1) 20px
            );
            border-radius: inherit;
        }

        .tree-trunk::after {
            content: '';
            position: absolute;
            top: 20px;
            left: 8px;
            width: 10px;
            height: 60px;
            background: rgba(0,0,0,0.08);
            border-radius: 5px;
        }

        .branch-left {
            position: absolute;
            top: 60px;
            left: -65px;
            width: 70px;
            height: 14px;
            background: linear-gradient(90deg, #5c3a1e, #7a4e2a);
            border-radius: 7px;
            transform: rotate(-20deg);
            transform-origin: right center;
        }

        .branch-right {
            position: absolute;
            top: 100px;
            right: -55px;
            width: 60px;
            height: 12px;
            background: linear-gradient(270deg, #5c3a1e, #7a4e2a);
            border-radius: 6px;
            transform: rotate(15deg);
            transform-origin: left center;
        }

        .canopy {
            position: absolute;
            top: -120px;
            left: 50%;
            transform: translateX(-50%);
        }

        .canopy-layer {
            border-radius: 50%;
            position: absolute;
        }

        .canopy-layer.c1 {
            width: 200px;
            height: 180px;
            background: radial-gradient(ellipse at 40% 40%, #3d8a2e, #2d6b1f);
            top: -40px;
            left: -100px;
        }

        .canopy-layer.c2 {
            width: 170px;
            height: 160px;
            background: radial-gradient(ellipse at 50% 35%, #4a9e36, #358a28);
            top: -70px;
            left: -40px;
        }

        .canopy-layer.c3 {
            width: 160px;
            height: 150px;
            background: radial-gradient(ellipse at 45% 40%, #55b040, #3d8a2e);
            top: -50px;
            left: -130px;
        }

        .canopy-layer.c4 {
            width: 140px;
            height: 130px;
            background: radial-gradient(ellipse at 55% 35%, #4a9e36, #2d6b1f);
            top: -80px;
            left: -50px;
        }

        .canopy-layer.c5 {
            width: 120px;
            height: 110px;
            background: radial-gradient(ellipse at 50% 30%, #5cc048, #3d8a2e);
            top: -100px;
            left: -100px;
        }

        .canopy-layer.c6 {
            width: 90px;
            height: 85px;
            background: radial-gradient(ellipse at 50% 40%, #6cd058, #4a9e36);
            top: -110px;
            left: -70px;
        }

        .eating-leaves {
            position: absolute;
            top: -60px;
            left: -20px;
            animation: leafNibble 2s ease-in-out infinite;
        }

        .eating-leaves .leaf {
            width: 18px;
            height: 10px;
            background: #5cc048;
            border-radius: 0 50% 50% 0;
            position: absolute;
        }

        .eating-leaves .leaf:nth-child(1) { transform: rotate(-30deg); top: 0; left: 0; }
        .eating-leaves .leaf:nth-child(2) { transform: rotate(10deg); top: 8px; left: 5px; }
        .eating-leaves .leaf:nth-child(3) { transform: rotate(-50deg); top: -5px; left: 10px; background: #4a9e36; }
        .eating-leaves .leaf:nth-child(4) { transform: rotate(25deg); top: 12px; left: -5px; background: #6cd058; }

        @keyframes leafNibble {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            15% { transform: translate(3px, 2px) rotate(2deg); }
            30% { transform: translate(-2px, 1px) rotate(-1deg); }
            45% { transform: translate(4px, 3px) rotate(3deg); }
            60% { transform: translate(-1px, 0px) rotate(-2deg); }
            75% { transform: translate(2px, 2px) rotate(1deg); }
        }

        .giraffe-container {
            position: fixed;
            bottom: 18%;
            left: calc(50% + 30px);
            z-index: 4;
            pointer-events: none;
            animation: giraffeBreathe 4s ease-in-out infinite;
        }

        @keyframes giraffeBreathe {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-3px); }
        }

        .giraffe-body {
            width: 100px;
            height: 65px;
            background: linear-gradient(180deg, #e8a040, #d4892e);
            border-radius: 50px 45px 35px 40px;
            position: relative;
        }

        .giraffe-body::before {
            content: '';
            position: absolute;
            top: 8px;
            left: 15px;
            width: 16px;
            height: 14px;
            background: rgba(139, 90, 20, 0.45);
            border-radius: 50%;
            box-shadow:
                22px 5px 0 3px rgba(139, 90, 20, 0.4),
                50px 2px 0 1px rgba(139, 90, 20, 0.35),
                40px 20px 0 4px rgba(139, 90, 20, 0.4),
                10px 28px 0 2px rgba(139, 90, 20, 0.35),
                65px 15px 0 3px rgba(139, 90, 20, 0.38),
                30px 35px 0 2px rgba(139, 90, 20, 0.3);
        }

        .giraffe-neck {
            position: absolute;
            bottom: 50px;
            right: 10px;
            width: 32px;
            height: 220px;
            background: linear-gradient(90deg, #d4892e 0%, #e8a040 40%, #daa050 100%);
            border-radius: 16px 14px 10px 12px;
            transform: rotate(-8deg);
            transform-origin: bottom center;
        }

        .giraffe-neck::before {
            content: '';
            position: absolute;
            top: 20px;
            left: 8px;
            width: 10px;
            height: 12px;
            background: rgba(139, 90, 20, 0.4);
            border-radius: 50%;
            box-shadow:
                0px 35px 0 2px rgba(139, 90, 20, 0.35),
                2px 70px 0 3px rgba(139, 90, 20, 0.4),
                -1px 105px 0 2px rgba(139, 90, 20, 0.35),
                1px 140px 0 3px rgba(139, 90, 20, 0.38),
                0px 175px 0 2px rgba(139, 90, 20, 0.3);
        }

        .giraffe-head {
            position: absolute;
            top: -28px;
            left: -8px;
            width: 46px;
            height: 32px;
            background: linear-gradient(180deg, #e8a040, #daa050);
            border-radius: 20px 25px 12px 15px;
            transform: rotate(5deg);
        }

        .giraffe-head::before {
            content: '';
            position: absolute;
            top: -10px;
            right: 5px;
            width: 10px;
            height: 16px;
            background: #e8a040;
            border-radius: 50%;
            border: 2px solid #c47e28;
            animation: earWiggle 3s ease-in-out infinite;
        }

        @keyframes earWiggle {
            0%, 80%, 100% { transform: rotate(0deg); }
            85% { transform: rotate(-10deg); }
            90% { transform: rotate(5deg); }
            95% { transform: rotate(-5deg); }
        }

        .ossicone {
            position: absolute;
            top: -15px;
            width: 6px;
            height: 14px;
            background: #c47e28;
            border-radius: 3px;
        }

        .ossicone::after {
            content: '';
            position: absolute;
            top: -4px;
            left: -2px;
            width: 10px;
            height: 10px;
            background: #c47e28;
            border-radius: 50%;
        }

        .ossicone.left { left: 8px; transform: rotate(-10deg); }
        .ossicone.right { right: 8px; transform: rotate(10deg); }

        .giraffe-eye {
            position: absolute;
            top: 8px;
            right: 8px;
            width: 8px;
            height: 9px;
            background: #2c1810;
            border-radius: 50%;
            animation: blink 5s ease-in-out infinite;
        }

        .giraffe-eye::after {
            content: '';
            position: absolute;
            top: 1px;
            right: 1px;
            width: 3px;
            height: 3px;
            background: rgba(255,255,255,0.7);
            border-radius: 50%;
        }

        @keyframes blink {
            0%, 92%, 100% { transform: scaleY(1); }
            95% { transform: scaleY(0.1); }
        }

        .giraffe-mouth {
            position: absolute;
            bottom: 2px;
            left: -2px;
            width: 14px;
            height: 6px;
            background: #8b5a2b;
            border-radius: 0 0 8px 4px;
            animation: chew 1.5s ease-in-out infinite;
        }

        @keyframes chew {
            0%, 100% { transform: scaleY(1) translateY(0); }
            25% { transform: scaleY(0.6) translateY(1px); }
            50% { transform: scaleY(1.1) translateY(-1px); }
            75% { transform: scaleY(0.7) translateY(0.5px); }
        }

        .giraffe-legs {
            position: absolute;
            bottom: -55px;
            left: 10px;
            display: flex;
            gap: 12px;
        }

        .leg {
            width: 16px;
            height: 58px;
            background: linear-gradient(90deg, #c47e28, #d4892e, #c47e28);
            border-radius: 8px 8px 6px 6px;
            position: relative;
        }

        .leg::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: -2px;
            width: 20px;
            height: 10px;
            background: #8b6914;
            border-radius: 4px 10px 6px 4px;
        }

        .leg.back { background: linear-gradient(90deg, #b07020, #c47e28, #b07020); }

        .giraffe-tail {
            position: absolute;
            bottom: 30px;
            left: -15px;
            width: 4px;
            height: 40px;
            background: #d4892e;
            border-radius: 2px;
            transform-origin: top center;
            animation: tailSwish 2s ease-in-out infinite;
        }

        .giraffe-tail::after {
            content: '';
            position: absolute;
            bottom: -6px;
            left: -4px;
            width: 12px;
            height: 10px;
            background: #8b5a2b;
            border-radius: 50%;
        }

        @keyframes tailSwish {
            0%, 100% { transform: rotate(-10deg); }
            50% { transform: rotate(15deg); }
        }

        .floating-leaf {
            position: fixed;
            width: 14px;
            height: 8px;
            background: #5cc048;
            border-radius: 0 50% 50% 0;
            opacity: 0.7;
            z-index: 5;
            pointer-events: none;
        }

        .floating-leaf:nth-child(1) { left: 20%; animation: leafFall 8s linear infinite; animation-delay: 0s; background: #4a9e36; }
        .floating-leaf:nth-child(2) { left: 45%; animation: leafFall 10s linear infinite; animation-delay: 2s; transform: scaleX(-1); }
        .floating-leaf:nth-child(3) { left: 70%; animation: leafFall 9s linear infinite; animation-delay: 4s; background: #6cd058; }
        .floating-leaf:nth-child(4) { left: 30%; animation: leafFall 11s linear infinite; animation-delay: 1s; width: 10px; height: 6px; }
        .floating-leaf:nth-child(5) { left: 80%; animation: leafFall 8.5s linear infinite; animation-delay: 5s; transform: scaleX(-1); background: #3d8a2e; }

        @keyframes leafFall {
            0% { top: 25%; transform: translateX(0) rotate(0deg); opacity: 0; }
            10% { opacity: 0.7; }
            100% { top: 85%; transform: translateX(80px) rotate(360deg); opacity: 0; }
        }

        .ui-overlay {
            position: relative;
            z-index: 10;
            text-align: center;
            padding: 20px;
        }

        .scene-icon {
            font-size: 28px;
            margin-bottom: 12px;
            filter: drop-shadow(0 2px 6px rgba(0,0,0,0.3));
            animation: gentleBob 3s ease-in-out infinite;
        }

        @keyframes gentleBob {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }

        .timer-container {
            margin-bottom: 24px;
        }

        .timer-label {
            font-size: 15px;
            color: rgba(255, 248, 230, 0.65);
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 10px;
            font-weight: 600;
            text-shadow: 0 1px 4px rgba(0,0,0,0.3);
        }

        .timer-display {
            font-size: 64px;
            font-weight: 700;
            font-variant-numeric: tabular-nums;
            background: rgba(40, 25, 10, 0.55);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 18px 36px;
            border-radius: 16px;
            border: 1.5px solid rgba(232, 160, 64, 0.25);
            color: #ffe8b8;
            text-shadow: 0 0 18px rgba(232, 160, 64, 0.25);
            box-shadow: 0 8px 32px rgba(0,0,0,0.25);
        }

        .timer-display.warning {
            color: #f0c040;
            border-color: rgba(240, 192, 64, 0.45);
            text-shadow: 0 0 20px rgba(240, 192, 64, 0.35);
        }

        .timer-display.danger {
            color: #e86040;
            border-color: rgba(232, 96, 64, 0.5);
            text-shadow: 0 0 20px rgba(232, 96, 64, 0.4);
            animation: shake 0.5s infinite;
        }

        @keyframes shake {
            0% { transform: translateX(0); }
            25% { transform: translateX(-4px); }
            75% { transform: translateX(4px); }
            100% { transform: translateX(0); }
        }

        .tab-warning {
            display: none;
            background: rgba(232, 96, 64, 0.18);
            border: 1px solid rgba(232, 96, 64, 0.4);
            color: #f0a080;
            padding: 12px 18px;
            border-radius: 10px;
            margin-bottom: 16px;
            text-align: center;
            font-size: 13px;
            font-weight: 600;
            animation: fadeIn 0.3s;
            backdrop-filter: blur(8px);
        }

        .tab-warning.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .btn-group {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        .action-btn {
            background: rgba(40, 25, 10, 0.5);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1.5px solid rgba(232, 160, 64, 0.3);
            color: #ffe8b8;
            padding: 14px 36px;
            font-size: 16px;
            font-weight: 600;
            font-family: 'Quicksand', sans-serif;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
            box-shadow: 0 4px 16px rgba(0,0,0,0.2);
        }

        .action-btn:hover {
            background: rgba(40, 25, 10, 0.7);
            border-color: rgba(232, 160, 64, 0.55);
            transform: translateY(-2px);
            box-shadow: 0 6px 24px rgba(0,0,0,0.3);
        }

        .action-btn:active {
            transform: translateY(0);
        }

        .action-btn.pay-btn {
            background: linear-gradient(135deg, #d4892e, #e8a040);
            border: none;
            color: #3a2010;
            box-shadow: 0 4px 20px rgba(212, 137, 46, 0.4);
        }

        .action-btn.pay-btn:hover {
            box-shadow: 0 6px 28px rgba(212, 137, 46, 0.6);
            background: linear-gradient(135deg, #e8a040, #f0b050);
        }

        .action-btn.logout-btn {
            background: rgba(40, 25, 10, 0.35);
            border: 1.5px solid rgba(232, 96, 64, 0.35);
            color: #f0a080;
            font-size: 13px;
            padding: 10px 22px;
        }

        .action-btn.logout-btn:hover {
            background: rgba(232, 96, 64, 0.2);
            border-color: rgba(232, 96, 64, 0.6);
        }

        .action-btn.logout-btn.logging-out {
            pointer-events: none;
            opacity: 0.5;
        }

        .hidden {
            display: none !important;
        }

        .logout-toast {
            position: fixed;
            top: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(-20px);
            background: rgba(40, 25, 10, 0.9);
            backdrop-filter: blur(10px);
            color: #f0a080;
            padding: 12px 28px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 600;
            font-family: 'Quicksand', sans-serif;
            border: 1px solid rgba(232, 96, 64, 0.4);
            box-shadow: 0 8px 30px rgba(0,0,0,0.4);
            opacity: 0;
            pointer-events: none;
            transition: all 0.4s ease;
            z-index: 9999;
        }

        .logout-toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        .bush {
            position: fixed;
            bottom: 17%;
            z-index: 2;
            pointer-events: none;
        }

        .bush-blob {
            border-radius: 50%;
            position: absolute;
        }

        .bush.left-bush { left: 8%; }
        .bush.left-bush .bush-blob:nth-child(1) { width: 40px; height: 30px; background: #3d7a28; }
        .bush.left-bush .bush-blob:nth-child(2) { width: 35px; height: 28px; background: #4a8e32; left: 15px; top: -8px; }
        .bush.left-bush .bush-blob:nth-child(3) { width: 30px; height: 22px; background: #357020; left: -10px; top: 2px; }

        .bush.right-bush { right: 6%; }
        .bush.right-bush .bush-blob:nth-child(1) { width: 35px; height: 26px; background: #357020; }
        .bush.right-bush .bush-blob:nth-child(2) { width: 40px; height: 30px; background: #3d8a2e; left: 12px; top: -10px; }
        .bush.right-bush .bush-blob:nth-child(3) { width: 28px; height: 20px; background: #4a8e32; left: -8px; top: 3px; }

        .distant-tree {
            position: fixed;
            bottom: 18%;
            z-index: 1;
            pointer-events: none;
            opacity: 0.3;
        }

        .distant-tree .dt-trunk {
            width: 10px;
            height: 60px;
            background: #3d2a10;
            margin: 0 auto;
            border-radius: 3px;
        }

        .distant-tree .dt-top {
            width: 50px;
            height: 50px;
            background: #2d5a1a;
            border-radius: 50%;
            margin-bottom: -8px;
        }

        .distant-tree.t1 { left: 12%; transform: scale(0.7); }
        .distant-tree.t2 { right: 15%; transform: scale(0.85); }
        .distant-tree.t3 { left: 25%; transform: scale(0.5); opacity: 0.2; }

        @media (max-width: 600px) {
            .timer-display {
                font-size: 44px;
                padding: 14px 24px;
            }
            .tree-container {
                left: 55%;
                transform: translateX(-50%) scale(0.7);
            }
            .giraffe-container {
                left: calc(55% + 20px);
                transform: scale(0.65);
                transform-origin: bottom left;
            }
        }
    </style>
</head>
<body>

    <div class="logout-toast" id="logoutToast">Signing out...</div>

    <div class="floating-leaf"></div>
    <div class="floating-leaf"></div>
    <div class="floating-leaf"></div>
    <div class="floating-leaf"></div>
    <div class="floating-leaf"></div>

    <div class="distant-tree t1"><div class="dt-top"></div><div class="dt-trunk"></div></div>
    <div class="distant-tree t2"><div class="dt-top"></div><div class="dt-trunk"></div></div>
    <div class="distant-tree t3"><div class="dt-top"></div><div class="dt-trunk"></div></div>

    <div class="bush left-bush">
        <div class="bush-blob"></div>
        <div class="bush-blob"></div>

    <div class="bush right-bush">
        <div class="bush-blob"></div>
        <div class="bush-blob"></div>
        <div class="bush-blob"></div>
    </div>

    <div class="grass" style="left: 15%;">
        <span></span><span></span><span></span><span></span><span></span>
    </div>
    <div class="grass" style="left: 55%;">
        <span></span><span></span><span></span><span></span><span></span>
    </div>
    <div class="grass" style="left: 82%;">
        <span></span><span></span><span></span><span></span><span></span>

    <div class="ground"></div>

    <div class="tree-container">
        <div class="canopy">
            <div class="canopy-layer c1"></div>
            <div class="canopy-layer c2"></div>
            <div class="canopy-layer c3"></div>
            <div class="canopy-layer c4"></div>
            <div class="canopy-layer c5"></div>
            <div class="canopy-layer c6"></div>
            <div class="eating-leaves">
                <div class="leaf"></div>
                <div class="leaf"></div>
                <div class="leaf"></div>
                <div class="leaf"></div>

    <div class="giraffe-container">
        <div class="giraffe-body">
            <div class="giraffe-neck">
                <div class="giraffe-head">
                    <div class="ossicone left"></div>

            <div class="giraffe-tail"></div>

                <div class="leg"></div>

        </div>
    </div>

    <div class="ui-overlay">
        <div class="scene-icon">🌿</div>

        <div class="tab-warning" id="tabWarning">
            ⚠️ Multi-tab detected! Free timer speed increased.
        </div>

        <div id="freePhase">
            <div class="timer-container">
                <div class="timer-label">Free Session Time</div>
                <div class="timer-display" id="freeTimer">00:03:00</div>
            </div>
            <a href="men.html" class="action-btn" id="menuBtn">Open Menu</a>
        </div>

        <div id="awaitPhase" class="hidden">
            <div class="timer-container">
                <div class="timer-label">Next Session Available In</div>
                <div class="timer-display" id="awaitTimer">24:00:00</div>
            </div>
            <div class="btn-group">
                <button type="button" class="action-btn pay-btn" id="payBtn">Unlock Instantly — Pay Now</button>
                <button type="button" class="action-btn logout-btn" id="logoutBtn">Sign Out</button>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDpNJIZoLeZUhIoTepbLb_3rRLpseu9Zdo",
            authDomain: "my-project-66803-95cb3.firebaseapp.com",
            projectId: "my-project-66803-95cb3",
            storageBucket: "my-project-66803-95cb3.firebasestorage.app",
            messagingSenderId: "167159607898",
            appId: "1:167159607898:web:23ca11366b88868b085e63"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();

        // ── Logout ──
        const logoutBtn = document.getElementById("logoutBtn");
        const logoutToast = document.getElementById("logoutToast");

        logoutBtn.addEventListener("click", async () => {
            logoutBtn.classList.add("logging-out");
            logoutBtn.textContent = "Signing out...";
            logoutToast.classList.add("show");
            try {
                await auth.signOut();
            } catch (err) {
                console.warn("Sign-out error:", err);
            }
            const email = (JSON.parse(localStorage.getItem("userSession") || "{}")).email || "";
            localStorage.removeItem("userSession");
            if (email) {
                localStorage.removeItem("lock_free_" + email);
                localStorage.removeItem("lock_await_" + email);
            }
            setTimeout(() => { window.location.href = "index.html"; }, 800);
        });

        // ── Pay button — goes ONLY to pay.html ──
        const payBtn = document.getElementById("payBtn");
        payBtn.addEventListener("click", function (e) {
            e.preventDefault();
            e.stopPropagation();
            window.location.href = "pay.html";
        });

        // ── Core Config ──
        const FREE_TIME = 180;
        const AWAIT_TIME = 86400;
        const TAB_CHECK_INTERVAL = 1000;
        const TICK_INTERVAL = 1000;

        // ── Auth Guard ──
        let userData = JSON.parse(localStorage.getItem("userSession"));
        if (!userData || !userData.email) {
            window.location.href = "index.html";
            throw new Error("Not authenticated");
        }

        const email = userData.email;
        const LS_FREE_KEY = "lock_free_" + email;
        const LS_AWAIT_KEY = "lock_await_" + email;

        let freeTime = parseInt(localStorage.getItem(LS_FREE_KEY));
        let awaitTime = parseInt(localStorage.getItem(LS_AWAIT_KEY));

        if (isNaN(freeTime) && isNaN(awaitTime)) {
            freeTime = FREE_TIME;
            localStorage.setItem(LS_FREE_KEY, freeTime);
        } else if (!isNaN(freeTime) && freeTime > 0) {
            // continue free session
        } else if (isNaN(awaitTime) || awaitTime <= 0) {
            awaitTime = AWAIT_TIME;
            localStorage.setItem(LS_AWAIT_KEY, awaitTime);
        }

        // ── DOM ──
        const freePhase = document.getElementById("freePhase");
        const awaitPhase = document.getElementById("awaitPhase");
        const freeTimerEl = document.getElementById("freeTimer");
        const awaitTimerEl = document.getElementById("awaitTimer");
        const tabWarning = document.getElementById("tabWarning");

        // ── Multi-Tab Detection ──
        let activeTabs = 1;
        const TAB_ID = Date.now().toString();
        const bc = new BroadcastChannel("free_tab_sync");

        function updateTabCount() {
            activeTabs = 1;
            bc.postMessage({ type: "ping", id: TAB_ID });
        }

        bc.onmessage = function (event) {
            if (event.data.type === "ping") {
                activeTabs++;
                bc.postMessage({ type: "pong", id: TAB_ID });
            } else if (event.data.type === "pong") {
                if (event.data.id !== TAB_ID) activeTabs++;
            } else if (event.data.type === "close") {
                if (event.data.id !== TAB_ID) activeTabs = Math.max(1, activeTabs - 1);
            }
        };

        window.addEventListener("beforeunload", function () {
            bc.postMessage({ type: "close", id: TAB_ID });
        });

        updateTabCount();
        setInterval(updateTabCount, TAB_CHECK_INTERVAL);

        // ── Helpers ──
        function formatTime(totalSeconds) {
            var h = Math.floor(totalSeconds / 3600);
            var m = Math.floor((totalSeconds % 3600) / 60);
            var s = totalSeconds % 60;
            return String(h).padStart(2, "0") + ":" + String(m).padStart(2, "0") + ":" + String(s).padStart(2, "0");
        }

        function switchToAwaitPhase() {
            freePhase.classList.add("hidden");
            awaitPhase.classList.remove("hidden");
            var stored = parseInt(localStorage.getItem(LS_AWAIT_KEY));
            if (isNaN(stored) || stored <= 0) {
                awaitTime = AWAIT_TIME;
                localStorage.setItem(LS_AWAIT_KEY, awaitTime);
            } else {
                awaitTime = stored;
            }
            awaitTimerEl.innerText = formatTime(awaitTime);
            if (window.menuWindow && !window.menuWindow.closed) {
                window.menuWindow.close();
            }
        }

        // ── Engine Tick ──
        function engineTick() {
            freeTime = parseInt(localStorage.getItem(LS_FREE_KEY));
            awaitTime = parseInt(localStorage.getItem(LS_AWAIT_KEY));

            if (freeTime > 0) {
                tabWarning.classList.toggle("active", activeTabs > 1);
                freeTime -= activeTabs;
                if (freeTime <= 0) {
                    freeTime = 0;
                    localStorage.setItem(LS_FREE_KEY, 0);
                    localStorage.setItem(LS_AWAIT_KEY, AWAIT_TIME);
                    switchToAwaitPhase();
                    return;
                }
                localStorage.setItem(LS_FREE_KEY, freeTime);
                freeTimerEl.innerText = formatTime(freeTime);
                if (freeTime <= 10) freeTimerEl.className = "timer-display danger";
                else if (freeTime <= 30) freeTimerEl.className = "timer-display warning";
                else freeTimerEl.className = "timer-display";
            } else {
                awaitTime -= 1;
                if (awaitTime <= 0) {
                    awaitTime = 0;
                    localStorage.setItem(LS_AWAIT_KEY, 0);
                    localStorage.setItem(LS_FREE_KEY, FREE_TIME);
                    location.reload();
                    return;
                }
                localStorage.setItem(LS_AWAIT_KEY, awaitTime);
                awaitTimerEl.innerText = formatTime(awaitTime);
            }
        }

        // ── Init ──
        function init() {
            if (freeTime > 0) {
                freeTimerEl.innerText = formatTime(freeTime);
            } else {
                switchToAwaitPhase();
            }
            setInterval(engineTick, TICK_INTERVAL);
        }

        // ── Menu button opens men.html in new window ──
        document.getElementById("menuBtn").addEventListener("click", function (e) {
            e.preventDefault();
            window.menuWindow = window.open("men.html", "_blank", "width=800,height=600");
        });

        // ── Periodic localStorage sync ──
        setInterval(function () {
            if (freeTime > 0) {
                if (parseInt(localStorage.getItem(LS_FREE_KEY)) !== freeTime) {
                    localStorage.setItem(LS_FREE_KEY, freeTime);
                }
            } else {
                if (parseInt(localStorage.getItem(LS_AWAIT_KEY)) !== awaitTime) {
                    localStorage.setItem(LS_AWAIT_KEY, awaitTime);
                }
            }
        }, 500);

        init();
    </script>
</body>
