<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Free Timer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <script type="module">

        const firebaseConfig = {
            apiKey: "AIzaSyDpNJIZoLeZUhIoTepbLb_3rRLpseu9Zdo",
            authDomain: "my-project-66803-95cb3.firebaseapp.com",
            projectId: "my-project-66803-95cb3",
            storageBucket: "my-project-66803-95cb3.firebasestorage.app",
            messagingSenderId: "167159607898",
            appId: "1:167159607898:web:23ca11366b88868b085e63"

        const app = initializeApp(firebaseConfig);

        setPersistence(auth, browserLocalPersistence)

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        orbitron: ["Orbitron", "monospace"],
                        space: ["Space Grotesk", "sans-serif"],
                    }
                }
            }
        }
    </script>
    <style>
        :root {
            --bg:          #080604;
            --bg-deep:     #0c0906;
            --fg:          #f0e0c4;
            --fg-dim:      #c8b896;
            --muted:       #6b5a3e;
            --accent:      #ffd700;
            --accent-mid:  #daa520;
            --accent-dim:  #b8860b;
            --accent-dark: #8b6914;
            --card:        #12100a;
            --card-alt:    #1a150c;
            --border:      #2a2010;
            --border-lit:  #3d2e0a;
            --danger:      #e74c3c;
            --await-color: #e67e22;
            --pay-color:   #ffd700;
            --gold-glow:   rgba(255,215,0,0.35);
            --gold-soft:   rgba(255,215,0,0.08);
            --gold-faint:  rgba(255,215,0,0.03);
        }
        *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family:"Space Grotesk",sans-serif;
            background:var(--bg);
            color:var(--fg);
            min-height:100vh;
            overflow-x:hidden;
        }

        .bg-grid {
            position:fixed;inset:0;
            background-image:
                linear-gradient(rgba(255,215,0,0.018) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,215,0,0.018) 1px, transparent 1px);
            background-size:60px 60px;
            animation:gridShift 30s linear infinite;
        }
        @keyframes gridShift { to{transform:translate(60px,60px)} }

        .bg-grain {
            position:fixed;inset:0;pointer-events:none;z-index:998;
            background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
            background-repeat:repeat;
        }

        .orb{position:fixed;border-radius:50%;filter:blur(130px);pointer-events:none}
        .orb-1{width:550px;height:550px;background:radial-gradient(circle,rgba(255,215,0,.1),rgba(184,134,11,.04),transparent 70%);top:-200px;right:-180px;animation:orbDrift 12s ease-in-out infinite}
        .orb-2{width:420px;height:420px;background:radial-gradient(circle,rgba(218,165,32,.06),rgba(139,105,20,.03),transparent 70%);bottom:-120px;left:-120px;animation:orbDrift 14s ease-in-out infinite reverse}
        .orb-3{width:280px;height:280px;background:radial-gradient(circle,rgba(255,215,0,.06),transparent 70%);top:50%;left:50%;transform:translate(-50%,-50%);animation:orbPulse 7s ease-in-out infinite}
        @keyframes orbDrift{0%,100%{transform:translate(0,0) scale(1)}33%{transform:translate(50px,-35px) scale(1.06)}66%{transform:translate(-25px,25px) scale(.94)}}
        @keyframes orbPulse{0%,100%{opacity:.4;transform:translate(-50%,-50%) scale(1)}50%{opacity:1;transform:translate(-50%,-50%) scale(1.25)}}

        .scanlines{position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.02) 2px,rgba(0,0,0,.02) 4px);pointer-events:none;z-index:999}

        .corner-deco{position:fixed;width:65px;height:65px;pointer-events:none}
        .corner-deco::before,.corner-deco::after{content:"";position:absolute;background:var(--accent-dim);opacity:.25}
        .corner-tl{top:14px;left:14px}.corner-tl::before{top:0;left:0;width:28px;height:1px}.corner-tl::after{top:0;left:0;width:1px;height:28px}
        .corner-tr{top:14px;right:14px}.corner-tr::before{top:0;right:0;width:28px;height:1px}.corner-tr::after{top:0;right:0;width:1px;height:28px}
        .corner-bl{bottom:14px;left:14px}.corner-bl::before{bottom:0;left:0;width:28px;height:1px}.corner-bl::after{bottom:0;left:0;width:1px;height:28px}
        .corner-br{bottom:14px;right:14px}.corner-br::before{bottom:0;right:0;width:28px;height:1px}.corner-br::after{bottom:0;right:0;width:1px;height:28px}

        .timer-display {
            font-family:"Orbitron",monospace;
            font-size:clamp(3rem,10vw,8rem);
            font-weight:900;letter-spacing:.05em;
            color:var(--accent);
            text-shadow:0 0 20px rgba(255,215,0,.5),0 0 50px rgba(255,215,0,.2),0 0 100px rgba(184,134,11,.1);
            line-height:1;
        }
        .timer-display.await-mode {
            color:var(--await-color);
            text-shadow:0 0 25px rgba(230,126,34,.4),0 0 60px rgba(230,126,34,.12);
        }
        .timer-display.sm{font-size:clamp(1.8rem,5vw,3.2rem)}
        .separator{animation:blink 1s step-end infinite}
        @keyframes blink{50%{opacity:.15}}

        .progress-ring{transform:rotate(-90deg)}
        .progress-circle{
            transition:stroke-dashoffset .25s linear;
            stroke:var(--accent);
            filter:drop-shadow(0 0 8px rgba(255,215,0,.55));
        }
        .progress-circle.await-mode{
            stroke:var(--await-color);
            filter:drop-shadow(0 0 8px rgba(230,126,34,.5));
        }
        .progress-bg{stroke:var(--border)}

        .tab-card{
            background:linear-gradient(155deg,var(--card),var(--card-alt));
            border:1px solid var(--border);
            backdrop-filter:blur(16px);
            transition:border-color .3s,box-shadow .3s;
        }
        .tab-card:hover{border-color:var(--border-lit);box-shadow:0 0 40px var(--gold-faint)}
        .tab-number{
            font-family:"Orbitron",monospace;font-size:2.5rem;font-weight:800;
            color:var(--accent);text-shadow:0 0 20px rgba(255,215,0,.35);
        }
        .tab-number.amber{color:var(--await-color);text-shadow:0 0 18px rgba(230,126,34,.3)}

        .speed-badge{
            display:inline-flex;align-items:center;gap:6px;
            background:rgba(231,76,60,.07);border:1px solid rgba(231,76,60,.18);
            color:var(--danger);padding:6px 16px;border-radius:6px;
            font-family:"Orbitron",monospace;font-size:.72rem;font-weight:600;
            letter-spacing:.12em;transition:all .3s ease;
        }
        .speed-badge.normal{
            background:var(--gold-soft);border-color:rgba(255,215,0,.15);
            color:var(--accent-mid);
        }

        .menu-btn{
            background:transparent;border:1px solid var(--border);color:var(--fg-dim);
            padding:14px 44px;border-radius:10px;cursor:pointer;
            font-family:"Space Grotesk",sans-serif;font-size:1.05rem;font-weight:500;
            transition:all .25s ease;display:inline-flex;align-items:center;gap:12px;
            text-decoration:none;
        }
        .menu-btn:hover{
            border-color:var(--accent-dim);color:var(--accent);
            box-shadow:0 0 30px var(--gold-faint);transform:translateY(-2px);
        }
        .menu-btn:focus-visible{outline:2px solid var(--accent-dim);outline-offset:2px}

        .logout-btn{
            background:linear-gradient(145deg,rgba(231,76,60,.1),rgba(231,76,60,.03));
            border:2px solid rgba(231,76,60,.3);color:var(--danger);
            padding:14px 40px;border-radius:10px;
            font-family:"Orbitron",monospace;font-size:.9rem;font-weight:700;
            letter-spacing:.12em;cursor:pointer;transition:all .3s ease;
            display:inline-flex;align-items:center;gap:10px;
        }
        .logout-btn:hover{
            background:linear-gradient(145deg,rgba(231,76,60,.18),rgba(231,76,60,.06));
            border-color:var(--danger);box-shadow:0 0 35px rgba(231,76,60,.12);transform:translateY(-2px);
        }
        .logout-btn:active{transform:translateY(0) scale(.98)}
        .logout-btn:focus-visible{outline:2px solid var(--danger);outline-offset:3px}
        .logout-btn:disabled{opacity:.5;cursor:not-allowed;transform:none!important;box-shadow:none!important}

        .pay-card{
            background:linear-gradient(160deg,rgba(255,215,0,.06),rgba(184,134,11,.02),var(--card));
            border:1px solid rgba(255,215,0,.12);border-radius:16px;
            padding:32px 28px;backdrop-filter:blur(20px);
            position:relative;overflow:hidden;max-width:320px;
        }
        .pay-card::before{
            content:"";position:absolute;top:-50%;right:-50%;width:200%;height:200%;
            background:radial-gradient(circle at 70% 30%,rgba(255,215,0,.05),transparent 60%);
            pointer-events:none;
        }
        .pay-card::after{
            content:"";position:absolute;bottom:-40%;left:-40%;width:180%;height:180%;
            background:radial-gradient(circle at 30% 70%,rgba(218,165,32,.04),transparent 55%);
            pointer-events:none;
        }
        .pay-btn{
            background:linear-gradient(135deg,#ffd700 0%,#daa520 40%,#b8860b 100%);
            color:#1a1208;border:none;padding:16px 0;border-radius:10px;
            font-family:"Orbitron",monospace;font-size:1.1rem;font-weight:800;
            letter-spacing:.2em;cursor:pointer;width:100%;transition:all .3s ease;
            display:flex;align-items:center;justify-content:center;gap:10px;
            position:relative;
            box-shadow:0 4px 20px rgba(255,215,0,.2),inset 0 1px 0 rgba(255,255,255,.15);
        }
        .pay-btn:hover{
            background:linear-gradient(135deg,#ffe44d 0%,#e6a800 40%,#c8960c 100%);
            box-shadow:0 6px 35px rgba(255,215,0,.35),0 10px 40px rgba(184,134,11,.2),inset 0 1px 0 rgba(255,255,255,.2);
            transform:translateY(-3px);
        }
        .pay-btn:active{transform:translateY(-1px)}
        .pay-btn:focus-visible{outline:2px solid var(--accent);outline-offset:3px}
        .pay-shimmer{
            position:absolute;top:0;left:-100%;width:100%;height:100%;
            background:linear-gradient(90deg,transparent,rgba(255,255,255,.2),transparent);
            animation:shimmer 2.8s ease-in-out infinite;pointer-events:none;
        }
        @keyframes shimmer{0%{left:-100%}100%{left:100%}}

        .await-badge{
            display:inline-block;
            background:linear-gradient(135deg,rgba(230,126,34,.08),rgba(230,126,34,.03));
            border:1px solid rgba(230,126,34,.18);color:var(--await-color);
            padding:8px 24px;border-radius:8px;
            font-family:"Orbitron",monospace;font-size:.8rem;font-weight:600;letter-spacing:.2em;
        }

        .particle{position:fixed;border-radius:50%;pointer-events:none;opacity:0}
        .particle-dot{width:2px;height:2px;background:var(--accent);box-shadow:0 0 4px rgba(255,215,0,.4);animation:floatUp 8s ease-in-out infinite}
        .particle-line{width:1px;height:18px;background:linear-gradient(to top,transparent,var(--accent-dim));animation:floatUp 11s ease-in-out infinite}
        .particle-glow{width:3px;height:3px;background:var(--accent-mid);box-shadow:0 0 8px rgba(255,215,0,.5);animation:floatUp 9s ease-in-out infinite}
        @keyframes floatUp{
            0%{opacity:0;transform:translateY(100vh) rotate(0deg) scale(.8)}
            12%{opacity:.6}82%{opacity:.5}
            100%{opacity:0;transform:translateY(-120px) rotate(200deg) scale(1.1)}
        }

        .toast-container{position:fixed;top:24px;right:24px;z-index:10000}
        .toast{
            background:var(--card-alt);border:1px solid var(--border-lit);border-left:3px solid var(--danger);
            padding:14px 20px;border-radius:8px;
            transform:translateX(calc(100% + 40px));transition:transform .35s cubic-bezier(.4,0,.2,1);
            font-size:.9rem;max-width:320px;color:var(--fg-dim);
        }
        .toast.visible{transform:translateX(0)}

        .loading-spinner{
            width:40px;height:40px;border:3px solid var(--border);
            border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;
        }
        @keyframes spin{to{transform:rotate(360deg)}}

        .status-dot{
            width:8px;height:8px;border-radius:50%;background:var(--accent);
            box-shadow:0 0 10px var(--gold-glow);animation:statusPulse 2s ease-in-out infinite;
        }
        @keyframes statusPulse{0%,100%{opacity:1;box-shadow:0 0 10px var(--gold-glow)}50%{opacity:.5;box-shadow:0 0 4px var(--gold-glow)}}

        .label-text{font-size:.7rem;text-transform:uppercase;letter-spacing:.15em;color:var(--muted)}
        .hidden{display:none!important}

        .await-grid{
            display:grid;grid-template-columns:1fr auto;gap:40px;
            align-items:center;width:100%;max-width:900px;
        }
        @media(max-width:768px){
            .await-grid{grid-template-columns:1fr;justify-items:center;gap:28px}
            .pay-card{max-width:100%;width:100%}
        }
        @media(max-width:640px){
            .timer-display{font-size:2.6rem}
            .timer-display.sm{font-size:1.7rem}
            .tab-number{font-size:2rem}
            .menu-btn,.logout-btn{padding:12px 28px;font-size:.9rem}
        }
        @media(prefers-reduced-motion:reduce){
            *,*::before,*::after{animation-duration:.01ms!important;animation-iteration-count:1!important;transition-duration:.01ms!important}
        }
    </style>
</head>
<body>
    <div class="bg-grid" aria-hidden="true"></div>
    <div class="bg-grain" aria-hidden="true"></div>
    <div class="orb orb-1" aria-hidden="true"></div>
    <div class="orb orb-2" aria-hidden="true"></div>
    <div class="orb orb-3" aria-hidden="true"></div>
    <div class="scanlines" aria-hidden="true"></div>
    <div class="corner-deco corner-tl" aria-hidden="true"></div>
    <div class="corner-deco corner-tr" aria-hidden="true"></div>
    <div class="corner-deco corner-bl" aria-hidden="true"></div>
    <div class="corner-deco corner-br" aria-hidden="true"></div>
    <div id="particles" aria-hidden="true"></div>
    <div class="toast-container"><div id="toast" class="toast" role="alert"><span id="toastMsg"></span></div></div>

    <main class="relative z-10 min-h-screen flex flex-col">

        <section id="loadingScreen" class="flex-1 flex items-center justify-center" aria-label="Loading">
            <div class="loading-spinner"></div>
        </section>

        <!-- ========== COUNTDOWN SCREEN ========== -->
        <section id="countdownScreen" class="hidden flex-1 flex flex-col items-center justify-center gap-7 px-4" aria-label="Countdown timer">
            <div class="flex items-center gap-3 text-sm text-[var(--muted)]">
                <div class="status-dot"></div>
                <span id="userEmailDisplay"></span>
            </div>

            <div class="relative">
                <svg class="progress-ring" width="320" height="320" aria-hidden="true">
                    <circle class="progress-bg" cx="160" cy="160" r="145" fill="none" stroke-width="3"/>
                    <circle id="progressCircle" class="progress-circle" cx="160" cy="160" r="145" fill="none"
                        stroke-width="4" stroke-linecap="round" stroke-dasharray="911" stroke-dashoffset="0"/>
                </svg>
                <div class="absolute inset-0 flex items-center justify-center flex-col">
                    <div class="timer-display" id="mainTimer" aria-live="polite" aria-atomic="true">
                        <span id="tHours">03</span><span class="separator">:</span><span id="tMinutes">00</span><span class="separator">:</span><span id="tSeconds">00</span>
                    </div>
                    <div class="label-text mt-3 tracking-widest" style="color:var(--accent-dark)">Remaining</div>
                </div>
            </div>

            <div class="flex flex-col items-center gap-3">
                <div class="tab-card rounded-2xl px-8 py-5 text-center">
                    <div class="label-text mb-2">Your Active Tabs</div>
                    <div class="tab-number" id="tabCountDisplay">1</div>
                </div>
                <div class="speed-badge normal" id="speedBadge">
                    <i class="fas fa-gauge-high" aria-hidden="true"></i>
                    <span id="speedText">SPEED x1</span>
                </div>
            </div>

            <a href="menu.html" class="menu-btn" aria-label="Go to menu">
                <i class="fas fa-bars" aria-hidden="true"></i>
                <span>Menu</span>
            </a>
        </section>

        <!-- ========== AWAIT SCREEN ========== -->
        <section id="awaitScreen" class="hidden flex-1 flex flex-col items-center justify-center gap-8 px-4" aria-label="Await phase">
            <div class="await-badge">SESSION EXPIRED</div>

            <div class="await-grid">
                <div class="flex flex-col items-center gap-6">
                    <div class="relative">
                        <svg class="progress-ring" width="230" height="230" aria-hidden="true">
                            <circle class="progress-bg" cx="115" cy="115" r="100" fill="none" stroke-width="3"/>
                            <circle id="awaitProgressCircle" class="progress-circle await-mode" cx="115" cy="115" r="100" fill="none"
                                stroke-width="3" stroke-linecap="round" stroke-dasharray="628" stroke-dashoffset="0"/>
                        </svg>
                        <div class="absolute inset-0 flex items-center justify-center flex-col">
                            <div class="timer-display await-mode sm" id="awaitTimer" aria-live="polite">
                                <span id="aHours">24</span><span class="separator">:</span><span id="aMinutes">00</span><span class="separator">:</span><span id="aSeconds">00</span>
                            </div>
                            <div class="label-text mt-2 tracking-widest" style="color:rgba(230,126,34,.4)">Until Reset</div>
                        </div>
                    </div>

                    <div class="tab-card rounded-xl px-6 py-4 text-center" style="border-color:rgba(230,126,34,.1)">
                        <div class="label-text mb-1">Your Active Tabs</div>
                        <div class="tab-number amber text-2xl" id="awaitTabCountDisplay">1</div>
                    </div>
                </div>

                <div class="pay-card">
                    <div class="relative z-10">
                        <div class="flex items-center gap-3 mb-5">
                            <div class="w-10 h-10 rounded-lg flex items-center justify-center" style="background:rgba(255,215,0,.08);border:1px solid rgba(255,215,0,.15)">
                                <i class="fas fa-lock text-sm" style="color:var(--accent-mid)"></i>
                            </div>
                            <span class="label-text" style="color:var(--accent-dark)">SCRIPT</span>
                        </div>
                        <h2 class="font-orbitron text-lg font-bold mb-2" style="color:var(--fg)">Pay to Continue</h2>
                        <p class="text-sm mb-6 leading-relaxed" style="color:var(--muted)">
                            Your free session has ended. Upgrade now to continue using the system without interruption.
                        </p>
                        <button id="payBtn" class="pay-btn" aria-label="Go to payment">
                            <span class="pay-shimmer"></span>
                            <i class="fas fa-credit-card"></i>
                            <span>PAY</span>
                        </button>
                        <div class="flex items-center gap-2 mt-4 justify-center">
                            <i class="fas fa-shield-halved text-xs" style="color:var(--accent-dark)"></i>
                            <span class="text-xs" style="color:var(--muted)">Secure payment</span>
                        </div>
                    </div>
                </div>
            </div>

            <button id="logoutBtn" class="logout-btn" aria-label="Log out">
                <i class="fas fa-right-from-bracket" aria-hidden="true"></i>
                <span>LOGOUT</span>
            </button>
        </section>

    </main>

    <script>
        const COUNTDOWN_MS = 3 * 60 * 1000;
        const AWAIT_MS     = 24 * 60 * 60 * 1000;
        const HB_MS        = 800;
        const STALE_MS     = 2500;
        const TICK_MS      = 80;

        /* All localStorage keys */
        const S = {
            START:       "ft_start",
            AWAIT_START: "ft_await_start",
            PHASE:       "ft_phase",
            TABS:        "ft_tabs",
            MY_ID:       "ft_my_id",
            CONSUMED:    "ft_consumed",
            USER_EMAIL:  "ft_user_email",
            ACTIVE:      "ft_active_session",
            SESSION_T:   "ft_session_time"
        };

        let myTabId   = null;
        let tickTimer = null;
        let hbTimer   = null;
        let channel   = null;
        let userEmail = "";

        const $load     = document.getElementById("loadingScreen");
        const $cd       = document.getElementById("countdownScreen");
        const $aw       = document.getElementById("awaitScreen");
        const $tH       = document.getElementById("tHours");
        const $tM       = document.getElementById("tMinutes");
        const $tS       = document.getElementById("tSeconds");
        const $prog     = document.getElementById("progressCircle");
        const $tabC     = document.getElementById("tabCountDisplay");
        const $atabC    = document.getElementById("awaitTabCountDisplay");
        const $email    = document.getElementById("userEmailDisplay");
        const $aH       = document.getElementById("aHours");
        const $aM       = document.getElementById("aMinutes");
        const $aS       = document.getElementById("aSeconds");
        const $aprog    = document.getElementById("awaitProgressCircle");
        const $logout   = document.getElementById("logoutBtn");
        const $payBtn   = document.getElementById("payBtn");
        const $toast    = document.getElementById("toast");
        const $toastMsg = document.getElementById("toastMsg");
        const $speedBdg = document.getElementById("speedBadge");
        const $speedTxt = document.getElementById("speedText");

        /* =============================================
           BROADCAST + STORAGE SYNC
        ============================================= */
        try {
            channel = new BroadcastChannel("free_timer_channel");
            channel.onmessage = (e) => onMsg(e.data);
        } catch(_){}

        window.addEventListener("storage", (e) => {
            if (e.key === S.TABS) refreshTabs();
            if (e.key === S.PHASE && e.newValue === "await") showAwait();
        });

        /* =============================================
           HELPERS
        ============================================= */
        const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2,10);
        const getPhase = () => localStorage.getItem(S.PHASE) || "countdown";
        const setPhase = (p) => localStorage.setItem(S.PHASE, p);

        function readTabs() {
            try {
                const t = JSON.parse(localStorage.getItem(S.TABS) || "{}");
                const n = Date.now(); let dirty = false;
                for (const k in t) { if (n - t[k].hb > STALE_MS) { delete t[k]; dirty = true; } }
                if (dirty) localStorage.setItem(S.TABS, JSON.stringify(t));
                return t;
            } catch(_) { return {}; }
        }
        const writeTabs = (t) => localStorage.setItem(S.TABS, JSON.stringify(t));

        function tabsForEmail(email) {
            return Object.values(readTabs()).filter(t => t.email === email).length;
        }

        function isLeader() {
            const tabs = readTabs();
            const mine = Object.values(tabs)
                .filter(t => t.email === userEmail)
                .sort((a, b) => a.id.localeCompare(b.id));
            return mine.length > 0 && mine[0].id === myTabId;
        }

        const bc = (m) => { if (channel) channel.postMessage(m); };

        function fmt(ms) {
            const tot = Math.max(0, Math.floor(ms / 1000));
            return {
                h: String(Math.floor(tot / 3600)).padStart(2, "0"),
                m: String(Math.floor((tot % 3600) / 60)).padStart(2, "0"),
                s: String(tot % 60).padStart(2, "0")
            };
        }

        let toastT;
        function toast(msg) {
            $toastMsg.textContent = msg;
            $toast.classList.add("visible");
            clearTimeout(toastT);
            toastT = setTimeout(() => $toast.classList.remove("visible"), 3500);
        }

        /* =============================================
           TAB REGISTRATION
        ============================================= */
        function regTab() {
            myTabId = uid();
            localStorage.setItem(S.MY_ID, myTabId);
            const t = readTabs();
            t[myTabId] = { id: myTabId, email: userEmail, hb: Date.now(), phase: getPhase() };
            writeTabs(t);
            bc({ t: "sync" });
            refreshTabs();
        }
        function unregTab() {
            if (!myTabId) return;
            const t = readTabs(); delete t[myTabId]; writeTabs(t);
            bc({ t: "sync" });
        }
        function hb() {
            if (!myTabId) return;
            const t = readTabs();
            if (t[myTabId]) { t[myTabId].hb = Date.now(); writeTabs(t); }
            bc({ t: "hb" });
        }
        function refreshTabs() {
            const c = tabsForEmail(userEmail);
            $tabC.textContent  = c;
            $atabC.textContent = c;
            updateSpeedBadge(c);
        }
        function updateSpeedBadge(n) {
            $speedTxt.textContent = "SPEED x" + n;
            if (n <= 1) $speedBdg.classList.add("normal");
            else $speedBdg.classList.remove("normal");
        }
        function onMsg(m) {
            if (m.t === "sync" || m.t === "hb") refreshTabs();
            if (m.t === "phase" && m.p === "await") showAwait();
        }

        /* =============================================
           SESSION STAMPING — used by both screens
           and by the PAY button to fresh-stamp for
           pay.html compatibility
        ============================================= */
        function stampSession() {
            const now = Date.now().toString();
            localStorage.setItem(S.START, now);
            localStorage.setItem(S.SESSION_T, now);
            localStorage.setItem(S.ACTIVE, "true");
            localStorage.setItem(S.USER_EMAIL, userEmail);
        }

        function ensureStart() {
            if (!localStorage.getItem(S.START)) {
                localStorage.setItem(S.START, Date.now().toString());
            }
        }

        function ensureAwaitStart() {
            if (!localStorage.getItem(S.AWAIT_START)) {
                localStorage.setItem(S.AWAIT_START, Date.now().toString());
            }
        }

        /* =============================================
           COUNTDOWN — consumed-based, n× multiplier
        ============================================= */
        function stopTick() { if (tickTimer) { clearInterval(tickTimer); tickTimer = null; } }

        function runCountdown() {
            stopTick();
            const C = 2 * Math.PI * 145;
            let last = "";
            (function tick() {
                if (isLeader()) {
                    const prev = parseFloat(localStorage.getItem(S.CONSUMED) || "0");
                    const n    = Math.max(1, tabsForEmail(userEmail));
                    localStorage.setItem(S.CONSUMED, (prev + n * TICK_MS).toString());
                }
                const consumed = parseFloat(localStorage.getItem(S.CONSUMED) || "0");
                const rem      = Math.max(0, COUNTDOWN_MS - consumed);
                const { h, m, s } = fmt(rem);
                const d = h + m + s;
                if (d !== last) {
                    $tH.textContent = h; $tM.textContent = m; $tS.textContent = s;
                    $prog.style.strokeDashoffset = C * (1 - rem / COUNTDOWN_MS);
                    last = d;
                }
                if (rem <= 0) { stopTick(); goAwait(); return; }
                tickTimer = setInterval(tick, TICK_MS);
            })();
        }

        function runAwait() {
            stopTick();
            const C = 2 * Math.PI * 100;
            let last = "";
            (function tick() {
                const rem = Math.max(0, AWAIT_MS - (Date.now() - parseInt(localStorage.getItem(S.AWAIT_START))));
                const { h, m, s } = fmt(rem);
                const d = h + m + s;
                if (d !== last) {
                    $aH.textContent = h; $aM.textContent = m; $aS.textContent = s;
                    $aprog.style.strokeDashoffset = C * (1 - rem / AWAIT_MS);
                    last = d;
                }
                if (rem <= 0) { stopTick(); return; }
                tickTimer = setInterval(tick, TICK_MS);
            })();
        }

        /* =============================================
           SCREENS
        ============================================= */
        function show(el) { [$load, $cd, $aw].forEach(s => s.classList.add("hidden")); el.classList.remove("hidden"); }

        function showCountdown() {
            show($cd);
            stampSession();
            if (localStorage.getItem(S.CONSUMED) === null) {
                localStorage.setItem(S.CONSUMED, "0");
            }
            runCountdown();
        }

        function showAwait() {
            if (getPhase() !== "await") return;
            show($aw);
            stampSession();
            ensureAwaitStart();
            runAwait();
        }

        function goAwait() {
            setPhase("await");
            localStorage.removeItem(S.CONSUMED);
            stampSession();
            ensureAwaitStart();
            bc({ t: "phase", p: "await" });
            showAwait();
        }

        /* =============================================
           PAY BUTTON — fresh-stamps session so
           pay.html sees a LIVE active session
        ============================================= */
        $payBtn.addEventListener("click", () => {
            /* Force-fresh stamp right now so pay.html cannot reject it as stale */
            const now = Date.now().toString();
            localStorage.setItem(S.START, now);
            localStorage.setItem(S.SESSION_T, now);
            localStorage.setItem(S.ACTIVE, "true");
            localStorage.setItem(S.USER_EMAIL, userEmail);
            localStorage.setItem(S.PHASE, "await");
            localStorage.setItem(S.AWAIT_START, now);
            if (myTabId) localStorage.setItem(S.MY_ID, myTabId);

            /* Go to pay */
            window.location.href = "pay.html";
        });

        /* =============================================
           LOGOUT
        ============================================= */
        $logout.addEventListener("click", () => {
            $logout.disabled = true;
            $logout.innerHTML = '<i class="fas fa-spinner fa-spin" aria-hidden="true"></i> <span>Signing out...</span>';
            unregTab(); stopTick();
            if (hbTimer) clearInterval(hbTimer);
            const cleanup = () => {
                [S.START, S.AWAIT_START, S.PHASE, S.TABS, S.MY_ID, S.CONSUMED, S.USER_EMAIL, S.ACTIVE, S.SESSION_T].forEach(k => localStorage.removeItem(k));
                window.location.replace("index.html");
            };
            if (window.__firebaseSignOut) {
                window.__firebaseSignOut()
                    .then(() => cleanup())
                    .catch(() => {
                        toast("Logout failed. Try again.");
                        $logout.disabled = false;
                        $logout.innerHTML = '<i class="fas fa-right-from-bracket" aria-hidden="true"></i> <span>LOGOUT</span>';
                    });
            } else cleanup();
        });

        /* =============================================
           PARTICLES
        ============================================= */
        (function() {
            const c = document.getElementById("particles");
            const types = ["particle-dot","particle-dot","particle-dot","particle-line","particle-glow"];
            for (let i = 0; i < 28; i++) {
                const e = document.createElement("div");
                e.className = "particle " + types[Math.floor(Math.random() * types.length)];
                e.style.left = Math.random() * 100 + "%";
                e.style.animationDelay = (Math.random() * 12) + "s";
                e.style.animationDuration = (6 + Math.random() * 7) + "s";
                c.appendChild(e);
            }
        })();

        /* =============================================
           BOOT
        ============================================= */
        function startApp(user) {
            userEmail = (user.email || "").trim().toLowerCase();
            $email.textContent = userEmail;
            regTab();
            hbTimer = setInterval(hb, HB_MS);
            getPhase() === "await" ? showAwait() : showCountdown();
        }

        function boot() {
            const onReady = () => {
                window.__onAuthStateChanged((user) => {
                    if (user) startApp(user);
                    else window.location.replace("index.html");
                });
            };
            if (window.__firebaseReady) onReady();
            else window.addEventListener("firebase-ready", onReady);
        }

        /* =============================================
           CLEANUP
        ============================================= */
        window.addEventListener("beforeunload", () => { unregTab(); stopTick(); if (hbTimer) clearInterval(hbTimer); });
        document.addEventListener("visibilitychange", () => { if (!document.hidden && myTabId) { refreshTabs(); hb(); } });

        boot();
    </script>
</body>
</html>
