<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard — JAMALI SAID KAZEMBE</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@200;400;700&family=Source+Sans+3:wght@300;400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            forest: { 900:'#040d06', 800:'#091a0e', 700:'#0e2515', 600:'#14331e', 500:'#1a4028', 400:'#256b3a', 300:'#2d8a48', 200:'#4ade80', 100:'#bbf7d0' },
            bark: { 700:'#3d2b1f', 600:'#5c3d2e', 500:'#7a5240', 400:'#9a7260', 300:'#c4a882' },
            moss:'#8fbc6a', leaf:'#6abf4b', cream:'#f5f0e8', fog:'#a3b899',
          },
          fontFamily: { display:['Oswald','sans-serif'], body:['Source Sans 3','sans-serif'] },
        },
      },
    };
  </script>
  <style>
    @keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
    @keyframes breathe{0%{opacity:.4;transform:translateX(-50%) scale(1)}100%{opacity:.8;transform:translateX(-50%) scale(1.1)}}
    @keyframes spin{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}
    .fade-up{animation:fadeUp .6s ease-out both}
    .d1{animation-delay:.15s}.d2{animation-delay:.3s}.d3{animation-delay:.45s}.d4{animation-delay:.6s}
  </style>
</head>
<body class="bg-forest-900 text-cream font-body min-h-screen">

  <!-- Loading screen (shown until session verified) -->
  <div id="pageLoader" class="fixed inset-0 z-[9999] flex flex-col items-center justify-center" style="background:#040d06">
    <div class="w-14 h-14 rounded-full border-[3px] border-forest-700 border-t-forest-200" style="animation:spin 1s linear infinite"></div>
    <p class="mt-5 text-fog text-sm tracking-[0.2em] uppercase">VERIFYING ACCESS...</p>
  </div>

  <!-- Background glow -->
  <div class="fixed inset-0 z-0 pointer-events-none" aria-hidden="true">
    <div class="absolute top-[20%] left-1/2 w-[700px] h-[700px] rounded-full" style="background:radial-gradient(circle,rgba(42,100,50,.25) 0%,transparent 70%);animation:breathe 8s ease-in-out infinite alternate;transform:translateX(-50%)"></div>
  </div>

  <!-- Top bar -->
  <header class="relative z-10 flex items-center justify-between px-6 py-4 border-b border-forest-600 border-opacity-30">
    <div class="flex items-center gap-3">
      <i class="fa-solid fa-leaf text-forest-300 text-lg"></i>
      <span class="font-display font-bold text-forest-200 uppercase tracking-[0.12em] text-sm">Jamali System</span>
    </div>
    <div class="flex items-center gap-4">
      <span class="text-fog text-xs tracking-wide uppercase hidden sm:inline">Free Dashboard</span>
      <button id="logoutBtn" class="flex items-center gap-2 px-4 py-2 rounded-lg text-sm font-display tracking-wider uppercase text-fog transition-all hover:text-cream hover:bg-forest-700" style="border:1px solid rgba(154,114,96,.2)">
        <i class="fa-solid fa-right-from-bracket text-xs"></i>
        <span>Logout</span>
      </button>
    </div>
  </header>

  <!-- Main content -->
  <main id="mainContent" class="relative z-10 flex flex-col items-center justify-center px-6" style="min-height:calc(100vh - 65px);display:none">

    <!-- Welcome toast -->
    <div id="welcomeToast" class="hidden fixed top-20 left-1/2 -translate-x-1/2 z-50 px-6 py-3 rounded-xl text-sm font-body text-cream fade-up" style="background:linear-gradient(135deg,rgba(37,107,58,.9),rgba(20,51,30,.95));border:1px solid rgba(74,222,128,.25);backdrop-filter:blur(10px)">
      <i class="fa-solid fa-circle-check text-forest-200 mr-2"></i>
      Welcome, <span id="toastName">User</span>
    </div>

    <!-- Profile card -->
    <div class="w-full max-w-md fade-up d1">
      <div class="rounded-2xl p-8 text-center" style="background:linear-gradient(150deg,rgba(14,37,21,.85),rgba(9,26,14,.95));border:1px solid rgba(45,138,72,.15);backdrop-filter:blur(14px)">
        
        <div class="mb-5">
          <img id="userPhoto" src="" alt="Profile" class="w-20 h-20 rounded-full mx-auto object-cover" style="border:2px solid rgba(74,222,128,.2);display:none">
          <div id="photoFallback" class="w-20 h-20 rounded-full mx-auto flex items-center justify-center" style="background:linear-gradient(140deg,rgba(45,138,72,.2),rgba(20,51,30,.4));border:2px solid rgba(74,222,128,.15)">
            <i class="fa-solid fa-user text-2xl text-forest-400"></i>
          </div>
        </div>

        <h1 id="userName" class="font-display font-bold text-xl text-cream uppercase tracking-wider mb-1">User</h1>
        <p id="userEmail" class="text-fog text-sm tracking-wide mb-4">email@example.com</p>

        <div class="inline-flex items-center gap-2 px-4 py-2 rounded-full text-xs font-display tracking-widest uppercase" style="background:rgba(37,107,58,.2);border:1px solid rgba(74,222,128,.12)">
          <i class="fa-solid fa-user text-forest-300"></i>
          <span class="text-forest-200">Free Account</span>
        </div>
      </div>
    </div>

    <!-- Placeholder info -->
    <div class="mt-8 text-center fade-up d2">
      <div class="grid grid-cols-1 sm:grid-cols-3 gap-4 max-w-lg">
        <div class="rounded-xl p-5" style="background:rgba(14,37,21,.6);border:1px solid rgba(45,138,72,.1)">
          <i class="fa-solid fa-chart-line text-forest-400 text-xl mb-2"></i>
          <p class="text-fog text-xs uppercase tracking-wider">Stats</p>
        </div>
        <div class="rounded-xl p-5" style="background:rgba(14,37,21,.6);border:1px solid rgba(45,138,72,.1)">
          <i class="fa-solid fa-folder-open text-forest-400 text-xl mb-2"></i>
          <p class="text-fog text-xs uppercase tracking-wider">Files</p>
        </div>
        <div class="rounded-xl p-5" style="background:rgba(14,37,21,.6);border:1px solid rgba(45,138,72,.1)">
          <i class="fa-solid fa-gear text-forest-400 text-xl mb-2"></i>
          <p class="text-fog text-xs uppercase tracking-wider">Settings</p>
        </div>
      </div>
      <p class="text-forest-500 text-xs mt-6 tracking-wide">Dashboard content will be built in free.js</p>
    </div>
  </main>

  <script>
    // ========================================
    // PROTECTION CHECK (runs immediately)
    // ========================================
    (function() {
      var email = sessionStorage.getItem("userEmail");
      var isAdmin = sessionStorage.getItem("isAdmin") === "true";
      
      // If admin tried to access free page, send to admin
      if (isAdmin) {
        window.location.replace("admin.html");
        return;
      }
      
      // If no session at all, send to login
      if (!email) {
        window.location.replace("login.html");
        return;
      }
      
      // Session exists — load the page
      loadPage();
    })();
    
    function loadPage() {
      var name = sessionStorage.getItem("userName") || "User";
      var email = sessionStorage.getItem("userEmail") || "";
      var photo = sessionStorage.getItem("userPhoto") || "";
      var justLoggedIn = sessionStorage.getItem("justLoggedIn");
      
      // Fill in page data
      document.getElementById("userName").textContent = name;
      document.getElementById("userEmail").textContent = email;
      document.getElementById("toastName").textContent = name;
      
      // Show photo if available
      if (photo) {
        document.getElementById("userPhoto").src = photo;
        document.getElementById("userPhoto").style.display = "block";
        document.getElementById("photoFallback").style.display = "none";
      }
      
      // Show welcome toast only on fresh login
      if (justLoggedIn === "1") {
        document.getElementById("welcomeToast").classList.remove("hidden");
        sessionStorage.removeItem("justLoggedIn");
        setTimeout(function() {
          var toast = document.getElementById("welcomeToast");
          if (toast) toast.classList.add("hidden");
        }, 4000);
      }
      
      // Hide loader, show content
      document.getElementById("pageLoader").style.display = "none";
      document.getElementById("mainContent").style.display = "flex";
      
      // Setup logout
      document.getElementById("logoutBtn").addEventListener("click", function() {
        sessionStorage.clear();
        window.location.replace("index.html");
      });
    }
  </script>
</body>
</html>
