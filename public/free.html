<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Free Access</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * { font-family: 'Inter', sans-serif; }
        body { background: #000; }
        .timer-text { font-variant-numeric: tabular-nums; }
        .logout-btn { display: none; }
        .logout-btn.visible { display: inline-flex; }
    </style>
</head>
<body class="min-h-screen text-white flex flex-col">

    <!-- Top Navbar -->
    <nav class="w-full z-50 bg-black/80 backdrop-blur-xl border-b border-white/10">
        <div class="max-w-6xl mx-auto px-6 h-16 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <img id="userPhoto" class="w-8 h-8 rounded-full" src="" alt="Profile">
                <span id="userName" class="font-medium text-sm text-neutral-300"></span>
            </div>
            <button id="logoutBtn" class="logout-btn text-sm font-medium text-neutral-400 hover:text-red-400 transition px-4 py-2 rounded-lg border border-transparent hover:border-red-500/30 cursor-pointer">
                Logout
            </button>
        </div>
    </nav>

    <!-- Main Content Area -->
    <main class="flex-1 flex items-center justify-center px-6">
        
        <!-- STATE 1: FREE COUNTDOWN VIEW -->
        <div id="freeView" class="hidden flex-col items-center text-center">
            <p class="text-neutral-500 uppercase tracking-widest text-sm mb-6">Free Session Time</p>
            <div id="freeTimer" class="timer-text text-7xl md:text-9xl font-bold tracking-tight text-white mb-12">
                00:03:00
            </div>
            <a href="menu.html" class="px-8 py-4 bg-blue-500 hover:bg-blue-600 text-white font-medium rounded-xl transition transform hover:scale-105 shadow-lg shadow-blue-500/20">
                Open Menu
            </a>
        </div>

        <!-- STATE 2: AWAIT COUNTDOWN VIEW -->
        <div id="awaitView" class="hidden flex-col items-center text-center max-w-lg">
            <div class="mb-10 p-4 rounded-xl bg-red-500/10 border border-red-500/20">
                <p class="text-red-400 font-semibold text-lg">Pay to continue using the system.</p>
                <p class="text-red-400/70 text-sm mt-1">Your free time has expired.</p>
            </div>
            <div class="flex flex-col sm:flex-row gap-6 items-center w-full">
                <button disabled class="flex-1 w-full py-6 px-8 bg-[#111] border border-white/10 rounded-xl text-left opacity-60 cursor-not-allowed">
                    <span class="text-neutral-500 text-sm font-medium block mb-2">AWAIT</span>
                    <span id="awaitTimer" class="timer-text text-3xl md:text-4xl font-bold text-white">24:00:00</span>
                </button>
                <a href="pay.html" class="flex-1 w-full py-6 px-8 bg-green-500 hover:bg-green-600 text-center rounded-xl font-bold text-lg transition transform hover:scale-105 shadow-lg shadow-green-500/20">
                    Pay Now
                </a>
            </div>
        </div>

        <!-- Loading State -->
        <div id="loadingView" class="flex flex-col items-center">
            <div class="w-8 h-8 border-2 border-blue-500 border-t-transparent rounded-full animate-spin mb-4"></div>
            <p class="text-neutral-500">Syncing session...</p>
        </div>

    </main>

    <!-- Firebase SDKs -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, updateDoc, deleteDoc, onSnapshot, runTransaction, FieldValue } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDpNJIZoLeZUhIoTepbLb_3rRLpseu9Zdo",
            authDomain: "my-project-66803-95cb3.firebaseapp.com",
            projectId: "my-project-66803-95cb3",
            storageBucket: "my-project-66803-95cb3.firebasestorage.app",
            messagingSenderId: "167159607898",
            appId: "1:167159607898:web:23ca11366b88868b085e63"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const sessionId = crypto.randomUUID();
        let currentEmail = null;
        let intervalId = null;
        let isLoggingOut = false;

        const freeView = document.getElementById("freeView");
        const awaitView = document.getElementById("awaitView");
        const loadingView = document.getElementById("loadingView");
        const logoutBtn = document.getElementById("logoutBtn");
        const freeTimerEl = document.getElementById("freeTimer");
        const awaitTimerEl = document.getElementById("awaitTimer");

        // ─────────────────────────────────────────────
        // LOGOUT — delete user doc from Firestore,
        // sign out of Firebase Auth, redirect to login
        // ─────────────────────────────────────────────
        async function handleLogout() {
            if (isLoggingOut) return;
            isLoggingOut = true;

            // Stop timer immediately
            if (intervalId) {
                clearInterval(intervalId);
                intervalId = null;
            }

            // Remove beforeunload so it doesn't fire during logout
            window.removeEventListener("beforeunload", cleanupOnUnload);

            // Visual feedback
            logoutBtn.textContent = "Signing out…";
            logoutBtn.disabled = true;
            logoutBtn.classList.add("opacity-50", "pointer-events-none");

            try {
                // 1. DELETE the user's entire document from Firestore
                if (currentEmail) {
                    const userRef = doc(db, "users", currentEmail);
                    await deleteDoc(userRef);
                    console.log("Firestore user doc deleted for:", currentEmail);
                }

                // 2. Sign out of Firebase Auth (clears browserLocalPersistence)
                await signOut(auth);
                console.log("Firebase Auth sign-out complete");

                // 3. Wait a moment for persistence wipe to finish
                await new Promise(r => setTimeout(r, 400));

                // 4. Redirect to login page (replace so Back won't return here)
                window.location.replace("index.html");

            } catch (error) {
                console.error("Logout error:", error);
                // Even if something fails, still redirect
                window.location.replace("index.html");
            }
        }

        logoutBtn.addEventListener("click", handleLogout);

        // ─────────────────────────────────────────────
        // BEFOREUNLOAD — clean session entry on tab close
        // ─────────────────────────────────────────────
        function cleanupOnUnload() {
            if (isLoggingOut || !currentEmail) return;
            try {
                updateDoc(doc(db, "users", currentEmail), {
                    [`sessions.${sessionId}`]: FieldValue.delete()
                });
            } catch (e) {}
        }
        window.addEventListener("beforeunload", cleanupOnUnload);

        // ─────────────────────────────────────────────
        // TIMER FORMATTING
        // ─────────────────────────────────────────────
        function formatTime(totalSeconds) {
            const sec = Math.max(0, Math.floor(totalSeconds));
            const h = Math.floor(sec / 3600);
            const m = Math.floor((sec % 3600) / 60);
            const s = sec % 60;
            return `${String(h).padStart(2, '0')}:${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
        }

        // ─────────────────────────────────────────────
        // VIEW SWITCHING
        // ─────────────────────────────────────────────
        function showView(view) {
            freeView.classList.add("hidden");
            freeView.classList.remove("flex");
            awaitView.classList.add("hidden");
            awaitView.classList.remove("flex");
            loadingView.classList.add("hidden");

            if (view === "free") {
                freeView.classList.remove("hidden");
                freeView.classList.add("flex");
                logoutBtn.classList.remove("visible");
            } else if (view === "await") {
                awaitView.classList.remove("hidden");
                awaitView.classList.add("flex");
                logoutBtn.classList.add("visible");
            }
        }

        // ─────────────────────────────────────────────
        // AUTH STATE
        // ─────────────────────────────────────────────
        onAuthStateChanged(auth, async (user) => {
            if (!user) {
                window.location.replace("index.html");
                return;
            }

            currentEmail = user.email.toLowerCase();

            document.getElementById("userName").textContent = user.displayName || "User";
            document.getElementById("userPhoto").src = user.photoURL || "https://ui-avatars.com/api/?name=User&background=111&color=fff";

            const userRef = doc(db, "users", currentEmail);

            // Only create doc if it doesn't exist
            const existingDoc = await getDoc(userRef);
            if (!existingDoc.exists()) {
                await setDoc(userRef, {
                    freeTimeRemaining: 180,
                    awaitTimeRemaining: 86400,
                    lastTick: Date.now(),
                    sessions: { [sessionId]: true }
                });
            } else {
                await updateDoc(userRef, {
                    lastTick: Date.now(),
                    [`sessions.${sessionId}`]: true
                });
            }

            // Real-time UI
            onSnapshot(userRef, (docSnap) => {
                if (!docSnap.exists()) return;
                const data = docSnap.data();
                const freeTime = data.freeTimeRemaining || 0;
                const awaitTime = data.awaitTimeRemaining || 0;

                if (freeTime > 0) {
                    showView("free");
                    freeTimerEl.textContent = formatTime(freeTime);
                } else {
                    showView("await");
                    awaitTimerEl.textContent = formatTime(awaitTime);
                }
            });

            // Countdown
            intervalId = setInterval(async () => {
                if (isLoggingOut) return;
                try {
                    await runTransaction(db, async (transaction) => {
                        const snap = await transaction.get(userRef);
                        if (!snap.exists()) return;

                        const data = snap.data();
                        const lastTick = data.lastTick || Date.now();
                        const now = Date.now();
                        const elapsed = Math.min(Math.floor((now - lastTick) / 1000), 60);

                        if (elapsed <= 0) return;

                        const freeTime = data.freeTimeRemaining || 0;
                        const awaitTime = data.awaitTimeRemaining || 0;

                        const updates = { lastTick: now };

                        if (freeTime > 0) {
                            updates.freeTimeRemaining = Math.max(0, freeTime - elapsed);
                        } else if (awaitTime > 0) {
                            const newAwait = Math.max(0, awaitTime - elapsed);
                            updates.awaitTimeRemaining = newAwait;
                            if (newAwait <= 0) {
                                updates.freeTimeRemaining = 180;
                                updates.awaitTimeRemaining = 86400;
                            }
                        }

                        transaction.update(userRef, updates);
                    });
                } catch (e) {
                    console.error("Timer transaction error", e);
                }
            }, 1000);
        });
    </script>
</body>
</html>
