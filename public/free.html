<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Free Session</title>
    <style>
        :root {
            --bg-color: #121212;
            --surface-color: #1e1e1e;
            --primary-color: #bb86fc;
            --secondary-color: #03dac6;
            --text-color: #ffffff;
            --text-secondary: #b0b0b0;
            --danger-color: #cf6679;
            --await-color: #ff9800;
            --font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--font-family);
            background-color: var(--bg-color);
            color: var(--text-color);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        header {
            padding: 20px;
            background-color: var(--surface-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #333;
        }

        .user-info {
            font-size: 0.9rem;
            color: var(--text-secondary);
        }

        .rate-counter {
            font-size: 1.2rem;
            font-weight: bold;
            color: var(--primary-color);
            background: rgba(187, 134, 252, 0.1);
            padding: 8px 16px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        #logout-btn {
            background-color: transparent;
            color: var(--danger-color);
            border: 1px solid var(--danger-color);
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: bold;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            display: none;
            margin-bottom: 20px;
        }

        #logout-btn:hover {
            background-color: var(--danger-color);
            color: white;
        }

        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            text-align: center;
        }

        .timer-display {
            font-size: 5rem;
            font-weight: 700;
            font-variant-numeric: tabular-nums;
            letter-spacing: 2px;
            margin-bottom: 40px;
            text-shadow: 0 0 20px rgba(0,0,0,0.5);
            transition: color 0.3s ease;
        }

        .timer-display.active {
            color: var(--secondary-color);
            animation: pulse 2s infinite;
        }

        .timer-display.awaiting {
            color: var(--await-color);
            font-size: 5rem;
            animation: none;
        }

        .status-message {
            margin-bottom: 30px;
            font-size: 1.2rem;
            color: var(--text-secondary);
            min-height: 1.5em;
        }

        .action-area {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn {
            padding: 15px 30px;
            font-size: 1.2rem;
            border: none;
            border-radius: 8px;
            text-transform: uppercase;
            font-weight: bold;
            text-decoration: none;
            display: inline-block;
            cursor: pointer;
            transition: opacity 0.3s ease, transform 0.3s ease;
        }

        .btn-menu {
            background-color: var(--surface-color);
            color: var(--text-color);
            border: 2px solid var(--text-secondary);
        }

        .btn-menu:hover {
            border-color: var(--text-color);
        }

        .hidden {
            display: none !important;
        }

        .btn-await {
            background-color: #333;
            color: #666;
            cursor: not-allowed;
            border: 1px solid #444;
        }

        .btn-pay {
            background-color: var(--primary-color);
            color: #000;
        }

        .btn-pay:hover {
            background-color: #a370db;
        }

        @keyframes pulse {
            0% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.8; transform: scale(0.98); }
            100% { opacity: 1; transform: scale(1); }
        }

        @media (max-width: 600px) {
            .timer-display { font-size: 3.5rem; }
            .action-area { flex-direction: column; width: 100%; }
            .btn { width: 100%; }
        }
    </style>
</head>
<body>

    <header>
        <div class="user-info">
            Logged in as <strong id="user-email-display">...</strong>
        </div>
        
        <div class="rate-counter">
            <span>Active Tabs:</span>
            <div id="tab-count">...</div>
        </div>
    </header>

    <main id="main-interface">
        <button id="logout-btn" type="button">Logout</button>

        <div id="timer" class="timer-display">00:03:00</div>
        <div id="status-text" class="status-message">Starting...</div>

        <div class="action-area">
            <!-- Menu Button is now visible by default -->
            <a id="btn-menu" href="menu.html" class="btn btn-menu">Menu</a>
            
            <button id="btn-await" class="btn btn-await hidden" disabled>Await</button>
            <a id="btn-pay" href="pay.html" class="btn btn-pay hidden">Pay</a>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
        import {
            getFirestore,
            doc,
            updateDoc,
            onSnapshot,
            serverTimestamp,
            runTransaction
        } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDpNJIZoLeZUhIoTepbLb_3rRLpseu9Zdo",
            authDomain: "my-project-66803-95cb3.firebaseapp.com",
            projectId: "my-project-66803-95cb3",
            storageBucket: "my-project-66803-95cb3.firebasestorage.app",
            messagingSenderId: "167159607898",
            appId: "1:167159607898:web:23ca11366b88868b085e63"
        };

        const TOTAL_WORK_SECONDS = 3 * 60; 
        const AWAIT_TIME_MS = 24 * 60 * 60 * 1000;
        const tabId = crypto.randomUUID();

        let sessionState = 'idle'; 
        let dbStartTime = null; 
        let dbEndTime = null;   
        let currentRate = 1;     
        let activeTabsList = [];
        let isFinishing = false; 

        const ui = {
            email: document.getElementById('user-email-display'),
            timer: document.getElementById('timer'),
            status: document.getElementById('status-text'),
            tabCount: document.getElementById('tab-count'),
            btnMenu: document.getElementById('btn-menu'),
            btnAwait: document.getElementById('btn-await'),
            btnPay: document.getElementById('btn-pay'),
            logoutBtn: document.getElementById('logout-btn')
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // ── 0. LOGOUT HANDLER ──
        ui.logoutBtn.addEventListener('click', async () => {
            try {
                await signOut(auth);
                window.location.href = "index.html";
            } catch (error) {
                console.error("Sign out error", error);
                alert("Error signing out");
            }
        });

        // ── 1. AUTH CHECK ──
        onAuthStateChanged(auth, (user) => {
            if (!user) {
                window.location.href = "index.html"; 
                return;
            }
            ui.email.textContent = user.email;
            initSession(user.email);
        });

        // ── 2. VISUAL TIMER LOOP ──
        setInterval(() => {
            updateVisualTimer();
        }, 100);

        function updateVisualTimer() {
            const now = new Date();

            if (sessionState === 'active' && dbStartTime) {
                const elapsedMs = now - dbStartTime;
                const elapsedSeconds = elapsedMs / 1000;

                const workDone = elapsedSeconds * currentRate;
                let remainingWork = TOTAL_WORK_SECONDS - workDone;

                if (remainingWork <= 0) {
                    ui.timer.textContent = "00:00:00";
                    finishSession(); 
                } else {
                    const displaySeconds = remainingWork / currentRate;
                    ui.timer.textContent = formatTime(displaySeconds * 1000);
                    ui.status.textContent = `Active (Speed: ${currentRate}x)`;
                }
            } else if (sessionState === 'awaiting' && dbEndTime) {
                const elapsedMs = now - dbEndTime;
                const remainingMs = AWAIT_TIME_MS - elapsedMs;

                if (remainingMs <= 0) {
                    ui.timer.textContent = "00:00:00";
                    ui.status.textContent = "Session Reset.";
                    resetSystem();
                } else {
                    ui.timer.textContent = formatTime(remainingMs);
                    ui.status.textContent = "Awaiting Reset (24h)";
                }
            } else {
                if (sessionState === 'idle') {
                    ui.timer.textContent = "00:03:00";
                    ui.status.textContent = "Ready";
                }
            }
        }

        // ── 3. DATABASE INITIALIZATION & SYNC (FIXED TAB CLEANUP) ──
        async function initSession(email) {
            const userRef = doc(db, "users", email);

            try {
                await runTransaction(db, async (transaction) => {
                    const snap = await transaction.get(userRef);
                    
                    if (!snap.exists()) {
                        // New User: Start Immediately
                        transaction.set(userRef, {
                            email: email,
                            sessionState: 'active',
                            startTime: serverTimestamp(),
                            activeTabs: [tabId], // Start clean with just this tab
                            createdAt: serverTimestamp()
                        });
                        return;
                    }

                    const data = snap.data();
                    let activeTabs = data.activeTabs || [];
                    let state = data.sessionState || 'idle';

                    // FIX: Only keep tabs from the current session
                    // If the user just opened this page and we are starting active,
                    // we should clear old tabs to fix the "4 tabs" bug.
                    if (state !== 'awaiting') {
                        // Force reset the list to just this tab when starting a new session
                        activeTabs = [tabId]; 
                    } else {
                        // If awaiting, we can't clear tabs because we are waiting
                        // But we still add this tab if the user reloaded
                        activeTabs = activeTabs.filter(id => id !== tabId);
                        activeTabs.push(tabId);
                    }

                    transaction.update(userRef, { activeTabs: activeTabs });

                    // Auto-start if not awaiting
                    if (state !== 'awaiting') {
                        transaction.update(userRef, {
                            sessionState: 'active',
                            startTime: serverTimestamp()
                        });
                    }
                });
            } catch (e) {
                console.error("Init failed:", e);
                ui.status.textContent = "Connection Error";
            }

            // Real-time listener
            onSnapshot(userRef, (docSnap) => {
                if (docSnap.exists()) {
                    handleDatabaseUpdate(docSnap.data());
                }
            });
        }

        // ── 4. UPDATE STATE FROM DATABASE (FIXED MENU VISIBILITY) ──
        function handleDatabaseUpdate(data) {
            sessionState = data.sessionState || 'idle';
            dbStartTime = data.startTime ? data.startTime.toDate() : null;
            dbEndTime = data.lastSessionEnd ? data.lastSessionEnd.toDate() : null;
            activeTabsList = data.activeTabs || [];
            
            if (sessionState === 'awaiting') {
                isFinishing = true;
                currentRate = 0; 
                
                ui.timer.classList.remove('active');
                ui.timer.classList.add('awaiting');
                
                // In Awaiting: Show Menu, Await, Pay
                ui.btnMenu.classList.remove('hidden');
                ui.btnAwait.classList.remove('hidden');
                ui.btnPay.classList.remove('hidden');
                ui.logoutBtn.style.display = 'block';

            } else {
                isFinishing = false;
                currentRate = activeTabsList.length > 0 ? activeTabsList.length : 1;
                ui.tabCount.textContent = currentRate;

                ui.timer.classList.add('active');
                ui.timer.classList.remove('awaiting');

                // In Active: Show Menu. Hide Await/Pay
                ui.btnMenu.classList.remove('hidden'); // FIX: Always show menu in active
                ui.btnAwait.classList.add('hidden');
                ui.btnPay.classList.add('hidden');
                ui.logoutBtn.style.display = 'none';
            }

            updateVisualTimer();
        }

        // ── 5. ACTIONS ──
        async function finishSession() {
            if (isFinishing) return;
            isFinishing = true;

            const email = ui.email.textContent;
            const userRef = doc(db, "users", email);

            try {
                await runTransaction(db, async (transaction) => {
                    const snap = await transaction.get(userRef);
                    if (!snap.exists()) return;
                    const data = snap.data();

                    if (data.sessionState === 'active') {
                        transaction.update(userRef, {
                            sessionState: 'awaiting',
                            lastSessionEnd: serverTimestamp(),
                            activeTabs: [] 
                        });
                    }
                });
            } catch (e) { 
                console.error("Finish Session Error:", e); 
            }
        }

        async function resetSystem() {
            if (sessionState !== 'awaiting') return;

            const email = ui.email.textContent;
            const userRef = doc(db, "users", email);

            try {
                await updateDoc(userRef, {
                    sessionState: 'idle',
                    startTime: null,
                    lastSessionEnd: null
                });
            } catch (e) { console.error(e); }
        }

        function formatTime(ms) {
            const totalSeconds = Math.max(0, ms / 1000);
            const h = Math.floor(totalSeconds / 3600);
            const m = Math.floor((totalSeconds % 3600) / 60);
            const s = Math.floor(totalSeconds % 60);
            return [h, m, s].map(v => v.toString().padStart(2, '0')).join(':');
        }

    </script>
</body>
</html>
