<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Free Access</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <style>
    :root {
      --bg: #0a0a0c;
      --bg-elevated: #131318;
      --card: #1a1a22;
      --border: rgba(255,255,255,0.06);
      --fg: #f0ece4;
      --fg-muted: #7a7680;
      --accent: #e8a849;
      --accent-glow: rgba(232,168,73,0.25);
      --accent-soft: rgba(232,168,73,0.08);
      --danger: #e85454;
      --pay-color: #4ade80;
      --pay-glow: rgba(74,222,128,0.25);
    }
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; overflow: hidden; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--fg);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .bg-layer {
      position: fixed; inset: 0; z-index: 0; pointer-events: none; overflow: hidden;
    }
    .bg-layer .orb {
      position: absolute; border-radius: 50%; filter: blur(100px); opacity: 0.4;
      animation: orbFloat 18s ease-in-out infinite alternate;
    }
    .orb--1 {
      width: 450px; height: 450px;
      background: radial-gradient(circle, rgba(232,168,73,0.3), transparent 70%);
      top: -15%; left: -10%;
    }
    .orb--2 {
      width: 350px; height: 350px;
      background: radial-gradient(circle, rgba(180,90,60,0.2), transparent 70%);
      bottom: -10%; right: -8%;
      animation-delay: -6s; animation-duration: 22s;
    }
    @keyframes orbFloat {
      0%   { transform: translate(0, 0) scale(1); }
      50%  { transform: translate(30px, -20px) scale(1.05); }
      100% { transform: translate(-15px, 15px) scale(0.97); }
    }
    .grid-pattern {
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background-image:
        linear-gradient(rgba(255,255,255,0.012) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.012) 1px, transparent 1px);
      background-size: 60px 60px;
      mask-image: radial-gradient(ellipse 60% 50% at 50% 50%, black 20%, transparent 70%);
      -webkit-mask-image: radial-gradient(ellipse 60% 50% at 50% 50%, black 20%, transparent 70%);
    }

    /* Loading screen */
    .loading-screen {
      position: fixed; inset: 0; z-index: 500;
      background: var(--bg);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 20px;
      transition: opacity 0.4s ease;
    }
    .loading-screen.hidden { opacity: 0; pointer-events: none; }
    .loading-spinner {
      width: 36px; height: 36px;
      border: 3px solid rgba(255,255,255,0.06);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    .loading-screen p { font-size: 14px; color: var(--fg-muted); }

    .state { display: none; }
    .state.active { display: flex; }

    #stateActive {
      flex-direction: column; align-items: center; gap: 40px;
      animation: fadeUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) both;
    }
    .user-bar {
      position: fixed; top: 0; left: 0; right: 0;
      display: flex; align-items: center; gap: 12px;
      padding: 16px 24px;
      background: rgba(10,10,12,0.7);
      backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border); z-index: 20;
    }
    .user-bar img {
      width: 36px; height: 36px; border-radius: 50%;
      object-fit: cover; border: 2px solid var(--border);
    }
    .user-bar .user-name {
      font-family: 'Space Grotesk', sans-serif; font-weight: 600; font-size: 14px;
    }
    .user-bar .user-email { font-size: 12px; color: var(--fg-muted); }

    .countdown-wrap { position: relative; width: 220px; height: 220px; }
    .countdown-ring { width: 100%; height: 100%; transform: rotate(-90deg); }
    .countdown-ring .track { fill: none; stroke: rgba(255,255,255,0.04); stroke-width: 6; }
    .countdown-ring .progress {
      fill: none; stroke: var(--accent); stroke-width: 6; stroke-linecap: round;
      transition: stroke-dashoffset 1s linear;
      filter: drop-shadow(0 0 8px var(--accent-glow));
    }
    .countdown-text {
      position: absolute; inset: 0;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
    }
    .countdown-text .time {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 48px; font-weight: 700; letter-spacing: -1px; line-height: 1;
    }
    .countdown-text .label {
      font-size: 12px; color: var(--fg-muted);
      margin-top: 6px; text-transform: uppercase; letter-spacing: 2px;
    }
    .menu-btn {
      display: flex; align-items: center; gap: 12px;
      padding: 16px 40px;
      border: 1px solid rgba(232,168,73,0.3); border-radius: 14px;
      background: linear-gradient(135deg, var(--accent-soft), transparent);
      color: var(--fg);
      font-family: 'Space Grotesk', sans-serif; font-size: 16px; font-weight: 600;
      cursor: pointer; outline: none;
      transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
      box-shadow: 0 8px 30px -10px var(--accent-glow);
    }
    .menu-btn:hover {
      transform: translateY(-2px); border-color: rgba(232,168,73,0.5);
      box-shadow: 0 12px 40px -8px var(--accent-glow);
    }
    .menu-btn:active { transform: translateY(0) scale(0.98); }
    .menu-btn:focus-visible { outline: 2px solid var(--accent); outline-offset: 3px; }
    .menu-btn i { font-size: 20px; color: var(--accent); }

    .expired-overlay {
      position: fixed; inset: 0; background: rgba(10,10,12,0.95);
      display: none; align-items: center; justify-content: center;
      flex-direction: column; gap: 16px; z-index: 100;
      animation: fadeIn 0.5s ease both;
    }
    .expired-overlay.active { display: flex; }
    .expired-overlay i { font-size: 40px; color: var(--danger); }
    .expired-overlay p { font-size: 18px; color: var(--fg-muted); }

    #stateAwait {
      flex-direction: column; align-items: center; gap: 32px;
      width: 100%; max-width: 480px; padding: 0 20px;
      animation: fadeUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) both;
    }
    .logout-btn {
      position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
      display: none; align-items: center; gap: 8px;
      padding: 10px 24px;
      border: 1px solid rgba(232,84,84,0.25); border-radius: 10px;
      background: rgba(232,84,84,0.06); color: var(--danger);
      font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500;
      cursor: pointer; transition: all 0.25s; outline: none; z-index: 30;
    }
    .logout-btn:hover { background: rgba(232,84,84,0.12); border-color: rgba(232,84,84,0.4); }
    .logout-btn:focus-visible { outline: 2px solid var(--danger); outline-offset: 2px; }
    .logout-btn i { font-size: 14px; }
    .logout-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .await-title {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 20px; font-weight: 600; color: var(--fg-muted); text-align: center;
    }
    .btn-row {
      display: flex; align-items: center; gap: 16px;
      flex-wrap: wrap; justify-content: center;
    }
    .await-btn {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 4px; width: 200px; height: 100px;
      border: 1px solid var(--border); border-radius: 14px;
      background: var(--bg-elevated);
      cursor: not-allowed; opacity: 0.5; user-select: none;
      pointer-events: none; position: relative;
    }
    .await-btn .await-label {
      font-size: 11px; color: var(--fg-muted); text-transform: uppercase; letter-spacing: 2px;
    }
    .await-btn .await-time {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 26px; font-weight: 700; color: var(--fg); letter-spacing: -0.5px;
    }
    .await-btn .lock-icon {
      position: absolute; top: 10px; right: 12px;
      font-size: 12px; color: var(--fg-muted); opacity: 0.4;
    }
    .pay-btn {
      display: flex; align-items: center; gap: 10px;
      padding: 16px 32px;
      border: 1px solid rgba(74,222,128,0.3); border-radius: 14px;
      background: linear-gradient(135deg, rgba(74,222,128,0.08), transparent);
      color: var(--pay-color);
      font-family: 'Space Grotesk', sans-serif; font-size: 16px; font-weight: 600;
      cursor: pointer; outline: none;
      transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
      box-shadow: 0 8px 30px -10px var(--pay-glow);
    }
    .pay-btn:hover {
      transform: translateY(-2px); border-color: rgba(74,222,128,0.5);
      box-shadow: 0 12px 40px -8px var(--pay-glow);
    }
    .pay-btn:active { transform: translateY(0) scale(0.98); }
    .pay-btn:focus-visible { outline: 2px solid var(--pay-color); outline-offset: 3px; }
    .pay-btn i { font-size: 18px; }
    .await-hint {
      font-size: 12px; color: var(--fg-muted); opacity: 0.6;
      text-align: center; line-height: 1.6;
    }
    .logout-toast {
      position: fixed; bottom: 30px; left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--card); border: 1px solid var(--border); border-radius: 10px;
      padding: 12px 24px; font-size: 13px; color: var(--fg-muted);
      display: flex; align-items: center; gap: 10px;
      opacity: 0; transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
      z-index: 200; pointer-events: none;
    }
    .logout-toast.visible { opacity: 1; transform: translateX(-50%) translateY(0); }
    .logout-toast .spinner-sm {
      display: inline-block; width: 14px; height: 14px;
      border: 2px solid rgba(255,255,255,0.1); border-top-color: var(--danger);
      border-radius: 50%; animation: spin 0.6s linear infinite;
    }

    /* Error banner */
    .error-banner {
      position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
      background: var(--card); border: 1px solid rgba(232,84,84,0.2);
      border-radius: 14px; padding: 32px; text-align: center;
      max-width: 360px; z-index: 300; display: none;
      animation: fadeUp 0.5s ease both;
    }
    .error-banner.active { display: block; }
    .error-banner i { font-size: 32px; color: var(--danger); margin-bottom: 12px; }
    .error-banner p { font-size: 14px; color: var(--fg-muted); margin-bottom: 20px; line-height: 1.5; }
    .error-banner button {
      padding: 10px 24px; border: 1px solid var(--border); border-radius: 8px;
      background: var(--bg-elevated); color: var(--fg); font-size: 13px;
      cursor: pointer; transition: all 0.2s;
    }
    .error-banner button:hover { border-color: rgba(255,255,255,0.15); }

    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .urgent .time { color: var(--danger) !important; }
    .urgent .progress {
      stroke: var(--danger) !important;
      filter: drop-shadow(0 0 8px rgba(232,84,84,0.4)) !important;
    }
    .countdown-wrap.urgent { animation: urgentPulse 1s ease-in-out infinite; }
    @keyframes urgentPulse {
      0%, 100% { transform: scale(1); }
      50%      { transform: scale(1.03); }
    }
    @media (max-width: 480px) {
      .countdown-wrap { width: 180px; height: 180px; }
      .countdown-text .time { font-size: 38px; }
      .menu-btn { padding: 14px 28px; font-size: 15px; }
      .await-btn { width: 160px; height: 90px; }
      .await-btn .await-time { font-size: 22px; }
      .pay-btn { padding: 14px 24px; font-size: 15px; }
      .btn-row { gap: 12px; }
    }
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        transition-duration: 0.01ms !important;
      }
      .orb { display: none; }
    }
  </style>
</head>
<body>

  <div class="bg-layer" aria-hidden="true">
    <div class="orb orb--1"></div>
    <div class="orb orb--2"></div>
  </div>
  <div class="grid-pattern" aria-hidden="true"></div>

  <!-- Loading screen while Firestore reads -->
  <div class="loading-screen" id="loadingScreen">
    <div class="loading-spinner"></div>
    <p>Loading your session...</p>
  </div>

  <!-- Error banner -->
  <div class="error-banner" id="errorBanner">
    <i class="fa-solid fa-triangle-exclamation"></i>
    <p id="errorMsg">Something went wrong.</p>
    <button onclick="window.location.replace('index.html')">Back to Login</button>
  </div>

  <!-- STATE 1: Active 3:00 -->
  <div id="stateActive" class="state">
    <div class="user-bar" id="userBar">
      <img id="userPhoto" src="" alt="Profile" />
      <div>
        <div class="user-name" id="userName">User</div>
        <div class="user-email" id="userEmail">user@email.com</div>
      </div>
    </div>
    <div class="countdown-wrap" id="countdownWrap">
      <svg class="countdown-ring" viewBox="0 0 220 220">
        <circle class="track" cx="110" cy="110" r="100" />
        <circle class="progress" id="ringProgress" cx="110" cy="110" r="100"
          stroke-dasharray="628.318" stroke-dashoffset="0" />
      </svg>
      <div class="countdown-text">
        <span class="time" id="countdownTime">3:00</span>
        <span class="label">Remaining</span>
      </div>
    </div>
    <button class="menu-btn" id="menuBtn" aria-label="Open menu">
      <i class="fa-solid fa-bars"></i>
      Menu
    </button>
  </div>

  <div class="expired-overlay" id="expiredOverlay">
    <i class="fa-solid fa-clock"></i>
    <p>Session expired</p>
  </div>

  <!-- STATE 2: Await 24:00:00 -->
  <div id="stateAwait" class="state">
    <button class="logout-btn" id="logoutBtn" aria-label="Log out">
      <i class="fa-solid fa-right-from-bracket"></i>
      Log out
    </button>
    <p class="await-title">Your free session has ended</p>
    <div class="btn-row">
      <div class="await-btn" aria-disabled="true" role="button" tabindex="-1">
        <i class="fa-solid fa-lock lock-icon"></i>
        <span class="await-label">Next free in</span>
        <span class="await-time" id="awaitTime">24:00:00</span>
      </div>
      <button class="pay-btn" id="payBtn" aria-label="Upgrade to paid access">
        <i class="fa-solid fa-arrow-up-right-dots"></i>
        Upgrade
      </button>
    </div>
    <p class="await-hint">Upgrade now to get instant unlimited access<br/>or wait for the timer to reset your free session.</p>
  </div>

  <div class="logout-toast" id="logoutToast">
    <span class="spinner-sm"></span>
    Signing out...
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getAuth, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import { getFirestore, doc, getDoc, setDoc, deleteDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    // ── Your exact Firebase config ──
    const firebaseConfig = {
      apiKey: "AIzaSyDpNJIZoLeZUhIoTepbLb_3rRLpseu9Zdo",
      authDomain: "my-project-66803-95cb3.firebaseapp.com",
      projectId: "my-project-66803-95cb3",
      storageBucket: "my-project-66803-95cb3.firebasestorage.app",
      messagingSenderId: "167159607898",
      appId: "1:167159607898:web:23ca11366b88868b085e63"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    // ── Timer durations ──
    const FREE_DURATION = 3 * 60;         // 3 minutes
    const AWAIT_DURATION = 24 * 60 * 60;  // 24 hours
    const RING_CIRCUMFERENCE = 2 * Math.PI * 100;

    // ── Read user from URL params ──
    const urlParams = new URLSearchParams(window.location.search);
    const userName = urlParams.get('name') || 'User';
    const userEmail = (urlParams.get('email') || '').trim().toLowerCase();
    const userPhoto = urlParams.get('photo') || '';

    // If no email, something wrong — back to login
    if (!userEmail) {
      window.location.replace('index.html');
      throw new Error('No email in URL');
    }

    document.getElementById('userName').textContent = decodeURIComponent(userName);
    document.getElementById('userEmail').textContent = userEmail;
    document.getElementById('userPhoto').src = userPhoto
      ? decodeURIComponent(userPhoto)
      : 'https://picsum.photos/seed/user/72/72.jpg';

    // ── Firestore doc reference — one doc per email ──
    // Replace dots in email for safe doc ID (emails like first.last@gmail.com)
    const safeEmail = userEmail.replace(/\./g, '_');
    const timerDocRef = doc(db, "userTimers", safeEmail);

    // ── DOM refs ──
    const loadingScreen = document.getElementById('loadingScreen');
    const errorBanner = document.getElementById('errorBanner');
    const errorMsg = document.getElementById('errorMsg');
    const stateActive = document.getElementById('stateActive');
    const stateAwait = document.getElementById('stateAwait');
    const expiredOverlay = document.getElementById('expiredOverlay');
    const countdownTime = document.getElementById('countdownTime');
    const ringProgress = document.getElementById('ringProgress');
    const countdownWrap = document.getElementById('countdownWrap');
    const menuBtn = document.getElementById('menuBtn');
    const awaitTimeEl = document.getElementById('awaitTime');
    const payBtn = document.getElementById('payBtn');
    const logoutBtn = document.getElementById('logoutBtn');
    const userBar = document.getElementById('userBar');
    const logoutToast = document.getElementById('logoutToast');

    let activeTimer = null;
    let awaitTimer = null;

    // ── Helpers ──
    function formatMmSs(sec) {
      const m = Math.floor(sec / 60);
      const s = sec % 60;
      return m + ':' + (s < 10 ? '0' : '') + s;
    }
    function formatHhMmSs(sec) {
      const h = Math.floor(sec / 3600);
      const m = Math.floor((sec % 3600) / 60);
      const s = sec % 60;
      return (h < 10 ? '0' : '') + h + ':' + (m < 10 ? '0' : '') + m + ':' + (s < 10 ? '0' : '') + s;
    }
    function showState(id) {
      document.querySelectorAll('.state').forEach(el => el.classList.remove('active'));
      document.getElementById(id).classList.add('active');
    }
    function showError(msg) {
      loadingScreen.classList.add('hidden');
      errorMsg.textContent = msg;
      errorBanner.classList.add('active');
    }
    function hideLoading() {
      loadingScreen.classList.add('hidden');
    }

    // ══════════════════════════════════
    //  FIRESTORE — read this email's timer
    // ══════════════════════════════════
    async function loadTimerFromFirestore() {
      try {
        const snap = await getDoc(timerDocRef);

        if (!snap.exists()) {
          // No doc yet — fresh user, start free session
          await setDoc(timerDocRef, {
            email: userEmail,
            freeStart: Date.now(),
            awaitStart: null
          });
          hideLoading();
          startActiveCountdown(FREE_DURATION);
          return;
        }

        const data = snap.data();

        // If there's an active await timer
        if (data.awaitStart) {
          const elapsed = Math.floor((Date.now() - data.awaitStart) / 1000);
          const remaining = AWAIT_DURATION - elapsed;

          if (remaining <= 0) {
            // 24 hours done — reset to new free session
            await setDoc(timerDocRef, {
              email: userEmail,
              freeStart: Date.now(),
              awaitStart: null
            });
            hideLoading();
            startActiveCountdown(FREE_DURATION);
            return;
          }

          // Show await state
          hideLoading();
          startAwaitState(data.awaitStart, remaining);
          return;
        }

        // If there's a free session timer
        if (data.freeStart) {
          const elapsed = Math.floor((Date.now() - data.freeStart) / 1000);
          const remaining = FREE_DURATION - elapsed;

          if (remaining <= 0) {
            // Free session expired — switch to await
            await setDoc(timerDocRef, {
              email: userEmail,
              freeStart: null,
              awaitStart: Date.now()
            });
            hideLoading();
            startAwaitState(Date.now(), AWAIT_DURATION);
            return;
          }

          // Resume free session
          hideLoading();
          startActiveCountdown(remaining);
          return;
        }

        // Doc exists but both null — shouldn't happen, reset
        await setDoc(timerDocRef, {
          email: userEmail,
          freeStart: Date.now(),
          awaitStart: null
        });
        hideLoading();
        startActiveCountdown(FREE_DURATION);

      } catch (err) {
        console.error("Firestore read error:", err);

        // If permission denied, user needs to set Firestore rules
        if (err.code === 'permission-denied') {
          showError("Permission denied. Ask the admin to update Firestore security rules.");
        } else {
          showError("Failed to load session. Check your connection and try again.");
        }
      }
    }

    // ══════════════════════════════════
    //  STATE 1 — 3:00 active countdown
    // ══════════════════════════════════
    function startActiveCountdown(remaining) {
      showState('stateActive');
      userBar.style.display = 'flex';
      logoutBtn.style.display = 'none';
      updateActiveDisplay(remaining);

      activeTimer = setInterval(() => {
        remaining--;
        if (remaining <= 0) {
          remaining = 0;
          clearInterval(activeTimer);
          updateActiveDisplay(0);
          onCountdownExpired();
          return;
        }
        updateActiveDisplay(remaining);
      }, 1000);
    }

    function updateActiveDisplay(remaining) {
      countdownTime.textContent = formatMmSs(remaining);
      const offset = RING_CIRCUMFERENCE * (1 - remaining / FREE_DURATION);
      ringProgress.setAttribute('stroke-dashoffset', offset.toString());
      if (remaining <= 30 && remaining > 0) {
        countdownWrap.classList.add('urgent');
      } else {
        countdownWrap.classList.remove('urgent');
      }
    }

    async function onCountdownExpired() {
      expiredOverlay.classList.add('active');

      // Write await start to Firestore immediately
      try {
        await setDoc(timerDocRef, {
          email: userEmail,
          freeStart: null,
          awaitStart: Date.now()
        });
      } catch (err) {
        console.error("Failed to write await start:", err);
      }

      setTimeout(() => {
        startAwaitState(Date.now(), AWAIT_DURATION);
        try { window.close(); } catch(e) {}
        setTimeout(() => {
          if (!window.closed) expiredOverlay.classList.remove('active');
        }, 500);
      }, 1500);
    }

    // ══════════════════════════════════
    //  STATE 2 — 24:00:00 await
    // ══════════════════════════════════
    function startAwaitState(awaitStartMs, remaining) {
      userBar.style.display = 'none';
      logoutBtn.style.display = 'flex';
      expiredOverlay.classList.remove('active');
      showState('stateAwait');

      updateAwaitDisplay(remaining);

      awaitTimer = setInterval(() => {
        remaining--;
        if (remaining <= 0) {
          remaining = 0;
          clearInterval(awaitTimer);
          updateAwaitDisplay(0);

          // Reset in Firestore — new free session
          setTimeout(async () => {
            try {
              await setDoc(timerDocRef, {
                email: userEmail,
                freeStart: Date.now(),
                awaitStart: null
              });
            } catch (err) {
              console.error("Failed to reset timer:", err);
            }
            startActiveCountdown(FREE_DURATION);
          }, 1000);
          return;
        }
        updateAwaitDisplay(remaining);
      }, 1000);
    }

    function updateAwaitDisplay(remaining) {
      awaitTimeEl.textContent = formatHhMmSs(remaining);
    }

    // ══════════════════════════════════
    //  LOGOUT — Firebase signOut + delete timer doc
    // ══════════════════════════════════
    logoutBtn.addEventListener('click', async () => {
      logoutBtn.disabled = true;
      logoutToast.classList.add('visible');

      try {
        // Delete this email's timer from Firestore
        await deleteDoc(timerDocRef);
        console.log("Timer doc deleted for", userEmail);
      } catch (err) {
        console.error("Failed to delete timer doc:", err);
      }

      try {
        await signOut(auth);
        window.location.replace('index.html');
      } catch (err) {
        console.error("Sign out error:", err);
        window.location.replace('index.html');
      }
    });

    // ══════════════════════════════════
    //  OTHER BUTTONS
    // ══════════════════════════════════
    menuBtn.addEventListener('click', () => {
      window.location.href = 'menu.html';
    });
    payBtn.addEventListener('click', () => {
      window.location.href = 'pay.html';
    });

    // ── Start: read from Firestore, then show correct state ──
    loadTimerFromFirestore();
  </script>
</body>
</html>
