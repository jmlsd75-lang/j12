<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Free User Dashboard</title>
    <style>
        body { display: flex; flex-direction: column; justify-content: center; align-items: center; font-family: Arial, sans-serif; height: 100vh; background-color: #e0f7fa; text-align: center; }
        h1 { color: #00796b; }
        p { font-size: 18px; margin: 10px 0; }
        button { padding: 12px 24px; background-color: #f44336; color: white; border: none; border-radius: 6px; cursor: pointer; }
    </style>
</head>
<body>
    <h1>Free User Dashboard</h1>
    <p>Welcome, <span id="userName">User</span>!</p>
    <p>Email: <span id="userEmail"></span></p>
    <button id="logoutBtn">Logout</button>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDpNJIZoLeZUhIoTepbLb_3rRLpseu9Zdo",
            authDomain: "my-project-66803-95cb3.firebaseapp.com",
            projectId: "my-project-66803-95cb3",
            storageBucket: "my-project-66803-95cb3.appspot.com",
            messagingSenderId: "167159607898",
            appId: "1:167159607898:web:23ca11366b88868b085e63"
        };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        onAuthStateChanged(auth, (user) => {
            if(user) {
                if(user.email === "jmlsd75@gmail.com") {
                    window.location.href = "admin.html";
                }
                document.getElementById("userName").textContent = user.displayName;
                document.getElementById("userEmail").textContent = user.email;
            } else {
                window.location.href = "index.html";
            }
        });

        document.getElementById("logoutBtn").addEventListener("click", () => {
            signOut(auth).then(() => {
                sessionStorage.clear();
                window.location.href = "index.html";
            });
        });
    </script>
</body>
</html>
