<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Free Session</title>
    <style>
        :root {
            --bg-color: #121212;
            --surface-color: #1e1e1e;
            --primary-color: #3f51b5;
            --error-color: #cf6679;
            --text-primary: #ffffff;
            --text-secondary: #b0b0b0;
            --font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-primary);
            font-family: var(--font-family);
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* Menu Button */
        .menu-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.2s;
            z-index: 100;
            display: flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
        }

        .menu-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .menu-icon {
            display: inline-block;
            width: 18px;
            height: 2px;
            background: white;
            position: relative;
        }
        .menu-icon::before, .menu-icon::after {
            content: '';
            position: absolute;
            width: 18px;
            height: 2px;
            background: white;
            left: 0;
        }
        .menu-icon::before { top: -6px; }
        .menu-icon::after { top: 6px; }

        .container {
            background-color: var(--surface-color);
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
            text-align: center;
            max-width: 500px;
            width: 90%;
            position: relative;
            z-index: 1;
        }

        h1 {
            margin: 0 0 10px 0;
            font-size: 24px;
            font-weight: 500;
        }

        p {
            color: var(--text-secondary);
            margin-bottom: 30px;
            font-size: 14px;
        }

        .timer-display {
            font-size: 64px;
            font-weight: 700;
            font-variant-numeric: tabular-nums;
            margin: 20px 0;
            letter-spacing: 2px;
        }

        .timer-display.urgent {
            color: var(--error-color);
            animation: pulse 1s infinite;
        }

        .status-badge {
            display: inline-block;
            padding: 6px 12px;
            background-color: rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            font-size: 12px;
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .controls {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 30px;
        }

        button {
            padding: 12px 24px;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            pointer-events: none;
        }

        .btn-pay {
            background-color: #4caf50;
            color: white;
        }

        .btn-pay:hover {
            background-color: #43a047;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(76, 175, 80, 0.3);
        }

        .btn-await {
            background-color: #9e9e9e;
            color: #424242;
            cursor: default;
        }

        .tab-info {
            margin-top: 20px;
            font-size: 12px;
            color: var(--text-secondary);
            opacity: 0.7;
        }

        .hidden {
            display: none !important;
        }

        #loadingOverlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.8);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10;
            border-radius: 12px;
        }

        .spinner {
            width: 30px;
            height: 30px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
    </style>
</head>
<body>

    <!-- Menu Button -->
    <a href="men.html" class="menu-btn">
        <span class="menu-icon"></span> Menu
    </a>

    <div class="container">
        <div id="loadingOverlay" class="hidden">
            <div class="spinner"></div>
        </div>

        <div class="status-badge" id="statusBadge">Active Session</div>
        <h1 id="pageTitle">Time Remaining</h1>
        
        <!-- Main Countdown -->
        <div id="mainTimerWrapper">
            <div class="timer-display" id="mainTimer">00:03:00</div>
            <p>Do not close this tab. Speed increases with more tabs.</p>
            <div class="tab-info">Active Tabs Detected: <span id="tabCount">1</span></div>
        </div>

        <!-- Await State Wrapper -->
        <div id="awaitTimerWrapper" class="hidden">
            <div class="timer-display" id="awaitTimer">24:00:00</div>
            <p>Access locked. Waiting for cooldown.</p>
            <div class="controls">
                <button class="btn-await" id="awaitBtn" disabled>Await</button>
                <button class="btn-pay" id="payBtn">Pay</button>
            </div>
        </div>
    </div>

    <!-- Firebase SDKs -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc, updateDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        // ── Firebase Configuration ──
        const firebaseConfig = {
            apiKey: "AIzaSyDpNJIZoLeZUhIoTepbLb_3rRLpseu9Zdo",
            authDomain: "my-project-66803-95cb3.firebaseapp.com",
            projectId: "my-project-66803-95cb3",
            storageBucket: "my-project-66803-95cb3.firebasestorage.app",
            messagingSenderId: "167159607898",
            appId: "1:167159607898:web:23ca11366b88868b085e63"
        };

        // ── Initialize Firebase ──
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // ── State Constants ──
        const MODE_ACTIVE = 'ACTIVE';
        const MODE_AWAIT = 'AWAIT';
        const SESSION_ID_KEY = 'current_session_id';
        const ACTIVE_TAB_COUNT_KEY = 'active_tab_count';
        const TAB_ID = 'tab_' + Math.random().toString(36).substr(2, 9);
        
        // ── DOM Elements ──
        const elMainWrapper = document.getElementById('mainTimerWrapper');
        const elAwaitWrapper = document.getElementById('awaitTimerWrapper');
        const elMainTimer = document.getElementById('mainTimer');
        const elAwaitTimer = document.getElementById('awaitTimer');
        const elStatusBadge = document.getElementById('statusBadge');
        const elTabCount = document.getElementById('tabCount');
        const elPayBtn = document.getElementById('payBtn');
        const elLoading = document.getElementById('loadingOverlay');

        // ── App State ──
        let currentUser = null;
        let currentUserEmail = null;
        let appMode = MODE_ACTIVE;
        
        // Timer variables
        // UPDATED: Changed initial timer from 3 hours (10800s) to 3 minutes (180s)
        let activeTimeLeft = 3 * 60; 
        let awaitTimeLeft = 24 * 60 * 60; 
        let tabMultiplier = 1;

        let serverStartTime = 0; 
        let activeDurationAtStart = 0;
        let awaitStartTime = 0;
        let awaitDurationAtStart = 0;

        // ── Auth Check ──
        onAuthStateChanged(auth, (user) => {
            if (!user) {
                window.location.replace('index.html');
                return;
            }
            currentUser = user;
            currentUserEmail = user.email;
            initApp();
        });

        // ── Initialization ──
        async function initApp() {
            showLoading(true);
            try {
                await loadStateFromFirestore();
                setupTabTracking();
                startTimers();
                setupEventListeners();
            } catch (error) {
                console.error("Init Error:", error);
                alert("Error loading session. Please refresh.");
            } finally {
                showLoading(false);
            }
        }

        // ── Tab Tracking Logic ──
        function setupTabTracking() {
            localStorage.setItem(TAB_ID, Date.now());
            
            const now = Date.now();
            for (let i = 0; i < localStorage.length; i++) {
                const key = localStorage.key(i);
                if (key.startsWith('tab_')) {
                    const val = parseInt(localStorage.getItem(key));
                    if (now - val > 5000) {
                        localStorage.removeItem(key);
                    }
                }
            }
            updateTabCount();
            window.addEventListener('storage', () => updateTabCount());
            setInterval(() => localStorage.setItem(TAB_ID, Date.now()), 1000);
        }

        function updateTabCount() {
            let count = 0;
            for (let i = 0; i < localStorage.length; i++) {
                if (localStorage.key(i).startsWith('tab_')) count++;
            }
            tabMultiplier = count > 0 ? count : 1;
            elTabCount.textContent = tabMultiplier;
        }

        // ── Firestore State Management ──
        async function loadStateFromFirestore() {
            const userRef = doc(db, "users", currentUserEmail);
            const docSnap = await getDoc(userRef);

            if (docSnap.exists()) {
                const data = docSnap.data();
                
                if (data.mode === MODE_AWAIT) {
                    appMode = MODE_AWAIT;
                    awaitStartTime = data.awaitStartTime || Date.now();
                    awaitDurationAtStart = data.awaitDuration || (24 * 60 * 60 * 1000);
                    
                    const now = Date.now();
                    const elapsed = now - awaitStartTime;
                    const remainingMs = awaitDurationAtStart - elapsed;

                    if (remainingMs <= 0) {
                        await resetToActiveState(userRef);
                    } else {
                        awaitTimeLeft = Math.floor(remainingMs / 1000);
                    }
                } else {
                    appMode = MODE_ACTIVE;
                    serverStartTime = data.activeStartTime || Date.now();
                    // Check if old duration was 3 hours, if so, force update to 3 mins logic or just respect stored duration
                    activeDurationAtStart = data.activeDuration || (3 * 60 * 1000); 
                    
                    const now = Date.now();
                    const elapsed = now - serverStartTime;
                    const remainingMs = activeDurationAtStart - elapsed;

                    if (remainingMs <= 0) {
                        await switchToAwaitState(userRef);
                    } else {
                        activeTimeLeft = Math.floor(remainingMs / 1000);
                    }
                }
            } else {
                // First time: Set Active for 3 minutes
                const initialData = {
                    mode: MODE_ACTIVE,
                    activeStartTime: Date.now(),
                    activeDuration: 3 * 60 * 1000 // 3 minutes in ms
                };
                await setDoc(userRef, initialData, { merge: true });
                serverStartTime = initialData.activeStartTime;
                activeDurationAtStart = initialData.activeDuration;
            }
            updateUI();
        }

        async function resetToActiveState(userRef) {
            console.log("Resetting to Active State");
            appMode = MODE_ACTIVE;
            activeTimeLeft = 3 * 60; // 3 minutes
            serverStartTime = Date.now();
            activeDurationAtStart = 3 * 60 * 1000;

            const updateData = {
                mode: MODE_ACTIVE,
                activeStartTime: serverStartTime,
                activeDuration: activeDurationAtStart,
                awaitStartTime: null,
                awaitDuration: null
            };
            
            if (!userRef) userRef = doc(db, "users", currentUserEmail);
            await updateDoc(userRef, updateData);
        }

        async function switchToAwaitState(userRef) {
            console.log("Switching to Await State");
            appMode = MODE_AWAIT;
            awaitTimeLeft = 24 * 60 * 60;
            awaitStartTime = Date.now();
            awaitDurationAtStart = 24 * 60 * 60 * 1000;

            const updateData = {
                mode: MODE_AWAIT,
                awaitStartTime: awaitStartTime,
                awaitDuration: awaitDurationAtStart,
                activeStartTime: null,
                activeDuration: null
            };

            if (!userRef) userRef = doc(db, "users", currentUserEmail);
            await updateDoc(userRef, updateData);
            updateUI();
        }

        // ── Timer Logic ──
        function startTimers() {
            let lastTick = Date.now();
            const timerLoop = setInterval(() => {
                const now = Date.now();
                const deltaMs = now - lastTick;
                lastTick = now;

                if (appMode === MODE_ACTIVE) {
                    const realSecondsPassed = deltaMs / 1000;
                    const deductedSeconds = realSecondsPassed * tabMultiplier;
                    
                    activeTimeLeft -= deductedSeconds;

                    if (activeTimeLeft <= 0) {
                        activeTimeLeft = 0;
                        updateDisplay(activeTimeLeft, elMainTimer);
                        clearInterval(timerLoop);
                        switchToAwaitState();
                    } else {
                        updateDisplay(activeTimeLeft, elMainTimer);
                    }
                } else if (appMode === MODE_AWAIT) {
                    const realSecondsPassed = deltaMs / 1000;
                    awaitTimeLeft -= realSecondsPassed;

                    if (awaitTimeLeft <= 0) {
                        awaitTimeLeft = 0;
                        updateDisplay(awaitTimeLeft, elAwaitTimer);
                        clearInterval(timerLoop);
                        handleAwaitFinish();
                    } else {
                        updateDisplay(awaitTimeLeft, elAwaitTimer);
                    }
                }
            }, 100);
        }

        function handleAwaitFinish() {
            const userRef = doc(db, "users", currentUserEmail);
            resetToActiveState(userRef).then(() => {
                startTimers();
            });
        }

        // ── UI Updates ──
        function updateDisplay(seconds, element) {
            const h = Math.floor(seconds / 3600);
            const m = Math.floor((seconds % 3600) / 60);
            const s = Math.floor(seconds % 60);
            
            const fH = h.toString().padStart(2, '0');
            const fM = m.toString().padStart(2, '0');
            const fS = s.toString().padStart(2, '0');

            element.textContent = `${fH}:${fM}:${fS}`;

            if (seconds < 60) {
                element.classList.add('urgent');
            } else {
                element.classList.remove('urgent');
            }
        }

        function updateUI() {
            if (appMode === MODE_ACTIVE) {
                elMainWrapper.classList.remove('hidden');
                elAwaitWrapper.classList.add('hidden');
                elStatusBadge.textContent = "Active Session";
                elStatusBadge.style.backgroundColor = "rgba(63, 81, 181, 0.3)";
                elStatusBadge.style.color = "#8c9eff";
                updateDisplay(activeTimeLeft, elMainTimer);
            } else {
                elMainWrapper.classList.add('hidden');
                elAwaitWrapper.classList.remove('hidden');
                elStatusBadge.textContent = "Locked - Awaiting";
                elStatusBadge.style.backgroundColor = "rgba(207, 102, 121, 0.3)";
                elStatusBadge.style.color = "#ff8a80";
                updateDisplay(awaitTimeLeft, elAwaitTimer);
            }
        }

        function showLoading(show) {
            if (show) elLoading.classList.remove('hidden');
            else elLoading.classList.add('hidden');
        }

        function setupEventListeners() {
            elPayBtn.addEventListener('click', () => {
                window.location.href = 'pay.html';
            });
            window.addEventListener('beforeunload', (e) => {
                if (appMode === MODE_ACTIVE && activeTimeLeft > 0) {
                    e.preventDefault();
                    e.returnValue = '';
                }
            });
        }
    </script>
</body>
</html>
