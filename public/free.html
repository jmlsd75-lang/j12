<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Free Countdown</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root {
            --bg: #06060c;
            --fg: #eae8e4;
            --muted: #5a5e6a;
            --accent: #f59e0b;
            --danger: #ef4444;
            --card: rgba(255,255,255,0.035);
            --border: rgba(255,255,255,0.07);
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'Space Grotesk', sans-serif;
            background: var(--bg);
            color: var(--fg);
            min-height: 100vh;
            overflow: hidden;
        }

        /* ── Loading Screen ── */
        #loadingScreen {
            position: fixed; inset:0; z-index:200;
            display: flex; align-items: center; justify-content: center;
            background: var(--bg);
            transition: opacity .5s ease;
        }
        #loadingScreen.hidden { opacity:0; pointer-events:none; }
        .loader-ring {
            width:48px; height:48px;
            border: 3px solid rgba(245,158,11,0.15);
            border-top-color: #f59e0b;
            border-radius: 50%;
            animation: spin .8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── Background ── */
        .bg-grid {
            position:fixed; inset:0; pointer-events:none; z-index:0;
            background-image:
                linear-gradient(rgba(245,158,11,0.025) 1px, transparent 1px),
                linear-gradient(90deg, rgba(245,158,11,0.025) 1px, transparent 1px);
            background-size: 64px 64px;
        }
        .bg-orb {
            position:fixed; border-radius:50%; filter:blur(130px);
            opacity:.12; pointer-events:none; z-index:0;
        }
        .orb-a { width:550px; height:550px; top:-180px; right:-80px; background:#f59e0b; animation:orbA 9s ease-in-out infinite; }
        .orb-b { width:480px; height:480px; bottom:-160px; left:-60px; background:#ef4444; animation:orbB 11s ease-in-out infinite; }
        .orb-c { width:300px; height:300px; top:50%; left:50%; transform:translate(-50%,-50%); background:#f59e0b; opacity:.05; animation:orbC 7s ease-in-out infinite; }
        @keyframes orbA { 0%,100%{transform:translate(0,0)} 50%{transform:translate(-35px,25px)} }
        @keyframes orbB { 0%,100%{transform:translate(0,0)} 50%{transform:translate(25px,-35px)} }
        @keyframes orbC { 0%,100%{transform:translate(-50%,-50%) scale(1)} 50%{transform:translate(-50%,-50%) scale(1.2)} }

        /* ── Canvas ── */
        #particleCanvas { position:fixed; inset:0; pointer-events:none; z-index:1; }

        /* ── Menu Button ── */
        .menu-btn {
            position:fixed; top:24px; right:24px; z-index:60;
            width:50px; height:50px; border-radius:14px;
            background: var(--card); border:1px solid var(--border);
            backdrop-filter:blur(14px); -webkit-backdrop-filter:blur(14px);
            display:flex; align-items:center; justify-content:center;
            cursor:pointer; transition: all .3s ease;
        }
        .menu-btn:hover {
            background: rgba(245,158,11,0.12);
            border-color: rgba(245,158,11,0.3);
            transform: scale(1.06);
        }
        .menu-btn:focus-visible { outline:2px solid #f59e0b; outline-offset:2px; }
        .pulse-ring {
            position:absolute; inset:-5px; border-radius:18px;
            border:2px solid rgba(245,158,11,0.25);
            animation: pulseRing 2.5s ease-out infinite;
        }
        @keyframes pulseRing { 0%{transform:scale(1);opacity:1} 100%{transform:scale(1.35);opacity:0} }

        /* ── Countdown Display ── */
        .countdown-num {
            font-family: 'Orbitron', monospace;
            font-weight: 900;
            font-size: clamp(2.8rem, 13vw, 9rem);
            letter-spacing: .04em;
            line-height: 1;
            background: linear-gradient(135deg, #f59e0b 0%, #f97316 50%, #f59e0b 100%);
            background-size: 200% 200%;
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: gradShift 4s ease infinite;
            transition: filter .4s ease;
            user-select: none;
        }
        @keyframes gradShift { 0%,100%{background-position:0% 50%} 50%{background-position:100% 50%} }

        .countdown-num.urgent {
            background: linear-gradient(135deg, #ef4444 0%, #dc2626 50%, #ef4444 100%);
            background-size: 200% 200%;
            -webkit-background-clip: text; background-clip: text;
            animation: urgentGrad .8s ease infinite;
        }
        @keyframes urgentGrad { 0%,100%{background-position:0% 50%} 50%{background-position:100% 50%} }

        .countdown-num.critical {
            background: linear-gradient(135deg, #dc2626 0%, #7f1d1d 100%);
            background-size: 100% 100%;
            -webkit-background-clip: text; background-clip: text;
            animation: criticalPulse .4s ease infinite;
        }
        @keyframes criticalPulse { 0%,100%{transform:scale(1);filter:brightness(1)} 50%{transform:scale(1.015);filter:brightness(1.2)} }

        /* ── Status Dot ── */
        .status-dot {
            width:8px; height:8px; border-radius:50%;
            animation: blink 1.6s ease-in-out infinite;
        }
        @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.25} }

        /* ── Info Cards ── */
        .info-chip {
            display:inline-flex; align-items:center; gap:8px;
            padding:8px 16px; border-radius:10px;
            background: var(--card); border:1px solid var(--border);
            transition: all .3s ease;
        }
        .info-chip.warn {
            background: rgba(239,68,68,0.08);
            border-color: rgba(239,68,68,0.2);
        }

        /* ── Progress Track ── */
        .progress-track {
            height:4px; border-radius:4px; overflow:hidden;
            background: rgba(255,255,255,0.05);
        }
        .progress-fill {
            height:100%; border-radius:4px;
            background: linear-gradient(90deg, #f59e0b, #f97316);
            transition: width 1s linear;
        }
        .progress-fill.danger { background: linear-gradient(90deg, #ef4444, #dc2626); }
        .progress-fill.critical {
            background: #dc2626;
            box-shadow: 0 0 12px rgba(220,38,38,0.5);
        }

        /* ── Warning Banner ── */
        .warn-banner {
            opacity:0; transform:translateY(-6px);
            transition: all .4s cubic-bezier(.16,1,.3,1);
            pointer-events:none;
        }
        .warn-banner.visible {
            opacity:1; transform:translateY(0);
            pointer-events:auto;
        }

        /* ── Toast ── */
        .toast-bar {
            position:fixed; bottom:28px; left:50%;
            transform: translateX(-50%) translateY(80px);
            padding:10px 22px; border-radius:12px;
            background: rgba(245,158,11,0.12);
            border:1px solid rgba(245,158,11,0.25);
            backdrop-filter:blur(12px);
            color:#f59e0b; font-size:13px; font-weight:500;
            transition: transform .45s cubic-bezier(.16,1,.3,1);
            z-index:100; white-space:nowrap;
        }
        .toast-bar.show { transform: translateX(-50%) translateY(0); }

        /* ── Responsive ── */
        @media (max-width:480px) {
            .info-row { flex-direction:column; gap:8px !important; }
        }

        /* ── Reduced Motion ── */
        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.01ms !important;
                transition-duration: 0.01ms !important;
            }
        }
    </style>
</head>
<body>

    <!-- Loading -->
    <div id="loadingScreen">
        <div class="flex flex-col items-center gap-4">
            <div class="loader-ring"></div>
            <span class="text-sm" style="color:var(--muted)">Loading session...</span>
        </div>
    </div>

    <!-- Background layers -->
    <div class="bg-grid"></div>
    <div class="bg-orb orb-a"></div>
    <div class="bg-orb orb-b"></div>
    <div class="bg-orb orb-c"></div>
    <canvas id="particleCanvas"></canvas>

    <!-- Menu button -->
    <button class="menu-btn" id="menuBtn" aria-label="Open menu">
        <div class="pulse-ring"></div>
        <i class="fas fa-bars text-lg relative z-10" style="color:var(--accent)"></i>
    </button>

    <!-- Main -->
    <main class="relative z-10 min-h-screen flex flex-col items-center justify-center px-5" id="mainContent" style="opacity:0; transition:opacity .6s ease">

        <!-- User row -->
        <div class="flex items-center gap-3 mb-10">
            <img id="userPhoto" src="" alt="Avatar" class="w-9 h-9 rounded-full object-cover border-2" style="border-color:rgba(245,158,11,0.25); display:none" />
            <span id="userName" class="text-sm font-medium" style="color:var(--muted)"></span>
        </div>

        <!-- Label -->
        <div class="flex items-center gap-2.5 mb-5">
            <div class="status-dot" style="background:var(--accent)"></div>
            <span class="text-[11px] uppercase tracking-[.35em] font-bold" style="color:rgba(245,158,11,0.65)">Free Session</span>
        </div>

        <!-- Countdown -->
        <div class="countdown-num" id="countdownNum">00:03:00</div>

        <!-- Tab info row -->
        <div class="info-row flex items-center gap-4 mt-7">
            <div class="info-chip" id="tabChip">
                <i class="fas fa-window-restore text-[11px]" style="color:rgba(245,158,11,0.5)"></i>
                <span class="text-sm" style="color:var(--muted)">Tabs: <strong id="tabCount" style="color:var(--accent)">1</strong></span>
            </div>
            <div class="info-chip" id="speedChip">
                <i class="fas fa-bolt text-[11px]" style="color:rgba(239,68,68,0.5)"></i>
                <span class="text-sm" style="color:var(--muted)">Speed: <strong id="speedVal" style="color:var(--fg)">1x</strong></span>
            </div>
        </div>

        <!-- Multi-tab warning -->
        <div class="warn-banner mt-3 px-4 py-2 rounded-lg text-sm flex items-center gap-2" id="multiWarn"
             style="background:rgba(239,68,68,0.08); border:1px solid rgba(239,68,68,0.18); color:#f87171;">
            <i class="fas fa-exclamation-triangle text-xs"></i>
            Multiple tabs active — countdown accelerated
        </div>

        <!-- Progress bar -->
        <div class="mt-9 w-full max-w-sm">
            <div class="progress-track">
                <div class="progress-fill" id="progressFill" style="width:100%"></div>
            </div>
        </div>

        <p class="mt-5 text-[11px]" style="color:rgba(255,255,255,0.2)">Extra speed pauses when all tabs close. Base rate always runs.</p>
    </main>

    <!-- Toast -->
    <div class="toast-bar" id="toastBar"></div>

    <script type="module">
        /* ══════════════════════════════════════════
           Firebase Imports & Config
           ══════════════════════════════════════════ */
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
        import {
            getFirestore, doc, getDoc, setDoc, updateDoc,
            runTransaction, deleteField
        } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDpNJIZoLeZUhIoTepbLb_3rRLpseu9Zdo",
            authDomain: "my-project-66803-95cb3.firebaseapp.com",
            projectId: "my-project-66803-95cb3",
            storageBucket: "my-project-66803-95cb3.firebasestorage.app",
            messagingSenderId: "167159607898",
            appId: "1:167159607898:web:23ca11366b88868b085e63"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db  = getFirestore(app);

        /* ══════════════════════════════════════════
           Constants
           ══════════════════════════════════════════ */
        const FREE_MS     = 3 * 60 * 1000;          // 3 minutes
        const AWAIT_MS    = 24 * 60 * 60 * 1000;    // 24 hours
        const TICK_MS     = 1000;                    // 1-second tick
        const HB_MS       = 3000;                    // heartbeat every 3s
        const TAB_TTL_MS  = 8000;                    // tab considered dead after 8s

        /* ══════════════════════════════════════════
           State
           ══════════════════════════════════════════ */
        let userEmail      = null;
        let tabId          = crypto.randomUUID();
        let localEndTime   = null;   // freeEndTime in ms
        let tickTimer      = null;
        let hbTimer        = null;
        let redirected     = false;
        let initialized    = false;

        /* ══════════════════════════════════════════
           DOM
           ══════════════════════════════════════════ */
        const loadingScr   = document.getElementById('loadingScreen');
        const mainContent  = document.getElementById('mainContent');
        const countdownNum = document.getElementById('countdownNum');
        const tabCountEl   = document.getElementById('tabCount');
        const speedValEl   = document.getElementById('speedVal');
        const tabChip      = document.getElementById('tabChip');
        const speedChip    = document.getElementById('speedChip');
        const multiWarn    = document.getElementById('multiWarn');
        const progressFill = document.getElementById('progressFill');
        const menuBtn      = document.getElementById('menuBtn');
        const userPhoto    = document.getElementById('userPhoto');
        const userName     = document.getElementById('userName');
        const toastBar     = document.getElementById('toastBar');

        /* ══════════════════════════════════════════
           Utilities
           ══════════════════════════════════════════ */
        function fmt(ms) {
            if (ms <= 0) return '00:00:00';
            const t = Math.floor(ms / 1000);
            const h = String(Math.floor(t / 3600)).padStart(2, '0');
            const m = String(Math.floor((t % 3600) / 60)).padStart(2, '0');
            const s = String(t % 60).padStart(2, '0');
            return `${h}:${m}:${s}`;
        }

        function safeGo(url) {
            if (redirected) return;
            redirected = true;
            clearInterval(tickTimer);
            clearInterval(hbTimer);
            removeTab();
            window.location.replace(url);
        }

        function toast(msg) {
            toastBar.textContent = msg;
            toastBar.classList.add('show');
            setTimeout(() => toastBar.classList.remove('show'), 3200);
        }

        function docRef() {
            // Dots aren't valid in Firestore doc IDs — replace with underscore
            return doc(db, 'countdowns', userEmail.replace(/\./g, '_'));
        }

        /* ══════════════════════════════════════════
           Tab Registry (Firestore)
           ══════════════════════════════════════════ */
        function aliveCount(tabs) {
            if (!tabs || typeof tabs !== 'object') return 0;
            const now = Date.now();
            let n = 0;
            for (const ts of Object.values(tabs)) { if (now - ts < TAB_TTL_MS) n++; }
            return n;
        }

        function pruneTabs(tabs) {
            if (!tabs || typeof tabs !== 'object') return {};
            const now = Date.now(), out = {};
            for (const [k, v] of Object.entries(tabs)) { if (now - v < TAB_TTL_MS) out[k] = v; }
            return out;
        }

        async function addTab() {
            if (!userEmail) return;
            const ref = docRef(), now = Date.now();
            try {
                await runTransaction(db, async tx => {
                    const s = await tx.get(ref);
                    const d = s.exists() ? s.data() : {};
                    const tabs = pruneTabs(d.tabs || {});
                    tabs[tabId] = now;
                    s.exists() ? tx.update(ref, { tabs }) : tx.set(ref, { tabs });
                });
            } catch (e) { console.warn('addTab err', e); }
        }

        async function heartbeat() {
            if (!userEmail) return;
            const ref = docRef(), now = Date.now();
            try {
                await runTransaction(db, async tx => {
                    const s = await tx.get(ref);
                    if (!s.exists()) { tx.set(ref, { tabs: { [tabId]: now } }); return; }
                    const tabs = pruneTabs(s.data().tabs || {});
                    tabs[tabId] = now;
                    tx.update(ref, { tabs });
                });
            } catch (e) { console.warn('hb err', e); }
        }

        async function removeTab() {
            if (!userEmail) return;
            try {
                await updateDoc(docRef(), { [`tabs.${tabId}`]: deleteField() });
            } catch (e) { console.warn('removeTab err', e); }
        }

        /* ══════════════════════════════════════════
           Display
           ══════════════════════════════════════════ */
        function render() {
            if (!localEndTime || redirected) return;
            const rem = Math.max(0, localEndTime - Date.now());
            countdownNum.textContent = fmt(rem);

            // Progress
            const pct = Math.max(0, Math.min(100, (rem / FREE_MS) * 100));
            progressFill.style.width = pct + '%';

            // Urgency tiers
            countdownNum.classList.remove('urgent', 'critical');
            progressFill.classList.remove('danger', 'critical');
            if (rem < 10000) {
                countdownNum.classList.add('critical');
                progressFill.classList.add('critical');
            } else if (rem < 60000) {
                countdownNum.classList.add('urgent');
                progressFill.classList.add('danger');
            }

            // Auto-transition
            if (rem <= 0 && !redirected) goAwait();
        }

        function updateTabUI(count) {
            tabCountEl.textContent = count;
            speedValEl.textContent  = count + 'x';

            const multi = count > 1;
            multiWarn.classList.toggle('visible', multi);
            tabChip.classList.toggle('warn', multi);
            speedChip.classList.toggle('warn', multi);

            if (multi) {
                speedValEl.style.color = '#f87171';
            } else {
                speedValEl.style.color = 'var(--fg)';
            }
        }

        /* ══════════════════════════════════════════
           Tick — adjusts endTime via transaction
           ══════════════════════════════════════════ */
        function startTick() {
            tickTimer = setInterval(async () => {
                if (redirected || !localEndTime) return;

                const now = Date.now();
                if (localEndTime - now <= 0) { goAwait(); return; }

                const ref = docRef();
                try {
                    await runTransaction(db, async tx => {
                        const snap = await tx.get(ref);
                        if (!snap.exists()) return;

                        const d   = snap.data();
                        const tabs = d.tabs || {};
                        const n    = aliveCount(tabs);
                        const last = d.freeLastAdjust || 0;

                        // Always sync local from server
                        localEndTime = d.freeEndTime;
                        localStorage.setItem('freeEndTime', String(localEndTime));

                        updateTabUI(n);

                        // Adjust once per second globally
                        if (now - last >= TICK_MS && n >= 1) {
                            // Subtract (n-1) extra seconds — 1s already passed naturally
                            const extra = Math.max(0, n - 1) * TICK_MS;
                            const newEnd = Math.max(now + 500, d.freeEndTime - extra);
                            tx.update(ref, {
                                freeEndTime: newEnd,
                                freeLastAdjust: now
                            });
                            localEndTime = newEnd;
                            localStorage.setItem('freeEndTime', String(newEnd));
                        }
                    });
                } catch (e) {
                    // Transaction contention or offline — continue with local value
                    console.warn('tick tx err', e);
                }

                render();
            }, TICK_MS);
        }

        /* ══════════════════════════════════════════
           Transition → Await
           ══════════════════════════════════════════ */
        async function goAwait() {
            if (redirected) return;
            redirected = true;
            clearInterval(tickTimer);
            clearInterval(hbTimer);

            const now = Date.now();
            const ref = docRef();

            try {
                const snap = await getDoc(ref);
                if (snap.exists()) {
                    const d = snap.data();
                    // If await already set up by another tab
                    if (d.awaitEndTime && d.awaitEndTime > now) {
                        localStorage.setItem('awaitEndTime', String(d.awaitEndTime));
                        localStorage.setItem('freeEndTime', String(now));
                        safeGo('await.html');
                        return;
                    }
                }
                // Set up await countdown
                const awaitEnd = now + AWAIT_MS;
                await updateDoc(ref, {
                    freeEndTime: now,
                    awaitEndTime: awaitEnd,
                    awaitLastAdjust: now
                });
                localStorage.setItem('freeEndTime', String(now));
                localStorage.setItem('awaitEndTime', String(awaitEnd));
            } catch (e) {
                // Offline fallback — write locally, next online sync will catch up
                console.warn('goAwait err', e);
                const awaitEnd = now + AWAIT_MS;
                localStorage.setItem('freeEndTime', String(now));
                localStorage.setItem('awaitEndTime', String(awaitEnd));
            }

            safeGo('await.html');
        }

        /* ══════════════════════════════════════════
           Initialize Countdown
           ══════════════════════════════════════════ */
        async function init() {
            if (initialized) return;
            initialized = true;

            const now = Date.now();
            const ref = docRef();

            try {
                const snap = await getDoc(ref);

                if (snap.exists()) {
                    const d = snap.data();

                    // Already in await phase?
                    if (d.awaitEndTime && d.awaitEndTime > now) {
                        localStorage.setItem('awaitEndTime', String(d.awaitEndTime));
                        safeGo('await.html');
                        return;
                    }
                    // Free expired but await not set?
                    if (d.freeEndTime && d.freeEndTime <= now) {
                        goAwait();
                        return;
                    }
                    // Resume free countdown
                    if (d.freeEndTime && d.freeEndTime > now) {
                        localEndTime = d.freeEndTime;
                        localStorage.setItem('freeEndTime', String(localEndTime));
                    } else {
                        // Start fresh
                        localEndTime = now + FREE_MS;
                        await updateDoc(ref, {
                            freeEndTime: localEndTime,
                            freeLastAdjust: now,
                            [`tabs.${tabId}`]: now
                        });
                        localStorage.setItem('freeEndTime', String(localEndTime));
                    }
                } else {
                    // Brand-new user
                    localEndTime = now + FREE_MS;
                    await setDoc(ref, {
                        freeEndTime: localEndTime,
                        freeLastAdjust: now,
                        tabs: { [tabId]: now }
                    });
                    localStorage.setItem('freeEndTime', String(localEndTime));
                }
            } catch (e) {
                // Firestore unavailable — fall back to localStorage
                console.warn('Firestore init err, using local:', e);
                const saved = parseInt(localStorage.getItem('freeEndTime'), 10);
                if (saved && saved > now) {
                    localEndTime = saved;
                } else {
                    const awaitSaved = parseInt(localStorage.getItem('awaitEndTime'), 10);
                    if (awaitSaved && awaitSaved > now) {
                        safeGo('await.html');
                        return;
                    }
                    localEndTime = now + FREE_MS;
                    localStorage.setItem('freeEndTime', String(localEndTime));
                }
            }

            // Register tab, start systems
            await addTab();
            hbTimer = setInterval(heartbeat, HB_MS);
            startTick();
            render();

            // Reveal UI
            loadingScr.classList.add('hidden');
            mainContent.style.opacity = '1';
        }

        /* ══════════════════════════════════════════
           Auth Guard
           ══════════════════════════════════════════ */
        onAuthStateChanged(auth, user => {
            if (user && user.email) {
                userEmail = user.email.trim().toLowerCase();

                // Show user info (prefer URL params if present)
                const params = new URLSearchParams(window.location.search);
                const pName  = params.get('name');
                const pPhoto = params.get('photo');

                userName.textContent = pName ? decodeURIComponent(pName) : (user.displayName || userEmail);
                if (pPhoto) {
                    userPhoto.src = decodeURIComponent(pPhoto);
                    userPhoto.style.display = 'block';
                } else if (user.photoURL) {
                    userPhoto.src = user.photoURL;
                    userPhoto.style.display = 'block';
                }

                init();
            } else {
                // Not logged in — back to login
                window.location.replace('index.html');
            }
        });

        /* ══════════════════════════════════════════
           Menu Button
           ══════════════════════════════════════════ */
        menuBtn.addEventListener('click', () => {
            window.location.href = 'menu.html';
        });

        /* ══════════════════════════════════════════
           Cleanup on Tab Close
           ══════════════════════════════════════════ */
        // Firestore async ops can't run reliably in beforeunload,
        // so we rely on TAB_TTL_MS (8s) heartbeat expiry for cleanup.
        window.addEventListener('beforeunload', () => {
            // Best-effort sync — may or may not succeed
            if (navigator.sendBeacon && userEmail) {
                // Heartbeat expiry will handle it if this fails
            }
        });

        /* ══════════════════════════════════════════
           Particle System
           ══════════════════════════════════════════ */
        (function particles() {
            const cvs = document.getElementById('particleCanvas');
            const ctx = cvs.getContext('2d');
            let W, H;
            const N = 55;
            const dots = [];

            function resize() { W = cvs.width = innerWidth; H = cvs.height = innerHeight; }
            resize();
            addEventListener('resize', resize);

            class Dot {
                constructor() { this.spawn(); }
                spawn() {
                    this.x  = Math.random() * W;
                    this.y  = Math.random() * H;
                    this.r  = Math.random() * 1.8 + 0.4;
                    this.vx = (Math.random() - 0.5) * 0.25;
                    this.vy = (Math.random() - 0.5) * 0.25;
                    this.o  = Math.random() * 0.35 + 0.08;
                    this.hue = Math.random() < 0.6 ? 38 : 0;  // amber or red
                }
                step() {
                    this.x += this.vx;
                    this.y += this.vy;
                    if (this.x < -10 || this.x > W + 10 || this.y < -10 || this.y > H + 10) this.spawn();
                }
                draw() {
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, Math.max(0.1, this.r), 0, Math.PI * 2);
                    ctx.fillStyle = `hsla(${this.hue},85%,58%,${this.o})`;
                    ctx.fill();
                }
            }

            for (let i = 0; i < N; i++) dots.push(new Dot());

            // Draw faint connection lines between nearby particles
            function drawLines() {
                for (let i = 0; i < dots.length; i++) {
                    for (let j = i + 1; j < dots.length; j++) {
                        const dx = dots[i].x - dots[j].x;
                        const dy = dots[i].y - dots[j].y;
                        const dist = Math.sqrt(dx * dx + dy * dy);
                        if (dist < 120) {
                            ctx.beginPath();
                            ctx.moveTo(dots[i].x, dots[i].y);
                            ctx.lineTo(dots[j].x, dots[j].y);
                            ctx.strokeStyle = `rgba(245,158,11,${0.04 * (1 - dist / 120)})`;
                            ctx.lineWidth = 0.5;
                            ctx.stroke();
                        }
                    }
                }
            }

            function loop() {
                ctx.clearRect(0, 0, W, H);
                dots.forEach(d => { d.step(); d.draw(); });
                drawLines();
                requestAnimationFrame(loop);
            }
            loop();
        })();
    </script>
