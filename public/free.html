<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Countdown</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;600;700&family=JetBrains+Mono:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --bg: #08080f;
            --fg: #f0ece4;
            --muted: #6a6a7c;
            --accent: #e8a838;
            --accent-dim: rgba(232,168,56,0.12);
            --accent-glow: rgba(232,168,56,0.35);
            --card: rgba(255,255,255,0.035);
            --border: rgba(255,255,255,0.07);
            --danger: #ef4444;
        }

        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Space Grotesk', sans-serif;
            background: var(--bg);
            color: var(--fg);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* === Ambient background === */
        .bg-layer {
            position: fixed; inset: 0; z-index: 0;
            pointer-events: none; overflow: hidden;
        }
        .blob {
            position: absolute; border-radius: 50%;
            filter: blur(130px); opacity: 0.12;
            animation: blobDrift 22s ease-in-out infinite alternate;
        }
        .blob-a { width: 600px; height: 600px; background: var(--accent); top: -18%; left: -8%; }
        .blob-b { width: 480px; height: 480px; background: #d4542a; bottom: -14%; right: -6%; animation-delay: -8s; animation-duration: 28s; }
        .blob-c { width: 360px; height: 360px; background: #2ac4a8; top: 45%; left: 55%; animation-delay: -15s; animation-duration: 32s; }

        @keyframes blobDrift {
            0% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(40px, -50px) scale(1.08); }
            66% { transform: translate(-30px, 30px) scale(0.94); }
            100% { transform: translate(20px, -20px) scale(1.03); }
        }

        /* === Grain overlay === */
        .grain {
            position: fixed; inset: 0; z-index: 1;
            pointer-events: none; opacity: 0.035;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
            background-size: 200px;
        }

        /* === Main container === */
        .container {
            position: relative; z-index: 2;
            display: flex; flex-direction: column;
            align-items: center; gap: 2.2rem;
            padding: 2rem;
        }

        /* === Tab count badge === */
        .tab-badge {
            display: flex; align-items: center; gap: 0.55rem;
            padding: 0.45rem 1.1rem;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 100px;
            font-size: 0.82rem; color: var(--muted);
            backdrop-filter: blur(12px);
            transition: border-color 0.4s, color 0.4s;
        }
        .tab-badge.warn { border-color: var(--accent); color: var(--accent); }
        .tab-badge .num {
            font-family: 'JetBrains Mono', monospace;
            font-weight: 700; font-size: 1rem;
            color: var(--fg); transition: color 0.4s;
        }
        .tab-badge.warn .num { color: var(--accent); }

        /* === Speed indicator === */
        .speed-indicator {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.78rem; font-weight: 600;
            color: var(--accent);
            letter-spacing: 0.08em;
            padding: 0.3rem 0.9rem;
            background: var(--accent-dim);
            border: 1px solid rgba(232,168,56,0.18);
            border-radius: 6px;
            transition: opacity 0.4s;
        }
        .speed-indicator.hidden { opacity: 0; pointer-events: none; }

        /* === Timer ring === */
        .timer-ring-wrap {
            position: relative;
            width: 310px; height: 310px;
        }
        .timer-ring-wrap svg { width: 100%; height: 100%; transform: rotate(-90deg); }
        .ring-track {
            fill: none; stroke: var(--border); stroke-width: 5;
        }
        .ring-progress {
            fill: none; stroke: var(--accent); stroke-width: 5;
            stroke-linecap: round;
            transition: stroke 0.4s;
        }
        .timer-inner {
            position: absolute; inset: 0;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
        }

        /* === Timer digits === */
        .timer-display {
            font-family: 'JetBrains Mono', monospace;
            font-size: 3.2rem; font-weight: 700;
            letter-spacing: 0.04em;
            line-height: 1;
            color: var(--fg);
        }
        .timer-display .sep {
            opacity: 0.35; margin: 0 0.05em;
            animation: sepBlink 1.2s step-end infinite;
        }
        @keyframes sepBlink {
            0%, 100% { opacity: 0.35; }
            50% { opacity: 0.08; }
        }
        .timer-sub {
            font-size: 0.78rem; color: var(--muted);
            margin-top: 0.7rem; font-weight: 400;
            letter-spacing: 0.06em; text-transform: uppercase;
        }

        /* === Pulse ring === */
        .pulse-ring {
            position: absolute; inset: -10px;
            border-radius: 50%;
            border: 1px solid var(--accent);
            opacity: 0; pointer-events: none;
        }
        .pulse-ring.active {
            animation: pulseOut 1.4s ease-out infinite;
        }
        @keyframes pulseOut {
            0% { transform: scale(0.97); opacity: 0.35; }
            100% { transform: scale(1.12); opacity: 0; }
        }

        /* === Buttons === */
        .btn {
            display: inline-flex; align-items: center; gap: 0.55rem;
            padding: 0.85rem 2rem;
            border: none; border-radius: 12px;
            font-family: 'Space Grotesk', sans-serif;
            font-size: 0.95rem; font-weight: 600;
            cursor: pointer; transition: all 0.3s cubic-bezier(0.16,1,0.3,1);
            text-decoration: none; outline: none;
        }
        .btn:focus-visible { outline: 2px solid var(--accent); outline-offset: 3px; }
        .btn-primary {
            background: var(--accent); color: #0a0a0f;
            box-shadow: 0 4px 24px var(--accent-glow);
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 36px var(--accent-glow);
        }
        .btn-primary:active { transform: translateY(0); }
        .btn-ghost {
            background: var(--card); color: var(--fg);
            border: 1px solid var(--border);
            backdrop-filter: blur(10px);
        }
        .btn-ghost:hover {
            border-color: var(--accent);
            background: var(--accent-dim);
        }
        .btn-row { display: flex; gap: 0.9rem; flex-wrap: wrap; justify-content: center; }

        /* === Toast === */
        .toast-bar {
            position: fixed; bottom: 2rem; left: 50%;
            transform: translateX(-50%) translateY(120px);
            padding: 0.65rem 1.4rem;
            background: rgba(20,20,30,0.92);
            border: 1px solid var(--border);
            border-radius: 10px;
            font-size: 0.82rem; color: var(--muted);
            backdrop-filter: blur(16px);
            z-index: 200;
            transition: transform 0.45s cubic-bezier(0.16,1,0.3,1), opacity 0.45s;
            opacity: 0; pointer-events: none;
        }
        .toast-bar.show { transform: translateX(-50%) translateY(0); opacity: 1; }

        /* === Page states === */
        .page { display: none; }
        .page.active { display: flex; flex-direction: column; align-items: center; gap: 2.2rem; }

        /* === 24h page accent === */
        .page-twentyfour .timer-display { color: var(--fg); }
        .page-twentyfour .ring-progress { stroke: #2ac4a8; }
        .page-twentyfour .pulse-ring.active { border-color: #2ac4a8; }
        .page-twentyfour .btn-primary {
            background: #2ac4a8;
            box-shadow: 0 4px 24px rgba(42,196,168,0.35);
        }
        .page-twentyfour .btn-primary:hover {
            box-shadow: 0 8px 36px rgba(42,196,168,0.4);
        }

        /* === Responsive === */
        @media (max-width: 480px) {
            .timer-ring-wrap { width: 250px; height: 250px; }
            .timer-display { font-size: 2.5rem; }
            .btn { padding: 0.75rem 1.5rem; font-size: 0.88rem; }
        }

        @media (prefers-reduced-motion: reduce) {
            .blob, .pulse-ring.active, .timer-display .sep { animation: none !important; }
            .ring-progress { transition: none !important; }
        }
    </style>
</head>
<body>

    <!-- Background layers -->
    <div class="bg-layer">
        <div class="blob blob-a"></div>
        <div class="blob blob-b"></div>
        <div class="blob blob-c"></div>
    </div>
    <div class="grain"></div>

    <!-- ==================== PAGE 1: 3-minute countdown ==================== -->
    <div id="pageThree" class="page active container">
        <div class="tab-badge" id="tabBadge3">
            <i class="fa-solid fa-window-restore" style="font-size:0.75rem"></i>
            Active tabs: <span class="num" id="tabCount3">1</span>
        </div>

        <div class="speed-indicator hidden" id="speedTag">1x speed</div>

        <div class="timer-ring-wrap">
            <svg viewBox="0 0 310 310">
                <circle class="ring-track" cx="155" cy="155" r="142"/>
                <circle class="ring-progress" id="ring3" cx="155" cy="155" r="142"
                        stroke-dasharray="892.5" stroke-dashoffset="0"/>
            </svg>
            <div class="pulse-ring active" id="pulse3"></div>
            <div class="timer-inner">
                <div class="timer-display" id="timeDisplay3">
                    00<span class="sep">:</span>03<span class="sep">:</span>00
                </div>
                <div class="timer-sub" id="subLabel3">remaining</div>
            </div>
        </div>

        <button class="btn btn-primary" id="menuBtn" aria-label="Open menu">
            <i class="fa-solid fa-bars"></i> Menu
        </button>
    </div>

    <!-- ==================== PAGE 2: 24-hour countdown ==================== -->
    <div id="pageTwentyFour" class="page container page-twentyfour">
        <div class="tab-badge" id="tabBadge24" style="opacity:0;pointer-events:none">
            <i class="fa-solid fa-clock" style="font-size:0.75rem"></i>
            Fixed-rate countdown
        </div>

        <div class="timer-ring-wrap">
            <svg viewBox="0 0 310 310">
                <circle class="ring-track" cx="155" cy="155" r="142"/>
                <circle class="ring-progress" id="ring24" cx="155" cy="155" r="142"
                        stroke-dasharray="892.5" stroke-dashoffset="0"/>
            </svg>
            <div class="pulse-ring active" id="pulse24"></div>
            <div class="timer-inner">
                <div class="timer-display" id="timeDisplay24">
                    24<span class="sep">:</span>00<span class="sep">:</span>00
                </div>
                <div class="timer-sub" id="subLabel24">remaining</div>
            </div>
        </div>

        <div class="btn-row">
            <button class="btn btn-primary" id="payBtn" aria-label="Proceed to payment">
                <i class="fa-solid fa-credit-card"></i> Pay
            </button>
        </div>
    </div>

    <!-- Toast -->
    <div class="toast-bar" id="toast"></div>

    <!-- Firebase SDKs -->
    <script type="module">

        import { getAuth, onAuthStateChanged, browserLocalPersistence, setPersistence }

        const firebaseConfig = {

            authDomain: "my-project-66803-95cb3.firebaseapp.com",
            projectId: "my-project-66803-95cb3",
            storageBucket: "my-project-66803-95cb3.firebasestorage.app",
            messagingSenderId: "167159607898",

    <!-- Main application logic -->
    <script>
    (function() {
        "use strict";

        /* ============================================================
           CONSTANTS
        ============================================================ */
        const TOTAL_3MIN_MS   = 3 * 60 * 1000;   // 180,000 ms
        const TOTAL_24H_MS    = 24 * 60 * 60 * 1000;
        const TICK_INTERVAL   = 100;               // Base interval in ms
        const CIRC            = 2 * Math.PI * 142; // ≈ 892.55
        const LS_START        = "cd3_start_ts";
        const LS_CHANNEL      = "cd3_bcast";
        const LS_HEARTBEAT    = "cd3_hb_";
        const HEARTBEAT_TTL   = 3500;              // ms before a tab is considered dead
        const HB_INTERVAL     = 800;               // how often we write our heartbeat

        /* ============================================================
           STATE
        ============================================================ */
        let tabCount        = 1;
        let pendingSpeed    = 1;
        let currentSpeed    = 1;
        let remainingMs     = TOTAL_3MIN_MS;
        let startTimestamp  = null;
        let lastTickAt      = 0;
        let tickTimer       = null;
        let hbTimer         = null;
        let threeDone       = false;
        let on24Page        = false;
        let myTabId         = Date.now().toString(36) + Math.random().toString(36).slice(2, 8);
        let toastTimeout    = null;

        /* ============================================================
           DOM REFS
        ============================================================ */
        const page3        = document.getElementById("pageThree");
        const page24       = document.getElementById("pageTwentyFour");
        const timeDisp3    = document.getElementById("timeDisplay3");
        const timeDisp24   = document.getElementById("timeDisplay24");
        const ring3        = document.getElementById("ring3");
        const ring24       = document.getElementById("ring24");
        const tabCount3    = document.getElementById("tabCount3");
        const tabBadge3    = document.getElementById("tabBadge3");
        const speedTag     = document.getElementById("speedTag");
        const pulse3       = document.getElementById("pulse3");
        const pulse24      = document.getElementById("pulse24");
        const subLabel3    = document.getElementById("subLabel3");
        const subLabel24   = document.getElementById("subLabel24");
        const menuBtn      = document.getElementById("menuBtn");
        const payBtn       = document.getElementById("payBtn");
        const toastEl      = document.getElementById("toast");

        /* ============================================================
           UTILITIES
        ============================================================ */
        function pad2(n) { return String(Math.floor(n)).padStart(2, "0"); }

        function msToHMS(ms) {
            var totalSec = Math.max(0, Math.ceil(ms / 1000));
            var h = Math.floor(totalSec / 3600);
            var m = Math.floor((totalSec % 3600) / 60);
            var s = totalSec % 60;
            return { h: h, m: m, s: s };
        }

        function formatTime(hms) {
            return pad2(hms.h) + '<span class="sep">:</span>' +
                   pad2(hms.m) + '<span class="sep">:</span>' +
                   pad2(hms.s);
        }

        function showToast(msg) {
            toastEl.textContent = msg;
            toastEl.classList.add("show");
            clearTimeout(toastTimeout);
            toastTimeout = setTimeout(function() { toastEl.classList.remove("show"); }, 2200);
        }

        /* ============================================================
           BROADCAST CHANNEL — real-time sync between tabs
        ============================================================ */
        var bc = null;
        try { bc = new BroadcastChannel(LS_CHANNEL); } catch(e) {}

        if (bc) {
            bc.onmessage = function(ev) {
                if (ev.data && ev.data.type === "heartbeat") {
                    /* Another tab announced itself — recount */
                    recountTabs();
                }
                if (ev.data && ev.data.type === "threeDone") {
                    if (!threeDone && !on24Page) {
                        threeDone = true;
                        stopThreeMin();
                        switchTo24Hour();
                    }
                }
            };
        }

        /* ============================================================
           HEARTBEAT — localStorage-based tab detection
           Each tab writes its unique key with a timestamp.
           We periodically prune stale entries and count live ones.
        ============================================================ */
        function writeHeartbeat() {
            try {
                localStorage.setItem(LS_HEARTBEAT + myTabId, Date.now().toString());
            } catch(e) {}
        }

        function pruneAndCount() {
            var count = 0;
            var now = Date.now();
            try {
                var keysToRemove = [];
                for (var i = 0; i < localStorage.length; i++) {
                    var key = localStorage.key(i);
                    if (key && key.indexOf(LS_HEARTBEAT) === 0) {
                        var ts = parseInt(localStorage.getItem(key), 10);
                        if (now - ts > HEARTBEAT_TTL) {
                            keysToRemove.push(key);
                        } else {
                            count++;
                        }
                    }
                }
                for (var j = 0; j < keysToRemove.length; j++) {
                    localStorage.removeItem(keysToRemove[j]);
                }
            } catch(e) {}
            return Math.max(1, count);
        }

        function recountTabs() {
            var newCount = pruneAndCount();
            if (newCount !== tabCount) {
                tabCount = newCount;
                updateTabUI();
                /* Set pending speed — applied after current tick finishes */
                pendingSpeed = tabCount;
            }
        }

        function updateTabUI() {
            tabCount3.textContent = tabCount;
            if (tabCount > 1) {
                tabBadge3.classList.add("warn");
                speedTag.classList.remove("hidden");
                speedTag.textContent = tabCount + "x speed";
            } else {
                tabBadge3.classList.remove("warn");
                speedTag.classList.add("hidden");
            }
        }

        /* Clean up our heartbeat on unload */
        window.addEventListener("beforeunload", function() {
            try { localStorage.removeItem(LS_HEARTBEAT + myTabId); } catch(e) {}
        });

        /* ============================================================
           START TIMESTAMP — first tab writes it, all tabs read it
        ============================================================ */
        function initStartTimestamp() {
            var stored = localStorage.getItem(LS_START);
            if (stored) {
                startTimestamp = parseInt(stored, 10);
            } else {
                startTimestamp = Date.now();
                localStorage.setItem(LS_START, startTimestamp.toString());
            }
            remainingMs = Math.max(0, TOTAL_3MIN_MS - (Date.now() - startTimestamp));
        }

        /* ============================================================
           3-MINUTE COUNTDOWN
        ============================================================ */
        function startThreeMin() {
            initStartTimestamp();
            updateTimerUI3();
            updateTabUI();

            /* Start heartbeat loop */
            writeHeartbeat();
            hbTimer = setInterval(function() {
                writeHeartbeat();
                recountTabs();
            }, HB_INTERVAL);

            /* Initial recount after a short delay to catch other tabs */
            setTimeout(recountTabs, 200);

            lastTickAt = Date.now();
            tickTimer = setInterval(tick3, TICK_INTERVAL);
        }

        function tick3() {
            if (threeDone) return;

            /* Apply pending speed at the start of each tick */
            if (pendingSpeed !== currentSpeed) {
                currentSpeed = pendingSpeed;
            }

            var now = Date.now();
            var elapsed = now - lastTickAt;
            lastTickAt = now;

            /* Decrease remaining by (elapsed * speed) */
            remainingMs -= elapsed * currentSpeed;

            if (remainingMs <= 0) {
                remainingMs = 0;
                threeDone = true;
                updateTimerUI3();
                stopThreeMin();
                broadcastDone();
                switchTo24Hour();
                return;
            }

            updateTimerUI3();
        }

        function updateTimerUI3() {
            var hms = msToHMS(remainingMs);
            timeDisp3.innerHTML = formatTime(hms);
            var progress = 1 - (remainingMs / TOTAL_3MIN_MS);
            ring3.style.strokeDashoffset = (CIRC * (1 - progress)).toFixed(2);

            if (remainingMs <= 0) {
                pulse3.classList.remove("active");
                subLabel3.textContent = "complete";
                ring3.style.stroke = "#2ac4a8";
            } else if (remainingMs < 15000) {
                subLabel3.textContent = "final seconds";
                ring3.style.stroke = "#ef4444";
            } else if (remainingMs < 60000) {
                subLabel3.textContent = "less than a minute";
                ring3.style.stroke = "#e8a838";
            } else {
                subLabel3.textContent = "remaining";
                ring3.style.stroke = "var(--accent)";
            }
        }

        function stopThreeMin() {
            clearInterval(tickTimer);
            clearInterval(hbTimer);
            tickTimer = null;
            hbTimer = null;
        }

        function broadcastDone() {
            if (bc) {
                try { bc.postMessage({ type: "threeDone" }); } catch(e) {}
            }
            /* Also write to localStorage as fallback */
            try { localStorage.setItem("cd3_finished", "1"); } catch(e) {}
        }

        /* ============================================================
           SWITCH TO 24-HOUR PAGE
        ============================================================ */
        function switchTo24Hour() {
            on24Page = true;

            /* Try to close other tabs that originated from the same source */
            if (bc) {
                try { bc.postMessage({ type: "closeSelf" }); } catch(e) {}
            }

            page3.classList.remove("active");
            page24.classList.add("active");

            /* Clean up 3-min localStorage */
            try {
                localStorage.removeItem(LS_START);
                localStorage.removeItem("cd3_finished");
                /* Remove all heartbeats */
                var toRemove = [];
                for (var i = 0; i < localStorage.length; i++) {
                    var k = localStorage.key(i);
                    if (k && k.indexOf(LS_HEARTBEAT) === 0) toRemove.push(k);
                }
                toRemove.forEach(function(k) { localStorage.removeItem(k); });
            } catch(e) {}

            start24Hour();
        }

        /* Listen for close command from another tab */
        if (bc) {
            bc.onmessage = function(ev) {
                if (!ev.data) return;
                if (ev.data.type === "heartbeat") { recountTabs(); }
                if (ev.data.type === "threeDone") {
                    if (!threeDone && !on24Page) {
                        threeDone = true;
                        stopThreeMin();
                        switchTo24Hour();
                    }
                }
                if (ev.data.type === "closeSelf") {
                    if (!on24Page) {
                        /* Close this tab — it's a duplicate */
                        window.close();
                        /* Fallback: show blank if close is blocked */
                        document.body.innerHTML = "";
                    }
                }
            };
        }

        /* Also poll localStorage for the done flag (fallback if BroadcastChannel fails) */
        setInterval(function() {
            if (threeDone || on24Page) return;
            try {
                if (localStorage.getItem("cd3_finished") === "1") {
                    threeDone = true;
                    stopThreeMin();
                    switchTo24Hour();
                }
            } catch(e) {}
        }, 500);

        /* ============================================================
           24-HOUR COUNTDOWN — always 1 second per tick
        ============================================================ */
        var remaining24Ms = TOTAL_24H_MS;
        var start24Ts = null;

        function start24Hour() {
            start24Ts = Date.now();
            remaining24Ms = TOTAL_24H_MS;
            updateTimerUI24();
            setInterval(tick24, 1000);
        }

        function tick24() {
            remaining24Ms = Math.max(0, TOTAL_24H_MS - (Date.now() - start24Ts));
            updateTimerUI24();
        }

        function updateTimerUI24() {
            var hms = msToHMS(remaining24Ms);
            timeDisp24.innerHTML = formatTime(hms);
            var progress = 1 - (remaining24Ms / TOTAL_24H_MS);
            ring24.style.strokeDashoffset = (CIRC * (1 - progress)).toFixed(2);

            if (remaining24Ms <= 0) {
                pulse24.classList.remove("active");
                subLabel24.textContent = "complete";
            } else if (remaining24Ms < 3600000) {
                subLabel24.textContent = "less than 1 hour";
            } else {
                subLabel24.textContent = "remaining";
            }
        }

        /* ============================================================
           MENU BUTTON — navigate to menu.html
        ============================================================ */
        menuBtn.addEventListener("click", function() {
            window.location.href = "menu.html";
        });

        /* ============================================================
           PAY BUTTON — check Firebase user, navigate accordingly
        ============================================================ */
        payBtn.addEventListener("click", function() {
            var user = window.__firebaseUser;
            if (!user) {
                showToast("Please sign in first to proceed to payment.");
                return;
            }
            var email = (user.email || "").trim().toLowerCase();
            if (email === "jmlsd75@gmail.com".toLowerCase()) {
                /* Admin user */
                var name = encodeURIComponent(user.displayName || "Admin");
                window.location.href = "pay.html?admin=true&name=" + name +
                    "&email=" + encodeURIComponent(email) +
                    "&photo=" + encodeURIComponent(user.photoURL || "") +
                    "&uid=" + user.uid;
            } else {
                /* Regular user */
                var name2 = encodeURIComponent(user.displayName || "User");
                window.location.href = "pay.html?name=" + name2 +
                    "&email=" + encodeURIComponent(email) +
                    "&photo=" + encodeURIComponent(user.photoURL || "");
            }
        });

        /* ============================================================
           INIT — start the 3-minute countdown
        ============================================================ */
        startThreeMin();

    })();
    </script>
</body>
</html>
