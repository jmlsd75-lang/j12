<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Free Access</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * { font-family: 'Inter', sans-serif; }
        body { background: #000; }
        .timer-text { font-variant-numeric: tabular-nums; }
    </style>
</head>
<body class="min-h-screen text-white flex flex-col">

    <!-- Top Navbar -->
    <nav class="w-full z-50 bg-black/80 backdrop-blur-xl border-b border-white/10">
        <div class="max-w-6xl mx-auto px-6 h-16 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <img id="userPhoto" class="w-8 h-8 rounded-full" src="" alt="Profile">
                <span id="userName" class="font-medium text-sm text-neutral-300"></span>
            </div>
            <!-- Logout Button (Hidden during Free countdown, shown during Await) -->
            <button id="logoutBtn" onclick="handleLogout()" class="hidden text-sm font-medium text-neutral-400 hover:text-red-400 transition px-4 py-2 rounded-lg border border-transparent hover:border-red-500/30">
                Logout
            </button>
        </div>
    </nav>

    <!-- Main Content Area -->
    <main class="flex-1 flex items-center justify-center px-6">
        
        <!-- STATE 1: FREE COUNTDOWN VIEW -->
        <div id="freeView" class="hidden flex-col items-center text-center">
            <p class="text-neutral-500 uppercase tracking-widest text-sm mb-6">Free Session Time</p>
            <div id="freeTimer" class="timer-text text-7xl md:text-9xl font-bold tracking-tight text-white mb-12">
                00:03:00
            </div>
            <a href="menu.html" class="px-8 py-4 bg-blue-500 hover:bg-blue-600 text-white font-medium rounded-xl transition transform hover:scale-105 shadow-lg shadow-blue-500/20">
                Open Menu
            </a>
        </div>

        <!-- STATE 2: AWAIT COUNTDOWN VIEW -->
        <div id="awaitView" class="hidden flex-col items-center text-center max-w-lg">
            <!-- Warning Script Message -->
            <div class="mb-10 p-4 rounded-xl bg-red-500/10 border border-red-500/20">
                <p class="text-red-400 font-semibold text-lg">Pay to continue using the system.</p>
                <p class="text-red-400/70 text-sm mt-1">Your free time has expired.</p>
            </div>

            <!-- Await & Pay Buttons -->
            <div class="flex flex-col sm:flex-row gap-6 items-center w-full">
                <!-- Await Button (Unclickable) -->
                <button disabled class="flex-1 w-full py-6 px-8 bg-[#111] border border-white/10 rounded-xl text-left opacity-60 cursor-not-allowed">
                    <span class="text-neutral-500 text-sm font-medium block mb-2">AWAIT</span>
                    <span id="awaitTimer" class="timer-text text-3xl md:text-4xl font-bold text-white">24:00:00</span>
                </button>

                <!-- Pay Button -->
                <a href="pay.html" class="flex-1 w-full py-6 px-8 bg-green-500 hover:bg-green-600 text-center rounded-xl font-bold text-lg transition transform hover:scale-105 shadow-lg shadow-green-500/20">
                    Pay Now
                </a>
            </div>
        </div>

        <!-- Loading State -->
        <div id="loadingView" class="flex flex-col items-center">
            <div class="w-8 h-8 border-2 border-blue-500 border-t-transparent rounded-full animate-spin mb-4"></div>
            <p class="text-neutral-500">Syncing session...</p>
        </div>

    </main>

    <!-- Firebase SDKs -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
        import { getFirestore, doc, setDoc, updateDoc, onSnapshot, increment, FieldValue } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDpNJIZoLeZUhIoTepbLb_3rRLpseu9Zdo",
            authDomain: "my-project-66803-95cb3.firebaseapp.com",
            projectId: "my-project-66803-95cb3",
            storageBucket: "my-project-66803-95cb3.firebasestorage.app",
            messagingSenderId: "167159607898",
            appId: "1:167159607898:web:23ca11366b88868b085e63"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // Generate a unique ID for THIS specific tab/session
        const sessionId = crypto.randomUUID();
        let currentEmail = null;
        let intervalId = null;

        // UI Elements
        const freeView = document.getElementById("freeView");
        const awaitView = document.getElementById("awaitView");
        const loadingView = document.getElementById("loadingView");
        const logoutBtn = document.getElementById("logoutBtn");
        const freeTimerEl = document.getElementById("freeTimer");
        const awaitTimerEl = document.getElementById("awaitTimer");

        // Make logout function global for onclick
        window.handleLogout = async () => {
            // 1. Remove this tab's session from Firestore
            if (currentEmail) {
                const userRef = doc(db, "users", currentEmail);
                await updateDoc(userRef, { [`sessions.${sessionId}`]: FieldValue.delete() }).catch(() => {});
            }
            // 2. Perform actual Firebase Logout
            await signOut(auth);
            // 3. Redirect to login
            window.location.href = "index.html";
        };

        // Clean up session when tab is closed
        window.addEventListener("beforeunload", () => {
            if (currentEmail) {
                const userRef = doc(db, "users", currentEmail);
                // Use sendBeacon or synchronous-ish fetch for reliability on tab close
                navigator.sendBeacon 
                    ? fetch(`https://firestore.googleapis.com/v1/projects/${firebaseConfig.projectId}/databases/(default)/documents/users/${currentEmail}`, { method: 'PATCH', body: '', keepalive: true }).catch(()=>{}) // Fallback
                    : updateDoc(userRef, { [`sessions.${sessionId}`]: FieldValue.delete() }).catch(() => {});
                
                // Standard SDK attempt (works in most modern browsers on beforeunload)
                try { updateDoc(userRef, { [`sessions.${sessionId}`]: FieldValue.delete() }); } catch(e) {}
            }
        });

        function formatTime(totalSeconds) {
            const sec = Math.max(0, totalSeconds);
            const h = Math.floor(sec / 3600);
            const m = Math.floor((sec % 3600) / 60);
            const s = sec % 60;
            return `${String(h).padStart(2, '0')}:${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
        }

        function showView(view) {
            freeView.classList.add("hidden");
            freeView.classList.remove("flex");
            awaitView.classList.add("hidden");
            awaitView.classList.remove("flex");
            loadingView.classList.add("hidden");
            
            if (view === "free") {
                freeView.classList.remove("hidden");
                freeView.classList.add("flex");
                logoutBtn.classList.add("hidden");
            } else if (view === "await") {
                awaitView.classList.remove("hidden");
                awaitView.classList.add("flex");
                logoutBtn.classList.remove("hidden");
            }
        }

        // Verify Authentication strictly
        onAuthStateChanged(auth, async (user) => {
            if (!user) {
                window.location.href = "index.html";
                return;
            }

            currentEmail = user.email.toLowerCase();
            
            // Set UI profile details
            document.getElementById("userName").textContent = user.displayName || "User";
            document.getElementById("userPhoto").src = user.photoURL || "https://ui-avatars.com/api/?name=User&background=111&color=fff";

            const userRef = doc(db, "users", currentEmail);

            // Initialize Document if it doesn't exist, add current session
            try {
                await setDoc(userRef, {
                    freeTimeRemaining: 180, // 3 minutes
                    awaitTimeRemaining: 86400, // 24 hours
                    sessions: { [sessionId]: true }
                }, { merge: true });
            } catch (error) {
                console.error("Firestore init error:", error);
            }

            // Register this specific tab as an active session
            await updateDoc(userRef, { [`sessions.${sessionId}`]: true });

            // Real-time listener for Firestore data
            onSnapshot(userRef, (docSnap) => {
                if (!docSnap.exists()) return;

                const data = docSnap.data();
                const freeTime = data.freeTimeRemaining || 0;
                const awaitTime = data.awaitTimeRemaining || 0;

                if (freeTime > 0) {
                    showView("free");
                    freeTimerEl.textContent = formatTime(freeTime);
                } else {
                    showView("await");
                    awaitTimerEl.textContent = formatTime(awaitTime);
                }
            });

            // Interval to decrement time every second
            // MAGIC LOGIC: Because EVERY open tab runs this interval and calls increment(-1),
            // if a user opens 3 tabs, the database drops by 3 seconds every real second!
            intervalId = setInterval(async () => {
                try {
                    const docSnap = await getDocAsync(userRef); // Avoid extra reads, just use dynamic increment
                    // We blindly decrement the active phase. Firestore atomic increments prevent race conditions.
                    await updateDoc(userRef, {
                        // If free time > 0, decrement free. Else decrement await.
                        // Note: Firestore doesn't allow conditional increments in one call without transactions,
                        // so we decrement both safely and rely on the UI to show the correct one.
                        // To be perfectly efficient, we track state locally:
                    });

                    // Better approach for decrement:
                    if (freeTimerEl.textContent !== "00:00:00") {
                        await updateDoc(userRef, { freeTimeRemaining: increment(-1) });
                    } else {
                        await updateDoc(userRef, { awaitTimeRemaining: increment(-1) });
                    }
                } catch (e) {
                    console.error("Timer update error", e);
                }
            }, 1000);
        });

        // Small helper to avoid import issues if not needed
        async function getDocAsync(ref) {
            const { getDoc } = await import("https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js");
            return getDoc(ref);
        }
    </script>
</body>
</html>
