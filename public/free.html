<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Free Access</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif;}
        body{min-height:100vh;overflow:hidden;background:linear-gradient(to bottom,#020a02 0%,#071507 15%,#0d250d 35%,#102a10 55%,#0a1a0a 75%,#050f05 100%);}

        /* Fireflies */
        .fireflies{position:fixed;inset:0;z-index:2;pointer-events:none;}
        .firefly{position:absolute;width:4px;height:4px;border-radius:50%;background:#aaff44;box-shadow:0 0 8px #aaff44,0 0 20px rgba(170,255,68,0.25);animation:ffFloat 7s ease-in-out infinite alternate,ffGlow 3s ease-in-out infinite alternate;}
        @keyframes ffFloat{0%{transform:translate(0,0)}33%{transform:translate(25px,-35px)}66%{transform:translate(-20px,18px)}100%{transform:translate(12px,-12px)}}
        @keyframes ffGlow{0%{opacity:.15}50%{opacity:1}100%{opacity:.2}}

        /* Moon */
        .moon{position:fixed;top:7%;right:14%;width:55px;height:55px;border-radius:50%;background:radial-gradient(circle at 38% 38%,#f0e8d0,#d4c8a0);box-shadow:0 0 40px rgba(240,232,208,0.25),0 0 90px rgba(240,232,208,0.1);z-index:1;}
        .moon::after{content:'';position:absolute;top:-6px;left:11px;width:52px;height:52px;border-radius:50%;background:#071507;}

        /* Light rays */
        .light-rays{position:fixed;top:0;right:8%;width:280px;height:55%;background:linear-gradient(180deg,rgba(200,220,150,0.035) 0%,transparent 100%);clip-path:polygon(42% 0%,58% 0%,82% 100%,18% 100%);z-index:2;pointer-events:none;}

        /* Tree layers */
        .tree-layer{position:fixed;bottom:0;left:0;width:100%;z-index:3;}

        /* Ground mist */
        .ground-mist{position:fixed;bottom:0;left:0;width:200%;height:140px;background:linear-gradient(90deg,transparent 0%,rgba(80,140,60,0.07) 15%,rgba(80,140,60,0.14) 30%,rgba(80,140,60,0.04) 50%,rgba(80,140,60,0.11) 70%,rgba(80,140,60,0.05) 85%,transparent 100%);animation:mistDrift 28s linear infinite;z-index:5;pointer-events:none;}
        @keyframes mistDrift{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}

        /* Content */
        .content{position:relative;z-index:10;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem;}

        /* Countdown */
        .cd-label{font-size:.75rem;color:rgba(170,255,68,0.4);text-transform:uppercase;letter-spacing:.35em;margin-bottom:.4rem;}
        .cd-timer{font-size:3.8rem;font-weight:700;color:#aaff44;text-shadow:0 0 25px rgba(170,255,68,0.35),0 0 50px rgba(170,255,68,0.15);letter-spacing:.08em;margin-bottom:2rem;font-variant-numeric:tabular-nums;}

        /* Menu button */
        .menu-btn{background:rgba(170,255,68,0.08);border:1px solid rgba(170,255,68,0.25);color:#aaff44;font-size:.95rem;font-weight:600;letter-spacing:.15em;text-transform:uppercase;padding:.75rem 3rem;border-radius:50px;cursor:pointer;transition:all .3s;backdrop-filter:blur(8px);}
        .menu-btn:hover{background:rgba(170,255,68,0.18);border-color:rgba(170,255,68,0.5);box-shadow:0 0 25px rgba(170,255,68,0.15);}

        /* ===== ELEPHANT BUTTONS ===== */
        .elephant-section{position:fixed;bottom:35px;left:50%;transform:translateX(-50%);display:flex;gap:35px;z-index:10;flex-wrap:wrap;justify-content:center;}
        .elephant-btn{display:flex;flex-direction:column;align-items:center;gap:6px;padding:18px 22px;border-radius:22px;transition:all .4s;position:relative;}
        .elephant-btn svg{width:130px;height:105px;filter:drop-shadow(0 5px 10px rgba(0,0,0,0.35));transition:all .4s;}

        /* AWAIT elephant */
        .await-el{background:rgba(90,100,90,0.12);border:1px solid rgba(90,100,90,0.18);cursor:not-allowed;opacity:.65;}
        .await-el svg{color:#4a5a4a;}
        .await-cd{font-size:1.05rem;font-weight:600;color:#5a6a5a;letter-spacing:.06em;font-variant-numeric:tabular-nums;}
        .await-lbl{font-size:.7rem;font-weight:700;color:#4a5a4a;letter-spacing:.22em;text-transform:uppercase;}

        /* PAY elephant */
        .pay-el{background:rgba(212,160,48,0.08);border:1px solid rgba(212,160,48,0.25);cursor:pointer;backdrop-filter:blur(8px);}
        .pay-el:hover{background:rgba(212,160,48,0.18);border-color:rgba(212,160,48,0.55);box-shadow:0 0 35px rgba(212,160,48,0.2);transform:translateY(-5px);}
        .pay-el:hover svg{filter:drop-shadow(0 8px 18px rgba(212,160,48,0.3));transform:scale(1.04);}
        .pay-el:active{transform:translateY(-2px);}
        .pay-el svg{color:#D4A030;}
        .pay-lbl{font-size:.7rem;font-weight:700;color:#D4A030;letter-spacing:.22em;text-transform:uppercase;}

        /* ===== MENU PANEL ===== */
        .menu-panel{position:fixed;bottom:-100%;left:0;width:100%;height:70%;background:rgba(3,10,3,0.96);backdrop-filter:blur(24px);border-top:1px solid rgba(170,255,68,0.1);transition:bottom .4s cubic-bezier(.4,0,.2,1);z-index:50;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;}
        .menu-panel.open{bottom:0;}
        .menu-close{position:absolute;top:18px;right:18px;background:none;border:1px solid rgba(170,255,68,0.2);color:rgba(170,255,68,0.6);width:38px;height:38px;border-radius:50%;cursor:pointer;font-size:1.1rem;display:flex;align-items:center;justify-content:center;transition:all .3s;}
        .menu-close:hover{border-color:rgba(170,255,68,0.5);color:#aaff44;}
        .menu-item{background:rgba(170,255,68,0.06);border:1px solid rgba(170,255,68,0.12);color:rgba(170,255,68,0.7);padding:1rem 4.5rem;border-radius:14px;cursor:pointer;font-size:.95rem;font-weight:500;letter-spacing:.1em;text-transform:uppercase;transition:all .3s;min-width:240px;text-align:center;}
        .menu-item:hover{background:rgba(170,255,68,0.13);border-color:rgba(170,255,68,0.28);color:#aaff44;}

        @media(max-width:640px){
            .cd-timer{font-size:2.6rem;}
            .elephant-btn svg{width:100px;height:80px;}
            .elephant-section{gap:18px;bottom:20px;}
            .menu-item{padding:.85rem 3rem;min-width:200px;}
        }
    </style>
</head>
<body>

    <!-- ===== MAIN CONTENT ===== -->
