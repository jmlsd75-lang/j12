<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Free Session - Auto Start</title>
    <style>
        :root {
            --bg-color: #121212;
            --surface-color: #1e1e1e;
            --primary-color: #bb86fc;
            --secondary-color: #03dac6;
            --text-color: #ffffff;
            --text-secondary: #b0b0b0;
            --danger-color: #cf6679;
            --font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--font-family);
            background-color: var(--bg-color);
            color: var(--text-color);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        header {
            padding: 20px;
            background-color: var(--surface-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #333;
        }

        .user-info {
            font-size: 0.9rem;
            color: var(--text-secondary);
        }

        .rate-counter {
            font-size: 1.2rem;
            font-weight: bold;
            color: var(--primary-color);
            background: rgba(187, 134, 252, 0.1);
            padding: 8px 16px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        #logout-btn {
            background-color: transparent;
            color: var(--danger-color);
            border: 1px solid var(--danger-color);
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: bold;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            display: none;
            margin-bottom: 20px;
        }

        #logout-btn:hover {
            background-color: var(--danger-color);
            color: white;
        }

        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            text-align: center;
        }

        .timer-display {
            font-size: 5rem;
            font-weight: 700;
            font-variant-numeric: tabular-nums;
            letter-spacing: 2px;
            margin-bottom: 40px;
            text-shadow: 0 0 20px rgba(0,0,0,0.5);
            transition: color 0.3s ease;
        }

        .timer-display.active {
            color: var(--secondary-color);
            animation: pulse 2s infinite;
        }

        .timer-display.awaiting {
            color: var(--text-secondary);
            font-size: 4rem;
        }

        .status-message {
            margin-bottom: 30px;
            font-size: 1.2rem;
            color: var(--text-secondary);
            min-height: 1.5em;
        }

        .action-area {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn {
            padding: 15px 30px;
            font-size: 1.2rem;
            border: none;
            border-radius: 8px;
            text-transform: uppercase;
            font-weight: bold;
            text-decoration: none;
            display: inline-block;
            cursor: pointer;
            transition: opacity 0.3s ease, transform 0.3s ease;
        }

        .btn-menu {
            background-color: var(--surface-color);
            color: var(--text-color);
            border: 2px solid var(--text-secondary);
        }

        .btn-menu:hover {
            border-color: var(--text-color);
        }

        .hidden {
            display: none !important;
        }

        .btn-await {
            background-color: #333;
            color: #666;
            cursor: not-allowed;
            border: 1px solid #444;
        }

        .btn-pay {
            background-color: var(--primary-color);
            color: #000;
        }

        .btn-pay:hover {
            background-color: #a370db;
        }

        @keyframes pulse {
            0% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.8; transform: scale(0.98); }
            100% { opacity: 1; transform: scale(1); }
        }

        @media (max-width: 600px) {
            .timer-display { font-size: 3.5rem; }
            .action-area { flex-direction: column; width: 100%; }
            .btn { width: 100%; }
        }
    </style>
</head>
<body>

    <header>
        <div class="user-info">
            Logged in as <strong id="user-email-display">...</strong>
        </div>
        
        <div class="rate-counter">
            <span>Active Tabs:</span>
            <div id="tab-count">...</div>
        </div>
    </header>

    <main id="main-interface">
        <button id="logout-btn" type="button">Logout</button>

        <div id="timer" class="timer-display">00:03:00</div>
        <div id="status-text" class="status-message">Starting...</div>

        <div class="action-area">
            <a id="btn-menu" href="menu.html" class="btn btn-menu hidden">Menu</a>
            <button id="btn-await" class="btn btn-await hidden" disabled>Await</button>
            <a id="btn-pay" href="pay.html" class="btn btn-pay hidden">Pay</a>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
        import {
            getFirestore,
            doc,
            updateDoc,
            onSnapshot,
            serverTimestamp,
            runTransaction
        } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDpNJIZoLeZUhIoTepbLb_3rRLpseu9Zdo",
            authDomain: "my-project-66803-95cb3.firebaseapp.com",
            projectId: "my-project-66803-95cb3",
            storageBucket: "my-project-66803-95cb3.firebasestorage.app",
            messagingSenderId: "167159607898",
            appId: "1:167159607898:web:23ca11366b88868b085e63"
        };

        const TOTAL_WORK_SECONDS = 3 * 60; 
        const AWAIT_TIME_MS = 24 * 60 * 60 * 1000;
        const tabId = crypto.randomUUID();

        let sessionState = 'idle'; 
        let dbStartTime = null; 
        let dbEndTime = null;   
        let currentRate = 1;     
        let activeTabsList = [];

        const ui = {
            email: document.getElementById('user-email-display'),
            timer: document.getElementById('timer'),
            status: document.getElementById('status-text'),
            tabCount: document.getElementById('tab-count'),
            btnMenu: document.getElementById('btn-menu'),
            btnAwait: document.getElementById('btn-await'),
            btnPay: document.getElementById('btn-pay'),
            logoutBtn: document.getElementById('logout-btn')
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // ── 0. LOGOUT HANDLER ──
        ui.logoutBtn.addEventListener('click', async () => {
            try {
                await signOut(auth);
                window.location.href = "index.html";
            } catch (error) {
                console.error("Sign out error", error);
                alert("Error signing out");
            }
        });

        // ── 1. AUTH CHECK ──
        onAuthStateChanged(auth, (user) => {
            if (!user) {
                window.location.href = "index.html"; 
                return;
            }
            ui.email.textContent = user.email;
            initSession(user.email);
        });

        // ── 2. VISUAL TIMER LOOP ──
        setInterval(() => {
            updateVisualTimer();
        }, 100);

        function updateVisualTimer() {
            const now = new Date();

            if (sessionState === 'active' && dbStartTime) {
                const elapsedMs = now - dbStartTime;
                const elapsedSeconds = elapsedMs / 1000;

                const workDone = elapsedSeconds * currentRate;
                let remainingWork = TOTAL_WORK_SECONDS - workDone;

                if (remainingWork <= 0) {
                    ui.timer.textContent = "00:00:00";
                    finishSession(); 
                } else {
                    const displaySeconds = remainingWork / currentRate;
                    ui.timer.textContent = formatTime(displaySeconds * 1000);
                    ui.status.textContent = `Active (Speed: ${currentRate}x)`;
                }
            } else if (sessionState === 'awaiting' && dbEndTime) {
                const elapsedMs = now - dbEndTime;
                const remainingMs = AWAIT_TIME_MS - elapsedMs;

                if (remainingMs <= 0) {
                    ui.timer.textContent = "00:00:00";
                    resetSystem();
                } else {
                    ui.timer.textContent = formatTime(remainingMs);
                    ui.status.textContent = "Please wait.";
                }
            } else {
                // Only show 00:03:00 if truly idle, but initSession forces active immediately
                if (sessionState === 'idle') {
                    ui.timer.textContent = "00:03:00";
                    ui.status.textContent = "Initializing...";
                }
            }
        }

        // ── 3. DATABASE INITIALIZATION & SYNC (MODIFIED FOR AUTO START) ──
        async function initSession(email) {
            const userRef = doc(db, "users", email);

            try {
                await runTransaction(db, async (transaction) => {
                    const snap = await transaction.get(userRef);
                    
                    if (!snap.exists()) {
                        // New User: Start Immediately
                        transaction.set(userRef, {
                            email: email,
                            sessionState: 'active',
                            startTime: serverTimestamp(),
                            activeTabs: [tabId],
                            createdAt: serverTimestamp()
                        });
                        return;
                    }

                    const data = snap.data();
                    let activeTabs = data.activeTabs || [];
                    let state = data.sessionState || 'idle';

                    // Deduplicate and Add Tab
                    activeTabs = activeTabs.filter(id => id !== tabId);
                    activeTabs.push(tabId);
                    transaction.update(userRef, { activeTabs: activeTabs });

                    // AUTO-START LOGIC:
                    // If we are NOT in the 'awaiting' (penalty) state, we force the state to 'active'.
                    // This overrides 'idle' and 'finished' states immediately upon page load.
                    if (state !== 'awaiting') {
                        transaction.update(userRef, {
                            sessionState: 'active',
                            startTime: serverTimestamp() // Reset timer to start fresh now
                        });
                    }
                });
            } catch (e) {
                console.error("Init failed:", e);
                ui.status.textContent = "Connection Error";
            }

            onSnapshot(userRef, (docSnap) => {
                if (docSnap.exists()) {
                    handleDatabaseUpdate(docSnap.data());
                }
            });
        }

        // ── 4. UPDATE STATE FROM DATABASE ──
        function handleDatabaseUpdate(data) {
            sessionState = data.sessionState || 'idle';
            dbStartTime = data.startTime ? data.startTime.toDate() : null;
            dbEndTime = data.lastSessionEnd ? data.lastSessionEnd.toDate() : null;
            activeTabsList = data.activeTabs || [];
            
            if (sessionState === 'awaiting') {
                currentRate = 1;
            } else {
                currentRate = activeTabsList.length > 0 ? activeTabsList.length : 1;
            }

            ui.tabCount.textContent = currentRate;

            if (sessionState === 'awaiting') {
                ui.timer.classList.remove('active');
                ui.timer.classList.add('awaiting');
                
                ui.btnAwait.classList.remove('hidden');
                ui.btnPay.classList.remove('hidden');
                ui.btnMenu.classList.add('hidden');
                ui.logoutBtn.style.display = 'block';

            } else {
                ui.timer.classList.remove('awaiting');
                ui.timer.classList.add('active');
                
                ui.btnAwait.classList.add('hidden');
                ui.btnPay.classList.add('hidden');
                ui.btnMenu.classList.remove('hidden');
                ui.logoutBtn.style.display = 'none';
            }

            updateVisualTimer();
        }

        // ── 5. ACTIONS ──
        async function finishSession() {
            if (sessionState !== 'active') return; 

            const email = ui.email.textContent;
            const userRef = doc(db, "users", email);

            try {
                await runTransaction(db, async (transaction) => {
                    const snap = await transaction.get(userRef);
                    if (!snap.exists()) return;
                    const data = snap.data();

                    if (data.sessionState === 'active') {
                        transaction.update(userRef, {
                            sessionState: 'awaiting',
                            lastSessionEnd: serverTimestamp(),
                            activeTabs: [] 
                        });
                    }
                });
            } catch (e) { console.error(e); }

            setTimeout(() => {
                window.location.href = "await.html";
            }, 1000);
        }

        async function resetSystem() {
            if (sessionState !== 'awaiting') return;

            const email = ui.email.textContent;
            const userRef = doc(db, "users", email);

            try {
                await updateDoc(userRef, {
                    sessionState: 'idle',
                    startTime: null,
                    lastSessionEnd: null
                });
            } catch (e) { console.error(e); }
        }

        function formatTime(ms) {
            const totalSeconds = Math.max(0, ms / 1000);
            const h = Math.floor(totalSeconds / 3600);
            const m = Math.floor((totalSeconds % 3600) / 60);
            const s = Math.floor(totalSeconds % 60);
            return [h, m, s].map(v => v.toString().padStart(2, '0')).join(':');
        }

    </script>
</body>
</html>
