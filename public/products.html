<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Transaction Entry</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        /* --- Base Styles --- */
        :root {
            --primary: #4F46E5;
            --primary-hover: #4338CA;
            --success: #10B981;
            --danger: #EF4444;
            --bg-body: #F3F4F6;
            --bg-card: #FFFFFF;
            --text-main: #1F2937;
            --text-muted: #6B7280;
            --border: #E5E7EB;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            --radius: 16px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-body);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 480px;
        }

        /* Header */
        .header {
            background: var(--bg-card);
            padding: 20px;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            margin-bottom: 20px;
            text-align: center;
        }
        .header h1 { font-size: 1.5rem; color: var(--primary); text-transform: uppercase; letter-spacing: 1px; }
        .header p { color: var(--text-muted); font-size: 0.9rem; margin-top: 4px; }

        /* Product Grid */
        .section-title {
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-muted);
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 12px;
            margin-bottom: 30px;
        }

        .product-btn {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 16px;
            text-align: left;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
        }
        .product-btn:hover { border-color: var(--primary); transform: translateY(-2px); box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .product-btn .p-name { font-weight: 600; font-size: 1rem; margin-bottom: 4px; color: var(--text-main); }
        .product-btn .p-stock { font-size: 0.8rem; color: var(--text-muted); }

        /* Active Transaction Panel */
        #transactionPanel {
            background: var(--bg-card);
            padding: 24px;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            display: none; /* Hidden until product selected */
            animation: slideUp 0.3s ease-out;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 16px;
            padding-bottom: 16px;
            border-bottom: 1px solid #F3F4F6;
        }
        .info-label { font-size: 0.9rem; color: var(--text-muted); }
        .info-value { font-weight: 600; font-size: 1.1rem; color: var(--text-main); }
        .info-value.highlight { color: var(--primary); }

        /* Input Styles */
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-size: 0.9rem; font-weight: 600; margin-bottom: 8px; color: var(--text-main); }
        
        .input-wrapper { position: relative; }
        .input-wrapper input {
            width: 100%;
            padding: 14px;
            border: 1px solid var(--border);
            border-radius: 12px;
            font-size: 1.1rem;
            outline: none;
            font-family: inherit;
            -moz-appearance: textfield;
            transition: border-color 0.2s;
        }
        .input-wrapper input:focus { border-color: var(--primary); box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.1); }
        .input-wrapper .currency-symbol {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-weight: 500;
        }

        /* Payment Methods */
        .payment-options { display: flex; gap: 10px; margin-bottom: 20px; }
        .pay-btn {
            flex: 1;
            padding: 10px;
            border: 1px solid var(--border);
            background: #fff;
            border-radius: 8px;
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            color: var(--text-muted);
            transition: all 0.2s;
        }
        .pay-btn.selected { background: var(--primary); color: white; border-color: var(--primary); }

        /* Action Button */
        .btn-save {
            width: 100%;
            background-color: var(--success);
            color: white;
            border: none;
            padding: 16px;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            box-shadow: 0 4px 6px rgba(16, 185, 129, 0.2);
            transition: background 0.2s;
        }
        .btn-save:hover { background-color: #059669; }
        .btn-save:disabled { background-color: #9CA3AF; cursor: not-allowed; box-shadow: none; }

        /* Toast */
        #toast {
            visibility: hidden; min-width: 280px; background-color: #1F2937; color: #fff;
            text-align: center; border-radius: 12px; padding: 16px; position: fixed;
            z-index: 1000; left: 50%; bottom: 40px; transform: translateX(-50%) translateY(20px);
            font-size: 0.95rem; opacity: 0; transition: all 0.3s;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }
        #toast.show { visibility: visible; opacity: 1; transform: translateX(-50%) translateY(0); }
        #toast.error { background-color: var(--danger); }

        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="container">
        <!-- 1. Header with Transaction Type -->
        <div class="header">
            <h1 id="pageTitle">Transaction</h1>
            <p>Select a product to begin</p>
        </div>

        <!-- 2. Product Grid -->
        <div class="section-title">Available Products</div>
        <div id="productGrid" class="product-grid">
            <!-- Products injected here -->
        </div>

        <!-- 3. Transaction Panel (Hidden initially) -->
        <div id="transactionPanel">
            <div class="info-row">
                <span class="info-label">Selected Product</span>
                <span class="info-value highlight" id="dispName">-</span>
            </div>
            
            <div class="info-row">
                <span class="info-label">Current Stock</span>
                <span class="info-value" id="dispStock">0 Units</span>
            </div>

            <div class="info-row">
                <span class="info-label" id="priceLabel">Price</span>
                <span class="info-value" id="dispPrice">0.00</span>
            </div>

            <div class="form-group">
                <label>Enter Units</label>
                <div class="input-wrapper">
                    <input type="number" id="inputUnits" placeholder="0" min="1" step="1">
                </div>
            </div>

            <div class="form-group">
                <label>Payment Flow</label>
                <div class="payment-options">
                    <button class="pay-btn selected" onclick="setFlow('Cash')">Cash</button>
                    <button class="pay-btn" onclick="setFlow('Credit')">Credit</button>
                    <button class="pay-btn" onclick="setFlow('Bank')">Bank</button>
                </div>
                <!-- Credit Name Input (Hidden by default) -->
                <div class="input-wrapper" id="creditNameWrapper" style="display:none; margin-top:10px;">
                    <input type="text" id="inputCreditName" placeholder="Enter Customer Name" autocomplete="off">
                </div>
            </div>

            <button id="btnSave" class="btn-save">SAVE TRANSACTION</button>
        </div>
    </div>

    <div id="toast"></div>

    <!-- FIREBASE & LOGIC -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getFirestore, collection, getDocs, doc, runTransaction, increment } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
        import { getAuth } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

        // --- CONFIGURATION ---
        const firebaseConfig = {
            apiKey: "AIzaSyDpNJIZoLeZUhIoTepbLb_3rRLpseu9Zdo",
            authDomain: "my-project-66803-95cb3.firebaseapp.com",
            projectId: "my-project-66803-95cb3",
            storageBucket: "my-project-66803-95cb3.firebasestorage.app",
            messagingSenderId: "167159607898",
            appId: "1:167159607898:web:23ca11366b88868b085e63"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        // --- STATE MANAGEMENT ---
        let transactionType = '';
        let products = []; 
        let selectedProduct = null; 
        let flowType = 'Cash';
        
        // Prompt Rules: 
        // IN: Sales (Increases Stock)
        // OUT: Purchases, Damage, Sales Return, Purchase Return (Decreases Stock)
        const IN_TYPES = ['Sales']; 
        const OUT_TYPES = ['Purchases', 'Damage', 'Sales Return', 'Purchase Return'];

        // --- DOM ELEMENTS ---
        const pageTitle = document.getElementById('pageTitle');
        const productGrid = document.getElementById('productGrid');
        const transactionPanel = document.getElementById('transactionPanel');
        const dispName = document.getElementById('dispName');
        const dispStock = document.getElementById('dispStock');
        const dispPrice = document.getElementById('dispPrice');
        const priceLabel = document.getElementById('priceLabel');
        const inputUnits = document.getElementById('inputUnits');
        const creditNameWrapper = document.getElementById('creditNameWrapper');
        const inputCreditName = document.getElementById('inputCreditName');
        const payBtns = document.querySelectorAll('.pay-btn');
        const btnSave = document.getElementById('btnSave');
        const toast = document.getElementById('toast');

        // --- INITIALIZATION ---
        window.addEventListener('DOMContentLoaded', () => {
            // 1. Display Name Immediately (No Loading)
            const urlParams = new URLSearchParams(window.location.search);
            transactionType = urlParams.get('type');
            
            if (transactionType) {
                pageTitle.textContent = transactionType;
            } else {
                // Fallback if missing, though usually called with ?type=X
                pageTitle.textContent = "Transaction";
            }

            // 2. Fetch Products in Background
            fetchProducts();
        });

        // --- FETCH PRODUCTS ---
        async function fetchProducts() {
            const user = auth.currentUser;
            if (!user) return; // Will wait for auth if needed, or assume logged in via persistence

            try {
                // Fetch from users/email/products
                const q = collection(db, "users", user.email, "products");
                const querySnapshot = await getDocs(q);
                
                productGrid.innerHTML = '';
                products = [];

                querySnapshot.forEach((doc) => {
                    const data = doc.data();
                    products.push({ id: doc.id, ...data });
                });

                renderProducts();

            } catch (error) {
                console.error("Error fetching products:", error);
                // Silent fail to avoid alerts, assuming user might be logged out momentarily
            }
        }

        function renderProducts() {
            if (products.length === 0) {
                productGrid.innerHTML = '<div style="grid-column: 1/-1; text-align:center; color:var(--text-muted); padding:20px;">No products found.</div>';
                return;
            }

            products.forEach(p => {
                const btn = document.createElement('div');
                btn.className = 'product-btn';
                btn.innerHTML = `
                    <div class="p-name">${p.name}</div>
                    <div class="p-stock">Stock: ${p.unitsPresent}</div>
                `;
                btn.onclick = () => selectProduct(p);
                productGrid.appendChild(btn);
            });
        }

        // --- SELECT PRODUCT & SETUP UI ---
        function selectProduct(product) {
            selectedProduct = product;
            
            // Display Details
            dispName.textContent = product.name;
            dispStock.textContent = `${product.unitsPresent} Units`;
            inputUnits.value = '';
            inputCreditName.value = '';
            flowType = 'Cash';
            updateFlowButtons();

            // Logic: Determine which price to show
            let priceToShow = 0;
            let labelText = "Price";

            if (IN_TYPES.includes(transactionType)) {
                // Sales: SP
                priceToShow = product.sellingPrice;
                labelText = "Selling Price (SP)";
            } else {
                // Others: BP
                priceToShow = product.buyingPrice;
                labelText = "Buying Price (BP)";
            }

            dispPrice.textContent = parseFloat(priceToShow).toFixed(2);
            priceLabel.textContent = labelText;

            // Show Panel
            transactionPanel.style.display = 'block';
            
            // Scroll to panel
            setTimeout(() => {
                transactionPanel.scrollIntoView({ behavior: 'smooth', block: 'center' });
                inputUnits.focus();
            }, 100);
        }

        // --- PAYMENT FLOW LOGIC ---
        window.setFlow = (type) => {
            flowType = type;
            updateFlowButtons();

            if (type === 'Credit') {
                creditNameWrapper.style.display = 'block';
                inputCreditName.focus();
            } else {
                creditNameWrapper.style.display = 'none';
            }
        };

        function updateFlowButtons() {
            payBtns.forEach(btn => {
                if (btn.textContent === flowType) {
                    btn.classList.add('selected');
                } else {
                    btn.classList.remove('selected');
                }
            });
        }

        // --- SAVE TRANSACTION ---
        btnSave.addEventListener('click', async () => {
            // 1. Validation
            const units = parseInt(inputUnits.value);
            if (!units || units <= 0) {
                showToast("Please enter a valid unit count.", true);
                inputUnits.focus();
                return;
            }

            if (flowType === 'Credit' && !inputCreditName.value.trim()) {
                showToast("Please enter the Customer Name for Credit.", true);
                inputCreditName.focus();
                return;
            }

            // 2. Calculation
            let amount = 0;
            let flowForm = 'OUT'; // Default per prompt

            if (IN_TYPES.includes(transactionType)) {
                // Sales
                flowForm = 'IN';
                amount = units * selectedProduct.sellingPrice;
            } else {
                // Purchases, Damage, Returns
                flowForm = 'OUT';
                amount = units * selectedProduct.buyingPrice;
            }

            // UI Feedback
            const isSaving = true;
            btnSave.disabled = true;
            btnSave.textContent = 'Saving...';

            try {
                const user = auth.currentUser;
                if(!user) throw "User not authenticated";

                const now = new Date();
                const timestamp = Date.now();
                const customerName = (flowType === 'Credit') ? inputCreditName.value.trim() : "-";

                // --- DATABASE TRANSACTION (Atomic) ---
                await runTransaction(db, async (transaction) => {
                    const productRef = doc(db, "users", user.email, "products", selectedProduct.id);
                    const transactionRef = doc(collection(db, "users", user.email, "transactions"));
                    
                    const productDoc = await transaction.get(productRef);
                    if (!productDoc.exists()) throw "Product does not exist!";

                    const currentData = productDoc.data();
                    const currentStock = parseInt(currentData.unitsPresent);
                    let newStock = 0;

                    // Update Stock Logic
                    if (flowForm === 'IN') {
                        newStock = currentStock + units;
                    } else {
                        if (units > currentStock) throw "Insufficient Stock for this transaction.";
                        newStock = currentStock - units;
                    }

                    // 1. Update Product Stock
                    transaction.update(productRef, { unitsPresent: newStock });

                    // 2. Create New Transaction Record
                    transaction.set(transactionRef, {
                        date: now.toLocaleString(),
                        timestamp: timestamp,
                        detail: transactionType,
                        flowType: flowType,
                        flowForm: flowForm, 
                        productName: selectedProduct.name,
                        productId: selectedProduct.id,
                        units: units,
                        amount: parseFloat(amount.toFixed(2)),
                        name: customerName,
                        buyingPriceSnapshot: selectedProduct.buyingPrice,
                        sellingPriceSnapshot: selectedProduct.sellingPrice
                    });
                });

                showToast("Transaction Saved Successfully!");
                
                // Redirect after short delay
                setTimeout(() => {
                    window.location.href = "stock.html";
                }, 1000);

            } catch (error) {
                console.error("Transaction Error:", error);
                
                // Handle custom error messages
                let msg = "Error saving transaction.";
                if (typeof error === 'string') msg = error;
                
                showToast(msg, true);
                btnSave.disabled = false;
                btnSave.textContent = 'SAVE TRANSACTION';
            }
        });

        // --- UTILS ---
        function showToast(message, isError = false) {
            toast.textContent = message;
            toast.className = isError ? 'show error' : 'show';
            setTimeout(() => { toast.className = toast.className.replace('show', ''); }, 3000);
        }
    </script>
</body>
</html>
