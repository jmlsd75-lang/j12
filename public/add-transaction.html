<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Transaction Entry</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

    <style>
        /* --- Base Styles --- */
        :root {
            --primary: #4F46E5;
            --primary-hover: #4338CA;
            --danger: #EF4444;
            --success: #10B981;
            --bg-body: #F3F4F6;
            --bg-card: #FFFFFF;
            --text-main: #1F2937;
            --text-muted: #6B7280;
            --border: #E5E7EB;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            --radius: 16px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-body);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .app-container {
            background: var(--bg-card);
            width: 100%;
            max-width: 480px;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            min-height: 500px;
            position: relative;
        }

        /* Header */
        header {
            padding: 20px;
            border-bottom: 1px solid var(--border);
            background: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        
        .back-btn {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            background: transparent;
            border: none;
            color: var(--text-muted);
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 4px;
            padding: 8px;
            border-radius: 8px;
            transition: background 0.2s;
        }
        .back-btn:hover { background: #F3F4F6; color: var(--text-main); }

        header h1 { font-size: 1.25rem; font-weight: 600; color: var(--text-main); }

        /* Steps */
        .step-content {
            padding: 24px;
            flex: 1;
            display: none; 
            flex-direction: column;
            animation: slideUp 0.3s ease-out;
        }
        .step-content.active { display: flex; }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .trail-container {
            display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 24px; justify-content: flex-start;
        }
        .trail-btn {
            background: #F9FAFB; border: 1px solid #D1D5DB; color: var(--text-main);
            padding: 6px 12px; border-radius: 20px; font-size: 0.8rem; font-weight: 500;
        }
        .trail-label { color: var(--text-muted); font-size: 0.65rem; text-transform: uppercase; margin-right: 6px; }

        label { display: block; font-size: 0.95rem; font-weight: 600; margin-bottom: 12px; color: var(--text-main); }
        
        input[type="text"], input[type="number"] {
            width: 100%; padding: 16px; border: 2px solid var(--border);
            border-radius: 12px; font-size: 1.25rem; transition: all 0.2s;
            font-family: inherit; -moz-appearance: textfield;
            text-align: center;
        }
        input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.1); }
        .hint { font-size: 0.85rem; color: var(--text-muted); margin-top: 12px; text-align: center; }

        .grid-options {
            display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; margin-top: 10px;
        }
        
        /* 2 Column Grid for Charges */
        .grid-options-2 {
            display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 10px;
        }

        .option-btn {
            background: #F9FAFB; border: 2px solid var(--border); border-radius: 12px;
            padding: 20px 10px; text-align: center; cursor: pointer; transition: all 0.2s;
            font-weight: 600; font-size: 1rem; color: var(--text-main);
        }
        .option-btn:hover { border-color: var(--primary); background: #EEF2FF; color: var(--primary); }
        .option-btn.selected { border-color: var(--primary); background: var(--primary); color: #fff; }

        .action-bar {
            padding: 16px 24px 24px 24px; margin-top: auto; display: flex;
            justify-content: space-between; align-items: center;
            border-top: 1px solid var(--border); background: #F9FAFB;
        }
        .action-cancel { background: transparent; color: var(--text-muted); font-weight: 600; border: none; cursor: pointer; padding: 10px; font-size: 0.95rem; }
        .action-cancel:hover { color: var(--danger); }
        
        .action-primary {
            background: var(--primary); color: white; border: none; padding: 14px 28px;
            border-radius: 10px; cursor: pointer; font-weight: 600; flex: 1; margin-left: 12px;
            font-size: 1rem; box-shadow: 0 2px 4px rgba(79, 70, 229, 0.3);
        }
        .action-primary:hover:not(:disabled) { background: var(--primary-hover); }
        .action-primary:disabled { background: #C7D2FE; cursor: not-allowed; box-shadow: none; }
        .hidden { display: none !important; }

        .success-view { text-align: center; padding-top: 40px; }
        .success-icon {
            width: 80px; height: 80px; background: #D1FAE5; color: var(--success);
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            margin: 0 auto 24px auto; animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        @keyframes popIn { from { transform: scale(0); } to { transform: scale(1); } }

        #toast {
            visibility: hidden; min-width: 280px; background-color: #1F2937; color: #fff;
            text-align: center; border-radius: 12px; padding: 16px; position: fixed;
            z-index: 1000; left: 50%; bottom: 40px; transform: translateX(-50%) translateY(20px);
            font-size: 0.95rem; opacity: 0; transition: all 0.3s;
        }
        #toast.show { visibility: visible; opacity: 1; transform: translateX(-50%) translateY(0); }
    </style>
</head>
<body>

    <div class="app-container">
        <header>
            <button class="back-btn" onclick="goBack()">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="19" y1="12" x2="5" y2="12"></line>
                    <polyline points="12 19 5 12 12 5"></polyline>
                </svg>
                Back
            </button>
            <h1 id="headerTitle">New Transaction</h1>
        </header>

        <main>
            <!-- Step 2: Amount -->
            <section id="step-2" class="step-content">
                <div class="trail-container" id="trail-2"></div>
                <label for="amountInput">Enter Amount</label>
                <input type="number" id="amountInput" placeholder="0.00" inputmode="decimal">
                <div class="hint">Press <b>Enter</b> to continue</div>
            </section>

            <!-- Step 3: Payment Form -->
            <section id="step-3" class="step-content">
                <div class="trail-container" id="trail-3"></div>
                <label>Payment Method</label>
                <div class="grid-options">
                    <div class="option-btn" onclick="selectForm('Cash', this)">Cash</div>
                    <div class="option-btn" onclick="selectForm('Credit', this)">Credit</div>
                    <div class="option-btn" onclick="selectForm('Bank', this)">Bank</div>
                </div>
            </section>

            <!-- Step 4: Bank Name (Only if Bank) -->
            <section id="step-4-bank" class="step-content">
                <div class="trail-container" id="trail-4-bank"></div>
                <label for="bankNameInput">Bank Name</label>
                <input type="text" id="bankNameInput" placeholder="e.g. Bank of America" autocomplete="off">
                <div class="hint">Press <b>Enter</b> to continue</div>
            </section>

            <!-- Step 5: Charges Option (Only if Flow is OUT & Form is BANK) -->
            <section id="step-5-charges" class="step-content">
                <div class="trail-container" id="trail-5-charges"></div>
                <label>Are there bank charges?</label>
                <div class="grid-options-2">
                    <div class="option-btn" onclick="selectChargesOption(false, this)">Without Charges</div>
                    <div class="option-btn" onclick="selectChargesOption(true, this)">With Charges</div>
                </div>
            </section>

            <!-- Step 6: Charges Amount (Only if With Charges is YES) -->
            <section id="step-6-charge-amt" class="step-content">
                <div class="trail-container" id="trail-6-charge-amt"></div>
                <label for="chargeAmountInput">Enter Charges Amount</label>
                <input type="number" id="chargeAmountInput" placeholder="0.00" inputmode="decimal">
                <div class="hint">Press <b>Enter</b> to continue</div>
            </section>

            <!-- Step 7: Credit Name (Only if Credit) -->
            <section id="step-7-credit" class="step-content">
                <div class="trail-container" id="trail-7-credit"></div>
                <label for="creditNameInput">Credit Name / Lender</label>
                <input type="text" id="creditNameInput" placeholder="e.g. Supplier A" autocomplete="off">
                <div class="hint">Press <b>Enter</b> to continue</div>
            </section>

            <!-- Step 8: Confirmation -->
            <section id="step-8" class="step-content">
                <div class="trail-container" id="trail-8" style="justify-content: center; margin-bottom: 30px;"></div>
                <div style="text-align: center; color: var(--text-muted); font-size: 0.95rem;">
                    Please verify the transaction details above before saving.
                </div>
            </section>

            <!-- Step 9: Success -->
            <section id="step-9" class="step-content">
                <div class="success-view">
                    <div class="success-icon">
                        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="20 6 9 17 4 12"></polyline>
                        </svg>
                    </div>
                    <h2 style="font-size: 1.5rem; margin-bottom: 8px;">Saved!</h2>
                    <p style="color:var(--text-muted)">Redirecting to dashboard...</p>
                </div>
            </section>
        </main>

        <footer class="action-bar">
            <button class="action-cancel" onclick="handleCancel()">Cancel</button>
            <button id="mainActionBtn" class="action-primary hidden" onclick="saveTransaction()">Save</button>
        </footer>
    </div>

    <div id="toast"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getFirestore, collection, addDoc, doc, updateDoc, increment } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDpNJIZoLeZUhIoTepbLb_3rRLpseu9Zdo",
            authDomain: "my-project-66803-95cb3.firebaseapp.com",
            projectId: "my-project-66803-95cb3",
            storageBucket: "my-project-66803-95cb3.firebasestorage.app",
            messagingSenderId: "167159607898",
            appId: "1:167159607898:web:23ca11366b88868b085e63"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        const state = {
            step: 2,
            data: {
                flowType: '',   
                detail: '',     
                amount: 0,
                flowForm: '', 
                creditName: '',
                bankName: '',
                hasCharges: false,
                chargesAmount: 0
            }
        };

        const inputs = {
            amount: document.getElementById('amountInput'),
            creditName: document.getElementById('creditNameInput'),
            bankName: document.getElementById('bankNameInput'),
            chargeAmount: document.getElementById('chargeAmountInput')
        };
        const mainActionBtn = document.getElementById('mainActionBtn');
        const headerTitle = document.getElementById('headerTitle');

        // --- Initialization: Read URL Params ---
        window.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const flow = urlParams.get('flow'); // Expected: 'in' or 'out'
            const detail = urlParams.get('detail');
            
            if (flow && detail) {
                // Normalize flow to lowercase to avoid case sensitivity issues
                state.data.flowType = flow.toLowerCase(); 
                state.data.detail = detail;
                goToStep(2);
            } else {
                window.location.href = 'detail.html';
            }
        });

        function goToStep(stepNumber) {
            document.querySelector('.step-content.active')?.classList.remove('active');
            const next = document.getElementById(`step-${stepNumber}`);
            if(next) {
                next.classList.add('active');
                state.step = stepNumber;
                updateUI();
                
                // Focus logic
                if(stepNumber === 2) setTimeout(() => inputs.amount.focus(), 50);
                if(stepNumber === '4-bank') setTimeout(() => inputs.bankName.focus(), 50);
                if(stepNumber === '6-charge-amt') setTimeout(() => inputs.chargeAmount.focus(), 50);
                if(stepNumber === '7-credit') setTimeout(() => inputs.creditName.focus(), 50);
            }
        }

        function updateUI() {
            if(state.step === 1) headerTitle.innerText = "New Transaction";
            else if(state.step === 8) headerTitle.innerText = "Confirm Details";
            else headerTitle.innerText = state.data.detail || "Transaction";

            if (state.step === 8) {
                mainActionBtn.classList.remove('hidden');
                mainActionBtn.textContent = "Save Transaction";
                mainActionBtn.disabled = false;
            } else {
                mainActionBtn.classList.add('hidden');
            }
            renderHistory();
        }

        function createHistoryButton(label, value) {
            return `<div class="trail-btn"><span class="trail-label">${label}</span> ${value}</div>`;
        }

        function renderHistory() {
            const typePill = createHistoryButton('Type', state.data.detail);
            const amountPill = state.data.amount ? createHistoryButton('Amount', state.data.amount) : '';
            const formPill = state.data.flowForm ? createHistoryButton('Method', state.data.flowForm) : '';
            
            let bankPill = '';
            if (state.data.flowForm === 'Bank' && state.data.bankName) {
                bankPill = createHistoryButton('Bank', state.data.bankName);
            }

            let chargePill = '';
            if (state.data.flowForm === 'Bank' && state.data.hasCharges) {
                chargePill = createHistoryButton('Charges', state.data.chargesAmount);
            }

            let creditPill = '';
            if (state.data.flowForm === 'Credit' && state.data.creditName) {
                creditPill = createHistoryButton('Lender', state.data.creditName);
            }

            // Render Trail based on active step
            if (state.step === 2) document.getElementById('trail-2').innerHTML = typePill;
            if (state.step === 3) document.getElementById('trail-3').innerHTML = typePill + amountPill;
            
            if (state.step === '4-bank') document.getElementById('trail-4-bank').innerHTML = typePill + amountPill + formPill;
            
            if (state.step === '5-charges') document.getElementById('trail-5-charges').innerHTML = typePill + amountPill + formPill + bankPill;
            
            if (state.step === '6-charge-amt') document.getElementById('trail-6-charge-amt').innerHTML = typePill + amountPill + formPill + bankPill;
            
            if (state.step === '7-credit') document.getElementById('trail-7-credit').innerHTML = typePill + amountPill + formPill;
            
            if (state.step === 8) {
                let html = typePill + amountPill + formPill;
                if (state.data.flowForm === 'Bank') html += bankPill;
                if (state.data.flowForm === 'Bank' && state.data.hasCharges) html += chargePill;
                if (state.data.flowForm === 'Credit') html += creditPill;
                document.getElementById('trail-8').innerHTML = html;
            }
        }

        // --- Event Listeners ---

        // 1. Amount Input
        inputs.amount.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                const val = parseFloat(inputs.amount.value);
                if (!val || val <= 0) return showToast("Please enter a valid amount.");
                state.data.amount = val.toFixed(2);
                goToStep(3);
            }
        });

        // 2. Form Selection
        window.selectForm = function(form, btnEl) {
            state.data.flowForm = form;
            
            // Visual selection
            document.querySelectorAll('#step-3 .option-btn').forEach(b => {
                b.classList.remove('selected');
                b.style.borderColor = 'var(--border)'; b.style.background = '#F9FAFB'; b.style.color = 'var(--text-main)';
            });
            btnEl.classList.add('selected');
            btnEl.style.borderColor = 'var(--primary)'; btnEl.style.background = 'var(--primary)'; btnEl.style.color = '#fff';

            setTimeout(() => {
                if (form === 'Credit') {
                    goToStep('7-credit');
                } else if (form === 'Bank') {
                    goToStep('4-bank');
                } else {
                    // Cash
                    goToStep(8);
                }
            }, 150);
        };

        // 3. Bank Name Input
        inputs.bankName.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                const val = inputs.bankName.value.trim();
                if (!val) return showToast("Please enter a bank name.");
                state.data.bankName = val;

                // LOGIC: If flow is OUT && form is BANK, ask for charges
                if (state.data.flowType === 'out') {
                    goToStep('5-charges');
                } else {
                    // If flow is IN (or anything else), skip charges, go to confirm
                    goToStep(8);
                }
            }
        });

        // 4. Charges Option Selection
        window.selectChargesOption = function(hasCharges, btnEl) {
            state.data.hasCharges = hasCharges;
            
            // Visual selection
            document.querySelectorAll('#step-5-charges .option-btn').forEach(b => {
                b.classList.remove('selected');
                b.style.borderColor = 'var(--border)'; b.style.background = '#F9FAFB'; b.style.color = 'var(--text-main)';
            });
            btnEl.classList.add('selected');
            btnEl.style.borderColor = 'var(--primary)'; btnEl.style.background = 'var(--primary)'; btnEl.style.color = '#fff';

            setTimeout(() => {
                if (hasCharges) {
                    goToStep('6-charge-amt');
                } else {
                    goToStep(8);
                }
            }, 150);
        };

        // 5. Charge Amount Input
        inputs.chargeAmount.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                const val = parseFloat(inputs.chargeAmount.value);
                if (!val || val <= 0) return showToast("Please enter charge amount.");
                state.data.chargesAmount = val.toFixed(2);
                goToStep(8);
            }
        });

        // 6. Credit Name Input
        inputs.creditName.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                const val = inputs.creditName.value.trim();
                if (!val) return showToast("Please enter a name.");
                state.data.creditName = val;
                goToStep(8);
            }
        });

        // --- Save Logic ---
        let isSaving = false;
        window.saveTransaction = async function() {
            if (isSaving) return;
            isSaving = true;
            mainActionBtn.disabled = true;
            mainActionBtn.textContent = "Saving...";

            const user = auth.currentUser;
            if (!user) {
                showToast("Session expired. Redirecting to login...");
                setTimeout(() => window.location.href = 'index.html', 1500);
                return;
            }

            // --- TRANSACTION 1: The Main Transaction ---
            let finalDetail = state.data.detail;
            // Append Credit Name if applicable
            if (state.data.flowForm === 'Credit' && state.data.creditName) {
                finalDetail += ` (${state.data.creditName})`;
            }
            // Append Bank Name if applicable
            if (state.data.flowForm === 'Bank' && state.data.bankName) {
                finalDetail += ` (${state.data.bankName})`;
            }

            const mainTransaction = {
                date: new Date().toLocaleString(),
                detail: finalDetail,
                type: state.data.flowType,       
                displayType: state.data.detail,  
                method: state.data.flowForm.toUpperCase(), 
                amount: Number(state.data.amount),
                createdAt: Date.now()
            };

            try {
                // Save Main Transaction
                await addDoc(collection(db, "users", user.email, "transactions"), mainTransaction);

                // --- TRANSACTION 2: The Charges Transaction (Only if applicable) ---
                if (state.data.flowForm === 'Bank' && state.data.hasCharges) {
                    const chargesTransaction = {
                        date: new Date().toLocaleString(),
                        detail: "charges",                // Requirement: detail == charges
                        type: "out",                     // Requirement: flowtype out
                        displayType: "Charges",
                        method: "BANK",                  // Requirement: flow form bank
                        name: state.data.bankName,       // Requirement: name == bank name
                        amount: Number(state.data.chargesAmount), // Requirement: amount == charges amount
                        createdAt: Date.now()
                    };
                    await addDoc(collection(db, "users", user.email, "transactions"), chargesTransaction);
                }

                // Update User Count
                const incrementCount = (state.data.flowForm === 'Bank' && state.data.hasCharges) ? 2 : 1;
                const userRef = doc(db, "users", user.email);
                await updateDoc(userRef, { spaceUsed: increment(incrementCount) });

                console.log("Transactions Saved");
                goToStep(9);
                setTimeout(() => { window.location.href = 'business.html'; }, 2000);

            } catch (error) {
                console.error("Error:", error);
                showToast("Error saving: " + error.message);
                isSaving = false;
                mainActionBtn.disabled = false;
                mainActionBtn.textContent = "Save";
            }
        };

        window.goBack = function() {
            window.location.href = 'business.html';
        };

        window.handleCancel = function() {
            if(confirm("Cancel this transaction? Unsaved data will be lost.")) {
                window.location.href = 'business.html';
            }
        };

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.textContent = msg; t.className = 'show';
            setTimeout(() => t.className = t.className.replace('show', ''), 3000);
        }

        onAuthStateChanged(auth, (user) => {
            if (!user) window.location.href = 'index.html';
        });
    </script>
</body>
</html>
