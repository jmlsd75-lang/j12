<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loading...</title>
    <style>
        /* Basic styling to center the text */
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f0f0;
        }
        .message {
            font-size: 24px;
            color: #333;
        }
    </style>
</head>
<body>

    <div class="message">The program is in progress...</div>

    <script>
        // Set a timeout for 3000 milliseconds (3 seconds)
        setTimeout(function() {
            // Redirect to index.html after the time is up
            window.location.href = "index.html";
        }, 3000);
    </script>

</body>
</html>
