<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Jamal Said Kazembe</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(180deg, #0b1a0b 0%, #1a3a1a 40%, #2d5a27 70%, #1a3a1a 100%);
            font-family: Georgia, 'Times New Roman', serif;
        }

        .back-btn {
            position: fixed;
            top: 24px;
            left: 28px;
            background: none;
            border: 1px solid rgba(76, 175, 80, 0.4);
            color: #a5d69a;
            font-family: Georgia, serif;
            font-size: 15px;
            letter-spacing: 1px;
            padding: 8px 18px;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .back-btn:hover {
            border-color: #4caf50;
            color: #e8f5e0;
            background: rgba(76, 175, 80, 0.1);
        }

        .login-card {
            background: rgba(11, 26, 11, 0.85);
            border: 1px solid rgba(76, 175, 80, 0.35);
            border-radius: 10px;
            padding: 48px 42px 40px;
            width: 400px;
            max-width: 92vw;
            box-shadow: 0 8px 40px rgba(0, 0, 0, 0.5), 0 0 60px rgba(76, 175, 80, 0.08);
            text-align: center;
            position: relative;
        }

        .login-card::before {
            content: '';
            position: absolute;
            top: -1px;
            left: 30%;
            right: 30%;
            height: 2px;
            background: linear-gradient(90deg, transparent, #4caf50, transparent);
        }

        .card-title {
            color: #e8f5e0;
            font-size: 22px;
            font-weight: 700;
            letter-spacing: 3px;
            margin-bottom: 6px;
        }

        .card-subtitle {
            color: #7cb872;
            font-size: 13px;
            letter-spacing: 2px;
            margin-bottom: 36px;
        }

        .google-btn {
            width: 100%;
            padding: 14px;
            font-size: 17px;
            font-family: Georgia, serif;
            letter-spacing: 2px;
            color: #e8f5e0;
            background: linear-gradient(135deg, #2e7d32, #1b5e20);
            border: 2px solid #4caf50;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 20px rgba(76, 175, 80, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        .google-btn:hover {
            background: linear-gradient(135deg, #388e3c, #2e7d32);
            box-shadow: 0 6px 30px rgba(76, 175, 80, 0.5);
            transform: translateY(-2px);
        }

        .google-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .google-btn svg {
            width: 22px;
            height: 22px;
        }

        .msg {
            margin-top: 20px;
            font-size: 14px;
            min-height: 22px;
            transition: all 0.3s ease;
        }

        .msg.error {
            color: #e57373;
        }

        .msg.info {
            color: #a5d69a;
        }
    </style>
</head>
<body>

    <button class="back-btn" onclick="window.location.href='index.html'">BACK</button>

    <div class="login-card">
        <div class="card-title">SIGN IN</div>
        <div class="card-subtitle">JAMAL SAID KAZEMBE SYSTEM</div>

        <button class="google-btn" id="googleLoginBtn">
            <svg viewBox="0 0 24 24" fill="none">
                <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/>
                <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
                <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
            </svg>
            LOGIN WITH GOOGLE
        </button>

        <div class="msg" id="loginMsg"></div>
    </div>

    <script src="login.js" type="module"></script>
</body>
</html>
