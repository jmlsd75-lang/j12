<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard - Jamal Said Kazembe</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Poppins', sans-serif;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  background: linear-gradient(135deg, #0d4a0d 0%, #1a6b1a 25%, #0f5f0f 50%, #145214 75%, #0a3d0a 100%);
  overflow: hidden;
  position: relative;
}

body::before {
  content: '';
  position: absolute;
  top: -50%;
  left: -50%;
  width: 200%;
  height: 200%;
  background: 
    radial-gradient(ellipse at 20% 50%, rgba(34, 139, 34, 0.3) 0%, transparent 50%),
    radial-gradient(ellipse at 80% 20%, rgba(0, 100, 0, 0.2) 0%, transparent 50%),
    radial-gradient(ellipse at 50% 80%, rgba(34, 120, 34, 0.25) 0%, transparent 50%);
  animation: forestGlow 8s ease-in-out infinite alternate;
  z-index: 0;
}

@keyframes forestGlow {
  0% { transform: translate(0, 0) scale(1); }
  100% { transform: translate(-2%, -2%) scale(1.05); }
}

.leaf {
  position: absolute;
  width: 20px;
  height: 20px;
  background: linear-gradient(135deg, #228B22, #32CD32);
  border-radius: 0 50% 50% 50%;
  opacity: 0.3;
  animation: fall linear infinite;
  z-index: 0;
}

.leaf:nth-child(1) { left: 10%; animation-duration: 12s; animation-delay: 0s; width: 15px; height: 15px; }
.leaf:nth-child(2) { left: 25%; animation-duration: 15s; animation-delay: 2s; }
.leaf:nth-child(3) { left: 40%; animation-duration: 10s; animation-delay: 4s; width: 25px; height: 25px; }
.leaf:nth-child(4) { left: 55%; animation-duration: 14s; animation-delay: 1s; }
.leaf:nth-child(5) { left: 70%; animation-duration: 11s; animation-delay: 3s; width: 18px; height: 18px; }
.leaf:nth-child(6) { left: 85%; animation-duration: 13s; animation-delay: 5s; }

@keyframes fall {
  0% { transform: translateY(-100vh) rotate(0deg); opacity: 0; }
  10% { opacity: 0.3; }
  90% { opacity: 0.3; }
  100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
}

.top-bar {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  z-index: 100;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 20px 30px;
}

.user-info {
  display: flex;
  align-items: center;
  gap: 12px;
}

.user-avatar {
  width: 42px;
  height: 42px;
  border-radius: 50%;
  border: 2px solid rgba(144, 238, 144, 0.4);
  object-fit: cover;
  background: rgba(144, 238, 144, 0.1);
}

.user-name {
  font-size: 14px;
  font-weight: 500;
  color: #90EE90;
}

.logout-btn {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 10px 24px;
  font-family: 'Poppins', sans-serif;
  font-size: 14px;
  font-weight: 500;
  color: #ff6b6b;
  background: rgba(255, 107, 107, 0.1);
  border: 1px solid rgba(255, 107, 107, 0.3);
  border-radius: 50px;
  cursor: pointer;
  transition: all 0.3s ease;
}

.logout-btn:hover {
  background: rgba(255, 107, 107, 0.2);
  border-color: rgba(255, 107, 107, 0.5);
  transform: translateY(-1px);
}

.logout-btn svg {
  width: 18px;
  height: 18px;
  fill: #ff6b6b;
}

.center-content {
  position: relative;
  z-index: 10;
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  animation: fadeUp 0.8s ease-out;
}

@keyframes fadeUp {
  0% { opacity: 0; transform: translateY(30px); }
  100% { opacity: 1; transform: translateY(0); }
}

.welcome-text {
  font-size: clamp(24px, 5vw, 38px);
  font-weight: 600;
  color: #90EE90;
  text-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
  margin-bottom: 8px;
}

.welcome-sub {
  font-size: 15px;
  color: rgba(144, 238, 144, 0.6);
  margin-bottom: 40px;
}

.free-btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
  padding: 18px 60px;
  font-family: 'Poppins', sans-serif;
  font-size: 18px;
  font-weight: 600;
  color: #0d4a0d;
  background: linear-gradient(145deg, #7CFC7C, #5cdb5c);
  border: none;
  border-radius: 50px;
  cursor: pointer;
  text-decoration: none;
  transition: all 0.3s ease;
  box-shadow:
    0 8px 30px rgba(124, 252, 124, 0.3),
    0 2px 8px rgba(0, 0, 0, 0.2);
  letter-spacing: 1px;
  position: relative;
}

.free-btn:hover {
  transform: translateY(-3px);
  box-shadow:
    0 14px 40px rgba(124, 252, 124, 0.4),
    0 4px 12px rgba(0, 0, 0, 0.25);
  background: linear-gradient(145deg, #8aff8a, #6de66d);
}

.free-btn:active {
  transform: translateY(-1px);
}

.free-btn svg {
  width: 22px;
  height: 22px;
  fill: #0d4a0d;
}

.free-btn::after {
  content: '';
  position: absolute;
  inset: -4px;
  border-radius: 54px;
  border: 2px solid rgba(124, 252, 124, 0.3);
  animation: pulse 2.5s ease-in-out infinite;
}

@keyframes pulse {
  0%, 100% { opacity: 0; transform: scale(1); }
  50% { opacity: 1; transform: scale(1.04); }
}

@media (max-width: 480px) {
  .top-bar {
    padding: 15px 20px;
  }
  .user-name {
    display: none;
  }
  .free-btn {
    padding: 16px 45px;
    font-size: 16px;
  }
}
</style>
</head>
<body>

<div class="leaf"></div>
<div class="leaf"></div>
<div class="leaf"></div>
<div class="leaf"></div>
<div class="leaf"></div>
<div class="leaf"></div>

<div class="top-bar">
  <div class="user-info">
    <img class="user-avatar" id="userAvatar" src="" alt="User">
    <span class="user-name" id="userName">Loading...</span>
  </div>
  <button class="logout-btn" id="logoutBtn">
    <svg viewBox="0 0 24 24">
      <path d="M17 7l-1.41 1.41L18.17 11H8v2h10.17l-2.58 2.58L17 17l5-5zM4 5h8V3H4c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h8v-2H4V5z"/>
    </svg>
    Logout
  </button>
</div>

<div class="center-content">
  <div class="welcome-text" id="welcomeText">Welcome</div>
  <p class="welcome-sub">What would you like to do?</p>
  <a href="free.html" class="free-btn">
    <svg viewBox="0 0 24 24">
      <path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/>
    </svg>
    Free
  </a>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/11.7.1/firebase-app.js";
  import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/11.7.1/firebase-auth.js";

  // ⚠️ PASTE YOUR REAL FIREBASE CONFIG HERE (same as login.js)
  const firebaseConfig = {
    apiKey: "YOUR_API_KEY",
    authDomain: "YOUR_PROJECT.firebaseapp.com",
    projectId: "YOUR_PROJECT_ID",
    storageBucket: "YOUR_PROJECT.appspot.com",
    messagingSenderId: "YOUR_SENDER_ID",
    appId: "YOUR_APP_ID"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);

  const userAvatar = document.getElementById("userAvatar");
  const userName = document.getElementById("userName");
  const welcomeText = document.getElementById("welcomeText");
  const logoutBtn = document.getElementById("logoutBtn");

  onAuthStateChanged(auth, (user) => {
    if (user) {
      userAvatar.src = user.photoURL || "";
      userName.textContent = user.displayName || "User";
      welcomeText.textContent = "Welcome, " + (user.displayName ? user.displayName.split(" ")[0] : "User");
    } else {
      window.location.href = "login.html";
    }
  });

  logoutBtn.addEventListener("click", async () => {
    try {
      await signOut(auth);
      window.location.href = "index.html";
    } catch (error) {
      console.error("Logout error:", error);
    }
  });
</script>
</body>
</html>
