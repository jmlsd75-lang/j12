<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - Jamal Said Kazembe</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Poppins', sans-serif;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  background: linear-gradient(135deg, #0d4a0d 0%, #1a6b1a 25%, #0f5f0f 50%, #145214 75%, #0a3d0a 100%);
  overflow: hidden;
  position: relative;
}

body::before {
  content: '';
  position: absolute;
  top: -50%;
  left: -50%;
  width: 200%;
  height: 200%;
  background: 
    radial-gradient(ellipse at 20% 50%, rgba(34, 139, 34, 0.3) 0%, transparent 50%),
    radial-gradient(ellipse at 80% 20%, rgba(0, 100, 0, 0.2) 0%, transparent 50%),
    radial-gradient(ellipse at 50% 80%, rgba(34, 120, 34, 0.25) 0%, transparent 50%);
  animation: forestGlow 8s ease-in-out infinite alternate;
  z-index: 0;
}

@keyframes forestGlow {
  0% { transform: translate(0, 0) scale(1); }
  100% { transform: translate(-2%, -2%) scale(1.05); }
}

.leaf {
  position: absolute;
  width: 20px;
  height: 20px;
  background: linear-gradient(135deg, #228B22, #32CD32);
  border-radius: 0 50% 50% 50%;
  opacity: 0.3;
  animation: fall linear infinite;
  z-index: 0;
}

.leaf:nth-child(1) { left: 10%; animation-duration: 12s; animation-delay: 0s; width: 15px; height: 15px; }
.leaf:nth-child(2) { left: 25%; animation-duration: 15s; animation-delay: 2s; }
.leaf:nth-child(3) { left: 40%; animation-duration: 10s; animation-delay: 4s; width: 25px; height: 25px; }
.leaf:nth-child(4) { left: 55%; animation-duration: 14s; animation-delay: 1s; }
.leaf:nth-child(5) { left: 70%; animation-duration: 11s; animation-delay: 3s; width: 18px; height: 18px; }
.leaf:nth-child(6) { left: 85%; animation-duration: 13s; animation-delay: 5s; }

@keyframes fall {
  0% { transform: translateY(-100vh) rotate(0deg); opacity: 0; }
  10% { opacity: 0.3; }
  90% { opacity: 0.3; }
  100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
}

/* Back Button */
.back-btn {
  position: fixed;
  top: 25px;
  left: 25px;
  width: 50px;
  height: 50px;
  background: rgba(255, 255, 255, 0.1);
  border: 2px solid rgba(144, 238, 144, 0.3);
  border-radius: 50%;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.3s ease;
  z-index: 100;
}

.back-btn:hover {
  background: rgba(255, 255, 255, 0.2);
  border-color: rgba(144, 238, 144, 0.6);
  transform: scale(1.1);
}

.back-btn svg {
  width: 24px;
  height: 24px;
  fill: #90EE90;
}

/* Login Card */
.login-card {
  position: relative;
  z-index: 10;
  background: rgba(13, 74, 13, 0.6);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border: 1px solid rgba(144, 238, 144, 0.2);
  border-radius: 30px;
  padding: 50px 40px;
  width: 90%;
  max-width: 420px;
  text-align: center;
  box-shadow: 
    0 25px 50px rgba(0, 0, 0, 0.4),
    inset 0 1px 2px rgba(255, 255, 255, 0.05);
}

.login-card::before {
  content: '';
  position: absolute;
  top: -1px;
  left: 50%;
  transform: translateX(-50%);
  width: 60%;
  height: 2px;
  background: linear-gradient(90deg, transparent, #7CFC7C, transparent);
}

/* Avatar */
.avatar {
  width: 100px;
  height: 100px;
  margin: 0 auto 30px;
  background: linear-gradient(145deg, #2d8a2d, #1a6b1a);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
  border: 3px solid rgba(144, 238, 144, 0.3);
}

.avatar svg {
  width: 50px;
  height: 50px;
  fill: #90EE90;
}

.login-card h2 {
  font-size: 26px;
  font-weight: 600;
  color: #90EE90;
  margin-bottom: 10px;
  text-shadow: 0 2px 4px rgba(0, 0, 0, 0.3);
}

.login-card p {
  font-size: 14px;
  color: rgba(144, 238, 144, 0.7);
  margin-bottom: 35px;
}

/* Google Button */
.google-btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 15px;
  width: 100%;
  padding: 16px 30px;
  font-family: 'Poppins', sans-serif;
  font-size: 16px;
  font-weight: 500;
  color: #333;
  background: #fff;
  border: none;
  border-radius: 50px;
  cursor: pointer;
  transition: all 0.3s ease;
  box-shadow: 0 8px 25px rgba(0, 0, 0, 0.2);
}

.google-btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 12px 35px rgba(0, 0, 0, 0.3);
  background: #f8f8f8;
}

.google-btn:active {
  transform: translateY(0);
}

.google-btn:disabled {
  opacity: 0.7;
  cursor: not-allowed;
  transform: none;
}

.google-btn svg {
  width: 24px;
  height: 24px;
}

/* Divider */
.divider {
  display: flex;
  align-items: center;
  margin: 30px 0;
  gap: 15px;
}

.divider-line {
  flex: 1;
  height: 1px;
  background: rgba(144, 238, 144, 0.2);
}

.divider span {
  font-size: 12px;
  color: rgba(144, 238, 144, 0.5);
  text-transform: uppercase;
  letter-spacing: 2px;
}

/* Info Text */
.info-text {
  font-size: 13px;
  color: rgba(144, 238, 144, 0.6);
  line-height: 1.6;
}

/* Error Message */
.error-msg {
  display: none;
  margin-top: 20px;
  padding: 12px 20px;
  background: rgba(220, 53, 69, 0.2);
  border: 1px solid rgba(220, 53, 69, 0.4);
  border-radius: 10px;
  color: #ff6b6b;
  font-size: 14px;
}

.error-msg.show {
  display: block;
  animation: shake 0.5s ease;
}

@keyframes shake {
  0%, 100% { transform: translateX(0); }
  25% { transform: translateX(-10px); }
  75% { transform: translateX(10px); }
}

/* Loading State */
.loading-text {
  display: none;
  margin-top: 15px;
  font-size: 14px;
  color: rgba(144, 238, 144, 0.8);
}

.loading-text.show {
  display: block;
}

.loading-text::after {
  content: '';
  animation: dots 1.5s infinite;
}

@keyframes dots {
  0% { content: ''; }
  25% { content: '.'; }
  50% { content: '..'; }
  75% { content: '...'; }
}

@media (max-width: 480px) {
  .login-card {
    padding: 40px 25px;
    border-radius: 25px;
  }
  
  .login-card h2 {
    font-size: 22px;
  }
  
  .avatar {
    width: 80px;
    height: 80px;
  }
  
  .avatar svg {
    width: 40px;
    height: 40px;
  }
}
</style>
</head>
<body>

<!-- Floating Leaves -->
<div class="leaf"></div>
<div class="leaf"></div>
<div class="leaf"></div>
<div class="leaf"></div>
<div class="leaf"></div>
<div class="leaf"></div>

<!-- Back Button -->
<button class="back-btn" onclick="window.location.href='index.html'">
  <svg viewBox="0 0 24 24">
    <path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/>
  </svg>
</button>

<!-- Login Card -->
<div class="login-card">
  <div class="avatar">
    <svg viewBox="0 0 24 24">
      <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
    </svg>
  </div>
  
  <h2>Welcome Back</h2>
  <p>Sign in to continue to the system</p>
  
  <button class="google-btn" id="googleLoginBtn">
    <svg viewBox="0 0 24 24">
      <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/>
      <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
      <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
      <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
    </svg>
    Sign in with Google
  </button>
  
  <div class="divider">
    <div class="divider-line"></div>
    <span>Secure Login</span>
    <div class="divider-line"></div>
  </div>
  
  <p class="info-text">
    Your account is protected with Google's secure authentication system.
  </p>
  
  <div class="error-msg" id="errorMsg"></div>
  <div class="loading-text" id="loadingText">Signing you in</div>
</div>

<script src="login.js"></script>
</body>
</html>
