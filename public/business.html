<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Business Garden</title>
    <style>
        /* Import rounded, friendly fonts */
        @import url('https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&family=Poppins:wght@500;700&display=swap');

        :root {
            /* Color Palette */
            --sky-top: #fff0f5;
            --sky-bottom: #e3f2fd;
            --primary-green: #66bb6a;
            --dark-green: #2e7d32;
            --accent-pink: #f48fb1;
            --accent-purple: #ce93d8;
            --text-main: #263238;
            --glass-bg: rgba(255, 255, 255, 0.80); /* Slightly more opaque for readability */
            --glass-border: rgba(255, 255, 255, 0.9);
            --shadow-soft: 0 20px 40px rgba(0, 0, 0, 0.05);
            --shadow-hover: 0 25px 50px rgba(0, 0, 0, 0.1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Quicksand', sans-serif;
            background: linear-gradient(135deg, var(--sky-top) 0%, #fff9c4 50%, var(--sky-bottom) 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            /* Removed justify-center to allow natural flow */
            padding-top: 80px; /* Space for top nav */
            padding-bottom: 40px; /* Space at bottom */
            position: relative;
            color: var(--text-main);
            overflow-y: auto; /* Allow scroll if screen is very short */
        }

        /* --- The Whole Layer: 🌸 Background Pattern --- */
        .flower-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
            overflow: hidden;
            opacity: 0.20;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            transform: rotate(-10deg) scale(1.5);
        }

        .flower-bg-item {
            font-size: 4rem;
            margin: 1rem;
            animation: floatBackground 10s infinite ease-in-out;
            filter: blur(1px);
        }

        .flower-bg-item:nth-child(2n) { font-size: 5rem; animation-delay: 1s; }
        .flower-bg-item:nth-child(3n) { font-size: 3rem; animation-delay: 2s; }
        .flower-bg-item:nth-child(5n) { font-size: 6rem; animation-delay: 0.5s; }

        @keyframes floatBackground {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(5deg); }
        }

        /* --- UI Layout --- */

        /* Top Navigation (Back Button) */
        .top-nav {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            padding: 1.5rem;
            z-index: 100;
            display: flex;
            align-items: center;
            background: rgba(255,255,255,0.0); /* Transparent background */
        }

        .back-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
            color: var(--dark-green);
            background: rgba(255, 255, 255, 0.9);
            padding: 10px 20px;
            border-radius: 30px 5px 30px 30px;
            font-weight: 700;
            font-size: 0.9rem;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            transition: all 0.3s ease;
            backdrop-filter: blur(5px);
        }

        .back-btn:hover {
            transform: translateX(-5px) scale(1.02);
            background: #fff;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            color: var(--primary-green);
        }

        .back-btn svg {
            width: 20px;
            height: 20px;
            fill: currentColor;
        }

        /* Main Container */
        .main-container {
            z-index: 10;
            width: 90%;
            max-width: 500px; /* Wider to accommodate text + buttons side-by-side */
            background: var(--glass-bg);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 2px solid var(--glass-border);
            border-radius: 40px;
            padding: 2rem 2rem 2.5rem 2rem; /* Balanced padding */
            box-shadow: var(--shadow-soft);
            text-align: center;
            position: relative;
            animation: popIn 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
            display: flex;
            flex-direction: column;
            gap: 1.8rem; /* Generous gap between items */
        }

        @keyframes popIn {
            0% { opacity: 0; transform: scale(0.9) translateY(20px); }
            100% { opacity: 1; transform: scale(1) translateY(0); }
        }

        /* Central Big Emoji */
        .center-icon {
            font-size: 3.5rem; /* Slightly smaller to save space for 3 items */
            margin-bottom: 0.5rem;
            display: block;
            filter: drop-shadow(0 10px 15px rgba(0,0,0,0.1));
            animation: heartbeat 3s infinite ease-in-out;
            cursor: default;
        }

        @keyframes heartbeat {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        /* Layout Wrapper for Rows */
        .action-row {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        /* New Message Styling */
        .instruction-text {
            font-size: 0.9rem;
            color: #455a64;
            font-weight: 600;
            line-height: 1.4;
            background: rgba(255, 255, 255, 0.5);
            padding: 8px 14px;
            border-radius: 15px;
            width: 100%;
            /* Center text alignment for visual consistency */
            text-align: center;
        }

        /* Button Base Styles */
        .action-btn {
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem 1.5rem;
            border-radius: 20px;
            font-weight: 700;
            font-size: 1rem;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            position: relative;
            overflow: hidden;
            border: none;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            width: 100%; /* Full width buttons */
        }

        .action-btn svg {
            width: 20px;
            height: 20px;
            margin-right: 10px;
            fill: currentColor;
            transition: transform 0.3s ease;
        }

        .action-btn:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }
        
        .action-btn:hover svg {
            transform: scale(1.1) rotate(-10deg);
        }

        /* Button 1: Add Transaction (Green Theme) */
        .btn-add {
            background: linear-gradient(135deg, #a5d6a7 0%, #66bb6a 100%);
            color: #1b5e20;
        }

        /* Button 2: View Files (Purple Theme) */
        .btn-view {
            background: linear-gradient(135deg, #e1bee7 0%, #ba68c8 100%);
            color: #4a148c;
        }

        /* Button 3: Stock Management (Orange Theme) */
        .btn-stock {
            background: linear-gradient(135deg, #ffe082 0%, #ffb74d 100%);
            color: #e65100;
        }

        /* Mobile Adjustments for very small screens */
        @media (max-width: 480px) {
            .instruction-text { font-size: 0.8rem; padding: 6px 10px; }
            .action-btn { font-size: 0.95rem; padding: 0.9rem; }
            .center-icon { font-size: 3rem; }
            .main-container { padding: 1.5rem 1rem; width: 95%; }
        }

        /* Desktop Optimization */
        @media (min-width: 768px) {
            /* We can try side-by-side layout for the 3rd item if screen allows */
            .stock-row {
                flex-direction: row;
                align-items: center;
                justify-content: space-between;
                text-align: left;
                background: rgba(255,255,255,0.4);
                padding: 10px;
                border-radius: 20px;
            }
            .stock-row .instruction-text {
                background: transparent;
                padding: 0;
                text-align: left;
                width: auto;
                flex: 1;
                margin-right: 20px;
            }
            .stock-row .action-btn {
                width: auto;
                flex-shrink: 0;
            }
        }
    </style>
</head>
<body>

    <!-- Background Layer: 🌸 Pattern -->
    <div class="flower-layer">
        <span class="flower-bg-item">🌸</span>
        <span class="flower-bg-item">🌸</span>
        <span class="flower-bg-item">🌸</span>
        <span class="flower-bg-item">🌸</span>
        <span class="flower-bg-item">🌸</span>
        <span class="flower-bg-item">🌸</span>
        <span class="flower-bg-item">🌸</span>
        <span class="flower-bg-item">🌸</span>
        <span class="flower-bg-item">🌸</span>
        <span class="flower-bg-item">🌸</span>
    </div>

    <!-- Top Left Back Button -->
    <nav class="top-nav">
        <a href="menu.html" class="back-btn" aria-label="Go back to menu">
            <svg viewBox="0 0 24 24">
                <path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/>
            </svg>
            Back
        </a>
    </nav>

    <!-- Main Interface -->
    <main class="main-container">
        
        <!-- Central Visual Anchor -->
        <div class="center-icon">🌸</div>

        <!-- Category 1: Add New Transaction -->
        <div class="action-row">
            <p class="instruction-text">Click ‘Add New Transaction’ to start registering a transaction.</p>
            <a href="detail.html" class="action-btn btn-add">
                <svg viewBox="0 0 24 24">
                    <path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/>
                </svg>
                Add New Transaction
            </a>
        </div>

        <!-- Category 2: View Files -->
        <div class="action-row">
            <p class="instruction-text">Click ‘View File’ to start viewing your business progress.</p>
            <a href="business file.html" class="action-btn btn-view">
                <svg viewBox="0 0 24 24">
                    <path d="M20 6h-8l-2-2H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2zm0 12H4V8h16v10z"/>
                </svg>
                View File
            </a>
        </div>

        <!-- Category 3: Stock Management -->
        <div class="action-row stock-row">
            <p class="instruction-text">Click ‘Stock Management’ to view the stock progress in your business.</p>
            <a href="stock.html" class="action-btn btn-stock">
                <svg viewBox="0 0 24 24">
                    <path d="M4 6H2v14c0 1.1.9 2 2 2h14v-2H4V6zm16-4H8c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-1 9h-4v4h-2v-4H9V9h4V5h2v4h4v2z"/>
                </svg>
                Stock Management
            </a>
        </div>

    </main>

</body>
</html>
