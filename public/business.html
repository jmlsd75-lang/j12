<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Business Garden</title>
    <style>
        /* Import a rounded, friendly font */
        @import url('https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700&display=swap');

        :root {
            --sky-top: #e0f7fa;
            --sky-bottom: #f1f8e9;
            --petal-pink: #ffccdd;
            --petal-purple: #e1bee7;
            --petal-yellow: #fff9c4;
            --leaf-green: #81c784;
            --stem-green: #4caf50;
            --text-color: #37474f;
            --shadow-soft: 0 10px 25px rgba(0,0,0,0.1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Quicksand', sans-serif;
            background: linear-gradient(to bottom, var(--sky-top), var(--sky-bottom));
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden; /* Contains the background flowers */
            position: relative;
            color: var(--text-color);
        }

        /* --- Pure CSS Background Flowers --- */
        .garden-bg {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 30%;
            z-index: 0;
            pointer-events: none;
        }

        .flower-group {
            position: absolute;
            bottom: -20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .flower-group:nth-child(1) { left: 10%; transform: scale(0.8); animation: sway 4s infinite ease-in-out; }
        .flower-group:nth-child(2) { left: 30%; transform: scale(1.2); animation: sway 5s infinite ease-in-out 1s; }
        .flower-group:nth-child(3) { right: 20%; transform: scale(0.9); animation: sway 4.5s infinite ease-in-out 0.5s; }
        .flower-group:nth-child(4) { right: 5%; transform: scale(1.1); animation: sway 5.5s infinite ease-in-out 1.5s; }

        .stem {
            width: 8px;
            height: 150px;
            background: var(--stem-green);
            border-radius: 4px;
        }

        .leaf {
            width: 40px;
            height: 20px;
            background: var(--leaf-green);
            border-radius: 0 20px 0 20px;
            position: absolute;
            top: 60px;
        }
        .leaf.left { left: -25px; transform: rotate(-10deg); border-radius: 20px 0 20px 0; }
        .leaf.right { right: -25px; transform: rotate(10deg); }

        .bloom {
            width: 80px;
            height: 80px;
            position: relative;
            margin-bottom: -10px;
        }

        .petal {
            position: absolute;
            width: 30px;
            height: 60px;
            background: var(--petal-pink);
            border-radius: 50%;
            top: 10px;
            left: 25px;
            box-shadow: inset -2px -2px 5px rgba(0,0,0,0.05);
        }

        .petal:nth-child(1) { transform: rotate(0deg) translateY(-20px); background: #ffcdd2; }
        .petal:nth-child(2) { transform: rotate(72deg) translateY(-20px); background: #f8bbd0; }
        .petal:nth-child(3) { transform: rotate(144deg) translateY(-20px); background: #e1bee7; }
        .petal:nth-child(4) { transform: rotate(216deg) translateY(-20px); background: #d1c4e9; }
        .petal:nth-child(5) { transform: rotate(288deg) translateY(-20px); background: #ffe0b2; }

        .center {
            position: absolute;
            width: 25px;
            height: 25px;
            background: #fff176;
            border-radius: 50%;
            top: 27.5px;
            left: 27.5px;
            z-index: 2;
        }

        @keyframes sway {
            0%, 100% { transform: rotate(-2deg) scale(var(--scale, 1)); }
            50% { transform: rotate(2deg) scale(var(--scale, 1)); }
        }

        /* --- Main Interface --- */
        .main-container {
            z-index: 10;
            text-align: center;
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(10px);
            padding: 3rem 2rem;
            border-radius: 40px;
            border: 2px solid rgba(255, 255, 255, 0.8);
            box-shadow: var(--shadow-soft);
            max-width: 500px;
            width: 90%;
            position: relative;
        }

        .main-container::before {
            /* Decorative top element */
            content: "🌸";
            font-size: 3rem;
            display: block;
            margin-bottom: 10px;
            animation: float 3s ease-in-out infinite;
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 2rem;
            color: var(--stem-green);
            text-shadow: 1px 1px 0px white;
        }

        .menu {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        /* --- Flower Buttons (Petals) --- */
        .flower-btn {
            text-decoration: none;
            color: var(--text-color);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            font-size: 1.1rem;
            font-weight: 700;
            border-radius: 100px 100px 20px 100px; /* Organic petal shape */
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            border: 2px solid transparent;
        }

        .flower-btn span {
            position: relative;
            z-index: 2;
        }

        /* Specific styling for Add Transaction */
        .btn-add {
            background: linear-gradient(135deg, #fff9c4 0%, #fff176 100%);
            color: #f57f17;
        }
        .btn-add:hover {
            transform: scale(1.05) rotate(-2deg);
            box-shadow: 0 10px 20px rgba(255, 235, 59, 0.4);
            border-color: #fff;
        }

        /* Specific styling for View Transactions */
        .btn-view {
            background: linear-gradient(135deg, #e1bee7 0%, #ce93d8 100%);
            color: #6a1b9a;
            border-radius: 100px 20px 100px 100px; /* Mirror shape */
            margin-left: 1rem; /* Visual offset */
        }
        .btn-view:hover {
            transform: scale(1.05) rotate(2deg);
            box-shadow: 0 10px 20px rgba(206, 147, 216, 0.4);
            border-color: #fff;
        }

        /* Specific styling for Exit */
        .btn-exit {
            background: linear-gradient(135deg, #ffcdd2 0%, #ef9a9a 100%);
            color: #c62828;
            border-radius: 20px 100px 100px 100px; /* Different shape */
            margin-right: 1rem; /* Visual offset */
            align-self: flex-end; /* Align right */
            width: 80%;
        }
        .btn-exit:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 20px rgba(239, 154, 154, 0.4);
            border-color: #fff;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        /* Responsive adjustments */
        @media (max-width: 600px) {
            .flower-btn {
                margin-left: 0 !important;
                margin-right: 0 !important;
                width: 100%;
                border-radius: 50px; /* Simplify on mobile */
            }
            .btn-exit {
                align-self: center;
                width: 100%;
            }
            h1 {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>

    <!-- Background CSS Flowers -->
    <div class="garden-bg">
        <div class="flower-group" style="--scale: 0.8">
            <div class="stem"></div>
            <div class="leaf left"></div>
            <div class="leaf right"></div>
            <div class="bloom">
                <div class="petal"></div><div class="petal"></div><div class="petal"></div><div class="petal"></div><div class="petal"></div>
                <div class="center"></div>
            </div>
        </div>
        <div class="flower-group" style="--scale: 1.1">
            <div class="stem" style="height: 200px"></div>
            <div class="leaf left" style="top: 80px"></div>
            <div class="leaf right" style="top: 100px"></div>
            <div class="bloom">
                <div class="petal"></div><div class="petal"></div><div class="petal"></div><div class="petal"></div><div class="petal"></div>
                <div class="center"></div>
            </div>
        </div>
        <div class="flower-group" style="--scale: 0.9">
            <div class="stem"></div>
            <div class="leaf left"></div>
            <div class="bloom">
                <div class="petal"></div><div class="petal"></div><div class="petal"></div><div class="petal"></div><div class="petal"></div>
                <div class="center"></div>
            </div>
        </div>
        <div class="flower-group" style="--scale: 0.7">
            <div class="stem" style="height: 100px"></div>
            <div class="leaf right"></div>
            <div class="bloom">
                <div class="petal"></div><div class="petal"></div><div class="petal"></div><div class="petal"></div><div class="petal"></div>
                <div class="center"></div>
            </div>
        </div>
    </div>

            <!-- Link 1 -->
            <a href="add-transaction.html" class="flower-btn btn-add">
                <span>Add New Transaction</span>
            </a>
            
            <!-- Link 2 -->
            <a href="business file.html" class="flower-btn btn-view">
                <span>View Transactions</span>
            </a>
            
            <!-- Link 3 -->
            <a href="menu.html" class="flower-btn btn-exit">
                <span>Exit</span>
            </a>
        </nav>
    </main>

</body>
</html>
