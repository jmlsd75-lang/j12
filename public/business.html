<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Business Garden</title>
    <style>
        /* Import rounded, friendly fonts */
        @import url('https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&family=Poppins:wght@500;700&display=swap');

        :root {
            /* Color Palette */
            --sky-top: #fff0f5;
            --sky-bottom: #e3f2fd;
            --primary-green: #66bb6a;
            --dark-green: #2e7d32;
            --accent-pink: #f48fb1;
            --accent-purple: #ce93d8;
            --accent-orange: #ffcc80;
            --text-main: #263238;
            --glass-bg: rgba(255, 255, 255, 0.75);
            --glass-border: rgba(255, 255, 255, 0.9);
            --shadow-soft: 0 20px 40px rgba(0, 0, 0, 0.05);
            --shadow-hover: 0 25px 50px rgba(0, 0, 0, 0.1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Quicksand', sans-serif;
            background: linear-gradient(135deg, var(--sky-top) 0%, #fff9c4 50%, var(--sky-bottom) 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
            color: var(--text-main);
        }

        /* --- Background Pattern --- */
        .flower-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
            overflow: hidden;
            opacity: 0.25;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            transform: rotate(-10deg) scale(1.5);
        }

        .flower-bg-item {
            font-size: 4rem;
            margin: 1rem;
            animation: floatBackground 10s infinite ease-in-out;
            filter: blur(1px);
        }

        .flower-bg-item:nth-child(2n) { font-size: 5rem; animation-delay: 1s; }
        .flower-bg-item:nth-child(3n) { font-size: 3rem; animation-delay: 2s; }
        .flower-bg-item:nth-child(5n) { font-size: 6rem; animation-delay: 0.5s; }

        @keyframes floatBackground {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(5deg); }
        }

        /* --- UI Layout --- */

        .top-nav {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            padding: 1.5rem;
            z-index: 100;
            display: flex;
            align-items: center;
        }

        .back-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
            color: var(--dark-green);
            background: rgba(255, 255, 255, 0.9);
            padding: 12px 24px 12px 18px;
            border-radius: 30px 5px 30px 30px;
            font-weight: 700;
            font-size: 0.95rem;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            transition: all 0.3s ease;
            backdrop-filter: blur(5px);
        }

        .back-btn:hover {
            transform: translateX(-5px) scale(1.02);
            background: #fff;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            color: var(--primary-green);
        }

        .back-btn svg {
            width: 20px;
            height: 20px;
            fill: currentColor;
        }

        .main-container {
            z-index: 10;
            width: 85%;
            max-width: 400px;
            background: var(--glass-bg);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 2px solid var(--glass-border);
            border-radius: 50px;
            padding: 2.5rem 2rem;
            box-shadow: var(--shadow-soft);
            text-align: center;
            position: relative;
            animation: popIn 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        @keyframes popIn {
            0% { opacity: 0; transform: scale(0.8) translateY(20px); }
            100% { opacity: 1; transform: scale(1) translateY(0); }
        }

        .center-icon {
            font-size: 5rem;
            margin-bottom: 2.5rem;
            display: block;
            filter: drop-shadow(0 10px 15px rgba(0,0,0,0.1));
            animation: heartbeat 3s infinite ease-in-out;
            cursor: default;
        }

        @keyframes heartbeat {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        .action-grid {
            width: 100%;
            display: grid;
            gap: 1rem;
        }

        .action-btn {
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
            border-radius: 20px;
            font-weight: 700;
            font-size: 1rem;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            position: relative;
            overflow: hidden;
            border: none;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }

        .action-btn svg {
            width: 20px;
            height: 20px;
            margin-right: 10px;
            fill: currentColor;
            transition: transform 0.3s ease;
        }

        .action-btn:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }
        
        .action-btn:hover svg {
            transform: scale(1.1) rotate(-10deg);
        }

        .btn-add {
            background: linear-gradient(135deg, #a5d6a7 0%, #66bb6a 100%);
            color: #1b5e20;
            border-radius: 25px;
        }

        .btn-view {
            background: linear-gradient(135deg, #e1bee7 0%, #ba68c8 100%);
            color: #4a148c;
            border-radius: 25px;
        }

        .btn-stock {
            background: linear-gradient(135deg, #ffe0b2 0%, #ffb74d 100%);
            color: #e65100;
            border-radius: 25px;
        }

        @media (max-width: 600px) {
            .center-icon { font-size: 4.5rem; margin-bottom: 2rem; }
            .main-container { padding: 2rem 1.5rem; }
        }
    </style>
</head>
<body>

    <!-- Background Layer -->
    <div class="flower-layer">
        <span class="flower-bg-item">🌸</span>
        <span class="flower-bg-item">🌸</span>
        <span class="flower-bg-item">🌸</span>
        <span class="flower-bg-item">🌸</span>
        <span class="flower-bg-item">🌸</span>
        <span class="flower-bg-item">🌸</span>
        <span class="flower-bg-item">🌸</span>
        <span class="flower-bg-item">🌸</span>
        <span class="flower-bg-item">🌸</span>
        <span class="flower-bg-item">🌸</span>
        <span class="flower-bg-item">🌸</span>
        <span class="flower-bg-item">🌸</span>
    </div>

    <!-- Top Left Back Button -->
    <nav class="top-nav">
        <a href="menu.html" class="back-btn" aria-label="Go back to menu">
            <svg viewBox="0 0 24 24">
                <path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/>
            </svg>
            Back
        </a>
    </nav>

    <!-- Main Interface -->
    <main class="main-container">
        
        <!-- Central Visual Anchor -->
        <div class="center-icon">🌸</div>

        <div class="action-grid">
            
            <!-- Script for Add New Transaction: click add new transaction to start save transactions info -->
            <script>
                const btnAdd = document.getElementById('btnAdd');
                btnAdd.addEventListener('click', () => {
                    // Initialize storage to save transactions info
                    let transactions = JSON.parse(localStorage.getItem('businessTransactions')) || [];
                    localStorage.setItem('businessTransactions', JSON.stringify(transactions));
                    
                    window.location.href = 'detail.html';
                });
            </script>

            <!-- Add New Transaction Button -->
            <button id="btnAdd" class="action-btn btn-add">
                <svg viewBox="0 0 24 24">
                    <path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/>
                </svg>
                Add New Transaction
            </button>

            <!-- Script for View Files: click the file to start visit your business progress -->
            <script>
                const btnView = document.getElementById('btnView');
                btnView.addEventListener('click', () => {
                    // Start visit your business progress
                    window.location.href = 'business file.html';
                });
            </script>
            
            <!-- View the Files Button -->
            <button id="btnView" class="action-btn btn-view">
                <svg viewBox="0 0 24 24">
                    <path d="M20 6h-8l-2-2H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2zm0 12H4V8h16v10z"/>
                </svg>
                View the Files
            </button>

            <!-- Script for Stock Management: click stock management to get know stock progress -->
            <script>
                const btnStock = document.getElementById('btnStock');
                btnStock.addEventListener('click', () => {
                    // Get know stock progress
                    let stockData = JSON.parse(localStorage.getItem('stockData')) || [];
                    localStorage.setItem('stockData', JSON.stringify(stockData));

                    window.location.href = 'stock manageement.html';
                });
            </script>

            <!-- Stock Management Button -->
            <button id="btnStock" class="action-btn btn-stock">
                <svg viewBox="0 0 24 24">
                    <path d="M20 2H4c-1 0-2 .9-2 2v3.01c0 .72.43 1.34 1 1.69V20c0 1.1 1.1 2 2 2h14c.9 0 2-.9 2-2V8.7c.57-.35 1-.97 1-1.69V4c0-1.1-1-2-2-2zm-1 18H5V9h14v11zm1-13H4V4h16v3zM9 12h6v2H9z"/>
                </svg>
                Stock Management
            </button>

        </div>
    </main>

</body>
</html>
