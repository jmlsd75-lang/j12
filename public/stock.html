<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stock Management Menu</title>

  <style>
    :root {
      --primary-color: #4a90e2;
      --primary-hover: #357abd;
      --secondary-color: #6c757d;
      --secondary-hover: #5a6268;
      --bg-color: #f0f2f5;
      --card-bg: #ffffff;
      --text-color: #333333;
      --border-radius: 12px;
      --transition: all 0.3s ease;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: var(--bg-color);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      color: var(--text-color);
      position: relative;
    }

    /* Top Left Back Button */
    .back-btn-container {
      position: absolute;
      top: 20px;
      left: 20px;
      z-index: 10;
    }

    .back-btn {
      padding: 10px 20px;
      font-size: 16px;
      font-weight: 500;
      cursor: pointer;
      border: none;
      border-radius: 8px;
      background: var(--secondary-color);
      color: white;
      transition: var(--transition);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .back-btn:hover {
      background: var(--secondary-hover);
      transform: translateY(-2px);
    }

    .container {
      text-align: center;
      background: var(--card-bg);
      padding: 50px 40px; /* Increased padding for better spacing without the dropdown */
      border-radius: var(--border-radius);
      box-shadow: 0 10px 25px rgba(0,0,0,0.08);
      max-width: 500px;
      width: 90%;
      animation: fadeIn 0.5s ease-in-out;
    }

    h2 {
      margin-top: 0;
      margin-bottom: 40px; /* Space between title and buttons */
      color: var(--text-color);
      font-weight: 600;
    }

    /* Action Buttons Grid */
    .action-buttons {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }

    .action-btn {
      padding: 18px 20px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      border-radius: 8px;
      background: var(--primary-color);
      color: white;
      transition: var(--transition);
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 5px;
    }

    .action-btn:hover {
      background: var(--primary-hover);
      transform: translateY(-3px);
      box-shadow: 0 8px 15px rgba(0,0,0,0.15);
    }

    .action-btn i {
      font-size: 24px;
      margin-bottom: 5px;
      font-style: normal;
    }

    /* Toast Notification */
    #toast {
      visibility: hidden;
      min-width: 250px;
      background-color: #333;
      color: #fff;
      text-align: center;
      border-radius: 8px;
      padding: 16px;
      position: fixed;
      z-index: 100;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      opacity: 0;
      transition: opacity 0.5s, bottom 0.5s;
    }

    #toast.show {
      visibility: visible;
      opacity: 1;
      bottom: 50px;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Mobile Responsiveness */
    @media (max-width: 480px) {
      .action-buttons {
        grid-template-columns: 1fr;
      }
      .back-btn-container {
        top: 10px;
        left: 10px;
      }
    }
  </style>
</head>

<body>

  <!-- Top Left Back Button -->
  <div class="back-btn-container">
    <button class="back-btn" onclick="location.href='business.html'">
      <span>&#8592;</span> Back
    </button>
  </div>

  <div class="container">
    <h2>Stock Management</h2>

    <!-- Process Selection Buttons -->
    <div class="action-buttons">
      <!-- Calling chooseProcess script with parameters -->
      <button class="action-btn" onclick="chooseProcess('Register New Stock', 'register new stock.html')">
        <i>+</i>
        <span>Register New</span>
      </button>
      
      <button class="action-btn" onclick="chooseProcess('Stock Change', 'stock change.html')">
        <i>&#8635;</i>
        <span>Stock Change</span>
      </button>
    </div>
  </div>

  <!-- Toast Notification Element -->
  <div id="toast"></div>

  <script>
    /**
     * Script to handle the process choice.
     * It logs the selection, shows feedback, and navigates.
     */
    function chooseProcess(processName, url) {
      
      // 1. Log the choice (Simulation of "Choosing" a process)
      console.log("User selected process: " + processName);
      
      // 2. Show feedback to the user
      showToast("Opening " + processName + "...");

      // 3. Simulate a slight delay for UX before navigation
      setTimeout(() => {
        location.href = url;
      }, 800);
    }

    // Helper function to show toast notifications
    function showToast(message) {
      const toast = document.getElementById("toast");
      toast.textContent = message;
      toast.className = "show";
      setTimeout(function(){ 
        toast.className = toast.className.replace("show", ""); 
      }, 3000);
    }
  </script>

</body>
</html>
