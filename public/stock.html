<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stock Management Menu</title>

  <style>
    :root {
      --primary-color: #4a90e2;
      --primary-hover: #357abd;
      --secondary-color: #6c757d;
      --secondary-hover: #5a6268;
      --bg-color: #f0f2f5;
      --card-bg: #ffffff;
      --text-color: #333333;
      --border-radius: 12px;
      --transition: all 0.3s ease;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: var(--bg-color);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      color: var(--text-color);
      position: relative;
    }

    /* Back Button */
    .back-btn-container {
      position: absolute;
      top: 20px;
      left: 20px;
      z-index: 10;
    }

    .back-btn {
      padding: 10px 20px;
      font-size: 16px;
      font-weight: 500;
      cursor: pointer;
      border: none;
      border-radius: 8px;
      background: var(--secondary-color);
      color: white;
      transition: var(--transition);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .back-btn:hover {
      background: var(--secondary-hover);
      transform: translateY(-2px);
    }

    .container {
      text-align: center;
      background: var(--card-bg);
      padding: 50px 40px;
      border-radius: var(--border-radius);
      box-shadow: 0 10px 25px rgba(0,0,0,0.08);
      max-width: 500px;
      width: 90%;
      animation: fadeIn 0.5s ease-in-out;
    }

    h2 {
      margin-top: 0;
      margin-bottom: 40px;
      font-weight: 600;
    }

    .action-buttons {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }

    .action-btn {
      padding: 18px 20px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      border-radius: 8px;
      background: var(--primary-color);
      color: white;
      transition: var(--transition);
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 5px;
    }

    .action-btn:hover {
      background: var(--primary-hover);
      transform: translateY(-3px);
      box-shadow: 0 8px 15px rgba(0,0,0,0.15);
    }

    .action-btn i {
      font-size: 24px;
    }

    /* Toast */
    #toast {
      visibility: hidden;
      min-width: 250px;
      background-color: #333;
      color: #fff;
      text-align: center;
      border-radius: 8px;
      padding: 16px;
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      opacity: 0;
      transition: 0.5s;
      z-index: 100;
    }

    #toast.show {
      visibility: visible;
      opacity: 1;
      bottom: 50px;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 480px) {
      .action-buttons {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>

  <!-- Back Button -->
  <div class="back-btn-container">
    <button class="back-btn" onclick="location.href='business.html'">
      <span>&#8592;</span> Back
    </button>
  </div>

  <div class="container">
    <h2>Stock Management</h2>

    <div class="action-buttons">

      <button class="action-btn" onclick="chooseProcess('Register New Stock', 'register new stock.html')">
        <i>+</i>
        <span>Register New</span>
      </button>

      <button class="action-btn" onclick="chooseProcess('Stock Change', 'stock change.html')">
        <i>&#8635;</i>
        <span>Stock Change</span>
      </button>

      <!-- NEW BUTTON -->
      <button class="action-btn" onclick="chooseProcess('Stock Present', 'stock progress.html')">
        <i>📊</i>
        <span>Stock Present</span>
      </button>

    </div>
  </div>

  <!-- Toast -->
  <div id="toast"></div>

  <script>
    function chooseProcess(processName, url) {
      console.log("Selected: " + processName);
      showToast("Opening " + processName + "...");

      setTimeout(() => {
        location.href = url;
      }, 800);
    }

    function showToast(message) {
      const toast = document.getElementById("toast");
      toast.textContent = message;
      toast.className = "show";

      setTimeout(() => {
        toast.className = toast.className.replace("show", "");
      }, 3000);
    }
  </script>

</body>
</html>
