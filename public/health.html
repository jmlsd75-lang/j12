<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Health Portal</title>
    <style>
        /* --- CSS Variables --- */
        :root {
            --primary-color: #00b894;       /* Medical Green */
            --primary-hover: #019376;       /* Darker Green */
            --text-dark: #2d3436;
            --bg-color: #f0fdfa;            /* Light Mint Background */
            --white: #ffffff;
            --shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }

        /* --- Reset & Base Styles --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            /* Subtle pattern for the background */
            background-image: radial-gradient(#d1fae5 1px, transparent 1px);
            background-size: 20px 20px;
            color: var(--text-dark);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* --- Header (Optional Branding) --- */
        header {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            padding: 20px 40px;
            z-index: 10;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--primary-color);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* --- Main Content (Centered) --- */
        main {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
        }

        /* --- Registration Button Styling --- */
        .btn-register {
            display: inline-block;
            background-color: var(--primary-color);
            color: var(--white);
            text-decoration: none;
            font-size: 1.25rem; /* Slightly larger since it stands alone */
            font-weight: 600;
            padding: 18px 48px; /* Larger padding for prominence */
            border-radius: 50px;
            transition: all 0.3s ease;
            box-shadow: 0 8px 20px rgba(0, 184, 148, 0.4);
            border: 2px solid transparent;
        }

        .btn-register:hover {
            background-color: var(--primary-hover);
            transform: translateY(-3px);
            box-shadow: 0 12px 25px rgba(0, 184, 148, 0.5);
        }

        .btn-register:active {
            transform: translateY(1px);
        }

        /* --- Footer --- */
        footer {
            padding: 20px;
            text-align: center;
            font-size: 0.85rem;
            color: #636e72;
        }
    </style>
</head>
<body>

    <!-- Top Navigation (Brand Logo) -->
    <header>
        <a href="#" class="logo">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>
            HealthPlus
        </a>
    </header>

    <!-- Main Content: Only the Button -->
    <main>
        <!-- The Registration Button -->
        <a href="registration.html" class="btn-register">
            Register Now
        </a>
    </main>

    <!-- Footer -->
    <footer>
        &copy; 2023 HealthPlus Portal. All rights reserved.
    </footer>

</body>
</html>
