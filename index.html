<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JAMAL SAID KAZEMBE MULTISYSTEM MANAGEMENT</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Inter', sans-serif; margin: 0; padding: 0; box-sizing: border-box; }
        ::selection { background: #F97316; color: #FFFFFF; }

        body {
            min-height: 100vh;
            overflow: hidden;
            background: linear-gradient(
                to bottom,
                #0B1026 0%,
                #1A1040 8%,
                #3B1854 16%,
                #6B2737 24%,
                #A03520 32%,
                #D4551E 40%,
                #F28C28 50%,
                #F5B041 56%,
                #D4A056 62%,
                #8B7355 70%,
                #5C4033 80%,
                #3E2723 90%,
                #2C1810 100%
            );
        }

        .stars {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 40%;
            pointer-events: none;
            z-index: 0;
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: twinkle 3s ease-in-out infinite alternate;
        }

        @keyframes twinkle {
            0% { opacity: 0.2; }
            100% { opacity: 1; }
        }

        .mountain-layer {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            z-index: 1;
        }

        .snow-glow {
            position: fixed;
            top: 22%;
            left: 50%;
            transform: translateX(-50%);
            width: 300px;
            height: 100px;
            background: radial-gradient(ellipse, rgba(255,220,180,0.3) 0%, transparent 70%);
            z-index: 2;
            pointer-events: none;
        }

        .sun-glow {
            position: fixed;
            top: 38%;
            left: 50%;
            transform: translateX(-50%);
            width: 500px;
            height: 200px;
            background: radial-gradient(ellipse, rgba(242,140,40,0.4) 0%, rgba(242,140,40,0.1) 40%, transparent 70%);
            z-index: 2;
            pointer-events: none;
        }

        .content-layer {
            position: relative;
            z-index: 10;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .system-title {
            text-align: center;
            margin-bottom: 3rem;
        }

        .system-title h1 {
            color: #FFFFFF;
            font-size: 2rem;
            font-weight: 600;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            text-shadow: 0 2px 20px rgba(0,0,0,0.6), 0 0 60px rgba(242,140,40,0.2);
            line-height: 1.4;
        }

        .system-title .sub {
            color: #F5B041;
            font-size: 1rem;
            font-weight: 400;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            margin-top: 0.5rem;
            text-shadow: 0 2px 15px rgba(0,0,0,0.5);
        }

        .login-btn {
            background: linear-gradient(135deg, rgba(255,255,255,0.15) 0%, rgba(255,255,255,0.05) 100%);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.25);
            color: #FFFFFF;
            font-size: 1.1rem;
            font-weight: 500;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            padding: 1.1rem 3.5rem;
            border-radius: 60px;
            cursor: pointer;
            transition: all 0.4s ease;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.1);
        }

        .login-btn:hover {
            background: linear-gradient(135deg, #F28C28 0%, #D4551E 100%);
            border-color: #F5B041;
            box-shadow: 0 8px 40px rgba(242,140,40,0.4), 0 0 80px rgba(242,140,40,0.15);
            transform: translateY(-2px);
        }

        .login-btn:active {
            transform: translateY(0);
        }

        .footer-text {
            position: fixed;
            bottom: 1.5rem;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            color: rgba(255,255,255,0.3);
            font-size: 0.7rem;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            white-space: nowrap;
        }

        .acacia-silhouette {
            position: fixed;
            bottom: 0;
            z-index: 3;
            pointer-events: none;
        }

        .mist {
            position: fixed;
            top: 55%;
            left: 0;
            width: 200%;
            height: 120px;
            background: linear-gradient(90deg,
                transparent 0%,
                rgba(139,115,85,0.15) 20%,
                rgba(139,115,85,0.25) 40%,
                rgba(139,115,85,0.1) 60%,
                rgba(139,115,85,0.2) 80%,
                transparent 100%
            );
            animation: mistDrift 25s linear infinite;
            z-index: 4;
            pointer-events: none;
        }

        @keyframes mistDrift {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }

        @media (min-width: 768px) {
            .system-title h1 { font-size: 2.8rem; }
            .system-title .sub { font-size: 1.15rem; }
            .login-btn { padding: 1.25rem 4.5rem; font-size: 1.2rem; }
        }

        @media (min-width: 1024px) {
            .system-title h1 { font-size: 3.2rem; }
        }
    </style>
</head>
<body>

    <!-- Stars -->
    <div class="stars" id="stars"></div>

    <!-- Snow glow on peak -->
    <div class="snow-glow"></div>

    <!-- Sun glow at horizon -->
    <div class="sun-glow"></div>

    <!-- Mountain Layers (back to front) -->
    <svg class="mountain-layer" viewBox="0 0 1440 600" preserveAspectRatio="none" style="height:65vh;">
        <!-- Far background hills -->
        <path d="M0,600 L0,380 Q100,340 200,360 Q350,310 450,350 Q550,300 650,330 Q750,280 850,320 Q950,290 1050,340 Q1150,300 1250,350 Q1350,320 1440,360 L1440,600 Z"
              fill="rgba(62,39,35,0.5)"/>
        <!-- Mid mountain range -->
        <path d="M0,600 L0,420 Q80,380 160,400 Q280,340 380,380 Q480,310 580,360 Q680,290 780,340 Q880,280 980,330 Q1080,300 1180,360 Q1280,330 1380,380 L1440,370 L1440,600 Z"
              fill="rgba(62,39,35,0.7)"/>
        <!-- Main Kilimanjaro silhouette -->
        <path d="M400,600 L400,480 Q480,440 540,400 Q580,370 620,330 Q660,280 700,230 Q730,190 750,160 Q770,135 785,118 Q800,105 810,100 Q815,98 820,100 Q830,105 845,118 Q860,135 880,160 Q900,190 930,230 Q970,280 1010,330 Q1050,370 1090,400 Q1150,440 1230,480 L1230,600 Z"
              fill="#2C1810"/>
        <!-- Snow cap -->
        <path d="M695,235 Q710,210 730,185 Q748,163 765,145 Q778,132 785,125 Q790,120 795,118 Q800,120 810,128 Q822,138 838,155 Q855,175 875,200 Q895,228 915,260 Q895,250 870,242 Q845,235 820,230 Q800,228 785,230 Q765,233 745,238 Q720,245 695,235 Z"
              fill="rgba(255,255,255,0.85)"/>
        <!-- Snow cap inner shadow -->
        <path d="M720,230 Q735,210 755,188 Q770,172 782,160 Q790,155 795,158 Q805,168 820,185 Q838,205 855,228 Q840,222 820,218 Q800,216 790,218 Q775,220 758,224 Q738,228 720,230 Z"
              fill="rgba(255,240,220,0.5)"/>
        <!-- Front foothills -->
        <path d="M0,600 L0,500 Q100,470 200,490 Q320,450 420,480 Q500,460 580,490 Q660,470 720,500 Q720,500 730,510 L730,600 Z"
              fill="#2C1810"/>
        <path d="M890,600 L890,510 Q900,500 910,490 Q980,465 1080,485 Q1180,460 1280,490 Q1360,475 1440,500 L1440,600 Z"
              fill="#2C1810"/>
        <!-- Savanna ground -->
        <path d="M0,600 L0,540 Q200,520 400,535 Q600,525 800,540 Q1000,530 1200,545 Q1350,535 1440,540 L1440,600 Z"
              fill="#3E2723"/>
    </svg>

    <!-- Mist layer -->
    <div class="mist"></div>

    <!-- Acacia tree silhouettes -->
    <svg class="acacia-silhouette" style="left:5%; height:120px;" viewBox="0 0 120 120">
        <line x1="60" y1="120" x2="60" y2="40" stroke="#1A0E08" stroke-width="4"/>
        <ellipse cx="60" cy="30" rx="45" ry="25" fill="#1A0E08"/>
        <ellipse cx="35" cy="45" rx="20" ry="12" fill="#1A0E08"/>
        <ellipse cx="85" cy="45" rx="20" ry="12" fill="#1A0E08"/>
    </svg>
    <svg class="acacia-silhouette" style="right:8%; height:90px;" viewBox="0 0 120 120">
        <line x1="60" y1="120" x2="58" y2="45" stroke="#1A0E08" stroke-width="3"/>
        <ellipse cx="58" cy="35" rx="38" ry="20" fill="#1A0E08"/>
        <ellipse cx="30" cy="50" rx="18" ry="10" fill="#1A0E08"/>
        <ellipse cx="88" cy="48" rx="16" ry="9" fill="#1A0E08"/>
    </svg>
    <svg class="acacia-silhouette" style="right:30%; height:60px;" viewBox="0 0 120 120">
        <line x1="60" y1="120" x2="60" y2="50" stroke="#1A0E08" stroke-width="2.5"/>
        <ellipse cx="60" cy="42" rx="30" ry="16" fill="#1A0E08"/>
    </svg>

    <!-- Main Content -->
    <div class="content-layer">
        <div class="system-title">
            <h1>Jamal Said Kazembe</h1>
            <div class="sub">Multisystem Management</div>
        </div>
        <button class="login-btn" onclick="handleLogin()">
            <i data-lucide="mountain" style="width:20px;height:20px;"></i>
            Login
        </button>
    </div>

    <!-- Footer -->
    <div class="footer-text">&copy; 2025 Jamal Said Kazembe &middot; All Rights Reserved</div>

    <!-- Login Script -->
    <script src="login.js"></script>

    <!-- Init -->
    <script>
        // Generate stars
        const starsContainer = document.getElementById('stars');
        for (let i = 0; i < 80; i++) {
            const star = document.createElement('div');
            star.classList.add('star');
            const size = Math.random() * 2 + 1;
            star.style.width = size + 'px';
            star.style.height = size + 'px';
            star.style.left = Math.random() * 100 + '%';
            star.style.top = Math.random() * 100 + '%';
            star.style.animationDelay = Math.random() * 3 + 's';
            star.style.animationDuration = (Math.random() * 2 + 2) + 's';
            starsContainer.appendChild(star);
        }

        // Init Lucide icons
        lucide.createIcons();
    </script>
</body>
</html>
