<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Menu</title>

<style>
body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-family:Arial, sans-serif;
background:#f4f4f4;
}

.container{
text-align:center;
}

button{
padding:15px 30px;
margin:10px;
font-size:18px;
border:none;
border-radius:8px;
cursor:pointer;
color:white;
}

.business{background:#4CAF50;}
.exit{background:#f44336;}

.addTransaction{background:#2196F3;}
.viewMenuBtn{background:#FF9800;}
.backMain{background:#9E9E9E;}

.inBtn{background:#009688;}
.outBtn{background:#E91E63;}

.cashBtn{background:#8BC34A;}
.creditBtn{background:#673AB7;}
.bankBtn{background:#3F51B5;}

.okBtn{background:#00BCD4;}
.cancelBtn{background:#795548;}

.listBtn{background:#607D8B;}
.cashBookBtn{background:#009688;}
.ledgerBtn{background:#CDDC39;}
.balanceBtn{background:#9C27B0;}
.incomeBtn{background:#FF5722;}
.backViewBtn{background:#3F51B5;}

.backListBtn{background:#795548;}

.row{
display:flex;
justify-content:center;
gap:10px;
flex-wrap:wrap;
}
</style>
</head>

<body>

<!-- MAIN MENU -->
<div class="container" id="menu">
<button class="business" onclick="business()">Business</button>
<button class="exit" onclick="exitApp()">Exit</button>
</div>

<!-- TRANSACTION SCREEN -->
<div class="container" id="transaction" style="display:none;">
<button class="addTransaction" onclick="addTransaction()">Add New Transaction</button>
<br>
<button class="viewMenuBtn" onclick="openView()">View</button>
<br>
<button class="backMain" onclick="back()">Back</button>
</div>

<!-- ADD FORM -->
<div class="container" id="addForm" style="display:none;">
<h2>Add Transaction</h2>

<input type="text" id="detail" placeholder="Enter Detail" oninput="showAmount()">
<br><br>

<input type="number" id="amount" placeholder="Enter Amount" style="display:none;" oninput="showType()">
<br><br>

<div id="type" style="display:none;">
<p>Choose</p>
<div class="row">
<button class="inBtn" onclick="showMethod('in')">In</button>
<button class="outBtn" onclick="showMethod('out')">Out</button>
</div>
</div>

<br>

<div id="method" style="display:none;">
<p>Payment</p>
<div class="row">
<button class="cashBtn" onclick="showEnd('cash')">Cash</button>
<button class="creditBtn" onclick="showEnd('credit')">Credit</button>
<button class="bankBtn" onclick="showEnd('bank')">Bank</button>
</div>
</div>

<br>

<div id="endButtons" style="display:none;">
<div class="row">
<button class="okBtn" onclick="saveTransaction()">OK</button>
<button class="cancelBtn" onclick="cancelTransaction()">Cancel</button>
</div>
</div>
</div>

<!-- VIEW MENU -->
<div class="container" id="viewMenu" style="display:none;">
<button class="listBtn" onclick="showList()">List</button>
<br>
<button class="cashBookBtn" onclick="openCashBook()">Cash Book</button>
<br>
<button class="ledgerBtn" onclick="comingSoon()">Ledgers</button>
<br>
<button class="balanceBtn" onclick="comingSoon()">Balance Sheet</button>
<br>
<button class="incomeBtn" onclick="comingSoon()">Income Statement</button>
<br>
<button class="backViewBtn" onclick="backToTransaction()">Back</button>
</div>

<!-- LIST -->
<div class="container" id="listScreen" style="display:none;">
<h3>Transactions</h3>

<table border="1" cellpadding="8">
<tr>
<th>S/N</th>
<th>Date</th>
<th>Detail</th>
<th>Amount</th>
</tr>

<tbody id="listData"></tbody>
</table>

<br>
<button class="backListBtn" onclick="backToView()">Back</button>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyDpNJIZoLeZUhIoTepbLb_3rRLpseu9Zdo",
authDomain: "my-project-66803-95cb3.firebaseapp.com",
projectId: "my-project-66803-95cb3",
storageBucket: "my-project-66803-95cb3.firebasestorage.app",
messagingSenderId: "167159607898",
appId: "1:167159607898:web:23ca11366b88868b085e63"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let currentType="";
let currentMethod="";

window.business=function(){
menu.style.display="none";
transaction.style.display="block";
}

window.back=function(){
transaction.style.display="none";
menu.style.display="block";
}

window.exitApp=function(){
alert("Exit button clicked");
}

window.addTransaction=function(){
transaction.style.display="none";
addForm.style.display="block";
}

window.showAmount=function(){
amount.style.display="block";
}

window.showType=function(){
type.style.display="block";
}

window.showMethod=function(typeVal){
currentType=typeVal;
method.style.display="block";
}

window.showEnd=function(methodVal){
currentMethod=methodVal;
endButtons.style.display="block";
}

window.cancelTransaction=function(){
addForm.style.display="none";
transaction.style.display="block";
}

window.saveTransaction=async function(){

let detail=document.getElementById("detail").value;
let amount=document.getElementById("amount").value;
let date=new Date().toLocaleDateString();

await addDoc(collection(db,"transactions"),{
detail,
amount,
date,
type:currentType,
method:currentMethod
});

alert("Transaction saved to Firestore");

addForm.style.display="none";
transaction.style.display="block";
}

window.openView=function(){
transaction.style.display="none";
viewMenu.style.display="block";
}

window.backToTransaction=function(){
viewMenu.style.display="none";
transaction.style.display="block";
}

window.showList=async function(){

viewMenu.style.display="none";
listScreen.style.display="block";

let table=document.getElementById("listData");
table.innerHTML="";

const querySnapshot=await getDocs(collection(db,"transactions"));

let i=1;

querySnapshot.forEach(doc=>{

let t=doc.data();

table.innerHTML+=`
<tr>
<td>${i++}</td>
<td>${t.date}</td>
<td>${t.detail}</td>
<td>${t.amount}</td>
</tr>
`;

});

}

window.backToView=function(){
listScreen.style.display="none";
viewMenu.style.display="block";
}

window.comingSoon=function(){
alert("Coming soon");
}

</script>

</body>
</html>
